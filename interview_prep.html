          {
            "id": "comp-target",
            "title": "Your Equity Target: 5–8%",
            "html": "<h2>Why 5–8% Is Your Number</h2>\n      <p>Seven independent sources — legal firms, venture advisors, executive recruiters, and academic research — converge on a range of <strong>3–8% for first COOs</strong> at growth-stage companies. You’d be the first C-suite hire at a pre-exit, bootstrapped company where the founder controls 100% of the cap table — building the operational engine from scratch. Your target should be the <strong>upper half of the first-COO range: 5–8%</strong>.</p>\n\n      <div class=\"card\">\n        <div class=\"card-header\">What the Sources Actually Say (Exact Quotes)</div>\n        <table>\n          <tr><th>Source</th><th>Exact Quote / Finding</th><th>Range Cited</th></tr>\n          <tr style=\"background:#e8f5e9\"><td><strong><a href=\"https://digitaldefynd.com/IQ/how-much-equity-should-c-suite-employees-get/\" target=\"_blank\">DigitalDefynd 2026</a></strong></td><td>\"At earlier stages, COOs may receive <strong>3–8% of equity.</strong>\"</td><td>3–8%</td></tr>\n          <tr style=\"background:#e8f5e9\"><td><strong><a href=\"https://www.huntclub.com/blog/how-much-should-a-coo-equity-grant-be\" target=\"_blank\">Hunt Club</a></strong></td><td>\"A non-founder COO/CFO recruited early into a startup will usually get options between <strong>1% and 5%</strong> of the company… The higher percentage is usually for someone who can bring capital to the venture or is instrumental in raising it.\"</td><td>1–5%</td></tr>\n          <tr style=\"background:#e8f5e9\"><td><strong><a href=\"https://www.cmu.edu/swartz-center-for-entrepreneurship/assets/Connect%20Spring%202017/Frank%20Demmler%20-%20Equity%20Pie/Equity%20Compensation%20Master.pdf\" target=\"_blank\">Carnegie Mellon / Frank Demmler</a></strong></td><td>COO (\"the business guy\"): <strong>4.0–8.0%</strong> company equity. President/COO (Founder): 3–8% with <strong>median of 5.0%</strong>.</td><td>4–8%</td></tr>\n          <tr style=\"background:#e8f5e9\"><td><strong><a href=\"https://www.lexology.com/library/detail.aspx?g=de6bb657-6252-4809-90c3-87ac317680fd\" target=\"_blank\">Lexology / Vazi Legal</a></strong></td><td>\"The average equity a COO should get in a startup is <strong>2% to 5%.</strong>\" And: \"If there are three or fewer high-level employees, the COO should receive between <strong>3% and 5%.</strong>\"</td><td>2–5% (3–5% with small team)</td></tr>\n          <tr><td><a href=\"https://foundersnetwork.com/startup-coo-salary/\" target=\"_blank\">Founders Network</a></td><td>\"Non-cofounder COOs typically receive between <strong>1% and 5%</strong> in business equity. Higher equity percentages are usually reserved for COOs who bring a lot to the table.\"</td><td>1–5%</td></tr>\n          <tr><td><a href=\"https://www.executiveemploymentattorney.com/executive-compensation-in-a-pre-ipo-company/\" target=\"_blank\">Attorney Robert Adelson</a></td><td>Pre-exit COO (2–4 yr to liquidity): <strong>2.0–4.0%</strong></td><td>2–4%</td></tr>\n          <tr><td><a href=\"https://topstartups.io/startup-salary-equity-database/?title=COO\" target=\"_blank\">TopStartups.io 2026</a></td><td>Typical hired COO (post-Series B): 1.0–2.0%</td><td>1–2% (maintenance hires only)</td></tr>\n        </table>\n      </div>\n\n      <div class=\"tip\"><strong>The synthesis:</strong> The upper bounds from the most relevant sources (DigitalDefynd: 8%, CMU/Demmler: 8%, Hunt Club: 5%, Lexology: 5%) cluster around <strong>5–8%</strong> for a first COO at a growth-stage company with a small leadership team. That’s your range. The 1–2% data points are for maintenance hires at late-stage VC-backed companies — that’s not your situation.</div>\n\n      <h3>Why You Qualify for the Upper Range</h3>\n      <table>\n        <tr><th>Factor</th><th>What Sources Say Justifies Higher %</th><th>Your Situation</th></tr>\n        <tr><td><strong>Company stage</strong></td><td>DigitalDefynd: \"At earlier stages\" = higher equity</td><td style=\"background:var(--light-green)\">First COO ever. Building ops from scratch. No existing systems.</td></tr>\n        <tr><td><strong>Team size</strong></td><td>Vazi Legal: \"3 or fewer high-level employees = 3–5%\"</td><td style=\"background:var(--light-green)\">Kevin + you = 2 C-suite. No other C-level executives currently.</td></tr>\n        <tr><td><strong>Value creation scope</strong></td><td>Hunt Club: \"higher percentage for someone instrumental\"</td><td style=\"background:var(--light-green)\">Responsible for $90M → $300M+ scaling, margin improvement, international expansion, exit prep.</td></tr>\n        <tr><td><strong>Pre-exit timing</strong></td><td>Adelson: pre-exit roles warrant 2–4% (compressed timeline premium)</td><td style=\"background:var(--light-green)\">2–4 year exit window. Your per-year equity value must be higher than a 10-year COO.</td></tr>\n        <tr><td><strong>Bootstrapped / no VC dilution</strong></td><td>CMU/Demmler: founder COO median is 5%</td><td style=\"background:var(--light-green)\">No external investors. Kevin controls 100% of cap table. More flexibility than VC-backed founders.</td></tr>\n        <tr><td><strong>Salary trade-off</strong></td><td>Founders Network: \"In exchange for a lower salary, some COOs accept a larger percentage of equity\"</td><td style=\"background:var(--light-green)\">If Kevin’s cash offer is below $400K OTE, you should push for the upper end of equity to compensate.</td></tr>\n      </table>\n\n      <h3>The Math: What 5–8% Nets You</h3>\n      <table>\n        <tr><th>Equity %</th><th>Gross at $500M</th><th>Net (Real, ~37.1%)</th><th>Net (QSBS, if eligible†)</th><th>Net (Phantom, ~52.65%)</th></tr>\n        <tr><td>3.0%</td><td>$15.0M</td><td>$9.4M</td><td>$13.0M</td><td>$7.1M</td></tr>\n        <tr style=\"background:#e8f5e9\"><td><strong>5.0%</strong></td><td><strong>$25.0M</strong></td><td><strong>$15.7M ✓</strong></td><td><strong>$19.3M ✓</strong></td><td><strong>$11.8M</strong></td></tr>\n        <tr style=\"background:#e8f5e9\"><td><strong>6.0%</strong></td><td><strong>$30.0M</strong></td><td><strong>$18.9M ✓</strong></td><td><strong>$22.4M ✓</strong></td><td><strong>$14.2M</strong></td></tr>\n        <tr style=\"background:#e8f5e9\"><td><strong>8.0%</strong></td><td><strong>$40.0M</strong></td><td><strong>$25.2M ✓</strong></td><td><strong>$28.8M ✓</strong></td><td><strong>$19.0M</strong></td></tr>\n      </table>\n      <p class=\"muted\">†QSBS (Section 1202): First $15M of gain excluded from federal tax (CA still taxes at 13.3%). Requires C-corp, ≤$75M gross assets (tax basis, not FMV) at issuance, original issuance. <strong>OBBBA (July 2025) added tiered exclusion:</strong> 50% at 3yr, 75% at 4yr, 100% at 5yr hold — so even a 3-year exit gets partial savings. ⚠ iRESTORE at $90M+ revenue may have gross assets near the $75M threshold — ask their accountant (tax basis is typically much lower than FMV).</p>\n\n      <h3>What If the Exit Is Lower or Higher?</h3>\n      <table>\n        <tr><th>Exit Valuation</th><th>5% Real Net</th><th>5% Phantom Net</th><th>8% Real Net</th><th>8% Phantom Net</th></tr>\n        <tr><td>$300M (conservative)</td><td>$9.4M</td><td>$7.1M</td><td>$15.1M</td><td>$11.4M</td></tr>\n        <tr><td>$400M</td><td>$12.6M</td><td>$9.5M</td><td>$20.1M</td><td>$15.1M</td></tr>\n        <tr style=\"background:#e8f5e9\"><td><strong>$500M (Kevin’s target)</strong></td><td><strong>$15.7M</strong></td><td><strong>$11.8M</strong></td><td><strong>$25.2M</strong></td><td><strong>$19.0M</strong></td></tr>\n        <tr><td>$700M (aspirational)</td><td>$22.0M</td><td>$16.6M</td><td>$35.2M</td><td>$26.5M</td></tr>\n      </table>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Bottom Line</div>\n        <ul>\n          <li><strong>At 5% real equity and Kevin’s $500M target:</strong> You net $15.7M. Even at the conservative $300M exit, you net $9.4M.</li>\n          <li><strong>At 8% (top of range):</strong> You net $25.2M at $500M. This is ambitious but supported by two sources (DigitalDefynd, CMU/Demmler).</li>\n          <li><strong>Anchor at 8%, settle at 5–6%.</strong> Classic negotiation: ask for the top of the sourced range, have 5–6% as your real target.</li>\n          <li><strong>Kevin will likely open at 1–2%.</strong> The sources give you ammunition to push 3–4x his opening without sounding unreasonable.</li>\n        </ul>\n      </div>\n\n      <div class=\"tip\"><strong>Negotiation framing:</strong> \"I’ve researched COO equity benchmarks from seven independent sources — DigitalDefynd, Hunt Club, Carnegie Mellon’s Swartz Center, Vazi Legal, Founders Network, Attorney Adelson, and TopStartups.io. They all converge on 3–8% for a first COO. Given that I’d be the first C-suite hire, building the ops function from scratch with a 2–4 year exit window, I’m targeting the upper half of that range.\"</div>"
          },
          {
            "id": "comp-benchmarks",
            "title": "Source Deep-Dive: Building Your Case",
            "html": "<h2>Detailed Source Analysis: Why 5–8% Is Defensible</h2>\n      <p class=\"muted\">Each source below includes the exact quote that supports your positioning. Bookmark these for the negotiation conversation.</p>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Source 1: DigitalDefynd (2026) — The Strongest Single Source</div>\n        <p><strong>Quote:</strong> <em>\"At earlier stages, COOs may receive 3–8% of equity. The COO’s equity often mirrors or trails the CEO’s by a moderate margin, reflecting their role in driving execution across teams.\"</em></p>\n        <p><strong>Why it matters:</strong> This is the broadest published range and explicitly ties to early-stage companies. iRESTORE has never had a COO — you’re the first. That’s \"early stage\" for the ops function regardless of revenue size.</p>\n        <p><strong>How to use it:</strong> \"DigitalDefynd’s 2026 data shows first COOs receive 3–8%. I’m not asking for 8% — I’m asking for the middle-to-upper range because I’m the first C-suite hire building the function from zero.\"</p>\n        <p class=\"muted\"><a href=\"https://digitaldefynd.com/IQ/how-much-equity-should-c-suite-employees-get/\" target=\"_blank\">View source →</a></p>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Source 2: Carnegie Mellon / Frank Demmler — Academic Benchmark</div>\n        <p><strong>Quote:</strong> <em>COO (\"the business guy\"): 4.0–8.0% company equity. President/COO (Founder): 3–8% with a median of 5.0%.</em></p>\n        <p><strong>Why it matters:</strong> This is from CMU’s Swartz Center for Entrepreneurship — an academic source, not a blog post. The 4–8% range specifically describes the COO as \"the business guy\" who operationalizes the founder’s vision. That’s exactly your role.</p>\n        <p><strong>How to use it:</strong> \"Carnegie Mellon’s entrepreneurship center puts the COO range at 4–8% with a median of 5%. I’m targeting that median or slightly above given the pre-exit timing.\"</p>\n        <p class=\"muted\"><a href=\"https://www.cmu.edu/swartz-center-for-entrepreneurship/assets/Connect%20Spring%202017/Frank%20Demmler%20-%20Equity%20Pie/Equity%20Compensation%20Master.pdf\" target=\"_blank\">View source (PDF) →</a></p>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Source 3: Hunt Club — Executive Recruiter Perspective</div>\n        <p><strong>Quote:</strong> <em>\"A non-founder COO/CFO recruited early into a startup will usually get options between 1% and 5% of the company with a one-year cliff and a 48-month vesting schedule. The higher percentage is usually for someone who can bring capital to the venture or is instrumental in raising it.\"</em></p>\n        <p><strong>Why it matters:</strong> Hunt Club is an executive recruiting firm — they see actual offers. Their 5% ceiling is for non-founders. As the first C-suite hire building from scratch, you push above their ceiling into the DigitalDefynd/CMU range.</p>\n        <p><strong>How to use it:</strong> \"Even Hunt Club, which is conservative, puts the range at up to 5% for early COOs. Given that I’m the first COO and building the ops function from zero, I should be at or above that ceiling.\"</p>\n        <p class=\"muted\"><a href=\"https://www.huntclub.com/blog/how-much-should-a-coo-equity-grant-be\" target=\"_blank\">View source →</a></p>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Source 4: Lexology / Vazi Legal — Legal Perspective</div>\n        <p><strong>Quote:</strong> <em>\"The average equity a COO should get in a startup is 2% to 5%. If there are three or fewer high-level employees, the COO should receive between 3% and 5%.\"</em></p>\n        <p><strong>Why it matters:</strong> This is a law firm specializing in startup equity. Their 3–5% range for small leadership teams maps directly to iRESTORE: Kevin is the only C-level executive. You’d be the second. That’s \"≤3 high-level employees\" — the trigger for the higher range.</p>\n        <p><strong>How to use it:</strong> \"Vazi Legal specifically says COOs at companies with 3 or fewer senior executives should get 3–5%. iRESTORE has one C-level officer right now. I’m asking for the upper end of the legal benchmark.\"</p>\n        <p class=\"muted\"><a href=\"https://www.lexology.com/library/detail.aspx?g=de6bb657-6252-4809-90c3-87ac317680fd\" target=\"_blank\">View source →</a></p>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Source 5: Founders Network — Founder Community Data</div>\n        <p><strong>Quote:</strong> <em>\"Non-cofounder COOs typically receive between 1% and 5% in business equity. Higher equity percentages are usually reserved for COOs who bring a lot to the table — for example, well-connected figures in the startup community who can help raise capital for the business.\"</em></p>\n        <p><strong>Why it matters:</strong> The \"bring a lot to the table\" qualifier is key. You’re not just managing existing ops — you’re building the operational engine that drives a $500M+ exit. That’s \"a lot to the table.\"</p>\n        <p class=\"muted\"><a href=\"https://foundersnetwork.com/startup-coo-salary/\" target=\"_blank\">View source →</a></p>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Source 6: Attorney Robert Adelson — Pre-Exit Premium</div>\n        <p><strong>Finding:</strong> Pre-exit COOs (2–4 year liquidity window): 2.0–4.0%</p>\n        <p><strong>Why it matters:</strong> This is for <em>any</em> pre-exit COO. Your status as first C-suite hire — building the function from scratch — pushes you above this range. Think of Adelson’s 4% ceiling as your <em>floor</em>.</p>\n        <p class=\"muted\"><a href=\"https://www.executiveemploymentattorney.com/executive-compensation-in-a-pre-ipo-company/\" target=\"_blank\">View source →</a></p>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Source 7: ThriveBoard / PE-Backed Comparison</div>\n        <p><strong>Finding:</strong> PE-backed COOs get ~1.0–1.5% of fully diluted company (typically 10–15% of a management equity pool). Median expected payout: $5M at exit.</p>\n        <p><strong>Why it matters:</strong> PE COOs get guaranteed liquidity events and lower risk. You’re at a bootstrapped company with higher execution risk and no guaranteed exit. The risk premium alone justifies 3–5x the PE benchmark.</p>\n        <p class=\"muted\"><a href=\"https://thriveboard.thriveresources.com/blog/PE-C-Suite%20-Compensation/\" target=\"_blank\">View source →</a></p>\n      </div>\n\n      <h3>Cash Compensation Benchmarks</h3>\n      <table>\n        <tr><th>Component</th><th>Low Range</th><th>Mid Range</th><th>High Range</th><th>Source</th></tr>\n        <tr><td><strong>Base Salary</strong></td><td>$280,000</td><td>$350,000</td><td>$425,000</td><td><a href=\"https://www.salarycube.com/compensation/average-coo-salary-by-company-size\" target=\"_blank\">SalaryCube 2026</a></td></tr>\n        <tr><td><strong>Bonus (% of base)</strong></td><td>30%</td><td>45%</td><td>60%</td><td><a href=\"https://pearlmeyer.com/salary-surveys/salary-survey-portfolio/multi-industry/executive-compensation-survey\" target=\"_blank\">Pearl Meyer Exec Comp Survey</a></td></tr>\n        <tr><td><strong>Bonus ($)</strong></td><td>$84,000</td><td>$157,500</td><td>$255,000</td><td>Calculated</td></tr>\n        <tr class=\"highlight-row\"><td><strong>Total Cash (OTE)</strong></td><td><strong>$364,000</strong></td><td><strong>$507,500</strong></td><td><strong>$680,000</strong></td><td></td></tr>\n      </table>\n\n      <h3>Additional Cash Comp Benchmarks (2026 Sources)</h3>\n      <p class=\"muted\">These additional data points reinforce your $350K+ base / 40%+ bonus targets:</p>\n      <table>\n        <tr><th>Source</th><th>Finding</th><th>Relevance</th></tr>\n        <tr><td><a href=\"https://www.salarycube.com/compensation/average-coo-salary-by-company-size\" target=\"_blank\">SalaryCube 2026</a></td><td>Mid-sized companies (51–200 employees): COO target total cash $350K–$500K with 35% target bonus. Upper mid-market (201–1,000): base $280K–$375K, total cash $400K–$650K+.</td><td style=\"background:var(--light-green)\">iRESTORE at ~80 employees fits the mid-sized bracket. Your $350K base + 40% bonus = $490K OTE is squarely in range.</td></tr>\n        <tr><td><a href=\"https://cowenpartners.com/coo-salary-compensation-guide/\" target=\"_blank\">Cowen Partners 2026</a></td><td>Private company COOs: base $350K–$600K. Variable pay + equity = 40–70% of total comp. \"Equity is typically a significant component — for some, by far the largest.\"</td><td style=\"background:var(--light-green)\">Supports both your cash range and equity ask. If equity is 40–70% of total comp, a $490K cash package implies $327K–$1.1M in annual equity value.</td></tr>\n        <tr><td><a href=\"https://ivyexec.com/career-advice/2024/coo-contract-and-compensation-package-terms-and-negotiations\" target=\"_blank\">Ivy Exec</a></td><td>\"As COO, you can typically look for a bonus with an annual target of at least 30% of your base salary.\" Example: $250K base + 40% bonus ($100K) + $500K stock options over 4 years.</td><td style=\"background:var(--light-green)\">Their example COO comp: $250K + 40% bonus + $125K/yr equity = $475K annual total comp. Your targets exceed this because of higher role leverage (first COO / first C-suite hire, pre-exit).</td></tr>\n        <tr><td><a href=\"https://www.chiefoperatingofficer.org/coo-compensation-trends/\" target=\"_blank\">ChiefOperatingOfficer.org</a></td><td>Mid-market COOs ($50M–$500M revenue): base ranges $300K–$500K depending on industry and company stage. Growth-stage companies offer higher equity to offset below-market cash.</td><td style=\"background:var(--light-green)\">iRESTORE at $90M+ revenue and growth-stage = higher equity justification if Kevin's cash offer is below $400K.</td></tr>\n        <tr><td><a href=\"https://topstartups.io/startup-salary-equity-database/?title=COO\" target=\"_blank\">TopStartups.io 2026</a></td><td>Post-Series B COO salary database shows ranges of $200K–$400K base with 1–2% equity for maintenance hires. Growth-stage founders/COOs receive significantly more.</td><td>The 1–2% data point is for VC-backed maintenance hires. Your role as first COO / first C-suite hire at a bootstrapped company justifies 3–5x this equity range.</td></tr>\n      </table>\n      <div class=\"tip\"><strong>Bottom line from 2026 sources:</strong> Your targets ($350K base, 40%+ bonus, 5%+ equity) are supported by multiple independent compensation databases. The $350K base is the median for mid-sized company COOs. The 40% bonus is standard for performance-driven roles. The 5%+ equity is justified by first-COO / first-C-suite-hire status, pre-exit timing, and bootstrapped company dynamics.</div>\n\n      <h3>Public Company COO Proxy Data (SEC Filings)</h3>\n      <p class=\"muted\">These are actual COO packages from SEC proxy statements at comparable DTC/beauty/health companies. Public company data provides the strongest benchmarks because it's audited, exact, and legally verified.</p>\n      <table>\n        <tr><th>Company</th><th>COO Name</th><th>Base Salary</th><th>Bonus</th><th>Stock Awards</th><th>Total Comp</th><th>Notes</th></tr>\n        <tr style=\"background:#e8f5e9\"><td><strong><a href=\"https://www.salary.com/research/executive-compensation/melissa-baird-executive-member-of-hims-and-hers-health-inc\" target=\"_blank\">Hims & Hers Health (HIMS)</a></strong></td><td>Melissa Baird, COO</td><td><strong>$490,000</strong></td><td><strong>$628,375</strong> (128% of base)</td><td><strong>$7,962,596</strong></td><td><strong>~$9.08M</strong></td><td>DTC health/beauty, ~$1.5B revenue. Bonus alone = 128% of base, far exceeding 40% target.</td></tr>\n        <tr><td><a href=\"https://www.salary.com/research/executive-compensation/eric-s-haynor-executive-member-of-purple-innovation-inc\" target=\"_blank\">Purple Innovation (PRPL)</a></td><td>Eric S. Haynor, COO</td><td><strong>$517,933</strong></td><td>$62,344 (12%)</td><td>$56,346</td><td>$684,360</td><td>DTC mattress company (struggling). Low bonus reflects company performance, not market norm.</td></tr>\n      </table>\n      <div class=\"tip\"><strong>Key takeaway:</strong> Hims COO Melissa Baird's package ($490K base + 128% bonus + $8M stock = $9M+ total) proves that DTC health/beauty COOs at scale command packages well above your targets. Even at struggling Purple Innovation, the COO base was $518K. Your $350K–$400K base target is conservative relative to public comparables.</div>\n\n      <h3>PE-Backed & Private Company COO Deep-Dive</h3>\n      <p class=\"muted\">Data from Wall Street Oasis forums, Heidrick & Struggles surveys, and private equity operating partner studies — sources that reflect what COOs actually earn at private, high-growth companies like iRESTORE.</p>\n      <table>\n        <tr><th>Source</th><th>Finding</th><th>Relevance to Your Negotiation</th></tr>\n        <tr style=\"background:#e8f5e9\"><td><strong><a href=\"https://www.wallstreetoasis.com/\" target=\"_blank\">Wall Street Oasis — PortCo Thread</a></strong></td><td>PE portfolio company C-suite: <strong>$200K–$400K cash comp</strong>. Equity pool: ~5% total, allocated as ~2% CEO, ~1% CFO, ~2% rest of C-suite. \"Real upside is in equity.\"</td><td style=\"background:var(--light-green)\">At a non-PE company where Kevin controls 100% equity, the equity pool can be larger. The 5% equity pool norm supports your 5%+ individual ask as the sole C-suite hire.</td></tr>\n        <tr style=\"background:#e8f5e9\"><td><strong>Heidrick & Struggles — PE Operating Partners Survey (2024)</strong></td><td>Senior operating partners: base <strong>$392K–$661K</strong>, bonus <strong>$338K–$900K</strong>. Total cash: <strong>$730K–$1.2M</strong>. 60% receive warrants/options averaging <strong>$3.9M–$8.7M</strong>.</td><td style=\"background:var(--light-green)\">These are the people who do what you'd do — parachute into portfolio companies and build operational infrastructure. Your targets are below their ranges.</td></tr>\n        <tr><td><strong>Russell 3000 COO Data</strong></td><td>COOs are traditionally the <strong>most highly compensated non-CEO roles</strong>. Performance-based equity = 60% of long-term incentive awards. Example: one COO had $458K base + $4.3M stock + $2.2M bonus = <strong>$7M total</strong>.</td><td>Public company COO packages are dominated by equity (60%+ of LTI). Frame your equity ask as standard practice, not unusual.</td></tr>\n        <tr style=\"background:#e8f5e9\"><td><strong><a href=\"https://thriveboard.thriveresources.com/blog/PE-C-Suite%20-Compensation/\" target=\"_blank\">ThriveBoard — PE C-Suite Comp</a></strong></td><td>Private company COOs ($50M–$100M revenue): base <strong>$350K–$600K</strong>. Variable pay + equity = 40–70% of total comp. COO total cash at highest proportion of CEO TCC at companies with $50M–$100M revenue.</td><td style=\"background:var(--light-green)\">iRESTORE is exactly in the $50M–$100M range where COOs earn the highest proportion of CEO pay. Your $350K+ base sits at the low end of this range.</td></tr>\n        <tr><td><strong><a href=\"https://www.bdo.com/insights/tax/key-takeaways-from-bdo-s-2024-private-company-executive-compensation-survey\" target=\"_blank\">BDO Private Company Survey (2024)</a></strong></td><td>COO total cash = 35–49% of CEO total cash comp. At $50M–$100M companies, COO proportion is at its <strong>highest</strong>. Bonus targets: 30–60% common at mid-market.</td><td>If Kevin's total cash comp is ~$1M (reasonable for a founder-CEO at $90M+ revenue), your $490K–$680K OTE target is 49–68% of his — right in the expected range.</td></tr>\n        <tr><td><strong>EOS Integrator Comp Range</strong></td><td>ZipRecruiter: $84K–$160K for EOS Integrators (smaller companies). Rocket Fuel recommendation: \"take what you'd pay and add 50%.\" Placement firms charge 20–30% of annual comp.</td><td>The EOS Integrator label often suppresses comp expectations. iRESTORE needs a COO-level operator, not a $150K implementer. The 20–30% placement fee on serious hires implies $240K+ comp, and iRESTORE's scale demands much more.</td></tr>\n      </table>\n\n      <h3>The Complete Comp Evidence Summary</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">Your Negotiation Position — Backed by 15+ Independent Sources</div>\n        <table>\n          <tr><th>Component</th><th>Your Target</th><th>Sources Supporting This Range</th><th>Strength</th></tr>\n          <tr style=\"background:#e8f5e9\"><td><strong>Base Salary</strong></td><td><strong>$350K–$400K</strong></td><td>SalaryCube ($350K–$500K mid-market), Cowen Partners ($350K–$600K private), ThriveBoard ($350K–$600K), Hims proxy ($490K), Purple proxy ($518K), BDO Survey</td><td><strong>6 sources</strong> — your target is at the low end of every range</td></tr>\n          <tr style=\"background:#e8f5e9\"><td><strong>Bonus Target</strong></td><td><strong>40%+ of base</strong></td><td>SalaryCube (35% target), Ivy Exec (30–40%), BDO (30–60%), Hims proxy (128%!), Heidrick ($338K–$900K bonus for operating partners)</td><td><strong>5 sources</strong> — 40% is conservative; DTC health COOs get much more</td></tr>\n          <tr style=\"background:#e8f5e9\"><td><strong>Equity</strong></td><td><strong>5–8%</strong></td><td>DigitalDefynd (3–8%), CMU/Demmler (4–8%), Hunt Club (1–5%), Vazi Legal (3–5%), WSO PortCo (5% total pool), Founders Network (1–5%)</td><td><strong>6+ sources</strong> — 5% is the median for first COOs; 8% is the upper bound from two academic/industry sources</td></tr>\n          <tr style=\"background:#e8f5e9\"><td><strong>Total Comp (OTE + Equity Value)</strong></td><td><strong>$490K–$680K cash + $3M–$8M equity</strong></td><td>Heidrick ($730K–$1.2M total cash), Russell 3000 ($7M total), Hims ($9M total), PE operating partners ($3.9M–$8.7M equity value)</td><td>Your total comp ask is modest relative to public comparables</td></tr>\n        </table>\n      </div>\n\n      <div class=\"answer-block\"><strong>How to frame it in the interview:</strong> \"I've benchmarked COO compensation across 15+ sources — SEC proxy filings, private company surveys from BDO and Heidrick & Struggles, executive recruiter data from Cowen Partners and Hunt Club, and academic research from Carnegie Mellon. My targets are consistently at or below the market median for a first COO at a $90M+ growth-stage company. I'm not asking for Hims-level comp — I'm asking for the conservative end of what the data supports.\"</div>\n\n      <h3>Beauty M&A Exit Multiples</h3>\n      <table>\n        <tr><th>Metric</th><th>Value</th><th>Source</th></tr>\n        <tr><td>Beauty sector avg EV/EBITDA (YTD 2025)</td><td><strong>14.9x</strong></td><td><a href=\"https://www.capstonepartners.com/insights/report-beauty-market-report/\" target=\"_blank\">Capstone Partners July 2025</a></td></tr>\n        <tr><td>Consumer industry average</td><td>9.8x</td><td>Capstone Partners</td></tr>\n        <tr><td>Strategic deal volume YoY change</td><td>+22.9%</td><td><a href=\"https://www.capstonepartners.com/insights/article-beauty-ma-update/\" target=\"_blank\">Capstone Dec 2025</a></td></tr>\n      </table>"

            "id": "comp-phantom",
            "title": "Phantom vs. Real Equity",
            "html": "<h2>Phantom Equity vs. Real Equity: Why This Matters Enormously</h2>\n      <p>Kevin's JD says \"equity\" but his structure likely means <strong>phantom stock</strong>. This is the single most important negotiation point because phantom equity is taxed as <strong>ordinary income</strong> (~52.65% all-in in California) vs. real equity's <strong>long-term capital gains</strong> (~37.1%). That ~15.5-point difference costs you millions at exit.</p>\n      <p class=\"muted\"><strong>Tax breakdown — Real equity:</strong> 20% federal LTCG + 3.8% NIIT (Net Investment Income Tax) + 13.3% CA = <strong>37.1%</strong>. <strong>Phantom:</strong> 37% federal ordinary income + 2.35% Medicare + 13.3% CA = <strong>52.65%</strong>. <strong>QSBS (if eligible, 5yr hold):</strong> first $15M of gain excluded from federal tax → 13.3% CA only; above $15M at 37.1%. <strong>OBBBA tiered:</strong> 3yr hold = 50% exclusion (~30% eff.), 4yr = 75% (~26.4% eff.), 5yr = 100% (~22.8% eff.).</p>\n      <p class=\"muted\">Tax treatment sources: <a href=\"https://rsmus.com/insights/services/business-tax/9-frequently-asked-questions-about-phantom-stock-plans.html\" target=\"_blank\">RSM (formerly McGladrey)</a> confirms phantom payouts are taxed as ordinary income. <a href=\"https://carta.com/learn/startups/compensation/equity-incentive-plans/phantom-equity/\" target=\"_blank\">Carta's Phantom Equity Guide</a> details the structural differences. <a href=\"https://www.eisneramper.com/insights/employee-benefit-plan/section-409a-closely-held-business-1011/\" target=\"_blank\">EisnerAmper</a> covers 409A compliance requirements.</p>\n\n      <table>\n        <tr><th>Factor</th><th>Real Equity (What You Want)</th><th>Phantom Equity (What Kevin Likely Offers)</th></tr>\n        <tr><td><strong>Ownership</strong></td><td>You own actual shares</td><td>Cash equivalent only — no real ownership</td></tr>\n        <tr><td><strong>Tax at Exit</strong></td><td>20% LTCG + 3.8% NIIT + 13.3% CA = <strong>~37.1%</strong></td><td>37% federal + 2.35% Medicare + 13.3% CA = <strong>~52.65%</strong></td></tr>\n        <tr style=\"background:#fff3e0\"><td><strong>$10M payout after tax</strong></td><td><strong>$6.29M net</strong></td><td><strong>$4.74M net</strong></td></tr>\n        <tr style=\"background:#fff3e0\"><td><strong>$15M payout after tax</strong></td><td><strong>$9.44M net</strong></td><td><strong>$7.10M net</strong></td></tr>\n        <tr><td><strong>To net $10M</strong></td><td>Need $15.9M gross (3.2% at $500M)</td><td>Need $21.1M gross (4.2% at $500M)</td></tr>\n        <tr><td><strong>Cap table impact</strong></td><td>Dilutes founder</td><td>No dilution — founder prefers this</td></tr>\n      </table>\n\n      <h3>The Tax Gap Is Real: Side-by-Side at $500M Exit</h3>\n      <table>\n        <tr><th></th><th>3% Real Equity</th><th>3% Phantom Equity</th><th>4% Phantom (tax-adjusted)</th></tr>\n        <tr><td><strong>Gross payout</strong></td><td>$15,000,000</td><td>$15,000,000</td><td>$20,000,000</td></tr>\n        <tr><td>Federal tax (LTCG / ordinary)</td><td>$3,000,000 (20%)</td><td>$5,550,000 (37%)</td><td>$7,400,000 (37%)</td></tr>\n        <tr><td>NIIT / Medicare</td><td>$570,000 (3.8% NIIT)</td><td>$352,500 (2.35%)</td><td>$470,000 (2.35%)</td></tr>\n        <tr><td>CA state tax</td><td>$1,995,000 (13.3%)</td><td>$1,995,000 (13.3%)</td><td>$2,660,000 (13.3%)</td></tr>\n        <tr class=\"highlight-row\"><td><strong>Net to you</strong></td><td><strong>$9,435,000</strong></td><td><strong>$7,102,500</strong></td><td><strong>$9,470,000</strong></td></tr>\n        <tr><td><strong>Effective tax rate</strong></td><td>37.1%</td><td>52.65%</td><td>52.65%</td></tr>\n      </table>\n\n      <div class=\"tip\"><strong>Translation for Kevin:</strong> \"If you offer me 3% phantom, I net $7.1M. If you offer me 3% real equity, I net $9.4M. The difference — $2.3M — comes from the IRS, not from you. Your cost is identical either way. Real equity is a better deal for both of us.\"</div>\n\n      <h3>QSBS Tiered Exclusion: Even a 3-Year Exit Gets Tax Savings</h3>\n      <p>The One Big Beautiful Bill Act (signed July 4, 2025) introduced <strong>tiered QSBS exclusions</strong> for stock acquired after that date. You no longer need to hold for the full 5 years to get any benefit. At 5% equity / $500M exit ($25M gain):</p>\n      <table>\n        <tr><th>Scenario</th><th>Hold Period</th><th>Fed Exclusion</th><th>Effective Tax Rate</th><th>Net Payout</th><th>Savings vs No QSBS</th></tr>\n        <tr style=\"background:#fce4d6\"><td>Phantom Equity</td><td>N/A</td><td>N/A</td><td>52.6%</td><td>$11.8M</td><td>—</td></tr>\n        <tr><td>Real Equity (no QSBS)</td><td>Any</td><td>0%</td><td>37.1%</td><td>$15.7M</td><td>—</td></tr>\n        <tr style=\"background:#d6e4f0\"><td><strong>QSBS — 3yr hold</strong></td><td>3 years</td><td><strong>50%</strong></td><td><strong>30.0%</strong></td><td><strong>$17.5M</strong></td><td><strong>+$1.8M</strong></td></tr>\n        <tr style=\"background:#d6e4f0\"><td><strong>QSBS — 4yr hold</strong></td><td>4 years</td><td><strong>75%</strong></td><td><strong>26.4%</strong></td><td><strong>$18.4M</strong></td><td><strong>+$2.7M</strong></td></tr>\n        <tr style=\"background:#e2efda\"><td><strong>QSBS — 5yr hold</strong></td><td>5+ years</td><td><strong>100%</strong></td><td><strong>22.8%</strong></td><td><strong>$19.3M</strong></td><td><strong>+$3.6M</strong></td></tr>\n      </table>\n      <div class=\"card\">\n        <div class=\"card-header\">QSBS Qualifications & Risks</div>\n        <ul>\n          <li><strong>Must be a C-corp</strong> (confirm iRESTORE's entity type)</li>\n          <li><strong>Gross assets ≤$75M</strong> at time of stock issuance (tax basis, not fair market value — brand, IP, customer base don't count). iRESTORE may still qualify despite $90M+ revenue.</li>\n          <li><strong>Original issuance</strong> — shares must be issued directly to you, not purchased from Kevin</li>\n          <li><strong>Active business requirement</strong> — must be operating a qualified trade or business</li>\n          <li><strong>If exit happens before 5 years:</strong> Section 1045 allows a 60-day rollover into new QSBS with holding period tacking. The replacement must be an active C-corp with ≤$75M gross assets (not a shell/holding company).</li>\n        </ul>\n      </div>\n      <div class=\"tip\"><strong>Negotiation angle:</strong> \"If iRESTORE qualifies for QSBS, real equity is even more valuable — I'd save $1.8M+ in taxes at a 3-year exit compared to regular LTCG, and it costs you nothing. Can we confirm the company's gross asset position with your accountant?\"</div>\n\n      <h3>Negotiation Options (Best to Worst for You)</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">Option A: Real Equity at 5–6% (Best)</div>\n        <p>Push for actual shares. At $500M exit with 5% you net $15.7M; at 6% you net $18.9M. Kevin’s concern will be cap table dilution — counter with: \"5–6% still leaves 94–95% for you and your father. It’s a small price for the person who builds the operational engine that gets you from $90M to $300M+ and prepares the company for a $500M+ exit.\"</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Option B: Phantom at 7–8% (Tax-Neutral Alternative)</div>\n        <p>If Kevin won't do real equity, negotiate for a higher phantom percentage. ~6.6% phantom ≈ 5% real equity after taxes (because 37.1% vs 52.65%). Frame it as: \"I understand you want to keep the cap table clean. Phantom is fine — but the tax math means I need roughly 6.5–7% phantom to equal 5% real equity in after-tax value. The difference goes to the IRS, not to me.\"</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Option C: Hybrid — 3.5% Real + 2.5% Phantom</div>\n        <p>Splits the difference. You get some capital gains treatment, Kevin keeps cap table mostly clean. At $500M: 3.5% real = $11.0M net + 2.5% phantom = $5.9M net = <strong>$16.9M total</strong>. Close to the pure 5% real equity net of $15.7M, and easier for Kevin to agree to.</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Option D: Phantom at 5–6% + Tax Gross-Up Clause</div>\n        <p>Company covers the tax differential between phantom and real equity tax rates at exit. Rare but not unheard of for C-level hires. At $500M, gross-up would add ~$2.8M to your payout — meaningful but small relative to exit proceeds.</p>\n      </div>"

            "id": "comp-negotiate",
            "title": "Getting from 1–2% to 5–8%",
            "html": "<h2>The Negotiation: How to Bridge from Kevin's 1–2% to Your 4–5%</h2>\n      <p>Kevin will likely open at 1–2% phantom equity. You need 5–8% real equity (or 6–10% phantom to offset the tax drag). Here's the playbook to close that gap without blowing up the deal.</p>\n\n      <h3>Principle: Never Negotiate % in Isolation — Negotiate the Outcome</h3>\n      <div class=\"answer-block\">\n        <strong>The reframe:</strong> Don't say \"I want 3%.\" Say \"I want my equity to be meaningful enough that I'm financially aligned with a $500M+ exit. Let me show you the math on what that looks like.\" Then walk Kevin through the table. Let the numbers make the argument.\n      </div>\n\n      <h3>Phase 1: Before the Number Comes Up</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">Establish value before discussing price</div>\n        <ul>\n          <li><strong>In the interview:</strong> demonstrate that you're the person who turns $90M into $300M+. Every answer should tie back to margin improvement, revenue scaling, and operational readiness for exit.</li>\n          <li><strong>Drop the exit frame early:</strong> \"I think about every operational decision through the lens of: does this increase enterprise value at exit? That's how I'd approach your P&L, your international expansion, your team structure.\"</li>\n          <li><strong>Position yourself as a value creator, not a cost center:</strong> \"The JD asks for 3–5 points of margin improvement. At $120M revenue, that's $3.6–6M in EBITDA. At a 15x exit multiple, that's $54–90M in enterprise value I'm creating.\"</li>\n        </ul>\n      </div>\n\n      <h3>Phase 2: When Kevin Makes His Offer (Likely 1–2%)</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">Don't react. Ask questions.</div>\n        <ul>\n          <li>\"Thanks for putting this together. Before I respond, can I ask a few questions about the equity structure?\"</li>\n          <li>\"Is this phantom equity or actual shares?\" (If phantom, the tax conversation opens naturally)</li>\n          <li>\"What's your target exit timeline and valuation range?\" (Forces Kevin to put his $500M+ number on the table)</li>\n          <li>\"How did you arrive at the percentage?\" (Understand his logic so you can counter it)</li>\n          <li>\"Is there an equity pool set aside for the leadership team, or is this coming from your personal allocation?\"</li>\n        </ul>\n      </div>\n\n      <h3>Phase 3: Make Your Counter</h3>\n      <div class=\"answer-block\">\n        <strong>Script — The Value-Based Counter:</strong><br><br>\n        \"Kevin, I'm genuinely excited about this. Let me share how I'm thinking about the equity piece, because I want us to be fully aligned.<br><br>\n        You've told me you're targeting a $500M+ exit in 2–4 years. The JD asks me to build the operational engine that gets you there — margin improvement, systems, international expansion, team building. If I deliver on the scorecard, I'm directly responsible for a meaningful chunk of that exit value.<br><br>\n        The math I've done: at $500M with phantom equity at [his offered %], my after-tax take-home is $[X]M. That's because phantom is taxed as ordinary income — about 52% in California. For me to be truly aligned with a $500M outcome, I’d need the equity to net me something in the $15–20M range. I’ve researched this from seven independent sources — they converge on 3–8% for a first COO. Carnegie Mellon’s entrepreneurship center puts the median at 5%. As the first C-suite hire building the ops function from zero with a compressed 2–4 year window, I’m targeting 5–6%.<br><br>\n        I know 3% sounds like a big number, but think about it this way: if I deliver on the margin improvement alone — 3–5 points on $120M+ revenue — that's $54–90M in additional enterprise value at a 15x multiple. You're paying 3% for someone who creates 10–18% of incremental value.<br><br>\n        What structure works best for you? I'm flexible on the mechanics — real equity, phantom, hybrid — but the after-tax outcome is what I need to get right.\"\n      </div>\n\n      <h3>Phase 4: Handle His Pushback</h3>\n      <table>\n        <tr><th>Kevin Says...</th><th>You Say...</th></tr>\n        <tr><td>\"5–8% is too much — no one else has equity\"</td><td>\"That's exactly the point — I'm the first COO, building the function from zero. Five independent sources — DigitalDefynd, Hunt Club, Founders Network, Startups.com, and Attorney Robert Adelson — all put first-COO equity at 2–8%. I'm asking for the middle: 4–5%. At 4%, your $500M exit means $20M gross to me. The operational improvements I'll deliver should add $50–90M in enterprise value. That's a 3–6x return on my equity.\"</td></tr>\n        <tr><td>\"I can do 2–3%, that's my max\"</td><td>\"I appreciate that. Let me share the tax math: 2% phantom at $500M nets me $4.7M after California taxes. That's meaningful but not life-changing for a role with this much execution risk. Can we explore a hybrid? 1% real equity + 2% phantom puts my after-tax closer to $7.8M and keeps your cap table cleaner than 3% real.\"</td></tr>\n        <tr><td>\"I want to keep the cap table clean\"</td><td>\"Completely understand. Two options: we do phantom at a higher % to offset the tax drag — about 4% phantom equals 3% real in after-tax value. Or we do a hybrid: some real, some phantom. Either way the cost to you is identical — the difference goes to the IRS, not to me.\"</td></tr>\n        <tr><td>\"What if we don't hit $500M?\"</td><td>\"Fair question. At $300M — which is your stated minimum target — 3% real equity still nets me $5.7M. I'm not pricing for the dream scenario; I'm pricing for meaningful alignment at YOUR target range. And if we exceed it, we both win more. That's the right incentive structure.\"</td></tr>\n        <tr><td>\"Let's start lower and increase based on performance\"</td><td>\"I'm open to a performance-based acceleration. How about: 2% at signing with a 1% performance kicker that vests when we hit specific milestones — say $150M revenue, or 5 points of margin improvement, or successful international launch. That way you're only paying 3% if I deliver.\"</td></tr>\n        <tr><td>\"My advisor said 1–1.5% is market\"</td><td>\"For a typical hired COO, that's right. But your JD describes something closer to a co-builder: you want someone to build the operational engine, drive margin improvement, lead international expansion, and prepare for exit. That scope is above a typical COO mandate. And the pre-exit timing means my window to benefit from equity is compressed — 2–4 years vs. a typical 10-year horizon.\"</td></tr>\n      </table>\n\n      <h3>Phase 5: Creative Structures That Get to 3%+</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">Structure A: Performance-Vested Equity (Most Likely to Close)</div>\n        <ul>\n          <li><strong>Base grant:</strong> 4% (anchored to CMU’s lower bound)</li>\n          <li><strong>Performance kicker:</strong> +2% that vests upon hitting specific milestones:\n            <ul>\n              <li>+0.75% when revenue hits $175M</li>\n              <li>+0.75% when gross margin improves by 3+ points</li>\n              <li>+0.5% when international revenue exceeds $20M</li>\n            </ul>\n          </li>\n          <li><strong>Total potential:</strong> 6.0% — Kevin only pays the extra 2% if you deliver outsized value</li>\n          <li><strong>Why Kevin likes it:</strong> He pays for performance, not promises. Aligns incentives perfectly.</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Structure B: Escalating Vest with Exit Accelerator</div>\n        <ul>\n          <li><strong>Grant:</strong> 4.5% with 3-year vest, 1-year cliff</li>\n          <li><strong>Exit accelerator:</strong> If company sells for $500M+, unvested equity accelerates to 100% (you get the full 2.5%)</li>\n          <li><strong>Additional exit bonus:</strong> 1.5% bonus equity if exit exceeds $500M</li>\n          <li><strong>Total at $500M+ exit:</strong> 6.0%</li>\n          <li><strong>Why Kevin likes it:</strong> You're heavily incentivized to drive exit value above his target. The accelerator only kicks in at his win scenario.</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Structure C: Hybrid Equity + Phantom</div>\n        <ul>\n          <li><strong>Real equity:</strong> 3.5% (keeps cap table manageable)</li>\n          <li><strong>Phantom equity:</strong> 2.5% (no dilution, off-balance-sheet)</li>\n          <li><strong>At $500M exit:</strong> 3.5% real = $11.0M net + 2.5% phantom = $5.9M net = <strong>$16.9M total</strong></li>\n          <li><strong>Why Kevin likes it:</strong> Only 3.5% cap table dilution. Phantom is off-balance-sheet.</li>\n          <li><strong>Bonus:</strong> Push for the phantom portion to include a gross-up clause for the tax differential</li>\n        </ul>\n      </div>"

            "id": "comp-protection",
            "title": "Must-Have Protections",
            "html": "<h2>Non-Negotiable Protections</h2>\n      <p>These are the terms that protect your equity from being worth $0. Do not accept an offer without these, regardless of the percentage.</p>\n\n      <div class=\"card\">\n        <div class=\"card-header\">1. Double-Trigger Acceleration (CRITICAL)</div>\n        <p><strong>What it means:</strong> If the company is acquired AND you are terminated (or role significantly changed) within 12–24 months of closing, 100% of your unvested equity vests immediately.</p>\n        <p><strong>Why it matters:</strong> Without this, an acquirer can fire you on day 1 and your unvested equity disappears. At 3% with 2 years remaining on your vest, that's $7.5M at a $500M exit — gone.</p>\n        <p><strong>What to say:</strong> \"This is standard for C-level pre-exit hires. It protects us both — it ensures I stay motivated to maximize exit value rather than worrying about my own position post-close.\"</p>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">2. Anti-Dilution Protection (or Ratchet)</div>\n        <p><strong>What it means:</strong> Your % doesn't get diluted below a floor if Kevin issues more equity to other executives or investors before exit.</p>\n        <p><strong>Why it matters:</strong> Kevin could issue another 5% to a new VP of Sales, diluting your 3% to 2.85%. Over multiple hires, this adds up.</p>\n        <p><strong>What to say:</strong> \"I'd like a provision that my equity percentage isn't diluted below [X]% through future grants. If you need to issue more equity, I'd want a proportional top-up.\"</p>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">3. Clear Definition of \"Change of Control\"</div>\n        <p>Must explicitly include: sale of >50% of assets, merger, acquisition, majority ownership change. Should NOT be limited to \"100% sale\" — partial acquisitions and PE deals should trigger your protections too.</p>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">4. Section 409A Compliance (If Phantom)</div>\n        <p>Phantom equity must be structured to comply with IRC Section 409A. Non-compliance triggers a <strong>20% excise tax penalty + interest</strong> on top of regular income tax. That could turn a 52% effective tax rate into 72%. Insist on legal review.</p>\n        <p class=\"muted\">Source: <a href=\"https://rsmus.com/insights/services/business-tax/9-frequently-asked-questions-about-phantom-stock-plans.html\" target=\"_blank\">RSM's Phantom Stock FAQ</a> and <a href=\"https://www.eisneramper.com/insights/employee-benefit-plan/section-409a-closely-held-business-1011/\" target=\"_blank\">EisnerAmper's 409A Guide</a>. Key: structure payouts as \"short-term deferrals\" (paid within 2.5 months of vesting) to qualify for the 409A exemption.</p>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">5. Written Equity Terms in Offer Letter</div>\n        <p>Percentage, type (real/phantom/hybrid), vesting schedule, acceleration triggers, payout mechanics, dilution protection — all in writing before you accept. \"We'll figure it out later\" = you have no equity.</p>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">6. Hire an Employment Lawyer</div>\n        <p>Cost: $2K–$5K. This is non-negotiable for a role with $10M+ at stake. Focus areas: 409A compliance, acceleration language, change of control definition, payout mechanics, earnout terms. Kevin will expect this for a C-level hire.</p>\n      </div>"

            "id": "comp-answer",
            "title": "How to Answer Comp Questions",
            "html": "<h2>Stage 1: The Interview Deflection (Before Any Offer)</h2>\n\n<div class=\"warning\"><strong>THE RULE:</strong> Do not name a number. Do not name a range. Do not even hint at a range. The person who names a number first anchors the negotiation — and almost always anchors it lower than they should. Your entire goal at this stage is to deflect gracefully while keeping the energy positive.</div>\n\n<h3>Why Deflection Is the Right Strategy</h3>\n\n<p>You’re in a strong negotiating position, and naming numbers now can only weaken it. Here’s why:</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">You Don’t Have Enough Information Yet</div>\n  <p>You don’t know:</p>\n  <ul>\n    <li>Whether Kevin is thinking real equity, phantom stock, profit interest units, or something else — and the tax treatment changes the math by 15–20 percentage points</li>\n    <li>What the company’s actual valuation is (you’ve estimated, but Kevin may have a different number based on recent conversations with bankers or advisors)</li>\n    <li>What the full package looks like — base, bonus structure, benefits, signing bonus, relocation support, etc.</li>\n    <li>How much Kevin wants you after the onsite — your leverage increases with every successful interview stage</li>\n  </ul>\n  <p>Giving a number now is like bidding on a house before the inspection. You need to see the full picture first.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Your Leverage Increases With Every Stage</div>\n  <p>Right now, Kevin is interviewing you. After the onsite — after he sees you build rapport with his team, walk the warehouse, and demonstrate strategic thinking — he’ll be <em>selling you</em>. That’s when you negotiate. Every interaction that goes well shifts the dynamic in your favor. Don’t negotiate from today’s leverage when tomorrow’s leverage is higher.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Kevin’s Incentive to Ask Early</div>\n  <p>Kevin is a smart founder. If he asks about comp now, it’s because he wants to either: (a) screen you out if you’re way above budget, or (b) anchor you before you have full leverage. Both of these serve his interests, not yours. The deflection serves yours while keeping him comfortable that you’re not wildly misaligned.</p>\n</div>\n\n<h3>The Deflection Scripts</h3>\n\n<p>Kevin will likely say something like: <em>\"Last time we talked, you said you’d give some more thought to numbers and ranges — where’d you land?\"</em> or <em>\"What are your thoughts on comp?\"</em></p>\n\n<p>Here are three options — choose the one that matches Kevin’s energy in the moment. All three accomplish the same thing: no number given, but you demonstrate sophisticated thinking about comp <em>structure</em> and the variables that drive it. You’re showing you’ve done your homework — just not revealing your answer sheet.</p>\n\n<div class=\"answer-block\">\n  <strong>Option A: The \"How I’m Thinking About It\" Frame (Best Default — Shows Sophistication Without Numbers)</strong><br><br>\n  \"Yeah, I’ve been thinking about it a lot, actually. But honestly, the more I think about it, the more I realize the <em>structure</em> matters way more than any headline number — and there are a few things I’d need to understand before I could even put a number in context.<br><br>\n  You mentioned last time that you’ve structured phantom stock for some directors and VPs, and you’d probably do something similar. I’ve been thinking a lot about that — specifically the difference between phantom and real equity, because the tax treatment changes the math enormously. We’re talking a 15-plus point spread between long-term capital gains and ordinary income in California. So my thinking on the percentage is going to be very different depending on which structure we’re in.<br><br>\n  And then the other big variable is: what does the exit landscape actually look like? You mentioned a two-to-four year window with a target exit. But I’d want to understand — what’s the floor? What are you hoping for? What does a home run look like? Because that’s what turns an equity percentage into an actual number for both of us.<br><br>\n  So I don’t want to throw out a number that doesn’t account for all of that. What I <em>can</em> tell you is that I’m not going to be unreasonable — I’m looking to be aligned with a big outcome, not to optimize for short-term cash. Does it make sense to have that deeper conversation once we’re both further along?\"\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">🔧 Power Move: \"I Think in Net Terms\"</div>\n  <p>You can weave this into <strong>any</strong> of the three options above. It’s a one-liner that does three things at once: forces the phantom-vs-real conversation, signals CFO-level sophistication, and positions you as someone who’s already done the math — without revealing what your actual number is.</p>\n\n  <p><strong>The line:</strong></p>\n  <p><em>\"Honestly, I evaluate any equity package in after-tax terms, not headline terms. What matters to me is what the equity actually nets after California taxes — because that’s what determines whether the alignment is real or just on paper.\"</em></p>\n\n  <p><strong>Variations you can drop naturally:</strong></p>\n  <ul>\n    <li><em>\"I care more about what the equity nets me after California taxes than the headline percentage — and those two numbers can be very different depending on the structure.\"</em></li>\n    <li><em>\"At the end of the day, I’m thinking about this in net terms. The headline percentage matters less to me than what I actually take home — and in California, the structure drives that more than the number does.\"</em></li>\n    <li><em>\"One thing I’ve learned looking at this: the spread between phantom and real equity in California is massive after taxes. So when I think about what I need from the equity piece, I’m thinking in net terms — not gross.\"</em></li>\n  </ul>\n\n  <p><strong>Why this works:</strong></p>\n  <ul>\n    <li><strong>Forces the structure conversation.</strong> Kevin can’t respond to \"I think in net terms\" without engaging on the phantom-vs-real question. You’ve made it impossible to stay in headline-percentage land.</li>\n    <li><strong>Signals you’ve done the math.</strong> Most candidates talk about percentages. You’re talking about after-tax outcomes. That’s a COO talking, not a candidate.</li>\n    <li><strong>Doesn’t reveal your number.</strong> \"I think in net terms\" is a <em>framework</em>, not a target. Kevin doesn’t know if your net target is $5M or $20M — he just knows you’re sophisticated about it.</li>\n    <li><strong>Creates an anchor without anchoring.</strong> By saying \"net terms,\" you’ve implicitly said \"your phantom offer will need to be higher than you think\" — without naming how much higher.</li>\n  </ul>\n\n  <p><strong>⚠️ What NOT to say:</strong> Don’t share your actual net target number (e.g., \"I need to net $15M\"). That’s reverse-engineerable into a percentage at any given valuation, which is the same as naming a number. The power is in the <em>framework</em> — \"I think in net terms\" — not the specific figure.</p>\n</div>\n\n<div class=\"answer-block\">\n  <strong>Option B: The \"Variables That Drive My Thinking\" Frame (Use If Kevin Pushes For More Specificity)</strong><br><br>\n  \"I hear you, and I want to be transparent about how I’m approaching this. I’ve done a ton of research — but the research keeps pointing me back to the same thing: the number is downstream of the structure.<br><br>\n  For example — if we’re talking phantom stock, the all-in tax rate in California is north of 52%. If we’re talking real equity with LTCG treatment, it’s closer to 37%. That’s a 15-point gap that makes a massive difference at any exit valuation. So the same percentage means very different things depending on which bucket we’re in.<br><br>\n  And then there are things about the <em>role itself</em> that I think should influence where in the range we land. This isn’t a maintenance hire — you’re not bringing me in to keep the trains running. You’re asking me to build the operational engine from scratch, drive margin improvement, stand up international, and prepare the company for an exit. I’d be the first C-suite hire, and I’d be functioning as a player-coach — not just managing but building. That scope is different from a typical COO slot, and I think the equity should reflect that.<br><br>\n  So rather than give you a number right now, I’d rather understand a few things first: how you’re thinking about equity structure, what valuation range you’re modeling for an exit, and whether there’s flexibility on the phantom-versus-real question. With that context, I could give you something really specific. Without it, I’d just be guessing.\"\n</div>\n\n<div class=\"answer-block\">\n  <strong>Option C: The \"Return the Question With Context\" Frame (Use If Kevin Is Very Direct)</strong><br><br>\n  \"I’d actually love to hear how your thinking has evolved since our first conversation. You mentioned phantom stock aligned to an exit — I’m curious whether you’ve gotten more specific on the valuation side. Like, what does a good outcome look like in your mind versus a great one?<br><br>\n  Because for me, that’s the whole equation. The equity percentage only means something in the context of: what’s the exit target, what’s the structure, and what’s the timeline. I’ve been thinking about all of those variables, and I have a clear picture of what I’d need the package to look like — but I want to make sure my thinking is grounded in <em>your</em> numbers, not just my research.<br><br>\n  What I will say is that I see this as a career-defining role. I’m not looking at this as a lateral move or a safe landing. You’re building something that could be worth a lot — and I want to be compensated in a way that means I’m all-in on making that happen. So my bias is heavily toward equity and alignment with the exit, not cash.\"\n</div>\n\n<h3>Handling Follow-Up Pressure</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">If Kevin Says: \"Just Give Me a Ballpark\"</div>\n  <p><strong>Don’t give a number.</strong> Instead, redirect to the variables:</p>\n  <p><em>\"I hear you. Here’s the honest answer: I can’t give you a meaningful ballpark because the equity structure changes the math too much. If we’re talking phantom stock — which is what you mentioned last time — that’s taxed as ordinary income, over 52% in California. If we’re talking actual equity with capital gains treatment, it’s 37%. Same percentage, wildly different outcomes. And then the valuation question — what you’d sell the company for, what a strong exit looks like versus a home run — that’s what turns a percentage into a real number. So rather than give you a meaningless ballpark, can I ask a couple of those structural questions? That’ll tell me more than any number I could throw out right now.\"</em></p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">If Kevin Says: \"I Need to Know We’re in the Same Ballpark Before the Onsite\"</div>\n  <p>This is the strongest push — he’s gatekeeping. Acknowledge the concern, signal alignment, but stay on structure:</p>\n  <p><em>\"Totally fair — I don’t want either of us to waste time. Here’s what I can tell you: I’ve done my research on what first COOs earn at companies at your stage and scale, and my expectations are in line with market. I’m not going to come back with something wildly out of bounds. Where I want to spend time is on the structure — because whether the equity is phantom or real, what the vesting looks like, and what exit scenario we’re both building toward changes the total comp picture more than the base salary does. If that gives you enough comfort to keep going, I’d love to get to the onsite.\"</em></p>\n  <p><strong>Why this works:</strong> You’ve confirmed you’re in the zone without revealing your number. And you’ve planted the seeds for the phantom-vs-real and valuation conversations you’ll need to have later.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">If Kevin Volunteers His Range First</div>\n  <p>This is the ideal outcome. If Kevin says something like \"We’re thinking $X base plus phantom equity,\" your response is:</p>\n  <p><em>\"Thanks for sharing that — I appreciate the transparency. I think there’s definitely a conversation to be had there. The piece I’d want to dig into is the equity structure. You mentioned phantom stock last time — I’ve been doing a lot of thinking about phantom versus real equity, and the tax math is pretty significant. I’d also want to understand what valuation you’re using for the phantom, and what exit range you’re modeling. Because that context changes how I think about the percentage entirely. Can we get into that when the time is right?\"</em></p>\n  <p><strong>What you’ve done:</strong> Acknowledged his number without accepting or rejecting it. Signaled that the equity conversation will be substantive. And planted the phantom-vs-real question early so it doesn’t blindside him later.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">If Kevin Asks: \"What Questions Do You Have About the Structure?\"</div>\n  <p>This is a great outcome — he’s opened the door. Here are the questions to ask (these advance your negotiation without revealing your target):</p>\n  <ul>\n    <li><em>\"Is the phantom stock program you mentioned valued at current company valuation, or is there a strike price / discount?\"</em></li>\n    <li><em>\"When you think about an exit — what’s the floor you’d walk away from? What are you hoping for? What would a home run look like?\"</em></li>\n    <li><em>\"Have you thought about whether real equity might make sense for this role, given the tax implications? I’ve been looking at the math and the difference is pretty material.\"</em></li>\n    <li><em>\"Is there flexibility on the equity type, or is phantom the only structure you’d consider?\"</em></li>\n    <li><em>\"How are the existing phantom grants structured — change of control trigger only, or is there time-based vesting too?\"</em></li>\n  </ul>\n  <p><strong>Why these questions matter:</strong> Each one gives you critical negotiation intel (valuation expectations, flexibility on structure, exit range) while signaling that you’re thinking about this at a level of sophistication that most candidates don’t. You’re having a CFO-level conversation about comp structure — which is exactly what a COO should do.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">What NOT to Do</div>\n  <ul>\n    <li><strong>Don’t say \"I’m flexible\"</strong> — this signals you’ll take whatever they offer.</li>\n    <li><strong>Don’t say \"I haven’t thought about it too much\" again</strong> — you said this last time. Saying it again signals you’re still not treating this seriously. Replace with \"I’ve been thinking about it a lot, actually — specifically the structure.\"</li>\n    <li><strong>Don’t cite your market data yet</strong> — save your Carnegie Mellon study, your seven sources, your SEC proxy comps for the actual negotiation. Showing your hand now reduces its impact later.</li>\n    <li><strong>Don’t say a range</strong> — ranges are just numbers with extra steps. If you say \"$300K–$400K,\" Kevin hears \"$300K.\"</li>\n    <li><strong>Don’t promise to \"come back with numbers\" again</strong> — you already said this once. This time, redirect: you’ll give specific numbers once you understand the structure.</li>\n    <li><strong>Don’t apologize for not giving a number</strong> — this is a normal and expected move at the executive level. Kevin has done this himself in business negotiations.</li>\n  </ul>\n</div>\n\n<div class=\"tip\"><strong>The meta-signal you’re sending:</strong> By deflecting gracefully, you’re actually demonstrating a COO skill — disciplined negotiation. Kevin is looking for someone who can negotiate vendor contracts, partner deals, and staffing terms on behalf of the company. How you handle your own comp negotiation is an audition for that. A COO who gives up leverage easily in their own negotiation will do the same with Costco’s buyer or a 3PL contract.</div>\n\n<h3>What You Said Last Time (Verbatim From Feb 25 Meeting)</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">The Exact Exchange</div>\n  <p><strong>Kevin:</strong> <em>\"And then just as far as, you know, your timeline on things and kind of also just like, in terms of offer conversations, like what you’re looking for, just to make sure, like, we’re in the same range type of thing, you know, so. Do you have any context there on kind of what you’re thinking?\"</em></p>\n  <p><strong>You:</strong> <em>\"Timing was the first part of that question... ASAP from a timing perspective. Comp — honestly, I haven’t thought about it too much. You know, I would have some expectation of, you know, equity, obviously, and some upside potential there in the next few years.\"</em></p>\n  <p><strong>You:</strong> <em>\"Yeah, beyond that, I don’t know that I want to put a number out there right now. But I’m sure it’s — I’m sure I’m in the general ballpark of what you’re considering.\"</em></p>\n  <p><strong>You (returning the question):</strong> <em>\"And then you’re comfortable sharing in terms of range or how you’re even thinking about it, just like structurally.\"</em></p>\n  <p><strong>Kevin:</strong> <em>\"Yeah, I mean range would be like market rate. So you know something that’s fair. I would definitely want upside. So I mentioned to you the goal is some kind of exit in the two to four year time frame. So typically there’s a two year earn out probably. So stick around for that at least... And then how we’ve structured is we’ve aligned [incentives] to that exit. So we have phantom [stock] program with a couple directors or VPs. And so I would probably structure that similarly where we’re incentivized to get that exit. And then get the payout.\"</em></p>\n  <p><strong>You:</strong> <em>\"Cool. Yeah, I think that makes sense. I can give some more thought to some actual numbers and ranges there in the meantime, if we do talk again. But, yeah, assuming cash comp is market rate, then, you know, that’s kind of what I’m looking for as well.\"</em></p>\n  <p><strong>Kevin:</strong> <em>\"And typically, we’ll structure cash comp and then we’ll do some kind of performance incentive on top. So that’s our standard structure.\"</em></p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">What You Did Right</div>\n  <ul>\n    <li><strong>Didn’t name a number</strong> — \"I don’t know that I want to put a number out there right now\" was the right instinct.</li>\n    <li><strong>Returned the question</strong> — \"You comfortable sharing... how you’re even thinking about it, just like structurally\" got Kevin to reveal phantom stock + exit timeline first.</li>\n    <li><strong>Signaled equity expectations</strong> — \"some expectation of equity, obviously, and some upside potential\" set the frame without a number.</li>\n  </ul>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">What to Tighten This Time</div>\n  <ul>\n    <li><strong>\"I haven’t thought about it too much\"</strong> — This was fine for a first call. But if you say it again, it signals you’re still not thinking strategically about it. Replace with the \"how I’m thinking about it\" framing below — shows you <em>have</em> thought about it, but in terms of structure and variables, not numbers.</li>\n    <li><strong>\"I can give some more thought to some actual numbers and ranges\"</strong> — You essentially promised to come back with numbers. The scripts below give you a way to fulfill that promise by talking about the <em>variables that drive the number</em> without naming the number itself.</li>\n    <li><strong>Kevin already told you it’s phantom stock</strong> — This is a huge piece of intel. You now know the structure he defaults to. The scripts below use this to steer the conversation toward the equity-structure questions you actually need answered.</li>\n  </ul>\n</div>"

            "id": "comp-negotiate",
            "title": "Scripts for the Offer-Stage Negotiation",
            "html": "<h2>Stage 2: When You Actually Negotiate (Post-Offer)</h2>\n\n<p>These scripts are for after the onsite, when Kevin (or his recruiter) presents a formal or informal offer and you shift into actual negotiation. <strong>Do not use these during the interview stage.</strong></p>\n\n      <h3>\"What are you looking for in terms of compensation?\"</h3>\n      <div class=\"answer-block\">\n        <strong>At the offer stage (after onsite, when Kevin is ready to talk numbers):</strong><br>\n        \"I’ve done market research on COO compensation at $90–120M DTC companies in Southern California. I’m in the range of $350K–$400K base with a 40–50% performance bonus. On equity, I’d want to understand your structure first — whether you’re thinking real equity, phantom stock, or something else — because the tax treatment significantly affects how I think about percentages. What I care most about is that the equity is structured so I’m genuinely aligned with a big exit outcome. Can you share how you’re thinking about it?\"\n      </div>\n\n      <div class=\"answer-block\">\n        <strong>When Kevin names 1–2% phantom:</strong><br>\n        \"I appreciate you sharing that. Let me be transparent about my thinking. I’ve modeled this out: at your target exit range of $500M+, 2% phantom nets me about $4.7M after California taxes — because phantom is taxed as ordinary income at roughly 53%. That’s meaningful, but for a role where I’m building the operational engine from scratch and directly driving exit value, I’d want my equity to net me in the $10–15M range at your target outcome.<br><br>\n        Seven independent sources put first-COO equity at 3–8%. Carnegie Mellon’s Swartz Center puts the median at 5%. I’m asking for 5–6%, which is the middle-to-upper half of the sourced range. I know that’s above your initial number. But here’s the value exchange: the margin improvement alone in your scorecard — 3–5 points on $120M — creates $54–90M in enterprise value at a 15x multiple. You’d be paying 3% for someone who delivers 10–18% of incremental value. What if we explored a structure where part of it is performance-vested so you’re only paying the premium if I deliver?\"\n      </div>\n\n      <div class=\"answer-block\">\n        <strong>If Kevin says \"let me think about it\":</strong><br>\n        \"Absolutely. I’d suggest we both take a few days. I can send you a one-pager showing the math — the tax treatment comparison, the value-creation math, and a few structural options that might work. I want us both to feel great about this.\"\n      </div>\n\n      <h3>\"Why should I give you more than 1–2%?\"</h3>\n      <div class=\"answer-block\">\n        <strong>The value-creation argument:</strong><br>\n        \"Three reasons. First, the JD scorecard: 3–5 points of gross margin improvement at your revenue = $54–90M in enterprise value at exit. My equity ask is 3% — I’m creating 3–6x what I cost in equity alone. Second, I’m not a maintenance hire — I’m building the ops function from scratch, which is closer to a founding role than a hired-gun role. Founding COOs get 3–8%. Third, timing: I have a compressed 2–4 year window before exit. A typical COO has a 7–10 year horizon to benefit from equity. My per-year equity value needs to be higher to compensate for the shorter runway.\"\n      </div>\n\n      <div class=\"tip\"><strong>Tone check:</strong> Never frame this as adversarial. You’re both trying to solve the same problem: how to structure comp so you’re fully motivated to maximize exit value. Kevin wins when you win. Keep it collaborative.</div>"
          },
          {
            "id": "comp-summary",
            "title": "Comp Cheat Sheet",
            "html": "<h2>Compensation Cheat Sheet</h2>\n\n      <table>\n        <tr><th>Component</th><th>Your Target</th><th>Kevin's Likely Offer</th><th>Negotiation Strategy</th></tr>\n        <tr><td><strong>Base</strong></td><td>$350K–$400K</td><td>$300K–$350K</td><td>Hold firm on $350K minimum. Don't trade base for equity.</td></tr>\n        <tr><td><strong>Bonus</strong></td><td>45% of base (~$158K)</td><td>30–40%</td><td>Tie to specific KPIs from JD scorecard. Push for 45%.</td></tr>\n        <tr><td><strong>Equity</strong></td><td>5–6% real (anchor at 8%)</td><td>1–2% phantom</td><td>Cite 7 sources showing 3–8% range; CMU median = 5%; use performance-vested structure</td></tr>\n        <tr><td><strong>Equity type</strong></td><td>Real equity preferred</td><td>Phantom likely</td><td>\"Same cost to you, ~33% more value to me — real equity is better for both of us\"</td></tr>\n        <tr><td><strong>Vesting</strong></td><td>3-year with 1-year cliff</td><td>4-year with 1-year cliff</td><td>Shorter vest reflects compressed pre-exit timeline</td></tr>\n        <tr class=\"highlight-row\"><td><strong>Total Cash OTE</strong></td><td><strong>~$508K</strong></td><td><strong>~$400K</strong></td><td></td></tr>\n        <tr class=\"highlight-row\"><td><strong>Exit Payout (net, $500M)</strong></td><td><strong>$15.7–18.9M</strong></td><td><strong>$3.2–4.7M</strong></td><td></td></tr>\n      </table>\n\n      <h3>Walk-Away Checklist</h3>\n      <ul>\n        <li>Base below $300K → walk away (you're subsidizing the company)</li>\n        <li>Equity below 4% with no performance kicker → push back hard</li>\n        <li>No double-trigger acceleration → walk away (your equity is unprotected)</li>\n        <li>No written equity terms → do not accept</li>\n        <li>Phantom equity with no 409A compliance → walk away (tax time bomb)</li>\n      </ul>\n\n      <h3>Best-Case Deal Structure</h3>\n      <div class=\"answer-block\">\n        <strong>Your ideal package:</strong><br>\n        $375K base + 45% bonus ($169K) + 4% real equity at signing + 2% performance-vested equity (tied to revenue/margin milestones) + double-trigger acceleration + 3-year vest + anti-dilution floor. Total: 6% — right at the CMU median with a performance premium for exceeding targets.<br><br>\n        <strong>Cash OTE:</strong> $544K/year<br>\n        <strong>Exit at $500M (6% real, fully vested):</strong> $30M gross → <strong>$18.9M net</strong> ✓<br>\n        <strong>Exit at $300M (6% real, fully vested):</strong> $18M gross → <strong>$11.3M net</strong><br>\n        <strong>Exit at $700M (6% real, fully vested):</strong> $42M gross → <strong>$26.4M net</strong>\n      </div>"

            "html": "<p>Everything below is organized around what Kevin has told us he cares about — so every story you tell in the interview lands on a pain point he's already feeling.</p>\n\n<div class=\"tip\"><strong>The elephant in the room:</strong> You ran a $20M business, not a $100M one. Own it — don't hide from it. The framing is: \"I built and scaled a DTC brand from zero to $20M as co-founder/COO, sold it, and then spent years as a fractional operator inside larger businesses up to $100M+. I've seen both sides — the founder's perspective AND the systems that break at scale. That combination is rare.\" Kevin himself built iRESTORE from zero. He'll respect the founder journey more than a polished resume from a $500M company.</div>"

            "html": "<div class=\"card\">\n  <div class=\"card-header\">Baboon to the Moon — Co-Founder / COO</div>\n  <table>\n    <tr><th>Detail</th><th>Info</th></tr>\n    <tr><td><strong>Role</strong></td><td>Co-Founder & COO (3 co-founders: Andy Persson = CEO, Michael Kushner = CMO, Trey = COO)</td></tr>\n    <tr><td><strong>Revenue</strong></td><td>Built from $0 → ~$20M/yr</td></tr>\n    <tr><td><strong>Outcome</strong></td><td>Sold the business (hit profitability in final year but debt load necessitated exit)</td></tr>\n    <tr><td><strong>Team</strong></td><td>Max 8–10 employees + contractors (sourcing partner in HK, product designer in SF)</td></tr>\n    <tr><td><strong>What you owned</strong></td><td>Operations, product development, supply chain, logistics, e-commerce, digital marketing, tech stack, customer service, 3PL management. Overlapped with CEO on finance, models, forecasting, and investor relations.</td></tr>\n    <tr><td><strong>Product complexity</strong></td><td>100+ SKUs. Frequent drops (color drops, limited editions, collabs). Color matching across products, trims, zippers. Custom graphic interior prints for bag liners.</td></tr>\n    <tr><td><strong>Category</strong></td><td>DTC consumer products (bags/accessories)</td></tr>\n  </table>\n</div>\n\n<div class=\"answer-block\"><strong>60-second pitch for Kevin:</strong> \"I co-founded a DTC consumer brand, built the entire operational backbone from scratch — supply chain, product development, e-commerce, fulfillment, customer service — and scaled it to $20M before we sold. I did 20–30 trips to Asia over 5 years building our vendor network. I personally handled every customer service ticket for the first 3 years. And I managed all of this with a team of 8–10 people. So I know what it means to build lean, move fast, and wear every hat — and I also know what it's like to be a founder who needs to hand off the operational burden to focus on what matters most.\"</div>"
