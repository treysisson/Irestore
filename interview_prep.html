            "id": "trey-supply-chain",
            "title": "Supply Chain & Manufacturing (Direct iRESTORE Parallel)",
            "html": "<p>This is your strongest direct parallel to iRESTORE. Kevin manufactures in Shenzhen through his father's factory. You built an entire nominated vendor supply chain across Asia.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">What You Built</div>\n  <ul>\n    <li><strong>Nominated vendor model:</strong> Instead of relying on a single end-manufacturer, you sourced and managed individual suppliers — fabric, zippers, trims — giving you control over quality and cost at every tier. This is a more sophisticated supply chain than most DTC brands ever build.</li>\n    <li><strong>Asia relationships:</strong> 20–30 trips over 4–5 years. Deep time in Hong Kong, Vietnam, Taiwan, and China. You know what it means to build trust with Asian manufacturing partners — the dinners, the factory visits, the relationship-first culture.</li>\n    <li><strong>Multiple factories:</strong> Managed several factories over the years, navigating vendor transitions, quality control, and production scheduling across different partners.</li>\n    <li><strong>Payment terms negotiation:</strong> Negotiated terms from standard to <strong>net-200 days</strong> — even more aggressive than iRESTORE's net-150 terms with Kevin's father's factory. This shows financial sophistication and vendor relationship strength.</li>\n    <li><strong>Complex product development:</strong> 100+ SKUs with color-matched components across products, trims, and zippers. Custom graphic interior prints. 9–12 month development cycles. Multiple drops per year.</li>\n  </ul>\n</div>\n\n<div class=\"tip\"><strong>How to connect this to iRESTORE:</strong> \"Your supply chain runs through Shenzhen with your father's factory plus two others. I built a multi-vendor nominated supply chain across four Asian countries over five years. I've negotiated payment terms to net-200 — I understand the cash conversion cycle advantage you have, and I'd protect and extend it. The difference is I've also managed the complexity of onboarding new factories and transitioning production — which you'll need as you add body panels and new device categories.\"</div>"
          },
          {
            "id": "trey-demand",
            "title": "Demand Planning & Fulfillment (The Anti-Brandon Story)",
            "html": "<p>Kevin's biggest frustration with Brandon was the Q4 Costco crisis — nobody planned for the spike. Your experience is the direct counter-example.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">How You Prevented the Crisis Kevin Described</div>\n  <ul>\n    <li><strong>3PL management:</strong> Single East Coast 3PL for the entirety of the business. Managed the relationship end-to-end including SOPs, workflows, return logistics (Loop platform), and tech integrations.</li>\n    <li><strong>Spike communication:</strong> Proactively communicated demand forecasts to 3PL ahead of limited-run drops and Q4/Black Friday surges. The 3PL was <em>always</em> able to handle spikes within their labor force — <strong>specifically because you communicated so effectively about what those spikes would be.</strong></li>\n    <li><strong>Factory-side demand planning:</strong> With 9–12 month development cycles and 3–4 months from PO to warehouse, you had to plan far ahead. Developed strategy for quantities by style type (limited run vs. core), colorway demand patterns, and seasonal timing.</li>\n    <li><strong>Dual-coast / Mexico exploration:</strong> Evaluated West Coast 3PL for dual-node fulfillment and explored a Mexico-based 3PL for Section 321 duty savings — showing you think about fulfillment strategically, not just operationally.</li>\n    <li><strong>Freight management:</strong> Managed international freight through Flexport.</li>\n  </ul>\n</div>\n\n<div class=\"answer-block\"><strong>How to tell this story to Kevin:</strong> \"When you told me about the Q4 Costco crisis, that resonated — because I've been on the other side of that. At B2TM, we did frequent limited-run drops that could spike demand significantly. We never had a fulfillment crisis because I built the forecasting communication into our standard cadence with our 3PL. They always had adequate labor because they always knew what was coming. That's not a flex — it's a process. And it's exactly what I'd build for iRESTORE: a demand planning rhythm where your warehouse team, your 3PL, and your channel partners are never surprised.\"</div>"
          },
          {
            "id": "trey-ecomm",
            "title": "E-Commerce & Tech Stack (Kevin Needs This)",
            "html": "<p>Kevin's company runs on Shopify + Amazon + Fulfil.io ERP. You built and managed an entire DTC tech stack.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">What You Owned</div>\n  <ul>\n    <li><strong>Full tech stack ownership:</strong> Built the entire e-commerce infrastructure — managed developers, web designers, apps, plugins, inventory management platform, ERP, analytics tools.</li>\n    <li><strong>Custom headless platform:</strong> Built a sophisticated custom CMS on Sanity that enabled massive color drops (10–15 new SKUs at a time) to deploy seamlessly across the website. This is real engineering leadership, not just \"I used Shopify.\"</li>\n    <li><strong>CRO program:</strong> Managed conversion rate optimization — landing page testing, PDP design updates, product launch workflows. You understand the operational side of optimizing a DTC funnel.</li>\n    <li><strong>Digital marketing & retention:</strong> Managed email marketing, retention programs, and the operational workflow for new product releases.</li>\n  </ul>\n</div>\n\n<div class=\"tip\"><strong>Why this matters for iRESTORE:</strong> Kevin's team runs on Shopify + Fulfil.io + Amazon Seller Central + Klaviyo (likely). You've not only used these tools — you've architected tech stacks from scratch. When iRESTORE needs to evaluate whether Fulfil.io scales to $200M, or whether they need a more robust BI layer, you can lead that conversation.</div>"
          },
          {
            "id": "trey-player-coach",
            "title": "Player-Coach / Doing the Work (Kevin's #1 Cultural Value)",
            "html": "<p>Kevin has said he's \"always afraid of adding too many layers\" between him and the team, and acknowledged that wrong hires have cost him \"so much time and money.\" Your B2TM story is the perfect antidote.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">You Literally Did Everything</div>\n  <ul>\n    <li><strong>Customer service for 3+ years:</strong> You personally responded to every CX ticket from launch through $10M+ in revenue. Kevin handled CS himself too in the early days — he'll recognize this immediately.</li>\n    <li><strong>8–10 person team:</strong> You ran supply chain, product development, e-commerce, digital marketing, tech, CRO, customer service, 3PL management, AND helped with finance — with a team of 8–10 people. That's not delegation, that's doing the work.</li>\n    <li><strong>No bureaucracy:</strong> Small team, fast decisions, hands-on execution. This is exactly the culture Kevin has built and wants to protect.</li>\n    <li><strong>But you've also managed large teams:</strong> Earlier in your career as a Product Manager, you led cross-functional teams of 50–70 people — developers, designers, QA, other PMs, and technical writers. So you know how to operate at both ends of the spectrum: the scrappy 8-person startup AND the structured 50+ person org. You choose the player-coach mode because it works, not because it's all you know.</li>\n  </ul>\n</div>\n\n<div class=\"answer-block\"><strong>Key line for Kevin:</strong> \"I answered every customer service email myself for the first three years of the business, even past $10 million in revenue. I'm not someone who comes in and adds layers. I come in, roll up my sleeves, understand the work from the ground level, and then build systems around it. That's the difference between a COO who manages from a dashboard and one who actually knows what's happening on the floor. And for what it's worth — earlier in my career I managed cross-functional teams of 50 to 70 people as a product manager. I've done big teams. I just know that right now, what iRESTORE needs is a builder, not a bureaucrat.\"</div>"
          },
          {
            "id": "trey-founder",
            "title": "Founder Empathy (Your Unique Advantage)",
            "html": "<p>Kevin said he wants \"a partner, not a subordinate\" and \"someone who can mentor me.\" Being a former founder is a massive differentiator — you understand what Kevin is going through in a way that a career operator never could.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">What You Bring That Career Operators Can't</div>\n  <ul>\n    <li><strong>You've been the CEO:</strong> You know what it feels like to be the bottleneck, to have too many ideas, to struggle with delegation. You've lived Kevin's pain points from the inside.</li>\n    <li><strong>Exit experience:</strong> You've been through a sale. You understand what acquirers look for, what needs to be clean, and the emotional toll of the process. Kevin's on a 2–4 year exit timeline — you can help him navigate it because you've done it.</li>\n    <li><strong>Investor relations:</strong> You helped build models, forecasting, and presented to investors at quarterly board meetings. Kevin has a fractional CFO but may not have someone who can translate operations into investor-grade narratives.</li>\n    <li><strong>The hiring/firing learning curve:</strong> You made the same mistakes Kevin describes — waiting too long to fire, hiring the wrong people. Kevin said \"hire slow, fire fast\" is his biggest lesson. You can say \"I learned the same thing, the hard way, and here's how I approach it differently now.\"</li>\n  </ul>\n</div>\n\n<div class=\"answer-block\"><strong>How to frame it:</strong> \"I've been a founder. I know what it's like to be the person holding everything together, having too many ideas, and needing someone who can take the operational weight so you can focus on what you're best at. I'm not coming in as a hired gun who's going to add process for process's sake. I'm coming in as someone who understands what you're building because I've built one too — and I know where the cracks form at this stage of growth.\"</div>"
          },
          {
            "id": "trey-hard-call",
            "title": "The Hard People Call (Kevin Values This)",
            "html": "<p>Kevin said he wants someone \"effective over being liked.\" He exited many directors in the past 6–8 months and learned to \"hire slow, fire fast\" the hard way. He needs to know you can make the tough calls. Here's your story:</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">Firing the Head of Growth at B2TM</div>\n  <p><strong>The situation:</strong> Your Head of Growth was one of your first employees (second hire ever). She was reliable and could execute what she was told — but she wasn't a strategic thinker. You had to always ask the right questions, lead her to conclusions, and drive the strategy yourself. Sound familiar? <em>This is almost word-for-word how Kevin describes Brandon.</em></p>\n  <p><strong>Why it was hard:</strong> She was your second employee. There was deep emotional attachment — you'd built the early days together. You waited too long to act (a mistake you've since learned from).</p>\n  <p><strong>The conversation:</strong> It was brutal. She cried, had a terrible reaction. You remained steady through it. The moment it was over, the improvement was immediate.</p>\n  <p><strong>What happened after:</strong> You stepped in and personally ran digital marketing in the interim — managed agency relationships, led the function yourself. Then hired someone far more analytical and strategic who elevated the whole team.</p>\n  <p><strong>The lesson:</strong> The emotional cost of firing someone you care about is real, but the cost of <em>not</em> firing them is paid by the entire business, every single day.</p>\n</div>\n\n<div class=\"answer-block\"><strong>How to tell this story to Kevin:</strong> \"I had a Head of Growth who was one of our earliest employees. Great executor — if I told her exactly what to do, she'd do it well. But she wasn't a strategic thinker. I had to drive every decision, ask every question. I waited too long to make the call because of the emotional attachment. When I finally did, it was one of the hardest conversations I've ever had. But within weeks, the business was better for it. I stepped in myself, then hired someone who was the right fit — more analytical, more strategic. That experience taught me what Kevin already knows: being effective matters more than being liked. And sometimes the kindest thing you can do for someone is to let them find a role where they'll actually succeed.\"</div>\n\n<div class=\"tip\"><strong>Why this story is powerful:</strong> It directly mirrors Kevin's Brandon situation. Kevin is thinking about what to do with Brandon — good executor, loyal, but not strategic. Your story shows you've faced exactly this dynamic, made the hard call, and came out better. And the fact that you stepped in and ran the function yourself proves the player-coach mentality. Don't volunteer advice about Brandon unprompted — but if Kevin asks, you have lived experience to draw on.</div>"
          },
          {
            "id": "trey-scale-gap",
            "title": "The Scale Gap: How to Address It",
            "html": "<p>You've managed $20M directly and advised up to $75–100M as a fractional. Kevin's at $100M+ growing 65–80%. Here's how to handle this honestly.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">The Honest Framing</div>\n  <p><strong>Don't hide from it. Own it and reframe it.</strong></p>\n  <ul>\n    <li><strong>What to say:</strong> \"I want to be upfront — I scaled B2TM to $20M as a founder/COO, and I've worked as a fractional inside larger businesses up to $100M+. I haven't personally managed a $100M P&L. But here's what I do bring: I've built the systems from zero, I've been through an exit, and I've seen what breaks at scale through my consulting work. I think the combination of founder instinct plus operational rigor is what this role actually needs.\"</li>\n    <li><strong>Why it works:</strong> Kevin himself built iRESTORE from zero. He didn't hire someone who'd already run a $100M company — he's interviewing you because he values the journey. He wants someone who \"gets it\" as a founder, not someone with a perfect resume.</li>\n    <li><strong>The reframe:</strong> iRESTORE's operations are probably running like a $20–30M company despite having $100M+ in revenue. Kevin admitted EOS is at 60%, there's no formal demand planning, no channel-level P&L, and one person (Brandon) running ops with limited strategic capacity. The systems gap is your sweet spot — you've built these systems before, and you know what the next stage looks like from your consulting work.</li>\n    <li><strong>Team size isn't a gap either:</strong> Earlier in your career as a Product Manager, you managed cross-functional teams of 50–70 people (developers, designers, QA, PMs, technical writers). So the \"can he manage a bigger org?\" question has a clear answer: yes, you've done it. You just chose the founder path afterward.</li>\n  </ul>\n</div>\n\n<div class=\"tip\"><strong>Critical point:</strong> Kevin has said he's \"always afraid of adding too many layers\" and values the player-coach mentality above all else. Your scale gap might actually be a selling point — you're not going to come in with $500M company playbooks that don't fit. You'll build systems right-sized for where iRESTORE actually is.</div>"
          },
          {
            "id": "trey-consulting",
            "title": "Consulting Experience (To Be Added)",
            "html": "<p>Your consulting work is what bridges the gap between \"$20M founder\" and \"$100M+ operator.\" Here's how each engagement maps to Kevin's needs.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">Easy Street Brands (Zach Stuck) — Holding Company, ~$20M+ (Hollow Socks) + portfolio</div>\n  <table>\n    <tr><th>Detail</th><th>Info</th></tr>\n    <tr><td><strong>Who</strong></td><td>Zach Stuck's holding company, Easy Street Brands. Primary brand: Hollow Socks (~$20M when Trey was there, now $40–50M). Also had a supplement brand just launching that has since grown to $100M+.</td></tr>\n    <tr><td><strong>Duration</strong></td><td>~6–8 months, fractional ops & finance</td></tr>\n    <tr><td><strong>The situation</strong></td><td>Zach is a marketer by trade (sound familiar?) with junior ops and finance people. Needed someone to build operational infrastructure across the holding company.</td></tr>\n    <tr><td><strong>What you built</strong></td><td>Daily dashboards, cash flow models, scenario planning, S&OP for inventory planning, operational cadence (reporting rhythm, meeting agendas, Notion-based documentation system)</td></tr>\n    <tr><td><strong>Supply chain</strong></td><td>Sourced alpaca fiber from Peru — negotiated vendor rates down, saving margin points. Managed 2–3 US-based sock manufacturers — handled forecasting, planning, and pricing negotiations. Saved at least a couple of points of margin.</td></tr>\n    <tr><td><strong>Infrastructure for the supplement brand</strong></td><td>Helped build initial infrastructure (cash flow management, operational tools) for the supplement brand that has since grown to $100M+. While you weren't deeply involved in that brand's growth, you helped lay the operational foundation early.</td></tr>\n    <tr><td><strong>Thought partner role</strong></td><td>Beyond the tactical work, a huge part of the value was being a strategic sparring partner for Zach — a fellow founder-operator he could think out loud with about people decisions, strategy, big swings. This is the \"partner, not subordinate\" dynamic Kevin is looking for.</td></tr>\n  </table>\n</div>\n\n<div class=\"tip\"><strong>Why this matters for the interview:</strong> This engagement is almost a 1:1 preview of the iRESTORE COO role. Marketer-founder who needs operational infrastructure? Check. Junior ops team that needs systems? Check. Multi-brand complexity? Check. Building dashboards, S&OP, and meeting cadences from scratch? Exactly what Kevin needs. And <strong>Kevin would know Zach Stuck</strong> — this is a name-drop that carries weight in the DTC world. The thought partner dynamic is the cherry on top — it proves you can be the \"partner and mentor\" Kevin explicitly asked for.</div>\n\n<div class=\"answer-block\"><strong>How to frame it:</strong> \"One of my consulting clients was Zach Stuck at Easy Street Brands — you may know him. Similar situation to yours: brilliant marketer, scaling fast, but the ops and finance infrastructure hadn't kept up with growth. I came in and built the operational backbone — daily dashboards, cash flow models, an S&OP process for inventory, and a meeting cadence with documented agendas. I also worked directly with their supply chain, negotiating vendor rates in Peru and managing their US manufacturers. But honestly, a big part of the value was just being a peer — a fellow founder he could talk strategy with, think through people decisions, debate big swings. When I started, there was no system. When I left, the team had a rhythm that ran itself. That's exactly what I'd build for iRESTORE.\"</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Stay Golden (Aliya & Rony) — DTC Jewelry, $2M → $4M + EOS Implementation</div>\n  <table>\n    <tr><th>Detail</th><th>Info</th></tr>\n    <tr><td><strong>Who</strong></td><td>Stay Golden — DTC jewelry brand. Founded by Aliya (went viral on TikTok, no prior business experience). Rony = fractional CMO turned co-founder.</td></tr>\n    <tr><td><strong>Duration</strong></td><td>~15–16 months</td></tr>\n    <tr><td><strong>Revenue</strong></td><td>$2M → $4M (doubled during engagement)</td></tr>\n    <tr><td><strong>The situation</strong></td><td>Brought in by Rony (the fractional CMO) for operational help. Both Aliya and Rony were entrepreneurial but inexperienced — neither had held a traditional job. Needed a mentor-advisor to help professionalize the business.</td></tr>\n    <tr><td><strong>Biggest value add</strong></td><td><strong>Brokered the co-founder partnership.</strong> Encouraged Aliya and Rony to become co-founders. Helped structure the equity split, figured out the investment terms, and persuaded both sides. They remain co-founders to this day.</td></tr>\n    <tr><td><strong>EOS implementation</strong></td><td><strong>Implemented EOS.</strong> Ran a weekly L10 meeting with the three of them. They ran sub-meetings with their marketing and brand teams. Built the full EOS cadence.</td></tr>\n    <tr><td><strong>Ops infrastructure</strong></td><td>Same playbook: daily dashboards, cash flow management, inventory planning, demand forecasting, supply chain negotiations (saved a few COGS margin points).</td></tr>\n    <tr><td><strong>Role</strong></td><td>Mentor-advisor-operator. Got to know every person on the team, the ins and outs of the business. Weekly strategic thought partner and sounding board.</td></tr>\n  </table>\n</div>\n\n<div class=\"tip\"><strong>Why Stay Golden matters MORE than its size suggests:</strong> Yes, it's a $4M business. But this is your <strong>direct EOS implementation experience</strong> — the single most important operating system to Kevin. You didn't just attend L10s; you implemented EOS and ran the weekly cadence. That's the Integrator role in practice. Also: brokering the co-founder partnership shows a level of people judgment and relationship sophistication that's hard to demonstrate otherwise. And the mentor-advisor dynamic is <em>exactly</em> what Kevin described wanting: \"a partner and even a mentor in some ways.\"</div>\n\n<div class=\"answer-block\"><strong>How to frame the EOS piece:</strong> \"I've actually implemented EOS — not at the $100M level, but I built it from scratch at a DTC brand I advised. Weekly L10s, setting Rocks, building the operational cadence. And what I found is that EOS at 60% implementation — which is where you are — is worse than not doing it at all, because you have the overhead of the system without the discipline. Getting from 60% to 80% is about the Integrator actually owning the rhythm. That's what I did there, and that's what I'd do here.\"</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Equip Foods — Supplement Brand, $15M → $40M trajectory</div>\n  <table>\n    <tr><th>Detail</th><th>Info</th></tr>\n    <tr><td><strong>Who</strong></td><td>Equip Foods — supplement/nutrition brand. Founder wasn't day-to-day; younger GM running operations. Very small team.</td></tr>\n    <tr><td><strong>Duration</strong></td><td>~4–5 months</td></tr>\n    <tr><td><strong>Revenue</strong></td><td>~$15M ($2.5–3M/month), on trajectory to $40M</td></tr>\n    <tr><td><strong>What you built</strong></td><td>Dashboards and reporting infrastructure. Worked with their senior supply chain person on stage-gating process for new product releases.</td></tr>\n    <tr><td><strong>Hiring process design</strong></td><td><strong>Designed and ran the hiring process for VP of Finance and VP of Growth.</strong> Used the WHO method. Built the full interview pipeline in Notion — screening stages, scorecards, candidate tracking. Helped screen candidates.</td></tr>\n    <tr><td><strong>Marketing analytics</strong></td><td>Modernized their affiliate program tracking — rebuilt analytics and payment systems so they could calculate blended ROAS at the affiliate level, identify top performers, and make smarter spend allocation decisions.</td></tr>\n  </table>\n</div>\n\n<div class=\"tip\"><strong>Why Equip matters:</strong> This is your fastest-scaling client ($15M → $40M trajectory) and shows you can add value even when there's already a senior team in place. The hiring process work is especially relevant — Kevin needs someone who can hire great people. You didn't just \"help hire\" — you built the entire system using the WHO method, which is a rigorous, proven framework. Mention this if Kevin asks about your approach to hiring.</div>\n\n<div class=\"answer-block\"><strong>How to frame it:</strong> \"At Equip Foods, they were scaling from $15M to $40M and needed to bring on a VP of Finance and VP of Growth. I designed the entire interview process using the WHO method — screening stages, scorecards, structured interviews — and helped them evaluate candidates. That's the kind of hiring infrastructure iRESTORE needs. You can't just 'post and pray' when you're hiring at this level. You need a system that filters for the right people, and I've built that system.\"</div>"
          },
          {
            "id": "trey-ai",
            "title": "AI & Automation (Your Secret Weapon)",
            "html": "<p>This is a differentiator most COO candidates can't touch. You don't just \"use AI\" — you build automated systems with it.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">The Supplement Business: Full AI-Powered Influencer Engine</div>\n  <p>You spent 8–12 months building a supplement brand with a partner (Katie, an influencer). While the brand itself didn't launch, the systems you built are directly applicable to iRESTORE's influencer-heavy growth model.</p>\n  <ul>\n    <li><strong>Influencer scraping engine:</strong> Built automated tools that scraped social platforms for potential influencer partners — collecting profile data, engagement metrics, audience demographics, and contact information at scale.</li>\n    <li><strong>LLM-powered scoring & outreach:</strong> Fed scraped data into LLM-based scoring systems that evaluated influencer fit, drafted personalized outreach messages, and prioritized prospects. This turned what would be weeks of manual work into an automated pipeline.</li>\n    <li><strong>Automated Slack reporting:</strong> Built systems that generated daily Slack reports — performance dashboards, pipeline updates, and actionable insights delivered automatically. You've since deployed similar automated reporting for other consulting clients.</li>\n    <li><strong>Claude Code & AI tooling:</strong> You actively use AI development tools (Claude Code, etc.) in your daily workflow — not just prompting chatbots, but building real automated systems and workflows.</li>\n  </ul>\n</div>\n\n<div class=\"tip\"><strong>Why this matters for iRESTORE:</strong> Kevin's growth depends heavily on influencer marketing — YouTube sponsorships, UGC whitelisting, affiliate programs. Imagine applying your AI scraping + scoring engine to iRESTORE's influencer pipeline. Instead of a team manually finding and vetting influencers, you'd have an automated system surfacing the best prospects daily. That's the kind of operational leverage a $100M company needs but rarely has.</div>\n\n<div class=\"answer-block\"><strong>How to bring this up:</strong> Don't lead with \"I use AI.\" Lead with the output: \"I've built automated influencer prospecting systems — scraping, scoring with LLMs, automated outreach — that turn what's normally weeks of manual work into a daily pipeline. For a brand like iRESTORE that's scaling influencer partnerships, I could deploy something similar that gives your team 10x the reach with the same headcount.\" If Kevin seems interested, mention you could show him the interview prep webapp you built as a concrete example of what you can do with AI tools.</div>"
          },
          {
            "id": "trey-hiring",
            "title": "Your Hiring Playbook: The WHO Method & How You've Applied It",
            "html": "<p>Kevin's JD explicitly says \"partner with CEO on recruiting strategy and building A-player bench strength.\" Hiring will come up. Here's how to own this topic — honestly framing what you've done while showing you have a rigorous system.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">The WHO Method — Quick Reference (Smart & Street)</div>\n  <p>The book \"Who: The A Method for Hiring\" lays out a 4-step framework. You adapted it — you didn't follow it rigidly, but you know the framework and built your own version influenced by it.</p>\n  <table>\n    <tr><th>Step</th><th>What It Is</th><th>How You've Applied It</th></tr>\n    <tr><td><strong>1. Scorecard</strong></td><td>Define the role before you source. Mission (why the role exists), Outcomes (3–8 measurable results expected in year 1), Competencies (behavioral traits required). This replaces the traditional job description.</td><td>Built scorecards for VP of Finance and VP of Growth at Equip Foods. Defined exactly what success looked like before sourcing a single candidate.</td></tr>\n    <tr><td><strong>2. Source</strong></td><td>Systematic pipeline building — referrals, recruiting firms, proactive outreach. Don't wait until you need someone to start looking. The best candidates aren't on job boards.</td><td>At B2TM, sourced through network and referrals for a team of 8–10. At Equip, built a sourcing strategy beyond just posting — used network, structured outreach, and candidate tracking in Notion.</td></tr>\n    <tr><td><strong>3. Select</strong></td><td>Structured interview process: (1) Screening interview, (2) The WHO Interview (chronological career walk-through), (3) Focused interviews (deep-dive on specific competencies), (4) Reference checks (not just \"confirm dates\" — structured references with specific questions).</td><td>Built the full structured pipeline at Equip — screening stages, structured interviews with scorecards, candidate tracking. Not gut-feel hiring — a repeatable system.</td></tr>\n    <tr><td><strong>4. Sell</strong></td><td>Close A-players by addressing their 5 Fs: Fit (role alignment), Family (impact on personal life), Freedom (autonomy), Fortune (comp), Fun (culture/mission). Don't assume they'll just accept — you have to sell the opportunity.</td><td>At B2TM, selling candidates on a startup with no brand name required real pitch work — mission, equity upside, creative culture. Similar energy at Stay Golden and other consulting clients.</td></tr>\n  </table>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Your Hiring Experience Across Roles</div>\n  <table>\n    <tr><th>Context</th><th>What You Did</th><th>Relevant for Kevin</th></tr>\n    <tr><td><strong>Equip Foods</strong></td><td>Designed and ran VP-level hiring process (VP Finance, VP Growth). Built full pipeline in Notion: screening stages, scorecards, structured interviews, candidate tracking. Influenced by WHO method.</td><td>Proves you can build hiring systems for senior roles — exactly what Kevin needs as he scales from ~60 to 100+ people</td></tr>\n    <tr><td><strong>B2TM</strong></td><td>Hired (and fired) team of 8–10 as co-founder. Made the hard call to fire Head of Growth — 2nd employee, emotional attachment, waited too long. Learned \"hire slow, fire fast\" the hard way.</td><td>Kevin explicitly said his biggest lesson is \"hire slow, fire fast.\" You learned the same lesson, and can bond over it. Real founder-to-founder credibility.</td></tr>\n    <tr><td><strong>Consulting clients</strong></td><td>Advised multiple clients on hiring strategy, role definition, and candidate evaluation. Helped founders think through what they actually need vs. what they think they need.</td><td>Shows breadth — you've seen hiring challenges across different company sizes and stages</td></tr>\n  </table>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Key Concepts to Know (In Case Kevin Goes Deep)</div>\n  <ul>\n    <li><strong>A-Player definition:</strong> Someone who has at least a 90% chance of achieving a set of outcomes that only the top 10% of possible candidates could achieve. It's outcome-based, not pedigree-based.</li>\n    <li><strong>\"Voodoo hiring\":</strong> What WHO calls gut-feel hiring — reading resumes, asking generic questions, going with your gut. The #1 mistake. The antidote is structured scorecards + structured interviews.</li>\n    <li><strong>The WHO Interview:</strong> A chronological walk-through of the candidate's career. For each role: What were you hired to do? What accomplishments are you most proud of? What were some low points? Why did you leave? This pattern-matches across their whole career, not just a polished answer to \"tell me your strengths.\"</li>\n    <li><strong>Threat of Reference Check (TORC):</strong> At the end of the WHO Interview, ask \"When we talk to [your former boss], what will they say about you?\" This is a truth serum — people get honest fast when they know you'll actually check.</li>\n    <li><strong>EOS + WHO overlap:</strong> EOS uses GWC (Gets it, Wants it, Capacity) and the People Analyzer. WHO's Scorecard is the hiring-side equivalent of GWC — define what \"right seat\" looks like <em>before</em> you hire. Smart companies use WHO to hire into the Accountability Chart and GWC to evaluate existing team members.</li>\n  </ul>\n</div>\n\n<div class=\"answer-block\"><strong>How to frame your approach if Kevin asks \"How do you think about hiring?\"</strong>\n<br><br>\n\"I use a structured approach influenced by the WHO method. Before I source anyone, I build a scorecard — not a job description, a scorecard. What does this person need to accomplish in year one? What competencies matter most? Then I design a structured interview process — screening, deep-dive career walk-through, focused interviews on specific competencies, and real reference checks. I built this exact system at Equip Foods for their VP of Finance and VP of Growth roles — full pipeline in Notion, screening stages, scorecards, the works.\n<br><br>\n\"But I've also learned the hard part — which is firing. At Baboon, I held onto our Head of Growth too long. She was our second employee, I had emotional attachment, and I kept hoping she'd grow into the role. She didn't. When I finally made the move, the business improved immediately. Kevin, I know you've said 'hire slow, fire fast' is your biggest lesson — I learned the same thing the hard way. That's why I'm obsessive about getting the hire right upfront.\"\n</div>\n\n<div class=\"tip\"><strong>The EOS connection:</strong> If Kevin is deep into EOS, connect the dots: \"The WHO scorecard is basically the hiring version of GWC. You define what 'right seat' looks like before you ever talk to a candidate. Then you use the Accountability Chart to know exactly what seat you're filling. The two frameworks complement each other perfectly — EOS tells you what seats exist, WHO tells you how to fill them with A-players.\"</div>"

            "id": "trey-who-interview",
            "title": "If Kevin Runs a WHO Interview on You",
            "html": "<p>The WHO interview is a chronological walk-through of your career. For <strong>each role</strong>, the interviewer asks the same 5 questions. Kevin may not use the exact WHO format, but many EOS-oriented founders do some version of this. Here's how to nail each role.</p>\n\n<div class=\"tip\"><strong>The pattern:</strong> For every role, they ask: (1) What were you hired to do? (2) What accomplishments are you most proud of? (3) What were some low points or mistakes? (4) Who were the people you worked with, and what would they say about you? (5) Why did you leave? Be honest — the WHO method includes a \"Threat of Reference Check\" (TORC), meaning they may actually call these people. Consistency matters more than perfection.</div>\n\n---\n\n### Goldman Sachs — Business Analyst / Project Manager (2008–2010)\n<div class=\"card\">\n  <div class=\"card-header\">WHO Questions & Your Answers</div>\n  <table>\n    <tr><th width=\"30%\">Question</th><th>Your Answer</th></tr>\n    <tr>\n      <td><strong>What were you hired to do?</strong></td>\n      <td>I came in as a Business Analyst / Project Manager working on cross-divisional technology initiatives. My job was to take complex projects that spanned multiple divisions — what they called \"X-div\" — and manage them from requirements through deployment. This was right out of my dual degree at Carnegie Mellon (BS in Information Systems + MS in ISM), so I had the technical foundation to understand what the engineers were building and the business context to translate it for stakeholders.</td>\n    </tr>\n    <tr>\n      <td><strong>What accomplishments are you most proud of?</strong></td>\n      <td>Honestly, the biggest thing I got from Goldman was learning how to operate in a high-standards, high-pressure environment. I learned structured project management, stakeholder communication, and how to hold people accountable across teams that don't report to you. That cross-divisional coordination skill — getting things done through influence, not authority — has been foundational for everything I've done since, especially as a fractional COO where I'm embedded in someone else's org.</td>\n    </tr>\n    <tr>\n      <td><strong>What were some low points or mistakes?</strong></td>\n      <td>I was 22-23 and it was my first real corporate job. I learned that I'm not a big-company person. The pace was slow relative to what I wanted, the hierarchy was rigid, and I realized pretty quickly that I wanted to be closer to the product and the customer. That self-awareness is what drove me to product management and eventually to founding my own companies.</td>\n    </tr>\n    <tr>\n      <td><strong>What would your manager say about you?</strong></td>\n      <td>They'd say I was reliable, detail-oriented, and good at managing cross-functional complexity. They might also say I was restless — I was clearly someone who wanted to move faster than the institution allowed.</td>\n    </tr>\n    <tr>\n      <td><strong>Why did you leave?</strong></td>\n      <td>I wanted to be in product, closer to the customer, building things. Goldman was a great foundation but I knew I wasn't going to be a lifer. I moved to Amplify Education, which was a much smaller, faster environment where I could own a product end-to-end.</td>\n    </tr>\n  </table>\n</div>\n\n---\n\n### Amplify Education — Product Manager (2010–2011)\n<div class=\"card\">\n  <div class=\"card-header\">WHO Questions & Your Answers</div>\n  <table>\n    <tr><th width=\"30%\">Question</th><th>Your Answer</th></tr>\n    <tr>\n      <td><strong>What were you hired to do?</strong></td>\n      <td>I was hired as a Product Manager to lead the development of mCLASS Beacon, a K–12 formative assessment system. I was responsible for a cross-functional team of 40+ people — developers, designers, QA, other PMs, and technical writers. This was a massive team for a PM role, and it was my first experience truly leading at scale.</td>\n    </tr>\n    <tr>\n      <td><strong>What accomplishments are you most proud of?</strong></td>\n      <td>Managing a team of that size at that age taught me how to coordinate across functions, run structured development cycles, and communicate up, down, and sideways. The product shipped and was used in schools. But honestly, the biggest accomplishment was proving to myself that I could lead a large cross-functional team — that experience gave me confidence that I wasn't just a \"small team\" person.</td>\n    </tr>\n    <tr>\n      <td><strong>What were some low points or mistakes?</strong></td>\n      <td>The company was in transition — it went from Wireless Generation to Amplify under News Corp, and the culture shifted. The bureaucracy increased, and I found myself spending more time navigating internal politics than building product. That was frustrating. I also learned that ed-tech wasn't the space I was passionate about — I wanted to be in consumer products.</td>\n    </tr>\n    <tr>\n      <td><strong>What would your team say about you?</strong></td>\n      <td>They'd say I was organized, communicative, and genuinely cared about the team. I was probably a bit intense — I had high standards and expected people to deliver. But I think they'd also say I had their back and I was fair.</td>\n    </tr>\n    <tr>\n      <td><strong>Why did you leave?</strong></td>\n      <td>I wanted to be in consumer tech, not ed-tech. StumbleUpon was a consumer product with 30 million users — that was the scale and space I wanted to be in.</td>\n    </tr>\n  </table>\n</div>\n\n---\n\n### StumbleUpon — Product Manager (2011–2013)\n<div class=\"card\">\n  <div class=\"card-header\">WHO Questions & Your Answers</div>\n  <table>\n    <tr><th width=\"30%\">Question</th><th>Your Answer</th></tr>\n    <tr>\n      <td><strong>What were you hired to do?</strong></td>\n      <td>I was hired to lead product strategy, design, and development for Paid Discovery — StumbleUpon's advertising platform. This was the revenue engine: $35M+ annually, 100K+ advertisers, serving 30M+ users. I owned the product roadmap for how brands reached consumers through the platform.</td>\n    </tr>\n    <tr>\n      <td><strong>What accomplishments are you most proud of?</strong></td>\n      <td>I owned a product that was generating $35M+ in annual revenue. That's real P&L exposure at a relatively young age. I learned how advertising platforms work, how to think about marketplace dynamics (advertisers on one side, users on the other), and how to make product decisions that balance revenue growth with user experience. That commercial product thinking has been incredibly valuable — at B2TM, with consulting clients, everywhere.</td>\n    </tr>\n    <tr>\n      <td><strong>What were some low points or mistakes?</strong></td>\n      <td>StumbleUpon was struggling as a company. The core consumer product was losing relevance — the web was shifting to mobile and social, and StumbleUpon's model was built for desktop browsing. I watched a company with 30M users fail to adapt. That was a formative lesson in how quickly consumer businesses can decline if you don't evolve the core product. It made me deeply aware of market timing and platform risk — lessons I carried into B2TM.</td>\n    </tr>\n    <tr>\n      <td><strong>What would your colleagues say about you?</strong></td>\n      <td>They'd say I was sharp, commercial-minded, and brought structure to ambiguous situations. The engineers probably appreciated that I could speak their language. Leadership would say I was someone they could trust with the revenue product.</td>\n    </tr>\n    <tr>\n      <td><strong>Why did you leave?</strong></td>\n      <td>I went to Wharton for my MBA. I knew I wanted to start something of my own — I'd been building toward that for years. Wharton gave me the finance and entrepreneurship toolkit, and I concentrated in Entrepreneurial Management specifically because I knew I was going to build a company, not go back to a product role.</td>\n    </tr>\n  </table>\n</div>\n\n---\n\n### Wharton MBA → Goods of Record → Stefan's Head (2013–2016)\n<div class=\"card\">\n  <div class=\"card-header\">WHO Questions & Your Answers</div>\n  <p class=\"muted\" style=\"font-size:0.85rem; margin-bottom:12px;\">These overlap chronologically, so group them as your \"entrepreneurial launch\" period.</p>\n  <table>\n    <tr><th width=\"30%\">Question</th><th>Your Answer</th></tr>\n    <tr>\n      <td><strong>What were you hired to do?</strong><br><em>(or: what were you trying to build?)</em></td>\n      <td>At Wharton, I concentrated in Entrepreneurial Management — I went specifically to learn the finance and strategy toolkit I needed to start a company. Goods of Record was my first venture, co-founded during Techstars (2015 cohort). It was an artisan men's goods brand. After that I founded Stefan's Head, an SMS-based retail platform for exclusive product drops — I grew the subscriber list to 15,000+ through brand, concert, and creator partnerships.</td>\n    </tr>\n    <tr>\n      <td><strong>What accomplishments are you most proud of?</strong></td>\n      <td>Getting into Techstars was validating — it's a top accelerator and they accepted us out of thousands of applicants. With Stefan's Head, building a 15K subscriber list through partnerships taught me the mechanics of brand building, audience development, and DTC distribution. These were both relatively small ventures, but they were my entrepreneurial foundation. Every lesson fed directly into B2TM.</td>\n    </tr>\n    <tr>\n      <td><strong>What were some low points or mistakes?</strong></td>\n      <td>Neither of these became long-term businesses. Goods of Record was a great learning experience but we couldn't find sustainable unit economics in artisan goods at that scale. Stefan's Head was creative and exciting, but SMS commerce in 2015 was early — the infrastructure wasn't there yet. The lesson I took from both: having a cool product isn't enough. You need operational discipline, financial clarity, and the ability to scale. That's literally what I built at B2TM.</td>\n    </tr>\n    <tr>\n      <td><strong>What would your co-founders / partners say about you?</strong></td>\n      <td>They'd say I was the operator — the one who made things happen, handled the logistics, figured out the \"how.\" That pattern has been consistent through every venture since.</td>\n    </tr>\n    <tr>\n      <td><strong>Why did you move on?</strong></td>\n      <td>I met Andy Persson and Michael Kushner, and we started Baboon to the Moon. It was clear from the beginning that B2TM had something the other ventures didn't — a strong brand vision (Andy), marketing instincts (Michael), and operational capability (me). It was the right team, right time, right product.</td>\n    </tr>\n  </table>\n</div>\n\n---\n\n### Baboon to the Moon — Co-Founder / COO (2017–2023)\n<div class=\"card\">\n  <div class=\"card-header\">WHO Questions & Your Answers</div>\n  <p class=\"muted\" style=\"font-size:0.85rem; margin-bottom:12px;\">This is the role Kevin will spend the most time on. Be ready for deep follow-ups.</p>\n  <table>\n    <tr><th width=\"30%\">Question</th><th>Your Answer</th></tr>\n    <tr>\n      <td><strong>What were you hired to do?</strong><br><em>(what was your role?)</em></td>\n      <td>I was co-founder and COO. Three co-founders: Andy was CEO and brand visionary, Michael was CMO, and I was the operator. I owned everything that wasn't brand creative or paid marketing — supply chain, product development, e-commerce, fulfillment, logistics, customer experience, tech stack, analytics, and a lot of the finance and investor relations alongside Andy. We scaled from $0 to $20M in annual revenue with a team of 8–10.</td>\n    </tr>\n    <tr>\n      <td><strong>What accomplishments are you most proud of?</strong></td>\n      <td>A few things:\n        <br><br><strong>Supply chain:</strong> I built a nominated vendor supply chain across 4 Asian countries — Hong Kong, Vietnam, Taiwan, China. 20+ factory trips over 5 years. I sourced individual suppliers for fabric, zippers, and trims rather than relying on a single manufacturer. Negotiated payment terms to net-200 days. Managed 300+ SKUs with complex color matching and 9–12 month development cycles.\n        <br><br><strong>Operations at scale with a tiny team:</strong> We ran $20M in revenue with 8–10 people. I personally handled every customer service ticket for the first 3+ years through $10M+ in revenue. Zero fulfillment crises — I built a proactive forecast communication cadence with our 3PL so they were never caught off-guard.\n        <br><br><strong>Strategic discipline:</strong> I shifted us from monthly product drops to fewer, more strategic launches — better financial discipline on quantities and margins, and we used sell-outs as a demand engine. That created brand heat through scarcity while improving per-drop economics.\n        <br><br><strong>The exit:</strong> I managed the acquirer diligence process, financial preparation, and operational handoff. We took the company from founding to a successful sale.</td>\n    </tr>\n    <tr>\n      <td><strong>What were some low points or mistakes?</strong></td>\n      <td><strong>Firing too slowly:</strong> Our Head of Growth was our second employee. I had deep emotional attachment. She was a good executor but not a strategic thinker — the role outgrew her. I waited too long to make the call. When I finally did, the business improved almost immediately. That's my biggest people lesson: hire slow, fire fast. I know you've said the same thing, Kevin — I learned it the hard way.\n        <br><br><strong>Debt management:</strong> We grew fast but took on debt to fund inventory for growth. We hit profitability in the final year, but the debt load was a factor in the decision to sell. In hindsight, I would have been more conservative on inventory financing earlier. That experience made me deeply disciplined about cash flow — which is why I build cash flow models as one of the first things I do with every consulting client.\n        <br><br><strong>Not building a bigger team sooner:</strong> We ran too lean for too long. I was personally doing CX, managing the 3PL, overseeing product development, and running the tech stack all at once. We should have hired earlier to free up strategic bandwidth. The scrappiness was a strength early on, but it became a bottleneck.</td>\n    </tr>\n    <tr>\n      <td><strong>Who were the people you worked with, and what would they say about you?</strong></td>\n      <td><strong>Andy (CEO/co-founder):</strong> He'd say I was the one who made everything work. He had the vision and the brand instincts — I turned it into a functioning business. He'd also say I was dependable and honest, even when the honest answer was uncomfortable.\n        <br><br><strong>Michael (CMO/co-founder):</strong> He'd say I was the operational backbone of the company. He focused on marketing and creative — he trusted me to handle everything else.\n        <br><br><strong>Factory partners in Asia:</strong> They'd say I was relationship-first, respectful, and consistent. I wasn't the American who showed up once and disappeared — I was there 20+ times. That's why we got net-200 terms.\n        <br><br><strong>3PL team:</strong> They'd say I was the most communicative client they had. I gave them forecasts, advance warning on spikes, and didn't blame them when things were tight — I worked with them proactively.</td>\n    </tr>\n    <tr>\n      <td><strong>Why did you leave?</strong></td>\n      <td>We sold the business. It was the right outcome — we'd built something real, scaled it to $20M, and reached a natural transition point. After the sale, I moved into fractional COO work because I realized the thing I'm best at — and love most — is building operational infrastructure for founder-led brands. I get to do that repeatedly now, across different companies, which gives me pattern recognition that a single-company operator doesn't have.</td>\n    </tr>\n  </table>\n</div>\n\n<div class=\"tip\"><strong>Expect follow-ups on B2TM:</strong> Kevin will probably dig into specific areas. Be ready for: \"Tell me more about the supply chain — how did you find suppliers?\" \"What was your relationship with your co-founders like?\" \"How did you handle disagreements?\" \"Walk me through the decision to sell.\" \"What would you do differently?\" The key is to be honest and specific. The WHO method is designed to detect vagueness — answer with concrete examples, names, numbers, and timelines.</div>\n\n---\n\n### Formosa Consulting — Fractional COO/CFO (2016–Present)\n<div class=\"card\">\n  <div class=\"card-header\">WHO Questions & Your Answers</div>\n  <p class=\"muted\" style=\"font-size:0.85rem; margin-bottom:12px;\">Note: Formosa overlaps with B2TM (2017–2023). Kevin may ask how you managed both — be straightforward that consulting engagements varied in intensity and some were concurrent with B2TM while others came after.</p>\n  <table>\n    <tr><th width=\"30%\">Question</th><th>Your Answer</th></tr>\n    <tr>\n      <td><strong>What were you hired to do?</strong><br><em>(what's the mission?)</em></td>\n      <td>I'm an embedded fractional operator for DTC and consumer brand founders who are scaling from $10M to $100M+. The pattern is almost always the same: a marketer-founder or product-founder who's built something great but has no operational backbone. I come in and build the infrastructure — financial models, S&OP, dashboards, meeting cadences, hiring systems, vendor negotiations — so the founder can focus on what they're good at. I've done this across health & wellness, CPG, beauty, apparel, and pet categories.</td>\n    </tr>\n    <tr>\n      <td><strong>What accomplishments are you most proud of?</strong></td>\n      <td><strong>Easy Street Brands:</strong> Built the complete operational backbone for Zach Stuck's portfolio (4+ brands including Hollow Socks). Got ahead of raw material purchasing at the fiber level — negotiated directly with Peru-based alpaca suppliers and pre-loaded factory capacity. That single supply chain decision enabled the growth trajectory from $20M to a projected $70–80M. Also helped build the initial infrastructure for a portfolio supplement brand that's since grown to $100M+.\n        <br><br><strong>Stay Golden:</strong> Implemented EOS from scratch for a DTC jewelry brand — L10 meetings, Rocks, full operating cadence. Identified a massively over-SKU'd product line, ran strategic liquidation, and streamlined to high-velocity SKUs. Doubled the business from $2M to $4M in 16 months. Also brokered the co-founder equity partnership between two first-time entrepreneurs — that partnership is still intact today.\n        <br><br><strong>Supplement Brand (VP hiring):</strong> Designed the entire VP-level hiring process using the WHO method — scorecards, structured interviews, full pipeline in Notion — for VP of Finance and VP of Growth.\n        <br><br><strong>Pet Supplement Brand (current):</strong> Refined their S&OP and PO management processes. Managing day-to-day operations across Amazon, DTC, TikTok, and wholesale.\n        <br><br><strong>AI systems:</strong> Built AI-powered influencer prospecting systems — automated scraping, LLM-based scoring, personalized outreach — that replaced weeks of manual work with a daily pipeline.</td>\n    </tr>\n    <tr>\n      <td><strong>What were some low points or mistakes?</strong></td>\n      <td>The inherent challenge of fractional work is that you're always working within someone else's constraints. You can build the system, but you can't force them to use it. I've had engagements where the founder wasn't ready to let go of control, or the team wasn't capable of executing what we built together. That's frustrating. It's also part of why I'm interested in a full-time role again — I want to be fully embedded, with real authority to execute, not just advise. The COO seat at iRESTORE is exactly that.</td>\n    </tr>\n    <tr>\n      <td><strong>What would your clients say about you?</strong></td>\n      <td><strong>Zach Stuck (Easy Street):</strong> He'd say I was the strategic thought partner he needed — someone who could spar with him on big decisions, not just execute tasks. He'd say I brought structure without killing the entrepreneurial energy.\n        <br><br><strong>Stay Golden founders:</strong> They'd say I was deeply embedded — not a consultant who showed up once a week, but someone who was in the business daily, knew their team, and cared about the outcome. They'd also say I was the adult in the room when they needed one — especially during the equity partnership negotiation.\n        <br><br>Across the board, clients would say I'm the person who makes founder-led chaos into a functioning operation. I don't come in with a PowerPoint — I come in and build the thing.</td>\n    </tr>\n    <tr>\n      <td><strong>Why are you looking to leave / change?</strong></td>\n      <td>I'm not leaving consulting because it's not working — it's working great. But I miss being fully embedded. The best version of what I do is when I'm all-in on one company, with real ownership (literal and figurative), building for the long term. Fractional work is valuable, but you're always building something you'll eventually hand off. I want to build something I'll run. iRESTORE is the right company, the right stage, and the right founder for me to do that.</td>\n    </tr>\n  </table>\n</div>\n\n<div class=\"answer-block\"><strong>The \"why iRESTORE\" thread that runs through the whole WHO interview:</strong>\n<br><br>\nEvery role in your career builds toward this moment:\n<br><br>\n<strong>Goldman</strong> → Structured project management, cross-functional coordination\n<br><strong>Amplify</strong> → Leading large teams (40+ people), product lifecycle ownership\n<br><strong>StumbleUpon</strong> → P&L exposure ($35M revenue product), commercial product thinking\n<br><strong>Wharton</strong> → Finance toolkit, entrepreneurial strategy\n<br><strong>Goods of Record + Stefan's Head</strong> → Entrepreneurial reps, learned what it takes to build\n<br><strong>B2TM</strong> → Built and scaled a real DTC brand from $0 to $20M, full operational ownership, Asia supply chain, exit\n<br><strong>Formosa</strong> → Pattern recognition across multiple $10M–$100M brands, EOS implementation, hiring systems, operational infrastructure\n<br><br>\nThe narrative arc is clear: \"I went from structured corporate environments → product leadership → founding and scaling my own company → applying everything I learned across multiple brands as a fractional operator. Now I'm ready to go all-in again, and iRESTORE is the company I want to go all-in on.\"\n</div>"

          {
            "id": "trey-big-levers",
            "title": "Big Lever Stories (Disproportionate-Impact Moves)",
            "html": "<p>Kevin's entire strategic philosophy is \"what's the one phone call, one partnership, one structural move that 10x's the result?\" Here are three times you've done exactly that.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">Stay Golden: Inventory Rationalization That Transformed the Business</div>\n  <p><strong>The situation:</strong> Stay Golden was massively over-SKU'd. They had an enormous long tail of jewelry products — too many styles, too many variations — that was destroying margins and operational efficiency.</p>\n  <p><strong>What you did:</strong> Identified the long-tail problem through data analysis. Ran strategic liquidation and clearance sales to move through slow-moving inventory. Then streamlined the product line down to the highest-value, highest-velocity SKUs. Cleaned up merchandising so the brand told a tighter story.</p>\n  <p><strong>The impact:</strong> Massive. Freed up cash tied in dead inventory, improved margins on the remaining catalog, simplified operations (fewer SKUs = simpler supply chain, warehousing, and marketing), and actually improved the customer experience because the product line was more curated and coherent.</p>\n  <p><strong>Why it's a \"big lever\":</strong> This wasn't a growth hack or an ad optimization. It was a structural business decision — one strategic analysis led to a complete merchandising overhaul that touched cash flow, margins, operations, AND brand perception simultaneously.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">B2TM: From Monthly Drops to Strategic Drops</div>\n  <p><strong>The situation:</strong> B2TM was doing frequent drops — almost monthly — which kept the brand buzzy but was operationally unsustainable. Each drop required a full cycle of product development, production coordination, marketing, and fulfillment. The pace was grinding down the small team.</p>\n  <p><strong>What you did:</strong> Shifted the cadence to fewer, more strategic drops. Instead of monthly, you focused on bigger, more impactful launches spaced further apart. Used sell-outs as a marketing engine — when products sold out, it created urgency and FOMO that drove demand for the next drop. Applied more financial discipline to each drop decision: better quantity planning, smarter style selection, stronger margin analysis.</p>\n  <p><strong>The impact:</strong> Better financial performance per drop (fewer bets, but each one more calculated). Reduced operational strain on the team. And counterintuitively, the scarcity created by fewer drops actually <em>improved</em> brand heat — customers paid more attention to each launch because they were events, not just another Tuesday.</p>\n  <p><strong>Why it's a \"big lever\":</strong> Sometimes the big lever is doing <em>less</em> — but doing it better. This is directly relevant to iRESTORE's product pipeline. With skincare devices, professional panels, the sub-$200 wand, and consumables all in development, the temptation is to launch everything at once. A COO who can say \"let's sequence these strategically\" is exactly what Kevin needs.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Hollow Socks / Easy Street: Getting Ahead of Raw Material Purchasing</div>\n  <p><strong>The situation:</strong> Hollow Socks uses alpaca yarn from Peru — a specialty material with limited supply and long lead times. The business was growing fast (headed from $20M toward $70–80M), and if they didn't lock down raw materials ahead of demand, they'd hit a ceiling where growth stalls because you literally can't get enough yarn.</p>\n  <p><strong>What you did:</strong> Got ahead of the purchasing cycle at the <em>raw material</em> level — not just finished goods. Worked directly with Peru-based fiber suppliers to negotiate volume commitments. Had the factories store the yarn on-site so it was ready for production as orders came in. This meant the supply chain was pre-loaded with capacity months before the sales materialized.</p>\n  <p><strong>The impact:</strong> Enabled the growth trajectory from $20M to a projected $70–80M without supply chain bottlenecks. Without this move, growth would have stalled — you can't sell socks you can't make, and you can't make socks without yarn. This was the foundational supply chain decision that made everything else possible.</p>\n  <p><strong>Why it's a \"big lever\":</strong> This is strategic operations at its purest — one structural supply chain decision that unlocked $50–60M in growth. The iRESTORE parallel is obvious: as Kevin scales into new product categories and new geographies, the supply chain needs to be <em>ahead</em> of demand, not reacting to it. This story proves you think that way.</p>\n</div>\n\n<div class=\"answer-block\"><strong>How to deploy these in the interview:</strong> Don't dump all three. Pick the one that fits what Kevin is talking about:\n<br><br>\n<strong>If he's talking about product strategy:</strong> Tell the B2TM drop cadence story — \"Sometimes the big lever is doing less, but better.\"\n<br><br>\n<strong>If he's talking about supply chain or scaling:</strong> Tell the Hollow Socks yarn story — \"I've made the structural supply chain moves that unlock the next stage of growth.\"\n<br><br>\n<strong>If he's talking about margins, efficiency, or cleaning up the business:</strong> Tell the Stay Golden inventory story — \"One strategic analysis of the product line freed up cash, improved margins, and simplified operations.\"\n<br><br>\nThe key message across all three: \"I look for the one structural move that creates disproportionate impact. That's how I think — and it's exactly how you described thinking about the Costco deal.\"</div>"
          },

            "title": "Story Bank: Examples by Theme",
            "html": "<p>Quick-reference for when Kevin asks behavioral questions. Pull the right story for the right question.</p>\n\n<table>\n  <tr><th>When Kevin Asks About...</th><th>Tell This Story</th><th>Source</th></tr>\n  <tr><td>Supply chain / manufacturing</td><td>Built nominated vendor supply chain across 4 Asian countries, 20–30 trips, negotiated to net-200 payment terms</td><td>B2TM</td></tr>\n  <tr><td>Demand planning / preventing crises</td><td>Proactive 3PL communication meant zero fulfillment crises despite frequent demand spikes from limited drops + Q4</td><td>B2TM</td></tr>\n  <tr><td>Player-coach / doing the work</td><td>Personally handled every CX ticket for 3+ years through $10M+ revenue</td><td>B2TM</td></tr>\n  <tr><td>Tech stack / e-commerce</td><td>Built custom headless CMS on Sanity enabling 10–15 SKU drops seamlessly, managed full tech stack</td><td>B2TM</td></tr>\n  <tr><td>Hard people call / \"effective over liked\"</td><td>Fired Head of Growth at B2TM — 2nd employee, emotional attachment, waited too long. She was a good executor but not strategic (mirrors Brandon). Stepped in yourself, then hired someone better. Business improved immediately.</td><td>B2TM</td></tr>\n  <tr><td>Hiring process / hiring great people</td><td>Designed the full hiring pipeline at Equip Foods using the WHO method for VP of Finance and VP of Growth. Built screening stages, scorecards, candidate tracking in Notion. Also hired/fired team of 8–10 at B2TM and advised multiple consulting clients on hiring strategy. Learned \"hire slow, fire fast\" the hard way at B2TM (fired Head of Growth too late).</td><td>Equip Foods + B2TM + Consulting</td></tr>\n  <tr><td>Working with a founder / being a peer</td><td>Three examples: (1) Co-founded B2TM with two partners, (2) Strategic sparring partner for Zach Stuck on people/strategy/big swings, (3) Mentor-advisor to Aliya & Rony at Stay Golden, brokered their co-founder partnership.</td><td>All three</td></tr>\n  <tr><td>3PL management</td><td>Single East Coast 3PL for full B2TM lifecycle. Evaluated dual-coast and Mexico 321 options for duty savings.</td><td>B2TM</td></tr>\n  <tr><td>Product development complexity</td><td>100+ SKUs at B2TM (9–12 month dev cycles, color matching, custom liners, frequent drops). Stage-gating process for new products at Equip Foods.</td><td>B2TM + Equip</td></tr>\n  <tr><td>Exit / sale experience</td><td>Took B2TM through a sale. Understands what acquirers look for, the diligence process, and the emotional journey.</td><td>B2TM</td></tr>\n  <tr><td>Financial acumen</td><td>Built models, forecasting, investor relations decks at B2TM. Cash flow models and scenario planning at Easy Street. Affiliate ROAS analytics rebuild at Equip Foods.</td><td>B2TM + Easy Street + Equip</td></tr>\n  <tr><td>Scaling at $50M+ / $100M+</td><td>Built operational foundation for Zach Stuck's Easy Street Brands (Hollow Socks $20M+, supplement brand now $100M+). Equip Foods was on $15M→$40M trajectory.</td><td>Easy Street + Equip</td></tr>\n  <tr><td>EOS / operating rhythm</td><td><strong>Implemented EOS at Stay Golden.</strong> Weekly L10 meetings, full cadence. Also built operational cadences at Easy Street (Notion-based reporting rhythm, documented meeting agendas).</td><td>Stay Golden + Easy Street</td></tr>\n  <tr><td>Margin improvement</td><td>Net-200 terms at B2TM. Negotiated alpaca fiber rates (Peru) and US manufacturer pricing at Easy Street. COGS negotiations at Stay Golden. Multiple points of margin saved across engagements.</td><td>All three</td></tr>\n  <tr><td>Building infrastructure for a marketer-founder</td><td>Three times: Zach Stuck (Easy Street), Aliya/Rony (Stay Golden), and the GM at Equip Foods. All needed ops infrastructure built from scratch by someone who speaks both founder and operator.</td><td>All consulting</td></tr>\n  <tr><td>Brokering partnerships / people decisions</td><td>Brokered the Aliya + Rony co-founder partnership at Stay Golden. Structured equity, persuaded both sides. They remain co-founders today.</td><td>Stay Golden</td></tr>\n  <tr><td>Marketing analytics / data-driven decisions</td><td>Rebuilt Equip Foods' affiliate tracking — calculated blended ROAS at affiliate level, enabled smarter spend allocation. Built daily dashboards at Easy Street and Stay Golden.</td><td>Equip + Easy Street + Stay Golden</td></tr>\n  <tr><td>Strategic \"big lever\" moves</td><td>Three examples: (1) Stay Golden inventory rationalization — identified over-SKU'd long tail, ran liquidation sales, streamlined to high-value SKUs, freed cash + improved margins. (2) B2TM drop cadence shift — fewer, more strategic launches, used sell-outs as marketing engine, better financial discipline. (3) Hollow Socks raw material play — locked down alpaca yarn purchasing at fiber level in Peru, pre-loaded factory capacity, enabling $20M→$70-80M growth trajectory.</td><td>Stay Golden + B2TM + Easy Street</td></tr>\n  <tr><td>Managing larger teams / org leadership</td><td>Earlier career as Product Manager — led cross-functional teams of 50–70 people (developers, designers, QA, PMs, technical writers). Proves you can operate at scale, not just in scrappy startup mode.</td><td>PM career</td></tr>\n  <tr><td>AI & automation capabilities</td><td>Built AI-powered influencer scraping + LLM scoring engine, automated Slack reporting for clients, actively uses Claude Code and AI tooling for workflow automation. Not just \"uses AI\" — builds real automated systems.</td><td>Supplement venture + consulting clients</td></tr>\n</table>"

            "id": "edge-gap",
            "title": "What Industry COOs Know (That You Don’t Yet)",
            "html": "<h2>What a $100M+ Beauty/Wellness COO Knows That You Need to Learn</h2>\n      <p>An honest assessment of the knowledge gaps between you and an industry insider — and how to close them fast. Kevin will be comparing you to candidates who’ve run ops at companies like HairMax, Olaplex, or The Ordinary. Here’s what they know and you need to study.</p>\n\n      <h3>1. FDA & Medical Device Regulatory (iRESTORE-Specific)</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">What insiders know cold</div>\n        <ul>\n          <li><strong>iRESTORE is a Class II medical device</strong>, FDA 510(k) cleared (K151662). This is NOT cosmetics regulation — it’s medical device regulation under 21 CFR 890.</li>\n          <li><strong>510(k) pathway</strong> = demonstrating “substantial equivalence” to a predicate device (the iGrow). Every product change risks requiring a new 510(k) submission.</li>\n          <li><strong>QSR (Quality System Regulation)</strong> — 21 CFR 820 mandates design controls, CAPA (corrective and preventive action), complaint handling, and document control. Industry COOs manage these systems daily.</li>\n          <li><strong>MDR (Medical Device Reporting)</strong> — required to report adverse events to FDA within 30 days. A mishandled complaint can trigger an FDA inspection.</li>\n          <li><strong>Labeling constraints</strong> — iRESTORE can only claim “promotes hair growth” for specific Norwood-Hamilton (men IIa–V) and Ludwig-Savin (women I–II) classifications. Any broader claim = FDA warning letter.</li>\n          <li><strong>Post-market surveillance</strong> — annual registration, adverse event tracking, complaint trending</li>\n        </ul>\n        <div class=\"tip\"><strong>Your study plan:</strong> Read the <a href=\"https://www.accessdata.fda.gov/cdrh_docs/pdf15/k151662.pdf\" target=\"_blank\">actual 510(k) summary for iRESTORE</a>. Understand the indications for use, the predicate device, and the clinical evidence. Be able to reference it in conversation.</div>\n      </div>\n\n      <h3>2. MoCRA — The New Cosmetics Regulation</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">What changed in 2022–2025</div>\n        <ul>\n          <li>The <strong>Modernization of Cosmetics Regulation Act (MoCRA)</strong> is the biggest expansion of FDA cosmetics authority since 1938.</li>\n          <li>As of July 1, 2024: <strong>facility registration and product listing are mandatory</strong> for all cosmetics manufacturers. Renewed biennially.</li>\n          <li><strong>GMP rules</strong> for cosmetics (proposed Oct 2025) will require documented manufacturing processes — similar to what device companies already do.</li>\n          <li><strong>Adverse event reporting</strong> is now required for cosmetics (previously voluntary).</li>\n          <li><strong>Why this matters for iRESTORE:</strong> Their topical products (shampoos, serums, supplements) fall under cosmetics/drug regulation, NOT device regulation. So Kevin is managing TWO regulatory frameworks simultaneously.</li>\n        </ul>\n        <div class=\"tip\"><strong>Your study plan:</strong> Read the <a href=\"https://www.fda.gov/cosmetics/cosmetics-laws-regulations/modernization-cosmetics-regulation-act-2022-mocra\" target=\"_blank\">FDA’s MoCRA page</a>. Be able to say: “I know you’re navigating two regulatory worlds — medical device for the laser helmets and MoCRA for the topicals. I’d want to audit where we stand on both in my first 90 days.”</div>\n      </div>\n\n      <h3>3. DTC Beauty Supply Chain & Fulfillment</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">Industry-specific operational knowledge</div>\n        <ul>\n          <li><strong>Temperature-sensitive inventory</strong> — serums, topicals, and supplements require climate-controlled warehousing. iRESTORE’s La Mirada warehouse needs humidity/temp monitoring.</li>\n          <li><strong>Expiration date management</strong> — beauty SKUs have shelf life constraints. FEFO (First Expired, First Out) vs. FIFO inventory management.</li>\n          <li><strong>Rapid SKU proliferation</strong> — new formulas, limited editions, bundled kits. Beauty brands at $100M+ typically manage 200–500+ active SKUs.</li>\n          <li><strong>Returns complexity</strong> — beauty/health returns can’t be resold (hygiene). Industry average return rate is 5–8% for beauty DTC; devices may be higher.</li>\n          <li><strong>Amazon FBA vs. FBM optimization</strong> — at iRESTORE’s scale, managing the Amazon channel (they hold 60–70% market share in the Amazon laser hair growth category) requires FBA inventory planning, IPI score management, and long-term storage fee avoidance.</li>\n          <li><strong>Wholesale/retail expansion logistics</strong> — pallet-oriented shipments, EDI compliance, retail chargebacks, co-op advertising deductions. Moving from pure DTC to omnichannel (Ulta, Sephora, dermatologist offices) is operationally complex.</li>\n        </ul>\n      </div>\n\n      <h3>4. Beauty/Wellness Financial Metrics</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">The KPIs industry COOs track daily</div>\n        <table>\n          <tr><th>Metric</th><th>What It Means</th><th>Industry Benchmark</th></tr>\n          <tr><td><strong>CAC (Customer Acquisition Cost)</strong></td><td>Cost to acquire one new customer</td><td>$25–50 for beauty DTC; $80–150 for devices</td></tr>\n          <tr><td><strong>LTV:CAC Ratio</strong></td><td>Lifetime value divided by acquisition cost</td><td>3:1 minimum; 4:1+ is healthy</td></tr>\n          <tr><td><strong>Contribution Margin</strong></td><td>Revenue minus COGS minus fulfillment minus variable marketing</td><td>60–75% for topicals; 40–55% for devices</td></tr>\n          <tr><td><strong>Gross Margin</strong></td><td>Revenue minus COGS</td><td>75–86% for beauty; 55–70% for devices</td></tr>\n          <tr><td><strong>Repurchase Rate</strong></td><td>% of customers who buy again</td><td>30–45% for beauty (consumables); lower for devices</td></tr>\n          <tr><td><strong>Return Rate</strong></td><td>% of orders returned</td><td>5–8% beauty; 8–15% devices</td></tr>\n          <tr><td><strong>Days of Inventory (DOI)</strong></td><td>How many days of stock on hand</td><td>60–90 days target for beauty</td></tr>\n          <tr><td><strong>NPS (Net Promoter Score)</strong></td><td>Customer satisfaction/loyalty</td><td>50+ is excellent for beauty brands</td></tr>\n        </table>\n        <p class=\"muted\">Sources: <a href=\"https://www.drivepoint.io/post/19-financial-metrics-to-help-growing-beauty-brands-unlock-profitability-faster\" target=\"_blank\">Drivepoint (19 Financial Metrics for Beauty Brands)</a>, <a href=\"https://supliful.com/blog/what-kpis-should-beauty-brands-track\" target=\"_blank\">Supliful KPI Guide</a>, <a href=\"https://financialmodelslab.com/blogs/kpi-metrics/beauty-e-store\" target=\"_blank\">Financial Models Lab (Beauty E-Store KPIs)</a></p>\n      </div>\n\n      <h3>5. LLLT Market & Competitive Landscape</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">What an industry insider would know about iRESTORE’s market</div>\n        <ul>\n          <li><strong>Global LLLT market:</strong> $271.8M in 2025, growing at 3.8% CAGR to $370M by 2033</li>\n          <li><strong>32 FDA-cleared home-use LLLT devices</strong> currently on market — crowded field</li>\n          <li><strong>Key competitors:</strong> HairMax (laser combs, Medicare coverage as of Dec 2025), Capillus (new FDA clearance Oct 2025), Theradome, Kiierr, Revian, CurrentBody</li>\n          <li><strong>iRESTORE’s differentiation:</strong> helmet form factor, 29,000+ reviews, AI-personalized treatment protocols (Nov 2025 launch), strong Amazon presence</li>\n          <li><strong>Industry consolidation:</strong> Beauty M&A deal volume up 22.9% YoY (Capstone Partners Dec 2025). Strategic acquirers actively seeking DTC + medical device brands.</li>\n          <li><strong>Expansion into “wellness ecosystem”</strong> (topicals, supplements) is the growth play — devices are the trust anchor, consumables drive recurring revenue and higher LTV.</li>\n        </ul>\n        <p class=\"muted\">Sources: <a href=\"https://www.openpr.com/news/4345921/laser-hair-loss-treatment-market-set-for-rapid-growth-as-demand\" target=\"_blank\">OpenPR Market Report</a>, <a href=\"https://www.capstonepartners.com/insights/article-beauty-ma-update/\" target=\"_blank\">Capstone Partners Dec 2025</a></p>\n      </div>\n\n      <h3>6. Omnichannel Operations</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">The DTC-to-omnichannel transition every $100M brand makes</div>\n        <ul>\n          <li><strong>Pure DTC is a ceiling, not a strategy</strong> at $100M+. Kevin knows this. The question is: who builds the omnichannel ops engine?</li>\n          <li><strong>Retail readiness</strong> requires: EDI integration, retail-compliant packaging, co-op/MDF budgets, field sales support, POS/display programs, retail analytics (sell-through rates, turns)</li>\n          <li><strong>Channel conflict management</strong> — pricing parity between DTC, Amazon, and retail is a constant battle. MAP (Minimum Advertised Price) enforcement is critical.</li>\n          <li><strong>Wholesale margin stack</strong> — retail typically wants 40–50% margin, which compresses your margin from 70%+ DTC to 25–35% wholesale. Profitability modeling across channels is a core COO competency.</li>\n        </ul>\n      </div>"
          },
