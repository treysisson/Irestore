            "id": "reg-japan",
            "title": "Japan – PMDA/MHLW Pathway",
            "html": "<h2>Japan: PMDA Shonin Approval for Hair Growth Devices</h2>\n\n      <h3>Classification & Approval Bodies</h3>\n      <p>Japan has a <strong>dual authority structure</strong>: MHLW (Ministry of Health, Labour and Welfare) sets policy, while PMDA (Pharmaceuticals and Medical Devices Agency) conducts technical reviews. Hair growth laser/LED devices are classified as <strong>medical devices</strong> — likely Class II or III depending on JMDN code assignment.</p>\n      <p>Most likely pathway: <strong>Shonin (Approval)</strong> via PMDA review + MHLW administrative approval. This is significantly more involved than South Korea's pathway.</p>\n\n      <h3>Shonin Approval Process</h3>\n      <table>\n        <tr><th>Step</th><th>Description</th><th>Timeline</th><th>Cost (USD)</th></tr>\n        <tr><td>1</td><td><strong>Foreign Manufacturer Registration (FMR)</strong> — register with MHLW</td><td>2–4 weeks</td><td>$0</td></tr>\n        <tr><td>2</td><td><strong>Designate DMAH</strong> — appoint Japanese entity as marketing authorization holder</td><td>2–4 weeks</td><td>Commission-based (15–25% of sales)</td></tr>\n        <tr><td>3</td><td><strong>Pre-Submission Consultation with PMDA</strong> — confirm classification, clinical data needs, pathway</td><td>4–8 weeks</td><td>$700–$2,000</td></tr>\n        <tr><td>4</td><td><strong>STED Preparation & Translation</strong> — comprehensive dossier in Japanese</td><td>8–16 weeks</td><td>$10,000–$25,000</td></tr>\n        <tr><td>5</td><td><strong>Clinical Data Assessment</strong> — PMDA may accept foreign data or require Japanese trials</td><td>0–52 weeks</td><td>$0 – $300,000</td></tr>\n        <tr><td>6</td><td><strong>Shonin Application to PMDA</strong></td><td>1–2 weeks</td><td>$10,000 (application fee)</td></tr>\n        <tr><td>7</td><td><strong>PMDA Technical Review</strong> — includes deficiency letter rounds (avg 1–3 Q&A cycles)</td><td>9–12 months</td><td>$5,000–$15,000 (consultant)</td></tr>\n        <tr><td>8</td><td><strong>MHLW Administrative Approval</strong></td><td>1–2 months</td><td>$0</td></tr>\n        <tr class=\"highlight-row\"><td></td><td><strong>TOTAL (no clinical trials)</strong></td><td><strong>12–14 months</strong></td><td><strong>$37,000–$95,000</strong></td></tr>\n        <tr style=\"background:#fff3e0\"><td></td><td><strong>TOTAL (with Japanese trials)</strong></td><td><strong>24–36 months</strong></td><td><strong>$100,000–$435,000</strong></td></tr>\n      </table>\n\n      <div class=\"tip\"><strong>Critical Decision Point:</strong> Whether PMDA requires Japanese clinical trials is the single biggest variable. The pre-submission consultation (Step 3) answers this question. Strategy: leverage FDA 510(k) clinical data + argue gap assessment shows Japanese population data isn't needed.</div>\n\n      <h3>DMAH vs. MAH — Local Partner Structure</h3>\n      <table>\n        <tr><th>Aspect</th><th>DMAH (Recommended)</th><th>MAH</th></tr>\n        <tr><td>Ownership of approval</td><td>Foreign manufacturer retains</td><td>Transferred to Japanese entity</td></tr>\n        <tr><td>Change flexibility</td><td>Easy (1–2 months to switch)</td><td>Difficult (6–12 months, reapproval needed)</td></tr>\n        <tr><td>Cost</td><td>Lower (agent commission)</td><td>Higher (ownership/management fees)</td></tr>\n        <tr><td>Recommendation</td><td><strong>Better for most cases</strong></td><td>Only if seeking Japan-based ownership</td></tr>\n      </table>\n\n      <h3>Key Differences from FDA</h3>\n      <ul>\n        <li><strong>Harder:</strong> Clinical data more likely required, longer review (9–16 months vs. FDA 90 days for 510(k)), all docs must be in Japanese, DMAH mandatory, stricter advertising claims</li>\n        <li><strong>Easier:</strong> Lower application fee ($10K vs. FDA PMA $235K), accepts foreign clinical data with gap assessment, no separate GMP system (uses ISO 13485)</li>\n      </ul>\n\n      <h3>E-Commerce in Japan</h3>\n      <p><strong>Amazon Japan</strong> is the most accessible platform for foreign sellers. Rakuten Ichiba is more restrictive (requires Japanese company registration). All platforms require PMDA approval number on listings, Japanese-language customer support, and DMAH contact information.</p>\n      <ul>\n        <li><strong>Amazon Japan:</strong> Professional seller account, 8–15% commission, accessible to foreign sellers</li>\n        <li><strong>Rakuten:</strong> Requires Japanese company or service partner, 20–35% distributor commission</li>\n        <li><strong>Recommended:</strong> Hybrid approach — direct Japanese website for premium positioning + Amazon Japan for volume</li>\n      </ul>\n\n      <h3>Post-Market Surveillance (Fuguai Reporting)</h3>\n      <ul>\n        <li>Serious adverse events (death/serious injury): report within <strong>10 days</strong> to PMDA</li>\n        <li>Other adverse events: report within <strong>30 days</strong></li>\n        <li>Full investigation report with root cause analysis within <strong>60 days</strong></li>\n        <li>Annual safety reports required for marketed devices</li>\n      </ul>\n\n      <h3>IP Protection</h3>\n      <ul>\n        <li><strong>Patents:</strong> File with JPO (Japan Patent Office). First-to-file system. 20-year term.</li>\n        <li><strong>Trademark \"iRESTORE\":</strong> File in Class 10 + Class 44. Timeline: 6–12 months. Cost: $300–$600.</li>\n        <li><strong>Madrid Protocol:</strong> Can file U.S. trademark as basis for international filing covering Japan — cheaper and faster than direct filing.</li>\n      </ul>"
          },

leverage our FDA 510(k) data as predicate. Japan through the PMDA is a longer play — 12 to 36 months depending on whether they require Japanese clinical trials. The key move is running both in parallel: start Korea's K-GMP audit and Japan's PMDA pre-submission consultation simultaneously, so Korea goes live while Japan is still in review. Total regulatory investment for both markets: $70K to $250K depending on Japan's clinical data requirements.\"</div>"

ioning. Premium pricing ($200–$600).</td></tr>\n        <tr><td><strong>iRESTORE parallels</strong></td><td>Both started with one hero device, expanding into adjacent categories. Both leverage clinical/science credibility. Both building retail + DTC. Key difference: Therabody peaked and contracted; iRESTORE is still in growth mode.</td></tr>\n        <tr><td><strong>Implied multiple for iRESTORE</strong></td><td>At Therabody's peak ~3.8x revenue, iRESTORE at $150M = ~$570M. At $200M = ~$760M. These multiples require proving iRESTORE can sustain growth (unlike Therabody's post-COVID decline).</td></tr>\n      </table>"

          {
            "id": "jd-overview",
            "title": "Role Overview",
            "html": "<h2>COO (Integrator) — iRESTORE</h2>\n      <div class=\"card\">\n        <div class=\"card-header\">Position Details</div>\n        <ul>\n          <li><strong>Position:</strong> COO (Integrator)</li>\n          <li><strong>Reports To:</strong> CEO/Founder (Kevin Chen)</li>\n          <li><strong>Location:</strong> Orange County, CA (On-site/Hybrid) — LA-based strongly preferred; relocation assistance available</li>\n          <li><strong>Compensation:</strong> Competitive base + performance bonus + equity</li>\n        </ul>\n      </div>\n\n      <h3>The Opportunity</h3>\n      <p>As the Operational Strategist and true Integrator, you'll be the bridge between vision and execution. You'll partner directly with Kevin to translate strategic vision into operational execution plans. Your role is to connect all the dots across supply chain, inventory, finance, customer experience, and team operations — ensuring that strategy becomes reality through clear execution and operational excellence.</p>\n      <p><strong>This role frees the CEO</strong> to focus on innovation (product + AI), sales, and big relationships — while you own the operational engine.</p>"
          },
          {
            "id": "jd-responsibilities",
            "title": "Key Responsibilities",
            "html": "<h2>Key Responsibilities</h2>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Strategy Translation & Execution Planning</div>\n        <ul>\n          <li>Translate CEO's strategic vision into clear operational execution plans each department can work against</li>\n          <li>Connect strategic goals to operational KPIs, budgets, and timelines across all functions</li>\n          <li>Work with CFO and Controller to break down financial targets into departmental execution plans</li>\n          <li>Ensure alignment through regular operational reviews and dashboards</li>\n        </ul>\n      </div>\n\n      <div class=\"tip\"><strong>What \"Strategy → Execution\" actually looks like at iRESTORE:</strong>\n        <table>\n          <tr><th style=\"width:35%\">Kevin says…</th><th>COO translates into…</th></tr>\n          <tr>\n            <td>\"We need to get into Sephora/Ulta for skincare.\"</td>\n            <td>90-day retail readiness plan: retail-spec packaging redesign (wk 1–3), MAP policy finalized (wk 2), sell sheets + planogram built (wk 3–4), broker/rep firm shortlisted (wk 4–6), buyer meetings booked (wk 8–12). KPI: first PO by Q3. Assign to marketing (creative), ops (packaging/fulfillment), finance (margin modeling by channel).</td>\n          </tr>\n          <tr>\n            <td>\"Internationalization is more than I can chew.\"</td>\n            <td>Phased rollout: Phase 1 (60 days) — Amazon UK + DE via FBA Europe, translated listings, VAT registration. Phase 2 (6 mo) — Korea via distributor model, MFDS registration filed. Phase 3 (12 mo) — Japan PMDA pathway. Brandon owns Amazon logistics; hire or contract a regulatory specialist for Korea/Japan. Weekly status in L10 meeting. KPI: $2M international revenue in first 12 months.</td>\n          </tr>\n          <tr>\n            <td>\"We want to be a beauty brand, not a device company.\"</td>\n            <td>Subscription consumables initiative: build post-purchase email flow targeting 600K+ existing device buyers → bundled serum/supplement offer → subscribe-and-save at 15% discount. Ops: set up recurring fulfillment workflow in Fulfill, negotiate supplier volume pricing for 3x consumable output. Marketing: design the lifecycle email sequence. Finance: model LTV impact at 5%/10%/15% conversion. KPI: 10% of device buyers converting to $40/mo subscription within 12 months = $28.8M recurring revenue.</td>\n          </tr>\n          <tr>\n            <td>\"The sub-$200 wand is designed for retail.\"</td>\n            <td>Target/Walmart launch plan: finalize retail unit economics at $199 MSRP (confirm 40%+ retailer margin works with COGS), source retail-ready packaging + anti-theft fixtures, build initial inventory position for 500-store test. Ops: separate retail fulfillment workflow from DTC/Amazon. Marketing: co-op advertising budget + in-store demo plan. KPI: $500K/mo run rate within 6 months of placement.</td>\n          </tr>\n          <tr>\n            <td>\"I want to exit in 2–4 years at $500M+.\"</td>\n            <td>Exit readiness roadmap: (1) Clean financials — audited GAAP statements by end of year, normalize owner add-backs, (2) Document all SOPs so business runs without Kevin, (3) Diversify revenue — reduce DTC Amazon concentration below 50% via retail + international, (4) Build recurring revenue (subscriptions) to command higher multiple, (5) Quarterly board-ready reporting package. Each item gets an owner, a deadline, and a dashboard metric.</td>\n          </tr>\n        </table>\n        <strong>The pattern:</strong> Kevin thinks in destinations (\"I want to be in Sephora\"). The COO's job is to build the road — who does what, by when, with what resources, measured how. Every vision statement becomes a project plan with owners, timelines, and KPIs within 48 hours.\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Operational Leadership</div>\n        <ul>\n          <li>Lead teams across supply chain, fulfillment, customer service, and quality assurance</li>\n          <li>Build and document SOPs to systematize operations and reduce founder dependency</li>\n          <li>Run operational meetings and drive decisions (CEO input on major decisions)</li>\n          <li>Drive margin improvement through supplier negotiations, logistics optimization, process efficiency</li>\n          <li>Support new product launches with operational readiness planning</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Inventory Management & Forecasting</div>\n        <ul>\n          <li>Implement inventory management best practices and identify/setup appropriate systems</li>\n          <li>Develop accurate forecasting models and streamline supply-demand balance</li>\n          <li>Analyze inventory to identify overstock/understock issues and optimize stock rotation</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">ERP & Systems</div>\n        <ul>\n          <li>Maximize ERP system (Fulfil.io) through customization, optimization, and integration</li>\n          <li>Build systems and automation to drive operational efficiency (including AI-powered workflows)</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Cross-Functional Integration</div>\n        <ul>\n          <li>Connect all dots across departments — break down silos</li>\n          <li>Improve cross-functional communication</li>\n          <li>Lead risk assessment, mitigation planning, and compliance</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">People & Culture</div>\n        <ul>\n          <li>Lead people operations with Chief of Staff: HR issues, team development for direct reports</li>\n          <li>Partner with CEO on recruiting strategy and building A-player bench strength</li>\n          <li>Champion company values: think big, proactive problem-solving, fail fast and learn</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Financial Stewardship</div>\n        <ul>\n          <li>Own operational P&L and EBITDA targets</li>\n          <li>Partner with CFO and Controller on forecasting, budgeting, and variance analysis</li>\n          <li>Make data-driven decisions balancing growth investment with profitability</li>\n        </ul>\n      </div>"
          },

            "id": "jd-qualifications",
            "title": "Qualifications",
            "html": "<h2>Qualifications</h2>\n\n      <h3>Required</h3>\n      <ul>\n        <li>Based in Southern California (or willing to relocate — they'll cover costs)</li>\n        <li>Track record scaling operations from mid-high 8 figures to 9 figures and beyond</li>\n        <li>Player-coach mentality — willing to get hands-on when needed</li>\n        <li><strong>Health & Beauty CPG experience is a must</strong></li>\n        <li>Familiar with e-commerce ecosystem (Shopify) and ERP systems (Fulfil.io, NetSuite, or similar)</li>\n        <li>Tech savvy with experience building systems and automation (including AI workflows)</li>\n        <li>Proven ability to translate strategic vision into operational execution plans</li>\n        <li>Strong supply chain and logistics background (Asia manufacturing experience a plus)</li>\n        <li>Demonstrated ability to manage P&L and drive margin improvement</li>\n      </ul>\n\n      <h3>Nice to Have</h3>\n      <ul>\n        <li>Experience with wholesale and retail programs</li>\n        <li>International expansion experience</li>\n        <li>FDA-regulated product experience</li>\n        <li>Experience with EOS/Traction</li>\n      </ul>"

            "id": "jd-90day",
            "title": "Success Timeline (90 Days / 1 Year)",
            "html": "<h2>What Success Looks Like</h2>\n\n      <h3>First 90 Days</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">90-Day Expectations from the JD</div>\n        <ul>\n          <li>Complete operational audit and identify top 5 high-impact improvement areas</li>\n          <li>Build relationships with your direct reports and understand company culture</li>\n          <li>Take ownership of operational meetings and day-to-day decisions from CEO</li>\n          <li>Present 12-month operational roadmap and execution plan to leadership</li>\n        </ul>\n      </div>\n\n      <h3>First Year</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">Year 1 Expectations from the JD</div>\n        <ul>\n          <li>CEO spends less time on operations, freeing him to focus on product innovation, AI, sales, and big relationships</li>\n          <li>Strategic plans are consistently translated into clear execution plans that teams deliver against</li>\n          <li>Gross margins improved by 3–5 points through operational excellence</li>\n          <li>Team views you as the go-to leader for operational questions and decisions</li>\n        </ul>\n      </div>\n\n      <h3>Required Competencies</h3>\n      <table>\n        <tr><th>Competency</th><th>What They're Looking For</th></tr>\n        <tr><td><strong>Strategy-to-Execution</strong></td><td>Take high-level vision → operational plans teams execute. Connect goals to KPIs, budgets, timelines.</td></tr>\n        <tr><td><strong>Operational Excellence</strong></td><td>Build scalable systems in high-growth. Deep supply chain/logistics/manufacturing experience. Margin improvement track record.</td></tr>\n        <tr><td><strong>DTC & E-commerce</strong></td><td>DTC metrics, unit economics, customer lifecycle. Shopify ecosystem + ERP systems.</td></tr>\n        <tr><td><strong>Leadership & Culture</strong></td><td>Player-coach. Strong EQ. Values-aligned: proactive, thinks big, continuous improvement.</td></tr>\n        <tr><td><strong>Financial Acumen</strong></td><td>P&L management with EBITDA accountability. Partner with Finance/CFO on planning.</td></tr>\n      </table>\n\n      <div class=\"tip\"><strong>Why iRESTORE (from the JD):</strong> Impact (600K+ customers, category-defining brand), Ownership (equity + true operational ownership as first COO), Culture (fast-paced, entrepreneurial, values-driven), Partnership (founder who values ops excellence and empowers leaders).</div>"

            "id": "ci-profile",
            "title": "Your Predicted CI Profile",
            "html": "<h2>Predicted Culture Index Output</h2>\n      <p>Based on your actual Culture Index survey selections (44 words on Page 1, 35 words on Page 2). The CI measures four primary drives plus secondary traits. Here's your predicted profile:</p>\n\n      <h3>Primary Drive Scores (Predicted)</h3>\n      <table>\n        <tr><th>CI Drive</th><th>Page 1 (Self)</th><th>Page 2 (Role)</th><th>Gap</th><th>What It Means</th></tr>\n        <tr style=\"background:#e8f5e9\"><td><strong>A — Autonomy</strong><br><span class=\"muted\">Drive to influence outcomes</span></td><td><strong>High (75–85th)</strong><br>Self-confident, Strong Willed, Ambitious, Commanding, Venturesome, Courageous, Influential, Relentless</td><td><strong>High (70–80th)</strong><br>Commanding, Innovative, Purposeful, Resourceful</td><td style=\"color:#2e7d32\">▼ Small</td><td>Naturally autonomous AND recognizes the role demands it. Ideal for COO/Integrator who must drive decisions independently.</td></tr>\n        <tr><td><strong>B — Social Energy</strong><br><span class=\"muted\">Need for social interaction</span></td><td><strong>Moderate (45–55th)</strong><br>Good Mixer, Conversational, Interactive, Likable, Communicative, Laid Back</td><td><strong>Moderate (50–60th)</strong><br>Sociable, Conversational, Communicative, Approachable, Facilitating</td><td style=\"color:#2e7d32\">▲ Small</td><td>Not a classic extrovert, but recognizes COO role requires more social engagement than comes naturally. Shows self-awareness.</td></tr>\n        <tr><td><strong>C — Patience / Pace</strong><br><span class=\"muted\">Comfort with steady pace</span></td><td><strong>Moderate (50–60th)</strong><br>Patient, Steady, Laid Back, Persistent, Careful, Prudent</td><td><strong>Mod–High (55–65th)</strong><br>Calm, Steady, Even Tempered, Consistent, Persistent, Controlled, Cautious, Disciplined</td><td style=\"color:#2e7d32\">▲ Small</td><td>Moderately patient by nature with a slight upward shift for the role. You recognize ops leadership requires patience and consistency beyond your natural tempo.</td></tr>\n        <tr style=\"background:#e8f5e9\"><td><strong>D — Conformity / Detail</strong><br><span class=\"muted\">Need for structure & rules</span></td><td><strong>Moderate (50–60th)</strong><br>Thorough, Meticulous, Accurate, Organized, Careful, Diligent, Compliant, Prudent</td><td><strong>High (65–80th)</strong><br>Systematic, Exacting, Controlled, Compliant, Accurate, Organized, Rigorous, Thorough, Meticulous, Disciplined, Cautious</td><td style=\"color:#1565c0\"><strong>▲ Notable</strong></td><td><strong>This is the most important gap in your profile.</strong> You’re moderately detail-oriented by nature but understand the COO role demands significantly more conformity/systems discipline. This is the exact gap CI measures for role fit.</td></tr>\n      </table>\n\n      <h3>Secondary Traits</h3>\n      <table>\n        <tr><th>Trait</th><th>Your Score</th><th>Evidence</th></tr>\n        <tr><td><strong>Logic / Decision Quality</strong></td><td>High (70–80th)</td><td>Analytical, Insightful, Perceptive, Intelligent, Observant, Knowledgeable — selected on both pages. Strong cognitive orientation.</td></tr>\n        <tr><td><strong>Ingenuity / Creativity</strong></td><td>High (65–75th)</td><td>Inventive, Creative, Innovative, Resourceful, Clever — selected on both pages. Unusually high for a COO candidate (typically a Visionary trait).</td></tr>\n        <tr><td><strong>Energy / Drive</strong></td><td>High (75–85th)</td><td>Relentless, Persistent, Ambitious, Agile, Diligent, Purposeful. Very high work energy.</td></tr>\n      </table>"
          },
          {
            "id": "ci-visual",
            "title": "Your CI Pattern (Visual)",
            "html": "<h2>Predicted CI Graph Shape</h2>\n      <p>Culture Index displays results as a line graph across 4 drives. Here’s your predicted pattern:</p>\n\n      <div style=\"background:#f5f5f5; padding:20px; border-radius:8px; font-family:monospace; line-height:1.6; margin:16px 0;\">\n        <strong>Page 1 (Who You Are — solid line)</strong><br>\n        <pre style=\"margin:8px 0;\">\nHigh  |  ██\n      |  ██\n  70  |  ██\n      |  ██                    ▓▓▓  ▓▓▓\n  55  |  ██    ███  ███  ███  ███\n      |        ███  ███  ███\n  40  |\n      |\nLow   |________________________________\n         A      B     C     D   Logic Ing.\n        </pre>\n        <strong>Page 2 (Role Demands — shaded blocks)</strong><br>\n        <span class=\"muted\">██ = Page 1 score  |  ▓▓ = Page 2 higher than Page 1</span>\n      </div>\n\n      <h3>Pattern Name: <strong>\"Strategic Operator\"</strong></h3>\n      <p>Your profile is relatively rare for COO candidates. Most COOs show: moderate A, low-moderate B, moderate-high C, high D. Your pattern reverses the A/D emphasis — high autonomy with moderate-to-high conformity.</p>\n\n      <div class=\"card\">\n        <div class=\"card-header\">What Kevin’s CI Consultant Will See</div>\n        <ul>\n          <li><strong>High A + High Logic + High Ingenuity</strong> = strategic thinker who will challenge assumptions, not just execute. Kevin explicitly said he wants this.</li>\n          <li><strong>The D gap (moderate self → high role)</strong> = you understand the job requires more systems/process discipline than comes naturally, and you’re willing to adapt. This shows maturity and self-awareness.</li>\n          <li><strong>Moderate B with slight upward role shift</strong> = you’re not a natural politician, but you’ll invest in relationship building when the role demands it.</li>\n          <li><strong>44 words on Page 1, 35 on Page 2</strong> = healthy count (CI flags profiles with <15 or >55 words). Your Page 1 count is on the higher side, which may flatten your peaks slightly. The consultant may note this.</li>\n        </ul>\n      </div>"
          },
          {
            "id": "ci-strengths",
            "title": "Strengths & Gaps for the Role",
            "html": "<h2>How Your CI Profile Maps to iRESTORE’s COO Role</h2>\n\n      <h3>Where You’re a Strong Fit</h3>\n      <table>\n        <tr><th>CI Signal</th><th>Job Requirement</th><th>Your Profile</th></tr>\n        <tr><td>High Autonomy</td><td>Kevin wants a partner, not an executor. His #1 frustration with Brandon was lack of proactive thinking.</td><td style=\"background:var(--light-green)\"><strong>Strong match.</strong> Self-confident, commanding, venturesome. You’ll push back and own decisions.</td></tr>\n        <tr><td>High Logic + Ingenuity</td><td>Role requires someone who can design systems, not just follow them. International expansion, B2B launch, EOS implementation all need creative problem-solving.</td><td style=\"background:var(--light-green)\"><strong>Strong match.</strong> Analytical + inventive + insightful = rare COO combination.</td></tr>\n        <tr><td>High Energy / Drive</td><td>$90M → $300M+ in 2–4 years. This is an intense scaling role.</td><td style=\"background:var(--light-green)\"><strong>Strong match.</strong> Relentless, ambitious, agile, persistent.</td></tr>\n        <tr><td>Moderate Patience with upward role shift</td><td>Ops leadership requires patience for process, steady execution, and not rushing to change everything on Day 1.</td><td style=\"background:var(--light-green)\"><strong>Good match.</strong> Patient enough to build systems but not so patient you’ll tolerate dysfunction.</td></tr>\n      </table>\n\n      <h3>Where to Address in Interview</h3>\n      <table>\n        <tr><th>CI Signal</th><th>Potential Concern</th><th>How to Address</th></tr>\n        <tr><td>D gap (moderate → high)</td><td>Consultant may flag: “Naturally moderate on conformity but role requires high.” Could suggest you’ll resist SOPs/documentation.</td><td><strong>“I’ve built operational playbooks at every company I’ve been at. I’m creative in designing systems and rigorous in implementing them. The 80% documentation target in the first 6 months is something I’m genuinely excited about.”</strong></td></tr>\n        <tr><td>High A + Moderate B</td><td>Very high autonomy + moderate social energy can read as “lone wolf” or someone who might bulldoze the team.</td><td><strong>“I lead through clarity and empowerment, not command and control. My teams describe me as someone who sets a clear direction, removes obstacles, and trusts people to execute.”</strong></td></tr>\n        <tr><td>High Ingenuity (unusual for COO)</td><td>CI consultants expect COOs to be lower on creativity. Yours is high, which can raise “are they more Visionary than Integrator?”</td><td><strong>“Kevin told me he doesn’t want a typical COO — he wants a strategic partner. My creativity shows up in how I design systems and solve problems, not in competing with the CEO’s product vision.”</strong></td></tr>\n      </table>\n\n      <div class=\"tip\"><strong>The bottom line:</strong> Your CI profile will show a “Strategic Operator” — someone who thinks like a Visionary but executes like an Integrator. The consultant will likely flag the D gap and the high ingenuity as conversation points. Both are addressable with concrete examples of systems you’ve built and your willingness to prioritize process over personal preference.</div>"
          },
          {
            "id": "ci-archetype",
            "title": "Your Archetype & Kevin's Ideal",
            "html": "<h2>Why Your Profile Is What Kevin Actually Wants</h2>\n      <p>Kevin explicitly described what he does NOT want: <em>\"Someone who's very boxed-in thinking... not thinking proactively or creatively... more of a to-do list task person.\"</em> That's a low-A, low-ingenuity, high-D profile. The classic \"safe\" COO hire.</p>\n\n      <p>What Kevin described wanting: <em>\"A strategic partner who can push back... someone who thinks about things I haven't thought about... truly an equal.\"</em> That's YOUR profile: high A, high logic, high ingenuity, with enough D to build systems.</p>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Your CI Profile vs. Kevin's Stated Preferences</div>\n        <table>\n          <tr><th>Kevin Said He Wants...</th><th>CI Translation</th><th>Your Profile</th></tr>\n          <tr><td>\"Strategic partner, not a task person\"</td><td>High A (autonomy), High Logic</td><td style=\"background:var(--light-green)\">✓ High A, High Logic</td></tr>\n          <tr><td>\"Someone who pushes back\"</td><td>High A, moderate+ B</td><td style=\"background:var(--light-green)\">✓ High A, Moderate B</td></tr>\n          <tr><td>\"Creative problem solver\"</td><td>High Ingenuity</td><td style=\"background:var(--light-green)\">✓ High Ingenuity</td></tr>\n          <tr><td>\"Build systems from scratch\"</td><td>Moderate-High D</td><td style=\"background:var(--light-green)\">✓ Moderate self, High role (shows willingness)</td></tr>\n          <tr><td>\"Patient, builds trust with team\"</td><td>Moderate C, Moderate B</td><td style=\"background:var(--light-green)\">✓ Moderate C and B</td></tr>\n          <tr><td>\"Not afraid to fire people / make hard calls\"</td><td>High A, moderate C (not too patient)</td><td style=\"background:var(--light-green)\">✓ High A, Moderate C</td></tr>\n        </table>\n      </div>\n\n      <div class=\"tip\"><strong>If Kevin's CI consultant flags your profile as \"unconventional for a COO\":</strong> That's actually your selling point. Kevin doesn't want a conventional COO. His exact words were \"a true partner.\" Your CI profile shows you'll be a thought partner AND an executor — not just a process machine.</div>"
          },
          {
            "id": "ci-after",
            "title": "After Your CI Results Come Back",
            "html": "<h2>What to Expect & How to Discuss Results</h2>\n      <p>You've submitted the survey. Here's what happens next and how to handle the results conversation.</p>\n\n      <h3>Timeline & Process</h3>\n      <ul>\n        <li>Results typically come back within 24–48 hours</li>\n        <li>Kevin (or his CI consultant) will review your pattern before discussing it with you</li>\n        <li>Some companies share the full CI report with the candidate; others only discuss highlights. Ask to see your full profile.</li>\n      </ul>\n\n      <h3>If They Share Your Profile</h3>\n      <ul>\n        <li><strong>Own your pattern confidently.</strong> Don't apologize for high autonomy or moderate social energy. Frame it as: \"This is who I am, and here's why it's exactly what you need.\"</li>\n        <li><strong>If they flag the D gap:</strong> \"I'm aware that I'm naturally more of a creative problem solver than a process follower. But the operational systems I've built speak for themselves — I bring discipline to execution because I understand it's what the role demands, not because it's my comfort zone. That self-awareness is actually an advantage.\"</li>\n        <li><strong>If they flag high ingenuity:</strong> \"Kevin told me he wants a strategic partner, not just an executor. My creativity shows up in how I design systems and solve problems — I'm not going to compete with Kevin on product vision.\"</li>\n      </ul>\n\n      <h3>Your Word Count Note</h3>\n      <p>You selected <strong>44 words on Page 1</strong> and <strong>35 on Page 2</strong>. This is within the normal range (CI typically flags <15 or >55). However, 44 on Page 1 is above average and could slightly flatten your peak scores. If asked, you can say: \"I'm a multifaceted person — I genuinely see those traits in myself across different contexts.\"</p>\n\n      <div class=\"tip\"><strong>Key message to convey:</strong> \"My CI profile shows I'm a Strategic Operator — I think like a Visionary but execute like an Integrator. That's rare, and it's exactly why Kevin said he wants a 'true partner' rather than a 'task person.' The gap between my natural profile and my role profile shows I understand what this job demands and I'm ready to meet it.\"</div>"

          {
            "id": "eos-overview",
            "title": "EOS Overview for iRESTORE",
            "html": "<p>The Entrepreneurial Operating System (EOS) is the framework Kevin has chosen for iRESTORE. It's ~60% implemented. Completing it is a core COO/Integrator deliverable. Here's what you need to know.</p>\n\n      <div class=\"card\">\n        <div class=\"card-header\">The 6 Key Components of EOS</div>\n        <table>\n          <tr><th>Component</th><th>What It Is</th><th>iRESTORE Status (est.)</th><th>Your Priority</th></tr>\n          <tr><td><strong>Vision</strong></td><td>V/TO (Vision/Traction Organizer) — shared vision, 10-year target, 3-year picture, 1-year plan, quarterly Rocks</td><td>✅ Mostly done (Kevin is the Visionary)</td><td>Refine and pressure-test the numbers</td></tr>\n          <tr><td><strong>People</strong></td><td>Right People Right Seats (RPRS). GWC framework: Get it, Want it, Capacity to do it.</td><td>⚠️ Partially done. No formal accountability chart.</td><td>Build the accountability chart. Evaluate every seat with GWC.</td></tr>\n          <tr><td><strong>Data</strong></td><td>Scorecard with 5–15 weekly numbers that tell you how the business is doing. Leading indicators, not lagging.</td><td>⚠️ Likely basic. No weekly ops dashboard exists.</td><td>Build the company Scorecard and department-level scorecards.</td></tr>\n          <tr><td><strong>Issues</strong></td><td>IDS (Identify, Discuss, Solve) process. Issues get surfaced in L10s and resolved, not just discussed.</td><td>✅ L10 meetings happen Wednesdays. IDS probably in use.</td><td>Improve discipline. Ensure issues actually get solved, not recycled.</td></tr>\n          <tr><td><strong>Process</strong></td><td>Core processes documented and followed by all. The \"Process Component\" — your 10–20 core processes.</td><td>❌ Likely the weakest. SOPs not documented (JD says 80% target).</td><td>This is your #1 deliverable. Document, systematize, train.</td></tr>\n          <tr><td><strong>Traction</strong></td><td>Quarterly Rocks (3–7 per company, 3–5 per individual) + weekly L10 meetings. The execution engine.</td><td>⚠️ Rocks probably exist but may not be rigorous. L10 cadence is set.</td><td>Sharpen Rock-setting. Ensure Rocks are SMART, have owners, and get done.</td></tr>\n        </table>\n      </div>"
          },
          {
            "id": "eos-vi",
            "title": "The Visionary / Integrator Dynamic",
            "html": "<h3>Kevin = Visionary. You = Integrator.</h3>\n      <p>In EOS, the Visionary and Integrator are the two seats at the top of the accountability chart. They have fundamentally different roles:</p>\n\n      <table>\n        <tr><th>Visionary (Kevin)</th><th>Integrator (You)</th></tr>\n        <tr><td>Big ideas, product vision, relationships</td><td>Execution, systems, accountability</td></tr>\n        <tr><td>Starts 10 things</td><td>Finishes 3 things well</td></tr>\n        <tr><td>Inspires the team</td><td>Manages the team</td></tr>\n        <tr><td>Works ON the business</td><td>Works IN the business</td></tr>\n        <tr><td>Sees opportunities</td><td>Sees obstacles and solves them</td></tr>\n        <tr><td>Culture / brand / innovation</td><td>Profit / people / process</td></tr>\n      </table>\n\n      <div class=\"card\">\n        <div class=\"card-header\">The Same Page Meeting (Critical First Step)</div>\n        <p>Before Day 1 (or during Week 1), you and Kevin need a <strong>Same Page Meeting</strong>. This is an EOS concept where the Visionary and Integrator explicitly align on:</p>\n        <ul>\n          <li><strong>Roles:</strong> What does Kevin own? What do you own? Where's the overlap?</li>\n          <li><strong>Communication:</strong> How often do you sync? What decisions require Kevin's input? What can you decide alone?</li>\n          <li><strong>Conflict resolution:</strong> When you disagree (you will), how do you resolve it? EOS says: the Integrator makes the call on execution; the Visionary makes the call on vision.</li>\n          <li><strong>People decisions:</strong> Hiring, firing, promotions — who has final say? (EOS says the Integrator owns this.)</li>\n          <li><strong>The cardinal rule:</strong> The Visionary never goes around the Integrator to direct reports. Everything flows through the Integrator. This is the hardest rule for founders to follow.</li>\n        </ul>\n      </div>\n\n      <div class=\"tip\"><strong>Interview power move:</strong> Bring up the Same Page Meeting in the interview. \"One of the first things I'd want to do is have a formal Same Page Meeting — it's the EOS framework for aligning the Visionary and Integrator. I want to make sure we're crystal clear on decision rights from Day 1.\" This shows you know EOS at a practitioner level, not just conceptually.</div>"
          },
          {
            "id": "eos-roadmap",
            "title": "EOS Implementation Roadmap",
            "html": "<h3>Getting from 60% → 100% EOS</h3>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Phase 1: Foundation (Days 1–30)</div>\n        <ul>\n          <li>Audit current EOS implementation — what's real vs. what's on paper</li>\n          <li>Attend existing L10 meeting as observer first, then facilitator</li>\n          <li>Review the V/TO (Vision/Traction Organizer) with Kevin — is it current?</li>\n          <li>Identify who on the team \"gets\" EOS vs. who's going through the motions</li>\n          <li>Assess whether they need an EOS Implementer (outside coach) or if you can drive it internally</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Phase 2: Accountability Chart & Scorecard (Days 30–60)</div>\n        <ul>\n          <li><strong>Build the Accountability Chart:</strong> Start with the 5–7 major functions. For each seat: name, 5 roles, GWC assessment. This is where you may discover \"wrong seat\" issues — handle with care.</li>\n          <li><strong>Build the Company Scorecard:</strong> 5–15 weekly numbers. For iRESTORE, likely: weekly revenue, units shipped, return rate, CSAT score, inventory weeks-on-hand, Amazon BSR, DTC conversion rate, marketing ROAS, customer service response time.</li>\n          <li><strong>Department-level Scorecards:</strong> Each team gets 5–8 numbers they own. Reviewed in their L10.</li>\n          <li><strong>Rock-setting:</strong> Review and sharpen existing Rocks. Ensure each is SMART (Specific, Measurable, Attainable, Relevant, Time-bound) with a single owner.</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Phase 3: Process & Traction (Days 60–90+)</div>\n        <ul>\n          <li><strong>Core Process Documentation:</strong> Identify the 10–20 core processes that run the business. For iRESTORE: order-to-ship, new product launch, Amazon listing optimization, customer returns, Shenzhen PO process, Q4 peak planning, hiring, etc.</li>\n          <li><strong>Document at the 80% level:</strong> EOS doesn't want 100-page SOPs. It wants the 20% of steps that cover 80% of the work. \"Followed by all\" is the goal.</li>\n          <li><strong>Quarterly planning (Annual/Quarterly):</strong> Establish the EOS quarterly planning cadence. Annual planning offsite with Kevin and leadership. Quarterly Rock-setting sessions. This becomes the execution heartbeat.</li>\n          <li><strong>Ongoing:</strong> Issues list management, weekly L10 discipline, Rock completion rate tracking (target: 80%+ on-time).</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">EOS Books to Reference</div>\n        <ul>\n          <li><strong>Traction</strong> by Gino Wickman — the EOS bible. Kevin has read this.</li>\n          <li><strong>Rocket Fuel</strong> by Gino Wickman & Mark C. Winters — specifically about the Visionary/Integrator dynamic. <em>Read this before the interview if you haven't.</em></li>\n          <li><strong>Get a Grip</strong> by Gino Wickman — EOS concepts in narrative form (easier to consume).</li>\n          <li><strong>How to Be a Great Boss</strong> by Gino Wickman — managing people in EOS.</li>\n        </ul>\n      </div>"
          },
          {
            "id": "eos-vs-scalingup",
            "title": "EOS vs. Scaling Up — Which OS for iRESTORE?",
            "html": "<div class=\"tip\"><strong>Why this matters for your interview:</strong> iRESTORE is at ~$90M and growing 65–80% YoY. EOS was designed for companies in the $1M–$50M range. Scaling Up (Verne Harnish / \"Rockefeller Habits 2.0\") was built for companies in the $10M–$500M+ range. Kevin chose EOS, but as the business scales past $150M–$200M, you may need to evolve the operating system. Having a point of view on this signals strategic maturity.</div>\n\n<h3>Side-by-Side Comparison</h3>\n<table>\n  <tr><th>Dimension</th><th>EOS (Traction)</th><th>Scaling Up (Rockefeller Habits)</th></tr>\n  <tr><td><strong>Creator</strong></td><td>Gino Wickman</td><td>Verne Harnish</td></tr>\n  <tr><td><strong>Core Framework</strong></td><td>6 Components: Vision, People, Data, Issues, Process, Traction</td><td>4 Decisions: People, Strategy, Execution, Cash</td></tr>\n  <tr><td><strong>Ideal Company Size</strong></td><td>$1M–$50M (10–250 employees). Starts to feel constraining above $50M–$100M for complex orgs.</td><td>$10M–$500M+. Built for companies scaling past founder-led stage into professional management.</td></tr>\n  <tr><td><strong>Philosophy</strong></td><td><strong>Simplicity.</strong> One way to do everything. Prescriptive and rigid by design — that's the point. \"Keep it simple, keep it real.\"</td><td><strong>Flexibility.</strong> Provides tools and frameworks but lets leadership decide how to implement. More sophisticated, more customizable.</td></tr>\n  <tr><td><strong>Strategy Depth</strong></td><td>Light. The V/TO (Vision/Traction Organizer) captures vision in 2 pages. No competitive analysis, brand promise, or BHAG equivalent beyond 10-year target.</td><td>Deep. One-Page Strategic Plan (OPSP), SWT analysis, Brand Promise with KPIs, BHAG, 3–5 year strategic moves, profit-per-X metric.</td></tr>\n  <tr><td><strong>Financial Tools</strong></td><td>Minimal. Scorecard tracks weekly numbers but no cash flow modeling, unit economics, or CCC analysis.</td><td>Strong. Cash Conversion Cycle (CCC), Power of One analysis, Greg Crabtree's \"Simple Numbers,\" Alan Miltz's Cash Flow Story. Cash is an entire pillar.</td></tr>\n  <tr><td><strong>Meeting Cadence</strong></td><td>Weekly L10 (60 min, strict). Quarterly planning. Annual planning.</td><td>Daily huddle (15 min), Weekly meeting (60–90 min), Monthly management, Quarterly planning, Annual planning. More meetings, more granular.</td></tr>\n  <tr><td><strong>People Tools</strong></td><td>Accountability Chart + GWC (Get it, Want it, Capacity). Simple, binary.</td><td>Function Accountability Chart (FACe), Process Accountability Chart (PACe), Topgrading for hiring, A-Player assessments. More nuanced.</td></tr>\n  <tr><td><strong>Goal Setting</strong></td><td>Rocks (quarterly priorities). 3–7 per company, 3–5 per person.</td><td>Critical Number + quarterly priorities + KPIs at every level. Can layer in OKRs.</td></tr>\n  <tr><td><strong>Issue Resolution</strong></td><td>IDS (Identify, Discuss, Solve) in L10s. Clean and fast.</td><td>No prescribed method — flexibility to use whatever works. Some use IDS from EOS.</td></tr>\n  <tr><td><strong>Implementation Time</strong></td><td>3–6 months for core. 12–18 months for full. Lower learning curve.</td><td>6–12 months for core. 18–24 months for full. Steeper learning curve, more sophisticated tools.</td></tr>\n  <tr><td><strong>Coach Required?</strong></td><td>EOS Implementer recommended ($50K–$100K/year). Some companies self-implement.</td><td>Scaling Up Coach recommended ($36K–$120K/year). Harder to self-implement due to complexity.</td></tr>\n</table>\n\n<h3>Where EOS Falls Short at $90M–$200M+</h3>\n<p>EOS is excellent at what it does — creating clarity, rhythm, and accountability. But as iRESTORE scales past $100M, you'll likely hit these limitations:</p>\n<ul>\n  <li><strong>No cash management framework:</strong> At $90M with 80% growth, cash is a strategic weapon. EOS doesn't teach cash conversion cycle, working capital optimization, or how to fund growth internally. iRESTORE's net-150 terms from Shenzhen are a massive cash advantage — Scaling Up would help you quantify and optimize this.</li>\n  <li><strong>Strategy is too thin:</strong> The V/TO is 2 pages. At $200M+ with international expansion, skincare line launch, B2B channel, and potential acquisition targets, you need more strategic depth than EOS provides. Scaling Up's One-Page Strategic Plan and \"7 Strata of Strategy\" are built for this.</li>\n  <li><strong>No daily huddle:</strong> EOS relies on weekly L10s. At 100+ employees across La Mirada, remote marketing, Philippines, and Shenzhen, a daily 15-minute huddle catches problems 5 days faster. This is one of Scaling Up's most powerful tools.</li>\n  <li><strong>Single-layer scorecards:</strong> EOS scorecards work at the company level but get clunky when you need cascading KPIs across multiple departments, channels, and geographies. Scaling Up's approach to cascading metrics is more sophisticated.</li>\n  <li><strong>No \"profit per X\" metric:</strong> Scaling Up asks \"what's the one metric that most directly drives profitability?\" For iRESTORE, this might be \"profit per order\" or \"LTV per customer acquired.\" EOS doesn't have this construct.</li>\n</ul>\n\n<h3>Where Scaling Up Falls Short for iRESTORE</h3>\n<ul>\n  <li><strong>Complexity is the enemy of adoption:</strong> iRESTORE is at 60% EOS and the team already knows the language. Switching to Scaling Up means retraining everyone — Rocks become priorities, L10s become weekly meetings, the vocabulary changes. Kevin chose EOS for a reason: it's simple and his team is bought in.</li>\n  <li><strong>The Visionary/Integrator framework doesn't exist in Scaling Up:</strong> Kevin thinks of himself as the Visionary and wants you as the Integrator. That's EOS language and EOS structure. Scaling Up doesn't have this distinction — and it's the very framework that defines the COO role he's hiring for.</li>\n  <li><strong>Implementation load:</strong> You're joining a $90M company growing 80% YoY with EOS at 60%. The highest-ROI move is completing EOS (getting to 90%+), not starting over with a new system. Scaling Up can come later when the org is stable enough to absorb the complexity.</li>\n  <li><strong>Daily huddles may not fit the culture:</strong> iRESTORE's team is lean, distributed, and moving fast. Adding a daily standup to a team that's already stretched could feel bureaucratic. Test it before mandating it.</li>\n</ul>\n\n<h3>The Hybrid: EOS Foundation + Scaling Up Upgrades</h3>\n<div class=\"card\">\n  <div class=\"card-header\">Recommended Approach for iRESTORE</div>\n  <p><strong>Phase 1 (Months 1–6): Complete EOS to 90%+.</strong> This is the job Kevin is hiring you for. Finish the Accountability Chart, build scorecards, document core processes, sharpen Rocks, own the L10. Don't introduce new frameworks while EOS is half-baked.</p>\n  <p><strong>Phase 2 (Months 6–12): Layer in Scaling Up's financial tools.</strong> Add the Cash Conversion Cycle analysis (critical for a company with net-150 supplier terms and rapid growth). Introduce \"Power of One\" — what happens if you improve price by 1%, volume by 1%, COGS by 1%, CAC by 1%, DSO by 1 day? This is the CFO-level thinking that EOS lacks.</p>\n  <p><strong>Phase 3 (Months 12–18): Upgrade strategy.</strong> When it's time to plan for $200M+, international expansion, and potential M&A, migrate from the V/TO to the One-Page Strategic Plan (OPSP). Keep the EOS execution engine (L10s, Rocks, IDS, Scorecards) but plug in Scaling Up's strategy layer above it. Also consider adding the daily huddle once you have department-level leadership in place.</p>\n</div>\n\n<table>\n  <tr><th>Keep from EOS</th><th>Add from Scaling Up</th></tr>\n  <tr><td>L10 meeting cadence (weekly, Wednesdays)</td><td>Daily huddle (15 min, department level)</td></tr>\n  <tr><td>Rocks (quarterly priorities)</td><td>Critical Number (one metric per quarter that moves the needle most)</td></tr>\n  <tr><td>IDS for issue resolution</td><td>Cash Conversion Cycle + Power of One financial analysis</td></tr>\n  <tr><td>Accountability Chart + GWC</td><td>Topgrading for senior hires</td></tr>\n  <tr><td>Visionary/Integrator dynamic</td><td>One-Page Strategic Plan (replaces V/TO at $200M+)</td></tr>\n  <tr><td>Company & department Scorecards</td><td>Cascading KPIs with \"profit per X\" metric</td></tr>\n  <tr><td>Core Process documentation (80% level)</td><td>Brand Promise with measurable KPIs</td></tr>\n</table>\n\n<div class=\"answer-block\"><strong>How to bring this up in the interview:</strong> \"I believe in completing EOS first — you've invested in it, the team speaks the language, and getting from 60% to 90% implementation will transform your execution. But I'd be transparent: as we scale past $150M, I think we'll want to layer in some Scaling Up financial tools — particularly around cash conversion and unit economics — because EOS is light on the cash and strategy side. The execution engine stays EOS. The strategic planning and financial rigor evolves. It's not either-or — it's EOS as the operating system with Scaling Up upgrades as we grow into them.\"</div>\n\n<div class=\"tip\"><strong>Book to reference:</strong> If Kevin asks, mention <em>Scaling Up</em> by Verne Harnish and <em>Mastering the Rockefeller Habits</em> (the earlier version). But position yourself as \"EOS-first, evolve when ready\" — don't suggest replacing what Kevin built. That's a political mistake.</div>"
          },
          {
            "id": "eos-vocab",
            "title": "EOS Vocabulary Cheat Sheet",
            "html": "<table>\n        <tr><th>Term</th><th>What It Means</th><th>How to Use in Interview</th></tr>\n        <tr><td><strong>V/TO</strong></td><td>Vision/Traction Organizer — 2-page document that captures the company's vision</td><td>\"I'd want to review the V/TO in my first week to align on where we're headed.\"</td></tr>\n        <tr><td><strong>L10</strong></td><td>Level 10 Meeting — weekly leadership meeting, scored 1–10 by participants</td><td>\"I'd take over facilitating the L10 immediately — that's the Integrator's meeting.\"</td></tr>\n        <tr><td><strong>Rocks</strong></td><td>Quarterly priorities (3–7 per company, 3–5 per person)</td><td>\"My first Rock would be completing the Operational Assessment.\"</td></tr>\n        <tr><td><strong>Scorecard</strong></td><td>5–15 weekly numbers on a single page</td><td>\"We'd build a company Scorecard and department-level scorecards within 60 days.\"</td></tr>\n        <tr><td><strong>IDS</strong></td><td>Identify, Discuss, Solve — the issue-resolution process used in L10s</td><td>\"I'd bring this operations issue to the L10 and IDS it with the team.\"</td></tr>\n        <tr><td><strong>GWC</strong></td><td>Gets it, Wants it, Capacity to do it — framework for evaluating people in seats</td><td>\"Part of my 60-day assessment would be GWC-evaluating every seat on the accountability chart.\"</td></tr>\n        <tr><td><strong>RPRS</strong></td><td>Right People, Right Seats</td><td>\"The accountability chart ensures we have RPRS — that's the foundation of everything else.\"</td></tr>\n        <tr><td><strong>Core Focus</strong></td><td>Company's purpose/niche, captured in V/TO</td><td>\"What's iRESTORE's Core Focus beyond hair growth? Is the skincare line within it?\"</td></tr>\n        <tr><td><strong>3-Year Picture</strong></td><td>What the company looks like in 3 years (revenue, people, market position)</td><td>\"What's the 3-Year Picture? Is it $300M? $500M? That shapes everything I build.\"</td></tr>\n        <tr><td><strong>Quarterly Pulsing</strong></td><td>90-day execution cycles that create traction</td><td>\"EOS works because of quarterly pulsing — it creates urgency without burnout.\"</td></tr>\n      </table>"
          }
