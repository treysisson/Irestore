            "id": "org-chart-alt",
            "title": "Alternate Org Chart: Marketing → Kevin",
            "html": "<p><strong>Alternative view:</strong> In this model, the VP of Growth / Marketing reports directly to Kevin (the Visionary) rather than through the COO. This reflects Kevin's deep involvement in brand, product marketing, and growth strategy — areas where Visionaries in EOS often want to stay hands-on.</p>\n\n      <div class=\"org-chart\">\n        <div class=\"org-node ceo\">\n          <div class=\"org-name\">Kevin Chen</div>\n          <div class=\"org-title\">Co-Founder & CEO / Visionary</div>\n          <div class=\"org-note\">Two direct reports: COO + VP of Growth</div>\n        </div>\n        <div class=\"org-connector\"></div>\n        <div class=\"org-row\">\n          <div class=\"org-branch\">\n            <div class=\"org-connector\"></div>\n            <div class=\"org-node you\">\n              <div class=\"org-name\">COO / Integrator (You)</div>\n              <div class=\"org-title\">Chief Operating Officer</div>\n              <div class=\"org-note\">Owns execution & systems</div>\n            </div>\n          </div>\n          <div class=\"org-branch\">\n            <div class=\"org-connector\"></div>\n            <div class=\"org-node\" style=\"border-color: #f57c00; background: #fff3e0;\">\n              <div class=\"org-name\">Junior Reyes</div>\n              <div class=\"org-title\">VP of Growth & Data</div>\n              <div class=\"org-note\">Reports directly to Kevin</div>\n            </div>\n          </div>\n        </div>\n      </div>\n\n      <div style=\"display: flex; gap: 24px; flex-wrap: wrap; margin-top: 8px;\">\n        <div style=\"flex: 1; min-width: 280px;\">\n          <div class=\"org-chart\">\n            <div class=\"org-sub-label\">COO's Direct Reports</div>\n            <div class=\"org-connector\"></div>\n            <div class=\"org-row\">\n              <div class=\"org-branch\">\n                <div class=\"org-connector\"></div>\n                <div class=\"org-node\">\n                  <div class=\"org-name\"><a href=\"https://www.linkedin.com/in/brandon-k-3b99a611/\" target=\"_blank\">Brandon</a></div>\n                  <div class=\"org-title\">Dir. Ops & Supply Chain</div>\n                  <div class=\"org-note\">Overseas ops, logistics<br>La Mirada warehouse</div>\n                </div>\n              </div>\n              <div class=\"org-branch\">\n                <div class=\"org-connector\"></div>\n                <div class=\"org-node\">\n                  <div class=\"org-name\">Longchuan Huang, PhD</div>\n                  <div class=\"org-title\">Product Development</div>\n                  <div class=\"org-note\">~3 months in, from OUAI<br>PhD (UPenn), MBA (UCSD)<br>Native Chinese speaker</div>\n                </div>\n              </div>\n              <div class=\"org-branch\">\n                <div class=\"org-connector\"></div>\n                <div class=\"org-node\">\n                  <div class=\"org-name\">Financial Controller</div>\n                  <div class=\"org-title\">Finance & Accounting</div>\n                  <div class=\"org-note\">Tax & accounting<br>Fractional CFO for strategy</div>\n                </div>\n              </div>\n              <div class=\"org-branch\">\n                <div class=\"org-connector\"></div>\n                <div class=\"org-node\">\n                  <div class=\"org-name\">Amanda Schoep</div>\n                  <div class=\"org-title\">Dir. Customer Experience</div>\n                  <div class=\"org-note\">Promoted Aug 2024<br>3+ yrs at iRESTORE</div>\n                </div>\n              </div>\n            </div>\n          </div>\n        </div>\n        <div style=\"flex: 1; min-width: 280px;\">\n          <div class=\"org-chart\">\n            <div class=\"org-sub-label\" style=\"color: #f57c00;\">Kevin's Marketing Arm</div>\n            <div class=\"org-connector\"></div>\n            <div class=\"org-row\">\n              <div class=\"org-branch\">\n                <div class=\"org-connector\"></div>\n                <div class=\"org-node\" style=\"border-color: #f57c00;\">\n                  <div class=\"org-name\">Dir. Growth Marketing</div>\n                  <div class=\"org-title\">Paid Media & Performance</div>\n                  <div class=\"org-note\">Matt Parmely (Austin, TX)</div>\n                </div>\n              </div>\n              <div class=\"org-branch\">\n                <div class=\"org-connector\"></div>\n                <div class=\"org-node\" style=\"border-color: #f57c00;\">\n                  <div class=\"org-name\">Sr. E-Comm Manager</div>\n                  <div class=\"org-title\">Shopify & Marketplace</div>\n                  <div class=\"org-note\">Amazon, DTC, Costco channels</div>\n                </div>\n              </div>\n              <div class=\"org-branch\">\n                <div class=\"org-connector\"></div>\n                <div class=\"org-node\" style=\"border-color: #f57c00;\">\n                  <div class=\"org-name\">Content & Influencer</div>\n                  <div class=\"org-title\">Brand & Creative</div>\n                  <div class=\"org-note\">Art Director, Influencer Mgr<br>All remote (NY, FL, LV)</div>\n                </div>\n              </div>\n            </div>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">When to Propose This Model</div>\n        <ul>\n          <li><strong>If Kevin signals he wants to stay hands-on with marketing/brand:</strong> \"I could see marketing reporting directly to you — your brand instincts are clearly a competitive advantage. That frees me to focus entirely on operations, supply chain, finance, and scaling the infrastructure.\"</li>\n          <li><strong>Pros:</strong> Kevin keeps direct control of growth levers. COO has a cleaner operational mandate. Avoids tension if Kevin second-guesses marketing decisions made through COO.</li>\n          <li><strong>Cons:</strong> Harder for COO to drive full P&L accountability. Channel-mix optimization requires coordinating across marketing and ops — that gets harder with split reporting. Risk of marketing and ops working in silos.</li>\n          <li><strong>Compromise:</strong> \"Marketing reports to me operationally (budgets, headcount, performance metrics) and to you for creative direction and brand strategy.\" This is common in Visionary/Integrator setups — the Integrator manages the people and processes while the Visionary sets the creative direction.</li>\n        </ul>\n      </div>\n\n      <div class=\"tip\"><strong>EOS perspective:</strong> In a pure EOS model, ALL department heads report to the Integrator. But many Visionaries resist giving up marketing. A dotted-line structure (solid to COO, dotted to Kevin for creative) is the pragmatic middle ground that most EOS coaches recommend.</div>"
          },
          {
            "id": "org-people",
            "title": "Key People Notes",
            "html": "<div class=\"card\">\n        <div class=\"card-header\"><a href=\"https://www.linkedin.com/in/brandon-k-3b99a611/\" target=\"_blank\">Brandon</a> – Director of Operations & Supply Chain</div>\n        <p>This is likely your most direct report (now reports to Kevin, but will report to you as COO). Kevin's assessment:</p>\n        <ul>\n          <li><strong>Strengths:</strong> Reliable executor. \"If you tell him 'figure this out,' he'll figure it out.\" Good at maintaining existing systems.</li>\n          <li><strong>Weaknesses:</strong> Doesn't think proactively or strategically. \"Boxed in\" thinking. The Q4 example: when the warehouse hit capacity, Brandon said \"we can't do anything\" instead of finding creative solutions. Kevin's frustration: \"I shouldn't have to have this conversation with you.\"</li>\n          <li><strong>The Daniel dynamic (now fixed):</strong> Brandon used to report through Daniel Ju, who Kevin described as \"just a messenger for me.\" Kevin hated this layer. Now Brandon reports directly to Kevin. As COO, he'll report to you. Kevin finds this \"way smoother.\"</li>\n          <li><strong>Your approach:</strong> Show respect for what he's built. He's been there through a lot of growth. Position yourself as someone who helps him grow, not replaces him. The reporting change (Daniel → Kevin → you) is an opportunity to reset the relationship. But be prepared for the possibility that he may not be the right person long-term in a scaled org.</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Saima Fariz – Chief of Staff (Replacing Daniel Ju)</div>\n        <p><strong><a href=\"https://www.linkedin.com/in/saimafariz/\" target=\"_blank\">LinkedIn</a></strong> | UC Berkeley (English, High Honors). Career progression from legal/case management into people operations leadership.</p>\n        <ul>\n          <li><strong>Background:</strong> Lyon Law PC (Litigation Case Manager) → Tiger Capital Group (Ops Project Manager → Ops Manager, People Strategy) → CloudKitchens (Partner, Global People Strategy) → Edge (Global Director, HR Operations) → iRESTORE</li>\n          <li><strong>Strengths for iRESTORE:</strong> Deep experience scaling people operations at high-growth companies. CloudKitchens and Tiger Capital are both fast-moving, operations-heavy businesses — relevant to iRESTORE's stage.</li>\n          <li><strong>Your approach:</strong> Saima is likely taking over Daniel's Chief of Staff / HR responsibilities. As COO, you'd work closely with her on hiring, org structure, and people strategy. She's a key ally — the COO and Chief of Staff need to be tightly aligned, especially during the transition period with three simultaneous departures.</li>\n        </ul>\n        <div class=\"tip\"><strong>Onsite:</strong> You'll meet Saima <strong>in-person</strong>. She's a critical relationship — the CoS is your operational partner for people and org-building. Come prepared to discuss how you'd collaborate on the hiring plan and culture during the transition.</div>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Longchuan Huang, PhD – Head of Product Development (New – ~3 months)</div>\n        <p><strong><a href=\"https://www.linkedin.com/in/longchuan-huang/\" target=\"_blank\">LinkedIn</a></strong> | Previously Technical Director, Product Development at <strong>Wella</strong> (haircare/beauty). PhD from UPenn, MBA from UC San Diego. Career spans premium beauty and pharma: Kate Somerville Skincare, Beiersdorf (NIVEA), Janssen (J&J pharma division), plus biotech startups (Nucelis, Phenvogen). Deep regulatory + formulation expertise across cosmetics and medical products.</p>\n        <p>Owns formulations and project management for device development. Kevin retains innovation and tech strategy — staying hands-on with the \"beginning and end\" (vision and breakthrough) while delegating execution in the middle. Native Chinese speaker, which has been \"life-changing\" for Kevin since it dramatically improves communication with the Shenzhen factory.</p>\n        <div class=\"tip\"><strong>Interview edge:</strong> Knowing Longchuan's name and background signals deep research. Say: \"I saw you brought on Longchuan from Wella to lead product development — that tells me you're serious about the skincare pipeline. His regulatory background across cosmetics and pharma is exactly what you need for the MoCRA transition and the topicals expansion.\"</div>\n        <div class=\"tip\"><strong>Onsite:</strong> You'll meet Longchuan <strong>in-person</strong>. As COO, product development execution would flow through you. Come ready to discuss how you'd support his work without stepping on Kevin's innovation role.</div>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Fractional CFO</div>\n        <p>Not named in the conversation. Provides FP&A and strategic finance support that the Financial Controller can't. The Controller handles tax, accounting, and compliance. Kevin mentioned the controller has been there \"a few years\" but is not at the strategic level.</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Father – Manufacturing (Shenzhen)</div>\n        <p>Not a direct report but a critical relationship. Owns the manufacturing facility that's been operating for 40+ years (originally cheap gadgets, pivoted when smartphones killed that market). Provides net-150 payment terms, which fuels iRESTORE's negative cash conversion cycle. Also has sourcing people, engineers, and product designers on the ground — \"almost like mini in-house people.\" They're also sourcing B2B equipment (salon/clinic devices) through this network.</p>\n      </div>"

            "title": "LinkedIn Team Map (Public Data)",
            "html": "<h2>iRESTORE Team Members from Public Sources</h2>\n      <p class=\"muted\">Compiled from LinkedIn, RocketReach, TheOrg, ZoomInfo, and other public directories. ~43 employees per LinkedIn; ~80 FTE + ~50 overseas per Kevin. Use this to prep for who you might meet and understand reporting lines.</p>\n\n      <h3>Leadership / C-Suite</h3>\n      <table>\n        <tr><th>Name</th><th>Title</th><th>Location</th><th>Notes</th></tr>\n        <tr style=\"background:#e8f5e9\"><td><strong><a href=\"https://www.linkedin.com/in/kevin-chen-a5ab6b21/\" target=\"_blank\">Kevin Chen</a></strong></td><td>Co-Founder & CEO</td><td>Brentwood / La Mirada, CA</td><td>Your direct report-to. UC Irvine engineering. From Taiwan, moved to Irvine at age 10.</td></tr>\n        <tr style=\"background:#fff3e0\"><td><strong><a href=\"https://www.linkedin.com/in/saimafariz/\" target=\"_blank\">Saima Fariz</a></strong></td><td>Chief of Staff</td><td>Los Angeles, CA</td><td>UC Berkeley (English, High Honors). Career arc: legal ops → people strategy → HR leadership. Prior: CloudKitchens (Global People Strategy), Edge (Global Dir. HR Ops), Tiger Capital Group (Ops Manager, People Strategy). Deep HR/ops/people background. <strong>Meeting in-person</strong> at onsite.</td></tr>\n      </table>\n\n      <h3>Operations & Supply Chain</h3>\n      <table>\n        <tr><th>Name</th><th>Title</th><th>Location</th><th>Notes</th></tr>\n        <tr><td><strong>Daniel Ju</strong></td><td>Chief of Staff / HR (transitioning out)</td><td>Los Angeles, CA</td><td>UC Berkeley grad. <a href=”https://www.linkedin.com/in/danielju/” target=”_blank”>LinkedIn</a>. Kevin’s college friend, 8.5 years with company. Actual role: Chief of Staff / HR, not SVP of Operations (LinkedIn outdated). Asked Kevin to become COO; Kevin declined. Departing end of April with 60-90 day transition (amicable). Was managing Brandon but served as “just a messenger for me” — Kevin hated this dynamic. Brandon now reports directly to Kevin.</td></tr>\n        <tr style=”background:#fff3e0”><td><strong><a href=”https://www.linkedin.com/in/saimafariz/” target=”_blank”>Saima Fariz</a></strong></td><td>Chief of Staff (replacing Daniel)</td><td>Los Angeles, CA</td><td>UC Berkeley (English, High Honors). Career: Tiger Capital (Ops/People Strategy) → CloudKitchens (Global People Strategy) → Edge (Global Dir. HR Ops) → iRESTORE. Deep HR operations and people strategy background. <strong>Meeting in-person</strong> at onsite.</td></tr>\n        <tr><td><strong><a href=”https://www.linkedin.com/in/brandon-k-3b99a611/” target=”_blank”>Brandon K.</a></strong></td><td>Director of Ops</td><td>Washington State (remote)</td><td><a href=”https://www.linkedin.com/in/brandon-k-3b99a611/” target=”_blank”>LinkedIn</a>. Kevin described in detail: came from Amazon/FBA world. Reliable executor but not strategic. “Boxed in” thinking. Key person you’d manage directly. <strong>Meeting via Zoom</strong> during onsite.</td></tr>\n        <tr><td><strong>Danica Baltazar</strong></td><td>Senior Operations Manager</td><td>Philippines (likely)</td><td><a href=\"https://www.linkedin.com/in/danicadbaltazar/\" target=\"_blank\">LinkedIn</a>. 10+ years in ops, digital marketing, e-commerce. Manages business operations, recruitment, logistics, budgets, employee supervision. Described as “amazing team leader.”</td></tr>\n        <tr><td><strong>Andrew Domagas</strong></td><td>Team Lead</td><td>Cavite, Philippines</td><td><a href=\"https://www.linkedin.com/in/andrew-domagas-01862b28b/\" target=\"_blank\">LinkedIn</a>. Part of the ~50-person overseas team Kevin mentioned.</td></tr>\n      </table>\n\n      <h3>Marketing & Growth</h3>\n      <table>\n        <tr><th>Name</th><th>Title</th><th>Location</th><th>Notes</th></tr>\n        <tr><td><strong>Matt Parmely</strong></td><td>Director of Growth Marketing</td><td>Austin, TX (remote)</td><td><a href=\"https://www.linkedin.com/in/mattparmely/\" target=\"_blank\">LinkedIn</a>. Also listed on <a href=\"https://theorg.com/org/freedom-laser-therapy/org-chart/matt-parmely\" target=\"_blank\">TheOrg</a>. Likely reports to VP of Growth or Kevin directly.</td></tr>\n        <tr><td><strong><a href=\"https://www.linkedin.com/in/reyesjunior/\" target=\"_blank\">Junior Reyes</a></strong></td><td>VP of Growth & Data</td><td>New York, NY (remote)</td><td>Promoted from Head of Paid Acquisition & Data (Nov 2024). Previously Head of Growth at The Perfect Jean; Investor/Advisor at Source Medium (DTC analytics). Manhattanville University, B.A. Math & CS. Posts about AI tools and Claude Code — tech-forward thinker.</td></tr>\n        <tr><td><strong><a href=\"https://www.linkedin.com/in/dianedaykim/\" target=\"_blank\">Diane Dayoung Kim</a></strong></td><td>Head of Performance Creative</td><td>Los Angeles (remote)</td><td>Since Nov 2024. Previously VP of Creative Strategy at Ready Set; Creative Strategy Lead at TubeScience. Also runs Superbloom Creative (consulting). Yale, B.A. Political Science & Media Studies. Deep DTC performance creative expertise.</td></tr>\n        <tr><td><strong><a href=\"https://www.linkedin.com/in/amanda-schoep-5972b1140/\" target=\"_blank\">Amanda Schoep</a></strong></td><td>Director of Customer Experience (departing)</td><td>Irvine, CA</td><td>Promoted Aug 2024 from Sr. Growth Marketing Manager (2+ yrs). 3 yrs 10 mos total at iRESTORE. <strong>Being let go.</strong> Kevin views 25-person CX team as bloated. Not implementing AI; focusing on efficiency instead. Her departure is one of three simultaneous org transitions (Daniel, PM for physical products also departing).</td></tr>\n        <tr><td><strong>Lili Tran</strong></td><td>Senior E-commerce Marketing Manager</td><td>Unknown</td><td><a href=\"https://www.linkedin.com/in/lili-tran-73340623/\" target=\"_blank\">LinkedIn</a>. Previously Senior Project Manager. Manages Shopify / e-commerce marketing.</td></tr>\n        <tr><td><strong><a href=\"https://www.linkedin.com/in/ukkukk/\" target=\"_blank\">Kenny U</a></strong></td><td>eCommerce Web Manager</td><td>Irvine, CA (in-office)</td><td>Since Apr 2024. Previously Project Coordinator at iRESTORE (Aug 2023). General Assembly Software Eng. bootcamp (2022). In-office at La Mirada/Irvine.</td></tr>\n        <tr><td><strong>Natalie Cou</strong></td><td>Influencer & Content Marketing Manager</td><td>Orlando, FL (remote)</td><td><a href=\"https://www.linkedin.com/in/natalie-cou-271796198/\" target=\"_blank\">LinkedIn</a>. Drives influencer partnerships and content strategy.</td></tr>\n        <tr><td><strong>Javier Sanchez Jr.</strong></td><td>Senior Performance Creative Strategist</td><td>Las Vegas, NV (remote)</td><td><a href=\"https://www.linkedin.com/in/javierscv/\" target=\"_blank\">LinkedIn</a>. Chapman University. Focuses on creative strategy for paid media.</td></tr>\n        <tr><td><strong>Catherine Song</strong></td><td>Art Director / Multimedia Designer</td><td>New York (remote)</td><td><a href=\"https://www.linkedin.com/in/song-catherine/\" target=\"_blank\">LinkedIn</a>. 7+ years experience. Brand-focused creative direction.</td></tr>\n      </table>\n\n      <h3>Product Development</h3>\n      <table>\n        <tr><th>Name</th><th>Title</th><th>Location</th><th>Notes</th></tr>\n        <tr><td><strong><a href=\"https://www.linkedin.com/in/longchuan-huang/\" target=\"_blank\">Longchuan Huang, PhD</a></strong></td><td>Head of Product Development</td><td>Los Angeles, CA</td><td>~3 months in. Previously Technical Director at Wella (haircare/beauty). PhD (UPenn), MBA (UCSD). Prior: Kate Somerville, Beiersdorf, Janssen (J&J). Owns formulations + project management for device development. Kevin retains innovation/tech strategy. Native Chinese speaker — key for Shenzhen factory communication.</td></tr>\n      </table>\n\n      <h3>Finance</h3>\n      <table>\n        <tr><th>Name</th><th>Title</th><th>Location</th><th>Notes</th></tr>\n        <tr><td><strong>Angel Chao</strong></td><td>Financial Controller</td><td>Mission Viejo, CA (in-office)</td><td><a href=\"https://www.linkedin.com/in/angel-chao-449a8877/\" target=\"_blank\">LinkedIn</a>. UCLA Economics, Cal Poly Pomona Masters. Kevin described: been there “a few years,” handles tax & accounting but not strategic FP&A. Fractional CFO provides the strategy layer.</td></tr>\n      </table>\n\n      <h3>Other / Former</h3>\n      <table>\n        <tr><th>Name</th><th>Title</th><th>Notes</th></tr>\n        <tr><td><strong>Isaac Taylor</strong></td><td>Chief Revenue Officer (former?)</td><td>Also listed as Growth Strategist at Mobile1st. May have departed — Kevin didn’t mention a CRO.</td></tr>\n        <tr><td><strong>Charisse Curtis</strong></td><td>Head of Public Relations (former)</td><td>Left to join Ast as Chief Commercial Officer.</td></tr>\n      </table>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Key Insights for Your Interview</div>\n        <ul>\n          <li><strong>Marketing is 100% remote and distributed</strong> (NY, Austin, Las Vegas, Orlando, FL). You’d need to manage a distributed team. This is a strength for you if you have remote management experience.</li>\n          <li><strong>The Philippines team (~50 people)</strong> handles customer support, marketing associates, and some ops. Danica Baltazar and Andrew Domagas appear to be key leaders there.</li>\n          <li><strong>Daniel Ju as SVP of Operations</strong> is interesting — Kevin described the ops lead as “Brandon,” and Daniel’s title suggests he may be senior to Brandon. Clarify the reporting relationship in interview.</li>\n          <li><strong>No Head of Sales found on LinkedIn.</strong> Kevin mentioned they just launched B2B. A WayUp job posting for “Head of Sales” exists, suggesting this may be an open or recently filled role.</li>\n          <li><strong>Head of Product Development</strong> — <a href=\"https://www.linkedin.com/in/longchuan-huang/\" target=\"_blank\">Longchuan Huang, PhD</a>. ~3 months in, from OUAI Haircare. Previously at Kate Somerville, Beiersdorf, Janssen. PhD (UPenn), MBA (UCSD). Native Chinese speaker. Serious R&D hire signaling skincare/topicals expansion.</li>\n        </ul>\n      </div>\n\n      <div class=”card”>\n        <div class=”card-header”>Org in Transition: Three Departures Happening Simultaneously</div>\n        <p><strong>This is critical intel for your onboarding plan.</strong> When you join as COO, you’re walking into an organization with three concurrent departures:</p>\n        <ul>\n          <li><strong>Daniel Ju (Chief of Staff / HR):</strong> Leaving end of April with 60-90 day transition. Kevin’s college friend of 8.5 years — the departure is amicable but real.</li>\n          <li><strong>Amanda Schoep (Director of Customer Experience):</strong> Being let go. Kevin views the 25-person CX team as bloated and is rightsizing without implementing AI — pure efficiency play.</li>\n          <li><strong>Product Manager (Physical Products):</strong> Also departing. This is the R&D team focused on hardware.</li>\n        </ul>\n        <p><strong>Implications for you:</strong></p>\n        <ul>\n          <li>First 90 days will be about stabilizing the team and filling critical gaps (especially CX, PD PM).</li>\n          <li>Brandon is now directly under Kevin (no longer through Daniel), which should be smoother operationally.</li>\n          <li>You inherit the hiring and restructuring responsibility — this is an opportunity to reshape the org chart to match your vision.</li>\n          <li>Risk: three departures + new COO could create cultural instability. Your early messaging on continuity and direction is critical.</li>\n        </ul>\n      </div>"

            "id": "org-structure",
            "title": "Structural Notes",
            "html": "<ul>\n        <li><strong>No C-suite:</strong> Kevin is the only executive. Everyone else is VP/Director level. The COO would be the first C-level hire.</li>\n        <li><strong>Kevin's Role: Value Creation; COO's Role: Value Protection</strong> — From the Mar 13 interview: Kevin owns marketing, sales, product innovation, and distribution (the \"value creation\" side). COO owns operations, finance, CX, and supply chain (the \"value protection\" side). <strong>This is NOT a traditional V/I model where everything flows through one person.</strong> Kevin and COO have distinct domains. Kevin stays hands-on with growth and innovation; COO ensures execution and efficiency.</li>\n        <li><strong>EOS at ~60%:</strong> They've adopted the Entrepreneurial Operating System but aren't fully implemented. L10 leadership meeting happens Wednesday mornings. Completing EOS implementation is a key deliverable for the COO.</li>\n        <li><strong>Kevin is the final interview for all hires:</strong> This is eating into his time significantly. Delegating hiring decisions (except for key roles) is something the COO should take over.</li>\n        <li><strong>Kevin still leads product development:</strong> Despite having a new Head of PD, Kevin is still \"a little bit too involved.\" The COO taking over operational oversight frees Kevin to focus on innovation and vision only.</li>\n        <li><strong>Hybrid model:</strong> Ops, warehouse, and finance are in-person at La Mirada. Marketing is remote. The expectation for the COO role is in-office presence — \"drive in once or twice a week, hang out with the team.\"</li>\n        <li><strong>B2B is brand new:</strong> They just launched a B2B sales division targeting clinics and hair salons. These are higher-priced machines (~$10K) that they won't manufacture themselves — sourcing through the Shenzhen network.</li>\n      </ul>"

            "title": "Product Portfolio",
            "html": "<div class=\"card\">\n        <div class=\"card-header\">Hair Growth Devices (Core)</div>\n        <p>FDA-cleared low-level laser therapy (LLLT) helmets and caps. Multiple price points from ~$600 to $1,400+. This is the category where they dominate with 60-70% Amazon market share. Clinical studies supporting efficacy. Macro tailwind: influencers (Bryan Johnson, Huberman) driving massive organic demand for hair growth.</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Skincare Devices (Growth Engine)</div>\n        <p>LED face masks, skincare wands, and related devices. Newer category but massive TAM — skincare is 20x the addressable market of hair therapy. This is where the long-term growth story lives. Competitors in this space include CurrentBody, Dr. Dennis Gross, Omnilux, and FOREO.</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Super Premium Hair Growth</div>\n        <p>Recently launched higher-end product that \"fundamentally changed the business.\" Higher ASP, higher margins.</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">B2B / Professional (New)</div>\n        <p>Just launched — targeting clinics, hair salons, and medical professionals. ~$10K devices sourced (not manufactured) through the Shenzhen network. Sales team hired, going after Revian's eight-figure B2B business. Kevin: \"We're the bullies now.\"</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Body / Red Light Therapy (Q2 2026)</div>\n        <p>Full-body panels + red light belt launching Q2. $500K initial PO on zero sales — high confidence from $50M/year competitor data. Belt targets office workers (back pain) and women (FDA-clearable fat loss claims). DTC-focused; separate Costco SKU with scaled-back specs.</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Channel Expansion Pipeline</div>\n        <p><strong>QVC:</strong> Final stages of diligence, about to be greenlit. Eight-figure channel for competitors.<br>\n        <strong>Costco inline:</strong> Pushing for in-store placement after successful online mask sales. Shark \"blazing the trail.\"<br>\n        <strong>B2B clinics:</strong> Sales team hired, going after Revian's eight-figure clinic business.</p>\n      </div>"

            "title": "Estimated P&L — $90M (2025)",
            "html": "<div class=\"warning\"><strong>⚠ These are modeled estimates, not actual financials.</strong> The only confirmed number is ~$90M+ net revenue (from the JD). All line-item breakdowns below are educated guesses based on DTC beauty-device benchmarks and public comps. Actual CAC, fulfillment costs, margins, and OpEx could differ significantly. Use this as a <em>framework for asking smart questions</em> in the interview, not as a statement of fact.</div>\n\n<div class=\"tip\"><strong>Source:</strong> $90M+ net revenue from iRESTORE's own JD. Main view shows the traditional P&L waterfall through 4 profit layers. Scroll down for the <strong>\"4 Quarters of a Dollar\"</strong> alternate view.</div>\n\n<h3>Estimated Channel Mix (basis for P&L below)</h3>\n<table>\n  <tr><th>Channel</th><th>Est. Revenue</th><th>% Mix</th><th>Basis</th></tr>\n  <tr><td>Amazon</td><td>$45M</td><td>50%</td><td>60–70% of hair growth category; dominant share</td></tr>\n  <tr><td>DTC (Shopify)</td><td>$27M</td><td>30%</td><td>iRESTORE.com; growing as brand matures</td></tr>\n  <tr><td>Costco / Wholesale</td><td>$13.5M</td><td>15%</td><td>Costco.com + expanding to in-store</td></tr>\n  <tr><td>B2B / Other</td><td>$4.5M</td><td>5%</td><td>New clinic/salon channel; early stage</td></tr>\n</table>\n\n<h3>4 Layers of DTC Profitability</h3>\n<p class=\"muted\">Each layer subtracts a cost category, showing how $90M of revenue cascades to profit:</p>\n<table>\n  <tr><th>Profit Layer</th><th>$ (M)</th><th>Margin</th><th>What It Tells You</th><th>DTC Benchmark</th></tr>\n  <tr style=\"background:#e8f5e9\"><td><strong>① Gross Profit</strong><br><span style=\"font-size:0.85em\">Revenue – COGS</span></td><td><strong>$60.3</strong></td><td><strong>67%</strong></td><td>Can we make money on the product itself?</td><td>60–70%</td></tr>\n  <tr style=\"background:#e3f2fd\"><td><strong>② Contribution Margin</strong><br><span style=\"font-size:0.85em\">GP – CAC – Channel Costs</span></td><td><strong>$29.5</strong></td><td><strong>33%</strong></td><td>Can we profitably acquire & deliver to a customer?</td><td>25–40%</td></tr>\n  <tr style=\"background:#fff3e0\"><td><strong>③ EBITDA</strong><br><span style=\"font-size:0.85em\">CM – OpEx</span></td><td><strong>$14.3</strong></td><td><strong>16%</strong></td><td>Can the business generate cash from operations?</td><td>10–22%</td></tr>\n  <tr style=\"background:#fce4ec\"><td><strong>④ Free Cash Flow</strong><br><span style=\"font-size:0.85em\">EBITDA – CapEx – Working Capital</span></td><td><strong>~$10–12</strong></td><td><strong>~11–13%</strong></td><td>What's left to reinvest or distribute?</td><td>8–15%</td></tr>\n</table>\n<div class=\"tip\"><strong>Interview framing:</strong> \"I evaluate every DTC business through 4 profit layers. iRESTORE's 67% gross margin is excellent — the product economics are strong. The question is what happens between gross profit and EBITDA. Today 51 points of margin get absorbed by acquisition, fulfillment, channel fees, and overhead. My job is to compress that gap — every point I recover on a $90M base is nearly a million dollars to the bottom line.\"</div>\n\n<h3>Detailed P&L — $90M Net Revenue</h3>\n<table>\n  <tr><th>Line Item</th><th>$ (M)</th><th>% Rev</th><th>Notes</th></tr>\n  <tr style=\"background:var(--light-blue)\"><td colspan=\"4\"><strong>REVENUE</strong></td></tr>\n  <tr><td>Gross Revenue</td><td>$105.0</td><td>117%</td><td>Before returns/discounts</td></tr>\n  <tr><td>&nbsp;&nbsp;Returns & Allowances</td><td>($10.5)</td><td>(12%)</td><td>Scorecard target: &lt;8%. Current est. 10–12%.</td></tr>\n  <tr><td>&nbsp;&nbsp;Discounts & Promos</td><td>($4.5)</td><td>(5%)</td><td>Amazon coupons, DTC promos, Costco deals</td></tr>\n  <tr class=\"highlight-row\"><td><strong>Net Revenue</strong></td><td><strong>$90.0</strong></td><td><strong>100%</strong></td><td><strong>Per JD: \"$90M+ Revenue\"</strong></td></tr>\n  <tr style=\"background:var(--light-blue)\"><td colspan=\"4\"><strong>COST OF GOODS SOLD</strong></td></tr>\n  <tr><td>Product Manufacturing</td><td>($22.5)</td><td>(25%)</td><td>Father's Shenzhen facility; family pricing; net-150 terms</td></tr>\n  <tr><td>&nbsp;&nbsp;Inbound Freight & Duties</td><td>($5.4)</td><td>(6%)</td><td>Ocean freight + customs</td></tr>\n  <tr><td>&nbsp;&nbsp;Packaging & Inserts</td><td>($1.8)</td><td>(2%)</td><td>Box, manuals, warranty cards</td></tr>\n  <tr><td><strong>Total COGS</strong></td><td><strong>($29.7)</strong></td><td><strong>(33%)</strong></td><td></td></tr>\n  <tr class=\"highlight-row\" style=\"background:#e8f5e9\"><td><strong>① GROSS PROFIT</strong></td><td><strong>$60.3</strong></td><td><strong>67%</strong></td><td><strong>Strong for device category</strong></td></tr>\n  <tr style=\"background:var(--light-blue)\"><td colspan=\"4\"><strong>CUSTOMER ACQUISITION (CAC)</strong></td></tr>\n  <tr><td>Amazon PPC (Sponsored Ads)</td><td>($7.0)</td><td>(8%)</td><td>60–70% of category; dominant share = high PPC spend</td></tr>\n  <tr><td>Meta / Google / TikTok Ads</td><td>($6.5)</td><td>(7%)</td><td>DTC acquisition; creative-driven performance</td></tr>\n  <tr><td>Influencer & Affiliates</td><td>($1.8)</td><td>(2%)</td><td>Dermatologist partnerships, beauty creators</td></tr>\n  <tr><td><strong>Total CAC</strong></td><td><strong>($15.3)</strong></td><td><strong>(17%)</strong></td><td></td></tr>\n  <tr style=\"background:var(--light-blue)\"><td colspan=\"4\"><strong>CHANNEL & FULFILLMENT COSTS</strong></td></tr>\n  <tr><td>Amazon Referral Fees</td><td>($4.5)</td><td>(5%)</td><td>~10% of $45M Amazon rev (beauty category rate)</td></tr>\n  <tr><td>Amazon FBA / Fulfillment</td><td>($5.9)</td><td>(6.5%)</td><td>~13% of Amazon rev — pick/pack/ship + storage. Devices are heavy/oversized = higher FBA fees</td></tr>\n  <tr><td>DTC Fulfillment & Shipping</td><td>($2.7)</td><td>(3%)</td><td>~10% of $27M DTC rev — La Mirada pick/pack + outbound carrier costs</td></tr>\n  <tr><td>DTC Payment Processing</td><td>($0.8)</td><td>(1%)</td><td>~3% of DTC rev — Shopify + Stripe/payment gateway</td></tr>\n  <tr><td>Costco Co-op, Freight & Compliance</td><td>($1.6)</td><td>(2%)</td><td>Marketing allowances, freight to Costco DC, chargeback/compliance fees</td></tr>\n  <tr><td><strong>Total Channel Costs</strong></td><td><strong>($15.5)</strong></td><td><strong>(17%)</strong></td><td></td></tr>\n  <tr class=\"highlight-row\" style=\"background:#e3f2fd\"><td><strong>② CONTRIBUTION MARGIN</strong></td><td><strong>$29.5</strong></td><td><strong>33%</strong></td><td><strong>After acquiring & delivering to customer</strong></td></tr>\n  <tr style=\"background:var(--light-blue)\"><td colspan=\"4\"><strong>OPERATING EXPENSES (OpEx)</strong></td></tr>\n  <tr><td>People (Salary + Benefits)</td><td>($8.1)</td><td>(9%)</td><td>~80 FTE + 50 overseas + contractors</td></tr>\n  <tr><td>PR, Events & Brand</td><td>($1.4)</td><td>(1.5%)</td><td>Retail launch events, earned media</td></tr>\n  <tr><td>Email / SMS / Retention</td><td>($0.5)</td><td>(0.5%)</td><td>Post-purchase flows, lifecycle marketing</td></tr>\n  <tr><td>Technology & Software</td><td>($1.6)</td><td>(2%)</td><td>Fulfil.io ERP, Shopify, analytics stack</td></tr>\n  <tr><td>Rent & Facilities</td><td>($1.2)</td><td>(1%)</td><td>La Mirada warehouse/office</td></tr>\n  <tr><td>Professional Services</td><td>($0.8)</td><td>(1%)</td><td>Fractional CFO, legal, accounting</td></tr>\n  <tr><td>G&A / Other</td><td>($1.6)</td><td>(2%)</td><td>Insurance, travel, misc</td></tr>\n  <tr><td><strong>Total OpEx</strong></td><td><strong>($15.2)</strong></td><td><strong>(17%)</strong></td><td></td></tr>\n  <tr class=\"highlight-row\" style=\"background:#fff3e0\"><td><strong>③ EBITDA</strong></td><td><strong>$14.3</strong></td><td><strong>16%</strong></td><td><strong>Realistic for high-growth DTC at scale</strong></td></tr>\n  <tr style=\"background:var(--light-blue)\"><td colspan=\"4\"><strong>BELOW EBITDA (ESTIMATED)</strong></td></tr>\n  <tr><td>D&A (tooling, molds, patents)</td><td>($1.5)</td><td>(2%)</td><td>Estimated; device molds + IP amortization</td></tr>\n  <tr><td>CapEx (new products, tooling)</td><td>($2.0)</td><td>(2%)</td><td>Skincare wand, new helmet iterations</td></tr>\n  <tr><td>Working Capital Changes</td><td>($1.0)</td><td>(1%)</td><td>Inventory build for new launches</td></tr>\n  <tr class=\"highlight-row\" style=\"background:#fce4ec\"><td><strong>④ FREE CASH FLOW (est.)</strong></td><td><strong>~$9.8</strong></td><td><strong>~11%</strong></td><td><strong>Good cash generation; net-150 terms from factory help</strong></td></tr>\n</table>\n\n<h3>Alternate View: \"4 Quarters of a Dollar\"</h3>\n<p class=\"muted\">Every $1 of net revenue splits into 4 buckets that sum to 100%:</p>\n<table>\n  <tr>\n    <th>Quarter</th>\n    <th>$ (M)</th>\n    <th>¢ per $1</th>\n    <th>What's Included</th>\n    <th>DTC Benchmark</th>\n  </tr>\n  <tr style=\"background:#e8f5e9\"><td><strong>① Profit</strong></td><td><strong>$14.3</strong></td><td><strong>16¢</strong></td><td>EBITDA — what's left after everything</td><td>10–22¢</td></tr>\n  <tr style=\"background:#fff3e0\"><td><strong>② Cost of Delivery</strong></td><td><strong>$45.2</strong></td><td><strong>50¢</strong></td><td>COGS ($29.7M) + Channel & Fulfillment ($15.5M)</td><td>40–55¢</td></tr>\n  <tr style=\"background:#ffebee\"><td><strong>③ Cost of Acquisition</strong></td><td><strong>$15.3</strong></td><td><strong>17¢</strong></td><td>Amazon PPC + paid media + influencers</td><td>15–25¢</td></tr>\n  <tr style=\"background:#e3f2fd\"><td><strong>④ OpEx</strong></td><td><strong>$15.2</strong></td><td><strong>17¢</strong></td><td>People + tech + rent + G&A + brand marketing</td><td>15–25¢</td></tr>\n  <tr class=\"highlight-row\"><td><strong>TOTAL</strong></td><td><strong>$90.0</strong></td><td><strong>100¢</strong></td><td></td><td></td></tr>\n</table>\n<div class=\"tip\"><strong>Interview framing:</strong> \"I think about every DTC dollar in 4 quarters — 16 cents is profit, 50 cents is cost of delivery, 17 cents goes to acquiring the customer, and 17 cents runs the business. The biggest lever at iRESTORE is compressing cost of delivery — that's half of every dollar, and it includes channel fees, FBA costs, fulfillment, and COGS. Returns alone could shift 2–4 cents from delivery to profit. And every cent on a $90M base is $900K.\"</div>"

            "id": "amazon-position",
            "title": "Amazon Market Position",
            "html": "<h3>iRESTORE's Amazon Dominance</h3>\n<p>Kevin confirmed: iRESTORE holds <strong>over 50% market share</strong> in laser hair growth devices on Amazon (he was initially quoted as 60–70%, but clarified in the March 13 interview it's \"over 50%\"). This is still an extraordinary position. Here's what it means operationally.</p>\n\n      <div class=\"card\">\n        <div class=\"card-header\">What 60–70% Amazon Market Share Looks Like</div>\n        <ul>\n          <li><strong>Best Seller Rank (BSR):</strong> iRESTORE likely holds the #1 or #2 BSR in the \"Hair Growth Devices\" category consistently. This drives organic traffic — Amazon's algorithm rewards sales velocity.</li>\n          <li><strong>Review moat:</strong> 29,000+ reviews creates an almost insurmountable competitive barrier. New entrants can't replicate this. Reviews drive conversion rate, which drives BSR, which drives more traffic.</li>\n          <li><strong>Pricing power:</strong> At 60–70% share, iRESTORE can set category pricing. Competitors price relative to iRESTORE, not the other way around.</li>\n          <li><strong>Amazon's incentives align:</strong> Amazon wants to feature products that sell. iRESTORE's dominance means Amazon gives them preferential placement, deal access, and potentially lower advertising costs (higher relevance scores).</li>\n        </ul>\n      </div>\n\n      <div class=\"tip\"><strong>Important note:</strong> The channel-level revenue split (what % of total iRESTORE revenue comes from Amazon vs. DTC vs. wholesale) was NOT disclosed in the first interview. This is a critical data point to get in the second interview — it affects margin analysis, growth strategy, and operational priorities.</div>"

          {
            "id": "amazon-strategic",
            "title": "Amazon's Strategic Role in the Business",
            "html": "<h3>Amazon as Research Platform vs. Revenue Channel</h3>\n\n<p>Kevin described Amazon's role in iRESTORE's growth strategy differently in the March 13 interview. It's not just a revenue channel—it's a research and validation platform.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">Amazon as Research Platform</div>\n  <p>For high-ticket items like laser hair growth devices, customers use Amazon to research, read reviews, and see before/after results. Then they often convert directly on iRESTORE's DTC site. Kevin said: \"Amazon serves as our research platform for high-ticket items — customers see reviews then buy DTC.\" This changes how to think about Amazon profitability — the channel may drive more DTC revenue than appears on the P&L.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Revenue Mix & Growth</div>\n  <p>Amazon is \"about just under a third\" of iRESTORE's total revenue. This is a significant but no longer dominant channel (in earlier years it was 60–70% of revenue when Costco and DTC were smaller). The channel has matured but remains highly profitable and a strong traffic driver.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Warranty Inserts & Review Funnel Mechanics</div>\n  <p>Kevin emphasized that warranty inserts drive the review funnel more effectively than DTC conversion. This means the COO should prioritize: (1) getting warranty registrations in every box shipped to Amazon, (2) timely follow-up email to customers asking for reviews at the right time in their usage journey, (3) tracking which review cohorts convert best to repeat purchases or DTC. The warranty funnel is the primary lever for building social proof, not just DTC retargeting.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">SKU-to-Channel Fit Strategy</div>\n  <p>iRESTORE uses different specs, pricing, and positioning for the same product across channels. Hair device specs/pricing differs for Amazon vs. DTC vs. Costco based on channel customer expectations and competitive positioning. This requires close coordination between product, supply chain, and marketing teams to ensure inventory allocation and messaging align.</p>\n</div>"

            "id": "amazon-ops",
            "title": "Amazon Operations Framework",
            "html": "<h3>What a COO Needs to Know About Amazon at Scale</h3>\n\n      <div class=\"card\">\n        <div class=\"card-header\">FBA (Fulfilled by Amazon) vs. FBM (Fulfilled by Merchant)</div>\n        <ul>\n          <li><strong>FBA:</strong> iRESTORE ships inventory to Amazon warehouses. Amazon handles pick/pack/ship + customer service. Products get Prime badge. Fees: ~15–20% total (referral 8% + FBA fees $5–7/unit for device-sized products).</li>\n          <li><strong>FBM:</strong> iRESTORE ships directly from La Mirada. Lower fees (~8% referral only) but no Prime badge. Seller Fulfilled Prime (SFP) is an option — keep Prime badge while shipping from your own warehouse.</li>\n          <li><strong>The question to ask:</strong> \"What's the current FBA/FBM split? And have you evaluated Seller Fulfilled Prime for the higher-priced devices?\"</li>\n          <li><strong>COO opportunity:</strong> Optimizing the FBA/FBM mix is a direct margin lever. For higher-ASP items ($600–$1,400), FBM or SFP may save $10–20/unit vs. FBA.</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">AWD (Amazon Warehousing & Distribution) — The Hidden Margin Lever</div>\n        <ul>\n          <li><strong>What it is:</strong> Amazon's upstream bulk storage program. You ship pallets to AWD warehouses at lower storage rates, and Amazon automatically replenishes FBA fulfillment centers as needed. Think of it as a staging layer between your 3PL and FBA.</li>\n          <li><strong>Why it matters for iRESTORE:</strong> FBA storage fees are brutal for devices — large boxes, long dwell times, and Q4 surcharges. AWD storage rates are typically <strong>50–70% cheaper</strong> than FBA storage, with no long-term storage fees and no Q4 surcharges.</li>\n          <li><strong>The margin math:</strong> For a device-sized product (~$5–8/unit in FBA storage fees during peak), shifting bulk inventory to AWD and auto-replenishing FBA can save <strong>$2–4/unit in storage costs</strong>. At iRESTORE's Amazon volume, that's potentially $500K–$1M+ annually in recovered margin.</li>\n          <li><strong>Additional benefits:</strong> AWD inventory counts toward your IPI score positively. Auto-replenishment reduces stockout risk during demand spikes. No per-unit fee for inbound — just storage.</li>\n          <li><strong>COO opportunity:</strong> If iRESTORE is shipping everything direct to FBA, they're likely overpaying on storage. Implementing AWD as a buffer layer is a quick operational win — no customer impact, pure margin improvement. Ask: \"Are you using AWD for bulk staging, or is everything going direct to FBA?\"</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">IPI Score (Inventory Performance Index)</div>\n        <ul>\n          <li><strong>What it is:</strong> Amazon's score (0–1000) measuring how efficiently you manage FBA inventory. Based on: excess inventory, sell-through rate, stranded inventory, in-stock rate.</li>\n          <li><strong>Why it matters:</strong> Below 400 = storage limits. Below 350 = severe restrictions. For a company with iRESTORE's volume, an IPI issue could mean they can't send enough inventory to Amazon during peak season.</li>\n          <li><strong>COO action:</strong> Monitor weekly. Ensure excess inventory is removed or liquidated. Keep sell-through velocity high. This is a Brandon-level operational task that needs oversight.</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Amazon PPC (Pay-Per-Click Advertising)</div>\n        <ul>\n          <li><strong>Key metrics:</strong> ACoS (Advertising Cost of Sales) = ad spend ÷ ad revenue. TACoS (Total ACoS) = ad spend ÷ total revenue (including organic). The gap between ACoS and TACoS shows brand strength.</li>\n          <li><strong>At iRESTORE's scale:</strong> They're likely spending $X M/year on Amazon PPC. Target ACoS for beauty devices is typically 15–25%. At their market share, they may be able to reduce without losing position.</li>\n          <li><strong>COO opportunity:</strong> PPC efficiency is a profit lever. Better keyword segmentation, negative keyword management, dayparting, and bid optimization can reduce ACoS by 2–5pp. At their scale, each point matters.</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Long-Term Storage Fees & Seasonal Planning</div>\n        <ul>\n          <li><strong>The trap:</strong> Amazon charges $6.90/cubic foot for inventory stored 271–365 days, and surcharges for 365+ days. For devices that take up significant space, this adds up fast.</li>\n          <li><strong>Q4 planning:</strong> Amazon raises storage fees from October–December. You need to pre-position inventory by September. But overshipping = long-term storage fees. Undershipping = lost sales during peak.</li>\n          <li><strong>The math:</strong> With 60–90 day Shenzhen lead times + 30 day ocean freight, Q4 inventory decisions happen in May–June. This is why demand planning matters so much.</li>\n        </ul>\n      </div>"

            "id": "amazon-growth",
            "title": "Amazon Growth Levers",
            "html": "<h3>Opportunities a COO Can Drive</h3>\n\n      <div class=\"card\">\n        <div class=\"card-header\">1. Listing Optimization</div>\n        <ul>\n          <li><strong>A+ Content / Brand Store:</strong> iRESTORE likely has A+ content, but is it optimized? Periodic refresh (new images, updated claims, video content) can improve conversion rate 3–10%.</li>\n          <li><strong>SEO (Amazon Search):</strong> Keyword research for backend search terms. Amazon's algorithm weights title, bullet points, and backend keywords differently. Fresh keyword research every quarter.</li>\n          <li><strong>Virtual bundles:</strong> Bundle hair device + serum + supplements at a slight discount. Increases AOV, improves BSR, and creates a competitive moat (harder to comparison-shop).</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">2. Amazon-to-DTC Bridge</div>\n        <ul>\n          <li><strong>The strategic goal:</strong> Every Amazon customer who becomes a DTC repeat buyer improves margins (no Amazon fees on repeat purchases). This is the single biggest margin optimization lever.</li>\n          <li><strong>Tactics:</strong> Product inserts with QR codes (compliance-friendly — can't direct to DTC, but can offer warranty registration, exclusive content, or loyalty program). Post-purchase email if opted in.</li>\n          <li><strong>Subscribe & Save:</strong> For consumables (serums, supplements), Amazon Subscribe & Save locks in recurring revenue and prevents competitive switching.</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">3. International Amazon Marketplaces</div>\n        <ul>\n          <li><strong>Amazon Global Selling:</strong> US sellers can expand to UK, Germany, Japan, Australia, Canada with relatively low friction. FBA handles local fulfillment.</li>\n          <li><strong>Priority markets:</strong> Amazon UK → Amazon DE → Amazon Japan (see International section for regulatory requirements).</li>\n          <li><strong>Quick wins:</strong> Amazon Canada and Amazon Australia are the lowest-friction entries from a US base.</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">4. Amazon Vendor Central vs. Seller Central</div>\n        <ul>\n          <li><strong>Current (likely):</strong> iRESTORE is probably on Seller Central (3P) — they control pricing, listings, and fulfillment.</li>\n          <li><strong>Vendor Central (1P):</strong> Amazon buys wholesale from you and resells. You lose pricing control but gain access to AMS (Amazon Marketing Services) and potentially better placement.</li>\n          <li><strong>Recommendation:</strong> Stay 3P at this stage. 1P means Amazon controls your pricing, which erodes the premium positioning. Most beauty device brands at this scale prefer 3P.</li>\n        </ul>\n      </div>"

            "id": "amazon-risk",
            "title": "Amazon Risk Factors",
            "html": "<h3>What Could Go Wrong</h3>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Platform Risk</div>\n        <ul>\n          <li><strong>Account suspension:</strong> Even large sellers get suspended for compliance issues. One wrong listing claim about \"FDA-cleared\" (vs. \"FDA-registered\") could trigger a review. Ensure all health claims are legally compliant.</li>\n          <li><strong>Fee increases:</strong> Amazon raises fees annually. The 2024 inbound placement fee was a ~$0.30/unit surprise for many sellers. Budget for 5–10% annual fee increases.</li>\n          <li><strong>Amazon Basics competition:</strong> Amazon has historically launched private-label products in dominant categories. Hair growth devices are niche enough that this is low-risk, but worth monitoring.</li>\n          <li><strong>Review manipulation crackdown:</strong> Amazon is increasingly aggressive about detecting fake/incentivized reviews. iRESTORE's 29K organic reviews are a moat — protect them by ensuring all review generation is compliant.</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Channel Conflict</div>\n        <ul>\n          <li><strong>MAP (Minimum Advertised Price) enforcement:</strong> If Amazon price drops below MAP (via coupons or promotions), it undercuts DTC and wholesale. Strict MAP enforcement across all channels is critical.</li>\n          <li><strong>Unauthorized sellers:</strong> Resellers buying from Costco and listing on Amazon at lower prices. Brand Registry + IP protection helps but doesn't eliminate this.</li>\n          <li><strong>DTC cannibalization:</strong> Customers who would have bought on DTC (higher margin) buy on Amazon instead (lower margin). Smart pricing, bundling, and DTC-exclusive products help manage this.</li>\n        </ul>\n      </div>\n\n      <div class=\"tip\"><strong>Key interview question:</strong> \"What's your current approach to MAP enforcement across channels? And have you had issues with unauthorized Amazon sellers?\" This shows you understand omnichannel complexity at a COO level.</div>"

            "html": "<h2>Market Sizing: Professional Red Light Therapy Devices</h2>\n      <p>Kevin mentioned the opportunity to sell large-panel red light therapy devices into med spas, dermatology clinics, chiropractic offices, and wellness centers. Here’s how big this could be.</p>\n\n      <h3>The Addressable Market</h3>\n      <table>\n        <tr><th>Channel</th><th>Est. US Locations</th><th>Source</th></tr>\n        <tr><td><strong>Med Spas</strong></td><td>~11,500</td><td><a href=\"https://media.market.us/medical-spa-market-news-2025/\" target=\"_blank\">AmSpa / Market.us 2025</a></td></tr>\n        <tr><td><strong>Dermatology Practices</strong></td><td>~3,000+</td><td><a href=\"https://www.definitivehc.com/resources/healthcare-insights/largest-dermatology-physician-groups\" target=\"_blank\">Definitive Healthcare</a></td></tr>\n        <tr><td><strong>Chiropractic Offices</strong></td><td>~70,000–95,000</td><td><a href=\"https://www.grandviewresearch.com/industry-analysis/us-chiropractic-market\" target=\"_blank\">Grand View Research</a></td></tr>\n        <tr><td><strong>Physical Therapy / Sports Recovery</strong></td><td>~40,000</td><td>APTA estimates</td></tr>\n        <tr><td><strong>Wellness Centers / Biohacking Studios</strong></td><td>~5,000–10,000</td><td>Industry estimates</td></tr>\n        <tr class=\"highlight-row\"><td><strong>Total Addressable Locations</strong></td><td><strong>~130,000–160,000</strong></td><td></td></tr>\n      </table>\n\n      <h3>Device Pricing Landscape (What Competitors Charge)</h3>\n      <table>\n        <tr><th>Device Type</th><th>Price Range</th><th>Examples</th></tr>\n        <tr><td>Professional-grade panels (single)</td><td>$2,500–$6,000</td><td>Joovv Elite, Mito Red MitoPRO series</td></tr>\n        <tr><td>Multi-panel full-body systems</td><td>$6,000–$15,000</td><td>Joovv Quad/Elite setups, PlatinumLED commercial</td></tr>\n        <tr><td>Full-body red light beds</td><td>$25,000–$80,000+</td><td>TheraLight 360 (~$65K), TheraLight FIT (~$50K)</td></tr>\n        <tr><td>Entry-level clinic panels</td><td>$1,500–$3,000</td><td>Various white-label/Chinese OEM</td></tr>\n      </table>\n      <p class=\"muted\">Sources: <a href=\"https://joovv.com/\" target=\"_blank\">Joovv</a>, <a href=\"https://davincimedicalusa.com/collections/theralight-full-body-red-light-beds\" target=\"_blank\">Da Vinci Medical / TheraLight</a>, <a href=\"https://mitoredlight.com/collections/panel-series\" target=\"_blank\">Mito Red Light</a>, <a href=\"https://platinumtherapylights.com/blogs/news/commercial-grade-red-light-therapy\" target=\"_blank\">PlatinumLED</a></p>\n\n      <h3>Where iRESTORE Should Price</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">Recommended: Professional Panel System at $5,000–$12,000</div>\n        <ul>\n          <li><strong>Why not beds ($25K–$80K)?</strong> Too much engineering leap from helmets. Beds require entirely different manufacturing, installation, and support infrastructure. Leave this to TheraLight for now.</li>\n          <li><strong>Why panels?</strong> iRESTORE already manufactures LED/laser devices. Scaling up to a larger panel form factor is a logical engineering extension. Their existing supply chain (likely Shenzhen/Vietnam OEM) can support this.</li>\n          <li><strong>Sweet spot: $5K–$12K professional multi-panel system.</strong> Undercuts Joovv commercial ($6K–15K), significantly undercuts beds, and positions above cheap Chinese panels.</li>\n          <li><strong>Key differentiator:</strong> iRESTORE has FDA clearance and 29,000+ reviews. Most panel companies do NOT have FDA clearance. This matters enormously for med spas and derm clinics.</li>\n        </ul>\n      </div>\n\n      <h3>TAM / SAM / SOM Model</h3>\n      <table>\n        <tr><th></th><th>Calculation</th><th>Value</th></tr>\n        <tr><td><strong>TAM (Total Addressable Market)</strong></td><td>~145,000 US locations × $8,500 avg device price</td><td><strong>$1.23B</strong></td></tr>\n        <tr><td><strong>SAM (Serviceable Available Market)</strong></td><td>Med spas (11,500) + derm (3,000) + high-end chiro (15,000) + PT/recovery (10,000) = ~40,000 locations most likely to buy professional RLT devices × $8,500</td><td><strong>$340M</strong></td></tr>\n        <tr style=\"background:#e8f5e9\"><td><strong>SOM (Serviceable Obtainable Market) — Year 1–3</strong></td><td>Capture 2–5% of SAM in first 3 years = 800–2,000 units × $8,500</td><td><strong>$6.8M–$17M</strong></td></tr>\n        <tr style=\"background:#e8f5e9\"><td><strong>SOM — Year 3–5 (mature)</strong></td><td>Capture 5–10% of SAM + replacement/upgrade cycle = 2,000–4,000 units/yr × $8,500</td><td><strong>$17M–$34M/yr</strong></td></tr>\n      </table>\n\n      <div class=\"tip\"><strong>Bottom line:</strong> The B2B professional device channel could add <strong>$17–$34M in annual revenue</strong> at maturity, with higher margins than consumer DTC (no Amazon fees, no individual shipping, bulk orders). This is a meaningful revenue expansion — potentially 15–25% of iRESTORE’s current revenue base.</div>"

            "id": "b2b-model",
            "title": "Revenue Model & Unit Economics",
            "html": "<h2>B2B Revenue Model: Professional Device Line</h2>\n\n      <h3>Unit Economics Comparison</h3>\n      <table>\n        <tr><th>Metric</th><th>Consumer (Helmet DTC)</th><th>Consumer (Amazon)</th><th>B2B (Professional Panel)</th></tr>\n        <tr><td><strong>ASP</strong></td><td>$695–$1,395</td><td>$695–$1,395</td><td>$5,000–$12,000</td></tr>\n        <tr><td><strong>COGS (est.)</strong></td><td>~30–40%</td><td>~30–40%</td><td>~25–35% (larger panels but simpler packaging)</td></tr>\n        <tr><td><strong>Channel fees</strong></td><td>~10–15% (Shopify + payment)</td><td>~30–35% (Amazon referral + FBA)</td><td>~5–10% (direct sales, trade shows)</td></tr>\n        <tr><td><strong>Shipping/logistics</strong></td><td>~5–7%</td><td>Included in FBA</td><td>~3–5% (freight/white glove)</td></tr>\n        <tr class=\"highlight-row\"><td><strong>Gross Margin</strong></td><td><strong>~45–55%</strong></td><td><strong>~25–35%</strong></td><td><strong>~55–65%</strong></td></tr>\n        <tr><td><strong>CAC</strong></td><td>$80–$150</td><td>$30–80 (PPC)</td><td>$500–$2,000 (trade shows, sales team)</td></tr>\n        <tr><td><strong>LTV potential</strong></td><td>$150–$300 (consumables)</td><td>Lower (less brand stickiness)</td><td>$2,000–$5,000 (replacement panels, service contracts, consumable referrals)</td></tr>\n      </table>\n\n      <h3>Revenue Ramp Scenario (Conservative)</h3>\n      <table>\n        <tr><th>Year</th><th>Units Sold</th><th>Avg Price</th><th>B2B Revenue</th><th>Gross Profit (60%)</th></tr>\n        <tr><td>Year 1 (launch)</td><td>200</td><td>$8,500</td><td>$1.7M</td><td>$1.0M</td></tr>\n        <tr><td>Year 2</td><td>600</td><td>$8,500</td><td>$5.1M</td><td>$3.1M</td></tr>\n        <tr><td>Year 3</td><td>1,200</td><td>$8,500</td><td>$10.2M</td><td>$6.1M</td></tr>\n        <tr><td>Year 4</td><td>2,000</td><td>$9,000</td><td>$18.0M</td><td>$10.8M</td></tr>\n        <tr style=\"background:#e8f5e9\"><td><strong>Year 5</strong></td><td><strong>3,000</strong></td><td><strong>$9,000</strong></td><td><strong>$27.0M</strong></td><td><strong>$16.2M</strong></td></tr>\n      </table>\n\n      <h3>Recurring Revenue Streams (Beyond Initial Device Sale)</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">The B2B Consumables Flywheel</div>\n        <ul>\n          <li><strong>Replacement LED panels/modules</strong> — LEDs degrade over time (~50,000 hours). Clinics running 8+ hours/day will need replacements every 2–3 years. Estimated $1,500–$3,000 per replacement.</li>\n          <li><strong>Extended warranties / service contracts</strong> — $500–$1,500/year. Clinics value uptime guarantees.</li>\n          <li><strong>Consumable referral program</strong> — sell iRESTORE topicals (serums, shampoos) through clinic partners at wholesale. Clinics resell at retail markup. Builds iRESTORE brand in professional channel.</li>\n          <li><strong>Co-branded marketing materials</strong> — provide clinics with patient education materials that drive home-use device sales (consumer upsell from B2B relationship).</li>\n        </ul>\n        <div class=\"tip\"><strong>The strategic play:</strong> Every B2B placement is a billboard for consumer products. A patient who uses iRESTORE’s professional panel at their dermatologist’s office is the perfect lead for a $695 home helmet. This is how you build a consumer-professional ecosystem like Olaplex did (salon → at-home).</div>\n      </div>\n\n      <h3>Go-to-Market: How to Launch B2B</h3>\n      <table>\n        <tr><th>Phase</th><th>Timeline</th><th>Actions</th></tr>\n        <tr><td><strong>Phase 1: Product Development</strong></td><td>Months 1–6</td><td>Engineering spec for professional panel. Leverage existing LED/laser supply chain. Target $2,500–3,500 COGS. Seek additional 510(k) clearance if needed for expanded indications.</td></tr>\n        <tr><td><strong>Phase 2: Pilot</strong></td><td>Months 6–9</td><td>Place 20–50 units with friendly clinics (LA dermatologists, med spas) at cost or discount. Collect clinical feedback, usage data, testimonials.</td></tr>\n        <tr><td><strong>Phase 3: Trade Show Launch</strong></td><td>Months 9–12</td><td>Launch at AAD Annual Meeting (dermatology) and AMSPA conference (med spas). Hire 2–3 B2B sales reps focused on medical/wellness accounts.</td></tr>\n        <tr><td><strong>Phase 4: Scale</strong></td><td>Months 12–24</td><td>Build distributor network (medical device distributors like Henry Schein, McKesson). Launch leasing/financing program (clinics prefer $500–$1,500/month vs. $8,500 upfront).</td></tr>\n      </table>"

            "html": "<h2>Why B2B Matters for the Exit Story</h2>\n\n      <div class=\"card\">\n        <div class=\"card-header\">B2B Revenue Makes iRESTORE More Acquirable</div>\n        <ul>\n          <li><strong>Revenue diversification</strong> — reduces dependence on Amazon and DTC. Acquirers hate single-channel risk. B2B adds a third revenue pillar.</li>\n          <li><strong>Higher margins</strong> — ~60% gross margin vs. ~30% on Amazon. Improves blended margin profile, which directly increases EBITDA and exit multiple.</li>\n          <li><strong>Recurring revenue potential</strong> — service contracts and consumable resales create predictable revenue streams. Acquirers pay premium multiples for recurring revenue.</li>\n          <li><strong>Professional credibility</strong> — “Used by 2,000+ dermatologists and med spas” is a powerful consumer marketing claim that reinforces the home device brand.</li>\n          <li><strong>Strategic acquirer interest</strong> — medical device companies (Lumenis, Cutera, InMode) actively acquire professional aesthetic brands. A B2B line opens up a whole new category of potential acquirers beyond beauty/consumer.</li>\n        </ul>\n      </div>\n\n      <h3>Valuation Impact Model</h3>\n      <table>\n        <tr><th>Scenario</th><th>Revenue Mix at Exit</th><th>Blended EBITDA Margin</th><th>Exit Multiple</th><th>Enterprise Value</th></tr>\n        <tr><td>Current (DTC + Amazon only)</td><td>$120M consumer</td><td>18–20%</td><td>14–15x</td><td>$302–$360M</td></tr>\n        <tr style=\"background:#e8f5e9\"><td><strong>With B2B channel</strong></td><td>$120M consumer + $25M B2B</td><td>22–25%</td><td>15–17x</td><td><strong>$478–$616M</strong></td></tr>\n        <tr><td>Difference</td><td>+$25M revenue</td><td>+3–5 pts margin</td><td>+1–2x multiple</td><td><strong>+$176–$256M</strong></td></tr>\n      </table>\n\n      <div class=\"tip\"><strong>For your interview:</strong> Frame B2B not as a new business line, but as an <strong>exit-value accelerator</strong>. “A $25M professional channel doesn’t just add $25M in revenue — it improves your margin profile by 3–5 points, attracts a broader set of strategic acquirers, and could add $175–250M to your enterprise value. That’s the ROI on building this channel.”</div>"

ne</td><td>Part of $54B Panasonic group</td><td>IonBoost EH-SM50 (mask-style ion device), hair dryers, scalp care, facial devices. Massive electronics retail distribution. Innovation in eco-silicone materials.</td></tr>\n        <tr><td><strong>AXXZIA</strong></td><td>Eye care + RF devices</td><td>Growing premium brand</td><td>Mate for Eyes Home Machine (RF + electroporation + EMS). Combines devices with consumables (eye patches). Model for device→consumable flywheel.</td></tr>\n        <tr><td><strong>CurrentBody</strong></td><td>LED masks + hair regrowth</td><td>£128M+ revenue (IPO'd at £300M)</td><td>UK-based; 75% international. Expanding in Japan. Sells both LED face masks and hair regrowth helmets. iRESTORE's closest global competitor.</td></tr>\n        <tr><td><strong>Cynosure / Lutronic</strong></td><td>Professional aesthetic</td><td>Merged 2024; global medical aesthetics</td><td>Professional-grade laser devices. Japan distribution via Jeisys Medical. Relevant for iRESTORE's B2B/clinic channel expansion.</td></tr>\n      </table>\n      <div class=\"tip\"><strong>iRESTORE's Japan opportunity:</strong> Japan's beauty device market is dominated by skincare (YA-MAN, ReFa, Panasonic) — not hair. This is actually perfect: iRESTORE can enter with the new skincare wand as a wedge product alongside hair devices. The aging population creates demand for both categories. YA-MAN's $200M+ revenue shows the TAM for a pure-play device brand is massive. Premium pricing ($400–800) aligns with iRESTORE's ASP. Key challenge: PMDA regulatory (12–18 months with a DMAH partner). Key advantage: FDA clearance carries weight in Japan's quality-conscious market.</div>\n      <div class=\"card\">\n        <div class=\"card-header\">United Kingdom / Europe</div>\n        <p><strong>Why:</strong> UK is the fastest-growing beauty device market in Europe (~14% CAGR). Amazon UK provides existing marketplace with Prime infrastructure. English-speaking reduces localization costs. EU MDR applies but CE marking pathway exists.</p>\n        <p><strong>Entry path:</strong> Amazon UK/DE → DTC localization → retail partnerships</p>\n      </div>\n\n      <h3>Existing Market Deepening (Parallel Track)</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">Australia — From \"a little bit\" to a real market</div>\n        <p>Currently distributor-managed with small volume. Opportunity: TGA registration (straightforward for low-risk devices), Amazon AU launch, and evaluate whether to self-manage or upgrade the distributor relationship.</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Hong Kong — Leverage the \"really well\" performing distributor</div>\n        <p>Kevin called out HK as performing well. Questions: What's the actual revenue? Can this distributor expand into broader Greater China (Macau, possibly mainland via cross-border e-commerce)? Is there IP risk?</p>\n      </div>"

            "id": "reg-overview",
            "title": "Regulatory Overview & Strategy",
            "html": "<h2>Market Entry Regulatory Strategy</h2>\n      <div class=\"tip\"><strong>Key Insight for Interview:</strong> When Kevin asks about international expansion, you should demonstrate that you understand the regulatory pathway is the gating factor — not market demand. Show you know the specific agencies, timelines, and costs.</div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Recommended Sequencing: South Korea First, Then Japan</div>\n        <p>South Korea offers a faster, cheaper regulatory pathway (6–12 months, $32K–$120K) compared to Japan (12–36 months, $37K–$250K). Entering South Korea first builds market data and regulatory precedent that strengthens the Japan application. Both require local representatives, full document translation, and device classification as medical devices.</p>\n      </div>\n\n      <table>\n        <tr><th>Criteria</th><th>South Korea</th><th>Japan</th></tr>\n        <tr><td><strong>Regulatory Body</strong></td><td>MFDS (Ministry of Food & Drug Safety)</td><td>PMDA / MHLW</td></tr>\n        <tr><td><strong>Device Classification</strong></td><td>Class II (likely for hair growth device)</td><td>Class II or III (depends on JMDN code)</td></tr>\n        <tr><td><strong>Approval Pathway</strong></td><td>MDITAC Certification (if Class II)</td><td>Shonin Approval (PMDA review + MHLW sign-off)</td></tr>\n        <tr><td><strong>Timeline (no clinical trials)</strong></td><td>6–12 months</td><td>12–14 months</td></tr>\n        <tr><td><strong>Timeline (with trials)</strong></td><td>6–12 months + trial duration</td><td>24–36 months</td></tr>\n        <tr><td><strong>Estimated Total Cost</strong></td><td>$32,000 – $120,000</td><td>$37,000 – $250,000</td></tr>\n        <tr><td><strong>Annual Post-Market Cost</strong></td><td>$3,500 – $8,000</td><td>$17,000 – $51,000</td></tr>\n        <tr><td><strong>Local Rep Required</strong></td><td>KLH (Korea License Holder)</td><td>DMAH (Designated Marketing Authorization Holder)</td></tr>\n        <tr><td><strong>Language Requirement</strong></td><td>All docs in Korean</td><td>All docs in Japanese</td></tr>\n        <tr><td><strong>Key Pre-Requisite</strong></td><td>K-GMP certification BEFORE submission</td><td>ISO 13485 + Foreign Manufacturer Registration</td></tr>\n        <tr><td><strong>Clinical Data Flexibility</strong></td><td>Moderate — accepts foreign data</td><td>Low to Moderate — may require Japanese trials</td></tr>\n        <tr class=\"highlight-row\"><td><strong>Recommended Entry Order</strong></td><td>Phase 1 (Months 0–12)</td><td>Phase 2 (Months 8–36)</td></tr>\n      </table>"

          {
            "id": "reg-korea",
            "title": "South Korea – MFDS Pathway",
            "html": "<h2>South Korea: MFDS Registration for Hair Growth Devices</h2>\n\n      <h3>Classification & Approval Body</h3>\n      <p>Hair growth laser/LED devices are classified as <strong>medical devices</strong> (not cosmetics) in South Korea under the MFDS. LG's Pra.L MediHair — a near-identical product to iRESTORE — was approved as a <strong>Class II medical device</strong> after FDA clearance. This is a positive predicate for iRESTORE.</p>\n      <p>Class II devices go through MDITAC/NIDS certification (faster than direct MFDS approval for Class III). This is the most likely path for iRESTORE.</p>\n\n      <h3>Registration Process (6-Step Path)</h3>\n      <table>\n        <tr><th>Step</th><th>Description</th><th>Timeline</th><th>Cost (USD)</th></tr>\n        <tr><td>1</td><td><strong>Appoint Korea License Holder (KLH)</strong> — mandatory local entity with import business license and quality manager</td><td>2–4 weeks</td><td>$2,000–$5,000/yr</td></tr>\n        <tr><td>2</td><td><strong>K-GMP Certification</strong> — on-site manufacturing audit required BEFORE registration</td><td>1–3 months</td><td>$4,000–$6,000</td></tr>\n        <tr><td>3</td><td><strong>Technical File (STED)</strong> — device specs, safety/performance data, biocompatibility, clinical data, all in Korean</td><td>6–8 weeks</td><td>$8,000–$15,000</td></tr>\n        <tr><td>4</td><td><strong>Korean Translation</strong> — all documents, labeling, IFU</td><td>4–6 weeks</td><td>$2,000–$4,000</td></tr>\n        <tr><td>5</td><td><strong>MDITAC Submission & Review</strong> — Class II certification pathway</td><td>2–6 months</td><td>$1,600 (official fee)</td></tr>\n        <tr><td>6</td><td><strong>Post-Approval</strong> — labeling finalization, customs docs, initial shipment</td><td>1–2 months</td><td>$1,500–$3,000</td></tr>\n        <tr class=\"highlight-row\"><td></td><td><strong>TOTAL</strong></td><td><strong>9–18 months</strong></td><td><strong>$32,000–$76,000</strong></td></tr>\n      </table>\n\n      <h3>Testing Requirements</h3>\n      <ul>\n        <li><strong>Electrical Safety & EMC:</strong> IEC 60601-1 and IEC 60601-1-2 compliance</li>\n        <li><strong>Laser Safety:</strong> KS C IEC 60825-1 (Korean adoption) — power output, wavelength, classification, warning labels</li>\n        <li><strong>Biocompatibility:</strong> ISO 10993-1 — may be waived if predicate device data available from FDA filing</li>\n        <li><strong>Thermal Safety:</strong> Temperature rise limits during extended use</li>\n        <li><strong>Performance:</strong> Light output specifications, wavelength validation, durability cycling</li>\n      </ul>\n      <div class=\"tip\"><strong>Cost Saver:</strong> iRESTORE's existing FDA 510(k) data — biocompatibility, electrical safety, laser safety testing — can be leveraged for the Korean submission. This could save $5,000–$20,000 in redundant testing.</div>\n\n      <h3>Advertising Restrictions (Critical)</h3>\n      <p>South Korea is <strong>extremely strict</strong> on hair loss product claims. The MFDS reported that 77.8% of illegal hair product enforcement cases were for claims like \"promotes new hair growth.\" Permitted claims must be backed by clinical data and aligned with the MFDS registration.</p>\n      <ul>\n        <li><strong>Prohibited:</strong> \"Promotes new hair growth,\" \"increases hair thickness,\" \"prevents hair loss,\" \"cures alopecia\"</li>\n        <li><strong>Permitted (with data):</strong> \"For use in treating androgenetic alopecia\" (if approved as medical device), \"stimulates hair follicles\" (if mechanistically supported)</li>\n        <li><strong>FDA-cleared:</strong> Can reference FDA clearance only if also MFDS-approved</li>\n      </ul>\n\n      <h3>E-Commerce Landscape</h3>\n      <p><strong>Coupang</strong> (market leader) explicitly bans medical device direct sales through its standard marketplace. Strategy: partner with a licensed Korean medical device distributor who sells through Coupang. <strong>Amazon Korea</strong> and <strong>Gmarket</strong> have similar restrictions — all require MFDS registration and KLH compliance.</p>\n      <div class=\"tip\"><strong>Viable Strategy:</strong> Direct sales via company website (in Korean) + partnership with licensed Korean distributor for marketplace presence. B2C direct shipping from US with KLH as importer of record for initial testing.</div>\n\n      <h3>IP Protection</h3>\n      <ul>\n        <li><strong>Patents:</strong> File with KIPO (Korean IP Office). South Korea is first-to-file — file early.</li>\n        <li><strong>Trademark \"iRESTORE\":</strong> File in Class 10 (medical devices) and Class 44 (medical services). Timeline: 10–12 months. Cost: $200–$400 per class.</li>\n        <li><strong>Design patents:</strong> 15-year term for device design protection.</li>\n      </ul>"
