            "id": "reg-japan",
            "title": "Japan – PMDA/MHLW Pathway",
            "html": "<h2>Japan: PMDA Shonin Approval for Hair Growth Devices</h2>\n\n      <h3>Classification & Approval Bodies</h3>\n      <p>Japan has a <strong>dual authority structure</strong>: MHLW (Ministry of Health, Labour and Welfare) sets policy, while PMDA (Pharmaceuticals and Medical Devices Agency) conducts technical reviews. Hair growth laser/LED devices are classified as <strong>medical devices</strong> — likely Class II or III depending on JMDN code assignment.</p>\n      <p>Most likely pathway: <strong>Shonin (Approval)</strong> via PMDA review + MHLW administrative approval. This is significantly more involved than South Korea's pathway.</p>\n\n      <h3>Shonin Approval Process</h3>\n      <table>\n        <tr><th>Step</th><th>Description</th><th>Timeline</th><th>Cost (USD)</th></tr>\n        <tr><td>1</td><td><strong>Foreign Manufacturer Registration (FMR)</strong> — register with MHLW</td><td>2–4 weeks</td><td>$0</td></tr>\n        <tr><td>2</td><td><strong>Designate DMAH</strong> — appoint Japanese entity as marketing authorization holder</td><td>2–4 weeks</td><td>Commission-based (15–25% of sales)</td></tr>\n        <tr><td>3</td><td><strong>Pre-Submission Consultation with PMDA</strong> — confirm classification, clinical data needs, pathway</td><td>4–8 weeks</td><td>$700–$2,000</td></tr>\n        <tr><td>4</td><td><strong>STED Preparation & Translation</strong> — comprehensive dossier in Japanese</td><td>8–16 weeks</td><td>$10,000–$25,000</td></tr>\n        <tr><td>5</td><td><strong>Clinical Data Assessment</strong> — PMDA may accept foreign data or require Japanese trials</td><td>0–52 weeks</td><td>$0 – $300,000</td></tr>\n        <tr><td>6</td><td><strong>Shonin Application to PMDA</strong></td><td>1–2 weeks</td><td>$10,000 (application fee)</td></tr>\n        <tr><td>7</td><td><strong>PMDA Technical Review</strong> — includes deficiency letter rounds (avg 1–3 Q&A cycles)</td><td>9–12 months</td><td>$5,000–$15,000 (consultant)</td></tr>\n        <tr><td>8</td><td><strong>MHLW Administrative Approval</strong></td><td>1–2 months</td><td>$0</td></tr>\n        <tr class=\"highlight-row\"><td></td><td><strong>TOTAL (no clinical trials)</strong></td><td><strong>12–14 months</strong></td><td><strong>$37,000–$95,000</strong></td></tr>\n        <tr style=\"background:#fff3e0\"><td></td><td><strong>TOTAL (with Japanese trials)</strong></td><td><strong>24–36 months</strong></td><td><strong>$100,000–$435,000</strong></td></tr>\n      </table>\n\n      <div class=\"tip\"><strong>Critical Decision Point:</strong> Whether PMDA requires Japanese clinical trials is the single biggest variable. The pre-submission consultation (Step 3) answers this question. Strategy: leverage FDA 510(k) clinical data + argue gap assessment shows Japanese population data isn't needed.</div>\n\n      <h3>DMAH vs. MAH — Local Partner Structure</h3>\n      <table>\n        <tr><th>Aspect</th><th>DMAH (Recommended)</th><th>MAH</th></tr>\n        <tr><td>Ownership of approval</td><td>Foreign manufacturer retains</td><td>Transferred to Japanese entity</td></tr>\n        <tr><td>Change flexibility</td><td>Easy (1–2 months to switch)</td><td>Difficult (6–12 months, reapproval needed)</td></tr>\n        <tr><td>Cost</td><td>Lower (agent commission)</td><td>Higher (ownership/management fees)</td></tr>\n        <tr><td>Recommendation</td><td><strong>Better for most cases</strong></td><td>Only if seeking Japan-based ownership</td></tr>\n      </table>\n\n      <h3>Key Differences from FDA</h3>\n      <ul>\n        <li><strong>Harder:</strong> Clinical data more likely required, longer review (9–16 months vs. FDA 90 days for 510(k)), all docs must be in Japanese, DMAH mandatory, stricter advertising claims</li>\n        <li><strong>Easier:</strong> Lower application fee ($10K vs. FDA PMA $235K), accepts foreign clinical data with gap assessment, no separate GMP system (uses ISO 13485)</li>\n      </ul>\n\n      <h3>E-Commerce in Japan</h3>\n      <p><strong>Amazon Japan</strong> is the most accessible platform for foreign sellers. Rakuten Ichiba is more restrictive (requires Japanese company registration). All platforms require PMDA approval number on listings, Japanese-language customer support, and DMAH contact information.</p>\n      <ul>\n        <li><strong>Amazon Japan:</strong> Professional seller account, 8–15% commission, accessible to foreign sellers</li>\n        <li><strong>Rakuten:</strong> Requires Japanese company or service partner, 20–35% distributor commission</li>\n        <li><strong>Recommended:</strong> Hybrid approach — direct Japanese website for premium positioning + Amazon Japan for volume</li>\n      </ul>\n\n      <h3>Post-Market Surveillance (Fuguai Reporting)</h3>\n      <ul>\n        <li>Serious adverse events (death/serious injury): report within <strong>10 days</strong> to PMDA</li>\n        <li>Other adverse events: report within <strong>30 days</strong></li>\n        <li>Full investigation report with root cause analysis within <strong>60 days</strong></li>\n        <li>Annual safety reports required for marketed devices</li>\n      </ul>\n\n      <h3>IP Protection</h3>\n      <ul>\n        <li><strong>Patents:</strong> File with JPO (Japan Patent Office). First-to-file system. 20-year term.</li>\n        <li><strong>Trademark \"iRESTORE\":</strong> File in Class 10 + Class 44. Timeline: 6–12 months. Cost: $300–$600.</li>\n        <li><strong>Madrid Protocol:</strong> Can file U.S. trademark as basis for international filing covering Japan — cheaper and faster than direct filing.</li>\n      </ul>"

            "title": "TAM / SAM / SOM Analysis",
            "html": "<h2>Market Sizing: Professional Red Light Therapy Devices</h2>\n      <p>Kevin mentioned the opportunity to sell large-panel red light therapy devices into med spas, dermatology clinics, chiropractic offices, and wellness centers. Here’s how big this could be.</p>\n\n      <h3>The Addressable Market</h3>\n      <table>\n        <tr><th>Channel</th><th>Est. US Locations</th><th>Source</th></tr>\n        <tr><td><strong>Med Spas</strong></td><td>~11,500</td><td><a href=\"https://media.market.us/medical-spa-market-news-2025/\" target=\"_blank\">AmSpa / Market.us 2025</a></td></tr>\n        <tr><td><strong>Dermatology Practices</strong></td><td>~3,000+</td><td><a href=\"https://www.definitivehc.com/resources/healthcare-insights/largest-dermatology-physician-groups\" target=\"_blank\">Definitive Healthcare</a></td></tr>\n        <tr><td><strong>Chiropractic Offices</strong></td><td>~70,000–95,000</td><td><a href=\"https://www.grandviewresearch.com/industry-analysis/us-chiropractic-market\" target=\"_blank\">Grand View Research</a></td></tr>\n        <tr><td><strong>Physical Therapy / Sports Recovery</strong></td><td>~40,000</td><td>APTA estimates</td></tr>\n        <tr><td><strong>Wellness Centers / Biohacking Studios</strong></td><td>~5,000–10,000</td><td>Industry estimates</td></tr>\n        <tr class=\"highlight-row\"><td><strong>Total Addressable Locations</strong></td><td><strong>~130,000–160,000</strong></td><td></td></tr>\n      </table>\n\n      <h3>Device Pricing Landscape (What Competitors Charge)</h3>\n      <table>\n        <tr><th>Device Type</th><th>Price Range</th><th>Examples</th></tr>\n        <tr><td>Professional-grade panels (single)</td><td>$2,500–$6,000</td><td>Joovv Elite, Mito Red MitoPRO series</td></tr>\n        <tr><td>Multi-panel full-body systems</td><td>$6,000–$15,000</td><td>Joovv Quad/Elite setups, PlatinumLED commercial</td></tr>\n        <tr><td>Full-body red light beds</td><td>$25,000–$80,000+</td><td>TheraLight 360 (~$65K), TheraLight FIT (~$50K)</td></tr>\n        <tr><td>Entry-level clinic panels</td><td>$1,500–$3,000</td><td>Various white-label/Chinese OEM</td></tr>\n      </table>\n      <p class=\"muted\">Sources: <a href=\"https://joovv.com/\" target=\"_blank\">Joovv</a>, <a href=\"https://davincimedicalusa.com/collections/theralight-full-body-red-light-beds\" target=\"_blank\">Da Vinci Medical / TheraLight</a>, <a href=\"https://mitoredlight.com/collections/panel-series\" target=\"_blank\">Mito Red Light</a>, <a href=\"https://platinumtherapylights.com/blogs/news/commercial-grade-red-light-therapy\" target=\"_blank\">PlatinumLED</a></p>\n\n      <h3>Where iRESTORE Should Price</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">Recommended: Professional Panel System at $5,000–$12,000</div>\n        <ul>\n          <li><strong>Why not beds ($25K–$80K)?</strong> Too much engineering leap from helmets. Beds require entirely different manufacturing, installation, and support infrastructure. Leave this to TheraLight for now.</li>\n          <li><strong>Why panels?</strong> iRESTORE already manufactures LED/laser devices. Scaling up to a larger panel form factor is a logical engineering extension. Their existing supply chain (likely Shenzhen/Vietnam OEM) can support this.</li>\n          <li><strong>Sweet spot: $5K–$12K professional multi-panel system.</strong> Undercuts Joovv commercial ($6K–15K), significantly undercuts beds, and positions above cheap Chinese panels.</li>\n          <li><strong>Key differentiator:</strong> iRESTORE has FDA clearance and 29,000+ reviews. Most panel companies do NOT have FDA clearance. This matters enormously for med spas and derm clinics.</li>\n        </ul>\n      </div>\n\n      <h3>TAM / SAM / SOM Model</h3>\n      <table>\n        <tr><th></th><th>Calculation</th><th>Value</th></tr>\n        <tr><td><strong>TAM (Total Addressable Market)</strong></td><td>~145,000 US locations × $8,500 avg device price</td><td><strong>$1.23B</strong></td></tr>\n        <tr><td><strong>SAM (Serviceable Available Market)</strong></td><td>Med spas (11,500) + derm (3,000) + high-end chiro (15,000) + PT/recovery (10,000) = ~40,000 locations most likely to buy professional RLT devices × $8,500</td><td><strong>$340M</strong></td></tr>\n        <tr style=\"background:#e8f5e9\"><td><strong>SOM (Serviceable Obtainable Market) — Year 1–3</strong></td><td>Capture 2–5% of SAM in first 3 years = 800–2,000 units × $8,500</td><td><strong>$6.8M–$17M</strong></td></tr>\n        <tr style=\"background:#e8f5e9\"><td><strong>SOM — Year 3–5 (mature)</strong></td><td>Capture 5–10% of SAM + replacement/upgrade cycle = 2,000–4,000 units/yr × $8,500</td><td><strong>$17M–$34M/yr</strong></td></tr>\n      </table>\n\n      <div class=\"tip\"><strong>Bottom line:</strong> The B2B professional device channel could add <strong>$17–$34M in annual revenue</strong> at maturity, with higher margins than consumer DTC (no Amazon fees, no individual shipping, bulk orders). This is a meaningful revenue expansion — potentially 15–25% of iRESTORE’s current revenue base.</div>"

            "id": "b2b-model",
            "title": "Revenue Model & Unit Economics",
            "html": "<h2>B2B Revenue Model: Professional Device Line</h2>\n\n      <h3>Unit Economics Comparison</h3>\n      <table>\n        <tr><th>Metric</th><th>Consumer (Helmet DTC)</th><th>Consumer (Amazon)</th><th>B2B (Professional Panel)</th></tr>\n        <tr><td><strong>ASP</strong></td><td>$695–$1,395</td><td>$695–$1,395</td><td>$5,000–$12,000</td></tr>\n        <tr><td><strong>COGS (est.)</strong></td><td>~30–40%</td><td>~30–40%</td><td>~25–35% (larger panels but simpler packaging)</td></tr>\n        <tr><td><strong>Channel fees</strong></td><td>~10–15% (Shopify + payment)</td><td>~30–35% (Amazon referral + FBA)</td><td>~5–10% (direct sales, trade shows)</td></tr>\n        <tr><td><strong>Shipping/logistics</strong></td><td>~5–7%</td><td>Included in FBA</td><td>~3–5% (freight/white glove)</td></tr>\n        <tr class=\"highlight-row\"><td><strong>Gross Margin</strong></td><td><strong>~45–55%</strong></td><td><strong>~25–35%</strong></td><td><strong>~55–65%</strong></td></tr>\n        <tr><td><strong>CAC</strong></td><td>$80–$150</td><td>$30–80 (PPC)</td><td>$500–$2,000 (trade shows, sales team)</td></tr>\n        <tr><td><strong>LTV potential</strong></td><td>$150–$300 (consumables)</td><td>Lower (less brand stickiness)</td><td>$2,000–$5,000 (replacement panels, service contracts, consumable referrals)</td></tr>\n      </table>\n\n      <h3>Revenue Ramp Scenario (Conservative)</h3>\n      <table>\n        <tr><th>Year</th><th>Units Sold</th><th>Avg Price</th><th>B2B Revenue</th><th>Gross Profit (60%)</th></tr>\n        <tr><td>Year 1 (launch)</td><td>200</td><td>$8,500</td><td>$1.7M</td><td>$1.0M</td></tr>\n        <tr><td>Year 2</td><td>600</td><td>$8,500</td><td>$5.1M</td><td>$3.1M</td></tr>\n        <tr><td>Year 3</td><td>1,200</td><td>$8,500</td><td>$10.2M</td><td>$6.1M</td></tr>\n        <tr><td>Year 4</td><td>2,000</td><td>$9,000</td><td>$18.0M</td><td>$10.8M</td></tr>\n        <tr style=\"background:#e8f5e9\"><td><strong>Year 5</strong></td><td><strong>3,000</strong></td><td><strong>$9,000</strong></td><td><strong>$27.0M</strong></td><td><strong>$16.2M</strong></td></tr>\n      </table>\n\n      <h3>Recurring Revenue Streams (Beyond Initial Device Sale)</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">The B2B Consumables Flywheel</div>\n        <ul>\n          <li><strong>Replacement LED panels/modules</strong> — LEDs degrade over time (~50,000 hours). Clinics running 8+ hours/day will need replacements every 2–3 years. Estimated $1,500–$3,000 per replacement.</li>\n          <li><strong>Extended warranties / service contracts</strong> — $500–$1,500/year. Clinics value uptime guarantees.</li>\n          <li><strong>Consumable referral program</strong> — sell iRESTORE topicals (serums, shampoos) through clinic partners at wholesale. Clinics resell at retail markup. Builds iRESTORE brand in professional channel.</li>\n          <li><strong>Co-branded marketing materials</strong> — provide clinics with patient education materials that drive home-use device sales (consumer upsell from B2B relationship).</li>\n        </ul>\n        <div class=\"tip\"><strong>The strategic play:</strong> Every B2B placement is a billboard for consumer products. A patient who uses iRESTORE’s professional panel at their dermatologist’s office is the perfect lead for a $695 home helmet. This is how you build a consumer-professional ecosystem like Olaplex did (salon → at-home).</div>\n      </div>\n\n      <h3>Go-to-Market: How to Launch B2B</h3>\n      <table>\n        <tr><th>Phase</th><th>Timeline</th><th>Actions</th></tr>\n        <tr><td><strong>Phase 1: Product Development</strong></td><td>Months 1–6</td><td>Engineering spec for professional panel. Leverage existing LED/laser supply chain. Target $2,500–3,500 COGS. Seek additional 510(k) clearance if needed for expanded indications.</td></tr>\n        <tr><td><strong>Phase 2: Pilot</strong></td><td>Months 6–9</td><td>Place 20–50 units with friendly clinics (LA dermatologists, med spas) at cost or discount. Collect clinical feedback, usage data, testimonials.</td></tr>\n        <tr><td><strong>Phase 3: Trade Show Launch</strong></td><td>Months 9–12</td><td>Launch at AAD Annual Meeting (dermatology) and AMSPA conference (med spas). Hire 2–3 B2B sales reps focused on medical/wellness accounts.</td></tr>\n        <tr><td><strong>Phase 4: Scale</strong></td><td>Months 12–24</td><td>Build distributor network (medical device distributors like Henry Schein, McKesson). Launch leasing/financing program (clinics prefer $500–$1,500/month vs. $8,500 upfront).</td></tr>\n      </table>"

            "html": "<h2>Why B2B Matters for the Exit Story</h2>\n\n      <div class=\"card\">\n        <div class=\"card-header\">B2B Revenue Makes iRESTORE More Acquirable</div>\n        <ul>\n          <li><strong>Revenue diversification</strong> — reduces dependence on Amazon and DTC. Acquirers hate single-channel risk. B2B adds a third revenue pillar.</li>\n          <li><strong>Higher margins</strong> — ~60% gross margin vs. ~30% on Amazon. Improves blended margin profile, which directly increases EBITDA and exit multiple.</li>\n          <li><strong>Recurring revenue potential</strong> — service contracts and consumable resales create predictable revenue streams. Acquirers pay premium multiples for recurring revenue.</li>\n          <li><strong>Professional credibility</strong> — “Used by 2,000+ dermatologists and med spas” is a powerful consumer marketing claim that reinforces the home device brand.</li>\n          <li><strong>Strategic acquirer interest</strong> — medical device companies (Lumenis, Cutera, InMode) actively acquire professional aesthetic brands. A B2B line opens up a whole new category of potential acquirers beyond beauty/consumer.</li>\n        </ul>\n      </div>\n\n      <h3>Valuation Impact Model</h3>\n      <table>\n        <tr><th>Scenario</th><th>Revenue Mix at Exit</th><th>Blended EBITDA Margin</th><th>Exit Multiple</th><th>Enterprise Value</th></tr>\n        <tr><td>Current (DTC + Amazon only)</td><td>$120M consumer</td><td>18–20%</td><td>14–15x</td><td>$302–$360M</td></tr>\n        <tr style=\"background:#e8f5e9\"><td><strong>With B2B channel</strong></td><td>$120M consumer + $25M B2B</td><td>22–25%</td><td>15–17x</td><td><strong>$478–$616M</strong></td></tr>\n        <tr><td>Difference</td><td>+$25M revenue</td><td>+3–5 pts margin</td><td>+1–2x multiple</td><td><strong>+$176–$256M</strong></td></tr>\n      </table>\n\n      <div class=”tip”><strong>Strategic value:</strong> B2B professional devices are an <strong>exit-value accelerator</strong>. A $25M professional channel doesn’t just add revenue — it improves the margin profile by 3–5 points, attracts a broader set of strategic acquirers (medical device companies, not just beauty PE), and could add $175–250M to enterprise value.</div>"

            "title": "Amazon Market Position",
            "html": "<h3>iRESTORE's Amazon Dominance</h3>\n<p>Kevin confirmed: iRESTORE holds <strong>60–70% market share</strong> in the Amazon laser hair growth device category. This is an extraordinary position. Here's what it means operationally.</p>\n\n      <div class=\"card\">\n        <div class=\"card-header\">What 60–70% Amazon Market Share Looks Like</div>\n        <ul>\n          <li><strong>Best Seller Rank (BSR):</strong> iRESTORE likely holds the #1 or #2 BSR in the \"Hair Growth Devices\" category consistently. This drives organic traffic — Amazon's algorithm rewards sales velocity.</li>\n          <li><strong>Review moat:</strong> 29,000+ reviews creates an almost insurmountable competitive barrier. New entrants can't replicate this. Reviews drive conversion rate, which drives BSR, which drives more traffic.</li>\n          <li><strong>Pricing power:</strong> At 60–70% share, iRESTORE can set category pricing. Competitors price relative to iRESTORE, not the other way around.</li>\n          <li><strong>Amazon's incentives align:</strong> Amazon wants to feature products that sell. iRESTORE's dominance means Amazon gives them preferential placement, deal access, and potentially lower advertising costs (higher relevance scores).</li>\n        </ul>\n      </div>\n\n      <div class=\"tip\"><strong>Important note:</strong> The channel-level revenue split (what % of total iRESTORE revenue comes from Amazon vs. DTC vs. wholesale) was NOT disclosed in the first interview. This is a critical data point to get in the second interview — it affects margin analysis, growth strategy, and operational priorities.</div>"

            "id": "amazon-ops",
            "title": "Amazon Operations Framework",
            "html": "<h3>What a COO Needs to Know About Amazon at Scale</h3>\n\n      <div class=\"card\">\n        <div class=\"card-header\">FBA (Fulfilled by Amazon) vs. FBM (Fulfilled by Merchant)</div>\n        <ul>\n          <li><strong>FBA:</strong> iRESTORE ships inventory to Amazon warehouses. Amazon handles pick/pack/ship + customer service. Products get Prime badge. Fees: ~15–20% total (referral 8% + FBA fees $5–7/unit for device-sized products).</li>\n          <li><strong>FBM:</strong> iRESTORE ships directly from La Mirada. Lower fees (~8% referral only) but no Prime badge. Seller Fulfilled Prime (SFP) is an option — keep Prime badge while shipping from your own warehouse.</li>\n          <li><strong>The question to ask:</strong> \"What's the current FBA/FBM split? And have you evaluated Seller Fulfilled Prime for the higher-priced devices?\"</li>\n          <li><strong>COO opportunity:</strong> Optimizing the FBA/FBM mix is a direct margin lever. For higher-ASP items ($600–$1,400), FBM or SFP may save $10–20/unit vs. FBA.</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">AWD (Amazon Warehousing & Distribution) — The Hidden Margin Lever</div>\n        <ul>\n          <li><strong>What it is:</strong> Amazon's upstream bulk storage program. You ship pallets to AWD warehouses at lower storage rates, and Amazon automatically replenishes FBA fulfillment centers as needed. Think of it as a staging layer between your 3PL and FBA.</li>\n          <li><strong>Why it matters for iRESTORE:</strong> FBA storage fees are brutal for devices — large boxes, long dwell times, and Q4 surcharges. AWD storage rates are typically <strong>50–70% cheaper</strong> than FBA storage, with no long-term storage fees and no Q4 surcharges.</li>\n          <li><strong>The margin math:</strong> For a device-sized product (~$5–8/unit in FBA storage fees during peak), shifting bulk inventory to AWD and auto-replenishing FBA can save <strong>$2–4/unit in storage costs</strong>. At iRESTORE's Amazon volume, that's potentially $500K–$1M+ annually in recovered margin.</li>\n          <li><strong>Additional benefits:</strong> AWD inventory counts toward your IPI score positively. Auto-replenishment reduces stockout risk during demand spikes. No per-unit fee for inbound — just storage.</li>\n          <li><strong>COO opportunity:</strong> If iRESTORE is shipping everything direct to FBA, they're likely overpaying on storage. Implementing AWD as a buffer layer is a quick operational win — no customer impact, pure margin improvement. Ask: \"Are you using AWD for bulk staging, or is everything going direct to FBA?\"</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">IPI Score (Inventory Performance Index)</div>\n        <ul>\n          <li><strong>What it is:</strong> Amazon's score (0–1000) measuring how efficiently you manage FBA inventory. Based on: excess inventory, sell-through rate, stranded inventory, in-stock rate.</li>\n          <li><strong>Why it matters:</strong> Below 400 = storage limits. Below 350 = severe restrictions. For a company with iRESTORE's volume, an IPI issue could mean they can't send enough inventory to Amazon during peak season.</li>\n          <li><strong>COO action:</strong> Monitor weekly. Ensure excess inventory is removed or liquidated. Keep sell-through velocity high. This is a Brandon-level operational task that needs oversight.</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Amazon PPC (Pay-Per-Click Advertising)</div>\n        <ul>\n          <li><strong>Key metrics:</strong> ACoS (Advertising Cost of Sales) = ad spend ÷ ad revenue. TACoS (Total ACoS) = ad spend ÷ total revenue (including organic). The gap between ACoS and TACoS shows brand strength.</li>\n          <li><strong>At iRESTORE's scale:</strong> They're likely spending $X M/year on Amazon PPC. Target ACoS for beauty devices is typically 15–25%. At their market share, they may be able to reduce without losing position.</li>\n          <li><strong>COO opportunity:</strong> PPC efficiency is a profit lever. Better keyword segmentation, negative keyword management, dayparting, and bid optimization can reduce ACoS by 2–5pp. At their scale, each point matters.</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Long-Term Storage Fees & Seasonal Planning</div>\n        <ul>\n          <li><strong>The trap:</strong> Amazon charges $6.90/cubic foot for inventory stored 271–365 days, and surcharges for 365+ days. For devices that take up significant space, this adds up fast.</li>\n          <li><strong>Q4 planning:</strong> Amazon raises storage fees from October–December. You need to pre-position inventory by September. But overshipping = long-term storage fees. Undershipping = lost sales during peak.</li>\n          <li><strong>The math:</strong> With 60–90 day Shenzhen lead times + 30 day ocean freight, Q4 inventory decisions happen in May–June. This is why demand planning matters so much.</li>\n        </ul>\n      </div>"

            "id": "amazon-growth",
            "title": "Amazon Growth Levers",
            "html": "<h3>Opportunities a COO Can Drive</h3>\n\n      <div class=\"card\">\n        <div class=\"card-header\">1. Listing Optimization</div>\n        <ul>\n          <li><strong>A+ Content / Brand Store:</strong> iRESTORE likely has A+ content, but is it optimized? Periodic refresh (new images, updated claims, video content) can improve conversion rate 3–10%.</li>\n          <li><strong>SEO (Amazon Search):</strong> Keyword research for backend search terms. Amazon's algorithm weights title, bullet points, and backend keywords differently. Fresh keyword research every quarter.</li>\n          <li><strong>Virtual bundles:</strong> Bundle hair device + serum + supplements at a slight discount. Increases AOV, improves BSR, and creates a competitive moat (harder to comparison-shop).</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">2. Amazon-to-DTC Bridge</div>\n        <ul>\n          <li><strong>The strategic goal:</strong> Every Amazon customer who becomes a DTC repeat buyer improves margins (no Amazon fees on repeat purchases). This is the single biggest margin optimization lever.</li>\n          <li><strong>Tactics:</strong> Product inserts with QR codes (compliance-friendly — can't direct to DTC, but can offer warranty registration, exclusive content, or loyalty program). Post-purchase email if opted in.</li>\n          <li><strong>Subscribe & Save:</strong> For consumables (serums, supplements), Amazon Subscribe & Save locks in recurring revenue and prevents competitive switching.</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">3. International Amazon Marketplaces</div>\n        <ul>\n          <li><strong>Amazon Global Selling:</strong> US sellers can expand to UK, Germany, Japan, Australia, Canada with relatively low friction. FBA handles local fulfillment.</li>\n          <li><strong>Priority markets:</strong> Amazon UK → Amazon DE → Amazon Japan (see International section for regulatory requirements).</li>\n          <li><strong>Quick wins:</strong> Amazon Canada and Amazon Australia are the lowest-friction entries from a US base.</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">4. Amazon Vendor Central vs. Seller Central</div>\n        <ul>\n          <li><strong>Current (likely):</strong> iRESTORE is probably on Seller Central (3P) — they control pricing, listings, and fulfillment.</li>\n          <li><strong>Vendor Central (1P):</strong> Amazon buys wholesale from you and resells. You lose pricing control but gain access to AMS (Amazon Marketing Services) and potentially better placement.</li>\n          <li><strong>Recommendation:</strong> Stay 3P at this stage. 1P means Amazon controls your pricing, which erodes the premium positioning. Most beauty device brands at this scale prefer 3P.</li>\n        </ul>\n      </div>"

            "id": "amazon-risk",
            "title": "Amazon Risk Factors",
            "html": "<h3>What Could Go Wrong</h3>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Platform Risk</div>\n        <ul>\n          <li><strong>Account suspension:</strong> Even large sellers get suspended for compliance issues. One wrong listing claim about \"FDA-cleared\" (vs. \"FDA-registered\") could trigger a review. Ensure all health claims are legally compliant.</li>\n          <li><strong>Fee increases:</strong> Amazon raises fees annually. The 2024 inbound placement fee was a ~$0.30/unit surprise for many sellers. Budget for 5–10% annual fee increases.</li>\n          <li><strong>Amazon Basics competition:</strong> Amazon has historically launched private-label products in dominant categories. Hair growth devices are niche enough that this is low-risk, but worth monitoring.</li>\n          <li><strong>Review manipulation crackdown:</strong> Amazon is increasingly aggressive about detecting fake/incentivized reviews. iRESTORE's 29K organic reviews are a moat — protect them by ensuring all review generation is compliant.</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Channel Conflict</div>\n        <ul>\n          <li><strong>MAP (Minimum Advertised Price) enforcement:</strong> If Amazon price drops below MAP (via coupons or promotions), it undercuts DTC and wholesale. Strict MAP enforcement across all channels is critical.</li>\n          <li><strong>Unauthorized sellers:</strong> Resellers buying from Costco and listing on Amazon at lower prices. Brand Registry + IP protection helps but doesn't eliminate this.</li>\n          <li><strong>DTC cannibalization:</strong> Customers who would have bought on DTC (higher margin) buy on Amazon instead (lower margin). Smart pricing, bundling, and DTC-exclusive products help manage this.</li>\n        </ul>\n      </div>\n\n      <div class=\"tip\"><strong>Key consideration:</strong> MAP enforcement across channels is critical to prevent channel conflict. Without it, resellers can undercut pricing and erode brand value across all channels.</div>"

            "html": "<div class=\"card\">\n  <div class=\"card-header\">Mass Retail Entry with the New Skincare Wand</div>\n  <p>Kevin mentioned a new skincare wand with 5 modalities (microcurrent, EMS, electroporation, supersonic, deep infrared) at sub-$200 — specifically designed for retail distribution. Target and Walmart have completely reinvented their premium beauty sections.</p>\n  <table>\n    <tr><th>Factor</th><th>Detail</th></tr>\n    <tr><td><strong>Why it works</strong></td><td>Sub-$200 is impulse-buy territory for Target/Walmart shoppers. Target alone has 1,900+ stores, and their beauty section redesign is attracting prestige brands. The wand is iRESTORE's first non-light-therapy product — it's designed for exactly this channel.</td></tr>\n    <tr><td><strong>Potential impact</strong></td><td>Even a modest $500K/month run rate = $6M annual from one retailer. Target + Walmart together could be $15–20M.</td></tr>\n    <tr><td><strong>The \"land and expand\" play</strong></td><td>The sub-$200 wand gets consumers into the iRESTORE ecosystem. Then you upsell to $695–$1,395 devices via DTC. Every Target buyer becomes a DTC prospect for the premium line.</td></tr>\n    <tr><td><strong>Effort level</strong></td><td>The product is already in development (Q2 launch mentioned). Distribution is the lever — and iRESTORE already has the Costco playbook for approaching big-box retail.</td></tr>\n    <tr><td><strong>Competitive timing</strong></td><td>The skincare device market at mass retail is still early. First mover in Target's beauty device section with an FDA-associated brand = category ownership.</td></tr>\n  </table>\n</div>"

            "id": "sb-celebrity",
            "title": "Bet 6: Tier-1 Celebrity Partnership (Kylie Jenner, Hailey Bieber, etc.)",
            "html": "<div class=\"card\">\n  <div class=\"card-header\">One Face That Moves the Entire Market</div>\n  <p>Kevin already uses influencer marketing (YouTube sponsorships, UGC whitelisting), but that's tactical. A tier-1 celebrity partnership — think Kylie Jenner, Hailey Bieber, or someone of that caliber — is a completely different lever. It's brand transformation in a single deal.</p>\n  <table>\n    <tr><th>Factor</th><th>Detail</th></tr>\n    <tr><td><strong>Why Kylie Jenner specifically</strong></td><td>She built Kylie Skin (sold to Coty for $600M). She already operates in beauty devices and skincare. Her audience (400M+ Instagram followers) skews heavily toward women 18–35 — exactly the demographic iRESTORE is trying to reach with the rebrand. A Kylie co-sign on LED face masks or the skincare wand would be seismic.</td></tr>\n    <tr><td><strong>Why it works for iRESTORE</strong></td><td>Kevin said 50% of customers are already women, and the rebrand is designed to connect emotionally, not technically. A tier-1 beauty celebrity does in one post what millions of ad spend can't — it makes iRESTORE a beauty brand, not a device company. This directly accelerates Kevin's stated vision.</td></tr>\n    <tr><td><strong>Potential impact</strong></td><td>Celebrity beauty device launches routinely generate $10–50M+ in initial demand. Therabody (Theragun) went from niche to mainstream through celebrity adoption. A Kylie or Hailey Bieber (Rhode Skin) partnership on LED masks could generate $20–40M in year-one incremental revenue.</td></tr>\n    <tr><td><strong>Deal structures</strong></td><td>Multiple options: (1) <strong>Brand ambassador</strong> — flat fee + royalty, $2–5M/yr for tier-1, (2) <strong>Co-branded product line</strong> — \"Kylie x iRESTORE\" LED mask at premium price point, revenue share, (3) <strong>Equity deal</strong> — give 1–3% equity for ongoing partnership, aligning incentives through the exit. Equity deals are increasingly common (Ryan Reynolds/Mint Mobile, George Clooney/Casamigos model).</td></tr>\n    <tr><td><strong>Effort level</strong></td><td>Higher than other bets — requires talent agency relationships (WME, CAA, UTA), negotiation, and a $2–5M+ commitment. But the ROI math is extraordinary if the celebrity's audience aligns.</td></tr>\n    <tr><td><strong>Exit impact</strong></td><td><strong>Massive.</strong> \"Backed by Kylie Jenner\" or \"Hailey Bieber partnership\" fundamentally changes how acquirers perceive the brand. It signals consumer relevance and staying power. L'Oréal, Estée Lauder, and Shiseido all pay premium multiples for brands with celebrity cachet.</td></tr>\n  </table>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Other Tier-1 Names to Consider</div>\n  <table>\n    <tr><th>Celebrity</th><th>Why They Fit</th><th>Audience</th></tr>\n    <tr><td><strong>Kylie Jenner</strong></td><td>Already in beauty devices/skincare. Kylie Skin sold to Coty for $600M. Proven she can move product at scale.</td><td>400M+ IG, women 18–35</td></tr>\n    <tr><td><strong>Hailey Bieber</strong></td><td>Rhode Skin is the hottest beauty brand launch in years. \"Glazed skin\" aesthetic aligns perfectly with LED masks.</td><td>53M+ IG, Gen-Z/millennial women</td></tr>\n    <tr><td><strong>Jennifer Aniston</strong></td><td>Open about hair care journey (LolaVie brand). Crosses demographics — appeals to 35–55 women experiencing hair thinning. Perfect for the hair growth line.</td><td>45M+ IG, women 30–55</td></tr>\n    <tr><td><strong>Bryan Johnson</strong></td><td>Already driving massive organic demand for red light therapy through his \"Don't Die\" protocol. More niche but extremely high-intent audience. Could be a lower-cost, high-credibility play.</td><td>2M+ followers, biohacker/wellness demographic</td></tr>\n    <tr><td><strong>Andrew Huberman</strong></td><td>Has discussed red light therapy on his podcast. One dedicated episode = millions of high-intent listeners. Not a traditional \"celebrity\" but massive influence in the health/science space.</td><td>6M+ YouTube, science/health demographic</td></tr>\n  </table>\n</div>\n\n<div class=\"tip\"><strong>Interview angle:</strong> Kevin already talked about the power of influencers driving organic demand — \"a fundamental shift from creating demand to capturing demand.\" Frame this as: \"You've proven micro and mid-tier influencers work. The next big lever is a single tier-1 partnership that makes iRESTORE a household name in beauty. One Kylie Jenner post does what $10M in paid media can't — it changes how people think about the brand.\"</div>"
          },

yet. My job as COO is to give you the operational foundation to pursue 2–3 of these simultaneously without the business breaking.\"</div>"

          {
            "id": "ws-kevin-lesson",
            "title": "Kevin's Wholesale Lesson (Money Talks Podcast)",
            "html": "<div class=\"tip\"><strong>Context:</strong> Kevin specifically discusses wholesale/retail channel strategy in the Money Talks podcast (~42:00 mark). His P&G beauty coach taught him channel pricing — knowledge that \"saved six figures.\" This is one of Kevin's clearest operational pain points and a direct opportunity for the COO.</div>\n\n<div class=\"answer-block\">\n  <strong>Kevin's exact words:</strong> \"When you go into a Costco, when you go into a retailer, you need to think about... Costco takes 12% margin. For example, Walmart and Target, they start at 40% gross margin. So when you're designing your product, you need to have that margin, right? The second thing is that you need to think about your channel pricing strategy. You don't just set a price for your product. You think about in this channel, it's this price. In this other channel, it's this price.\"\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Kevin's Channel Pricing Mistakes (His Own Words)</div>\n  <ul>\n    <li><strong>Mistake 1 — No SMU strategy:</strong> Put the same product in Costco as DTC/Amazon. Costco priced it cheaper → cannibalized DTC sales. People found it \"$200–300 cheaper\" on Costco and stopped buying on the website.</li>\n    <li><strong>Mistake 2 — No channel-specific product design:</strong> \"Had I known that and like thoughtfully designed what the assortment strategy needs to be in different retailers\" — he admits he didn't plan product variants per channel.</li>\n    <li><strong>The fix (from his coach):</strong> Create <strong>SMU (Special Make-Up)</strong> products — exclusive SKUs per channel. \"Maybe it's different color, maybe it's different whatever but inherently a different product and so you're not in price competition.\"</li>\n    <li><strong>Cost of the lesson:</strong> \"That would have saved us six figures\" — Kevin explicitly quantifies the cost of not having this knowledge upfront.</li>\n  </ul>\n</div>\n\n<div class=\"answer-block\">\n  <strong>Your angle:</strong> \"I heard you talk about the SMU lesson on Money Talks — that's exactly the kind of operational architecture I build. Channel pricing strategy, MAP enforcement, exclusive SKU planning — these aren't afterthoughts, they're day-one infrastructure for any retail expansion. I'd make sure we never leave six figures on the table like that again.\"\n</div>"

            "id": "ws-margins",
            "title": "Retailer Margin Comparison",
            "html": "<div class=\"card\">\n  <div class=\"card-header\">Retailer Margin Requirements (Kevin's Claims ✅ Verified)</div>\n  <table>\n    <tr><th>Channel</th><th>Retailer's Margin</th><th>iRESTORE Keeps</th><th>Est. Gross Profit/Unit*</th><th>Strategic Role</th></tr>\n    <tr style=\"background:#e8f5e9\"><td><strong>DTC</strong></td><td>0%</td><td>100%</td><td>~$104</td><td>Highest margin, brand control</td></tr>\n    <tr style=\"background:#e8f5e9\"><td><strong>Amazon</strong></td><td>~13% (8% ref + FBA)</td><td>~87%</td><td>~$92</td><td>Volume engine (60-70% category share)</td></tr>\n    <tr style=\"background:#e8f5e9\"><td><strong>Costco</strong> ✅</td><td><strong>12%</strong></td><td>88%</td><td>~$93</td><td>Volume + trust halo (15% of rev)</td></tr>\n    <tr><td><strong>Walmart</strong> ✅</td><td><strong>40%</strong></td><td>60%</td><td>~$35</td><td>Scale play, mass market reach</td></tr>\n    <tr><td><strong>Target</strong> ✅</td><td><strong>40%</strong></td><td>60%</td><td>~$35</td><td>Premium beauty positioning</td></tr>\n    <tr><td><strong>Nordstrom</strong></td><td>~45%</td><td>55%</td><td>~$27</td><td>Prestige halo (CurrentBody is here)</td></tr>\n    <tr><td><strong>Sephora</strong></td><td>~50%</td><td>50%</td><td>~$15</td><td>Brand building, not profit center</td></tr>\n    <tr><td><strong>Ulta</strong></td><td>~50%</td><td>50%</td><td>~$14</td><td>Brand building, 44M loyalty members</td></tr>\n    <tr><td><strong>QVC/HSN</strong></td><td>30–50%</td><td>50–70%</td><td>~$21</td><td>Volume spikes, TV credibility</td></tr>\n  </table>\n  <p class=\"muted\">*Estimated gross profit per unit on $199 MSRP wand, ~$60 COGS, after retailer margin + packaging + co-op + fulfillment. See unit economics section for full breakdown.</p>\n</div>\n\n<div class=\"tip\"><strong>Key insight for interview:</strong> Costco at 12% margin is actually <em>better</em> unit economics than DTC after you factor in zero customer acquisition cost. Walmart/Target at 40% is 2.3x the margin of Sephora/Ulta at 50%. Channel choice is a margin decision, not just a brand decision.</div>"

            "id": "ws-channels",
            "title": "Channel-by-Channel Deep Dive",
            "html": "<h3>🟢 Costco (Current — ~15% of Revenue)</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">Costco — The Proven Playbook</div>\n  <table>\n    <tr><th>Factor</th><th>Detail</th></tr>\n    <tr><td><strong>Margin</strong></td><td><strong>12% gross margin</strong> — lowest in retail. Non-negotiable. This is Costco's entire model (pass savings to members).</td></tr>\n    <tr><td><strong>No slotting fees</strong></td><td>Costco does NOT charge slotting fees (unlike Walmart/Target). They absorb costs as part of member-focused model.</td></tr>\n    <tr><td><strong>Volume</strong></td><td>Went from 0 to 15% of iRESTORE revenue \"almost overnight.\" Kevin: \"a few emails and a few phone calls.\"</td></tr>\n    <tr><td><strong>SMU strategy</strong></td><td>Exclusive colors/variants for Costco prevent Amazon/DTC price undercutting. Kevin learned this the hard way.</td></tr>\n    <tr><td><strong>Demo program</strong></td><td>In-warehouse sampling events (vendor-funded, ~$500-1K/event). Costco handles staffing; you fund it.</td></tr>\n    <tr><td><strong>Return policy</strong></td><td>Costco's generous return policy means higher return rates. Budget for this.</td></tr>\n    <tr><td><strong>Q4 surge risk</strong></td><td>Kevin mentioned Costco \"did a promotion, blew up, we 10x'd our forecast volume\" in Q4. Must fulfill Costco first (\"contractual penalties\").</td></tr>\n    <tr><td><strong>Trust halo</strong></td><td>\"The stamp of trust that builds with someone being in Costco — you can't buy that.\" Costco does rigorous product testing before listing.</td></tr>\n  </table>\n</div>\n\n<div class=\"answer-block\">\n  <strong>COO opportunity:</strong> Costco is already working. The COO's job is to (1) protect it with proper SMU strategy, (2) ensure fulfillment capacity for Q4 surges (the Brandon warehouse story), and (3) negotiate Costco mailer/email blast placements for new product launches.\n</div>\n\n<h3>🟡 Walmart (Potential — 40% Margin)</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">Walmart — Scale Play with Margin Pressure</div>\n  <table>\n    <tr><th>Factor</th><th>Detail</th></tr>\n    <tr><td><strong>Margin</strong></td><td><strong>40% gross margin</strong> (Kevin confirmed). At $199 MSRP → Walmart pays $119.40 wholesale.</td></tr>\n    <tr><td><strong>Volume potential</strong></td><td>500-store test × 15 units/month = 7,500 units/month. At ~$35 GP/unit = <strong>$262K/month</strong> gross profit.</td></tr>\n    <tr><td><strong>Requirements</strong></td><td>GMP compliance (by end 2025), retail-ready packaging (RRP), GS1 barcodes, EDI mandatory, anti-theft tagging for items >$150.</td></tr>\n    <tr><td><strong>Slotting fees</strong></td><td>Typical (unlike Costco). Budget $25-50K for packaging redesign + slotting.</td></tr>\n    <tr><td><strong>Co-op advertising</strong></td><td>2-5% of sales deducted for marketing support.</td></tr>\n    <tr><td><strong>Chargebacks</strong></td><td>Walmart chargebacks are aggressive — late/partial shipments, non-compliant packaging = automatic deductions.</td></tr>\n    <tr><td><strong>Fill rate</strong></td><td>95%+ required. Below 85% = account suspension risk.</td></tr>\n    <tr><td><strong>Working capital</strong></td><td>500 stores × 2-3 weeks stock = 5,250 units in retail = ~$315K in COGS tied up.</td></tr>\n  </table>\n</div>\n\n<h3>🟡 Target (Potential — 40% Margin, Premium Beauty Focus)</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">Target — Premium Beauty Meets Mass Market</div>\n  <table>\n    <tr><th>Factor</th><th>Detail</th></tr>\n    <tr><td><strong>Margin</strong></td><td><strong>40% gross margin</strong> (same as Walmart per Kevin). At $199 → Target pays $119.40 wholesale.</td></tr>\n    <tr><td><strong>Beauty remodel</strong></td><td>Target has invested heavily in premium beauty sections. Dedicated fixture space for beauty devices (same tier as GHD, Dyson). This is friendly territory for iRESTORE.</td></tr>\n    <tr><td><strong>Why Target over Walmart</strong></td><td>Higher-income shopper, better beauty brand positioning, redesigned beauty aisles. Kevin specifically mentioned Target in the D2C podcast as a goal: \"when someone walks by this on the shelf, let's say in Target or Sephora.\"</td></tr>\n    <tr><td><strong>Requirements</strong></td><td>Retail-ready packaging (RRP/\"PDQ\" displays), GS1 barcodes, anti-theft tagging, fill rate 95%+, planogram support.</td></tr>\n    <tr><td><strong>Wand fit</strong></td><td>Sub-$200 wand is specifically designed for this channel (Kevin: \"more retail friendly\"). $199 is impulse-buy territory at Target.</td></tr>\n    <tr><td><strong>Land-and-expand</strong></td><td>$199 wand gets consumers into the iRESTORE ecosystem → upsell to $695-1,395 devices via DTC. Every Target buyer = DTC prospect.</td></tr>\n  </table>\n</div>\n\n<h3>🟡 Sephora (Potential — ~50% Margin, Brand Play)</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">Sephora — Brand Building, Not Profit Center</div>\n  <table>\n    <tr><th>Factor</th><th>Detail</th></tr>\n    <tr><td><strong>Margin</strong></td><td><strong>~50% retailer margin</strong> for beauty devices. At $199 → Sephora pays ~$99.50 wholesale.</td></tr>\n    <tr><td><strong>Unit economics reality</strong></td><td>After COGS ($60) + packaging ($4.50) + co-op/MDF ($10) + broker ($5) + returns ($2) = <strong>only ~$15 gross profit/unit.</strong> This is a brand investment, not a profit center.</td></tr>\n    <tr><td><strong>Contract terms</strong></td><td>\"Non-negotiable as presented\" — but persistent brands can negotiate changes. Requires legal review.</td></tr>\n    <tr><td><strong>What they require</strong></td><td>Regulatory Requirements Letter, Quality Requirements Letter, Guarantee, Supplier Code of Conduct, Logistics Specifications — all signed before first PO.</td></tr>\n    <tr><td><strong>Co-op/MDF</strong></td><td>10-15% of first-year volume as MDF (Marketing Development Funds) for in-store animations, sampling, launch events.</td></tr>\n    <tr><td><strong>Why it matters</strong></td><td>Sephora credibility = exit value. L'Oréal, Shiseido, Estée Lauder all acquire brands with prestige retail distribution. NuFACE went from DTC to Sephora and it transformed their brand.</td></tr>\n    <tr><td><strong>Bundle fix</strong></td><td>Device + serum bundle at Sephora could push GP from $15 → ~$50/unit. Consumable margin saves the channel economics.</td></tr>\n  </table>\n</div>\n\n<div class=\"tip\"><strong>COGS sensitivity warning:</strong> If COGS rises to $70 (+$10), Sephora GP drops from $15 → $5/unit. Channel economics break unless bundled. This is a fragile channel — the COO needs to watch COGS like a hawk.</div>\n\n<h3>🟡 Ulta (Potential — ~50% Margin, Mass Prestige)</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">Ulta — Higher Volume Than Sephora, Stricter Operations</div>\n  <table>\n    <tr><th>Factor</th><th>Detail</th></tr>\n    <tr><td><strong>Margin</strong></td><td>~50% (same as Sephora). Similar unit economics (~$14 GP/unit device-only).</td></tr>\n    <tr><td><strong>Key difference</strong></td><td><strong>44M loyalty members</strong> (vs. Sephora's smaller prestige base). More volume potential at mass-prestige positioning.</td></tr>\n    <tr><td><strong>EDI (strict)</strong></td><td>Mandatory within 30 days of signing Vendor Purchasing Agreement. Must use SPS Commerce or OpenText. No exceptions.</td></tr>\n    <tr><td><strong>Fill rate</strong></td><td>\"Revised Fill Rate\" tracked aggressively. Over-shipping = chargeback (Ulta withholds payment).</td></tr>\n    <tr><td><strong>Compliance</strong></td><td>All facilities subject to Ulta Vendor Standards (ethical, legal, social, workplace standards).</td></tr>\n    <tr><td><strong>vs. Sephora positioning</strong></td><td>Ulta is more operationally rigid but more accessible. Better for volume. Sephora is more marketing-flexible but more prestige-exclusive. Better for brand.</td></tr>\n    <tr><td><strong>1,400+ US stores</strong></td><td>200 stores × 8 units/month = 19K units/year × $14.25 = ~$271K annual contribution — better than Sephora on volume alone.</td></tr>\n  </table>\n</div>\n\n<h3>🟡 QVC/HSN (Potential — Live Commerce)</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">QVC/HSN — Volume Spikes + TV Credibility</div>\n  <table>\n    <tr><th>Factor</th><th>Detail</th></tr>\n    <tr><td><strong>Commission</strong></td><td>30-50% of retail price. For a $199 device, QVC takes $60-100. Higher than traditional retail.</td></tr>\n    <tr><td><strong>Volume math</strong></td><td>One successful air slot can move 1,000-5,000+ units overnight. Not recurring — spike-based.</td></tr>\n    <tr><td><strong>Perfect product fit</strong></td><td>Beauty devices are ideal for live shopping: require demonstration, visual before/afters, $199 is QVC's sweet spot. NuFACE built their brand on QVC.</td></tr>\n    <tr><td><strong>Halo effect</strong></td><td>QVC appearances create branded search spikes. \"As seen on TV\" carries weight for 35-55 demographics — hair loss audience.</td></tr>\n    <tr><td><strong>Returns</strong></td><td>Higher return rates than traditional retail. Budget 5-10% return reserve.</td></tr>\n    <tr><td><strong>Strategic use</strong></td><td>Best as working capital reserve and brand validation — not a primary ongoing channel.</td></tr>\n  </table>\n</div>\n\n<h3>🔵 Nordstrom (Aspirational — Premium Halo)</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">Nordstrom — Prestige Positioning Reference</div>\n  <table>\n    <tr><th>Factor</th><th>Detail</th></tr>\n    <tr><td><strong>Margin</strong></td><td>~45% (between Costco and Sephora). Better margin than Sephora but lower volume.</td></tr>\n    <tr><td><strong>Why it's relevant</strong></td><td>CurrentBody (competitor) is in Nordstrom. Proves beauty devices work in prestige department stores.</td></tr>\n    <tr><td><strong>EDI</strong></td><td>Required within 60 days. SDS (Safety Data Sheets) required for devices with electrical components.</td></tr>\n    <tr><td><strong>Strategic value</strong></td><td>Nordstrom credibility helps Sephora/Ulta negotiations. Low volume, high brand leverage.</td></tr>\n    <tr><td><strong>Priority</strong></td><td>Tier 3 — pursue only after Sephora/Ulta validation. $100K co-op budget year 1.</td></tr>\n  </table>\n</div>"

          {
            "id": "ws-concepts",
            "title": "Key Concepts for the Interview",
            "html": "<h3>MAP Policy (Minimum Advertised Price)</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">MAP — The Foundation of Multi-Channel Pricing</div>\n  <ul>\n    <li><strong>What it is:</strong> A manufacturer's rule setting the lowest price a reseller can <em>advertise</em> publicly. Does NOT restrict the actual selling price (in-cart/checkout pricing can be lower). This is a legal distinction — outright price-fixing is illegal, but MAP is generally enforceable.</li>\n    <li><strong>Why iRESTORE needs it:</strong> Selling through DTC, Amazon, Costco, and potentially Sephora/Ulta/Target creates price competition across channels. Without MAP, a retailer could advertise the Elite at $499 (instead of $695), tanking perceived value everywhere.</li>\n    <li><strong>Internet MAP (iMAP):</strong> Separate minimum prices for online channels to account for Amazon/marketplace dynamics.</li>\n    <li><strong>Enforcement:</strong> Requires automated monitoring across Amazon, Costco.com, Target.com, Sephora.com, marketplace sellers. Violation penalties: supply restrictions, account suspension. Tools cost $2-5K/month.</li>\n    <li><strong>COO first-week action:</strong> MAP policy must be finalized with legal/finance before any new retail launch. Non-negotiable.</li>\n  </ul>\n</div>\n\n<h3>SMU (Special Make-Up) Products</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">SMU — Kevin's \"Six-Figure Lesson\"</div>\n  <ul>\n    <li><strong>What it is:</strong> Custom/exclusive product variants made specifically for one retailer. Different color, packaging, bundle, or specification — \"inherently a different product\" so you're not in direct price competition across channels.</li>\n    <li><strong>Kevin's example:</strong> \"That's why when you go in Costco you see these different pack sizes and stuff — a 24-pack instead of a 12-pack of soda, or a bundle of three for Tide instead of one in Target.\"</li>\n    <li><strong>For iRESTORE:</strong> Costco gets exclusive color. Amazon gets device + supplement bundle. Sephora gets device + serum kit. DTC gets the \"standard\" SKU at full MSRP. No cross-channel price comparison possible.</li>\n    <li><strong>Cost trade-off:</strong> SMU adds ~$2/unit in COGS (custom color/packaging) but saves six figures in margin erosion from channel conflict. Easy math.</li>\n    <li><strong>Operational complexity:</strong> Separate SKU tracking, separate COGS, separate MOQs per channel. Requires strong inventory management — this is a COO infrastructure build.</li>\n  </ul>\n</div>\n\n<h3>Channel Conflict Management</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">How to Manage Pricing Across 5+ Channels</div>\n  <table>\n    <tr><th>Strategy</th><th>How It Works</th><th>Best For</th></tr>\n    <tr><td><strong>SMU / Exclusive SKUs</strong></td><td>Different color/specs/bundles per channel. No price comparison possible.</td><td>Costco, Target, Sephora</td></tr>\n    <tr><td><strong>MAP Enforcement</strong></td><td>Set advertised price floor. Monitor + penalize violations.</td><td>All channels</td></tr>\n    <tr><td><strong>Dynamic Bundling</strong></td><td>Device-only on DTC, device+serum at Sephora, device+supplements on Amazon. Different products = different prices.</td><td>Amazon vs. DTC vs. Retail</td></tr>\n    <tr><td><strong>Channel Segmentation</strong></td><td>DTC = premium/full line. Retail = entry-level wand. Amazon = bundles. Each channel gets different product tiers.</td><td>Preventing cannibalization</td></tr>\n  </table>\n</div>"
          },
          {
            "id": "ws-ops-matrix",
            "title": "Operational Requirements Matrix",
            "html": "<div class=\"card\">\n  <div class=\"card-header\">What the COO Needs to Build Before Retail Launch</div>\n  <table>\n    <tr><th>Requirement</th><th>Costco</th><th>Sephora</th><th>Ulta</th><th>Walmart</th><th>Target</th></tr>\n    <tr><td><strong>EDI System</strong></td><td>✅ Mandatory</td><td>Portal</td><td>✅ 30 days</td><td>✅ Mandatory</td><td>✅ Mandatory</td></tr>\n    <tr><td><strong>Slotting Fees</strong></td><td>None</td><td>None</td><td>None</td><td>Typical</td><td>Typical</td></tr>\n    <tr><td><strong>Insurance</strong></td><td>$1M</td><td>$1M</td><td>$1M</td><td>$1M</td><td>$1M</td></tr>\n    <tr><td><strong>Co-op/MDF</strong></td><td>Demo costs</td><td>10-15%</td><td>10-15%</td><td>2-5%</td><td>2-5%</td></tr>\n    <tr><td><strong>Anti-Theft</strong></td><td>—</td><td>Tagging</td><td>Tagging</td><td>Required</td><td>Required</td></tr>\n    <tr><td><strong>Fill Rate</strong></td><td>95%+</td><td>90%+</td><td>95%+</td><td>95%+</td><td>95%+</td></tr>\n    <tr><td><strong>Packaging</strong></td><td>Strict specs</td><td>Standard</td><td>Standard</td><td>RRP required</td><td>RRP required</td></tr>\n    <tr><td><strong>Returns</strong></td><td>Generous</td><td>60 days</td><td>30-60 days</td><td>Standard</td><td>Standard</td></tr>\n  </table>\n  <p class=\"muted\"><strong>EDI:</strong> Electronic Data Interchange — automated order/invoice systems. Cost: $500-2K/month via SPS Commerce or OpenText. <strong>RRP:</strong> Retail-Ready Packaging — shelf-ready displays, hanger holes, perforated opens. <strong>MDF:</strong> Marketing Development Funds — vendor-funded marketing accrued as % of sales.</p>\n</div>"

n't just a revenue play — it's the margin lever that unlocks Sephora/Ulta.</div>"

            "html": "<div class=\"card\">\n  <div class=\"card-header\">Recommended Channel Sequencing (COO Execution)</div>\n  <table>\n    <tr><th>Tier</th><th>Channel</th><th>Timeline</th><th>Investment</th><th>Rationale</th></tr>\n    <tr style=\"background:#e8f5e9\"><td><strong>Tier 1</strong></td><td>Costco (maintain)</td><td>Ongoing</td><td>Minimal</td><td>Already 15% of revenue. Protect with SMU strategy.</td></tr>\n    <tr style=\"background:#e8f5e9\"><td><strong>Tier 1</strong></td><td>Amazon (optimize)</td><td>Ongoing</td><td>Ongoing PPC</td><td>60-70% category share. Bundle strategy + AWD for margin.</td></tr>\n    <tr><td><strong>Tier 2</strong></td><td>Walmart / Target</td><td>5-7 months</td><td>~$500K</td><td>40% margin is workable. 500-store test → $262K/mo GP potential.</td></tr>\n    <tr><td><strong>Tier 2</strong></td><td>QVC/HSN</td><td>2-3 months</td><td>Minimal</td><td>\"One phone call\" lever. Great for $199 wand. Volume spikes.</td></tr>\n    <tr><td><strong>Tier 3</strong></td><td>Sephora / Ulta</td><td>4-6 months</td><td>~$300K each</td><td>Only profitable with bundles. Brand play for exit narrative.</td></tr>\n    <tr><td><strong>Tier 3</strong></td><td>Nordstrom</td><td>5-7 months</td><td>~$100K</td><td>Prestige halo. Low volume but validates category at premium.</td></tr>\n  </table>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">90-Day Retail Readiness Execution Plan</div>\n  <table>\n    <tr><th>Week</th><th>Action</th><th>Owner</th></tr>\n    <tr><td><strong>1-2</strong></td><td>Finalize MAP policy with legal/finance</td><td>COO + Legal</td></tr>\n    <tr><td><strong>1-2</strong></td><td>Audit COGS by channel — build unit economics model</td><td>COO + Finance</td></tr>\n    <tr><td><strong>2-3</strong></td><td>Secure EDI provider (SPS Commerce or OpenText)</td><td>COO + IT</td></tr>\n    <tr><td><strong>3-4</strong></td><td>Retail packaging redesign + samples ordered</td><td>Marketing + Ops</td></tr>\n    <tr><td><strong>4-6</strong></td><td>Build retail fulfillment SOP (separate from DTC/Amazon)</td><td>COO + Warehouse</td></tr>\n    <tr><td><strong>4-6</strong></td><td>Finalize SMU strategy — which products, which channels</td><td>COO + Product</td></tr>\n    <tr><td><strong>6-8</strong></td><td>RFP and shortlist broker/rep firms</td><td>COO + Sales</td></tr>\n    <tr><td><strong>8-12</strong></td><td>First buyer meetings (Sephora, Ulta, Walmart, Target)</td><td>Sales + Broker</td></tr>\n    <tr><td><strong>Month 4</strong></td><td>First POs in hand</td><td>Sales</td></tr>\n    <tr><td><strong>Month 6</strong></td><td>Walmart/Target 500-store test live</td><td>Ops + Sales</td></tr>\n  </table>\n</div>"

            "html": "<div class=\"card\">\n  <div class=\"card-header\">Questions to Ask Kevin About Retail Strategy</div>\n  <table>\n    <tr><th>Question</th><th>Why You're Asking</th></tr>\n    <tr><td>\"When you say 'get into Sephora/Ulta,' is that your top priority, or are you more focused on scaling Costco + Amazon further?\"</td><td>Tests whether Kevin has sequenced his channel strategy or is trying to do everything at once. COO needs to prioritize.</td></tr>\n    <tr><td>\"What's your target channel mix by exit? For example, DTC 20%, Amazon 40%, Costco 15%, Retail 25%?\"</td><td>Shows you think in portfolio terms, not just individual channels. Exit buyers care about concentration risk.</td></tr>\n    <tr><td>\"How far along is the SMU strategy? Exclusive colors only, or are we designing different feature sets per channel?\"</td><td>Tests operational maturity. If they haven't thought beyond \"different color,\" there's infrastructure to build.</td></tr>\n    <tr><td>\"Do you have a retail broker/rep firm, or is that a COO build?\"</td><td>Identifies whether the sales infrastructure exists or needs to be created from scratch.</td></tr>\n    <tr><td>\"What's the appetite for co-op/MDF spend in year 1? Sephora alone could be $200-300K.\"</td><td>Surfaces the investment conversation early. Retail isn't free — Kevin needs to budget for it.</td></tr>\n    <tr><td>\"Who currently manages the Costco relationship day-to-day? And the Target/misc retail?\"</td><td>Identifies whether this sits with Brandon (ops) or someone else. COO needs to know who owns what.</td></tr>\n  </table>\n</div>"

brand)</td><td>Strategic (PE-backed growth)</td><td>Significant multiple uplift</td></tr>\n    <tr><td><strong>FOREO</strong></td><td>Sephora, Ulta, Nordstrom</td><td>Multiple strategic offers</td><td>$1B+ valuation</td></tr>\n  </table>\n  <p class=\"muted\">Pattern: Every major beauty device/skincare exit that commanded a premium multiple had prestige retail distribution. DTC-only brands sell for less.</p>\n</div>\n\n<div class=\"answer-block\">\n  <strong>Exit framing:</strong> \"A DTC + Amazon business at $90M revenue gets a 3-4x EBITDA multiple from PE buyers. A multi-channel brand with Costco, Sephora, and Target distribution — plus recurring consumable revenue — attracts strategic beauty conglomerates willing to pay 6-8x. Drunk Elephant got $845M from Shiseido, Tatcha got $500M from Unilever — both had Sephora distribution. The channel strategy isn't just about revenue growth. It's about building the kind of business that L'Oréal or Estée Lauder wants to buy.\"\n</div>"

// ============================================================
// APP ENGINE — 3-level: group → section → subsection
// ============================================================
const nav = document.getElementById('nav');
const main = document.getElementById('main');
const hamburger = document.getElementById('hamburger');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');

// Mobile menu toggle
function toggleMenu(open) {
  const isOpen = open !== undefined ? open : !sidebar.classList.contains('open');
  sidebar.classList.toggle('open', isOpen);
  overlay.classList.toggle('open', isOpen);
}
hamburger.addEventListener('click', () => toggleMenu());
overlay.addEventListener('click', () => toggleMenu(false));

// Build nav + content panels
let firstSubId = null;

groups.forEach(group => {
  // --- Group header ---
  const groupEl = document.createElement('div');
  groupEl.className = 'nav-item group expanded';
  groupEl.dataset.group = group.id;
  groupEl.innerHTML = '<span>' + group.icon + ' ' + group.title + '</span><span class="chevron">▶</span>';

  const sectionIds = group.sections.map(s => s.id);
  groupEl.onclick = () => {
    const isExpanded = groupEl.classList.toggle('expanded');
    // Show/hide sections under this group
    document.querySelectorAll('.nav-item.parent').forEach(n => {
      if (sectionIds.includes(n.dataset.section)) {
        n.classList.toggle('visible', isExpanded);
        // If collapsing group, also collapse sections
        if (!isExpanded) {
          n.classList.remove('expanded');
          document.querySelectorAll(`.nav-item.sub[data-parent="${n.dataset.section}"]`).forEach(s => s.classList.remove('visible'));
        }
      }
    });
  };
  nav.appendChild(groupEl);

  // --- Sections within group ---
  group.sections.forEach(sec => {
    const parent = document.createElement('div');
    parent.className = 'nav-item parent visible';
    parent.dataset.section = sec.id;
    parent.dataset.group = group.id;
    parent.innerHTML = '<span>' + sec.icon + ' ' + sec.title + '</span><span class="chevron">▶</span>';

    const subIds = sec.subs.map(s => s.id);
    parent.onclick = (e) => {
      const isExpanded = parent.classList.toggle('expanded');
      document.querySelectorAll('.nav-item.sub').forEach(n => {
        if (subIds.includes(n.dataset.id)) {
          n.classList.toggle('visible', isExpanded);
        }
      });
      if (isExpanded && sec.subs.length) activate(sec.subs[0].id);
    };
    nav.appendChild(parent);

    // --- Subsections ---
    sec.subs.forEach(sub => {
      if (!firstSubId) firstSubId = sub.id;

      const navItem = document.createElement('div');
      navItem.className = 'nav-item sub';
      navItem.dataset.id = sub.id;
      navItem.dataset.parent = sec.id;
      navItem.dataset.group = group.id;
      navItem.textContent = sub.title;
      navItem.onclick = () => activate(sub.id);
      nav.appendChild(navItem);

      const div = document.createElement('div');
      div.className = 'section';
      div.id = 'sec-' + sub.id;
      div.innerHTML = '<h1>' + sub.title + '</h1>' + sub.html;
      main.appendChild(div);
    });
  });
});

function activate(id) {
  // Clear all active states
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  // Activate content panel
  const sec = document.getElementById('sec-' + id);
  if (sec) { sec.classList.add('active'); }

  // Activate nav item and ensure parents are expanded
  const navItem = document.querySelector(`.nav-item.sub[data-id="${id}"]`);
  if (navItem) {
    navItem.classList.add('active');

    // Expand parent section if collapsed
    const parentId = navItem.dataset.parent;
    if (parentId) {
      const parentNav = document.querySelector(`.nav-item.parent[data-section="${parentId}"]`);
      if (parentNav && !parentNav.classList.contains('expanded')) {
        parentNav.classList.add('expanded');
        document.querySelectorAll(`.nav-item.sub[data-parent="${parentId}"]`).forEach(n => n.classList.add('visible'));
      }
      // Expand parent group if collapsed
      if (parentNav) {
        const groupId = parentNav.dataset.group;
        const groupNav = document.querySelector(`.nav-item.group[data-group="${groupId}"]`);
        if (groupNav && !groupNav.classList.contains('expanded')) {
          groupNav.classList.add('expanded');
          document.querySelectorAll(`.nav-item.parent[data-group="${groupId}"]`).forEach(n => n.classList.add('visible'));
        }
      }
    }
    navItem.scrollIntoView({ block: 'nearest' });
  }
  // Close mobile menu on nav
  if (window.innerWidth <= 768) toggleMenu(false);
  window.scrollTo(0, 0);
}

// Search
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) {
    // Reset: clear marks, collapse everything
    document.querySelectorAll('.section').forEach(s => {
      s.innerHTML = s.innerHTML.replace(/<mark>/g, '').replace(/<\/mark>/g, '');
    });
    document.querySelectorAll('.nav-item.sub').forEach(n => { n.style.display = ''; n.classList.remove('visible'); });
    document.querySelectorAll('.nav-item.parent').forEach(n => { n.style.display = ''; n.classList.remove('expanded'); n.classList.add('visible'); });
    document.querySelectorAll('.nav-item.group').forEach(n => n.classList.add('expanded'));
    return;
  }
  let firstMatch = null;
  const matchedParents = new Set();
  const matchedGroups = new Set();

  document.querySelectorAll('.nav-item.sub').forEach(n => {
    const id = n.dataset.id;
    const sec = document.getElementById('sec-' + id);
    const text = sec.textContent.toLowerCase();
    const match = text.includes(q) || n.textContent.toLowerCase().includes(q);
    n.style.display = match ? 'block' : 'none';
    if (match) {
      n.classList.add('visible');
      matchedParents.add(n.dataset.parent);
      matchedGroups.add(n.dataset.group);
      if (!firstMatch) firstMatch = id;
    } else {
      n.classList.remove('visible');
    }
  });

  // Show/expand matched sections and groups
  document.querySelectorAll('.nav-item.parent').forEach(n => {
    const matched = matchedParents.has(n.dataset.section);
    n.classList.toggle('expanded', matched);
    n.classList.toggle('visible', matched);
    n.style.display = matched ? 'flex' : 'none';
  });
  document.querySelectorAll('.nav-item.group').forEach(n => {
    n.classList.toggle('expanded', matchedGroups.has(n.dataset.group));
  });

  if (firstMatch) activate(firstMatch);
});

// Expand / Collapse All — works across all 3 levels
document.getElementById('expandAll').addEventListener('click', () => {
  document.querySelectorAll('.nav-item.group').forEach(n => n.classList.add('expanded'));
  document.querySelectorAll('.nav-item.parent').forEach(n => { n.classList.add('expanded'); n.classList.add('visible'); });
  document.querySelectorAll('.nav-item.sub').forEach(n => n.classList.add('visible'));
});
document.getElementById('collapseAll').addEventListener('click', () => {
  document.querySelectorAll('.nav-item.group').forEach(n => n.classList.remove('expanded'));
  document.querySelectorAll('.nav-item.parent').forEach(n => { n.classList.remove('expanded'); n.classList.remove('visible'); });
  document.querySelectorAll('.nav-item.sub').forEach(n => n.classList.remove('visible'));
});

// Init: start with everything collapsed (no auto-open)
</script>
