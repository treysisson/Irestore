          {
            "id": "kq-context",
            "title": "Context: What Kevin's Email Tells Us",
            "html": "<div class=\"card\">\n  <div class=\"card-header\">Kevin's exact words</div>\n  <p>\"I wanted something to reference to dive deeper into your experiences on the next call. Given your fractional positions, perhaps listing out a few brands you worked with more closely / drove most impact for? Or whatever you feel is helpful.\"</p>\n</div>\n\n<p>This tells us three things:</p>\n<ul>\n  <li><strong>He's going to drill into your fractional work.</strong> He wants specifics — not \"I consulted for brands,\" but \"here's what I did, here's the impact.\"</li>\n  <li><strong>He's trying to assess whether fractional experience = real experience.</strong> There's an implicit question: \"Did you actually do the work, or did you advise from the sidelines?\"</li>\n  <li><strong>\"Whatever you feel is helpful\"</strong> is an invitation to shape the narrative. He's giving you the pen. Use it.</li>\n</ul>\n\n<div class=\"tip\"><strong>Strategy for the call:</strong> Kevin will likely go client by client through whatever you send him. For each one, expect: \"What did you actually do there? What was the outcome? Why did you leave?\" Prepare a tight 2-minute version and a 5-minute deep-dive version for each engagement.</div>"
          },
          {
            "id": "kq-fractional",
            "title": "Fractional / Consulting Deep-Dive Questions",
            "html": "<p>These are the questions Kevin is most likely to ask based on his email. He wants to understand the depth and impact of your fractional work.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">General Fractional Questions</div>\n  <table>\n    <tr><th style=\"width:45%\">Question</th><th>Model Answer</th></tr>\n    <tr>\n      <td><strong>\"Walk me through your consulting business. How does it work?\"</strong></td>\n      <td>\"I run Formosa Consulting — fractional COO/CFO engagements for founder-led DTC brands, typically $5M–$100M in revenue. Most clients come through my network — other founders, investors, people I've worked with. Engagements range from 3 months to 18+ months depending on the need. Some are deeply embedded — I'm in Slack daily, attending team meetings, owning deliverables. Others are more strategic — weekly calls, quarterly planning, specific projects. The common thread is that every client is a founder who's great at product or marketing but needs someone to build the operational backbone.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"How many clients do you typically work with at once?\"</strong></td>\n      <td>\"Usually 2–3 at different intensities. One might be deeply embedded — 15–20 hours a week — while others are lighter advisory. I'm transparent with every client about my bandwidth. Right now I'm actively working with [current client], which is winding down and would transition cleanly if I came on board with iRESTORE.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"Why fractional instead of going full-time somewhere?\"</strong></td>\n      <td>\"Honestly, after selling B2TM, I wanted the variety — to see different business models, different stages, different problems. And I've learned a ton from that. But I've reached the point where I miss being all-in on one company. The best version of what I do is when I have real ownership — literal and figurative — and I'm building for the long term, not handing something off in 6 months. That's why iRESTORE is so interesting to me. It's the right company to go all-in on again.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"If consulting is going well, why leave it?\"</strong></td>\n      <td>\"It is going well — that's actually what made me realize the limitation. When I'm fractional, I build something great and then hand it off. At Stay Golden, I implemented EOS, doubled the business, and then moved on. It works, but I never get to see it through to Year 3, Year 5. I want to build something compounding — where the systems I put in place this year make next year exponentially better. And I want to be invested in the outcome, not just the process.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"Would you keep any consulting clients if you joined us?\"</strong></td>\n      <td>\"No. If I come on board, I'm 100% iRESTORE. I'd transition my current engagements cleanly — I always build with handoff in mind, so that's not a disruption for the clients. This role deserves full attention, and frankly, that's what I want.\"</td>\n    </tr>\n  </table>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">General Consulting Questions</div>\n  <table>\n    <tr><th style=\"width:45%\">Question</th><th>Model Answer</th></tr>\n    <tr>\n      <td><strong>\"Which engagement are you most proud of?\"</strong></td>\n      <td>\"Stay Golden, because the transformation was so complete. When I came in, there was no operating system at all. When I left, there was a full EOS cadence, a streamlined product line, double the revenue, and two co-founders who had a real partnership structure. That's the closest analog to what you'd want me to do at iRESTORE — come in, build the infrastructure, and create something sustainable.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"What's the biggest engagement you've had by revenue?\"</strong></td>\n      <td>\"The companies I've worked inside have ranged from $2M to $100M+. Zach Stuck's holding company had brands collectively in the $50M+ range, and the supplement brand I helped early on is now $100M+. But I want to be honest — my deepest, most hands-on operational experience is at the $2M–$20M range. What I bring to a $100M+ company like iRESTORE is the builder's mindset combined with the pattern recognition from seeing a dozen different businesses up close. I think your ops are probably running like a $20–30M company despite the revenue — and that gap is exactly where I'm strongest.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"What's your typical engagement look like — how embedded are you really?\"</strong></td>\n      <td>\"It depends on the client, but my best work is deeply embedded. At Stay Golden, I was in it daily for 16 months — I knew every person on the team, sat in every L10, and was the de facto operator. At Easy Street, it was more strategic — weekly deep sessions with Zach, building dashboards and systems, then handing them off to the team. Either way, I'm not the consultant who sends a deck. I build the thing and run it until the team can own it.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"Has a consulting engagement ever not worked out? Why?\"</strong></td>\n      <td>\"Yes. I've had engagements where the founder wasn't actually ready to let go of control. I'd build the system — the dashboard, the cadence, the process — and then they'd bypass it because old habits are hard to break. That's frustrating, and it's honestly one of the reasons I want a full-time role again. When I'm the COO with real authority, the systems stick because I'm there to enforce them every day. Fractional work has a ceiling when the founder isn't ready to delegate.\"</td>\n    </tr>\n  </table>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Easy Street / Hollow Socks — Deep-Dive Questions</div>\n  <table>\n    <tr><th style=\"width:45%\">Question</th><th>Model Answer</th></tr>\n    <tr>\n      <td><strong>\"Tell me about the Easy Street / Hollow Socks engagement.\"</strong></td>\n      <td>\"Zach Stuck runs a holding company — Easy Street Brands. His primary brand, Hollow Socks, was doing about $20M when I came in. He also had an early-stage supplement brand that's since grown to $100M+. My role was fractional ops and finance — about 6–8 months. I led vendor negotiations, including getting ahead of raw material purchasing by analyzing price cycles for specialty fibers. I built Notion-based reporting systems — documented meeting structures, operational dashboards, tracking cadences. And I was a strategic sparring partner for Zach on people decisions and growth strategy. It was a peer-to-peer dynamic — exactly the kind of relationship you described wanting with a COO.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"What exactly did you do on the supply chain side for Hollow Socks?\"</strong></td>\n      <td>\"Hollow Socks uses alpaca yarn from Peru — specialty fiber, limited suppliers, long lead times. The business was scaling from $20M toward $70–80M, and if they didn't lock down raw materials ahead of demand, growth would've stalled — you literally can't sell socks you can't make. I got ahead of the purchasing cycle at the raw material level, not just finished goods. Negotiated volume commitments directly with Peru-based fiber suppliers, had the factories store yarn on-site so production was pre-loaded. That single supply chain move is what enabled the growth trajectory. I also managed their 2–3 US-based sock manufacturers — forecasting, planning, pricing negotiations. Saved at least a couple of points of margin.\"</td>\n    </tr>\n    <tr>\n      <td><strong>Follow-up: \"How did you know to get ahead of the fiber purchasing? Was someone asking you to do that?\"</strong></td>\n      <td>\"No one asked. It came from looking at the growth plan and working backwards. If you're projecting $70–80M in revenue, you need X amount of yarn, and the Peru supply base can only produce so much. I mapped the supply constraint before it became a bottleneck. That's how I think about operations — what's the thing that will break at the next stage of growth, and how do we solve it before it breaks?\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"You said Zach is a marketer by trade. How did that dynamic work?\"</strong></td>\n      <td>\"Very similarly to how I think you and I would work. Zach is brilliant at brand, marketing, and growth — but ops and finance aren't his zone of genius. He had junior people in those roles who were doing their best but didn't have the experience to build systems. I came in as a peer, not a subordinate — we'd get on calls and spar about strategy, people decisions, where to allocate capital. But then I'd also go build the dashboard, run the S&OP meeting, negotiate the vendor contract. That blend of strategic partner and hands-on operator is exactly the dynamic you described wanting.\"</td>\n    </tr>\n    <tr>\n      <td><strong>Follow-up: \"What happened when you left? Did the systems stick?\"</strong></td>\n      <td>\"The infrastructure I built is still in place — the dashboards, the reporting cadences, the supply chain relationships. But that's one of the limitations of fractional work — you build it and hand it off, and then it's on the team to maintain it. Some things evolve, some things atrophy. That's honestly part of why I'm looking for a full-time seat. I want to build the systems AND be the person who ensures they keep running.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"You mentioned Zach also had a supplement brand. What was your involvement there?\"</strong></td>\n      <td>\"I helped build initial operational infrastructure — cash flow management, operational tools, some early processes. I wasn't deeply embedded in the supplement brand's growth story — that's their team's accomplishment. But I helped lay some of the foundation early on when they were just getting started. It's now doing $100M+, which I'm proud to have been even a small part of.\"</td>\n    </tr>\n  </table>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Stay Golden — Deep-Dive Questions</div>\n  <table>\n    <tr><th style=\"width:45%\">Question</th><th>Model Answer</th></tr>\n    <tr>\n      <td><strong>\"What about Stay Golden?\"</strong></td>\n      <td>\"Stay Golden is a DTC jewelry brand. When I came in they were doing about $2M with a hands-off founder. The brand had gone viral on TikTok but the business had no infrastructure — no operating rhythm, no financial visibility, massively over-SKU'd product line. I implemented EOS from scratch — L10 meetings, Rocks, the full cadence. I did a deep SKU rationalization: identified their long tail of underperforming products, ran a strategic liquidation, freed up cash, and focused inventory on the high-velocity items. We doubled the business from $2M to $4M in about 16 months. I also brokered the co-founder equity partnership between the two founders — first-time entrepreneurs who needed an adult in the room. That partnership is still intact today.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"Walk me through the EOS implementation. What was the resistance?\"</strong></td>\n      <td>\"The founders had never worked in a structured environment — neither had held a traditional job. So EOS wasn't just new, it was culturally foreign. The first few L10s were rough — people didn't know how to IDS issues, Rocks felt arbitrary, the scorecard metrics didn't exist yet. The key was consistency. I ran the L10 every single week, no exceptions. I set the Rocks with them and we reviewed them every quarter. After about 6–8 weeks, they started to see the pattern — problems that used to spiral for weeks were getting solved in 20 minutes during IDS. Once they felt that, the buy-in shifted from compliance to genuine belief.\"</td>\n    </tr>\n    <tr>\n      <td><strong>Follow-up: \"You went from no EOS to full cadence. Where did you start?\"</strong></td>\n      <td>\"Leadership Team L10 first — that's always where you start. If the leadership cadence isn't tight, nothing downstream works. I built the scorecard with the founders: what are the 5–8 numbers that tell us if this week was healthy? Then Rocks for the quarter — what are the 3–5 things that must get done in the next 90 days? Once the L10 was running consistently, we added sub-team meetings for marketing and brand. The People Analyzer and V/TO came later once the weekly rhythm was solid.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"Tell me more about the SKU rationalization. How did you decide what to cut?\"</strong></td>\n      <td>\"Data. I pulled sell-through rates by SKU, looked at days of inventory, margin per piece, and return rates. The pattern was obvious — maybe 20% of their styles were driving 80% of revenue, and they had this massive long tail of one-off designs that were tying up cash in inventory and cluttering the website. I presented the analysis to the founders, then we ran strategic liquidation sales — not fire sales, but curated clearance events that actually felt on-brand. Freed up cash, simplified the warehouse, and the remaining catalog told a tighter story. The website went from overwhelming to curated. That change alone improved conversion.\"</td>\n    </tr>\n    <tr>\n      <td><strong>Follow-up: \"How did the founders react to cutting products they'd designed?\"</strong></td>\n      <td>\"That's always emotional — especially for a creative founder. Aliya designed every piece. But I framed it around the data, not opinion. 'This piece sold 12 units in 6 months and it's sitting on $8,000 in inventory. This piece sold 400 units and we're restocking monthly.' When you put it that way, the decision makes itself. The harder part was helping her see that fewer, better pieces is a stronger brand — not a retreat. She got there, and the results proved it.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"You brokered a co-founder partnership. How does that work?\"</strong></td>\n      <td>\"Rony had been the fractional CMO and was running most of the day-to-day marketing. Aliya was the creative founder and public face but wasn't operationally involved. The business needed both of them committed — but there was no formal structure. I saw the dynamic and said, 'You two need to be co-founders, not a founder and a contractor.' I helped structure the equity split, figured out the investment terms, and honestly spent a lot of time just talking both of them through it separately. First-time entrepreneurs, no prior business experience — it was a mentoring exercise as much as a deal negotiation. That partnership is still going strong.\"</td>\n    </tr>\n    <tr>\n      <td><strong>Follow-up: \"Was that in your scope? Or did you just see it needed to happen?\"</strong></td>\n      <td>\"Not in scope at all. I was brought in for operational help. But when you're embedded in a business, you see things that are bigger than the ops problems. The structural issue — unclear ownership between two people who should be co-founders — was going to undermine everything else I was building. I brought it up because it needed to happen, not because someone asked me to. That's how I operate — I don't stay in my lane if I see something that matters.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"Stay Golden is a $4M jewelry brand. How is that relevant to a $100M device company?\"</strong></td>\n      <td>\"Fair question. It's not a scale parallel — it's a systems parallel. The EOS implementation, the SKU rationalization methodology, the operating cadence I built — those are the same playbooks at $4M or $400M. The difference is scale, not kind. And honestly, building EOS from zero at a company with no prior structure is harder than tuning EOS at a company that already has some version running. I did the hardest version of that at Stay Golden. Getting iRESTORE from 60% to 100% is actually a more straightforward problem — the foundation exists, it just needs someone to own the discipline.\"</td>\n    </tr>\n  </table>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Equip Foods — Deep-Dive Questions</div>\n  <table>\n    <tr><th style=\"width:45%\">Question</th><th>Model Answer</th></tr>\n    <tr>\n      <td><strong>\"Tell me about the Equip Foods work.\"</strong></td>\n      <td>\"Equip Foods is a supplement/nutrition brand — was doing about $15M, on a trajectory to $40M. The founder wasn't day-to-day; there was a younger GM running things with a very small team. I was there about 4–5 months. Two big deliverables: one, I rebuilt their affiliate analytics — they were spending on affiliates without knowing blended ROAS at the individual affiliate level. Once we had that visibility, their allocation strategy changed immediately. Two, I designed the VP-level hiring process for VP of Finance and VP of Growth using the WHO method — full scorecards, structured interviews, pipeline tracking in Notion.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"What was wrong with their affiliate analytics?\"</strong></td>\n      <td>\"They were tracking performance at the program level — total affiliate spend, total affiliate revenue — but they couldn't see which individual affiliates were profitable and which were burning money. It's like knowing your total ad spend and total revenue but not knowing which campaigns are working. I rebuilt the tracking so they could calculate blended ROAS per affiliate, identify the top performers, and cut or renegotiate the underperformers. The insight was immediate — they were over-investing in some affiliates who looked good on vanity metrics but had terrible blended economics, and under-investing in others who were quietly driving high-LTV customers.\"</td>\n    </tr>\n    <tr>\n      <td><strong>Follow-up: \"How did you actually build that? Was it a spreadsheet, a tool, what?\"</strong></td>\n      <td>\"It was a combination. I pulled data from their affiliate platform, their payment systems, and their revenue attribution tools, then built a consolidated view that normalized everything to a blended ROAS per affiliate. The technical piece wasn't complicated — the hard part was getting the data sources to talk to each other and establishing a methodology the team would trust and maintain after I left. I documented the process so their marketing team could refresh it monthly.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"Walk me through the hiring process you built for the VP roles.\"</strong></td>\n      <td>\"I started with scorecards — not job descriptions, scorecards. For the VP of Finance: what does this person need to accomplish in year one? What competencies matter most for a supplement brand at this stage? Same for VP of Growth. Then I designed the interview pipeline in Notion — four stages: screening call, a WHO-style career walk-through, focused skill interviews tied to scorecard competencies, and structured reference checks where I actually asked hard questions. Each stage had specific evaluation criteria. The whole thing was tracked in Notion so the team could see the pipeline, compare candidates against the scorecard, and make data-driven decisions instead of gut-feel hires.\"</td>\n    </tr>\n    <tr>\n      <td><strong>Follow-up: \"Did you also help source candidates, or just build the process?\"</strong></td>\n      <td>\"Both. I helped source through network outreach and evaluated candidates at the screening stage. But the more lasting value was the system itself — the scorecards, the structured interviews, the evaluation criteria. That process is reusable for every hire they make at that level going forward. It's also the exact same approach I'd bring to iRESTORE — before we post a single job, we'd have a scorecard that defines what 'right person, right seat' looks like.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"You were only there 4–5 months. Can you really make an impact that fast?\"</strong></td>\n      <td>\"In a fractional role, you have to. I come in with a playbook — the first two weeks are observation and data gathering, weeks 3–4 I'm building the core systems, and by month 2 I'm in execution mode. At Equip, the affiliate analytics rebuild changed their marketing spend allocation within weeks. The hiring process was designed and running within a month. I also worked with their senior supply chain person on a stage-gating process for new product releases. The pace is actually an advantage — I don't have time for politics or slow-rolling, so I focus on the highest-impact moves first.\"</td>\n    </tr>\n  </table>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Pet Supplement Brand (Current) — Deep-Dive Questions</div>\n  <table>\n    <tr><th style=\"width:45%\">Question</th><th>Model Answer</th></tr>\n    <tr>\n      <td><strong>\"What are you working on right now with the pet supplement brand?\"</strong></td>\n      <td>\"I'm the fractional operator managing day-to-day operations across four channels — Amazon, DTC, TikTok Shop, and wholesale. The core project has been building their S&OP process and PO management from scratch. They were ordering inventory reactively — running out of best sellers, sitting on slow movers. I built a rolling demand plan that ties sales velocity by channel to purchase orders, with lead time buffers baked in. It's the same kind of system iRESTORE needs for its multi-channel operation.\"</td>\n    </tr>\n    <tr>\n      <td><strong>Follow-up: \"You're managing TikTok Shop for them? What does that look like operationally?\"</strong></td>\n      <td>\"TikTok Shop is still early for most brands, including this one. The operational complexity is different from Amazon or DTC — it's more event-driven, tied to creator content going viral. You can get a 10x spike from one video. So the S&OP process has to account for that volatility. I've been building a framework that separates baseline demand from viral spikes, so we're not over-ordering based on a one-week anomaly but we're also not caught flat when something takes off. It's relevant for iRESTORE if you're thinking about TikTok Shop, which at your price point could be interesting.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"How does managing operations across four channels differ from a single-channel business?\"</strong></td>\n      <td>\"The inventory planning gets exponentially more complex. Each channel has different lead times, different fee structures, different return profiles, and different demand patterns. Amazon needs FBA inventory pre-positioned weeks in advance. DTC ships from your 3PL on demand. TikTok is volatile. Wholesale is lumpy — big POs with long lead times. If you plan inventory in aggregate, you'll be overstocked in one channel and stocked out in another. I build channel-specific demand plans that feed into a consolidated purchase order. That's the same challenge iRESTORE faces with Amazon, DTC, Costco, and eventually international marketplaces.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"If you're currently embedded there, how would the transition work?\"</strong></td>\n      <td>\"Cleanly. I always build with handoff in mind — documented processes, dashboards that run without me, and a team that understands the systems. The S&OP process I built is designed to be maintained by their ops person. I'd give them proper notice and a transition plan. This is something I've done multiple times — I never leave a client hanging.\"</td>\n    </tr>\n  </table>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Cross-Client Pattern Questions</div>\n  <table>\n    <tr><th style=\"width:45%\">Question</th><th>Model Answer</th></tr>\n    <tr>\n      <td><strong>\"I notice you build dashboards for everyone. What goes on a dashboard?\"</strong></td>\n      <td>\"It depends on the business, but the framework is the same. Tier 1: the 5–8 numbers the CEO needs to see daily — revenue, margin, cash, order volume. Tier 2: operational health metrics the ops team monitors — fulfillment SLAs, inventory weeks of supply, return rates, CX response times. Tier 3: deep diagnostic metrics I'd track for root-cause analysis. The CEO sees Tier 1. I manage Tiers 2 and 3 and only escalate when something crosses a threshold. At Easy Street, I built this in Notion. At Stay Golden, same structure but simpler. For iRESTORE, I'd probably build it on top of your existing Fulfil.io data with a BI layer.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"You mention S&OP a lot. Have you ever built one for a company doing over $50M?\"</strong></td>\n      <td>\"Not directly — my hands-on S&OP builds have been at companies in the $2M–$40M range. But the mechanics scale. At $50M+ the meetings get more cross-functional — you're adding finance, marketing spend plans, channel-specific forecasts. The cadence shifts from monthly to weekly touchpoints with monthly deep reviews. And you need better tooling — probably something beyond spreadsheets. But the core logic is the same: align demand forecast with supply capacity, identify gaps early, and make decisions proactively instead of reactively. I'd also want to understand what tools iRESTORE already has — Fulfil.io may have demand planning capabilities I'd build on rather than starting from scratch.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"What's the pattern you see across all these brands? What breaks first?\"</strong></td>\n      <td>\"Almost always the same three things: no financial visibility by channel, no demand planning process, and no operating cadence. Founders build the product and the marketing engine, but the operational infrastructure is always behind. They're making decisions off gut feel because the data isn't organized, they're reacting to inventory crises instead of preventing them, and meetings are either non-existent or unstructured. That's what I fix — and based on what you've described, iRESTORE has the same pattern. $100M+ in revenue with 60% EOS, no formal demand planning, and one ops person running everything. The revenue outgrew the infrastructure.\"</td>\n    </tr>\n  </table>\n</div>"

          {
            "id": "kq-b2tm",
            "title": "B2TM Deep-Dive Questions",
            "html": "<p>Kevin will almost certainly dig into your biggest and most relevant experience — co-founding and scaling B2TM.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">The Core B2TM Questions</div>\n  <table>\n    <tr><th style=\"width:45%\">Question</th><th>Model Answer</th></tr>\n    <tr>\n      <td><strong>\"Tell me about Baboon to the Moon. What was it?\"</strong></td>\n      <td>\"B2TM was a DTC bags and travel accessories brand — colorful, bold designs, direct-to-consumer. I co-founded it with two partners around 2017. I was the operational co-founder — supply chain, e-commerce, tech, finance, customer service, 3PL management, the works. We scaled to about $20M in annual revenue with a team of 8–10 people. We went through COVID supply chain chaos, made 20+ trips to Asia for manufacturing, managed 300+ SKUs, and ultimately sold the business in 2023.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"What was your specific role vs. your co-founders?\"</strong></td>\n      <td>\"My two co-founders were the creative and brand side — product design, marketing, brand identity. I was the business side — everything operational, financial, and technical. That split worked because we had clear lanes. I owned the P&L, the supply chain from manufacturer to customer's door, the website and tech stack, customer service, and eventually the exit process. It's very similar to the Visionary/Integrator dynamic in EOS — they were the visionaries, I was the integrator.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"$20M is a lot smaller than $100M+. How do you bridge that gap?\"</strong></td>\n      <td>\"You're right, and I want to be upfront about that. But here's how I think about it: the systems that take a company from $20M to $100M are the same systems that take it from $100M to $300M — S&OP, demand planning, channel-level P&L, EOS, cross-functional alignment, proper hiring. The difference is scale, not kind. And from what you've described, iRESTORE's operational infrastructure is running more like a $20–30M company despite the revenue. I've built those systems from scratch. A big-company hire might know what the systems look like at $500M but has never had to build them — they've only inherited them. I think you need a builder right now, not a maintainer.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"What was the hardest thing about running B2TM?\"</strong></td>\n      <td>\"COVID supply chain, honestly. We were a travel-oriented brand that launched right before a global pandemic shut down travel. Container costs went from $3K to $25K. Lead times doubled. We had to pivot the brand positioning, manage inventory with wildly unpredictable demand, and keep the business alive. We came through it, but it tested every operational muscle I had. The upside is I learned more about supply chain resilience in those two years than most people learn in a decade.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"Why did you sell?\"</strong></td>\n      <td>\"Combination of factors. We'd scaled to a natural plateau, we'd taken on some debt to fund inventory growth, and the three co-founders were at a point where it was time for a transition. It was a soft landing — not a massive exit, but a clean one. In hindsight, I would have been more conservative on inventory financing earlier. That experience is actually why cash flow management is one of the first things I build for every consulting client.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"What would you have done differently at B2TM?\"</strong></td>\n      <td>\"Three things. One, I would have been more aggressive about firing underperformers earlier — I held on to our Head of Growth too long because I liked him, and it cost us. Two, I would have been more conservative with debt-funded inventory. And three, I would have invested in demand planning tooling earlier instead of running everything off spreadsheets. All three of those are things I now help clients with from Day 1.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"What was your supply chain setup?\"</strong></td>\n      <td>\"We manufactured in Asia — I personally made 20+ trips for production oversight, quality control, and relationship management. We managed 300+ SKUs, fulfilled through a US-based 3PL, and I evaluated dual-coast and international fulfillment options as we grew. I also designed the backend product management system on Sanity CMS for our e-commerce operation. The supply chain was my domain end-to-end — from factory floor to customer's door.\"</td>\n    </tr>\n  </table>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">B2TM Follow-Up & Drill-Down Questions</div>\n  <p>Kevin will almost certainly go deeper on B2TM. Here are the follow-ups to prepare for.</p>\n  <table>\n    <tr><th style=\"width:45%\">Question</th><th>Model Answer</th></tr>\n    <tr>\n      <td><strong>\"You said you did 20+ trips to Asia. What were you doing on those trips?\"</strong></td>\n      <td>\"Three things, usually. First, production oversight — being on the factory floor, checking quality, approving samples. When you're color-matching across fabrics, zippers, and trims from different suppliers, you can't do that over email. Second, relationship building. In Asian manufacturing culture, the relationship IS the business. The dinners, the factory visits, showing up consistently — that's what gets you net-200 terms and priority production slots when things get tight. Third, sourcing new vendors. I'd use each trip to visit prospective suppliers, evaluate their capabilities, and negotiate terms. By year 4 or 5, I had a deep network across Hong Kong, Vietnam, Taiwan, and mainland China.\"</td>\n    </tr>\n    <tr>\n      <td><strong>Follow-up: \"How did you manage quality control across multiple factories and countries?\"</strong></td>\n      <td>\"We used a nominated vendor model — meaning I sourced individual component suppliers rather than relying on a single end-manufacturer. That gives you more control but also more complexity. I set quality specifications for each component, approved production samples before bulk runs, and did in-line inspections during factory visits. For the times I wasn't there, I had a sourcing partner based in Hong Kong who acted as eyes and ears. The key is that quality issues are 10x cheaper to catch at the factory than after goods arrive at your warehouse.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"You managed 300+ SKUs. How did you handle that complexity with 8 people?\"</strong></td>\n      <td>\"Systems and ruthless prioritization. I built a custom CMS on Sanity that let us manage product data at scale — when we did a 10–15 SKU color drop, it deployed seamlessly across the website without manual page-building. For inventory, I categorized SKUs into tiers: core styles that always needed to be in stock, limited runs with fixed quantities, and collabs with defined lifecycles. Each tier had different planning rules. The small team forced discipline — we couldn't afford to do everything, so every SKU had to justify its place in the line. That actually made us a better business.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"Tell me about the shift from monthly drops to strategic drops. Whose idea was that?\"</strong></td>\n      <td>\"Mine. We were doing frequent drops — almost monthly — which kept the brand buzzy but was grinding down the team. Each drop was a full cycle: product development, production coordination, marketing, fulfillment. I did the math on per-drop economics and showed that fewer, bigger drops with better quantity planning would actually perform better financially AND operationally. The counterintuitive part was that scarcity helped the brand — when products sold out, it created urgency for the next launch. So we went from 'always launching something' to 'every launch is an event.' Better margins, less operational strain, more brand heat.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"How did you handle customer service for 3 years? That seems unsustainable.\"</strong></td>\n      <td>\"It was, eventually — that's one of my regrets, not hiring for it sooner. But the insight it gave me was irreplaceable. When you're reading every CX ticket, you know exactly where the product is failing, where the website is confusing, where the fulfillment process has gaps. I'd see a cluster of 'where's my order' tickets and know our tracking email flow was broken. I'd see return reason codes shifting and flag a quality issue before it hit the numbers. That ground-level understanding is what makes me a better operator. I don't manage from dashboards — I understand what the data represents because I've been the person dealing with the customer directly.\"</td>\n    </tr>\n    <tr>\n      <td><strong>Follow-up: \"At iRESTORE you wouldn't be doing CX yourself. How does that translate?\"</strong></td>\n      <td>\"I wouldn't be answering tickets, but I'd be building the systems around CX. Return reason codes feeding into product development. CSAT scores on the ops scorecard. Escalation paths that prevent small issues from becoming Amazon review problems. And honestly, in the first month, I'd probably sit with the CX team for a few days just to understand the customer experience firsthand. Not because I need to — because the patterns in CX tickets tell you more about what's broken in the business than any dashboard will.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"How did you handle disagreements with your co-founders?\"</strong></td>\n      <td>\"Directly, but in private. We had clear lanes — Andy owned brand and product vision, Michael owned marketing, I owned operations and finance. When we disagreed, it was usually at the intersection of those lanes. For example, Andy would want to launch a new colorway that I thought was operationally complex with low demand potential. I'd make my case with data — 'this color sold 40 units last time, and it requires a custom dye run from a second supplier.' Sometimes he'd convince me the brand story justified it. Sometimes I'd convince him to wait. The key was we debated privately and presented a united front to the team.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"Walk me through the sale process. What was your role?\"</strong></td>\n      <td>\"I managed the operational side of the exit — financial preparation, data room assembly, due diligence responses, operational documentation. Making sure the business looked clean and the numbers told a coherent story. The reality is, preparing for a sale is like preparing for an audit — every system, every process, every financial model gets scrutinized. That experience is directly relevant for iRESTORE if you're on a 2–4 year exit timeline. I know what acquirers look for, and I'd be building toward that standard from day one.\"</td>\n    </tr>\n    <tr>\n      <td><strong>Follow-up: \"You said the debt load was a factor in selling. What would you do differently?\"</strong></td>\n      <td>\"I'd have been more conservative on inventory financing from year 2 onward. We were growing fast and it felt like the right move — use debt to fund inventory for the next growth leg. And it worked in the short term. But when COVID hit and demand patterns shifted, the debt constrained our options. The lesson is: growth funded by debt is only good if you can service the debt in a downturn. Now, cash flow visibility and conservative inventory financing are literally the first two things I build for any client. I've seen the movie — I know how it ends when you get aggressive with inventory debt.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"What was your relationship with your 3PL like?\"</strong></td>\n      <td>\"Best-in-class, honestly. Same East Coast 3PL for the entire life of the business. Zero fulfillment crises — including Q4 peaks and surprise demand spikes from limited drops. The reason is communication. I built a proactive forecast communication cadence — I'd share demand projections weeks in advance so they could plan labor. They were never caught off-guard because they always knew what was coming. I also managed the SOPs, workflows, return logistics through Loop, and tech integrations. The 3PL was essentially an extension of our ops team, not a vendor we managed at arm's length.\"</td>\n    </tr>\n    <tr>\n      <td><strong>Follow-up: \"iRESTORE uses a 3PL too. What's the difference between a good and bad 3PL relationship?\"</strong></td>\n      <td>\"Communication and accountability. A bad 3PL relationship is reactive — you find out about problems after they've hit the customer. A good one is proactive — they flag issues before they escalate, and you give them the data to plan effectively. The single biggest thing I'd do for iRESTORE's 3PL relationship is implement a structured communication cadence: weekly performance reviews against SLAs, demand forecast sharing 4–6 weeks out, and a clear escalation path for exceptions. If the 3PL missed Q4 for Costco, that's not just a 3PL failure — it's a planning failure. They can only perform if they know what's coming.\"</td>\n    </tr>\n  </table>\n</div>"
          },
          {
            "id": "kq-why-irestore",
            "title": "\"Why iRESTORE?\" Questions",
            "html": "<div class=\"card\">\n  <div class=\"card-header\">Motivation & Fit</div>\n  <table>\n    <tr><th style=\"width:45%\">Question</th><th>Model Answer</th></tr>\n    <tr>\n      <td><strong>\"Why iRESTORE? Why this company?\"</strong></td>\n      <td>\"A few things clicked when we talked. First, I'm genuinely interested in health and wellness — most of my consulting clients are in that space, and the LTV dynamics in health products are what excite me. Second, the stage you're at is exactly where I'm most useful: enough revenue to invest in infrastructure, but early enough that the systems still need to be built. Third, and this is the honest part — I was drawn to how you described the role. You said you want a partner and mentor, not just a report. That's rare from a founder. I want to work for someone who's that self-aware.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"What excites you most about this opportunity?\"</strong></td>\n      <td>\"The product moat. You have something most DTC brands would kill for — FDA clearance, your own clinical study, a family-owned manufacturing facility, and a 60–70% category share on Amazon. That's a real business, not a brand that'll collapse when ad costs go up. Building operational infrastructure on top of that kind of product foundation is the dream scenario for someone like me.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"What concerns you about this role?\"</strong></td>\n      <td>\"Two things, and I'll be direct. First, the pace of product launches you described is ambitious for the team size — hair devices, skincare, body panels, B2B, international, all in the near term. I'd want to make sure we're ruthlessly prioritizing, not trying to do everything at once. Second, I want to understand the team dynamics better — you've made some leadership transitions recently, and I'd want to make sure the team that's here is ready for what's next. But honestly, these are the same things I'd say to any founder — they're not dealbreakers, they're just things I'd want to get my arms around early.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"Where else are you interviewing?\"</strong></td>\n      <td>\"I'm in conversations with a few companies, but nothing as far along or as interesting as this. I'm not in a rush — I'm looking for the right fit, not just any full-time role. I'd rather stay fractional than take the wrong full-time opportunity.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"What would make you say no to this?\"</strong></td>\n      <td>\"If the role turned out to be more of an executor position than a true partner/integrator role. I'm not looking to be someone who just takes orders — I want to be in the room when strategy is set, not just when it's executed. From everything you've said, that's what this is. But I'd want to confirm that as we go deeper.\"</td>\n    </tr>\n  </table>\n</div>"

            "id": "kq-operational",
            "title": "Operational & Tactical Questions",
            "html": "<p>Kevin is analytical and likes to test problem-solving in real-time. Expect some of these to come as scenarios.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">Operations & Supply Chain</div>\n  <table>\n    <tr><th style=\"width:45%\">Question</th><th>Model Answer</th></tr>\n    <tr>\n      <td><strong>\"How would you approach demand planning for a company growing 65–80% YoY?\"</strong></td>\n      <td>\"At that growth rate, the biggest risk is either stockouts on hot products or excess inventory on slow movers. I'd build a rolling 12-month demand model that combines historical sell-through, marketing spend plans, product launch calendars, and channel-specific seasonality. Monthly S&OP meetings where sales, marketing, and ops align on the forward forecast. And I'd build in safety stock buffers that flex by SKU velocity — your top 20% of SKUs get more buffer, the long tail gets less. The key is making it a living process, not a one-time exercise.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"We're at about 60% EOS implementation. How would you get us to 100%?\"</strong></td>\n      <td>\"First, I'd audit where you are — which components are running (L10s? Rocks? V/TO? People Analyzer?) and which aren't. Usually the gap is one of two things: either the cadence isn't consistent (L10s are happening but not weekly, or Rocks aren't being reviewed quarterly), or the team isn't bought in on certain tools. I'd prioritize getting the Leadership Team L10 to full discipline first — that sets the standard. Then cascade to department-level L10s. The People Analyzer and GWC assessments are usually what founders skip — those are uncomfortable but essential. I've done this at Stay Golden from zero to full implementation, so I know the resistance points.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"How do you think about vendor management when your main manufacturer is the CEO's father?\"</strong></td>\n      <td>This is a nuanced one — be diplomatic. \"That's actually a massive advantage. Net-150 terms, quality control, direct relationships — that's worth a lot. I'd treat that relationship with the respect it deserves. What I would do is make sure we're still benchmarking component costs against market rates, diversifying non-core suppliers where it makes sense, and that the communication cadence between the Shenzhen facility and the US team is formalized. But I would never disrupt a relationship that's this core to the business — I'd optimize around it.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"How would you reduce my time in operational meetings?\"</strong></td>\n      <td>\"Immediately, I'd do three things. One, take over all ops-focused meetings — supply chain reviews, fulfillment updates, CX escalation reviews. You shouldn't be in those. Two, for meetings where you need to be present, I'd own the agenda and pre-read so we're solving problems, not presenting updates — updates go in a dashboard. Three, I'd implement a weekly written ops update — a one-page summary of what happened, what's on track, what needs your input. You read it in 5 minutes and only engage where you need to. The goal is to get you to a point where you're in 2–3 strategic meetings a week, not 10 operational ones.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"What KPIs would you put on the ops dashboard?\"</strong></td>\n      <td>\"I'd build it in three tiers. Tier 1 — the CEO view: revenue by channel, gross margin, order volume, return rate, and cash position. Updated daily. Tier 2 — the ops view: fulfillment SLA compliance (by channel), inventory weeks of supply, customer satisfaction / NPS, open CX tickets trending, and shipping cost per order. Tier 3 — deep cuts I'd monitor: return reason codes, supplier lead time tracking, marketing spend vs. revenue by channel. The whole point is that you see Tier 1 and I manage Tiers 2 and 3, and I only escalate when something crosses a threshold.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"How do you approach building SOPs?\"</strong></td>\n      <td>\"I start by observing, not documenting. Week 1 I shadow the person doing the process — pick/pack, CX ticket routing, whatever it is. Week 2 I draft the SOP based on what I observed, then review it with the person who does the job. They know the edge cases I'll miss. Week 3 I test it with someone new — if they can follow the SOP without asking questions, it's done. If not, iterate. The mistake most people make is writing SOPs from a conference room. You have to see the work to document the work.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"Have you used Fulfill before? We run our whole operation on it.\"</strong></td>\n      <td>\"I haven't been a daily Fulfill user, but I'm not unfamiliar with it — I've talked with their team directly, my wife actually uses it in her work, and I saw that Rajen Sanghvi was just on-site with you guys for an efficiency workshop, which tells me you're getting hands-on support from their leadership. That's a great sign. More importantly, I've built and integrated systems across every business I've run. My pattern is the same every time: I get into a platform, understand the data model, figure out where the gaps are, and within a few weeks I'm the person other people come to with questions. What I'd bring isn't just Fulfill fluency — it's knowing what questions to ask of the system. Are we getting clean inventory visibility? Is the order-to-cash cycle tight? Where are the manual workarounds that should be automated? Those are the things that actually move margin, and they're platform-agnostic.\"</td>\n    </tr>\n  </table>\n</div>\n\n<div class=\"tip\"><strong>If Kevin presses harder on Fulfill:</strong> \"Absolutely, and I will. I'm the kind of operator who wants to understand the system at the data level, not just the dashboard level. Give me two weeks with it and I'll be pulling reports your team didn't know were possible. But I want to be honest that my value isn't just being another Fulfill user — it's connecting what Fulfill tells us to the decisions we need to make on inventory, cash flow, and ops efficiency.\" <br><br><strong>The core reframe:</strong> ERP proficiency is a <em>tool skill</em>, not a <em>strategic skill</em>. Not knowing a specific tool is a two-week problem. Not knowing how to think about operations is an unfixable one.</div>"
          },
          {
            "id": "kq-leadership",
            "title": "Leadership & People Questions",
            "html": "<div class=\"card\">\n  <div class=\"card-header\">Team Management & Culture</div>\n  <table>\n    <tr><th style=\"width:45%\">Question</th><th>Model Answer</th></tr>\n    <tr>\n      <td><strong>\"How would you handle inheriting a team you didn't hire?\"</strong></td>\n      <td>\"Sixty days of listening before any people decisions. I'd do 1-on-1s with every direct report in the first two weeks — not to evaluate them, but to understand them. What do they own? What's working? What's broken? What do they need from me? After 60 days, I'll have a clear picture of who's an A-player, who's a B that can grow, and who's in the wrong seat. The A-players need to see that my arrival makes their lives better. The B-players get a development plan with clear expectations. And for the people who clearly aren't going to make it, I move quickly — delay there hurts the whole team's morale.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"Tell me about a time you fired someone. How did you handle it?\"</strong></td>\n      <td>\"At B2TM, I had to fire our Head of Growth. It was someone I liked personally, but the performance wasn't there, and I waited too long to act. By the time I made the move, the team already knew — they'd been compensating for months. The firing itself I handled directly and with respect — in person, clear on the reason, generous on the transition. But the lesson was: I should have acted 3 months earlier. Every week you wait, it costs you twice — once in the underperformance and once in the team's trust that leadership will address problems.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"How do you manage the relationship with a CEO? How do you push back?\"</strong></td>\n      <td>\"Directly, but privately. I believe the Integrator's job is to be the one person who tells the Visionary the truth, even when it's uncomfortable. If I disagree with a direction, I'll say so — with data, not just opinion. But I'll never undermine you in front of the team. Once we align, I execute fully, even if it wasn't my first choice. The key is trust — you have to know that when I push back, it's because I genuinely think there's a better path, not because I'm being difficult.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"I have a lot of ideas. Some are good. Some aren't. How would you handle that?\"</strong></td>\n      <td>\"I'd be the filter, not the blocker. Every idea goes into a prioritized backlog. In our weekly L10, we'd IDS the top ones against current capacity and the quarterly Rocks. Some become Rocks next quarter. Some become 'great idea, not right now.' Some die on the vine — and I'd tell you why. The system protects both of us: you get to ideate freely without worrying about overwhelming the team, and the team only gets what they can actually execute well. I've worked with visionary founders before — this dynamic is something I'm comfortable managing.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"Describe your management style.\"</strong></td>\n      <td>\"Player-coach. I set clear expectations and give people autonomy to execute, but I stay close enough to the work to help when they're stuck. I don't believe in managing from dashboards — I want to understand the work at the ground level so I can be a useful thought partner, not just a reviewer. At B2TM, I personally handled customer service for three years even past $10M in revenue. Not because I had to, but because I wanted to understand the customer experience firsthand. That's how I operate.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"How do you hire?\"</strong></td>\n      <td>\"I use a structured process influenced by the WHO method. Start with a scorecard — define the mission, outcomes, and competencies before you source a single candidate. Then structured interviews: a screening call, a topgrading-style career walk-through, focused skill interviews, and reference checks where I actually ask hard questions. I built this entire system at scale for Equip Foods when we were hiring VP of Finance and VP of Growth — scorecards, structured interviews, pipeline tracking in Notion. The key principle is: hire slow, fire fast. The wrong hire at a company your size costs months of progress.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"I want a partner and mentor, not just a report. How do you see that dynamic?\"</strong></td>\n      <td>\"That's exactly what I'm looking for too — and it's actually what makes this role different from a typical COO gig. Here's how I think about it: the mentoring isn't me telling you how to run your business. You've built something incredible and you know your product and customers better than anyone. Where I add a different lens is in the <em>how</em> of scaling — the operational systems, the decision-making frameworks, the exit readiness playbook. I've built and sold a business, I've worked with founders at every stage from $2M to $100M+, and I've seen what works and what breaks at scale. So the mentoring looks like: I build EOS properly and you start to feel what it's like to have real visibility without being in every room. I push back on an idea — with data, not ego — and we make a better decision together. I bring a framework to a problem you've been solving intuitively, and suddenly it's repeatable. And when we get to the exit process, I've been through it — you haven't. That's where the mentoring matters most. But it goes both ways. You know DTC beauty, you know product-market fit instinct, you know your team. I want to learn from that too. The best V/I partnerships are peer relationships with complementary blind spots.\"</td>\n    </tr>\n  </table>\n</div>"
          },
          {
            "id": "kq-financial",
            "title": "Financial & Strategic Questions",
            "html": "<div class=\"card\">\n  <div class=\"card-header\">P&L, Margins, and Strategic Thinking</div>\n  <table>\n    <tr><th style=\"width:45%\">Question</th><th>Model Answer</th></tr>\n    <tr>\n      <td><strong>\"Walk me through how you think about a P&L.\"</strong></td>\n      <td>\"Top to bottom, I focus on three things: revenue quality (channel mix, customer acquisition cost, LTV), gross margin levers (COGS, shipping, returns), and operating leverage (where are we spending that scales vs. spending that's linear with revenue). For a business like yours, I'd want to see the P&L cut by channel — Amazon, DTC, Retail, B2B — because the margin profiles are completely different. A dollar on DTC is worth more than a dollar on Amazon because of the fee differential. The channel mix strategy is really a margin strategy in disguise.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"How would you improve our gross margins?\"</strong></td>\n      <td>\"Three levers. First, COGS — at $100M+ you have real negotiating power on components, even outside your father's factory. LEDs, laser diodes, plastics, packaging — all negotiable at scale. Second, channel mix — every dollar that shifts from Amazon to DTC saves roughly 8 points in fees. That's margin with no product change. Third, returns — your scorecard targets under 8%, so I'm guessing you're north of 10% today. In your category, a lot of returns are 'I don't see results yet,' which is solvable with better onboarding, progress tracking, and a save-the-sale team. Each point of return reduction at your scale is about $1.4 million to the bottom line — just hitting that 8% target could be worth nearly $3M.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"What's your experience with financial modeling?\"</strong></td>\n      <td>\"I've built cash flow models, demand forecasting models, inventory financing scenarios, and investor-facing financial models. At B2TM, I built the models we used for board presentations and the eventual sale process. At Easy Street, I built cash flow visibility that didn't exist before. For every consulting client, one of my first deliverables is a financial model — usually cash flow and scenario planning. I'm not a CFO, but I'm comfortable in a spreadsheet and I can partner with your fractional CFO to make sure the financial story matches the operational reality.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"What 'big levers' would you pull first at iRESTORE?\"</strong></td>\n      <td>\"Based on what I know so far: one, the East Coast fulfillment node — it gives you cost savings on shipping AND capacity insurance for the next Q4. Two, EOS to 100% — that's the operating system for everything else. Three, channel-level P&L visibility — if you don't know the true margin by channel, you can't optimize the mix. And four, international market entry via Amazon marketplaces — UK and Australia first as low-risk beachheads. These are all things that compound — they don't just fix a problem, they create ongoing leverage.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"How do you think about the exit opportunity?\"</strong></td>\n      <td>Be careful here — read Kevin's energy on this topic. \"I think the best exit strategy is building a great business. If we get the operational infrastructure right, grow internationally, and diversify the product line, the business becomes attractive to both strategic buyers — think L'Oréal, Shiseido, or the beauty conglomerates — and financial buyers. My job would be to make sure the operations are clean, the data is solid, and the growth story is backed by repeatable systems, not just founder heroics. That's what buyers pay a premium for.\"</td>\n    </tr>\n  </table>\n</div>"
          },
          {
            "id": "kq-tests",
            "title": "The \"Test\" Questions",
            "html": "<p>Kevin tests with stories and scenarios. He'll describe a problem and watch how you react. Here are the types of tests to expect.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">Real-Time Problem-Solving Tests</div>\n  <table>\n    <tr><th style=\"width:45%\">Question / Scenario</th><th>How to Handle</th></tr>\n    <tr>\n      <td><strong>\"We're launching a new product next quarter and marketing wants to run a major campaign. How do you make sure ops is ready?\"</strong></td>\n      <td>Show the S&OP mindset: \"First, I need the demand forecast from marketing — units, timeline, channels. Then I work backwards: do we have inventory? Is manufacturing capacity aligned? Are the warehouse and 3PL ready for the volume? What's the CX team's readiness for new-product questions? I'd build a launch checklist that cross-references every function and we'd review it weekly starting 8 weeks out. The goal is that by launch day, the only surprise is how well it goes.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"A key supplier just told us lead times are doubling. What do you do?\"</strong></td>\n      <td>Show triage thinking: \"First, assess the impact — which SKUs are affected, what's our current inventory position, and when do we hit stockout? Then, three immediate actions: (1) pull forward any orders that are already in pipeline to lock in current lead times, (2) identify alternate suppliers who can provide the same component, even at higher cost as a bridge, (3) adjust the demand plan and marketing spend to match realistic inventory levels. Then the strategic response: diversify the supplier base so this doesn't happen again.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"Our return rate just spiked 3 points this month. What's your process?\"</strong></td>\n      <td>\"First question: is it one product or across the board? If it's concentrated, it might be a quality issue — check the production batch. If it's broad, look at the return reason codes: are people saying 'not as described,' 'doesn't work,' or 'changed my mind'? Each has a different fix. 'Not as described' is a marketing/listing problem. 'Doesn't work' is either product quality or customer education. 'Changed my mind' is buyer's remorse, which is addressable with better onboarding and expectation-setting. I'd have a root cause analysis to you within 48 hours and a remediation plan within a week.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"Two team members are in conflict and it's affecting their departments. How do you handle it?\"</strong></td>\n      <td>\"I meet with each separately first — listen without judging, understand each perspective. Most interpersonal conflicts at work are actually process conflicts — unclear ownership, competing priorities, or missing communication channels. If that's the case, I fix the process and the conflict resolves itself. If it's genuinely personal, I bring them together, establish ground rules, and mediate. But I'm also not afraid to be direct: 'This conflict is hurting the business. Here's what I need from both of you.' If someone can't work constructively with the team after clear expectations, that's a different conversation.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"I want to launch in Japan, Korea, UK, and Australia all at the same time. Thoughts?\"</strong></td>\n      <td>This is the \"filter the Visionary\" test. \"I love the ambition, and all four are great markets. But I'd push back on doing all four simultaneously. Each market has different regulatory timelines, different logistics requirements, and different marketing needs. If we spread too thin, we do four mediocre launches instead of two great ones. I'd tier it: UK and Australia first — English-speaking, lighter regulatory paths, Amazon marketplace infrastructure. Get those running and generating revenue, then use that playbook for Korea and Japan, which have 12–36 month regulatory lead times anyway. Start the regulatory process for Korea and Japan now, but focus execution on UK and Australia.\"</td>\n    </tr>\n  </table>\n</div>"
          },

            "id": "kq-personal",
            "title": "Personal / Rapport Questions",
            "html": "<p>Kevin is conversational and values authenticity. Some questions won't have a \"right answer\" — he just wants to see how you think and whether you're genuine.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">Getting-to-Know-You Questions</div>\n  <table>\n    <tr><th style=\"width:45%\">Question</th><th>Guidance</th></tr>\n    <tr>\n      <td><strong>\"What are you reading / listening to right now?\"</strong></td>\n      <td>Kevin is a productivity nerd (Toggle, Evernote, time-blocking) and values continuous learning. Mention something operational, strategic, or health/wellness related. Be genuine — he'll see through a fake answer.</td>\n    </tr>\n    <tr>\n      <td><strong>\"What's your biggest weakness?\"</strong></td>\n      <td>Be real. Kevin shared his own weaknesses openly (too many ideas, micromanaging, learning to be effective over liked). He'll respect vulnerability. Consider: \"I can get too deep in the weeds — I love understanding the work at the ground level, which sometimes means I don't delegate quickly enough. I'm conscious of it and actively working on it.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"What does work-life balance look like for you?\"</strong></td>\n      <td>Kevin goes to the gym, meditates, and time-blocks his calendar. He values people who are productive, not just busy. Frame it around sustainability: \"I believe in working intensely and recovering well. During a big launch or a Q4 crunch, I'm all in. But I also know that sustained performance requires taking care of yourself — I'm a gym and meditation person too.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"Where do you see yourself in 5 years?\"</strong></td>\n      <td>\"Honestly, running operations at a company I helped build into something meaningful. If iRESTORE gets to $300–500M like we'd both want, I want to be the person who built the operational machine that got us there. I'm not looking to use this as a stepping stone to a CEO role at another company — I want to build something here.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"What do you do for fun?\"</strong></td>\n      <td>Be yourself. Kevin is relatable and informal. He'll appreciate whatever's genuine. If you share any interest in health, wellness, or personal optimization, that's a natural bonding point.</td>\n    </tr>\n    <tr>\n      <td><strong>\"Tell me something that's not on your resume.\"</strong></td>\n      <td>Pick something that shows a dimension Kevin would relate to — founder grit, scrappiness, creative problem-solving, or something personal that shows self-awareness.</td>\n    </tr>\n  </table>\n</div>"
          },
          {
            "id": "kq-curveball",
            "title": "Curveball / Harder Questions",
            "html": "<p>These are the questions that don't have a clean answer. Prepare for them so you're not caught off guard.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">The Uncomfortable Questions</div>\n  <table>\n    <tr><th style=\"width:45%\">Question</th><th>Guidance</th></tr>\n    <tr>\n      <td><strong>\"Your biggest company was $20M. We're 5x that. Why should I bet on you?\"</strong></td>\n      <td>Don't get defensive. Own it and reframe: \"You're right. But you didn't build iRESTORE by hiring someone from P&G who'd managed a $500M P&L. You built it yourself from zero. I think you understand better than most that the skills that build are different from the skills that maintain. I'm a builder. And based on what you've told me about where your operations are, you need a builder more than you need a maintainer right now.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"What if Brandon is resentful of you coming in above him?\"</strong></td>\n      <td>\"That's a real concern and I'd address it head-on. First, I'd want to understand from you what your vision is for Brandon's role going forward. If he stays, my job is to make him more successful — clear priorities, better tools, less ambiguity. I'd invest time building that relationship early, one-on-one. If the dynamic doesn't work despite genuine effort, we'd handle that together. But I wouldn't come in assuming it's adversarial — I'd come in assuming there's someone with institutional knowledge I can learn from.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"Have you ever failed at something significant?\"</strong></td>\n      <td>Be honest. The B2TM debt story is a good one: \"I took on too much inventory debt during a high-growth period. It worked in the short term but constrained our options later. It's the biggest financial mistake I've made, and it fundamentally changed how I think about cash flow. Now it's literally the first thing I build visibility into for any business I work with.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"What if I disagree with your priorities?\"</strong></td>\n      <td>\"Then we have a conversation. I'd want to understand your reasoning, and I'd share mine. If we still disagree after hearing each other out, I think the right default is to go with the CEO's call — it's your company. But I'd want us to agree on how we evaluate whether it worked, so we're learning either way. The worst outcome isn't disagreeing — it's pretending to agree and then not executing with full commitment.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"Are you willing to relocate / be in La Mirada regularly?\"</strong></td>\n      <td>Be clear on this. Kevin commutes from Brentwood to La Mirada. If you're willing to be in the office regularly, say so. If you want flexibility, be upfront: \"I'm a big believer in being present — especially in the first 6 months. I want to be in the warehouse, in the office, meeting the team face-to-face. I'd expect to be on-site multiple days a week, especially early on. Over time, as systems are in place and trust is built, I think we'd naturally find the right rhythm.\"</td>\n    </tr>\n    <tr>\n      <td><strong>\"What comp are you expecting?\" / \"Last time you said you'd think about numbers — where'd you land?\"</strong></td>\n      <td><strong>DO NOT name a number or range.</strong> Talk about structure and variables instead: \"Yeah, I've been thinking about it a lot actually. But the more I dig in, the more the <em>structure</em> matters more than the headline number. You mentioned phantom stock last time — I've been looking at the tax math on phantom versus real equity and the spread is huge, like 15-plus points in California. And then the exit valuation question — what you'd sell for, what a home run looks like — that turns a percentage into an actual number. So I'd rather understand those variables before I put a stake in the ground. What I can tell you is I'm not going to be unreasonable — I want to be aligned with a big outcome, not optimize for cash.\" → <strong>See the full Comp Deflection Playbook in the Compensation &amp; Negotiation section for detailed scripts, follow-up pressure responses, and verbatim transcript from your first meeting.</strong></td>\n    </tr>\n  </table>\n</div>"
          },
          {
            "id": "kq-unlikely",
            "title": "Questions Kevin Probably Won't Ask (But Prepare Anyway)",
            "html": "<div class=\"card\">\n  <div class=\"card-header\">Low-Probability, High-Impact</div>\n  <table>\n    <tr><th style=\"width:45%\">Question</th><th>Quick Guidance</th></tr>\n    <tr>\n      <td><strong>\"What's your Culture Index profile?\"</strong></td>\n      <td>Kevin uses Culture Index. If he asks about your DISC or CI profile, be ready to discuss it. Know your type and how it maps to the Integrator role. Kevin values self-awareness here — don't try to game it.</td>\n    </tr>\n    <tr>\n      <td><strong>\"Can you tell me about a time you dealt with a regulatory challenge?\"</strong></td>\n      <td>If you have any experience with FDA, compliance, or regulatory processes, prepare that story. If not, be honest and frame it as something you'd partner with legal/regulatory consultants on. The Head of PD handles a lot of this currently.</td>\n    </tr>\n    <tr>\n      <td><strong>\"How do you use AI in your work?\"</strong></td>\n      <td>Kevin mentioned AI as something he wants the COO to drive. You have a real story here: you've built AI-powered influencer scraping with LLM scoring, automated Slack reporting, and you actively use Claude Code and AI tooling for workflow automation. This differentiates you — you don't just \"use\" AI, you build with it.</td>\n    </tr>\n    <tr>\n      <td><strong>\"What do you know about red light therapy / LLLT?\"</strong></td>\n      <td>Show you've done your homework. Reference the FDA clearance, the clinical study (NCT03331003), the difference between LED and laser wavelengths (630–670nm for red light), and the mechanism of action (photobiomodulation stimulating cellular energy production). You don't need to be an expert, but showing genuine interest in the science signals respect for the product.</td>\n    </tr>\n    <tr>\n      <td><strong>\"What questions do you have for me?\"</strong></td>\n      <td>Always have 3–5 ready. See Section 10 for a full list. Prioritize the ones that show you've done deep research and are thinking about the business strategically. Don't ask anything you could Google.</td>\n    </tr>\n  </table>\n</div>"
          }
        ]
      },

          {
            "id": "ans-costco",
            "title": "Q4 Costco Capacity Crisis",
            "html": "<h3>\"How would you have handled the Q4 Costco capacity crisis?\"</h3>\n      <p class=\"muted\">Context: Costco promotion 10x'd forecast. La Mirada warehouse overwhelmed. DTC backed up 2 weeks. Brandon said \"we can't do anything.\"</p>\n      <div class=\"answer-block\">\n        <strong>Model Answer:</strong> \"Two things I'd have done differently — one before and one during. Before: in Q2, I'd model the peak scenarios. If any channel can 5–10x forecast, what does our warehouse throughput need to be? That math tells you whether you need pre-arranged overflow — a temp labor pool on standby, a local 3PL partner for surge capacity, or a second-shift plan. During: when it hit, the first move is identifying the actual constraint. Is it pick/pack labor? Station space? Carrier slots? Each has a different fix. And you triage by SLA severity — Costco's 1-day SLA first, FBA second, DTC third with proactive customer communication. But the real answer is systemic: this crisis made the case for a second fulfillment node. An East Coast 3PL gives you capacity insurance and geographic reach — two problems solved with one investment.\"\n      </div>\n      <h3>Study Notes — Deep Background</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">What Actually Happened (from Kevin's own words)</div>\n        <ul>\n          <li>Costco ran a promo that generated <strong>10x expected volume</strong></li>\n          <li>La Mirada warehouse (their own facility, NOT a 3PL) hit physical capacity</li>\n          <li>Costco requires a <strong>1-day SLA</strong> — so they had to prioritize Costco shipments</li>\n          <li>Result: DTC orders backed up <strong>~2 weeks</strong>, customer complaints spiked</li>\n          <li>Brandon (Ops Director) told Kevin <strong>\"we can't do anything\"</strong> — this is the response that frustrated Kevin most</li>\n          <li>The staffing agency they relied on couldn't provide more people</li>\n          <li>Kevin's frustration: Brandon didn't think creatively. Kevin suggested solutions himself (recruiting temp labor from Home Depot parking lots, tapping warehouse workers' personal networks)</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Why This Story Matters</div>\n        <ul>\n          <li><strong>It's Kevin's #1 frustration with current ops leadership.</strong> This is the story that crystallized his need for a COO.</li>\n          <li><strong>The \"boxed in\" mindset</strong> — Kevin's exact phrase describing Brandon's thinking. Kevin values creative, scrappy problem-solving.</li>\n          <li><strong>It reveals multiple systemic failures:</strong> no capacity planning, no scenario modeling, single staffing agency dependency, no overflow partner, no SLA-based triage protocol</li>\n          <li><strong>Kevin already knows the solutions</strong> — he wants someone who would have thought of them first</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Supporting Data Points to Weave In</div>\n        <ul>\n          <li>Industry standard: peak season planning should start 6 months before (Q2 for Q4)</li>\n          <li>Best practice: always have 2+ staffing agencies on contract, not just one</li>\n          <li>3PL overflow partnerships can be structured as \"surge only\" — no minimum volume commitment, just pre-negotiated rates</li>\n          <li>Costco vendor compliance penalties for late shipments can be 3–5% of PO value</li>\n          <li>DTC customer impact: 2-week delays in beauty/health typically drive 15–25% cancellation rates</li>\n          <li>Second shift / weekend surge: typically 1.5x labor cost but 2x throughput — worth it during peak</li>\n        </ul>\n      </div>"
          },
