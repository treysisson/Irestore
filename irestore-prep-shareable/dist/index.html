<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iRESTORE — Strategic Research Brief</title>
<style>
:root {
  --sidebar-w: 280px;
  --navy: #1a1a3e;
  --blue: #4a7cff;
  --light-green: #e8f5e9;
  --bg: #f7f8fc;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: #333; font-size: 15px; line-height: 1.65; }

/* SIDEBAR */
.sidebar {
  position: fixed; top: 0; left: 0; width: var(--sidebar-w); height: 100vh;
  background: var(--navy); color: #ddd; display: flex; flex-direction: column;
  z-index: 100; transition: transform 0.3s ease;
}
.sidebar-header { padding: 20px; font-size: 18px; font-weight: 700; color: #fff; border-bottom: 1px solid #2a2a4a; }
.sidebar-search { padding: 8px 12px; }
.sidebar-search input {
  width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid #3a3a6a;
  background: #12122a; color: #ddd; font-size: 13px; outline: none;
}
.sidebar-search input::placeholder { color: #777; }
.sidebar-search input:focus { border-color: var(--blue); }
.sidebar-controls { display: flex; gap: 6px; padding: 6px 12px; border-bottom: 1px solid #2a2a4a; }
.sidebar-controls button {
  flex: 1; padding: 5px 0; border: 1px solid #3a3a6a; border-radius: 5px;
  background: #12122a; color: #aaa; font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.sidebar-controls button:hover { background: #2a2a4a; color: #fff; border-color: var(--blue); }
.nav-items { flex: 1; overflow-y: auto; padding: 8px 0; -webkit-overflow-scrolling: touch; }
.nav-item {
  padding: 10px 20px; cursor: pointer; font-size: 13px; transition: all 0.15s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: #2a2a4a; color: #fff; }
.nav-item.active { background: #2a2a4a; color: #fff; border-left-color: var(--blue); }
/* Group level */
.nav-item.group {
  display: flex; align-items: center; justify-content: space-between;
  font-weight: 700; font-size: 13px; color: #fff; padding: 10px 16px;
  background: #12122a; border-bottom: 1px solid #2a2a4a;
  border-left: 4px solid var(--group-accent, #4a7cff);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.nav-item.group .chevron { font-size: 10px; transition: transform 0.2s; color: #666; }
.nav-item.group.expanded .chevron { transform: rotate(90deg); color: #aaa; }
.nav-item.group:hover { background: #1a1a3e; }
/* Group accent colors */
.nav-item.group[data-group="company"]   { --group-accent: #4a9fff; background: #0d1a30; }
.nav-item.group[data-group="role"]      { --group-accent: #4caf50; background: #0d1f0d; }
.nav-item.group[data-group="pitch"]     { --group-accent: #ff9800; background: #1f170d; }
.nav-item.group[data-group="interview"] { --group-accent: #ce93d8; background: #1a0d1f; }
.nav-item.group[data-group="gameday"]   { --group-accent: #ef5350; background: #1f0d0d; }
/* Carry accent into child sections */
.nav-item.parent[data-group="company"]   { border-left-color: rgba(74,159,255,0.3); }
.nav-item.parent[data-group="role"]      { border-left-color: rgba(76,175,80,0.3); }
.nav-item.parent[data-group="pitch"]     { border-left-color: rgba(255,152,0,0.3); }
.nav-item.parent[data-group="interview"] { border-left-color: rgba(206,147,216,0.3); }
.nav-item.parent[data-group="gameday"]   { border-left-color: rgba(239,83,80,0.3); }
.nav-item.sub[data-group="company"].active   { border-left-color: #4a9fff; }
.nav-item.sub[data-group="role"].active      { border-left-color: #4caf50; }
.nav-item.sub[data-group="pitch"].active     { border-left-color: #ff9800; }
.nav-item.sub[data-group="interview"].active { border-left-color: #ce93d8; }
.nav-item.sub[data-group="gameday"].active   { border-left-color: #ef5350; }
/* Section level (parent) */
.nav-item.parent {
  display: flex; align-items: center; justify-content: space-between;
  font-weight: 600; padding-left: 24px; display: none;
}
.nav-item.parent.visible { display: flex; }
.nav-item.parent .chevron { font-size: 10px; transition: transform 0.2s; color: #666; }
.nav-item.parent.expanded .chevron { transform: rotate(90deg); color: #aaa; }
/* Subsection level */
.nav-item.sub { padding-left: 44px; font-size: 12px; color: #888; display: none; }
.nav-item.sub.visible { display: block; }
.nav-item.sub:hover, .nav-item.sub.active { color: #ccc; }

/* HAMBURGER (mobile) */
.hamburger {
  display: none; position: fixed; top: 12px; left: 12px; z-index: 200;
  background: var(--navy); border: none; color: #fff; font-size: 24px;
  width: 44px; height: 44px; border-radius: 8px; cursor: pointer;
  align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 90;
}

/* MAIN */
.main { margin-left: var(--sidebar-w); padding: 32px 48px 80px; max-width: 960px; }
.section { display: none; }
.section.active { display: block; }

/* CONTENT STYLES */
h1 { font-size: 28px; color: var(--navy); margin-bottom: 24px; padding-bottom: 12px; border-bottom: 3px solid var(--blue); }
h2 { font-size: 22px; color: var(--navy); margin: 28px 0 16px; }
h3 { font-size: 17px; color: #444; margin: 20px 0 10px; }
p { margin-bottom: 14px; }
ul, ol { margin: 0 0 16px 20px; }
li { margin-bottom: 6px; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 13px; }
th, td { padding: 10px 12px; border: 1px solid #ddd; text-align: left; vertical-align: top; }
th { background: var(--navy); color: #fff; font-weight: 600; }
tr:nth-child(even) { background: #f9f9fc; }
.highlight-row { background: #e3f2fd !important; font-weight: 600; }

.card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 20px; margin: 16px 0; }
.card-header { font-weight: 700; color: var(--navy); margin-bottom: 10px; font-size: 15px; }
.answer-block { background: #f0f4ff; border-left: 4px solid var(--blue); padding: 16px 20px; margin: 14px 0; border-radius: 0 8px 8px 0; }
.tip { background: #fff8e1; border-left: 4px solid #ffa000; padding: 14px 18px; margin: 14px 0; border-radius: 0 8px 8px 0; }
.muted { color: #888; font-size: 13px; }
/* ORG CHART */
.org-chart { display: flex; flex-direction: column; align-items: center; gap: 0; margin: 24px 0; }
.org-node { background: #fff; border: 2px solid var(--blue); border-radius: 10px; padding: 14px 20px; text-align: center; min-width: 180px; max-width: 220px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.org-node.ceo { background: var(--navy); color: #fff; border-color: var(--navy); min-width: 240px; max-width: 280px; }
.org-node.ceo .org-note { color: rgba(255,255,255,0.7); }
.org-node.you { background: #e8f5e9; border-color: #2e7d32; min-width: 240px; max-width: 280px; }
.org-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
.org-title { font-size: 12px; color: #555; margin-bottom: 4px; }
.org-node.ceo .org-title { color: rgba(255,255,255,0.85); }
.org-node.you .org-title { color: #2e7d32; }
.org-note { font-size: 11px; color: #888; line-height: 1.4; }
.org-connector { width: 2px; height: 20px; background: #bbb; margin: 0 auto; }
.org-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin-top: 0; position: relative; }
.org-row::before { content: ''; position: absolute; top: 0; left: 15%; right: 15%; height: 2px; background: #bbb; }
.org-row .org-row::before { left: 10%; right: 10%; }
.org-branch { display: flex; flex-direction: column; align-items: center; }
.org-branch .org-connector { height: 16px; }
.org-sub-section { display: flex; flex-direction: column; align-items: center; width: 100%; }
.org-sub-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 4px; }
.org-node small { display: block; color: #888; font-size: 11px; }

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {
  :root { --sidebar-w: 280px; }
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .hamburger { display: flex; }
  .overlay.open { display: block; }
  .main { margin-left: 0; padding: 70px 16px 60px; }
  h1 { font-size: 22px; }
  h2 { font-size: 18px; }
  h3 { font-size: 15px; }
  body { font-size: 14px; }
  table { font-size: 12px; display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  th, td { padding: 8px; min-width: 100px; }
  .card { padding: 14px; }
  .answer-block, .tip { padding: 12px 14px; }
  .org-chart { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .org-row { flex-wrap: wrap; gap: 12px; }
  .org-row::before { display: none; }
  .org-node { min-width: 150px; max-width: 200px; padding: 10px 14px; }
  .org-node.ceo, .org-node.you { min-width: 200px; max-width: 240px; }
}

@media (max-width: 480px) {
  .main { padding: 64px 12px 40px; }
  table { font-size: 11px; }
  th, td { padding: 6px; }
}
</style>
</head>
<body>

<button class="hamburger" id="hamburger" aria-label="Open menu">☰</button>
<div class="overlay" id="overlay"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">📊 iRESTORE Strategic Brief</div>
  <div class="sidebar-search"><input type="text" id="search" placeholder="Search everything..."></div>
  <div class="sidebar-controls">
    <button id="expandAll">▼ Expand All</button>
    <button id="collapseAll">▲ Collapse All</button>
  </div>
  <div class="nav-items" id="nav"></div>
</div>

<div class="main" id="main"></div>

<script>
// ============================================================
// GROUP DATA (injected by build script)
// ============================================================
const groups = [
  {
    "id": "company",
    "title": "Company & Leadership",
    "icon": "🏢",
    "sections": [
      {
        "id": "kevin",
        "title": "1. Kevin Chen — CEO Profile",
        "icon": "👤",
        "subs": [
          {
            "id": "kevin-bg",
            "title": "Background",
            "html": "<p>Kevin Chen is the co-founder and CEO of iRESTORE (Freedom Laser Therapy, Inc.). He co-founded the company with his father approximately 13 years ago. Originally from Taiwan, Kevin moved to Irvine, California at age 10. He attended UC Berkeley and launched the business at around age 25. He lives in Brentwood, LA, and commutes to the La Mirada office regularly.</p>\n      <p>His father owns the manufacturing facility in Shenzhen, China, which gives iRESTORE a significant structural advantage in vertical integration and cost control.</p>"
          },
          {
            "id": "kevin-thinks",
            "title": "How Kevin Thinks",
            "html": "<div class=\"card\">\n        <div class=\"card-header\">Visionary, not operational</div>\n        <p>Kevin is a classic visionary founder. He self-identifies as someone with too many ideas who struggles to filter what gets communicated to the team. His 360 feedback confirmed this — team members sometimes interpret his casual idea-sharing as directives. He knows this is a weakness and has been working to contain it, but admits it's hard.</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Self-aware and humble</div>\n        <p>Kevin openly acknowledges the limits of his own knowledge and credits luck alongside skill in his success. He expresses a genuine desire to learn and grow as a leader, seeking out mentors and advisors. This intellectual humility is unusual for a founder at his stage.</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Analytical and data-driven</div>\n        <p>His team's feedback is that he's analytical, good at spotting opportunities and bottlenecks. He's clearly metrics-oriented (references to market share percentages, YoY growth rates, specific financial details). He respects people who can think in numbers.</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Resourceful problem-solver</div>\n        <p>The Q4 Costco story reveals his mentality: when the warehouse was overwhelmed, he immediately thought of unconventional solutions (recruiting temp labor from Home Depot, asking warehouse workers' networks). He values creative, scrappy problem-solving over \"we can't do anything.\"</p>\n      </div>"
          },
          {
            "id": "kevin-wants",
            "title": "Leadership Values & Hiring Philosophy",
            "html": "<ul>\n        <li><span class=\"label\">Partnership and mentorship mindset:</span> Kevin actively seeks out experienced leaders from whom he can learn. He's expressed openness to being mentored by those with deeper operational expertise, demonstrating an unusual level of intellectual humility for a founder.</li>\n        <li><span class=\"label\">Player-coach approach:</span> He values leaders who remain hands-on and accessible. He tries to minimize organizational layers and stays close to the team.</li>\n        <li><span class=\"label\">Directness and decisiveness:</span> He respects straightforward communication and the willingness to make tough calls. He values effectiveness over consensus-building.</li>\n        <li><span class=\"label\">Proactive strategic thinking:</span> Kevin favors leaders who identify problems and propose solutions unprompted, rather than simply reporting issues.</li>\n        <li><span class=\"label\">Cultural alignment:</span> He uses Culture Index assessments for hiring and values EOS principles. He's built a flat, fast-moving organization that expects people to operate with autonomy.</li>\n      </ul>"
          },
          {
            "id": "kevin-style",
            "title": "Communication Style",
            "html": "<ul>\n        <li><span class=\"label\">Conversational and transparent:</span> Kevin speaks freely and shares vulnerabilities openly. He's direct about his strengths and areas for growth.</li>\n        <li><span class=\"label\">Tangential but insightful:</span> He often jumps between topics but circles back with relevant insights that reveal his strategic thinking.</li>\n        <li><span class=\"label\">Story-driven:</span> He uses anecdotes and real business scenarios to illustrate lessons learned and validate approaches.</li>\n        <li><span class=\"label\">Multilingual:</span> Conversationally fluent in Mandarin (\"Tinglish\"), though not business-fluent. He works closely with native Mandarin speakers on his product and international teams.</li>\n      </ul>"
          },
          {
            "id": "kevin-origin",
            "title": "Kevin's Origin Story & Company History",
            "html": "<p>Kevin Chen co-founded iRESTORE with his father, who had previously run Freedom Laser Therapy — a clinic using laser therapy to treat nicotine addiction. When Kevin's father experienced hair loss and tried clinical laser therapy (expensive at $1000s, inconvenient with 3x/week visits), they saw the opportunity: bring clinical-grade laser therapy to home use.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">Key Milestones</div>\n  <table>\n    <tr><th>Timeline</th><th>Milestone</th></tr>\n    <tr><td>Early 2010s</td><td>Identified home-use laser hair therapy opportunity</td></tr>\n    <tr><td>~2013–2015</td><td>3 years of R&D + FDA clearance process (multiple prototypes, back-and-forth with FDA)</td></tr>\n    <tr><td>Jan 2016</td><td>Launched on Amazon — got first sale and was \"ecstatic\"</td></tr>\n    <tr><td>Mid 2016</td><td>Set up Shopify DTC store, started Facebook ads</td></tr>\n    <tr><td>2016–2020</td><td>Grew through Amazon dominance + DTC paid social</td></tr>\n    <tr><td>~2022</td><td>Costco.com launch — went from 0% to 15% of revenue \"almost overnight\"</td></tr>\n    <tr><td>~2023</td><td>Major rebrand: from \"techy device company\" to emotional beauty brand</td></tr>\n    <tr><td>~2024</td><td>LED face masks launched (skincare expansion)</td></tr>\n    <tr><td>2025–2026</td><td>~80 employees globally, \"hundreds of millions\" in cumulative product sales, 65–80% YoY growth, expanding leadership team</td></tr>\n  </table>\n</div>\n\n<div class=\"answer-block\">\n  <strong>Kevin on founding:</strong> \"I felt like I was always born into entrepreneurship — my dad had always been in business his entire life.\" He just graduated college and \"didn't know what he wanted to do\" when his father invited him to join. The hair therapy idea came from personal experience, not market analysis.\n</div>"
          },
          {
            "id": "kevin-leadership",
            "title": "Kevin's Leadership Philosophy",
            "html": "<p>Kevin has evolved from doing-everything founder to strategic leader, and he's candid about the growing pains involved. His leadership philosophy is synthesized from podcast interviews and company observations:</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">The Evolution of Kevin's Role</div>\n  <p><strong>Early stage:</strong> \"Your job as the CEO is everything — you're the customer service, you're the marketing person, you're the product guy, you're everyone.\"</p>\n  <p><strong>Current stage:</strong> \"As you grow the team, your highest leverage thing no longer becomes [driving sales] and it becomes people — becomes managing people, becomes leading people, and more importantly hiring the best people you can find out there for the job.\"</p>\n  <p><strong>Where he wants to be:</strong> Focused on innovation, strategic business development, and vision. Wants the COO to own execution and day-to-day operations.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Kevin's Leadership Profile</div>\n  <table>\n    <tr><th>Strengths</th><th>Growth Areas</th></tr>\n    <tr><td>Growing the business (driving results)</td><td>Managing high volume of ideas without overwhelming the organization</td></tr>\n    <tr><td>Marketing & sales acumen</td><td>Balancing deep involvement in areas of passion with broader delegation</td></tr>\n    <tr><td>Analytical mindset</td><td>Building systematized delegation and oversight processes</td></tr>\n    <tr><td>Strong network</td><td>Balancing directness with team cohesion</td></tr>\n  </table>\n</div>\n\n<h3>Hard-Won Lessons</h3>\n\n<div class=\"answer-block\">\n  <strong>On hiring mistakes:</strong> \"The wrong hire costs you so much time and money — I learned it the hard way unfortunately. I think we all do. It's one of those things you have to go through yourself to learn.\"\n</div>\n\n<div class=\"answer-block\">\n  <strong>On delegation:</strong> \"I felt like I had to do everything myself... which is absolutely not true. You need to hire people, you need to delegate, and you need to fire people [who] don't work out. I wish someone told me that earlier.\"\n</div>\n\n<div class=\"answer-block\">\n  <strong>On firing:</strong> He's recently exited \"many directors and up\" over the past 6–8 months. Had to learn to be \"effective over being liked.\" This is a major maturation point — he's now willing to make tough calls.\n</div>\n\n<div class=\"answer-block\">\n  <strong>On deep work:</strong> \"I try to have an open door policy where people can come in and ask me any questions, but oftentimes at the expense of productivity. Since we've moved to this system... we now have to request meetings. You have to say 'this is what the meeting's for' and estimate the time.\"\n</div>"
          },
          {
            "id": "kevin-scaling",
            "title": "Kevin's Scaling & Hiring Philosophy",
            "html": "<p>Kevin has a sophisticated, experience-tested framework for how to build and scale a team. This came through most clearly in his Money Talks interview and is directly relevant to the COO role.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">\"Fire Yourself Every Year\"</div>\n  <p>Kevin shared a framework from a friend that he's adopted: <em>\"Basically I just fire myself every year. Whatever he does, he reviews it and he's like — okay, I hire someone for that role. What I did last year, next year — what did I do? And then that kind of compounds.\"</em></p>\n  <p>This is how Kevin has progressively moved from doing everything → delegating CS/ops → delegating growth marketing → now focusing almost exclusively on product R&D and recruiting. The COO role is the next major \"fire yourself\" move.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Value Creation vs. Value Protection</div>\n  <p>Kevin categorizes all roles into two buckets:</p>\n  <ul>\n    <li><strong>Value creation:</strong> Product innovation, growth marketing — roles that drive growth</li>\n    <li><strong>Value protection:</strong> Operations, logistics, customer service — roles that \"keep the wheels on the car\"</li>\n  </ul>\n  <p>His delegation strategy: <em>\"You want to hold on for as long as you can to the value-driving things while doing a minimal set of value protection type of tasks. And then delegate that way.\"</em> He delegates value protection first, holds value creation as long as possible, then hires executives when scale demands it.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Pay the Premium — But Only for High-Leverage Roles</div>\n  <p>Kevin endorses the \"10x engineer\" concept but with an important caveat about role leverage:</p>\n  <div class=\"answer-block\">\n    \"It comes down to whether that role has enough leverage to become 10x. Taking a simple example of a warehouse worker — the best warehouse worker is maybe 50% faster than an average warehouse worker. So you don't want to overpay there. But then take the growth marketer — especially today with AI — they can probably 20x the next person... So I want to make sure to think through how much leverage the role has.\" <span class=\"muted\">— Money Talks</span>\n  </div>\n  <p>Kevin applies this principle to senior leadership hires. High-leverage roles like operations, product strategy, and business development deserve premium talent because the impact is proportionally greater.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Hiring Leaders with Deeper Expertise</div>\n  <div class=\"answer-block\">\n    \"At a certain scale, you really have to hire the people that have been there, done that, and are better than you so you can truly let go. I've brought on people where I felt like I was better than them at their job. And what that meant was I was always hovering over their shoulders, looking over everything. It's not empowering. It's not good for them.\" <span class=\"muted\">— Money Talks</span>\n  </div>\n  <p>Kevin has learned through experience the importance of hiring leaders with deeper expertise in their functional areas than his own. This approach enables true delegation and prevents the micromanagement that occurs when a founder feels he could do the job better.</p>\n</div>\n\n<h3>Kevin's Approach to Learning & Development</h3>\n\n<div class=\"answer-block\">\n  <strong>On investing in expertise:</strong> \"Paying for knowledge at a certain scale is one of the most impactful things and highest leverage things you can do. We go back to the same framework — if my time is worth $1,000 an hour and I'm paying a coach $5,000 a month, well, if they can help me make one really good decision that leads to a six-figure outcome, it would be foolish not to pay for that.\" <span class=\"muted\">— Money Talks</span>\n</div>\n\n<p>Kevin actively invests in executive coaching and mentorship, particularly from leaders with deep industry experience in retail and beauty. He has worked with coaches who brought P&G and beauty industry expertise to help him navigate scaling challenges and new distribution strategies. He values practical, been-there-done-that expertise over theoretical advice.</p>"
          },
          {
            "id": "kevin-coo-needs",
            "title": "Operations Philosophy & Approach to Scale",
            "html": "<p>Kevin's approach to operations reflects his broader scaling philosophy:</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">Operational Leadership Principles</div>\n  <table>\n    <tr><th>Principle</th><th>Manifestation</th></tr>\n    <tr><td>Proactive problem-solving</td><td>Leadership that anticipates challenges and proposes solutions before crises emerge</td></tr>\n    <tr><td>Strategic + tactical excellence</td><td>Operations leaders who think strategically about business impact, not just execution</td></tr>\n    <tr><td>Creative resourcefulness</td><td>Finding unconventional solutions when facing capacity or resource constraints</td></tr>\n    <tr><td>Operational autonomy</td><td>Leaders who can run operations without constant direction or oversight</td></tr>\n    <tr><td>Building for scale</td><td>Creating systems and processes that enable growth, not just maintaining existing infrastructure</td></tr>\n  </table>\n</div>\n\n<h3>Kevin's \"Big Lever\" Mentality</h3>\n\n<p>This is Kevin's most defining strategic trait. He doesn't want a COO who optimizes split tests all day — he wants someone who finds the next Costco deal.</p>\n\n<div class=\"answer-block\">\n  <strong>Kevin on strategic vs. tactical:</strong> \"A big lesson I've learned... is that we really want to think about ourselves as a business, not just an e-commerce business or just a growth marketing business. There's so much more levers, such as offline channels, such as retailers... Costco was about 15% of our sales last year, and that's coming from nowhere. That took a few emails and a few phone calls. So it's really a big lesson on pulling strategic levers so I can really drive that impact versus just tactical growth hack stuff all day.\"\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Kevin's Operational Challenges</div>\n  <ul>\n    <li><strong>Balancing innovation velocity with execution quality</strong> — Managing a high volume of strategic ideas while ensuring the organization maintains focus</li>\n    <li><strong>Scaling operational infrastructure</strong> — Building systems that keep pace with 65–80% YoY growth without adding excessive bureaucracy</li>\n    <li><strong>Cross-functional coordination</strong> — Aligning product development, international expansion, and new channel growth with operational capacity</li>\n    <li><strong>Maintaining entrepreneurial culture at scale</strong> — Preserving the scrappy, proactive mindset as the organization grows from ~80 to 150+ employees</li>\n    <li><strong>Strategic versus tactical balance</strong> — Ensuring operational leadership focuses on big levers (distribution, international, new products) rather than incremental optimizations</li>\n  </ul>\n</div>"
          },
          {
            "id": "kevin-strategy",
            "title": "Kevin's Business Strategy",
            "html": "<h3>Revenue Channels & Growth Playbook</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">Channel Evolution</div>\n  <table>\n    <tr><th>Channel</th><th>How It Started</th><th>Current State</th></tr>\n    <tr><td><strong>Amazon</strong></td><td>First channel (Jan 2016). Kevin \"didn't know anything about Amazon, literally just listed.\" PPC, reviews, standard playbook.</td><td>60–70% market share in red light hair therapy category. Mature but still major revenue driver.</td></tr>\n    <tr><td><strong>DTC (Shopify)</strong></td><td>Launched ~6 months after Amazon. Facebook ads with \"one video we ran repeatedly at every part of the funnel.\"</td><td>Sophisticated funnel with email flows, quiz segmentation, influencer whitelisting, YouTube retargeting.</td></tr>\n    <tr><td><strong>Costco</strong></td><td>\"A few emails and a few phone calls.\" Zero to 15% of revenue.</td><td>Homepage features, mailer promos, in-store presence. Kevin's clearest example of \"big lever\" thinking.</td></tr>\n    <tr><td><strong>B2B</strong></td><td>Just launched. Medspas, clinics, hair salons. Higher-priced machines (~$10K).</td><td>Net new channel. Sourcing equipment through Shenzhen network.</td></tr>\n  </table>\n</div>\n\n<h3>Product Moat Philosophy</h3>\n\n<div class=\"answer-block\">\n  <strong>Kevin on competitive moats:</strong> \"Sometimes it's worth it to do the really difficult things because it does create that edge for you. Once you get through that hurdle, it's a barrier to entry, it's something that's difficult for others to copy.\"\n</div>\n\n<p>Kevin's moat stack: FDA clearance (3-year process) + clinical study + 60-70% Amazon market share + Costco trust stamp + family-owned manufacturing (net-150 terms). This is not easy to replicate.</p>\n\n<h3>Paid Marketing Evolution</h3>\n<ul>\n  <li><strong>Meta (Facebook/Instagram):</strong> Was lion's share of spend; declining returns since iOS 14.5</li>\n  <li><strong>YouTube:</strong> Major growth channel — sponsor influencers, turn their videos into retargeting ads, whitelisting across Facebook</li>\n  <li><strong>Google Search:</strong> Intent-based but low volume; competing with hims/keeps on larger budgets</li>\n  <li><strong>TikTok:</strong> Limited due to medical device advertising restrictions</li>\n  <li><strong>Shorts/Reels:</strong> Cheap CPCs but poor conversion (still experimental)</li>\n</ul>\n\n<h3>Future Expansion Roadmap</h3>\n<div class=\"card\">\n  <div class=\"card-header\">What's Coming</div>\n  <ul>\n    <li><strong>Skincare:</strong> TAM is 20x hair therapy. LED face masks already launched. Skincare wand with 5 modalities (microcurrent, EMS, electroporation, supersonic, deep infrared) at sub-$200 for retail.</li>\n    <li><strong>Body panels:</strong> Red light therapy panels. Plan to be #1 in category within 1 year.</li>\n    <li><strong>International:</strong> Currently North America focused. Global expansion is a top priority.</li>\n    <li><strong>Consumables:</strong> Shampoo, serum, conditioner, supplements. Recurring revenue play.</li>\n  </ul>\n</div>\n\n<div class=\"answer-block\">\n  <strong>Kevin's 5-year vision:</strong> \"Tomorrow in the next five years, we want to be much more than [a hair growth device company]... We want to be your one-stop shop for all things beauty. We want to be a part of your day and your routine, and most importantly, still offer that great user experience — no side effects.\"\n</div>"
          },
          {
            "id": "kevin-personal",
            "title": "Kevin's Personality & Values",
            "html": "<h3>Core Values & Decision-Making</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">Kevin's Personal Compass</div>\n  <table>\n    <tr><th>Value</th><th>Evidence</th></tr>\n    <tr><td><strong>Product integrity</strong></td><td>\"Would I want my parents to use this? That's my gauge for it.\" Safety and ethics over aggressive growth.</td></tr>\n    <tr><td><strong>Customer impact</strong></td><td>Cried at a testimonial shoot when customers held his hand and thanked him for their results. This is what drives him.</td></tr>\n    <tr><td><strong>Continuous evolution</strong></td><td>\"The entrepreneurial journey is about growth — for yourself and for the business.\"</td></tr>\n    <tr><td><strong>Strategic patience</strong></td><td>3 years of R&D before first sale. Invested in hard things upfront for long-term moat.</td></tr>\n    <tr><td><strong>Data-driven action</strong></td><td>Uses Toggle for time tracking, DISC profiles for hiring, A/B tests for marketing, reads \"almost every single review.\"</td></tr>\n    <tr><td><strong>Bias toward action</strong></td><td>\"Just test quickly and test cheaply\" — doesn't overthink, validates fast.</td></tr>\n  </table>\n</div>\n\n<h3>Productivity & Work Style</h3>\n<p>Kevin is self-described as \"a little bit nerdy about productivity.\" His toolkit:</p>\n<ul>\n  <li><strong>Evernote:</strong> \"Superpower\" second brain for notes</li>\n  <li><strong>Google Calendar:</strong> Essential for time blocking</li>\n  <li><strong>ClickUp/Asana:</strong> Project management</li>\n  <li><strong>Toggle:</strong> Time tracking — audits his time weekly</li>\n  <li><strong>Meditation + gym:</strong> Mental and physical fitness as non-negotiable</li>\n  <li><strong>Meeting request system:</strong> Requires agenda and time estimate — filters for deep work blocks</li>\n</ul>\n\n<h3>Kevin on Imposter Syndrome</h3>\n<div class=\"answer-block\">\n  \"Everybody has imposter syndrome no matter how successful we get... There's always someone bigger than you. That will never change. And knowing that is actually kind of comforting in a way because it means that you're doing okay.\"\n</div>"
          },
          {
            "id": "kevin-trust",
            "title": "Trust-Building & Customer Philosophy",
            "html": "<p>Kevin views trust-building as the core competitive advantage, especially in a market where customers are \"used to seeing stink oil products\" and \"afraid of getting scammed.\"</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">Kevin's Trust-Building Playbook</div>\n  <table>\n    <tr><th>Mechanism</th><th>Detail</th></tr>\n    <tr><td><strong>FDA clearance</strong></td><td>Clinical designation creates instant credibility over supplements/topicals</td></tr>\n    <tr><td><strong>Social proof</strong></td><td>Authentic before/after photos, influencer videos with real usage, top Amazon reviews</td></tr>\n    <tr><td><strong>Costco stamp</strong></td><td>\"The stamp of trust that builds with someone being in Costco\" — trust you can't buy</td></tr>\n    <tr><td><strong>Money-back guarantee</strong></td><td>Risk reversal prominently featured</td></tr>\n    <tr><td><strong>Personal photo evaluation</strong></td><td>Real humans (not automation) evaluate submitted hair loss photos</td></tr>\n    <tr><td><strong>Education-first funnel</strong></td><td>Brand → Product → Clinical proof → Doctor endorsements → Social proof → Then selling</td></tr>\n  </table>\n</div>\n\n<div class=\"answer-block\">\n  <strong>The moment Kevin knew it was working:</strong> \"When we had a testimonial shoot and real people came in... people were crying about the results, holding my hand and thanking me. It was really inspiring.\"\n</div>\n\n<div class=\"answer-block\">\n  <strong>On the market's skepticism:</strong> \"People really have a bad taste around these kind of products. I think it's kind of like weight loss where you're not sure if it's going to do what it does, you're afraid of getting scammed.\"\n</div>"
          },
          {
            "id": "kevin-quotes",
            "title": "Key Quotes & Philosophy",
            "html": "<p>Representative quotes from Kevin's podcast appearances and direct conversation, organized by theme:</p>\n\n<h3>On Strategic Thinking</h3>\n<div class=\"answer-block\">\"We really want to think about ourselves as a business, not just an e-commerce business or just a growth marketing business. There's so much more levers.\" <span class=\"muted\">— DTC Podcast</span></div>\n\n<div class=\"answer-block\">\"Pulling strategic levers so I can really drive that impact versus just tactical growth hack stuff all day.\" <span class=\"muted\">— DTC Podcast</span></div>\n\n<h3>On People & Hiring</h3>\n<div class=\"answer-block\">\"Once you hire great people, a lot of times they'll kind of run themselves and manage themselves. But really, hiring is the biggest challenge.\" <span class=\"muted\">— Business Rockstars</span></div>\n\n<div class=\"answer-block\">\"Build out your hiring funnel — make it very strong, make it repel the people that don't fit.\" <span class=\"muted\">— Business Rockstars</span></div>\n\n<div class=\"answer-block\">\"Your highest leverage thing... becomes people — becomes managing people, becomes leading people, and more importantly, hiring the best people you can find.\" <span class=\"muted\">— Business Rockstars</span></div>\n\n<div class=\"answer-block\">\"At a certain scale, you really have to hire the people that have been there, done that, and are better than you so you can truly let go.\" <span class=\"muted\">— Money Talks</span></div>\n\n<div class=\"answer-block\">\"I've brought on people where I felt like I was better than them at their job. And what that meant was I was always hovering over their shoulders... It's not empowering.\" <span class=\"muted\">— Money Talks</span></div>\n\n<div class=\"answer-block\">\"B players are actually kind of the worst — they're not an A player, but they're not a C player either. So you kind of keep them around... but they are an opportunity cost to the A players being in that role.\" <span class=\"muted\">— Money Talks</span></div>\n\n<h3>On Product & Trust</h3>\n<div class=\"answer-block\">\"Sometimes it's worth it to do the really difficult things because it does create that edge for you. Once you get through that hurdle, it's a barrier to entry.\" <span class=\"muted\">— Business Rockstars</span></div>\n\n<div class=\"answer-block\">\"Would I want my parents to use this? That's my gauge for it.\" <span class=\"muted\">— Business Rockstars</span></div>\n\n<h3>On Growth & Self-Awareness</h3>\n<div class=\"answer-block\">\"The entrepreneurial journey is about growth — for yourself and for the business.\" <span class=\"muted\">— Business Rockstars</span></div>\n\n<div class=\"answer-block\">\"You're always going to feel insecure. You're always going to feel like you can't do it. And maybe you won't, but maybe you will. And the only way to find out is to try.\" <span class=\"muted\">— Business Rockstars</span></div>\n\n<h3>On Delegation & Scaling</h3>\n<div class=\"answer-block\">\"I felt like I had to do everything myself... which is absolutely not true. You need to hire people, you need to delegate, and you need to fire people [who] don't work out.\" <span class=\"muted\">— Business Rockstars</span></div>\n\n<div class=\"answer-block\">\"He's good if you tell him 'figure this out,' but I wish he came up with solutions before Q4.\" <span class=\"muted\">— Re: current Director of Ops, from your call with Kevin</span></div>\n\n<div class=\"answer-block\">\"Basically I just fire myself every year. Whatever I did last year, I hire someone for that role. And then that kind of compounds.\" <span class=\"muted\">— Money Talks (framework from a friend)</span></div>\n\n<div class=\"answer-block\">\"There's value creation and value protection. You want to hold on for as long as you can to the value-driving things while doing a minimal set of value protection type of tasks.\" <span class=\"muted\">— Money Talks</span></div>\n\n<h3>On Paying for Talent & Knowledge</h3>\n<div class=\"answer-block\">\"It comes down to whether that role has enough leverage to become 10x. The best warehouse worker is maybe 50% faster. But a growth marketer can probably 20x the next person. Think through how much leverage the role has.\" <span class=\"muted\">— Money Talks</span></div>\n\n<div class=\"answer-block\">\"Paying for knowledge at a certain scale is one of the most impactful things and highest leverage things you can do.\" <span class=\"muted\">— Money Talks</span></div>\n\n<div class=\"answer-block\">\"I'm running the biggest company I've ever run every single day. So someone that's been there, done that, someone that's run a $100M, $500M business — so much learnings I can just borrow from. To me, it's a no-brainer.\" <span class=\"muted\">— Money Talks</span></div>\n\n<h3>On the Rebrand & Vision</h3>\n<div class=\"answer-block\">\"Our mission is to help people restore confidence and build a community of support... The vision we have is not just a device company. It's one that connects with people on an emotional level and speaks to the issue around hair loss and insecurities and frustrations emotionally.\" <span class=\"muted\">— DTC Podcast</span></div>"
          },

            "id": "kevin-playbook",
            "title": "Understanding Kevin's Strategic Priorities",
            "html": "<div class=\"card\">\n  <div class=\"card-header\">Current Strategic Focus Areas</div>\n  <table>\n    <tr><th>Priority</th><th>Details</th></tr>\n    <tr><td>Distribution channel expansion</td><td>Costco demonstrated the power of big-lever thinking. Exploring additional retail partnerships and international markets.</td></tr>\n    <tr><td>Product portfolio expansion</td><td>Moving beyond hair therapy into skincare (LED face masks, wands) and body panels. Goal to become \"one-stop shop for beauty.\"</td></tr>\n    <tr><td>International growth</td><td>North America is currently the primary market. Significant opportunity in Asia, particularly Korea and Japan where laser therapy is more mainstream.</td></tr>\n    <tr><td>Operational scaling</td><td>Managing 65–80% YoY growth while maintaining culture and quality. Transitioning from founder-driven execution to systems-based operations.</td></tr>\n    <tr><td>Building world-class team</td><td>Deliberate investment in executive-level hires who bring deep domain expertise in operations, go-to-market, and product.</td></tr>\n  </table>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Key Themes in Kevin's Thinking</div>\n  <ul>\n    <li><strong>Big levers over optimization:</strong> Kevin consistently focuses on strategic moves that create outsized impact rather than incremental improvements.</li>\n    <li><strong>Data-driven + action-oriented:</strong> He combines analytical rigor with speed — testing, validating, and scaling quickly.</li>\n    <li><strong>Vertical integration as advantage:</strong> Manufacturing in Shenzhen creates structural cost and quality benefits; this extends to strategic thinking about supply chains and operations.</li>\n    <li><strong>Trust and personal relationships:</strong> Kevin builds business partnerships through personal connection and credibility (e.g., Costco relationship, manufacturing partnerships).</li>\n    <li><strong>Product integrity as moat:</strong> FDA clearance, clinical data, and authentic customer results are not just marketing — they're fundamental to competitive advantage.</li>\n  </ul>\n</div>"

            "id": "org-chart",
            "title": "Organization Chart",
            "html": "<p>iRESTORE operates with a flat organizational structure. Kevin Chen is the CEO and primary executive. The organization is divided into functional areas: Operations & Supply Chain, Growth & Data, Product Development, Finance, and Customer Experience.</p>\n\n      <div class=\"org-chart\">\n        <div class=\"org-node ceo\">\n          <div class=\"org-name\">Kevin Chen</div>\n          <div class=\"org-title\">Co-Founder & CEO / Visionary</div>\n          <div class=\"org-note\">Lives in Brentwood, in office 1-2x/week</div>\n        </div>\n        <div class=\"org-connector\"></div>\n        <div class=\"org-node\">\n          <div class=\"org-name\">Chief Operating Officer</div>\n          <div class=\"org-title\">COO / Integrator</div>\n          <div class=\"org-note\">Operational leadership — all dept heads report here</div>\n        </div>\n        <div class=\"org-connector\"></div>\n        <div class=\"org-row\">\n          <div class=\"org-branch\">\n            <div class=\"org-connector\"></div>\n            <div class=\"org-node\">\n              <div class=\"org-name\">Junior Reyes</div>\n              <div class=\"org-title\">VP of Growth & Data</div>\n              <div class=\"org-note\">Dir. of E-Comm reports to them<br>Manages Amazon, Target, misc channels<br>Marketing team (remote)</div>\n            </div>\n          </div>\n          <div class=\"org-branch\">\n            <div class=\"org-connector\"></div>\n            <div class=\"org-node\">\n              <div class=\"org-name\">Brandon</div>\n              <div class=\"org-title\">Director of Ops & Supply Chain</div>\n              <div class=\"org-note\">Overseas ops, supply chain, logistics<br>La Mirada warehouse<br>Reliable but not strategic</div>\n            </div>\n          </div>\n          <div class=\"org-branch\">\n            <div class=\"org-connector\"></div>\n            <div class=\"org-node\">\n              <div class=\"org-name\">Longchuan Huang, PhD</div>\n              <div class=\"org-title\">Head of Product Development</div>\n              <div class=\"org-note\">~3 months in, from OUAI Haircare<br>PhD (UPenn), MBA (UCSD)<br>Prior: Kate Somerville, Beiersdorf, Janssen<br>Native Chinese speaker<br>Kevin still heavily involved</div>\n            </div>\n          </div>\n          <div class=\"org-branch\">\n            <div class=\"org-connector\"></div>\n            <div class=\"org-node\">\n              <div class=\"org-name\">Financial Controller</div>\n              <div class=\"org-title\">Finance & Accounting</div>\n              <div class=\"org-note\">Been there several years<br>Tax & accounting, not FP&A<br>Fractional CFO supports strategy</div>\n            </div>\n          </div>\n          <div class=\"org-branch\">\n            <div class=\"org-connector\"></div>\n            <div class=\"org-node\">\n              <div class=\"org-name\">Amanda Schoep</div>\n              <div class=\"org-title\">Dir. of Customer Experience</div>\n              <div class=\"org-note\">Promoted Aug 2024 from Sr. Growth Mktg Mgr<br>3+ yrs at iRESTORE; UCF grad<br>7-day support (email/chat/phone)</div>\n            </div>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"tip\">Team composition: ~80 FTE + ~50 overseas (at manufacturing facility in Shenzhen) + contractors = 100+ total headcount. Operations, warehouse, and finance functions are based in-office at La Mirada. Growth & Marketing operates fully remote.</div>"

            "html": "<p><strong>Current state:</strong> The company is exploring optimal reporting structures for the Growth & Marketing function. Kevin is deeply involved in brand, product marketing, and growth strategy — areas where CEO Visionaries typically want to maintain hands-on control.</p>\n\n      <div class=\"org-chart\">\n        <div class=\"org-node ceo\">\n          <div class=\"org-name\">Kevin Chen</div>\n          <div class=\"org-title\">Co-Founder & CEO / Visionary</div>\n          <div class=\"org-note\">Two direct reports: COO + VP of Growth</div>\n        </div>\n        <div class=\"org-connector\"></div>\n        <div class=\"org-row\">\n          <div class=\"org-branch\">\n            <div class=\"org-connector\"></div>\n            <div class=\"org-node\">\n              <div class=\"org-name\">Chief Operating Officer</div>\n              <div class=\"org-title\">COO / Integrator</div>\n              <div class=\"org-note\">Owns execution & systems</div>\n            </div>\n          </div>\n          <div class=\"org-branch\">\n            <div class=\"org-connector\"></div>\n            <div class=\"org-node\" style=\"border-color: #f57c00; background: #fff3e0;\">\n              <div class=\"org-name\">Junior Reyes</div>\n              <div class=\"org-title\">VP of Growth & Data</div>\n              <div class=\"org-note\">Reports directly to Kevin</div>\n            </div>\n          </div>\n        </div>\n      </div>\n\n      <div style=\"display: flex; gap: 24px; flex-wrap: wrap; margin-top: 8px;\">\n        <div style=\"flex: 1; min-width: 280px;\">\n          <div class=\"org-chart\">\n            <div class=\"org-sub-label\">COO's Direct Reports</div>\n            <div class=\"org-connector\"></div>\n            <div class=\"org-row\">\n              <div class=\"org-branch\">\n                <div class=\"org-connector\"></div>\n                <div class=\"org-node\">\n                  <div class=\"org-name\">Brandon</div>\n                  <div class=\"org-title\">Dir. Ops & Supply Chain</div>\n                  <div class=\"org-note\">Overseas ops, logistics<br>La Mirada warehouse</div>\n                </div>\n              </div>\n              <div class=\"org-branch\">\n                <div class=\"org-connector\"></div>\n                <div class=\"org-node\">\n                  <div class=\"org-name\">Longchuan Huang, PhD</div>\n                  <div class=\"org-title\">Product Development</div>\n                  <div class=\"org-note\">~3 months in, from OUAI<br>PhD (UPenn), MBA (UCSD)<br>Native Chinese speaker</div>\n                </div>\n              </div>\n              <div class=\"org-branch\">\n                <div class=\"org-connector\"></div>\n                <div class=\"org-node\">\n                  <div class=\"org-name\">Financial Controller</div>\n                  <div class=\"org-title\">Finance & Accounting</div>\n                  <div class=\"org-note\">Tax & accounting<br>Fractional CFO for strategy</div>\n                </div>\n              </div>\n              <div class=\"org-branch\">\n                <div class=\"org-connector\"></div>\n                <div class=\"org-node\">\n                  <div class=\"org-name\">Amanda Schoep</div>\n                  <div class=\"org-title\">Dir. Customer Experience</div>\n                  <div class=\"org-note\">Promoted Aug 2024<br>3+ yrs at iRESTORE</div>\n                </div>\n              </div>\n            </div>\n          </div>\n        </div>\n        <div style=\"flex: 1; min-width: 280px;\">\n          <div class=\"org-chart\">\n            <div class=\"org-sub-label\" style=\"color: #f57c00;\">Kevin's Marketing Arm</div>\n            <div class=\"org-connector\"></div>\n            <div class=\"org-row\">\n              <div class=\"org-branch\">\n                <div class=\"org-connector\"></div>\n                <div class=\"org-node\" style=\"border-color: #f57c00;\">\n                  <div class=\"org-name\">Dir. Growth Marketing</div>\n                  <div class=\"org-title\">Paid Media & Performance</div>\n                  <div class=\"org-note\">Matt Parmely (Austin, TX)</div>\n                </div>\n              </div>\n              <div class=\"org-branch\">\n                <div class=\"org-connector\"></div>\n                <div class=\"org-node\" style=\"border-color: #f57c00;\">\n                  <div class=\"org-name\">Sr. E-Comm Manager</div>\n                  <div class=\"org-title\">Shopify & Marketplace</div>\n                  <div class=\"org-note\">Amazon, DTC, Costco channels</div>\n                </div>\n              </div>\n              <div class=\"org-branch\">\n                <div class=\"org-connector\"></div>\n                <div class=\"org-node\" style=\"border-color: #f57c00;\">\n                  <div class=\"org-name\">Content & Influencer</div>\n                  <div class=\"org-title\">Brand & Creative</div>\n                  <div class=\"org-note\">Art Director, Influencer Mgr<br>All remote (NY, FL, LV)</div>\n                </div>\n              </div>\n            </div>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Structural Considerations</div>\n        <ul>\n          <li><strong>Model A (Marketing under COO):</strong> All department heads report to COO. This creates clean P&L accountability. Requires tight coordination between marketing and ops for channel-mix optimization.</li>\n          <li><strong>Model B (Marketing direct to CEO):</strong> Kevin retains direct control of growth strategy and brand direction. COO maintains operational mandate across supply chain, finance, and customer experience.</li>\n          <li><strong>Model C (Dual reporting):</strong> Marketing reports operationally to COO (budgets, headcount, metrics) and strategically to CEO for creative direction and brand strategy. This structure is common in CEO-Visionary / COO-Integrator setups.</li>\n        </ul>\n      </div>\n\n      <div class=\"tip\"><strong>EOS context:</strong> In the Entrepreneurial Operating System, department heads typically report to the Integrator role. However, CEO-Visionaries often maintain hands-on involvement with marketing and brand strategy. Dotted-line reporting (solid operational line to COO, strategic input from CEO) balances these needs.</div>"

ss=\"card-header\">Manufacturing Partnership (Shenzhen)</div>\n        <p>Critical strategic relationship. The manufacturing facility has 40+ years of operational history and has evolved from original consumer electronics focus to beauty technology devices. Capabilities include product engineering, component sourcing, and on-site design teams (~50 personnel). Provides extended payment terms (net-150) that materially impact working capital. Also sources B2B equipment (salon/clinic devices) through this supply chain network.</p>\n      </div>"

annel alongside existing DTC and retail partnerships (Amazon, Target, Costco).</li>\n          <li><strong>Leadership note:</strong> Daniel Ju is listed as SVP of Operations; Brandon holds Director of Ops & Supply Chain. Reporting structure clarification needed for scaled operations.</li>\n        </ul>\n      </div>"

          {
            "id": "jd-overview",
            "title": "Role Overview",
            "html": "<h2>COO (Integrator) — iRESTORE</h2>\n      <div class=\"card\">\n        <div class=\"card-header\">Position Details</div>\n        <ul>\n          <li><strong>Position:</strong> COO (Integrator)</li>\n          <li><strong>Reports To:</strong> CEO/Founder (Kevin Chen)</li>\n          <li><strong>Location:</strong> Orange County, CA (On-site/Hybrid) — LA-based strongly preferred; relocation assistance available</li>\n          <li><strong>Compensation:</strong> Competitive base + performance bonus + equity</li>\n        </ul>\n      </div>\n\n      <h3>The Opportunity</h3>\n      <p>As the Operational Strategist and true Integrator, you'll be the bridge between vision and execution. You'll partner directly with Kevin to translate strategic vision into operational execution plans. Your role is to connect all the dots across supply chain, inventory, finance, customer experience, and team operations — ensuring that strategy becomes reality through clear execution and operational excellence.</p>\n      <p><strong>This role frees the CEO</strong> to focus on innovation (product + AI), sales, and big relationships — while you own the operational engine.</p>"
          },
          {
            "id": "jd-responsibilities",
            "title": "Key Responsibilities",
            "html": "<h2>Key Responsibilities</h2>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Strategy Translation & Execution Planning</div>\n        <ul>\n          <li>Translate CEO's strategic vision into clear operational execution plans each department can work against</li>\n          <li>Connect strategic goals to operational KPIs, budgets, and timelines across all functions</li>\n          <li>Work with CFO and Controller to break down financial targets into departmental execution plans</li>\n          <li>Ensure alignment through regular operational reviews and dashboards</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Strategy-to-Execution Translation in Practice</div>\n        <p>Strategy translation is central to the COO role. The following examples illustrate how strategic directives become operational execution plans:</p>\n        <table>\n          <tr><th style=\"width:35%\">Strategic Direction</th><th>Operational Translation</th></tr>\n          <tr>\n            <td>Expand into retail (Sephora/Ulta for skincare)</td>\n            <td>90-day retail readiness plan: retail-spec packaging redesign (wk 1–3), MAP policy finalized (wk 2), sell sheets + planogram built (wk 3–4), broker/rep firm shortlisted (wk 4–6), buyer meetings booked (wk 8–12). Track: first PO target Q3. Cross-functional ownership across marketing (creative), ops (packaging/fulfillment), and finance (margin modeling by channel).</td>\n          </tr>\n          <tr>\n            <td>Internationalization expansion</td>\n            <td>Phased rollout: Phase 1 (60 days) — Amazon UK + DE via FBA Europe, translated listings, VAT registration. Phase 2 (6 mo) — Korea via distributor model, MFDS registration filed. Phase 3 (12 mo) — Japan PMDA pathway. Amazon logistics coordination with Brandon; regulatory specialist hired or contracted for Korea/Japan. Target: $2M international revenue in first 12 months.</td>\n          </tr>\n          <tr>\n            <td>Build beauty brand positioning and recurring revenue</td>\n            <td>Subscription consumables initiative: post-purchase email flows targeting 600K+ device owners with bundled serum/supplement offers (subscribe-and-save at 15% discount). Operations implements recurring fulfillment workflow in Fulfill.io; supplier volume pricing negotiated for 3x consumable scaling. Marketing designs lifecycle email sequence. Finance models LTV impact at multiple conversion scenarios. Target: 10% of device buyers converting to $40/mo subscription within 12 months.</td>\n          </tr>\n          <tr>\n            <td>Launch sub-$200 wand for mass retail</td>\n            <td>Target/Walmart readiness: retail unit economics finalized at $199 MSRP (validate 40%+ retailer margin with COGS), retail-ready packaging sourced, anti-theft fixtures designed, inventory positioned for 500-store test. Operations: separate retail fulfillment workflow from DTC/Amazon. Marketing: co-op advertising budget + in-store demo plan. Target: $500K/mo run rate within 6 months of placement.</td>\n          </tr>\n          <tr>\n            <td>Build toward 2–4 year, $500M+ exit</td>\n            <td>Exit readiness roadmap: (1) Clean financials — audited GAAP statements by EOY, owner add-back normalization, (2) SOP documentation for operations continuity, (3) Revenue diversification — reduce DTC/Amazon concentration below 50% via retail + international, (4) Recurring revenue expansion (subscriptions) for valuation multiple uplift, (5) Board-ready quarterly reporting package. Each workstream assigned to an owner with clear deadlines and dashboard metrics.</td>\n          </tr>\n        </table>\n        <p><strong>The fundamental pattern:</strong> Strategic directives are translated into detailed operational plans with clear ownership, timelines, resource assignments, and measurable outcomes. Vision becomes execution.</p>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Operational Leadership</div>\n        <ul>\n          <li>Lead teams across supply chain, fulfillment, customer service, and quality assurance</li>\n          <li>Build and document SOPs to systematize operations and reduce founder dependency</li>\n          <li>Run operational meetings and drive decisions (CEO input on major decisions)</li>\n          <li>Drive margin improvement through supplier negotiations, logistics optimization, process efficiency</li>\n          <li>Support new product launches with operational readiness planning</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Inventory Management & Forecasting</div>\n        <ul>\n          <li>Implement inventory management best practices and identify/setup appropriate systems</li>\n          <li>Develop accurate forecasting models and streamline supply-demand balance</li>\n          <li>Analyze inventory to identify overstock/understock issues and optimize stock rotation</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">ERP & Systems</div>\n        <ul>\n          <li>Maximize ERP system (Fulfil.io) through customization, optimization, and integration</li>\n          <li>Build systems and automation to drive operational efficiency (including AI-powered workflows)</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Cross-Functional Integration</div>\n        <ul>\n          <li>Connect all dots across departments — break down silos</li>\n          <li>Improve cross-functional communication</li>\n          <li>Lead risk assessment, mitigation planning, and compliance</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">People & Culture</div>\n        <ul>\n          <li>Lead people operations with Chief of Staff: HR issues, team development for direct reports</li>\n          <li>Partner with CEO on recruiting strategy and building A-player bench strength</li>\n          <li>Champion company values: think big, proactive problem-solving, fail fast and learn</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Financial Stewardship</div>\n        <ul>\n          <li>Own operational P&L and EBITDA targets</li>\n          <li>Partner with CFO and Controller on forecasting, budgeting, and variance analysis</li>\n          <li>Make data-driven decisions balancing growth investment with profitability</li>\n        </ul>\n      </div>"

            "html": "<h2>Qualifications</h2>\n\n      <h3>Required</h3>\n      <ul>\n        <li>Based in Southern California (or willing to relocate — they'll cover costs)</li>\n        <li>Track record scaling operations from mid-high 8 figures to 9 figures and beyond</li>\n        <li>Player-coach mentality — willing to get hands-on when needed</li>\n        <li><strong>Health & Beauty CPG experience is a must</strong></li>\n        <li>Familiar with e-commerce ecosystem (Shopify) and ERP systems (Fulfil.io, NetSuite, or similar)</li>\n        <li>Tech savvy with experience building systems and automation (including AI workflows)</li>\n        <li>Proven ability to translate strategic vision into operational execution plans</li>\n        <li>Strong supply chain and logistics background (Asia manufacturing experience a plus)</li>\n        <li>Demonstrated ability to manage P&L and drive margin improvement</li>\n      </ul>\n\n      <h3>Nice to Have</h3>\n      <ul>\n        <li>Experience with wholesale and retail programs</li>\n        <li>International expansion experience</li>\n        <li>FDA-regulated product experience</li>\n        <li>Experience with EOS/Traction</li>\n      </ul>"

            "id": "jd-90day",
            "title": "Success Timeline (90 Days / 1 Year)",
            "html": "<h2>What Success Looks Like</h2>\n\n      <h3>First 90 Days</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">90-Day Priorities</div>\n        <ul>\n          <li>Conduct comprehensive operational audit and identify top 5 high-impact improvement opportunities</li>\n          <li>Establish relationships with direct reports and assess company culture and team dynamics</li>\n          <li>Assume ownership of operational meetings and shift routine day-to-day decisions to COO level</li>\n          <li>Develop and present 12-month operational roadmap and execution plan to leadership</li>\n        </ul>\n      </div>\n\n      <h3>First Year</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">12-Month Success Indicators</div>\n        <ul>\n          <li>CEO bandwidth reallocated to product innovation, AI development, sales, and strategic relationships</li>\n          <li>Strategic initiatives consistently translated into clear execution plans with measurable team accountability</li>\n          <li>Gross margins improved by 3–5 percentage points through operational optimization and efficiency gains</li>\n          <li>Organization views COO as primary decision-maker for operational strategy and day-to-day execution</li>\n        </ul>\n      </div>\n\n      <h3>Required Competencies for Success</h3>\n      <table>\n        <tr><th>Competency</th><th>Role Requirement</th></tr>\n        <tr><td><strong>Strategy-to-Execution Translation</strong></td><td>Ability to translate high-level vision into operational plans teams execute. Connect strategic goals to KPIs, budgets, and timelines across functions.</td></tr>\n        <tr><td><strong>Operational Excellence & Scaling</strong></td><td>Proven ability to build scalable systems in high-growth environments. Deep supply chain, logistics, and manufacturing expertise. Track record of margin improvement and cost optimization.</td></tr>\n        <tr><td><strong>DTC & E-commerce Operations</strong></td><td>Proficiency with DTC metrics, unit economics, and customer lifecycle management. Experience with Shopify ecosystem and ERP systems (Fulfil.io, NetSuite, etc.).</td></tr>\n        <tr><td><strong>Leadership & Culture Alignment</strong></td><td>Player-coach mindset. Strong emotional intelligence and leadership presence. Values alignment with company culture: proactive problem-solving, systems thinking, continuous improvement.</td></tr>\n        <tr><td><strong>Financial & P&L Management</strong></td><td>Ownership of operational P&L and EBITDA targets. Ability to partner with finance leadership on planning, forecasting, and variance analysis.</td></tr>\n      </table>"

            "html": "<table>\n        <tr><th>Metric</th><th>Detail</th></tr>\n        <tr><td><strong>Legal Name</strong></td><td>Freedom Laser Therapy, Inc. (dba iRESTORE)</td></tr>\n        <tr><td><strong>Revenue</strong></td><td>~$100M+ (2025) → $100–150M est. (2026)</td></tr>\n        <tr><td><strong>Growth</strong></td><td>80% YoY (last year), 65% YoY (this year); 3x in 2 years</td></tr>\n        <tr><td><strong>Profitability</strong></td><td>Profitable with strong balance sheet; negative cash conversion cycle</td></tr>\n        <tr><td><strong>Channels</strong></td><td>DTC (irestorelaser.com), Amazon, Costco.com + wholesale <em class=\"muted\">(exact split not disclosed — ask in interview)</em></td></tr>\n        <tr><td><strong>Market Share</strong></td><td>60–70% of Amazon laser hair growth category</td></tr>\n        <tr><td><strong>Customers</strong></td><td>600,000+ to date</td></tr>\n        <tr><td><strong>Team</strong></td><td>~80 FTE + 50 overseas + contractors (100+ total)</td></tr>\n        <tr><td><strong>HQ</strong></td><td>La Mirada, CA (warehouse/office)</td></tr>\n        <tr><td><strong>Manufacturing</strong></td><td>Father's Shenzhen facility + 2 additional factories</td></tr>\n        <tr><td><strong>ERP</strong></td><td>Fulfil.io</td></tr>\n        <tr><td><strong>EOS</strong></td><td>~60% implemented</td></tr>\n        <tr><td><strong>Exit Timeline</strong></td><td>2–4 years + 2-year earnout</td></tr>\n      </table>"

            "id": "company-products",
            "title": "Product Portfolio",
            "html": "<div class=\"card\">\n        <div class=\"card-header\">Hair Growth Devices (Core)</div>\n        <p>FDA-cleared low-level laser therapy (LLLT) helmets and caps. Multiple price points from ~$600 to $1,400+. This is the category where they dominate with 60-70% Amazon market share. Clinical studies supporting efficacy. Macro tailwind: influencers (Bryan Johnson, Huberman) driving massive organic demand for hair growth.</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Skincare Devices (Growth Engine)</div>\n        <p>LED face masks, skincare wands, and related devices. Newer category but massive TAM — skincare is 20x the addressable market of hair therapy. This is where the long-term growth story lives. Competitors in this space include CurrentBody, Dr. Dennis Gross, Omnilux, and FOREO.</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Super Premium Hair Growth</div>\n        <p>Recently launched higher-end product that \"fundamentally changed the business.\" Higher ASP, higher margins.</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">B2B / Professional (New)</div>\n        <p>Just launched — targeting clinics, hair salons, and medical professionals. ~$10K devices sourced (not manufactured) through the Shenzhen network. Early stage but high-margin opportunity.</p>\n      </div>"

            "id": "pnl-model",
            "title": "Estimated P&L — $90M (2025)",
            "html": "<div class=\"warning\"><strong>⚠ These are modeled estimates, not actual financials.</strong> The only confirmed number is ~$90M+ net revenue (from the JD). All line-item breakdowns below are educated guesses based on DTC beauty-device benchmarks and public comps. Actual CAC, fulfillment costs, margins, and OpEx could differ significantly. Use this as a <em>framework for asking smart questions</em> in the interview, not as a statement of fact.</div>\n\n<div class=\"tip\"><strong>Scope:</strong> $90M+ net revenue (FY2025). Analysis shows the traditional P&L waterfall through 4 profit layers, followed by a \"4 Quarters of a Dollar\" view that breaks down margin allocation.</div>\n\n<h3>Estimated Channel Mix (basis for P&L below)</h3>\n<table>\n  <tr><th>Channel</th><th>Est. Revenue</th><th>% Mix</th><th>Basis</th></tr>\n  <tr><td>Amazon</td><td>$45M</td><td>50%</td><td>60–70% of hair growth category; dominant share</td></tr>\n  <tr><td>DTC (Shopify)</td><td>$27M</td><td>30%</td><td>iRESTORE.com; growing as brand matures</td></tr>\n  <tr><td>Costco / Wholesale</td><td>$13.5M</td><td>15%</td><td>Costco.com + expanding to in-store</td></tr>\n  <tr><td>B2B / Other</td><td>$4.5M</td><td>5%</td><td>New clinic/salon channel; early stage</td></tr>\n</table>\n\n<h3>4 Layers of DTC Profitability</h3>\n<p class=\"muted\">Each layer subtracts a cost category, showing how $90M of revenue cascades to profit:</p>\n<table>\n  <tr><th>Profit Layer</th><th>$ (M)</th><th>Margin</th><th>What It Tells You</th><th>DTC Benchmark</th></tr>\n  <tr style=\"background:#e8f5e9\"><td><strong>① Gross Profit</strong><br><span style=\"font-size:0.85em\">Revenue – COGS</span></td><td><strong>$60.3</strong></td><td><strong>67%</strong></td><td>Can we make money on the product itself?</td><td>60–70%</td></tr>\n  <tr style=\"background:#e3f2fd\"><td><strong>② Contribution Margin</strong><br><span style=\"font-size:0.85em\">GP – CAC – Channel Costs</span></td><td><strong>$29.5</strong></td><td><strong>33%</strong></td><td>Can we profitably acquire & deliver to a customer?</td><td>25–40%</td></tr>\n  <tr style=\"background:#fff3e0\"><td><strong>③ EBITDA</strong><br><span style=\"font-size:0.85em\">CM – OpEx</span></td><td><strong>$14.3</strong></td><td><strong>16%</strong></td><td>Can the business generate cash from operations?</td><td>10–22%</td></tr>\n  <tr style=\"background:#fce4ec\"><td><strong>④ Free Cash Flow</strong><br><span style=\"font-size:0.85em\">EBITDA – CapEx – Working Capital</span></td><td><strong>~$10–12</strong></td><td><strong>~11–13%</strong></td><td>What's left to reinvest or distribute?</td><td>8–15%</td></tr>\n</table>\n<div class=\"tip\"><strong>Key insight:</strong> iRESTORE's 67% gross margin reflects strong product economics. Between gross profit and EBITDA, 51 margin points are consumed by acquisition, fulfillment, channel fees, and overhead. The analysis below identifies the key levers to compress that gap — each 1pp of improvement on a $90M base represents ~$900K in incremental profit.</div>\n\n<h3>Detailed P&L — $90M Net Revenue</h3>\n<table>\n  <tr><th>Line Item</th><th>$ (M)</th><th>% Rev</th><th>Notes</th></tr>\n  <tr style=\"background:var(--light-blue)\"><td colspan=\"4\"><strong>REVENUE</strong></td></tr>\n  <tr><td>Gross Revenue</td><td>$105.0</td><td>117%</td><td>Before returns/discounts</td></tr>\n  <tr><td>&nbsp;&nbsp;Returns & Allowances</td><td>($10.5)</td><td>(12%)</td><td>Scorecard target: &lt;8%. Current est. 10–12%.</td></tr>\n  <tr><td>&nbsp;&nbsp;Discounts & Promos</td><td>($4.5)</td><td>(5%)</td><td>Amazon coupons, DTC promos, Costco deals</td></tr>\n  <tr class=\"highlight-row\"><td><strong>Net Revenue</strong></td><td><strong>$90.0</strong></td><td><strong>100%</strong></td><td><strong>Per JD: \"$90M+ Revenue\"</strong></td></tr>\n  <tr style=\"background:var(--light-blue)\"><td colspan=\"4\"><strong>COST OF GOODS SOLD</strong></td></tr>\n  <tr><td>Product Manufacturing</td><td>($22.5)</td><td>(25%)</td><td>Father's Shenzhen facility; family pricing; net-150 terms</td></tr>\n  <tr><td>&nbsp;&nbsp;Inbound Freight & Duties</td><td>($5.4)</td><td>(6%)</td><td>Ocean freight + customs</td></tr>\n  <tr><td>&nbsp;&nbsp;Packaging & Inserts</td><td>($1.8)</td><td>(2%)</td><td>Box, manuals, warranty cards</td></tr>\n  <tr><td><strong>Total COGS</strong></td><td><strong>($29.7)</strong></td><td><strong>(33%)</strong></td><td></td></tr>\n  <tr class=\"highlight-row\" style=\"background:#e8f5e9\"><td><strong>① GROSS PROFIT</strong></td><td><strong>$60.3</strong></td><td><strong>67%</strong></td><td><strong>Strong for device category</strong></td></tr>\n  <tr style=\"background:var(--light-blue)\"><td colspan=\"4\"><strong>CUSTOMER ACQUISITION (CAC)</strong></td></tr>\n  <tr><td>Amazon PPC (Sponsored Ads)</td><td>($7.0)</td><td>(8%)</td><td>60–70% of category; dominant share = high PPC spend</td></tr>\n  <tr><td>Meta / Google / TikTok Ads</td><td>($6.5)</td><td>(7%)</td><td>DTC acquisition; creative-driven performance</td></tr>\n  <tr><td>Influencer & Affiliates</td><td>($1.8)</td><td>(2%)</td><td>Dermatologist partnerships, beauty creators</td></tr>\n  <tr><td><strong>Total CAC</strong></td><td><strong>($15.3)</strong></td><td><strong>(17%)</strong></td><td></td></tr>\n  <tr style=\"background:var(--light-blue)\"><td colspan=\"4\"><strong>CHANNEL & FULFILLMENT COSTS</strong></td></tr>\n  <tr><td>Amazon Referral Fees</td><td>($4.5)</td><td>(5%)</td><td>~10% of $45M Amazon rev (beauty category rate)</td></tr>\n  <tr><td>Amazon FBA / Fulfillment</td><td>($5.9)</td><td>(6.5%)</td><td>~13% of Amazon rev — pick/pack/ship + storage. Devices are heavy/oversized = higher FBA fees</td></tr>\n  <tr><td>DTC Fulfillment & Shipping</td><td>($2.7)</td><td>(3%)</td><td>~10% of $27M DTC rev — La Mirada pick/pack + outbound carrier costs</td></tr>\n  <tr><td>DTC Payment Processing</td><td>($0.8)</td><td>(1%)</td><td>~3% of DTC rev — Shopify + Stripe/payment gateway</td></tr>\n  <tr><td>Costco Co-op, Freight & Compliance</td><td>($1.6)</td><td>(2%)</td><td>Marketing allowances, freight to Costco DC, chargeback/compliance fees</td></tr>\n  <tr><td><strong>Total Channel Costs</strong></td><td><strong>($15.5)</strong></td><td><strong>(17%)</strong></td><td></td></tr>\n  <tr class=\"highlight-row\" style=\"background:#e3f2fd\"><td><strong>② CONTRIBUTION MARGIN</strong></td><td><strong>$29.5</strong></td><td><strong>33%</strong></td><td><strong>After acquiring & delivering to customer</strong></td></tr>\n  <tr style=\"background:var(--light-blue)\"><td colspan=\"4\"><strong>OPERATING EXPENSES (OpEx)</strong></td></tr>\n  <tr><td>People (Salary + Benefits)</td><td>($8.1)</td><td>(9%)</td><td>~80 FTE + 50 overseas + contractors</td></tr>\n  <tr><td>PR, Events & Brand</td><td>($1.4)</td><td>(1.5%)</td><td>Retail launch events, earned media</td></tr>\n  <tr><td>Email / SMS / Retention</td><td>($0.5)</td><td>(0.5%)</td><td>Post-purchase flows, lifecycle marketing</td></tr>\n  <tr><td>Technology & Software</td><td>($1.6)</td><td>(2%)</td><td>Fulfil.io ERP, Shopify, analytics stack</td></tr>\n  <tr><td>Rent & Facilities</td><td>($1.2)</td><td>(1%)</td><td>La Mirada warehouse/office</td></tr>\n  <tr><td>Professional Services</td><td>($0.8)</td><td>(1%)</td><td>Fractional CFO, legal, accounting</td></tr>\n  <tr><td>G&A / Other</td><td>($1.6)</td><td>(2%)</td><td>Insurance, travel, misc</td></tr>\n  <tr><td><strong>Total OpEx</strong></td><td><strong>($15.2)</strong></td><td><strong>(17%)</strong></td><td></td></tr>\n  <tr class=\"highlight-row\" style=\"background:#fff3e0\"><td><strong>③ EBITDA</strong></td><td><strong>$14.3</strong></td><td><strong>16%</strong></td><td><strong>Realistic for high-growth DTC at scale</strong></td></tr>\n  <tr style=\"background:var(--light-blue)\"><td colspan=\"4\"><strong>BELOW EBITDA (ESTIMATED)</strong></td></tr>\n  <tr><td>D&A (tooling, molds, patents)</td><td>($1.5)</td><td>(2%)</td><td>Estimated; device molds + IP amortization</td></tr>\n  <tr><td>CapEx (new products, tooling)</td><td>($2.0)</td><td>(2%)</td><td>Skincare wand, new helmet iterations</td></tr>\n  <tr><td>Working Capital Changes</td><td>($1.0)</td><td>(1%)</td><td>Inventory build for new launches</td></tr>\n  <tr class=\"highlight-row\" style=\"background:#fce4ec\"><td><strong>④ FREE CASH FLOW (est.)</strong></td><td><strong>~$9.8</strong></td><td><strong>~11%</strong></td><td><strong>Good cash generation; net-150 terms from factory help</strong></td></tr>\n</table>\n\n<h3>Alternate View: \"4 Quarters of a Dollar\"</h3>\n<p class=\"muted\">Every $1 of net revenue splits into 4 buckets that sum to 100%:</p>\n<table>\n  <tr>\n    <th>Quarter</th>\n    <th>$ (M)</th>\n    <th>¢ per $1</th>\n    <th>What's Included</th>\n    <th>DTC Benchmark</th>\n  </tr>\n  <tr style=\"background:#e8f5e9\"><td><strong>① Profit</strong></td><td><strong>$14.3</strong></td><td><strong>16¢</strong></td><td>EBITDA — what's left after everything</td><td>10–22¢</td></tr>\n  <tr style=\"background:#fff3e0\"><td><strong>② Cost of Delivery</strong></td><td><strong>$45.2</strong></td><td><strong>50¢</strong></td><td>COGS ($29.7M) + Channel & Fulfillment ($15.5M)</td><td>40–55¢</td></tr>\n  <tr style=\"background:#ffebee\"><td><strong>③ Cost of Acquisition</strong></td><td><strong>$15.3</strong></td><td><strong>17¢</strong></td><td>Amazon PPC + paid media + influencers</td><td>15–25¢</td></tr>\n  <tr style=\"background:#e3f2fd\"><td><strong>④ OpEx</strong></td><td><strong>$15.2</strong></td><td><strong>17¢</strong></td><td>People + tech + rent + G&A + brand marketing</td><td>15–25¢</td></tr>\n  <tr class=\"highlight-row\"><td><strong>TOTAL</strong></td><td><strong>$90.0</strong></td><td><strong>100¢</strong></td><td></td><td></td></tr>\n</table>\n<div class=\"tip\"><strong>Strategic implication:</strong> Every DTC dollar splits into 4 categories: 16 cents to profit, 50 cents to cost of delivery, 17 cents to customer acquisition, and 17 cents to OpEx. The largest margin lever is cost of delivery (50¢), which includes channel fees, FBA costs, fulfillment, and COGS. Returns reduction alone could shift 2–4 cents from delivery to profit. On a $90M base, each cent of improvement = ~$900K.</div>"
          },
          {
            "id": "pnl-returns",
            "title": "Lever: Returns (10% → <8%)",
            "html": "<h3>Returns & Allowances — estimated ~10% of gross / $10.5M</h3>\n<div class=\"tip\"><strong>Key insight:</strong> Current estimated return rate is 10–12%; industry best-in-class is &lt;8%. At ~$105M gross, each 1pp of return reduction is worth <strong>$1.1M</strong> straight to the bottom line. Reducing to &lt;8% would unlock <strong>$2.1–4.2M</strong> in incremental EBITDA.</div>\n<ul>\n  <li><strong>Improve unboxing & setup experience:</strong> Most device returns come from confusion or unmet expectations. Create video QR codes in packaging for first-use walkthrough.</li>\n  <li><strong>\"Save the Sale\" retention team:</strong> Before processing a return, route to a specialist who troubleshoots. Many device returns are \"I don't know if it's working\" — addressable with education.</li>\n  <li><strong>Pre-purchase expectation setting:</strong> Add \"Results timeline\" content (visible in 3–6 months) to listings and DTC. Mismatched expectations are a top return driver.</li>\n  <li><strong>Return reason analysis:</strong> Categorize every return by reason code. \"Didn't work\" vs. \"didn't see results\" vs. \"wrong product\" vs. \"defective\" each require different interventions.</li>\n  <li><strong>Channel-specific return rates:</strong> Amazon vs. DTC vs. Costco return rates are likely very different. Costco's generous return policy could be inflating the blended number.</li>\n</ul>"
          },
          {
            "id": "pnl-cogs",
