<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iRESTORE COO Interview Prep</title>
<style>
:root {
  --sidebar-w: 280px;
  --navy: #1a1a3e;
  --blue: #4a7cff;
  --light-green: #e8f5e9;
  --bg: #f7f8fc;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: #333; font-size: 15px; line-height: 1.65; }

/* SIDEBAR */
.sidebar {
  position: fixed; top: 0; left: 0; width: var(--sidebar-w); height: 100vh;
  background: var(--navy); color: #ddd; display: flex; flex-direction: column;
  z-index: 100; transition: transform 0.3s ease;
}
.sidebar-header { padding: 20px; font-size: 18px; font-weight: 700; color: #fff; border-bottom: 1px solid #2a2a4a; }
.sidebar-search { padding: 8px 12px; }
.sidebar-search input {
  width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid #3a3a6a;
  background: #12122a; color: #ddd; font-size: 13px; outline: none;
}
.sidebar-search input::placeholder { color: #777; }
.sidebar-search input:focus { border-color: var(--blue); }
.sidebar-controls { display: flex; gap: 6px; padding: 6px 12px; border-bottom: 1px solid #2a2a4a; }
.sidebar-controls button {
  flex: 1; padding: 5px 0; border: 1px solid #3a3a6a; border-radius: 5px;
  background: #12122a; color: #aaa; font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.sidebar-controls button:hover { background: #2a2a4a; color: #fff; border-color: var(--blue); }
.nav-items { flex: 1; overflow-y: auto; padding: 8px 0; -webkit-overflow-scrolling: touch; }
.nav-item {
  padding: 10px 20px; cursor: pointer; font-size: 13px; transition: all 0.15s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: #2a2a4a; color: #fff; }
.nav-item.active { background: #2a2a4a; color: #fff; border-left-color: var(--blue); }
/* Group level */
.nav-item.group {
  display: flex; align-items: center; justify-content: space-between;
  font-weight: 700; font-size: 13px; color: #fff; padding: 10px 16px;
  background: #12122a; border-bottom: 1px solid #2a2a4a;
  border-left: 4px solid var(--group-accent, #4a7cff);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.nav-item.group .chevron { font-size: 10px; transition: transform 0.2s; color: #666; }
.nav-item.group.expanded .chevron { transform: rotate(90deg); color: #aaa; }
.nav-item.group:hover { background: #1a1a3e; }
/* Group accent colors */
.nav-item.group[data-group="company"]   { --group-accent: #4a9fff; background: #0d1a30; }
.nav-item.group[data-group="role"]      { --group-accent: #4caf50; background: #0d1f0d; }
.nav-item.group[data-group="pitch"]     { --group-accent: #ff9800; background: #1f170d; }
.nav-item.group[data-group="interview"] { --group-accent: #ce93d8; background: #1a0d1f; }
.nav-item.group[data-group="gameday"]   { --group-accent: #ef5350; background: #1f0d0d; }
/* Carry accent into child sections */
.nav-item.parent[data-group="company"]   { border-left-color: rgba(74,159,255,0.3); }
.nav-item.parent[data-group="role"]      { border-left-color: rgba(76,175,80,0.3); }
.nav-item.parent[data-group="pitch"]     { border-left-color: rgba(255,152,0,0.3); }
.nav-item.parent[data-group="interview"] { border-left-color: rgba(206,147,216,0.3); }
.nav-item.parent[data-group="gameday"]   { border-left-color: rgba(239,83,80,0.3); }
.nav-item.sub[data-group="company"].active   { border-left-color: #4a9fff; }
.nav-item.sub[data-group="role"].active      { border-left-color: #4caf50; }
.nav-item.sub[data-group="pitch"].active     { border-left-color: #ff9800; }
.nav-item.sub[data-group="interview"].active { border-left-color: #ce93d8; }
.nav-item.sub[data-group="gameday"].active   { border-left-color: #ef5350; }
/* Section level (parent) */
.nav-item.parent {
  display: flex; align-items: center; justify-content: space-between;
  font-weight: 600; padding-left: 24px; display: none;
}
.nav-item.parent.visible { display: flex; }
.nav-item.parent .chevron { font-size: 10px; transition: transform 0.2s; color: #666; }
.nav-item.parent.expanded .chevron { transform: rotate(90deg); color: #aaa; }
/* Subsection level */
.nav-item.sub { padding-left: 44px; font-size: 12px; color: #888; display: none; }
.nav-item.sub.visible { display: block; }
.nav-item.sub:hover, .nav-item.sub.active { color: #ccc; }

/* HAMBURGER (mobile) */
.hamburger {
  display: none; position: fixed; top: 12px; left: 12px; z-index: 200;
  background: var(--navy); border: none; color: #fff; font-size: 24px;
  width: 44px; height: 44px; border-radius: 8px; cursor: pointer;
  align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 90;
}

/* MAIN */
.main { margin-left: var(--sidebar-w); padding: 32px 48px 80px; max-width: 960px; }
.section { display: none; }
.section.active { display: block; }

/* CONTENT STYLES */
h1 { font-size: 28px; color: var(--navy); margin-bottom: 24px; padding-bottom: 12px; border-bottom: 3px solid var(--blue); }
h2 { font-size: 22px; color: var(--navy); margin: 28px 0 16px; }
h3 { font-size: 17px; color: #444; margin: 20px 0 10px; }
p { margin-bottom: 14px; }
ul, ol { margin: 0 0 16px 20px; }
li { margin-bottom: 6px; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 13px; }
th, td { padding: 10px 12px; border: 1px solid #ddd; text-align: left; vertical-align: top; }
th { background: var(--navy); color: #fff; font-weight: 600; }
tr:nth-child(even) { background: #f9f9fc; }
.highlight-row { background: #e3f2fd !important; font-weight: 600; }

.card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 20px; margin: 16px 0; }
.card-header { font-weight: 700; color: var(--navy); margin-bottom: 10px; font-size: 15px; }
.answer-block { background: #f0f4ff; border-left: 4px solid var(--blue); padding: 16px 20px; margin: 14px 0; border-radius: 0 8px 8px 0; }
.tip { background: #fff8e1; border-left: 4px solid #ffa000; padding: 14px 18px; margin: 14px 0; border-radius: 0 8px 8px 0; }
.muted { color: #888; font-size: 13px; }
/* ORG CHART */
.org-chart { display: flex; flex-direction: column; align-items: center; gap: 0; margin: 24px 0; }
.org-node { background: #fff; border: 2px solid var(--blue); border-radius: 10px; padding: 14px 20px; text-align: center; min-width: 180px; max-width: 220px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.org-node.ceo { background: var(--navy); color: #fff; border-color: var(--navy); min-width: 240px; max-width: 280px; }
.org-node.ceo .org-note { color: rgba(255,255,255,0.7); }
.org-node.you { background: #e8f5e9; border-color: #2e7d32; min-width: 240px; max-width: 280px; }
.org-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
.org-title { font-size: 12px; color: #555; margin-bottom: 4px; }
.org-node.ceo .org-title { color: rgba(255,255,255,0.85); }
.org-node.you .org-title { color: #2e7d32; }
.org-note { font-size: 11px; color: #888; line-height: 1.4; }
.org-connector { width: 2px; height: 20px; background: #bbb; margin: 0 auto; }
.org-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin-top: 0; position: relative; }
.org-row::before { content: ''; position: absolute; top: 0; left: 15%; right: 15%; height: 2px; background: #bbb; }
.org-row .org-row::before { left: 10%; right: 10%; }
.org-branch { display: flex; flex-direction: column; align-items: center; }
.org-branch .org-connector { height: 16px; }
.org-sub-section { display: flex; flex-direction: column; align-items: center; width: 100%; }
.org-sub-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 4px; }
.org-node small { display: block; color: #888; font-size: 11px; }

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {
  :root { --sidebar-w: 280px; }
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .hamburger { display: flex; }
  .overlay.open { display: block; }
  .main { margin-left: 0; padding: 70px 16px 60px; }
  h1 { font-size: 22px; }
  h2 { font-size: 18px; }
  h3 { font-size: 15px; }
  body { font-size: 14px; }
  table { font-size: 12px; display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  th, td { padding: 8px; min-width: 100px; }
  .card { padding: 14px; }
  .answer-block, .tip { padding: 12px 14px; }
  .org-chart { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .org-row { flex-wrap: wrap; gap: 12px; }
  .org-row::before { display: none; }
  .org-node { min-width: 150px; max-width: 200px; padding: 10px 14px; }
  .org-node.ceo, .org-node.you { min-width: 200px; max-width: 240px; }
}

@media (max-width: 480px) {
  .main { padding: 64px 12px 40px; }
  table { font-size: 11px; }
  th, td { padding: 6px; }
}
</style>
</head>
<body>

<button class="hamburger" id="hamburger" aria-label="Open menu">☰</button>
<div class="overlay" id="overlay"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">🎯 iRESTORE COO Prep</div>
  <div class="sidebar-search"><input type="text" id="search" placeholder="Search everything..."></div>
  <div class="sidebar-controls">
    <button id="expandAll">▼ Expand All</button>
    <button id="collapseAll">▲ Collapse All</button>
  </div>
  <div class="nav-items" id="nav"></div>
</div>

<div class="main" id="main"></div>

<script>
// ============================================================
// GROUP DATA (injected by build script)
// ============================================================
const groups = [
  {
    "id": "company",
    "title": "Know the Company",
    "icon": "🏢",
    "sections": [
      {
        "id": "kevin",
        "title": "1. Kevin Chen – Founder Profile",
        "icon": "👤",
        "subs": [
          {
            "id": "kevin-bg",
            "title": "Background",
            "html": "<p>Kevin Chen is the co-founder and CEO of iRESTORE (Freedom Laser Therapy, Inc.). He co-founded the company with his father approximately 13 years ago. Originally from Taiwan, Kevin moved to Irvine, California at age 10. He attended UC Berkeley and launched the business at around age 25. He lives in Brentwood, LA, and commutes to the La Mirada office regularly.</p>\n      <p>His father owns the manufacturing facility in Shenzhen, China, which gives iRESTORE a significant structural advantage in vertical integration and cost control.</p>\n\n<h3>Personal Details (March 2026)</h3>\n<p><strong>Age & Interests:</strong> Just turned 35 (birthday March 10, 2026 — celebrated in Vegas). Serious poker player — prefers cash games at Aria and Wynn, tracks results carefully as a winning player. Considering WSOP main event ($10K entry, 7-day commitment) as a bucket list item.</p>\n\n<p><strong>Information Sources:</strong> Member of DDC (Direct-to-Consumer) mastermind with nine-figure brands — this is his primary information source for e-commerce strategy. It's private and not a paid membership. Recently attended Vegas e-commerce and Amazon trade show but found the sessions \"terrible\" — said his best insights come from private conversations with peers in the mastermind rather than public sessions.</p>"
          },
          {
            "id": "kevin-thinks",
            "title": "How Kevin Thinks",
            "html": "<div class=\"card\">\n        <div class=\"card-header\">Visionary, not operational</div>\n        <p>Kevin is a classic visionary founder. He self-identifies as someone with too many ideas who struggles to filter what gets communicated to the team. His 360 feedback confirmed this — team members sometimes interpret his casual idea-sharing as directives. He knows this is a weakness and has been working to contain it, but admits it's hard.</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Self-aware and humble</div>\n        <p>Kevin openly says he doesn't know what he doesn't know. He acknowledges luck alongside skill in his success. He told you directly that he wants someone who can be \"not just a report, but a partner and even mentor in some ways.\" This is a rare level of vulnerability from a founder — he genuinely wants to learn and grow as a leader.</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Analytical and data-driven</div>\n        <p>His team's feedback is that he's analytical, good at spotting opportunities and bottlenecks. He's clearly metrics-oriented (references to market share percentages, YoY growth rates, specific financial details). He respects people who can think in numbers.</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Resourceful problem-solver</div>\n        <p>The Q4 Costco story reveals his mentality: when the warehouse was overwhelmed, he immediately thought of unconventional solutions (recruiting temp labor from Home Depot, asking warehouse workers' networks). He values creative, scrappy problem-solving over \"we can't do anything.\"</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Shifting from \"Mr. Nice Guy\" to performance-driven culture</div>\n        <p>Kevin is evolving his leadership style. Recently, he fired three people simultaneously (Chief of Staff Daniel, CX Director, and Product Manager) because the \"messenger\" model wasn't working. He said Daniel \"was just a messenger\" and he \"really hated\" that dynamic. Kevin has moved away from management by consensus to performance-based accountability.</p>\n        <p><strong>What this means for the COO role:</strong> Kevin explicitly said he does NOT want a COO where everything funnels through one person. He prefers direct reports who manage their own areas and come to him with solutions, not updates. Direct quote: \"I don't love that model. Where every single person, every one of our 70 people, goes through this one person.\" This is a critical signal — he wants you to empower the team, not be a bottleneck. Build systems and capability in direct reports so he can maintain his open-door policy without being a choke point.</p>\n      </div>"
          },
          {
            "id": "kevin-wants",
            "title": "What Kevin Is Really Looking For",
            "html": "<ul>\n        <li><span class=\"label\">A partner, not a subordinate:</span> Kevin said explicitly he wants someone 5–15 years more senior who can mentor him, not just execute his vision. This is unusually mature for a founder his age.</li>\n        <li><span class=\"label\">Player-coach mentality:</span> He values people who can roll up their sleeves. He said he tries \"not to put too many layers between me and the team\" and is \"always afraid of adding too many layers.\" He's also acknowledged that wrong hires have cost him \"so much time and money.\"</li>\n        <li><span class=\"label\">\"Effective over being liked\":</span> This came from his 360 feedback. He respects directness and doesn't want someone who manages by consensus. He wants someone who will make the hard calls.</li>\n        <li><span class=\"label\">Proactive strategic thinking:</span> The single biggest gap with Brandon (his current ops director) is initiative. Kevin wants someone who identifies problems and solutions before he has to ask.</li>\n        <li><span class=\"label\">Cultural fit:</span> He uses Culture Index. He values EOS. He wants someone who can operate in a flat, fast-moving organization without needing a lot of structure around them.</li>\n      </ul>"
          },
          {
            "id": "kevin-style",
            "title": "Communication Style",
            "html": "<ul>\n        <li><span class=\"label\">Conversational and open:</span> Kevin speaks freely, shares vulnerabilities, uses informal language. He'll tell you about his weaknesses before you ask.</li>\n        <li><span class=\"label\">Tangential but insightful:</span> He jumps between topics but always circles back with a relevant point. Follow his threads — they usually land somewhere important.</li>\n        <li><span class=\"label\">Tests with stories:</span> He uses anecdotes (the Q4 crisis, the Brandon assessment) as implicit tests. When he tells you about a problem, he's watching how you react and what solutions you offer.</li>\n        <li><span class=\"label\">Speaks some Mandarin:</span> Conversationally fluent (\"Tinglish\"), not business-fluent. He mentioned the new Head of PD being a native Chinese speaker has been a huge help.</li>\n      </ul>"
          },
          {
            "id": "kevin-origin",
            "title": "Kevin's Origin Story & Company History",
            "html": "<p>Kevin Chen co-founded iRESTORE with his father, who had previously run Freedom Laser Therapy — a clinic using laser therapy to treat nicotine addiction. When Kevin's father experienced hair loss and tried clinical laser therapy (expensive at $1000s, inconvenient with 3x/week visits), they saw the opportunity: bring clinical-grade laser therapy to home use.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">Key Milestones</div>\n  <table>\n    <tr><th>Timeline</th><th>Milestone</th></tr>\n    <tr><td>Early 2010s</td><td>Identified home-use laser hair therapy opportunity</td></tr>\n    <tr><td>~2013–2015</td><td>3 years of R&D + FDA clearance process (multiple prototypes, back-and-forth with FDA)</td></tr>\n    <tr><td>Jan 2016</td><td>Launched on Amazon — got first sale and was \"ecstatic\"</td></tr>\n    <tr><td>Mid 2016</td><td>Set up Shopify DTC store, started Facebook ads</td></tr>\n    <tr><td>2016–2020</td><td>Grew through Amazon dominance + DTC paid social</td></tr>\n    <tr><td>~2022</td><td>Costco.com launch — went from 0% to 15% of revenue \"almost overnight\"</td></tr>\n    <tr><td>~2023</td><td>Major rebrand: from \"techy device company\" to emotional beauty brand</td></tr>\n    <tr><td>~2024</td><td>LED face masks launched (skincare expansion)</td></tr>\n    <tr><td>2025–2026</td><td>~80 employees globally, \"hundreds of millions\" in cumulative product sales (per Money Talks host, uncorrected by Kevin), 65–80% YoY growth, hiring COO</td></tr>\n  </table>\n</div>\n\n<div class=\"answer-block\">\n  <strong>Kevin on founding:</strong> \"I felt like I was always born into entrepreneurship — my dad had always been in business his entire life.\" He just graduated college and \"didn't know what he wanted to do\" when his father invited him to join. The hair therapy idea came from personal experience, not market analysis.\n</div>\n\n<div class=\"tip\"><strong>Interview angle:</strong> Kevin values the long game. He spent 3 years on R&D before selling a single unit. Reference this patience when discussing your approach to building operations infrastructure.</div>"
          },
          {
            "id": "kevin-leadership",
            "title": "Kevin's Leadership Philosophy",
            "html": "<p>Kevin has evolved from doing-everything founder to strategic leader, and he's candid about the growing pains involved. His leadership philosophy synthesized from 4 podcast interviews and your direct conversation:</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">The Evolution of Kevin's Role</div>\n  <p><strong>Early stage:</strong> \"Your job as the CEO is everything — you're the customer service, you're the marketing person, you're the product guy, you're everyone.\"</p>\n  <p><strong>Current stage:</strong> \"As you grow the team, your highest leverage thing no longer becomes [driving sales] and it becomes people — becomes managing people, becomes leading people, and more importantly hiring the best people you can find out there for the job.\"</p>\n  <p><strong>Where he wants to be:</strong> Focused on innovation, strategic business development, and vision. Wants the COO to own execution and day-to-day operations.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Kevin's 360° Profile (From Direct Conversation)</div>\n  <table>\n    <tr><th>Strengths</th><th>Growth Areas</th></tr>\n    <tr><td>Growing the business (driving results)</td><td>Too many ideas — can overwhelm the organization</td></tr>\n    <tr><td>Marketing & sales acumen</td><td>Micromanaging on things he personally cares about</td></tr>\n    <tr><td>Analytical mindset</td><td>Needs to delegate more effectively</td></tr>\n    <tr><td>Strong network</td><td>Learning to be \"effective over liked\"</td></tr>\n  </table>\n</div>\n\n<h3>Hard-Won Lessons</h3>\n\n<div class=\"answer-block\">\n  <strong>On hiring mistakes:</strong> \"The wrong hire costs you so much time and money — I learned it the hard way unfortunately. I think we all do. It's one of those things you have to go through yourself to learn.\"\n</div>\n\n<div class=\"answer-block\">\n  <strong>On delegation:</strong> \"I felt like I had to do everything myself... which is absolutely not true. You need to hire people, you need to delegate, and you need to fire people [who] don't work out. I wish someone told me that earlier.\"\n</div>\n\n<div class=\"answer-block\">\n  <strong>On firing:</strong> He's recently exited \"many directors and up\" over the past 6–8 months. Had to learn to be \"effective over being liked.\" This is a major maturation point — he's now willing to make tough calls.\n</div>\n\n<div class=\"answer-block\">\n  <strong>On deep work:</strong> \"I try to have an open door policy where people can come in and ask me any questions, but oftentimes at the expense of productivity. Since we've moved to this system... we now have to request meetings. You have to say 'this is what the meeting's for' and estimate the time.\"\n</div>"
          },
          {
            "id": "kevin-scaling",
            "title": "Kevin's Scaling & Hiring Philosophy",
            "html": "<p>Kevin has a sophisticated, experience-tested framework for how to build and scale a team. This came through most clearly in his Money Talks interview and is directly relevant to the COO role.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">\"Fire Yourself Every Year\"</div>\n  <p>Kevin shared a framework from a friend that he's adopted: <em>\"Basically I just fire myself every year. Whatever he does, he reviews it and he's like — okay, I hire someone for that role. What I did last year, next year — what did I do? And then that kind of compounds.\"</em></p>\n  <p>This is how Kevin has progressively moved from doing everything → delegating CS/ops → delegating growth marketing → now focusing almost exclusively on product R&D and recruiting. The COO role is the next major \"fire yourself\" move.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Value Creation vs. Value Protection</div>\n  <p>Kevin categorizes all roles into two buckets:</p>\n  <ul>\n    <li><strong>Value creation:</strong> Product innovation, growth marketing — roles that drive growth</li>\n    <li><strong>Value protection:</strong> Operations, logistics, customer service — roles that \"keep the wheels on the car\"</li>\n  </ul>\n  <p>His delegation strategy: <em>\"You want to hold on for as long as you can to the value-driving things while doing a minimal set of value protection type of tasks. And then delegate that way.\"</em> He delegates value protection first, holds value creation as long as possible, then hires executives when scale demands it.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Pay the Premium — But Only for High-Leverage Roles</div>\n  <p>Kevin endorses the \"10x engineer\" concept but with an important caveat about role leverage:</p>\n  <div class=\"answer-block\">\n    \"It comes down to whether that role has enough leverage to become 10x. Taking a simple example of a warehouse worker — the best warehouse worker is maybe 50% faster than an average warehouse worker. So you don't want to overpay there. But then take the growth marketer — especially today with AI — they can probably 20x the next person... So I want to make sure to think through how much leverage the role has.\" <span class=\"muted\">— Money Talks</span>\n  </div>\n  <p><strong>Why this matters for you:</strong> The COO/Integrator role is the ultimate high-leverage position at iRESTORE right now. Kevin understands this — he's not looking for a bargain hire. Frame your compensation expectations around the leverage you'll create.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Hire People Better Than You</div>\n  <div class=\"answer-block\">\n    \"At a certain scale, you really have to hire the people that have been there, done that, and are better than you so you can truly let go. I've brought on people where I felt like I was better than them at their job. And what that meant was I was always hovering over their shoulders, looking over everything. It's not empowering. It's not good for them.\" <span class=\"muted\">— Money Talks</span>\n  </div>\n  <p>Kevin has explicitly learned this lesson the hard way. He wants a COO who is clearly more experienced in operations than he is — someone he can trust completely.</p>\n</div>\n\n<h3>Kevin's Executive Coaching Investment</h3>\n\n<div class=\"answer-block\">\n  <strong>On paying for knowledge:</strong> \"Paying for knowledge at a certain scale is one of the most impactful things and highest leverage things you can do. We go back to the same framework — if my time is worth $1,000 an hour and I'm paying a coach $5,000 a month, well, if they can help me make one really good decision that leads to a six-figure outcome, it would be foolish not to pay for that.\" <span class=\"muted\">— Money Talks</span>\n</div>\n\n<p>Kevin currently works with an executive coach who has P&G and beauty industry experience. This coach helped him understand retail channel strategy (the Costco SKU lesson that \"would have saved six figures\"). Kevin values <em>been-there-done-that</em> expertise — not theoretical advice. Your 15+ years of operational experience is exactly this kind of GPS-navigation for him.</p>\n\n<div class=\"tip\"><strong>Interview angle:</strong> Kevin's scaling philosophy perfectly describes the COO hire. He's delegated value protection (ops) to Brandon, but now needs someone who can do both — protect value AND create it through systems, process, and strategic operations. Position yourself as the person who lets him fully \"fire himself\" from operational thinking.</div>"
          },
          {
            "id": "kevin-coo-needs",
            "title": "What Kevin Wants in a COO",
            "html": "<p>Synthesized from Kevin's direct statements in your interview plus signals from 4 podcast appearances:</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">The COO Kevin Needs (vs. What He Has Now)</div>\n  <table>\n    <tr><th>What He Has (Brandon)</th><th>What He Wants (You)</th></tr>\n    <tr><td>\"If you tell him 'figure this out,' he'll figure it out\"</td><td>Anticipates problems and proposes solutions <strong>before</strong> they become crises</td></tr>\n    <tr><td>Reliable executor, detail-oriented</td><td>Strategic thinker who also executes</td></tr>\n    <tr><td>\"Boxed in\" thinking — said \"we can't do anything\" at warehouse capacity</td><td>Creative problem-solver who finds a way (Home Depot day laborers, 3PL, etc.)</td></tr>\n    <tr><td>Needs direction on priorities</td><td>Can run operations without constant oversight</td></tr>\n    <tr><td>Good at maintaining existing systems</td><td>Builds new systems for scale</td></tr>\n  </table>\n</div>\n\n<h3>Kevin's \"Big Lever\" Mentality</h3>\n\n<p>This is Kevin's most defining strategic trait. He doesn't want a COO who optimizes split tests all day — he wants someone who finds the next Costco deal.</p>\n\n<div class=\"answer-block\">\n  <strong>Kevin on strategic vs. tactical:</strong> \"A big lesson I've learned... is that we really want to think about ourselves as a business, not just an e-commerce business or just a growth marketing business. There's so much more levers, such as offline channels, such as retailers... Costco was about 15% of our sales last year, and that's coming from nowhere. That took a few emails and a few phone calls. So it's really a big lesson on pulling strategic levers so I can really drive that impact versus just tactical growth hack stuff all day.\"\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">What Frustrates Kevin</div>\n  <ul>\n    <li><strong>Lack of strategic thinking</strong> — people who report problems instead of proposing solutions</li>\n    <li><strong>Needing constant direction</strong> — he wants to point someone at a problem and trust them to solve it</li>\n    <li><strong>Over-focus on small optimizations</strong> — instead of big levers that move the needle</li>\n    <li><strong>Giving up when facing obstacles</strong> — Brandon's \"we can't do anything\" response to warehouse capacity was a breaking point</li>\n    <li><strong>Too many ideas overwhelming the org</strong> — he's self-aware about this and wants a COO who can say \"no\" and manage scope</li>\n  </ul>\n</div>\n\n<div class=\"tip\"><strong>Your play:</strong> In the interview, demonstrate strategic thinking: \"Here's what I'd prioritize in the first 90 days, and here's why — these are the big levers that would have the most impact on the business.\" Show you can be the filter for his ideas.</div>"
          },

            "id": "kevin-strategy",
            "title": "Kevin's Business Strategy",
            "html": "<h3>Revenue Channels & Growth Playbook</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">Channel Evolution</div>\n  <table>\n    <tr><th>Channel</th><th>How It Started</th><th>Current State</th></tr>\n    <tr><td><strong>Amazon</strong></td><td>First channel (Jan 2016). Kevin \"didn't know anything about Amazon, literally just listed.\" PPC, reviews, standard playbook.</td><td>60–70% market share in red light hair therapy category. Mature but still major revenue driver.</td></tr>\n    <tr><td><strong>DTC (Shopify)</strong></td><td>Launched ~6 months after Amazon. Facebook ads with \"one video we ran repeatedly at every part of the funnel.\"</td><td>Sophisticated funnel with email flows, quiz segmentation, influencer whitelisting, YouTube retargeting.</td></tr>\n    <tr><td><strong>Costco</strong></td><td>\"A few emails and a few phone calls.\" Zero to 15% of revenue.</td><td>Homepage features, mailer promos, in-store presence. Kevin's clearest example of \"big lever\" thinking.</td></tr>\n    <tr><td><strong>B2B</strong></td><td>Just launched. Medspas, clinics, hair salons. Higher-priced machines (~$10K).</td><td>Net new channel. Sourcing equipment through Shenzhen network.</td></tr>\n  </table>\n</div>\n\n<h3>Product Moat Philosophy</h3>\n\n<div class=\"answer-block\">\n  <strong>Kevin on competitive moats:</strong> \"Sometimes it's worth it to do the really difficult things because it does create that edge for you. Once you get through that hurdle, it's a barrier to entry, it's something that's difficult for others to copy.\"\n</div>\n\n<p>Kevin's moat stack: FDA clearance (3-year process) + clinical study + 60-70% Amazon market share + Costco trust stamp + family-owned manufacturing (net-150 terms). This is not easy to replicate.</p>\n\n<h3>Paid Marketing Evolution</h3>\n<ul>\n  <li><strong>Meta (Facebook/Instagram):</strong> Was lion's share of spend; declining returns since iOS 14.5</li>\n  <li><strong>YouTube:</strong> Major growth channel — sponsor influencers, turn their videos into retargeting ads, whitelisting across Facebook</li>\n  <li><strong>Google Search:</strong> Intent-based but low volume; competing with hims/keeps on larger budgets</li>\n  <li><strong>TikTok:</strong> Limited due to medical device advertising restrictions</li>\n  <li><strong>Shorts/Reels:</strong> Cheap CPCs but poor conversion (still experimental)</li>\n</ul>\n\n<h3>Future Expansion Roadmap</h3>\n<div class=\"card\">\n  <div class=\"card-header\">What's Coming</div>\n  <ul>\n    <li><strong>Skincare:</strong> TAM is 20x hair therapy. LED face masks already launched. Skincare wand with 5 modalities (microcurrent, EMS, electroporation, supersonic, deep infrared) at sub-$200 for retail.</li>\n    <li><strong>Body panels:</strong> Red light therapy panels. Plan to be #1 in category within 1 year.</li>\n    <li><strong>International:</strong> Currently North America focused. Global expansion is a top priority.</li>\n    <li><strong>Consumables:</strong> Shampoo, serum, conditioner, supplements. Recurring revenue play.</li>\n  </ul>\n</div>\n\n<div class=\"answer-block\">\n  <strong>Kevin's 5-year vision:</strong> \"Tomorrow in the next five years, we want to be much more than [a hair growth device company]... We want to be your one-stop shop for all things beauty. We want to be a part of your day and your routine, and most importantly, still offer that great user experience — no side effects.\"\n</div>"
          },
          {
            "id": "kevin-personal",
            "title": "Kevin's Personality & Values",
            "html": "<h3>Core Values & Decision-Making</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">Kevin's Personal Compass</div>\n  <table>\n    <tr><th>Value</th><th>Evidence</th></tr>\n    <tr><td><strong>Product integrity</strong></td><td>\"Would I want my parents to use this? That's my gauge for it.\" Safety and ethics over aggressive growth.</td></tr>\n    <tr><td><strong>Customer impact</strong></td><td>Cried at a testimonial shoot when customers held his hand and thanked him for their results. This is what drives him.</td></tr>\n    <tr><td><strong>Continuous evolution</strong></td><td>\"The entrepreneurial journey is about growth — for yourself and for the business.\"</td></tr>\n    <tr><td><strong>Strategic patience</strong></td><td>3 years of R&D before first sale. Invested in hard things upfront for long-term moat.</td></tr>\n    <tr><td><strong>Data-driven action</strong></td><td>Uses Toggle for time tracking, DISC profiles for hiring, A/B tests for marketing, reads \"almost every single review.\"</td></tr>\n    <tr><td><strong>Bias toward action</strong></td><td>\"Just test quickly and test cheaply\" — doesn't overthink, validates fast.</td></tr>\n  </table>\n</div>\n\n<h3>Productivity & Work Style</h3>\n<p>Kevin is self-described as \"a little bit nerdy about productivity.\" His toolkit:</p>\n<ul>\n  <li><strong>Evernote:</strong> \"Superpower\" second brain for notes</li>\n  <li><strong>Google Calendar:</strong> Essential for time blocking</li>\n  <li><strong>ClickUp/Asana:</strong> Project management</li>\n  <li><strong>Toggle:</strong> Time tracking — audits his time weekly</li>\n  <li><strong>Meditation + gym:</strong> Mental and physical fitness as non-negotiable</li>\n  <li><strong>Meeting request system:</strong> Requires agenda and time estimate — filters for deep work blocks</li>\n</ul>\n\n<h3>Kevin on Imposter Syndrome</h3>\n<div class=\"answer-block\">\n  \"Everybody has imposter syndrome no matter how successful we get... There's always someone bigger than you. That will never change. And knowing that is actually kind of comforting in a way because it means that you're doing okay.\"\n</div>\n\n<div class=\"tip\"><strong>Rapport builder:</strong> Kevin is introspective and values self-awareness. He'll respect a COO candidate who's honest about their own growth areas — not someone who pretends to have all the answers. Be genuine about what you're still working on.</div>"

            "id": "kevin-trust",
            "title": "Trust-Building & Customer Philosophy",
            "html": "<p>Kevin views trust-building as the core competitive advantage, especially in a market where customers are \"used to seeing stink oil products\" and \"afraid of getting scammed.\"</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">Kevin's Trust-Building Playbook</div>\n  <table>\n    <tr><th>Mechanism</th><th>Detail</th></tr>\n    <tr><td><strong>FDA clearance</strong></td><td>Clinical designation creates instant credibility over supplements/topicals</td></tr>\n    <tr><td><strong>Social proof</strong></td><td>Authentic before/after photos, influencer videos with real usage, top Amazon reviews</td></tr>\n    <tr><td><strong>Costco stamp</strong></td><td>\"The stamp of trust that builds with someone being in Costco\" — trust you can't buy</td></tr>\n    <tr><td><strong>Money-back guarantee</strong></td><td>Risk reversal prominently featured</td></tr>\n    <tr><td><strong>Personal photo evaluation</strong></td><td>Real humans (not automation) evaluate submitted hair loss photos</td></tr>\n    <tr><td><strong>Education-first funnel</strong></td><td>Brand → Product → Clinical proof → Doctor endorsements → Social proof → Then selling</td></tr>\n  </table>\n</div>\n\n<div class=\"answer-block\">\n  <strong>The moment Kevin knew it was working:</strong> \"When we had a testimonial shoot and real people came in... people were crying about the results, holding my hand and thanking me. It was really inspiring.\"\n</div>\n\n<div class=\"answer-block\">\n  <strong>On the market's skepticism:</strong> \"People really have a bad taste around these kind of products. I think it's kind of like weight loss where you're not sure if it's going to do what it does, you're afraid of getting scammed.\"\n</div>"

            "id": "kevin-quotes",
            "title": "Key Quotes Reference",
            "html": "<p>Curated quotes from Kevin organized by theme — useful for referencing in your interview to show you've done your homework.</p>\n\n<h3>On Strategic Thinking</h3>\n<div class=\"answer-block\">\"We really want to think about ourselves as a business, not just an e-commerce business or just a growth marketing business. There's so much more levers.\" <span class=\"muted\">— DTC Podcast</span></div>\n\n<div class=\"answer-block\">\"Pulling strategic levers so I can really drive that impact versus just tactical growth hack stuff all day.\" <span class=\"muted\">— DTC Podcast</span></div>\n\n<h3>On People & Hiring</h3>\n<div class=\"answer-block\">\"Once you hire great people, a lot of times they'll kind of run themselves and manage themselves. But really, hiring is the biggest challenge.\" <span class=\"muted\">— Business Rockstars</span></div>\n\n<div class=\"answer-block\">\"Build out your hiring funnel — make it very strong, make it repel the people that don't fit.\" <span class=\"muted\">— Business Rockstars</span></div>\n\n<div class=\"answer-block\">\"Your highest leverage thing... becomes people — becomes managing people, becomes leading people, and more importantly, hiring the best people you can find.\" <span class=\"muted\">— Business Rockstars</span></div>\n\n<div class=\"answer-block\">\"At a certain scale, you really have to hire the people that have been there, done that, and are better than you so you can truly let go.\" <span class=\"muted\">— Money Talks</span></div>\n\n<div class=\"answer-block\">\"I've brought on people where I felt like I was better than them at their job. And what that meant was I was always hovering over their shoulders... It's not empowering.\" <span class=\"muted\">— Money Talks</span></div>\n\n<div class=\"answer-block\">\"B players are actually kind of the worst — they're not an A player, but they're not a C player either. So you kind of keep them around... but they are an opportunity cost to the A players being in that role.\" <span class=\"muted\">— Money Talks</span></div>\n\n<h3>On Product & Trust</h3>\n<div class=\"answer-block\">\"Sometimes it's worth it to do the really difficult things because it does create that edge for you. Once you get through that hurdle, it's a barrier to entry.\" <span class=\"muted\">— Business Rockstars</span></div>\n\n<div class=\"answer-block\">\"Would I want my parents to use this? That's my gauge for it.\" <span class=\"muted\">— Business Rockstars</span></div>\n\n<h3>On Growth & Self-Awareness</h3>\n<div class=\"answer-block\">\"The entrepreneurial journey is about growth — for yourself and for the business.\" <span class=\"muted\">— Business Rockstars</span></div>\n\n<div class=\"answer-block\">\"You're always going to feel insecure. You're always going to feel like you can't do it. And maybe you won't, but maybe you will. And the only way to find out is to try.\" <span class=\"muted\">— Business Rockstars</span></div>\n\n<h3>On Delegation & Scaling</h3>\n<div class=\"answer-block\">\"I felt like I had to do everything myself... which is absolutely not true. You need to hire people, you need to delegate, and you need to fire people [who] don't work out.\" <span class=\"muted\">— Business Rockstars</span></div>\n\n<div class=\"answer-block\">\"He's good if you tell him 'figure this out,' but I wish he came up with solutions before Q4.\" <span class=\"muted\">— Re: current Director of Ops, from your call with Kevin</span></div>\n\n<div class=\"answer-block\">\"Basically I just fire myself every year. Whatever I did last year, I hire someone for that role. And then that kind of compounds.\" <span class=\"muted\">— Money Talks (framework from a friend)</span></div>\n\n<div class=\"answer-block\">\"There's value creation and value protection. You want to hold on for as long as you can to the value-driving things while doing a minimal set of value protection type of tasks.\" <span class=\"muted\">— Money Talks</span></div>\n\n<h3>On Paying for Talent & Knowledge</h3>\n<div class=\"answer-block\">\"It comes down to whether that role has enough leverage to become 10x. The best warehouse worker is maybe 50% faster. But a growth marketer can probably 20x the next person. Think through how much leverage the role has.\" <span class=\"muted\">— Money Talks</span></div>\n\n<div class=\"answer-block\">\"Paying for knowledge at a certain scale is one of the most impactful things and highest leverage things you can do.\" <span class=\"muted\">— Money Talks</span></div>\n\n<div class=\"answer-block\">\"I'm running the biggest company I've ever run every single day. So someone that's been there, done that, someone that's run a $100M, $500M business — so much learnings I can just borrow from. To me, it's a no-brainer.\" <span class=\"muted\">— Money Talks</span></div>\n\n<h3>On the Rebrand & Vision</h3>\n<div class=\"answer-block\">\"Our mission is to help people restore confidence and build a community of support... The vision we have is not just a device company. It's one that connects with people on an emotional level and speaks to the issue around hair loss and insecurities and frustrations emotionally.\" <span class=\"muted\">— DTC Podcast</span></div>"

            "title": "Interview Playbook: Using This Intel",
            "html": "<div class=\"card\">\n  <div class=\"card-header\">How to Show Kevin You \"Get It\"</div>\n  <table>\n    <tr><th>Kevin Cares About</th><th>What You Should Say / Show</th></tr>\n    <tr><td>Big-lever strategic thinking</td><td>\"Here's what I'd prioritize in the first 90 days — and here's why these are the highest-impact moves.\"</td></tr>\n    <tr><td>Proactive problem-solving</td><td>Reference the Q4 warehouse crisis: \"I'd have contingency plans in place before peak seasons.\"</td></tr>\n    <tr><td>Product quality as moat</td><td>\"Your FDA clearance and clinical data aren't just regulatory checkboxes — they're your competitive advantage. I'd protect that.\"</td></tr>\n    <tr><td>Evolving from execution to strategy</td><td>\"My job is to own execution so you can focus on innovation and business development.\"</td></tr>\n    <tr><td>Data + action (not analysis paralysis)</td><td>\"I believe in testing quickly and cheaply — validating with data, then scaling what works.\"</td></tr>\n    <tr><td>Honest self-awareness</td><td>Be genuine about your growth areas. Kevin respects vulnerability and self-improvement.</td></tr>\n    <tr><td>Saying \"no\" to manage scope</td><td>\"Part of my role as Integrator is helping prioritize — not every great idea should ship this quarter.\"</td></tr>\n    <tr><td>Been-there-done-that experience</td><td>\"I've scaled operations through similar growth phases — you won't need to hover over my shoulder because I've navigated this before.\" (Directly addresses his stated pain point.)</td></tr>\n    <tr><td>Letting him \"fire himself\" from ops</td><td>\"My goal is to let you fully focus on product R&D and vision — the value creation only you can do — while I own everything operational.\"</td></tr>\n  </table>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Questions That Show Deep Research</div>\n  <ul>\n    <li>\"You've talked about moving from being a device company to a beauty brand — how far along is that rebrand, and what's the next phase?\"</li>\n    <li>\"The Costco partnership was a massive lever. What other retail or distribution opportunities are you exploring?\"</li>\n    <li>\"You mentioned wanting to be a global brand — which international markets are you most excited about, and what's blocking you?\"</li>\n    <li>\"How do you think about the body panel category? Is the goal to dominate like you did with hair devices?\"</li>\n    <li>\"You've talked about the evolution from doing to managing — what specifically would you want to hand off to a COO in the first 30 days?\"</li>\n    <li>\"What did you learn from the recent leadership transitions that should inform how we build the team going forward?\"</li>\n  </ul>\n</div>\n\n<div class=\"tip\"><strong>Tone guidance:</strong> Kevin respects confident but not arrogant. He values people who listen, ask smart questions, and show they've done their homework. Don't try to impress him with buzzwords — show you understand his specific business and its specific challenges.</div>"

            "title": "All Podcast Summaries",
            "html": "<p class=\"muted\">4 podcast interviews analyzed (2020–2025). All key takeaways consolidated below with interview angles for each insight.</p>\n\n<h3>🎙️ Business Rock Stars (~2021)</h3>\n\n<p class=\"muted\">Host: Brittany Whitney | <a href=\"https://www.youtube.com/watch?v=onLhzbvPTUo\" target=\"_blank\">Watch on YouTube →</a></p>\n\n<div class=\"card\">\n  <div class=\"card-header\">Key Takeaways for Your Interview</div>\n  <table>\n    <tr><th>Topic</th><th>Insight</th><th>Your Angle</th></tr>\n    <tr><td><strong>Origin story</strong></td><td>Kevin's father ran Freedom Laser Therapy (smoking cessation). When he experienced hair loss, they pivoted to home-use laser hair therapy. Kevin joined right out of college — \"didn't know what he wanted to do.\"</td><td>Kevin values the long game. He spent 3 years on R&D before selling a single unit. Reference this patience when discussing infrastructure investment.</td></tr>\n    <tr><td><strong>FDA clearance as moat</strong></td><td>The FDA 510(k) process took ~3 years with multiple rounds of back-and-forth. Kevin sees this as a deliberate competitive advantage: \"sometimes it's worth it to do the really difficult things because it creates that edge.\"</td><td>Show you understand moat-building through operational rigor — not just marketing.</td></tr>\n    <tr><td><strong>Team at ~40 people</strong></td><td>At time of recording, team was ~40. Kevin was still hands-on in most areas. His biggest challenge: \"hiring is the biggest challenge\" and wrong hires cost \"so much time and money.\"</td><td>Demonstrate your hiring playbook — structured process, culture-fit screening, fast performance evaluation.</td></tr>\n    <tr><td><strong>COVID pivot</strong></td><td>Moved to hybrid remote (Slack, Zoom, Loom). E-commerce benefited from lockdowns. Proved remote work could work for the company.</td><td>You have experience managing distributed teams through crises. This resonates with Kevin's experience.</td></tr>\n    <tr><td><strong>5-year vision</strong></td><td>\"We want to be much more than a hair growth device company... your one-stop shop for all things beauty.\" Targets: Sephora, Target, Costco, international expansion, anti-aging.</td><td>This vision requires operational infrastructure you can build — retail ops, international supply chain, multi-category inventory management.</td></tr>\n    <tr><td><strong>Delegation struggle</strong></td><td>\"I felt like I had to do everything myself... which is absolutely not true. You need to hire people, delegate, and fire people who don't work out.\"</td><td>This is exactly why he's hiring a COO. Position yourself as the person who lets him stop doing everything.</td></tr>\n  </table>\n</div>\n\n<div class=\"answer-block\">\n  <strong>Notable quote:</strong> \"Your highest leverage thing no longer becomes [driving sales] and it becomes people — becomes managing people, becomes leading people, and more importantly hiring the best people you can find out there for the job.\" <span class=\"muted\">— Kevin, Business Rock Stars</span>\n</div>\n\n<h3>🎙️ D2C Podcast (~2023)</h3>\n\n<p class=\"muted\">Host: Eric Dick | <a href=\"https://www.youtube.com/watch?v=_Ej1UMdUGtI\" target=\"_blank\">Watch on YouTube →</a></p>\n\n<div class=\"card\">\n  <div class=\"card-header\">Key Takeaways for Your Interview</div>\n  <table>\n    <tr><th>Topic</th><th>Insight</th><th>Your Angle</th></tr>\n    <tr><td><strong>Costco = 15% of revenue</strong></td><td>\"That took a few emails and a few phone calls.\" Kevin's clearest example of \"big lever\" thinking vs. tactical growth hacking. Costco.com → mailers → in-store presence.</td><td>Kevin values strategic moves that produce outsized returns with minimal effort. Frame your operational improvements the same way — \"Here's a system that will save 3 margin points without hiring anyone.\"</td></tr>\n    <tr><td><strong>Influencer whitelisting strategy</strong></td><td>YouTube influencers → repurpose their content as retargeting ads → whitelist across Facebook/Instagram. This is their primary paid acquisition engine.</td><td>Shows sophistication in marketing ops. Your role: ensure the ops infrastructure (attribution, analytics, content pipeline) supports this engine at scale.</td></tr>\n    <tr><td><strong>TikTok restrictions</strong></td><td>Medical device advertising restricted on TikTok. Limits a major growth channel. Short-form video (Shorts, Reels) experimental with cheap CPCs but poor conversion.</td><td>Regulatory constraints create ops complexity. You can help navigate this with compliant content strategies and channel diversification.</td></tr>\n    <tr><td><strong>Major rebrand underway</strong></td><td>New logo, website, product line expansion into consumables (shampoo, serum, conditioner, supplements). Vision: \"emotional brand, not just device company.\"</td><td>Rebrands are massive operational undertakings. If this is still in progress, offer to project-manage the execution — coordinating design, web, packaging, inventory transition.</td></tr>\n    <tr><td><strong>50/50 gender split</strong></td><td>Customer base is approximately 50% men, 50% women. Company already markets to both.</td><td>Unisex positioning doubles TAM. Operational implication: inventory planning, marketing creative, and customer service all need to serve both audiences.</td></tr>\n    <tr><td><strong>AI interest</strong></td><td>Kevin mentioned wanting customers to upload a photo and see \"what they'd look like with hair.\" Also used brandmark.io for AI logo generation.</td><td>Shows Kevin is open to AI tools. If you have experience implementing AI-powered customer experiences, this is a strong resonance point.</td></tr>\n    <tr><td><strong>$50K marketing budget allocation</strong></td><td>If given $50K: Shopify theme ($5-10K), landing pages, 3D product animations ($10K), rest in influencers/UGC/ads.</td><td>Kevin is capital-efficient. He respects scrappy resourcefulness. Frame your operational improvements as high-ROI, low-cost investments.</td></tr>\n  </table>\n</div>\n\n<div class=\"answer-block\">\n  <strong>Notable quote:</strong> \"We really want to think about ourselves as a business, not just an e-commerce business or just a growth marketing business. There's so much more levers, such as offline channels, such as retailers.\" <span class=\"muted\">— Kevin, D2C Podcast</span>\n</div>\n\n<h3>🎙️ Money Talks (~2025, Most Recent)</h3>\n\n<p class=\"muted\">Host: Jesse | <a href=\"https://www.youtube.com/watch?v=Vp0qQw4UiQc\" target=\"_blank\">Watch on YouTube →</a></p>\n\n<div class=\"tip\"><strong>This is the most important podcast for interview prep.</strong> It's the most recent (~2025) and reveals Kevin's current thinking on hiring, scaling, and exit.</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Key Takeaways for Your Interview</div>\n  <table>\n    <tr><th>Topic</th><th>Insight</th><th>Your Angle</th></tr>\n    <tr><td><strong>Company scale</strong></td><td>~80 employees. Mid-eight figures revenue growing beyond. \"Hundreds of millions\" in cumulative product sales. Products $500–$2,000 range.</td><td>This is the scale where operational infrastructure becomes the bottleneck. Process, systems, and people management are the levers — exactly your wheelhouse.</td></tr>\n    <tr><td><strong>ABCD trust framework</strong></td><td><strong>A</strong>uthentic reviews, <strong>B</strong>efore/afters, <strong>C</strong>linical studies, <strong>D</strong>octors/dermatologists. 43% average hair improvement in 4-month double-blind study.</td><td>This framework is the operational backbone of their marketing. Ensure each element has robust systems behind it — review collection, photo verification, study management, doctor partnerships.</td></tr>\n    <tr><td><strong>Face mask launch</strong></td><td>Launched ~6 months ago. Originated from customer surveys — 25% of open-field responses asked for LED face mask. Kevin: \"The customers told us exactly what they wanted.\"</td><td>Shows Kevin's data-driven product development. Reference this as an example of the kind of customer feedback loop you'd systematize at scale.</td></tr>\n    <tr><td><strong>Head of growth = game changer</strong></td><td>Hiring a head of growth marketing was Kevin's single most impactful hire. It freed him to think strategically instead of managing campaigns daily.</td><td>This is exactly the outcome Kevin wants from the COO hire — but for the entire operations side of the business. Mirror this story: \"Just like your head of growth freed you from marketing, I'll free you from operations.\"</td></tr>\n    <tr><td><strong>Value creation vs. value protection</strong></td><td>Kevin categorizes roles into two buckets. \"Hold on to value-driving things as long as you can. Delegate value protection first.\"</td><td>Position yourself as someone who does both — protects value through systems AND creates value through margin improvement, international expansion, and exit readiness.</td></tr>\n    <tr><td><strong>A/B/C player framework</strong></td><td>\"B players are the worst — they're not bad enough to fire but they're an opportunity cost to the A players.\" Recently exited \"many directors and up.\"</td><td>You're an A player who identifies and addresses B-player problems quickly. Share a specific example of upgrading a team by making tough calls.</td></tr>\n    <tr><td><strong>Business coach (P&G background)</strong></td><td>Coach taught Kevin channel pricing strategy (Costco SMU/special skew) that \"saved six figures.\" Kevin believes in paying for expertise.</td><td>Kevin already values paying a premium for been-there-done-that experience. Your salary ask isn't a cost — it's a $1,000/hr investment in someone who's navigated exactly this growth phase before.</td></tr>\n    <tr><td><strong>$1,000/hr framework</strong></td><td>Kevin calculates his effective hourly rate (EBITDA ÷ hours worked) and uses it as a filter: \"If it's below $1,000/hr, I need someone else to do it.\"</td><td>Frame your impact in these terms: \"If my operational improvements drive 3 margin points on $120M, that's $3.6M in annual EBITDA. At a 2,000-hour year, that's $1,800/hr of value I'm creating.\"</td></tr>\n    <tr><td><strong>Thinking time framework</strong></td><td>Kevin blocks Fridays as creative/thinking day — no meetings. Uses structured prompts for strategic thinking sessions.</td><td>Show you respect deep work. Offer to protect Kevin's thinking time by being the operational firewall that handles the day-to-day without needing his input.</td></tr>\n    <tr><td><strong>Critical early DTC decision</strong></td><td>Early on, turned down a mid-5-figure wholesale distributor to stay DTC. Competitor who went Groupon/wholesale route is no longer around.</td><td>Kevin values strategic discipline — saying no to easy revenue that dilutes brand value. Show you have the same long-term thinking.</td></tr>\n    <tr><td><strong>Exit considerations</strong></td><td>\"Most of my value is tied up in equity.\" Inventory-heavy, reinvesting everything. Not ruling out exit but focused on growth. Mobile app in development.</td><td>You're the person who prepares the business for exit — clean financials, documented processes, scalable systems, strong management team. This is your core value proposition.</td></tr>\n    <tr><td><strong>\"Two rungs up the ladder\"</strong></td><td>Kevin references Alex Hormozi's concept: network with people 2 levels ahead, not 10. More actionable advice, relevant context.</td><td>You ARE Kevin's \"two rungs up\" — someone who's already run operations at the scale he's growing into. Frame yourself this way.</td></tr>\n  </table>\n</div>\n\n<div class=\"answer-block\">\n  <strong>Notable quote:</strong> \"At a certain scale, you really have to hire the people that have been there, done that, and are better than you so you can truly let go. I've brought on people where I felt like I was better than them at their job. And what that meant was I was always hovering over their shoulders... It's not empowering.\" <span class=\"muted\">— Kevin, Money Talks</span>\n</div>\n\n<div class=\"answer-block\">\n  <strong>On role leverage:</strong> \"It comes down to whether that role has enough leverage to become 10x. The best warehouse worker is maybe 50% faster than an average warehouse worker. But a growth marketer — especially today with AI — can probably 20x the next person. So I want to make sure to think through how much leverage the role has.\" <span class=\"muted\">— Kevin, Money Talks</span>\n</div>\n\n<h3>🎙️ E-Commerce Influence Podcast (~2020)</h3>\n\n<p class=\"muted\">Host: Austin Bronner | <a href=\"https://www.youtube.com/watch?v=x0hxmv6Kfsg\" target=\"_blank\">Watch on YouTube →</a></p>\n\n<div class=\"card\">\n  <div class=\"card-header\">Key Takeaways for Your Interview</div>\n  <table>\n    <tr><th>Topic</th><th>Insight</th><th>Your Angle</th></tr>\n    <tr><td><strong>Just hit 8 figures, ~20 people</strong></td><td>At time of recording (2020), just crossed $10M. ~20 employees. 100%+ YoY growth in Q2 during COVID. Looking to fill many roles.</td><td>Context for Kevin's journey — he's gone from 20 → 80 employees in ~5 years. This pace of growth creates exactly the operational challenges you solve.</td></tr>\n    <tr><td><strong>iRestore Professional launch</strong></td><td>Launched premium device ($599 vs. $295 original). \"Fundamentally changed our unit economics\" — doubled ROAS overnight by increasing AOV without proportional CAC increase.</td><td>Product-led growth through premium tiers. You can help identify and operationalize the next product tier expansion.</td></tr>\n    <tr><td><strong>Agency → in-house strategy</strong></td><td>Kevin hires agencies with a plan to eventually bring the function in-house. \"Make sure your account manager is a senior person, not a junior who will leave in 6 months.\"</td><td>Shows Kevin thinks about build-vs-buy for capabilities. Your ops playbook should include a vendor-to-internal transition framework.</td></tr>\n    <tr><td><strong>Hybrid remote vision</strong></td><td>\"Directors and up come in frequently. Specialists can be fully remote.\" Meeting request system with agendas required.</td><td>Kevin values both in-person leadership and remote productivity. Show flexibility and a framework for managing hybrid teams effectively.</td></tr>\n    <tr><td><strong>Most challenging: people management</strong></td><td>Kevin's hardest and most rewarding aspect of the CEO role. \"I just love helping people grow in their careers.\"</td><td>People development is your strength. Share how you've built high-performing teams and developed talent at previous companies.</td></tr>\n    <tr><td><strong>Vulnerability lesson</strong></td><td>Kevin learned he needs to be more transparent with the team about personal challenges. \"There was probably a week or two where I was just off... and a lot of the team noticed.\"</td><td>Kevin values emotional intelligence and authenticity. Be genuine about your leadership style — he'll respect honesty over polish.</td></tr>\n    <tr><td><strong>Network is #1 resource</strong></td><td>\"Every inflection point I can trace back to a specific person I met.\" Kevin values relationship-driven learning above books or courses.</td><td>You bring a network of operational leaders and industry contacts. This is valuable to Kevin — mention specific relationships (without name-dropping) that have driven results.</td></tr>\n    <tr><td><strong>Goal at time: $100M revenue, 1M customers</strong></td><td>Kevin's 3-year goal from 2020 was $100M annual revenue and 1M cumulative customers.</td><td>He's roughly achieved this goal. Now the question is: what's the next $100M? That's where you come in.</td></tr>\n  </table>\n</div>\n\n<div class=\"answer-block\">\n  <strong>Notable quote:</strong> \"The most rewarding thing for me in this journey is helping people grow in their careers and being a part of people's growth journeys... people management, leading people, it's definitely the most challenging thing and the most rewarding.\" <span class=\"muted\">— Kevin, E-Commerce Influence</span>\n</div>\n\n<h3>📊 Cross-Podcast Themes: Kevin's Evolution (2020–2025)</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">Kevin's Evolution Over 5 Years</div>\n  <table>\n    <tr><th>Dimension</th><th>2020 (E-Com Influence)</th><th>2021 (Business Rock Stars)</th><th>2023 (D2C Podcast)</th><th>2025 (Money Talks)</th></tr>\n    <tr><td><strong>Team size</strong></td><td>~20</td><td>~40</td><td>~50-60 (est.)</td><td>~80</td></tr>\n    <tr><td><strong>Revenue</strong></td><td>Just hit 8 figures</td><td>Growing rapidly</td><td>Mid-8 figures</td><td>Mid-8 figures, growing beyond</td></tr>\n    <tr><td><strong>Kevin's focus</strong></td><td>Growth marketing + everything</td><td>Marketing + hiring</td><td>Brand strategy + channels</td><td>Product R&D + recruiting</td></tr>\n    <tr><td><strong>Biggest challenge</strong></td><td>Hiring, doing everything himself</td><td>Delegation, wrong hires</td><td>Brand evolution, channel diversification</td><td>A-player hiring, exit prep</td></tr>\n    <tr><td><strong>Leadership maturity</strong></td><td>Learning to delegate</td><td>Acknowledging delegation gap</td><td>Strategic thinker emerging</td><td>Ready to hire partner, not subordinate</td></tr>\n  </table>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Consistent Themes Across All 4 Podcasts</div>\n  <table>\n    <tr><th>Theme</th><th>Pattern</th><th>What It Means for You</th></tr>\n    <tr><td><strong>Moat obsession</strong></td><td>Mentions FDA clearance, clinical data, and competitive barriers in every interview</td><td>Kevin will always invest in long-term advantages over short-term wins. Align your operational proposals with moat-building, not just efficiency.</td></tr>\n    <tr><td><strong>Hiring as highest leverage</strong></td><td>Discusses hiring challenges in all 4 podcasts. Has clearly learned expensive lessons.</td><td>Bring a proven hiring methodology. Share how you've built teams that didn't require micromanagement.</td></tr>\n    <tr><td><strong>Customer empathy</strong></td><td>References customer testimonials emotionally in multiple interviews. Reads every review.</td><td>Lead with customer impact, not just financial metrics. Kevin will resonate with \"here's how this process improvement helps the customer.\"</td></tr>\n    <tr><td><strong>Self-aware about weaknesses</strong></td><td>Openly discusses imposter syndrome, delegation struggles, micromanagement in every interview.</td><td>Be equally candid. Kevin distrusts polish and respects vulnerability.</td></tr>\n    <tr><td><strong>Big-lever thinking</strong></td><td>Costco, Professional product launch, retail expansion — Kevin consistently favors one big move over 100 small optimizations.</td><td>Frame your operational wins as big levers: \"This one change will save 3 margin points\" not \"Here are 47 things I'd tweak.\"</td></tr>\n    <tr><td><strong>Progressive delegation</strong></td><td>Each interview shows Kevin doing less day-to-day and more strategy. The COO is the final step.</td><td>You're the last major delegation. Position yourself as the person who completes Kevin's transition from operator to visionary CEO.</td></tr>\n  </table>\n</div>\n\n<div class=\"tip\"><strong>Interview power move:</strong> Reference a specific insight from each podcast timeframe to show you've tracked Kevin's journey over 5 years. Example: \"In 2020 you talked about wanting to hit $100M and 1M customers — you've achieved that. Now the question is what systems need to exist for the next $100M. That's exactly what I build.\"</div>"
          }
        ]

            "id": "org-chart",
            "title": "Organization Chart",
            "html": "<p>Based on Kevin's descriptions in the first call. iRESTORE runs very flat — no C-suite besides Kevin. The COO/Integrator role would sit directly below Kevin and above all current department heads.</p>\n\n      <div class=\"org-chart\">\n        <div class=\"org-node ceo\">\n          <div class=\"org-name\">Kevin Chen</div>\n          <div class=\"org-title\">Co-Founder & CEO / Visionary</div>\n          <div class=\"org-note\">Lives in Brentwood, in office 1-2x/week</div>\n        </div>\n        <div class=\"org-connector\"></div>\n        <div class=\"org-node you\">\n          <div class=\"org-name\">COO / Integrator (You)</div>\n          <div class=\"org-title\">Chief Operating Officer</div>\n          <div class=\"org-note\">New role — all dept heads would report here</div>\n        </div>\n        <div class=\"org-connector\"></div>\n        <div class=\"org-row\">\n          <div class=\"org-branch\">\n            <div class=\"org-connector\"></div>\n            <div class=\"org-node\">\n              <div class=\"org-name\">Junior Reyes</div>\n              <div class=\"org-title\">VP of Growth & Data</div>\n              <div class=\"org-note\">Dir. of E-Comm reports to them<br>Manages Amazon, Target, misc channels<br>Marketing team (remote)</div>\n            </div>\n          </div>\n          <div class=\"org-branch\">\n            <div class=\"org-connector\"></div>\n            <div class=\"org-node\">\n              <div class=\"org-name\"><a href=\"https://www.linkedin.com/in/brandon-k-3b99a611/\" target=\"_blank\">Brandon</a></div>\n              <div class=\"org-title\">Director of Ops & Supply Chain</div>\n              <div class=\"org-note\">Overseas ops, supply chain, logistics<br>La Mirada warehouse<br>Reliable but not strategic</div>\n            </div>\n          </div>\n          <div class=\"org-branch\">\n            <div class=\"org-connector\"></div>\n            <div class=\"org-node\">\n              <div class=\"org-name\">Longchuan Huang, PhD</div>\n              <div class=\"org-title\">Head of Product Development</div>\n              <div class=\"org-note\">~3 months in, from OUAI Haircare<br>PhD (UPenn), MBA (UCSD)<br>Prior: Kate Somerville, Beiersdorf, Janssen<br>Native Chinese speaker<br>Kevin still heavily involved</div>\n            </div>\n          </div>\n          <div class=\"org-branch\">\n            <div class=\"org-connector\"></div>\n            <div class=\"org-node\">\n              <div class=\"org-name\">Financial Controller</div>\n              <div class=\"org-title\">Finance & Accounting</div>\n              <div class=\"org-note\">Been there several years<br>Tax & accounting, not FP&A<br>Fractional CFO supports strategy</div>\n            </div>\n          </div>\n          <div class=\"org-branch\">\n            <div class=\"org-connector\"></div>\n            <div class=\"org-node\">\n              <div class=\"org-name\">Amanda Schoep</div>\n              <div class=\"org-title\">Dir. of Customer Experience</div>\n              <div class=\"org-note\">Promoted Aug 2024 from Sr. Growth Mktg Mgr<br>3+ yrs at iRESTORE; UCF grad<br>7-day support (email/chat/phone)</div>\n            </div>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"tip\">Kevin also mentioned: ~80 FTE + ~50 overseas (at/near father's factory) + contractors = 100+ total. Ops, warehouse, and finance are in-office at La Mirada. Marketing is fully remote.</div>"
