          {
            "id": "ex-pnl-live",
            "title": "Live Exercise: P&L Analysis",
            "html": "<div class=\"warning\"><strong>HIGH PROBABILITY.</strong> This is the most likely live exercise. Kevin hands you a real (or simplified) P&L and asks what you see.</div>\n\n<h3>How It Will Probably Work</h3>\n<p>Kevin prints or screens a P&L — maybe the full thing, maybe just a summary — and says something like: \"Here's our financials. Walk me through what jumps out to you.\" He's testing whether you can read a P&L fluently, think like an operator (not an accountant), and identify the right levers without being told.</p>\n\n<h3>Your Framework (in this order)</h3>\n<ol>\n  <li><strong>Orient out loud:</strong> \"Let me start with the shape of the business — revenue, gross margin, then work down.\" This shows structured thinking and buys you 10 seconds to scan.</li>\n  <li><strong>Anchor to gross margin first:</strong> Is it 60%+? That means the product economics work. Below 55%? That's a product/sourcing problem before anything else.</li>\n  <li><strong>Find where margin gets absorbed:</strong> Walk from gross profit to EBITDA. Name each cost bucket as a percentage of revenue. Look for anything that feels out of benchmark.</li>\n  <li><strong>Identify the 2–3 biggest levers:</strong> Don't list 10 things. Pick the 2–3 line items where small improvements drive the biggest dollar impact.</li>\n  <li><strong>Ask a smart follow-up:</strong> \"Can I see this broken out by channel?\" or \"How much of this marketing line is acquisition vs. retention?\" This shows you know what to dig into next.</li>\n</ol>\n\n<h3>What to Scan on Any P&L (in 30 Seconds)</h3>\n<p>Contribution margin isn't a line item you'll see on a P&L — it's something you have to derive. Here's exactly which <em>actual</em> line items to scan and what math to do in your head:</p>\n\n<table>\n  <tr><th>Line Item on P&L</th><th>What It Tells You</th><th>Red Flag Threshold</th></tr>\n  <tr><td><strong>Gross Revenue</strong> vs. <strong>Net Revenue</strong></td><td>The gap = returns + allowances. If the gap is &gt;12%, returns are a problem.</td><td>Gap &gt; 12% of gross</td></tr>\n  <tr><td><strong>COGS</strong> (as % of net rev)</td><td>Product economics. DTC beauty should be 28–38%. Above 40% = sourcing or tariff issue.</td><td>&gt; 40% of net rev</td></tr>\n  <tr><td><strong>Amazon Referral Fees</strong></td><td>~8–15% of Amazon GMV. If higher, check category classification.</td><td>&gt; 15% of Amazon rev</td></tr>\n  <tr><td><strong>FBA / Fulfillment Fees</strong></td><td>Amazon FBA = 12–18% of Amazon rev. 3PL/in-house for DTC should be 8–12%.</td><td>Amazon &gt; 18%; DTC &gt; 12%</td></tr>\n  <tr><td><strong>Advertising / PPC</strong></td><td>Amazon ACoS + Meta/Google spend. The biggest variable cost after COGS.</td><td>&gt; 20% of net rev blended</td></tr>\n  <tr><td><strong>Wholesale Discounts</strong></td><td>Costco/retail margin concessions. Usually 30–40% off retail.</td><td>&gt; 40% discount</td></tr>\n  <tr><td><strong>Return Processing / Freight</strong></td><td>The hidden cost of returns — not just the refund, but the reverse logistics.</td><td>&gt; 3% of net rev</td></tr>\n  <tr><td><strong>G&amp;A / OpEx</strong></td><td>Headcount + rent + software + overhead. Should be 12–18% at this scale.</td><td>&gt; 20% of net rev</td></tr>\n</table>\n\n<div class=\"tip\"><strong>Quick mental math:</strong> Start at Gross Profit (net rev minus COGS). Then subtract each cost bucket you see between GP and EBITDA. Whatever's left after marketing + fulfillment + channel fees = the channel's \"contribution\" to covering overhead and profit. You don't need a line labeled \"contribution margin\" — you're just doing GP minus variable costs in your head.</div>\n\n<h3>Channel-Level P&L — How to Respond Based on What You See</h3>\n<p>For each scenario below, the mini P&L shows you exactly which line items create the pattern. Scan the <strong>bolded</strong> lines — those are the tells.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">Scenario A: Amazon Margins Are Surprisingly Low</div>\n  <p><strong>What the P&L looks like (per $100 of Amazon revenue):</strong></p>\n  <table>\n    <tr><th>Line Item</th><th>$</th><th>% of Rev</th><th>Signal</th></tr>\n    <tr><td>Amazon Revenue</td><td>$100</td><td>100%</td><td></td></tr>\n    <tr><td>COGS</td><td>($33)</td><td>33%</td><td>Normal</td></tr>\n    <tr><td>Gross Profit</td><td>$67</td><td>67%</td><td>Looks fine here</td></tr>\n    <tr><td><strong>Referral Fees</strong></td><td><strong>($15)</strong></td><td><strong>15%</strong></td><td><strong>Scan this — 8% is typical, 15% means high-fee category or FBM surcharges</strong></td></tr>\n    <tr><td><strong>FBA / Fulfillment</strong></td><td><strong>($16)</strong></td><td><strong>16%</strong></td><td><strong>Scan this — heavy/oversized devices push FBA fees up</strong></td></tr>\n    <tr><td><strong>PPC / Advertising</strong></td><td><strong>($18)</strong></td><td><strong>18%</strong></td><td><strong>Scan this — ACoS above 15% means you're buying position, not earning it</strong></td></tr>\n    <tr><td>Returns &amp; allowances</td><td>($5)</td><td>5%</td><td></td></tr>\n    <tr><td><em>Channel profit</em></td><td><em>$13</em></td><td><em>13%</em></td><td><em>Thin — Amazon is a cost center disguised as revenue</em></td></tr>\n  </table>\n  <p><strong>The tell:</strong> Gross margin looks healthy at 67%, but three lines below it — referral fees, FBA, and PPC — eat 49 cents of every dollar. If you see those three lines totaling &gt;40% of Amazon revenue, margins are being crushed below GP.</p>\n  <p><strong>What to say:</strong> \"The product economics are fine — 67% gross margin. But Amazon's toll booth is taking almost half of every dollar: I see [X]% in referral fees, [Y]% in FBA, and [Z]% in PPC. That's [total]% of Amazon revenue consumed before we've paid for anything else. Two questions: what's our organic vs. paid split on Amazon, and have we optimized FBA fees through dimensional weight reductions or hybrid FBM for slower-moving SKUs?\"</p>\n  <p><strong>Follow-up:</strong> \"What percentage of Amazon customers come back and buy on DTC? Even a 5-point channel shift is $4.5M moving from ~13% channel profit to ~40%.\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Scenario B: Amazon Margins Are Healthy</div>\n  <p><strong>What the P&L looks like (per $100 of Amazon revenue):</strong></p>\n  <table>\n    <tr><th>Line Item</th><th>$</th><th>% of Rev</th><th>Signal</th></tr>\n    <tr><td>Amazon Revenue</td><td>$100</td><td>100%</td><td></td></tr>\n    <tr><td>COGS</td><td>($33)</td><td>33%</td><td>Normal</td></tr>\n    <tr><td>Gross Profit</td><td>$67</td><td>67%</td><td></td></tr>\n    <tr><td>Referral Fees</td><td>($8)</td><td>8%</td><td>Standard rate</td></tr>\n    <tr><td>FBA / Fulfillment</td><td>($13)</td><td>13%</td><td>Well-managed</td></tr>\n    <tr><td><strong>PPC / Advertising</strong></td><td><strong>($7)</strong></td><td><strong>7%</strong></td><td><strong>This is the tell — low ACoS means organic dominance</strong></td></tr>\n    <tr><td>Returns &amp; allowances</td><td>($4)</td><td>4%</td><td></td></tr>\n    <tr><td><em>Channel profit</em></td><td><em>$35</em></td><td><em>35%</em></td><td><em>Outstanding for Amazon</em></td></tr>\n  </table>\n  <p><strong>The tell:</strong> PPC/advertising is low relative to revenue (under 10%). This means 60–70% of sales are organic — the category leadership flywheel is working. Referral and FBA fees are table stakes you can't change; PPC is the variable that separates a good Amazon channel from a bad one.</p>\n  <p><strong>What to say:</strong> \"This is the payoff of category dominance — PPC is only [X]% of Amazon revenue, which tells me most of your demand is organic. That's the moat. The risk I'd watch is competitor spend forcing your ACoS up — I'd want to track ACoS monthly and have a 'defense threshold' where if ACoS goes above [Y]%, we investigate immediately.\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Scenario C: DTC Margins Are Lower Than Expected</div>\n  <p><strong>What the P&L looks like (per $100 of DTC revenue):</strong></p>\n  <table>\n    <tr><th>Line Item</th><th>$</th><th>% of Rev</th><th>Signal</th></tr>\n    <tr><td>DTC Net Revenue</td><td>$100</td><td>100%</td><td></td></tr>\n    <tr><td>COGS</td><td>($33)</td><td>33%</td><td>Normal</td></tr>\n    <tr><td>Gross Profit</td><td>$67</td><td>67%</td><td></td></tr>\n    <tr><td>Shipping / Fulfillment (3PL)</td><td>($9)</td><td>9%</td><td>Reasonable</td></tr>\n    <tr><td><strong>Paid Media (Meta, Google, TikTok)</strong></td><td><strong>($25)</strong></td><td><strong>25%</strong></td><td><strong>Scan this — if &gt;20% of DTC rev, CAC is the problem</strong></td></tr>\n    <tr><td><strong>Returns &amp; return shipping</strong></td><td><strong>($8)</strong></td><td><strong>8%</strong></td><td><strong>Scan this — DTC returns can be higher than Amazon</strong></td></tr>\n    <tr><td>Payment processing</td><td>($3)</td><td>3%</td><td>Shopify + Stripe, fixed</td></tr>\n    <tr><td><em>Channel profit</em></td><td><em>$22</em></td><td><em>22%</em></td><td><em>Below the 30–40% DTC benchmark</em></td></tr>\n  </table>\n  <p><strong>The tell:</strong> Two lines to scan — <strong>paid media</strong> and <strong>returns</strong>. If paid media is above 20% of DTC revenue, customer acquisition is too expensive. If returns are above 6%, the post-purchase experience is leaking margin. Often it's both compounding.</p>\n  <p><strong>What to say:</strong> \"DTC should be the highest-margin channel, so when I see channel profit at [X]% instead of 35–40%, I'm looking at two lines: paid media at [Y]% tells me either creative is fatiguing and CPMs are up, or we're not getting enough organic/influencer traffic. And returns at [Z]% — that's [dollar amount] going back out the door. I'd want to break paid media into new customer CAC vs. retargeting, and returns into reason codes. Those two breakdowns tell you exactly where the fix is.\"</p>\n  <p><strong>Follow-up:</strong> \"What's the new vs. returning customer revenue split? If returning is under 20%, there's a massive retention opportunity that lowers blended CAC.\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Scenario D: DTC Margins Are Strong</div>\n  <p><strong>What the P&L looks like (per $100 of DTC revenue):</strong></p>\n  <table>\n    <tr><th>Line Item</th><th>$</th><th>% of Rev</th><th>Signal</th></tr>\n    <tr><td>DTC Net Revenue</td><td>$100</td><td>100%</td><td></td></tr>\n    <tr><td>COGS</td><td>($33)</td><td>33%</td><td></td></tr>\n    <tr><td>Gross Profit</td><td>$67</td><td>67%</td><td></td></tr>\n    <tr><td>Shipping / Fulfillment</td><td>($8)</td><td>8%</td><td>Efficient</td></tr>\n    <tr><td><strong>Paid Media</strong></td><td><strong>($12)</strong></td><td><strong>12%</strong></td><td><strong>The tell — low CAC means organic + influencer is working</strong></td></tr>\n    <tr><td>Returns</td><td>($4)</td><td>4%</td><td>Well-managed</td></tr>\n    <tr><td>Payment processing</td><td>($3)</td><td>3%</td><td></td></tr>\n    <tr><td><em>Channel profit</em></td><td><em>$40</em></td><td><em>40%</em></td><td><em>Best-in-class DTC</em></td></tr>\n  </table>\n  <p><strong>The tell:</strong> Paid media is under 15% of DTC revenue. That means a large share of traffic is organic, influencer-driven, or returning customers — all of which have near-zero marginal acquisition cost. Returns are also well-controlled.</p>\n  <p><strong>What to say:</strong> \"This is a strong DTC channel — [X]% channel profit means the acquisition engine is working efficiently. The question I'd ask is: how much headroom is there? At what spend level does marginal CAC start exceeding the channel profit? If we're at $12M in paid media generating $100M DTC, I want to know what happens at $15M — does it scale linearly or does CAC climb? That's the efficient frontier, and everything below it means we should be spending more.\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Scenario E: Costco / Wholesale Margins Are Thin</div>\n  <p><strong>What the P&L looks like (per $100 of retail price, wholesale channel):</strong></p>\n  <table>\n    <tr><th>Line Item</th><th>$</th><th>% of Retail</th><th>Signal</th></tr>\n    <tr><td>Retail price</td><td>$100</td><td>—</td><td></td></tr>\n    <tr><td><strong>Wholesale discount</strong></td><td><strong>($38)</strong></td><td><strong>38%</strong></td><td><strong>Scan this — Costco demands 30–40% off retail</strong></td></tr>\n    <tr><td>Net wholesale revenue</td><td>$62</td><td>100% (of net)</td><td></td></tr>\n    <tr><td>COGS</td><td>($33)</td><td>53%</td><td><strong>COGS as % of net is much higher here</strong></td></tr>\n    <tr><td>Gross Profit</td><td>$29</td><td>47%</td><td>Already compressed vs. 67% DTC</td></tr>\n    <tr><td><strong>Co-op / Marketing allowances</strong></td><td><strong>($6)</strong></td><td><strong>10%</strong></td><td><strong>Scan this — Costco often requires marketing fund contributions</strong></td></tr>\n    <tr><td>Freight to warehouse</td><td>($5)</td><td>8%</td><td></td></tr>\n    <tr><td>Chargebacks / compliance</td><td>($3)</td><td>5%</td><td></td></tr>\n    <tr><td><em>Channel profit</em></td><td><em>$15</em></td><td><em>24% of net / 15% of retail</em></td><td><em>Looks okay on paper...</em></td></tr>\n  </table>\n  <p><strong>The tell:</strong> Two lines — <strong>wholesale discount</strong> and <strong>co-op/marketing allowances</strong>. The discount compresses gross margin from 67% to ~47%, and then co-op fees, freight, and chargebacks take another chunk. The resulting channel profit might look acceptable in dollars, but the margin per unit is a fraction of DTC. Also: COGS as a percentage of net revenue jumps dramatically because the revenue base is lower.</p>\n  <p><strong>What to say:</strong> \"Costco is a marketing channel that happens to generate revenue — [X]% channel profit versus 35–40% on DTC. The wholesale discount takes GP from 67% to ~47% before we even get to co-op fees and freight. The real ROI question isn't the margin on the Costco sale — it's the customer who discovers iRESTORE at Costco and buys their next product direct. Can we quantify the 'Costco halo'?\"</p>\n  <p><strong>Follow-up:</strong> \"Do we have post-purchase survey data on how DTC customers first discovered iRESTORE?\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Scenario F: Returns Are High</div>\n  <p><strong>What the P&L looks like (blended, showing returns impact):</strong></p>\n  <table>\n    <tr><th>Line Item</th><th>$</th><th>% of Gross Rev</th><th>Signal</th></tr>\n    <tr><td>Gross Revenue</td><td>$105M</td><td>100%</td><td></td></tr>\n    <tr><td><strong>Returns &amp; allowances</strong></td><td><strong>($12.6M)</strong></td><td><strong>12%</strong></td><td><strong>SCAN THIS FIRST — the gap between gross and net tells the whole story</strong></td></tr>\n    <tr><td>Net Revenue</td><td>$92.4M</td><td>88%</td><td></td></tr>\n    <tr><td>COGS (incl. unsalvageable returns)</td><td>($32M)</td><td>—</td><td>Some returned units can't be resold</td></tr>\n    <tr><td>Gross Profit</td><td>$60.4M</td><td>65%</td><td>Already lower than 67% — returns drag this down</td></tr>\n    <tr><td><strong>Return shipping / processing</strong></td><td><strong>($3.2M)</strong></td><td><strong>3%</strong></td><td><strong>Scan this — the hidden cost (reverse logistics, QA, repackaging)</strong></td></tr>\n    <tr><td>All other variable costs</td><td>($28M)</td><td>—</td><td></td></tr>\n    <tr><td><em>EBITDA</em></td><td><em>$17M</em></td><td><em>18%</em></td><td><em>Returns cost ~$4M total (refunds + processing) — that's EBITDA you're leaving on the floor</em></td></tr>\n  </table>\n  <p><strong>The tell:</strong> The very first subtraction on the P&L — <strong>gross revenue minus returns = net revenue</strong>. If that gap is more than 10%, you've found the biggest lever before you even get to COGS. Then look further down for a <strong>return processing/reverse logistics</strong> line. The refund itself is the obvious cost, but the hidden cost is $5–15 per return in shipping, QA, and restocking.</p>\n  <p><strong>What to say:</strong> \"The first thing that jumps out is the spread between gross and net — [X]% returns means [$Y]M in refunds before we've done anything else. But the real cost is higher: when I add return shipping and processing, that's another [$Z]M. Total returns cost is [$Y+Z]M. Every point of improvement drops straight to EBITDA with no offsetting cost. I'd break returns into reason codes — 'doesn't work' is product, 'didn't see results' is expectations, 'changed mind' is purchase experience. Each one has a different fix.\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Scenario G: Marketing Spend Looks High</div>\n  <p><strong>What the P&L looks like (blended, marketing-heavy):</strong></p>\n  <table>\n    <tr><th>Line Item</th><th>$</th><th>% of Net Rev</th><th>Signal</th></tr>\n    <tr><td>Net Revenue</td><td>$90M</td><td>100%</td><td></td></tr>\n    <tr><td>COGS</td><td>($30M)</td><td>33%</td><td>Normal</td></tr>\n    <tr><td>Gross Profit</td><td>$60M</td><td>67%</td><td>Product economics fine</td></tr>\n    <tr><td><strong>Paid advertising (Amazon PPC)</strong></td><td><strong>($7M)</strong></td><td><strong>8%</strong></td><td><strong>Scan — is Amazon PPC efficient?</strong></td></tr>\n    <tr><td><strong>Paid advertising (Meta/Google/TikTok)</strong></td><td><strong>($11M)</strong></td><td><strong>12%</strong></td><td><strong>Scan — DTC paid media, the biggest variable lever</strong></td></tr>\n    <tr><td><strong>Influencer / affiliate</strong></td><td><strong>($4M)</strong></td><td><strong>4%</strong></td><td><strong>Scan — often hidden in \"marketing\" roll-up</strong></td></tr>\n    <tr><td>Total marketing</td><td>($22M)</td><td>24%</td><td><strong>If this total &gt;20%, flag it</strong></td></tr>\n    <tr><td>Fulfillment + channel fees</td><td>($12M)</td><td>13%</td><td></td></tr>\n    <tr><td>G&amp;A / OpEx</td><td>($13M)</td><td>14%</td><td></td></tr>\n    <tr><td><em>EBITDA</em></td><td><em>$13M</em></td><td><em>14%</em></td><td><em>Below the 20%+ target</em></td></tr>\n  </table>\n  <p><strong>The tell:</strong> Look for how marketing is broken out. If it's one big \"Marketing\" line at 24%, that's a yellow flag but you need to see the breakdown. The key lines are <strong>Amazon PPC</strong> (should be under 10% of Amazon rev), <strong>paid social/search</strong> (should be under 15% of DTC rev), and <strong>influencer/affiliate</strong> (often hidden but can be 3–5% of DTC). If marketing is one rolled-up number, your first question should be to break it apart.</p>\n  <p><strong>What to say:</strong> \"Marketing at [X]% of revenue — I need to break that apart before I call it high or low. At 80% YoY growth, you're buying market share, so the absolute number might be appropriate. The question is efficiency by sub-channel. Can I see: Amazon PPC separately, Meta/Google/TikTok separately, and influencer/affiliate separately? Because a company spending 24% on marketing where half is high-ROI Amazon organic defense and half is high-LTV influencer is in a very different position than one dumping it all into Meta ads with rising CPMs.\"</p>\n  <p><strong>Follow-up:</strong> \"What's the payback period on a new customer? If LTV is 2–3x the first purchase from serums and accessories, this spend might be exactly right.\"</p>\n</div>\n\n<div class=\"tip\"><strong>The meta-answer Kevin is looking for:</strong> He doesn't expect you to know his actual numbers. He's watching HOW you think — do you start with structure or just react? Do you read actual line items or talk in jargon? Do you ask smart follow-ups or just narrate the obvious? The best signal: scan the P&L top to bottom, name the specific lines that jump out, do the quick math out loud (\"that's X% of revenue, which is above benchmark for...\"), and then ask a question that shows you know what data you need next.</div>"

            "id": "ex-eos-live",
            "title": "Live Exercise: EOS L10 Simulation",
            "html": "<div class=\"warning\"><strong>MEDIUM PROBABILITY.</strong> If they ask you to sit in on (or run) a mock L10, this is how to handle it.</div>\n\n<h3>L10 Meeting Structure (60 minutes, strict)</h3>\n<table>\n  <tr><th>Min</th><th>Segment</th><th>What You Do</th></tr>\n  <tr><td>0–5</td><td><strong>Segue</strong></td><td>Each person shares one personal + one professional good thing from the week. Keeps it human. Don't skip this — it's how EOS builds trust.</td></tr>\n  <tr><td>5–10</td><td><strong>Scorecard Review</strong></td><td>Review 5–15 weekly metrics. Only discuss numbers that are OFF TRACK. On-track numbers get a nod, not a discussion. \"Green means we move on.\"</td></tr>\n  <tr><td>10–15</td><td><strong>Rock Review</strong></td><td>Each person reports their quarterly Rocks as \"on track\" or \"off track.\" Again — only discuss off-track. This is not a status meeting.</td></tr>\n  <tr><td>15–20</td><td><strong>Customer/Employee Headlines</strong></td><td>Quick share of any customer wins/issues and employee wins/issues. Anything that needs deeper discussion goes on the Issues List.</td></tr>\n  <tr><td>20–55</td><td><strong>IDS (Identify, Discuss, Solve)</strong></td><td>This is the core. Take the Issues List, prioritize the top 3, and IDS each one. <strong>Identify:</strong> What's the real issue? (Often not what's on the surface.) <strong>Discuss:</strong> 5–10 minutes max. No circular discussions. <strong>Solve:</strong> Assign a to-do with an owner and due date. Then move to the next issue.</td></tr>\n  <tr><td>55–60</td><td><strong>Conclude</strong></td><td>Recap to-dos. Rate the meeting 1–10. Each person states their rating out loud. If below 8, ask \"what would make it a 10?\"</td></tr>\n</table>\n\n<h3>If They Ask You to Facilitate a Mock IDS</h3>\n<p>Kevin or someone presents a real issue. Here's your playbook:</p>\n<ol>\n  <li><strong>\"Let me make sure I understand the issue.\"</strong> Restate it in one sentence. Often the stated issue isn't the real issue. Probe: \"Is that the symptom, or is there something underneath that?\"</li>\n  <li><strong>Timebox discussion:</strong> \"Let's give this 7 minutes. If we can't solve it here, we'll assign it as a to-do for offline work.\"</li>\n  <li><strong>Drive to a decision:</strong> \"I'm hearing two options — [A] and [B]. Does anyone see a third option, or should we decide between these two?\"</li>\n  <li><strong>Assign the to-do:</strong> \"Who owns this, and when will it be done?\" Not \"the team\" — one person, one date.</li>\n</ol>\n\n<div class=\"answer-block\"><strong>If asked about EOS philosophy:</strong> \"EOS works because it creates clarity — everyone knows the vision, everyone knows their number, and every issue gets solved in the same disciplined way. The Integrator's job is to be the engine of that discipline. My experience is that 80% of the value comes from two things: the weekly L10 cadence and the quarterly Rock-setting process. Everything else is important but those two create the rhythm.\"</div>"
          },
          {
            "id": "ex-team-live",
            "title": "Live Exercise: Team Assessment",
            "html": "<div class=\"warning\"><strong>MEDIUM-HIGH PROBABILITY.</strong> You're meeting the team during the onsite. Kevin will almost certainly ask what you observed afterward.</div>\n\n<h3>What Kevin Is Really Asking</h3>\n<p>When he says \"what did you think of the team?\" he's testing:</p>\n<ul>\n  <li>Can you read people quickly and accurately?</li>\n  <li>Are you honest without being brutal?</li>\n  <li>Do you see the same gaps he sees (especially Brandon)?</li>\n  <li>Are you someone people would WANT to work for?</li>\n</ul>\n\n<h3>Framework: GWC (EOS \"Get It, Want It, Capacity to Do It\")</h3>\n<p>Use EOS language since Kevin already thinks in these terms:</p>\n<table>\n  <tr><th>Dimension</th><th>What You're Assessing</th><th>How to Observe in 30–60 Min</th></tr>\n  <tr><td><strong>Get It</strong></td><td>Do they understand their role and how it connects to the bigger picture?</td><td>Ask: \"What does success look like in your role this quarter?\" Vague answers = doesn't get it.</td></tr>\n  <tr><td><strong>Want It</strong></td><td>Are they engaged, energized, bought in?</td><td>Watch body language. Do they talk about problems as obstacles or as challenges they want to solve?</td></tr>\n  <tr><td><strong>Capacity</strong></td><td>Do they have the skills and bandwidth to execute at the next level of scale?</td><td>Ask: \"What's the biggest challenge you'll face as we go from $90M to $200M?\" Tactical answers = capacity concern. Strategic answers = right person, right seat.</td></tr>\n</table>\n\n<h3>How to Talk About What You Observed</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">If You Meet Brandon (Ops Director)</div>\n  <p>Kevin has already telegraphed his frustration. Don't pile on — Kevin wants to see if you can develop people, not just judge them.</p>\n  <p><strong>Good answer:</strong> \"Brandon clearly knows the operation inside out — he's reliable and the team respects him. What I'd want to understand is whether the gap Kevin described is a skills gap or a context gap. Sometimes good operators get boxed in because they've never had a leader who pushed them to think bigger. I'd give him 90 days with clear expectations and coaching before making any decisions. But I'd also start quietly building a bench, because if the business triples, the ops role becomes a VP-level job.\"</p>\n  <p><strong>Bad answer:</strong> \"Yeah, I can see what you mean — he's not strategic.\" (Too quick to judge, signals you'd fire people fast.)</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">If You Meet Amanda Schoep (Dir. Customer Experience)</div>\n  <p>She was promoted from growth marketing to CX — that's unusual and signals either talent or a gap being filled.</p>\n  <p><strong>Things to ask her:</strong> \"What prompted the move from growth marketing to CX? What's your biggest challenge right now? How do you measure success in CX today?\"</p>\n  <p><strong>What to tell Kevin after:</strong> \"Amanda's trajectory is interesting — going from growth marketing to CX means she understands both acquisition and retention. I'd want to see if she's building a CX function or just managing support. The opportunity is huge: if CX owns the post-purchase experience, she's the person who moves NPS to 70+ and repeat rate to 25%. That's millions in LTV.\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">If You Meet the Warehouse / Ops Team</div>\n  <p>Show genuine interest. Walk the floor. Ask questions about their daily workflow.</p>\n  <p><strong>What to tell Kevin after:</strong> Talk about what you observed operationally — pick/pack efficiency, layout, bottlenecks — not just people. \"I noticed [specific thing]. That tells me [insight]. Here's what I'd explore...\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">General Framework for Post-Meeting Debrief</div>\n  <p>Structure your feedback as: <strong>Strengths → Opportunities → One Honest Concern → Your Plan</strong></p>\n  <p><strong>Example:</strong> \"The team is more capable than I expected for a company at this stage — you've got real talent in growth and CX. The opportunity I see is giving them more structure and autonomy — I think several of these people could operate at a higher level with better systems and clearer accountability. The one thing I'd want to dig into is [honest concern]. My plan would be to spend 30 days understanding everyone's strengths before making any changes.\"</p>\n</div>"
          },

            "id": "ex-tariff-live",
            "title": "Live Exercise: Supply Chain / Tariff Scenario",
            "html": "<div class=\"warning\"><strong>MEDIUM PROBABILITY.</strong> With China tariffs in the news constantly, Kevin may test your thinking on this.</div>\n\n<h3>\"China Tariffs Just Went to 60%. What's Your Playbook?\"</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">Immediate (Week 1–2)</div>\n  <ul>\n    <li><strong>Quantify the exposure:</strong> At $22.5M COGS from Shenzhen, a tariff increase from ~25% to 60% could add $7–8M annually. That's an existential margin hit — takes EBITDA from 22% to ~13%.</li>\n    <li><strong>Review current HTS classifications:</strong> Are we classified optimally? Some beauty devices can be classified differently depending on primary function (medical vs. cosmetic). This can be a 5–10% swing.</li>\n    <li><strong>First Sale valuation:</strong> If the factory sells to a related entity (Kevin's father's factory → iRESTORE), the dutiable value should be the first sale price, not the final transfer price. This can reduce the tariff base by 15–30%.</li>\n    <li><strong>Assess inventory position:</strong> How much product is already in the US? Pre-buy if tariff has a delayed effective date.</li>\n  </ul>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Short-Term (30–90 Days)</div>\n  <ul>\n    <li><strong>Pass through selectively:</strong> On DTC, test a 5–10% price increase with split testing. Premium devices ($500+ helmets) have more pricing power than accessories. On Amazon, watch competitor pricing — if they all raise, the market absorbs it.</li>\n    <li><strong>Costco is the problem:</strong> Their price expectations are rigid. Renegotiate or accept thinner margin on this channel temporarily.</li>\n    <li><strong>Accelerate skincare wand and serum launches:</strong> Consumables and lower-COGS products dilute the tariff impact on blended margins.</li>\n  </ul>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Medium-Term (6–18 Months)</div>\n  <ul>\n    <li><strong>Nearshore assembly in Mexico:</strong> Ship components (not finished goods) from Shenzhen to a Mexico assembly facility. Under USMCA, if enough value is added in Mexico (typically 40–60% of value), the finished good enters the US duty-free. Medical devices may qualify under different thresholds.</li>\n    <li><strong>Vietnam or Malaysia facility:</strong> Kevin's father's network may have connections. Lower tariff exposure (~5–10%) but longer setup time and less quality control initially.</li>\n    <li><strong>Dual sourcing:</strong> Don't move everything — keep Shenzhen for speed and quality, use an alternate for volume to cap tariff exposure at a manageable level.</li>\n  </ul>\n</div>\n\n<div class=\"answer-block\"><strong>Sample Answer:</strong> \"The first thing I'd do is quantify — what's the actual dollar exposure? Then I'd work three tracks in parallel: immediate duty mitigation through HTS review and First Sale valuation, selective price pass-through on channels where we have pricing power, and a 6–12 month nearshoring plan for Mexico assembly. The advantage iRESTORE has is the family manufacturing relationship — you have more flexibility and trust with your supplier than any competitor. That relationship becomes even more valuable in a tariff environment because you can co-engineer solutions that a company dealing with contract manufacturers can't.\"</div>"
          },
          {
            "id": "ex-returns-live",
            "title": "Live Exercise: Returns Deep Dive",
            "html": "<div class=\"warning\"><strong>MEDIUM-HIGH PROBABILITY.</strong> The JD scorecard explicitly targets \"Returns &lt;8%.\" This is the most measurable COO deliverable.</div>\n\n<h3>\"Our Return Rate Is [X]%. How Would You Fix It?\"</h3>\n\n<h3>Step 1: Diagnose Before Prescribing</h3>\n<p><strong>Say this first:</strong> \"Before I tell you what to fix, I need to understand why. Can I see the breakdown by return reason and by channel?\"</p>\n\n<table>\n  <tr><th>Return Reason</th><th>What It Really Means</th><th>Fix</th></tr>\n  <tr><td>\"Doesn't work\" / \"Defective\"</td><td>Quality issue or user error</td><td>QC audit at Shenzhen; improved first-use onboarding (video QR code in box)</td></tr>\n  <tr><td>\"Didn't see results\"</td><td>Expectations mismatch — most hair devices take 3–6 months</td><td>Set expectations pre-purchase (Amazon listing, DTC PDP); milestone email drip at 30/60/90 days showing \"what to expect\"</td></tr>\n  <tr><td>\"Changed mind\" / \"No longer needed\"</td><td>Impulse purchase, buyer's remorse</td><td>Harder to fix; reduce with better pre-purchase education, customer reviews, trial/guarantee programs</td></tr>\n  <tr><td>\"Found better price\" / \"Bought elsewhere\"</td><td>Price matching or MAP enforcement issue</td><td>MAP policy enforcement; review unauthorized resellers</td></tr>\n  <tr><td>No reason given (Amazon)</td><td>Amazon's easy return culture — free returns = zero friction</td><td>Limited control; focus on reducing return-eligible window or incentivizing exchanges over returns</td></tr>\n</table>\n\n<h3>Step 2: Channel Matters Enormously</h3>\n<table>\n  <tr><th>Channel</th><th>Expected Return Rate</th><th>Why</th><th>Your Lever</th></tr>\n  <tr><td>Amazon</td><td>8–15%</td><td>Free returns, low-commitment buyers, competitive browsing</td><td>Better A+ content, \"results timeline\" in listing, Subscribe &amp; Save for retention</td></tr>\n  <tr><td>DTC</td><td>5–8%</td><td>More intentional buyers, but may have higher expectations</td><td>\"Save the Sale\" team, proactive milestone emails, money-back guarantee with friction</td></tr>\n  <tr><td>Costco</td><td>10–20%</td><td>Lifetime return policy, casual buyers, in-store impulse purchases</td><td>Very limited control; negotiate different terms or accept as cost of the channel</td></tr>\n</table>\n\n<h3>Step 3: The \"Save the Sale\" Program</h3>\n<p>Before any return is processed, route the customer to a specialist:</p>\n<ol>\n  <li><strong>Understand why:</strong> \"I want to make sure we help you get the best result. Can I ask what's prompting the return?\"</li>\n  <li><strong>Troubleshoot:</strong> If \"not working\" — walk through proper usage. Many customers use devices wrong (wrong duration, wrong frequency, wrong area).</li>\n  <li><strong>Set expectations:</strong> If \"no results yet\" — explain the timeline, share before/after photos from other customers at the same stage.</li>\n  <li><strong>Offer alternatives:</strong> Exchange for a different model, discount on next purchase, extended warranty, free serum bundle.</li>\n  <li><strong>If they still want to return:</strong> Process it gracefully. Don't fight the customer. But track the reason meticulously.</li>\n</ol>\n\n<div class=\"answer-block\"><strong>Sample Answer:</strong> \"Returns are the highest-ROI lever in any DTC P&L because every dollar saved drops straight to EBITDA — there's no offsetting cost. My approach is: first, break it down by reason code and channel, because 'returns are 10%' is useless — I need to know that Amazon is 12% and DTC is 6%, and that 40% of returns are 'didn't see results' while only 5% are defective. That tells me this is an expectations problem, not a quality problem, and the fix is pre-purchase education and post-purchase nurturing — not a hardware redesign. The second thing I'd build is a 'Save the Sale' team that intercepts returns before they process. In my experience, a good retention team can save 20–30% of attempted returns, which on $10M+ in returns is $2–3M straight to the bottom line.\"</div>"
          },
          {
            "id": "ex-prioritize-live",
            "title": "Live Exercise: Prioritization Under Pressure",
            "html": "<div class=\"warning\"><strong>MEDIUM PROBABILITY.</strong> Kevin gives you a list of competing priorities and asks how you'd sequence them.</div>\n\n<h3>\"Here Are 8 Things That Need Attention. What Do You Tackle First?\"</h3>\n<p>Kevin might present a realistic version of the problems he's juggling — something like:</p>\n<ol>\n  <li>Returns are above target and climbing</li>\n  <li>The warehouse hit 90% capacity again</li>\n  <li>A key Amazon competitor just launched a copycat at half the price</li>\n  <li>EOS is stalled — nobody updates their Rocks</li>\n  <li>The skincare wand launch is 3 weeks behind schedule</li>\n  <li>Two senior people are unhappy and may leave</li>\n  <li>Costco wants a meeting about expanding to in-store</li>\n  <li>Kevin is still in 20+ hours of meetings per week</li>\n</ol>\n\n<h3>How to Think About It (Out Loud)</h3>\n<p>Use a 2x2 matrix: <strong>Urgency</strong> (will it hurt us THIS week?) × <strong>Leverage</strong> (does fixing it unlock other things?)</p>\n\n<table>\n  <tr><th></th><th>High Leverage</th><th>Low Leverage</th></tr>\n  <tr><td><strong>Urgent</strong></td><td><span style=\"color:#d32f2f\"><strong>DO NOW:</strong></span> Retention risk (people leaving), warehouse capacity</td><td><span style=\"color:#f57c00\"><strong>TRIAGE:</strong></span> Competitor launch (respond but don't panic)</td></tr>\n  <tr><td><strong>Not Urgent</strong></td><td><span style=\"color:#1976d2\"><strong>SCHEDULE:</strong></span> Returns fix, EOS reboot, Kevin's meeting load, Costco expansion</td><td><span style=\"color:#757575\"><strong>DELEGATE:</strong></span> Wand delay (PD team owns the fix, I own the escalation path)</td></tr>\n</table>\n\n<div class=\"answer-block\"><strong>Sample Answer:</strong> \"I'd group these by what's reversible vs. irreversible. Losing two senior people is irreversible — that's my first conversation today, because the cost of replacing them is 6 months and $200K+. Warehouse capacity is urgent because it has a hard physical constraint. Everything else, I'm sequencing by leverage: returns and EOS are the highest-leverage fixes because they compound — fixing returns improves margins AND customer satisfaction AND reduces CS load, and fixing EOS creates the operating system that prevents half these other problems from recurring. The competitor launch is actually the LEAST urgent — at 60–70% market share with FDA clearance, a cheap copycat validates the category more than it threatens us. I'd monitor it, not react to it.\"</div>\n\n<div class=\"tip\"><strong>The signal Kevin is looking for:</strong> You didn't try to do all 8 at once. You prioritized ruthlessly. You explained your reasoning. You separated signal from noise. And you showed that you understand which problems are people problems (handle now) vs. system problems (build the fix).</div>"
          },
          {
            "id": "ex-meeting",
            "title": "Meeting the Team: Playbook",
            "html": "<div class=\"warning\"><strong>CERTAIN.</strong> You're meeting team members at the onsite. Every interaction is being observed — by Kevin afterward and by the team in real time. They'll tell Kevin what they thought of you.</div>\n\n<h3>Your Mindset Going In</h3>\n<p>You're not interviewing them — you're auditioning to be their boss. The team has been through a lot of leadership turnover (Kevin \"exited many directors and up\" in the past 6–8 months). They're wary. Your goal is to be the person they'd <em>want</em> to work for, while quietly gathering intel on capabilities, gaps, and culture.</p>\n\n<h3>Universal Approach (With Everyone)</h3>\n<div class=\"card\">\n  <div class=\"card-header\">Opening Questions That Work With Anyone</div>\n  <ul>\n    <li><strong>\"What's working really well right now that I should be careful not to break?\"</strong> — Shows humility. Signals you won't come in wrecking things.</li>\n    <li><strong>\"What's the one thing that would make your job dramatically easier?\"</strong> — Surfaces pain points without being negative. People love being asked this.</li>\n    <li><strong>\"What does success look like in your role this quarter?\"</strong> — EOS language. Tests whether they have clarity on their seat.</li>\n    <li><strong>\"What's the biggest challenge you see as the company scales from $100M to $200M?\"</strong> — Strategic vs. tactical answer tells you a lot about their capacity.</li>\n  </ul>\n  <p><strong>Body language:</strong> Sit at their level (not across a desk). Take notes — it signals you value what they say. Use their name. Don't look at your phone.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">What NOT to Do</div>\n  <ul>\n    <li><strong>Don't promise anything.</strong> Not \"I'll fix that\" or \"when I start, we'll...\" — you don't have the job yet, and people remember promises.</li>\n    <li><strong>Don't critique current leadership.</strong> If someone vents about Kevin or Brandon, listen but don't validate. \"That sounds frustrating. Tell me more about what you'd change.\"</li>\n    <li><strong>Don't play expert.</strong> You know nothing about their day-to-day reality yet. Ask questions, don't give answers.</li>\n    <li><strong>Don't take sides.</strong> If there's tension between people or departments, stay neutral. You're Switzerland until Day 30.</li>\n  </ul>\n</div>\n\n<h3>Person-by-Person Playbook</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">Brandon — Director of Ops & Supply Chain</div>\n  <p><strong>Context:</strong> Your most critical interaction. He'd be your direct report. Kevin has telegraphed frustration (\"boxed in\" thinking, Q4 crisis, \"I shouldn't have to have this conversation with you\"). Brandon came from the Amazon/FBA world — reliable executor, not a strategic thinker. He's been through the company's growth and knows the operation cold.</p>\n  <p><strong>What he's probably feeling:</strong> Threatened. A new COO means someone is now between him and Kevin. He may have wanted the role himself, or he may fear being managed out. Either way, he's guarded.</p>\n  <p><strong>Your approach:</strong></p>\n  <ul>\n    <li><strong>Lead with respect:</strong> \"I've heard a lot about the operation you've built here. Growing a warehouse from scratch to handle $100M+ in volume is no small thing.\"</li>\n    <li><strong>Ask about his world:</strong> \"Walk me through a typical week for you. What takes the most time? What are you most proud of? What keeps you up at night?\"</li>\n    <li><strong>Signal partnership, not hierarchy:</strong> \"My job as COO wouldn't be to do your job — it would be to remove obstacles so you can do yours better. What obstacles are in your way right now?\"</li>\n    <li><strong>Probe gently on the Q4 situation:</strong> \"I understand Q4 was intense. What would you do differently next time if you had unlimited resources?\" — This tests whether he's learned from it without being accusatory.</li>\n  </ul>\n  <p><strong>What to tell Kevin after:</strong> See the Team Assessment exercise card on Brandon — use the \"skills gap vs. context gap\" framing. Don't pile on. Kevin wants to see if you can <em>develop</em> people, not just judge them.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Amanda Schoep — Director of Customer Experience</div>\n  <p><strong>Context:</strong> Promoted Aug 2024 from Sr. Growth Marketing Manager — so she moved from acquisition to retention, which is unusual. 3+ years at iRESTORE, UCF grad. One of the longer-tenured people. Manages 7-day support (email/chat/phone). Based in Irvine, so she's in-office.</p>\n  <p><strong>What she's probably feeling:</strong> Cautiously optimistic. A COO who understands CX could be her biggest advocate. But she may also worry about scope changes or being micromanaged in a role she's still growing into.</p>\n  <p><strong>Your approach:</strong></p>\n  <ul>\n    <li><strong>Acknowledge the move:</strong> \"I noticed you came from growth marketing into CX — that's an interesting transition. What prompted it?\" — This shows you've done your homework.</li>\n    <li><strong>Ask about the current state:</strong> \"How do you measure success in CX right now? What metrics do you track?\" — Tests whether she's running CX by feel or by data.</li>\n    <li><strong>Probe for opportunity:</strong> \"If you could build the dream CX function here, what would it look like? What resources would you need?\" — Signals you see CX as a strategic function, not just a cost center.</li>\n    <li><strong>Connect to business outcomes:</strong> \"What's the biggest reason customers reach out? And how much of that could we prevent with better product education or onboarding?\" — Shows you think about CX as a lever for retention and returns reduction.</li>\n  </ul>\n  <p><strong>What to tell Kevin after:</strong> \"Amanda's trajectory is interesting — marketing to CX means she understands both sides of the customer journey. The question is whether she's building a CX <em>function</em> or just managing support. If we give her the tools and mandate, she could own the entire post-purchase experience — NPS to 70+, repeat rate to 25%, and a 'Save the Sale' program that cuts returns by 2–3 points. That's millions in LTV.\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Junior Reyes — VP of Growth & Data</div>\n  <p><strong>Context:</strong> Based in NYC, fully remote. Promoted from Head of Paid Acquisition & Data in Nov 2024. Previously Head of Growth at The Perfect Jean; investor/advisor at Source Medium (DTC analytics). Math & CS background. Posts about AI tools and Claude Code — tech-forward thinker. Likely Kevin's most strategic marketing hire.</p>\n  <p><strong>What he's probably feeling:</strong> Curious but protective. He's the VP-level growth leader — depending on org structure, he might report to you or directly to Kevin. This interaction determines whether he sees you as a partner or a bottleneck.</p>\n  <p><strong>Your approach:</strong></p>\n  <ul>\n    <li><strong>Talk data and performance:</strong> \"What does your attribution model look like? How do you think about new vs. returning customer CAC?\" — He'll immediately gauge whether you're quantitative or hand-wavy.</li>\n    <li><strong>Show respect for the growth trajectory:</strong> \"80% YoY growth is exceptional. What's working best right now, and where do you see diminishing returns starting to creep in?\"</li>\n    <li><strong>Address the org structure question directly:</strong> \"I know the reporting structure is TBD — I'm genuinely curious how you'd like to see growth and ops work together. What's working now and what creates friction?\"</li>\n    <li><strong>Geek out a little:</strong> He's into AI/tech tools. If it comes up naturally, showing you're tech-forward too builds rapport.</li>\n  </ul>\n  <p><strong>What to tell Kevin after:</strong> \"Junior is clearly your growth engine — he thinks in data, not opinions, and his background in DTC analytics is a real asset. My question is whether he's scaling himself or trying to do everything. At $200M he needs a team under him, not just tools. I'd want to understand his hiring plan.\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Longchuan Huang, PhD — Head of Product Development</div>\n  <p><strong>Context:</strong> Only ~3 months in. Came from OUAI Haircare (Technical Director, PD). PhD from UPenn, MBA from UCSD. Career spans premium beauty and pharma: Kate Somerville, Beiersdorf (NIVEA), Janssen (J&J pharma). Native Chinese speaker — \"life-changing\" for Kevin because it unlocks Shenzhen factory communication. Kevin is still heavily involved in PD.</p>\n  <p><strong>What he's probably feeling:</strong> Still learning the org. May be cautious about a COO hire because it could add a layer between him and Kevin. Or he may welcome it — if Kevin is too involved in PD, a COO who takes operational load off Kevin frees Kevin to be a better product collaborator.</p>\n  <p><strong>Your approach:</strong></p>\n  <ul>\n    <li><strong>Show you understand his value:</strong> \"Your background in regulatory and formulation across cosmetics and pharma is exactly what the skincare expansion needs. How's the transition from OUAI been?\"</li>\n    <li><strong>Ask about the pipeline:</strong> \"I know the skincare wand is a big launch. What does the product pipeline look like beyond that? What's your biggest bottleneck — formulation, regulatory, manufacturing?\"</li>\n    <li><strong>Connect to your role:</strong> \"My job as COO would be to make sure the infrastructure supports the pipeline you're building — supply chain, launch ops, regulatory timelines. What would make your life easier from an ops perspective?\"</li>\n    <li><strong>The Chinese language angle:</strong> Don't bring this up directly (it's awkward to say \"I know you speak Chinese\"). But if factory communication comes up, acknowledge: \"Having direct language alignment with the factory must speed things up enormously.\"</li>\n  </ul>\n  <p><strong>What to tell Kevin after:</strong> \"Longchuan is a serious hire — the regulatory depth he brings is exactly what you need for MoCRA compliance and the topicals expansion. He's early, so I'd want to give him space to build his function. My role would be to make sure the ops side keeps pace with whatever pipeline he builds.\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Angel Chao — Financial Controller</div>\n  <p><strong>Context:</strong> Based in Mission Viejo, in-office. UCLA Economics, Cal Poly Pomona Masters. Been at iRESTORE several years. Handles tax, accounting, and compliance — not strategic FP&A. Fractional CFO provides the strategy layer. Kevin described her as competent in her lane but not at the strategic finance level.</p>\n  <p><strong>Your approach:</strong></p>\n  <ul>\n    <li><strong>Respect the foundation:</strong> \"How has the accounting function scaled as the business has grown this fast? What's been the hardest part?\"</li>\n    <li><strong>Probe for data quality:</strong> \"How quickly can we get channel-level P&L data? What's automated vs. manual today?\" — This tells you how much work is needed to get the financial visibility you'll need as COO.</li>\n    <li><strong>Understand the CFO relationship:</strong> \"How does the handoff work between you and the fractional CFO? What does he/she focus on vs. what you own?\"</li>\n  </ul>\n  <p><strong>What to tell Kevin after:</strong> \"Angel has the books under control — the question is how quickly we can layer in the operational finance view I'll need. Channel-level P&L, unit economics by product, customer LTV. I'd work with her and the fractional CFO in my first 30 days to build that out.\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Daniel Ju — SVP of Operations</div>\n  <p><strong>Context:</strong> UC Berkeley grad, LA-based. Listed as SVP of Operations, but Kevin described Brandon as the day-to-day ops leader. Daniel may be more senior/strategic, or may be focused on a different part of ops (possibly overseas/supply chain). The reporting relationship between Daniel and Brandon is unclear — <strong>ask Kevin about this before the onsite if possible.</strong></p>\n  <p><strong>Your approach:</strong></p>\n  <ul>\n    <li><strong>Clarify scope:</strong> \"Tell me about your role and how it intersects with the warehouse and supply chain operations. What does your typical week look like?\"</li>\n    <li><strong>Gauge strategic capacity:</strong> \"Where do you see the biggest operational risks as the company scales to $200M?\" — A VP-level answer here would be very different from a tactical manager's answer.</li>\n    <li><strong>Be careful about assumptions:</strong> Don't assume he reports to you. Clarify the structure with Kevin first.</li>\n  </ul>\n  <p><strong>What to tell Kevin after:</strong> Share your honest read on his capabilities and where he fits in the org. \"I'd want to understand how Daniel and Brandon work together and where the boundaries are — that clarity is important for the org chart I'd build.\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Danica Baltazar — Senior Operations Manager (Philippines)</div>\n  <p><strong>Context:</strong> 10+ years in ops, digital marketing, e-commerce. Manages the Philippines team (~50 people) — business operations, recruitment, logistics, budgets. Described as an \"amazing team leader.\" You may meet her virtually rather than in person.</p>\n  <p><strong>Your approach:</strong></p>\n  <ul>\n    <li><strong>If you meet her virtually:</strong> Show genuine interest in the Philippines operation. \"Walk me through how the team is structured there. What functions do you cover?\"</li>\n    <li><strong>Probe for the US-PH handoff:</strong> \"What's the biggest challenge in coordinating between the Philippines team and La Mirada? Where do things fall through the cracks?\"</li>\n    <li><strong>Show you value the team:</strong> \"A 50-person overseas operation is a significant part of the company. How do you keep the team engaged and connected to the mission?\"</li>\n  </ul>\n  <p><strong>What to tell Kevin after:</strong> \"The Philippines team is a real asset — Danica seems to run a tight operation. The opportunity I see is better integration between the US and PH teams, especially around CX and ops handoffs. That's a system design problem, not a people problem.\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Warehouse / La Mirada Floor Team</div>\n  <p><strong>Context:</strong> This is the in-person heartbeat of the company. Kevin expects the COO to be in La Mirada regularly. Walking the floor and showing genuine interest is one of the most impactful things you can do.</p>\n  <p><strong>Your approach:</strong></p>\n  <ul>\n    <li><strong>Walk the floor with intent:</strong> Don't just do a polite walk-through. Stop at stations. Ask: \"What slows you down? What's the most annoying part of your process? If you could change one thing, what would it be?\"</li>\n    <li><strong>Observe operationally:</strong> Look for: pick path efficiency, how inventory is organized (by SKU velocity?), packing station ergonomics, shipping label/carrier mix, staging areas for FBA vs. DTC vs. Costco. Take mental notes.</li>\n    <li><strong>Notice the details:</strong> Cleanliness, safety signage, break areas, music/culture. These tell you a lot about how the team is treated and how the operation is managed.</li>\n    <li><strong>Be human:</strong> Learn 2–3 people's names. Ask how long they've been there. If someone's been there 5+ years, that tells you something about retention and culture.</li>\n  </ul>\n  <p><strong>What to tell Kevin after:</strong> Lead with specific observations, not generalities. \"I noticed [specific thing about layout/flow/process]. That tells me [insight]. Here's what I'd explore first...\" — This is 10x more impressive than \"the warehouse looked good.\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Diane Dayoung Kim — Head of Performance Creative</div>\n  <p><strong>Context:</strong> LA-based, remote. Since Nov 2024. Previously VP of Creative Strategy at Ready Set; Creative Strategy Lead at TubeScience. Also runs Superbloom Creative (consulting). Yale grad. Deep DTC performance creative expertise — this is someone who understands how creative drives paid media efficiency.</p>\n  <p><strong>If you meet her (less likely but possible):</strong></p>\n  <ul>\n    <li>\"How do you think about the relationship between creative and performance? What creative formats are working best right now?\"</li>\n    <li>\"What would you build if you had double the creative budget?\"</li>\n  </ul>\n  <p><strong>What to tell Kevin after:</strong> \"Diane's hire signals you understand that creative is the new targeting — when platforms go algorithmic, creative quality becomes the performance lever. That's a sophisticated move.\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Matt Parmely — Director of Growth Marketing</div>\n  <p><strong>Context:</strong> Austin, TX (remote). Likely reports to Junior Reyes. Focuses on paid media and performance marketing.</p>\n  <p><strong>If you meet him:</strong></p>\n  <ul>\n    <li>\"What does the paid media mix look like right now? Where are you seeing the best efficiency, and where is it getting harder?\"</li>\n    <li>\"How do you think about the handoff between a customer acquired through paid and the CX team that retains them?\"</li>\n  </ul>\n</div>\n\n<h3>After the Team Meetings: Debrief Framework</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">How to Structure Your Feedback to Kevin</div>\n  <p>Kevin will ask \"what did you think?\" — probably casually, probably over coffee or as you're wrapping up. Don't wing it. Use this structure:</p>\n  <ol>\n    <li><strong>Lead with genuine strengths:</strong> \"The team is more capable than I expected for a company at this stage. You've got real talent in [specific names/areas].\"</li>\n    <li><strong>Identify one organizational opportunity:</strong> \"The opportunity I see is [specific thing] — right now it feels like [diagnosis], and with [your solution], you'd unlock [outcome].\"</li>\n    <li><strong>One honest concern (diplomatically):</strong> \"The one thing I'd want to dig into further is [concern]. It's not a red flag — it's just something I'd want to understand better in my first 30 days.\"</li>\n    <li><strong>Your plan:</strong> \"My approach would be to spend the first 30 days listening and understanding before making any changes. But based on today, I already see 2–3 things I'd start working on immediately.\"</li>\n  </ol>\n  <p><strong>Key rule:</strong> Be positive about people, critical about systems. \"The team is strong; the systems need work\" is always the right frame. It compliments Kevin's hiring taste while showing you see the operational gap.</p>\n</div>\n\n<div class=\"tip\"><strong>The meta-signal:</strong> Kevin isn't just listening to WHAT you say about the team — he's watching HOW you interact with them. Are you warm or transactional? Do you listen or lecture? Do you remember names? Do you ask follow-up questions? The best COOs are people magnets — the team should walk away thinking \"I'd want to work for that person.\" That's worth more than any analytical insight.</div>"
          },
          {
            "id": "ex-coo-traits",
            "title": "COO Leadership Traits: What to Cultivate",
            "html": "<p>Being a people magnet is one trait. Here are the others that separate COOs who last a decade from ones who flame out in 18 months — and how to signal each one in the interview <em>and</em> build it for the long run.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">1. Pattern Recognition Across Silos</div>\n  <p><strong>What it is:</strong> Seeing connections across departments that nobody else sees. Marketing's CAC is climbing? You notice it correlates with warehouse shipping delays from two weeks ago — late deliveries tanked repeat purchase rates. Finance flagged rising COGS? You trace it to a product mix shift that came from a growth team decision.</p>\n  <p><strong>How to build it:</strong> For every problem you encounter, force yourself to ask: \"What's upstream and downstream of this?\" Build the habit of reading across functions — not just your lane. The COO who only understands ops is a VP of Ops. The COO who understands how ops connects to finance, marketing, product, and customer experience is irreplaceable.</p>\n  <p><strong>Signal in the interview:</strong> When Kevin presents any scenario, connect it to at least two other functions. \"If warehouse throughput drops, that's not just a fulfillment problem — it hits DTC NPS, Amazon seller metrics, and potentially our Costco fill rate. I'd want to trace this upstream to see if it's a demand planning miss or a labor issue.\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">2. Radical Intellectual Honesty</div>\n  <p><strong>What it is:</strong> Telling the CEO what they need to hear, not what they want to hear — and always pairing the hard truth with a path forward. Not just identifying problems (that's easy and annoying), but pairing every uncomfortable observation with a plan.</p>\n  <p><strong>How to build it:</strong> Practice the formula: <strong>honest observation + context + recommendation</strong>. Never deliver a diagnosis without a prescription. \"Our Amazon margins are thinner than they look because FBA fees are eating 13% — but here's a 90-day plan to recover 2–3 points through commingling optimization and FBM testing on slow movers.\"</p>\n  <p><strong>Signal in the interview:</strong> Push back on something. Respectfully disagree with an assumption in a scenario. Kevin isn't hiring a yes-person — he's been the only decision-maker for years. He needs someone who'll say \"I see it differently, and here's why.\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">3. The Translator (Visionary ↔ Execution)</div>\n  <p><strong>What it is:</strong> Taking the CEO's big ideas — \"let's launch in Japan\" — and turning them into sequenced, resourced, realistic plans <em>without killing the energy behind the idea</em>. And taking the team's ground-level reality — \"we can't ship 40K units in December with this layout\" — and bringing it to Kevin in a way that's solution-oriented, not defeatist.</p>\n  <p><strong>How to build it:</strong> When someone gives you a big vision, your first response should never be \"that won't work.\" It should be: \"Here's what it would take.\" When someone gives you a ground-level complaint, reframe it: \"What would need to be true for this to work?\" You become fluent in both languages — vision and execution — by practicing the translation in real time.</p>\n  <p><strong>Signal in the interview:</strong> When Kevin talks about international expansion or new product categories, respond with <em>enthusiasm + structure</em>: \"I love that. Here's how I'd sequence it — Phase 1 is X, Phase 2 is Y, and the decision point between them is Z.\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">4. Comfortable Being the Second Name</div>\n  <p><strong>What it is:</strong> The COO does 70% of the work and gets 10% of the credit. Kevin will be the face of iRESTORE on Shark Tank, at trade shows, in press. Your wins show up as his wins. The COOs who thrive in this genuinely get their satisfaction from watching the machine run well — not from external recognition.</p>\n  <p><strong>How to build it:</strong> Redefine what success looks like for you. The scoreboard isn't your LinkedIn profile — it's: Did the team hit their numbers? Is Kevin spending time on vision instead of putting out fires? Are people growing? Is the company more valuable than when you started? If you keep score on credit, it'll poison the relationship.</p>\n  <p><strong>Signal in the interview:</strong> Talk about past wins in terms of team outcomes, not personal glory. \"We took the warehouse from 92% to 99.4% accuracy\" not \"I implemented a new WMS.\" Use \"we\" more than \"I.\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">5. Decisive Under Ambiguity</div>\n  <p><strong>What it is:</strong> You'll never have enough data. The warehouse is at 85% capacity, holiday season is coming, Costco PO could be 20K or 50K units, and you need to decide on a 3PL contract this week. The best COOs make a call, document their reasoning, build in a fallback, and move.</p>\n  <p><strong>How to build it:</strong> Practice the framework: <strong>\"Here's what I'd do, here's what changes if I'm wrong, and here's when we'll know.\"</strong> Stop waiting for perfect information. Get comfortable with 70% confidence decisions. The cost of waiting is almost always higher than the cost of being wrong — because wrong decisions can be corrected, but lost time can't be recovered. This is especially true at $90M growing 80%: you're making decisions with last quarter's data about next quarter's reality.</p>\n  <p><strong>Signal in the interview:</strong> When given a scenario with incomplete information, don't ask for more data. Make a call and explain your reasoning: \"With what I know, I'd do X. The risk is Y. My fallback is Z. I'd revisit in two weeks when we have [specific data].\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">6. Process Architect, Not Process Bureaucrat</div>\n  <p><strong>What it is:</strong> Building systems and processes — EOS, SOPs, dashboards, cadences — but knowing when to break them. A company growing 80% YoY can't run like a Fortune 500. The best COOs build processes that are tight enough to create consistency but loose enough to absorb chaos.</p>\n  <p><strong>How to build it:</strong> For every process you create, ask: \"Does this serve the work, or does the work now serve this process?\" Know which processes are sacred (financial controls, inventory accuracy, safety) and which are guidelines (meeting formats, approval workflows). Kill bureaucracy before it kills velocity. The test: if removing a process wouldn't cause a measurable problem within 30 days, it probably shouldn't exist.</p>\n  <p><strong>Signal in the interview:</strong> Show you know the difference. \"I'd implement a demand planning cadence that's locked — non-negotiable, every week. But I'd keep the approval process for marketing spend flexible, because at your growth rate, a three-day approval cycle costs you more than a few bad $5K bets.\"</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">7. Emotional Regulation as a Superpower</div>\n  <p><strong>What it is:</strong> When the container ship is stuck, the Costco buyer is furious, and three people quit the same Tuesday — the COO is the person who can't lose composure. Not in a \"stuff your feelings\" way, but in a \"I process fast and redirect energy toward solutions\" way. The team takes their emotional cues from you.</p>\n  <p><strong>How to build it:</strong> This is trainable. It's reps. The more crises you navigate, the wider your window of tolerance gets. Build a personal protocol: when something goes sideways, your first move is always to gather facts before reacting. Take 30 seconds. Ask: \"What do we actually know? What's the real blast radius? What's the first decision that needs to happen?\" The calm is contagious — and so is panic.</p>\n  <p><strong>Signal in the interview:</strong> Tell a story about a crisis where you stayed calm. Not just \"I handled it\" — describe the moment where everyone was losing it and what you specifically did to redirect energy. Kevin needs to know you won't add to his stress during the hard weeks.</p>\n</div>\n\n<div class=\"answer-block\"><strong>The thread connecting all seven:</strong> The COO's job is to make everyone around them better at their jobs. Not to be the smartest person in the room, not to have all the answers, but to create the conditions where good people do great work and the CEO can focus on what only the CEO can do. For the interview, you don't need to claim all seven — demonstrating three or four through stories and through how you show up is enough. The people magnet piece, radical intellectual honesty, and decisiveness under ambiguity are probably your highest-leverage signals for Kevin's specific situation.</div>"
          }
        ]
      }
    ]

            "title": "Closing Script: End of Interview",
            "html": "<h3>The Final 5 Minutes Matter Most</h3>\n<p>How you close the interview signals your executive presence and genuine interest. Kevin will remember the ending more than the middle.</p>\n\n      <div class=\"card\">\n        <div class=\"card-header\">The Three-Part Close</div>\n        <ol>\n          <li><strong>Summarize your understanding</strong> (shows you listened):\n            <div class=\"answer-block\">\"Kevin, here's what I'm hearing: you've built something incredible — $100M+ with a small team, dominant market position, and a product that actually works. The challenge now is that growth is outpacing your operational infrastructure. You need someone who can build the systems, manage the team, and free you to focus on innovation and vision. That's exactly what I do.\"</div>\n          </li>\n          <li><strong>Declare your interest</strong> (don't be coy):\n            <div class=\"answer-block\">\"I want to be direct — I'm very excited about this opportunity. The combination of the growth stage, the EOS framework, the exit timeline, and the chance to build real operational infrastructure at a company that's already winning — that's rare. This is the kind of role I've been looking for.\"</div>\n          </li>\n          <li><strong>Ask the commitment question</strong> (creates next steps):\n            <div class=\"answer-block\">\"What would you need to see from me to feel confident about moving forward? And what does the rest of the process look like from here?\"</div>\n          </li>\n        </ol>\n      </div>"
          },

            "id": "close-objections",
            "title": "Handling Kevin's Concerns",
            "html": "<h3>Likely Objections and How to Address Them</h3>\n\n      <div class=\"card\">\n        <div class=\"card-header\">\"You don't have beauty/DTC experience\"</div>\n        <div class=\"answer-block\">\"That's fair — I haven't worked in beauty specifically. But what iRESTORE needs right now isn't another beauty marketer — it's operational infrastructure. Supply chain, EOS, fulfillment, finance, team management — those are industry-agnostic skills. And frankly, I think coming from outside the beauty bubble is an advantage. I'll ask 'why do we do it this way?' questions that an industry insider might not.\"</div>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">\"You haven't managed a team this size\"</div>\n        <div class=\"answer-block\">\"The direct team under the COO here is 5–7 department heads — that's very manageable. The broader organization of 100+ people is about building systems, not managing individuals. My strength is building the operating system — the meeting rhythms, scorecards, accountability structures — that allows a team of 100 to function like a team of 20. That's what EOS is designed to do.\"</div>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">\"We're worried about culture fit — we're scrappy\"</div>\n        <div class=\"answer-block\">\"I love that about iRESTORE. I'm not coming in to add bureaucracy — I'm coming in to add just enough structure that the scrappiness can scale. The best operators are player-coaches: I'll build the dashboards AND I'll be on the warehouse floor during a Q4 crunch. I don't believe in 'that's not my job.'\"</div>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">\"We've interviewed other candidates with more relevant experience\"</div>\n        <div class=\"answer-block\">\"I'd expect that — this is a great opportunity and you should have options. Here's what I'd ask you to weigh: do you want someone who's done this exact role before, or someone who brings fresh thinking and will build it the right way? The Q4 crisis happened because someone was doing things the way they'd always been done. I'm wired to ask 'what should this look like?' before 'how has it always been done?'\"</div>\n      </div>"

            "title": "Post-Interview Follow-Up",
            "html": "<h3>Within 24 Hours</h3>\n      <ul>\n        <li><strong>Thank-you email to Kevin:</strong> Short, specific, personal. Reference something specific from the conversation that resonated. Don't just say \"great meeting\" — prove you were listening.</li>\n        <li><strong>Bonus move:</strong> Send a brief (1-page max) \"first impressions\" document. Not a full 90-day plan — just 3–5 observations about the opportunity and how you'd approach the first 30 days. This signals executive initiative and gives Kevin something to share internally.</li>\n      </ul>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Follow-Up Email Template</div>\n        <div class=\"answer-block\">\n          <p>Kevin,</p>\n          <p>Thank you for the conversation today. I walked away even more excited about the opportunity.</p>\n          <p>Three things stood out to me: [specific thing 1], [specific thing 2], and [specific thing 3]. These confirm my belief that the timing is right for an operational leader who can build the infrastructure to support your growth trajectory.</p>\n          <p>I've attached a brief document with my initial observations — not a full plan, but a starting point for how I'd approach the first 30 days. I'd welcome your feedback.</p>\n          <p>Looking forward to next steps.</p>\n          <p>Best,<br>Trey</p>\n        </div>\n      </div>\n\n      <div class=\"tip\"><strong>The goal:</strong> Leave Kevin thinking \"this person is already operating like they work here.\" The follow-up document is the single most differentiating thing you can do — most candidates send a thank-you email and wait. You send a deliverable.</div>"

            "id": "close-negotiate",
            "title": "Negotiation Sequencing",
            "html": "<h3>After They Make an Offer</h3>\n<p>Don't negotiate in the interview. Get the offer first, then negotiate from strength.</p>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Sequencing</div>\n        <ol>\n          <li><strong>Receive offer → Express enthusiasm (but don't accept)</strong>: \"I'm really excited about this. Thank you. I'd like to take 48 hours to review the details carefully — this is an important decision for both of us.\"</li>\n          <li><strong>Review with your advisor / lawyer:</strong> Equity terms need legal review. Vesting, acceleration, dilution protection, valuation methodology — these matter enormously.</li>\n          <li><strong>Counter on 2–3 points max:</strong> Don't nickel-and-dime. Pick the 2–3 things that matter most (likely equity % and acceleration clause) and make a clean counter.</li>\n          <li><strong>Frame every ask as mutual benefit:</strong> \"I want to be aligned with the company's success. An acceleration clause means I'm incentivized to drive the exit value as high as possible — that benefits both of us.\"</li>\n        </ol>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">What to Negotiate (Priority Order)</div>\n        <table>\n          <tr><th>Item</th><th>Your Target</th><th>Rationale</th></tr>\n          <tr><td><strong>Equity %</strong></td><td>5–8% (anchor at 8%)</td><td>See Compensation section — backed by 7 independent sources</td></tr>\n          <tr><td><strong>Acceleration on exit</strong></td><td>Double-trigger acceleration</td><td>If company sells and you're terminated, unvested equity accelerates</td></tr>\n          <tr><td><strong>Anti-dilution</strong></td><td>Weighted-average anti-dilution</td><td>Protects if they raise capital pre-exit</td></tr>\n          <tr><td><strong>Base salary</strong></td><td>Market rate for LA-area COO</td><td>Don't let equity replace cash. Base should be livable without the exit.</td></tr>\n          <tr><td><strong>Vesting schedule</strong></td><td>4-year with 1-year cliff</td><td>Standard. Push for monthly vesting after cliff (not quarterly).</td></tr>\n          <tr><td><strong>Decision authority</strong></td><td>Written V/I accountability chart</td><td>Non-negotiable. Define authority before starting.</td></tr>\n        </table>\n      </div>"

            "html": "<h3>Option A — Short and warm</h3>\n\n<div class=\"card\">\n<p><strong>Subject:</strong> good stuff today</p>\n<pre style=\"white-space: pre-wrap; font-family: inherit; background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 8px; line-height: 1.6;\">\nKevin,\n\nThanks for the time today — two hours went fast. Loved hearing about the body panel launch and the conviction behind that $500k PO on zero sales. That kind of confidence only comes from actually knowing the data, which is clearly your thing.\n\nThe CX piece has been on my mind since we hung up. All those calls recorded and nobody mining them yet feels like one of those things that just needs someone to own it.\n\nAlso — I ordered the face mask a couple weeks back and have been going through the whole customer experience. Got some notes and screenshots I put together if you're interested — nothing crazy, just stuff I noticed going through the funnel as a real buyer.\n\nExcited for the onsite. Send the NDA whenever.\n\nTrey\n</pre>\n</div>\n\n<h3>Option B — More conversational, leads with personal</h3>\n\n<div class=\"card\">\n<p><strong>Subject:</strong> thanks for today</p>\n<pre style=\"white-space: pre-wrap; font-family: inherit; background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 8px; line-height: 1.6;\">\nKevin,\n\nHappy belated birthday btw — forgot to say that properly earlier. 35 is a good year, especially with the stuff you've got lined up.\n\nReally enjoyed today. Wasn't expecting to get that deep into channel strategy and return rate math, but that was honestly the most fun part. The way you think about SKU-to-channel fit is something most operators at 10x your revenue still haven't figured out.\n\nOne thing I can't stop thinking about — you mentioned all the CX calls are recorded and transcribed but nobody's actually analyzing them. That's the kind of thing that drives me crazy in a good way. There's definitely something there.\n\nSide note — I bought the face mask a few weeks ago and went through the whole experience as a customer. Put together some quick notes + screenshots on what I saw. Happy to send if helpful.\n\nLooking forward to the office visit — send the NDA over whenever works.\n\nTrey\n</pre>\n</div>\n\n<h3>Option C — Shortest, most casual</h3>\n\n<div class=\"card\">\n<p><strong>Subject:</strong> quick follow up</p>\n<pre style=\"white-space: pre-wrap; font-family: inherit; background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 8px; line-height: 1.6;\">\nKevin,\n\nGreat talking today. Few things still rattling around in my head —\n\nThat return rate drop from 17 to 10 just from adding friction and scripts is impressive. And the fact that all those calls are recorded but nobody's running any analysis on them yet — feels like there's a lot more in there.\n\nAlso been going through the customer journey myself since I ordered the face mask. Took some notes and screenshots along the way — nothing formal, but happy to share if you want a customer's perspective on the experience.\n\nReady for the onsite whenever. NDA is no problem.\n\nTrey\n</pre>\n</div>\n\n<p class=\"muted\"><strong>Recommendation:</strong> Option B is probably the strongest — the birthday callback is natural and personal, the channel strategy comment is a genuine compliment (not a recap), and the CX data point shows you're already thinking about problems to solve. All three versions offer the customer experience doc without being pushy about it.</p>\n\n<p class=\"muted\"><strong>Next step:</strong> Create a short doc (PDF or Google Doc) with 5-8 screenshots + observations from your face mask customer experience — unboxing, email sequence, app, website, the branding issue you flagged. Link it in the email or offer to send separately.</p>"
