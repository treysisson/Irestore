            "id": "ans-90day",
            "title": "First 90 Days",
            "html": "<h3>\"What would your first 90 days look like?\"</h3>\n      <div class=\"answer-block\">\n        <strong>Model Answer:</strong> \"I'd break it into three phases. Days 1–30 is all listening: shadow every department, audit the EOS implementation, map the end-to-end order flow from Shenzhen to the customer's door, and review the P&L line by line with your fractional CFO. I'm not making changes yet — I'm building the diagnostic. Days 30–60, I execute 2–3 quick wins from what I found, stand up a weekly ops dashboard, and start documenting the critical SOPs. I'd also start reducing your meeting load by owning agendas and decisions you're currently attending. Days 60–90, I present the gross margin improvement plan, push EOS to full implementation, and deliver the first board-ready ops scorecard. The key mindset is: after 90 days I'll know what to fix, I'll have fixed the easy stuff, and I'll have a credible plan for everything else.\"\n      </div>\n      <h3>Study Notes — What to Align To</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">JD Scorecard Alignment</div>\n        <ul>\n          <li>The JD says <strong>90-Day Expectations:</strong> complete operational audit, identify top 5 improvements, build relationships with direct reports, take ownership of operational meetings, present 12-month roadmap</li>\n          <li>The 6-Month Targets: 100% of strategic initiatives have execution plans, CEO operational time reduced 50%, 80% of operations documented with SOPs</li>\n          <li><strong>Match your answer to these specific metrics</strong> — Kevin wrote them, so they're exactly what he's measuring</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">What Kevin Specifically Wants to Hear</div>\n        <ul>\n          <li><strong>\"Free me up\":</strong> Kevin explicitly said he wants to focus on innovation, AI, sales, and relationships. Your 90-day plan should show how you take ops meetings, decisions, and day-to-day off his plate.</li>\n          <li><strong>EOS implementation:</strong> Kevin said they're at ~60% EOS adoption. He wants full implementation. Mention V/TO, L10 meetings, Issues List, Rocks, Scorecards.</li>\n          <li><strong>Relationship-first:</strong> Kevin has said he's \"always afraid of adding too many layers\" and values player-coaches. Your answer should emphasize listening first.</li>\n          <li><strong>Quick wins matter:</strong> Show you can deliver value within 30–60 days, not just \"audit and plan\"</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Potential Quick Wins to Reference</div>\n        <ul>\n          <li>Weekly ops dashboard (they probably don't have one)</li>\n          <li>Returns analysis — identify top 3 return reasons and fix the #1 cause</li>\n          <li>Implement a proper S&OP cadence (monthly demand-supply alignment meeting)</li>\n          <li>SOP documentation for the warehouse — even basic pick/pack/ship SOPs reduce errors</li>\n          <li>Vendor payment term optimization (they have net-150 with dad's factory — explore if other suppliers have room)</li>\n        </ul>\n      </div>"

            "id": "ans-margin",
            "title": "Gross Margin Improvement",
            "html": "<h3>\"How would you approach improving gross margins by 3–5 points?\"</h3>\n      <div class=\"answer-block\">\n        <strong>Model Answer:</strong> \"I'd attack it from three angles. First, COGS: at $100M+ you have real leverage for volume-based renegotiation with component suppliers — even 2–3% on materials is meaningful. Second, a full OpEx audit: I'd go line by line through fulfillment, packaging, freight, software, and services spend. In my experience, companies at this growth stage haven't had anyone pressure-testing every line item — you find things like packaging that's oversized for the product driving up dimensional weight charges, software subscriptions that overlapped after a migration, freight contracts that haven't been rebid in two years. It's not glamorous, but a thorough audit at your scale typically finds 2–4 points. Third, returns: your scorecard targets &lt;8%, which tells me you're probably north of 10% today. In beauty devices, most returns are 'I don't see results yet' — that's solvable with better onboarding content, video QR codes in packaging, and a save-the-sale team. Each point of return reduction at your scale is roughly $1.4M straight to the bottom line — just hitting the &lt;8% target could be worth $3M. I'd model all three, prioritize by speed-to-impact, and set up a margin dashboard that the whole team can see.\"\n      </div>\n      <h3>Study Notes — The Full Margin Playbook</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">OpEx Audit — Where to Look</div>\n        <ul>\n          <li><strong>Packaging & dim weight:</strong> Oversized boxes drive up FBA fees and carrier costs. Redesigning packaging to fit the product tightly can save 10–20% on per-unit shipping. At iRESTORE's volume this could be six figures annually.</li>\n          <li><strong>Freight & logistics:</strong> Inbound freight contracts from Shenzhen should be rebid annually. Ocean vs air mix, consolidation strategy, and port selection (LA vs Long Beach vs alternatives) all have margin impact.</li>\n          <li><strong>Software & SaaS:</strong> Fast-growing companies accumulate overlapping tools — multiple analytics platforms, unused seats, legacy subscriptions from before migrations. A full SaaS audit typically finds 15–25% waste.</li>\n          <li><strong>3PL & fulfillment fees:</strong> As volume grows, fulfillment rates should be renegotiated. Most 3PL contracts have volume tiers that companies don't proactively trigger.</li>\n          <li><strong>Returns processing:</strong> The cost of processing a return (inspection, repackaging, restocking or disposal) is often 20–30% of the product's value. Reducing return volume is a margin lever; so is reducing per-return processing cost.</li>\n          <li><strong>The meta-point for Kevin:</strong> This is a COO's bread and butter. A founder scaling from $30M to $90M at 80% YoY hasn't had time to optimize — they've been in growth mode. That's the opportunity.</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">COGS Breakdown (Estimated at 25%)</div>\n        <ul>\n          <li>Manufacturing (Shenzhen): probably 15–18% of revenue (electronics + LED/laser components + assembly)</li>\n          <li>Packaging: 2–3%</li>\n          <li>Freight & duties (inbound from China): ~6%</li>\n          <li>iRESTORE advantage: father's factory gives them below-market COGS, net-150 payment terms, and quality control</li>\n          <li><strong>Lever:</strong> Component sourcing (LEDs, laser diodes, plastics) — these can be renegotiated at $100M+ scale</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Returns Reduction (Estimated ~10%, scorecard target &lt;8%)</div>\n        <ul>\n          <li>Hair growth devices have a unique problem: results take 3–6 months. Many returns are \"I don't see results yet\"</li>\n          <li><strong>Solutions:</strong> better onboarding email sequence (set expectations on timeline), progress tracking app, QR code to video content in packaging, \"save the sale\" team that calls before processing returns</li>\n          <li>Each 1pp reduction in returns at ~$140M gross = <strong>$1.4M</strong> saved</li>\n          <li>Hitting the scorecard target (&lt;8%) alone = <strong>$2.8M+</strong> to the bottom line</li>\n          <li>Industry benchmark for electronics/beauty devices: 6–8% return rate is a realistic first target; 3–4% is aspirational</li>\n        </ul>\n      </div>"
          },

            "id": "ans-intl",
            "title": "Internationalization",
            "html": "<h3>\"How would you approach internationalization?\"</h3>\n      <div class=\"answer-block\">\n        <strong>Model Answer:</strong> \"I'd think about it in three tiers based on regulatory friction, market size, and entry cost. Tier 1 is UK/Australia — English-speaking, Amazon marketplace exists, lighter regulatory path. You could be live in 6 months. Tier 2 is South Korea and Japan — massive markets but 12–18 month regulatory timelines, so you start the process now. Tier 3 is everything else. The key principle is: use Amazon marketplaces as beachheads. It's the lowest-risk way to test demand before committing to local DTC, local 3PL, and local teams. CurrentBody proved this model — they're at £128M with 75% international revenue.\"\n      </div>\n      <h3>Study Notes — Market-by-Market Intelligence</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">Why This Matters to Kevin</div>\n        <ul>\n          <li>Kevin explicitly said international is a growth priority. He mentioned looking at Korea and Japan.</li>\n          <li>CurrentBody (UK competitor) is his benchmark — they scaled to £128M with 75% international. He wants to replicate that.</li>\n          <li>Kevin's father's Shenzhen factory makes Asia-Pacific expansion logistically easier (shorter supply chain)</li>\n          <li>The new Head of PD speaks native Mandarin — this helps with Asia market product adaptation</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Tier 1: UK/Australia (6 months to live)</div>\n        <ul>\n          <li><strong>UK:</strong> Amazon UK marketplace (existing infrastructure), UKCA marking required (like CE mark), English language, GBP pricing. Market size: ~$200M for hair growth devices.</li>\n          <li><strong>Australia:</strong> TGA (Therapeutic Goods Administration) classifies LED devices as medical devices, but lower-risk pathway. Amazon Australia marketplace exists. AUD pricing.</li>\n          <li><strong>Entry cost:</strong> $10K–$50K per market (mostly regulatory + localized listings)</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Tier 2: South Korea & Japan (12–36 months)</div>\n        <ul>\n          <li><strong>South Korea:</strong> $1.7B hair care market, tech-savvy consumers, strong beauty device adoption. MFDS Class II approval (6–12 months, $32K–$120K). Coupang + Gmarket as distribution channels.</li>\n          <li><strong>Japan:</strong> $2.4B hair care market, aging population, high willingness to pay for premium health devices. PMDA Shonin approval (12–36 months, $37K–$250K). Amazon Japan as primary channel.</li>\n          <li><strong>See Regulatory section for full detail on both markets</strong></li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Amazon Beachhead Strategy</div>\n        <ul>\n          <li><strong>Why Amazon first:</strong> Built-in traffic, FBA handles fulfillment, lower upfront investment, tests real demand before committing to DTC</li>\n          <li><strong>CurrentBody's playbook:</strong> They launched via Amazon in each new market, validated demand, then built local DTC + retail</li>\n          <li><strong>Key metric to test:</strong> If Amazon sales in a new market hit $500K+ in Year 1, it justifies DTC investment</li>\n        </ul>\n      </div>"
          },

            "id": "ans-ceo",
            "title": "Managing a Visionary CEO",
            "html": "<h3>\"How do you handle a CEO who fires too many ideas at the team?\"</h3>\n      <div class=\"answer-block\">\n        <strong>Model Answer:</strong> \"I've worked with visionary founders before, and the pattern is always the same — the ideas are usually good, but the team can't absorb them at the rate they come. My approach is to be the filter, not the blocker. I'd create a simple system: every idea goes into a prioritized backlog. Weekly, we review the top 3–5 against current capacity and strategic priorities. You still get to ideate freely — I just make sure the team only gets what they can actually execute well. The EOS framework actually has this built in with the Issues List and the V/TO. If we get EOS to 100%, this problem largely solves itself.\"\n      </div>\n      <h3>Study Notes — Kevin's Self-Awareness</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">What Kevin Has Said About This</div>\n        <ul>\n          <li>Kevin's 360 feedback confirmed this problem — team members interpret casual idea-sharing as directives</li>\n          <li>Kevin knows this is a weakness and says it's \"hard to contain\"</li>\n          <li>He explicitly wants someone who can be his <strong>\"filter\"</strong> — he used that word</li>\n          <li>The EOS framework has the Visionary/Integrator model built for exactly this dynamic</li>\n          <li>Kevin's personality: he's a creative thinker, high energy, tangential but insightful. He'll throw 10 ideas at you; your job is to identify the 2 that matter and kill the other 8 diplomatically.</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">EOS Mechanisms to Reference</div>\n        <ul>\n          <li><strong>V/TO (Vision/Traction Organizer):</strong> Aligns the whole company on core focus, 10-year target, 3-year picture, 1-year plan, rocks</li>\n          <li><strong>Issues List:</strong> Where ideas go to be IDS'd (Identify, Discuss, Solve) — not immediately actioned</li>\n          <li><strong>Rocks:</strong> 3–7 priorities per quarter. If an idea doesn't connect to a Rock, it goes on the backlog.</li>\n          <li><strong>L10 Meetings:</strong> Weekly Level 10 meetings with structured agenda. This is where you'd triage Kevin's ideas with the leadership team.</li>\n          <li>Kevin said they're at ~60% EOS implementation. Pushing to 100% is one of the JD's implicit expectations.</li>\n        </ul>\n      </div>"
          },

            "id": "ans-team",
            "title": "Building Through Transition",
            "html": "<h3>\"How would you approach building a team through a transition period?\"</h3>\n      <div class=\"answer-block\">\n        <strong>Model Answer:</strong> \"First 60 days, I don't make people changes — I observe and build relationships. Everyone gets a clean slate with me regardless of what I've heard. After 60 days, I'll have a clear picture of who's an A-player, who's a B that can become an A with coaching, and who's in the wrong seat. The priority is keeping the A-players — they need to see that this transition makes their lives better, not harder. For the B-players, I invest in coaching and clear expectations with a 90-day improvement window. The hardest part is acting quickly on the people who clearly aren't going to make it — delay there hurts the whole team's morale.\"\n      </div>\n      <h3>Study Notes — The Brandon Situation</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">Reading Between the Lines</div>\n        <ul>\n          <li><strong>Brandon (Ops Director) is likely the person you're replacing or restructuring around.</strong> Kevin didn't say this explicitly, but the subtext is clear.</li>\n          <li>Kevin's frustrations with Brandon: reactive not proactive, \"boxed in\" thinking, doesn't generate solutions, doesn't push back or challenge</li>\n          <li>However, Brandon has institutional knowledge and relationships. Don't trash him in the interview — Kevin might still like him personally.</li>\n          <li><strong>Safe framing:</strong> \"I'd want to understand what each person does well and where they need support. Sometimes people are in the wrong seat, not the wrong company.\"</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Kevin's Team Assessment Hints</div>\n        <ul>\n          <li>New Head of Product Development: Kevin is <strong>very happy</strong> with this hire — native Mandarin speaker, strong capability</li>\n          <li>Financial Controller: described positively, working well</li>\n          <li>Kevin's father: owns manufacturing facility, likely involved in operational decisions. Important stakeholder to manage.</li>\n          <li>Total team: ~80 FTE + 50 overseas + contractors = 100+ people. This is a meaningful leadership span.</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">EOS People Framework</div>\n        <ul>\n          <li><strong>Right Person, Right Seat (RPRS):</strong> EOS evaluates everyone on core values fit (Right Person) and role competency (Right Seat)</li>\n          <li><strong>GWC:</strong> Gets it, Wants it, has Capacity to do it. Quick test for whether someone belongs in their current role.</li>\n          <li><strong>People Analyzer:</strong> EOS tool that scores each person against core values + GWC. Use this language in your answer if you want to show EOS fluency.</li>\n        </ul>\n      </div>"
          },

            "html": "<h3>\"How would you set up an East Coast fulfillment node?\"</h3>\n      <div class=\"answer-block\">\n        <strong>Model Answer:</strong> \"I'd approach this as a build-vs-partner decision first. Given iRESTORE's current scale and the La Mirada warehouse already near capacity, I'd lean 3PL for the East Coast — it's faster to stand up, more flexible on capacity, and you're not managing two warehouse teams from Day 1. I'd evaluate 3PLs on three criteria: carrier rates from their location, technology integration with Fulfil.io, and their peak surge capacity. Location-wise, somewhere in the NJ/PA corridor gives you 1–2 day ground to 60% of the US population. The business case is straightforward: zone reduction saves 15–25% on outbound shipping, plus you get redundancy for the next Q4.\"\n      </div>"

            "id": "ans-ai",
            "title": "AI Adoption",
            "html": "<h3>\"How would you drive AI adoption across iRESTORE's operations?\"</h3>\n      <div class=\"answer-block\">\n        <strong>Model Answer:</strong> \"I'd start with the highest-ROI, lowest-risk applications. Customer service is the obvious first move — a well-trained AI chatbot handles Tier 0 inquiries (order status, return policy, basic troubleshooting), which probably represents 40–50% of inbound volume. That frees your human agents for the complex stuff — the long phone calls about 'is this working for me?' Second, demand forecasting — ML models that ingest Amazon BSR trends, ad spend, seasonality, and promotional calendars to produce better forecasts than spreadsheet-based planning. Third, dynamic pricing on DTC based on inventory levels and competitive positioning. The key is starting small, measuring impact, and scaling what works rather than trying to 'AI everything' at once.\"\n      </div>"

          {
            "id": "q-priority",
            "title": "Priority Questions (In Order)",
            "html": "<p class=\"muted\">These are the 9 questions you plan to ask, in this order. Each is framed to show strategic thinking while surfacing information you actually need.</p>\n\n<ol>\n        <li><strong>\"Can you help me understand the ops leadership structure? I saw reference to an SVP of Ops — is that Brandon, or is that a separate role? Is that person still with the company?\"</strong>\n        <br><span class=\"muted\">Why this matters: You need to understand the org chart you're inheriting. If an SVP Ops left recently, you want to know why — was it a performance issue, culture misfit, or scope change? This also clarifies Brandon's actual role and whether you'd be backfilling, restructuring, or building from scratch. Listen for: tone when discussing the departure, whether Kevin takes responsibility or externalizes it.</span></li>\n\n        <li><strong>\"You mentioned Japan and Korea as target markets. Have you started any regulatory groundwork — engaged MFDS or PMDA consultants, or mapped out the approval pathways?\"</strong>\n        <br><span class=\"muted\">Why this matters: You already know from your first conversation that Kevin said Japan is \"quite stringent\" and they're \"looking into it.\" This question shows you know the specific agencies (MFDS for Korea, PMDA for Japan) and are ready to drive the process. If they haven't started, it's a clear Day 1 project. If they have, you need to know what stage. Korea is the faster path (6–12 months for MFDS class II); Japan PMDA can take 12–24 months.</span></li>\n\n        <li><strong>\"What's the current channel mix — DTC, Amazon, Costco/wholesale — and how do you see that evolving over the next 1–2 years? And separately, how are you thinking about international vs. domestic as a growth axis?\"</strong>\n        <br><span class=\"muted\">Why this matters: Channel mix and geographic expansion are different strategic dimensions, but both shape how you allocate resources and build infrastructure. Amazon likely dominates revenue but at lower margins; DTC has better unit economics but higher CAC. Understanding Kevin's vision for the mix tells you where to focus operational investment. B2B/medspas could be a high-margin channel with different fulfillment needs. Listen for: whether he has specific targets or it's more aspirational.</span></li>\n\n        <li><strong>\"What's the device return rate running at? When units come back, are you able to refurbish and resell, or are returns a full write-off? I'd love to understand the top return reasons and what you've tried so far to bring the rate down.\"</strong>\n        <br><span class=\"muted\">Why this matters: The job scorecard targets &lt;8% returns, which implies the current rate is north of 10%. At $695–$1,395 per device, each percentage point of returns is ~$1.4M. This question shows you understand reverse logistics and its P&L impact. Listen for: whether they track return reasons rigorously, whether they have a \"save the sale\" process, and whether Costco's generous return policy is inflating the blended number. Refurbishment capability is a significant margin lever — if they're destroying returned units, that's a quick win.</span></li>\n\n        <li><strong>\"What's been the tariff impact on your import costs? Have you explored refund claims after the Supreme Court's IEEPA ruling in February?\"</strong>\n        <br><span class=\"muted\">Why this matters: On Feb 20, 2026, SCOTUS ruled 6–3 in <em>Learning Resources v. Trump</em> that IEEPA tariffs were unconstitutional. Importers may be eligible for refunds — estimated $175–$179B industry-wide. If iRESTORE imports from Shenzhen (they do), they likely paid significant IEEPA tariffs since 2025. Refund claims have filing deadlines — this is time-sensitive and could be a material cash recovery. Even raising this shows you're on top of current trade policy. Sources: <a href=\"https://www.scotusblog.com/2026/02/supreme-court-strikes-down-tariffs/\" target=\"_blank\">SCOTUSblog</a>, <a href=\"https://www.cnbc.com/2026/02/20/supreme-court-trump-tariff-decision-illegal-refunds.html\" target=\"_blank\">CNBC</a></span></li>\n\n        <li><strong>\"I want to talk about the working dynamic. What's the ideal cadence with a COO — daily standups, weekly 1:1s, async? And when we disagree on a direction — because we will — how do you want me to handle that?\"</strong>\n        <br><span class=\"muted\">Why this matters: Kevin has said he wants a \"partner and mentor, not just a report.\" This question takes that at face value and gets specific. The disagreement question is critical — it reveals whether Kevin truly wants pushback or just wants execution. His answer tells you how much autonomy you'll actually have. Also listen for: does he want you in the weeds with him or running the show independently? The answer shapes your first 90 days.</span></li>\n\n        <li><strong>\"I've been looking at LYMA — they're doing $48M with cold laser devices at $2,700–$6,000 price points, same LLLT technology platform you use for hair. Is cold laser on the skincare roadmap, or are you sticking with LED for now?\"</strong>\n        <br><span class=\"muted\">Why this matters: This shows you're thinking about product strategy, not just operations. LYMA's cold laser is 100x more powerful than LED panels and commands 2–4x iRESTORE's skincare pricing. iRESTORE already has LLLT expertise from hair devices — cold laser skincare could be a natural high-ASP extension. Kevin's answer reveals how ambitious the product roadmap is and whether the COO will have input on product strategy. If he's not aware of LYMA, you've just added value.</span></li>\n\n        <li><strong>\"Are you planning clinical trials for the beauty/skincare devices, or relying on the existing 510(k) pathway with predicate devices? Your hair device trial showing 43% growth in 16 weeks is a real differentiator — is the plan to replicate that for skincare?\"</strong>\n        <br><span class=\"muted\">Why this matters: iRESTORE ran their own <a href=\"https://clinicaltrials.gov/study/NCT03331003\" target=\"_blank\">clinical trial (NCT03331003)</a> for hair devices, which most competitors didn't do (they rely on predicate device data). If iRESTORE does the same for skincare/body, it's a massive competitive moat. If they're not planning to, that's a strategic conversation worth having. This also shows deep product knowledge that goes beyond surface-level research.</span></li>\n\n        <li><strong>\"Help me understand the CX team — I see roughly 50 agents in the Philippines, but also job postings in South America, Europe, and elsewhere. What's driving the geographic expansion? And how much AI have you incorporated into the support workflow so far?\"</strong>\n        <br><span class=\"muted\">Why this matters: A 50-person offshore CX team at $90M revenue suggests a high-touch model — which makes sense for $700–$1,400 devices where pre-sale education and post-sale support drive satisfaction and reduce returns. But if they're hiring globally, either they're chasing timezone coverage, cost-arbitraging against Philippines wages, or the team is growing faster than revenue justifies. The AI question is the real one: at this scale, AI-assisted CX (auto-triage, suggested responses, FAQ deflection, sentiment routing) can dramatically improve resolution time and reduce headcount needs. If they haven't started, that's a Day 1 initiative. If they have, you want to know what's working and what's not. This also lets you signal your AI fluency and connects to the \"grow capacity without growing headcount proportionally\" point from your mock answers.</span></li>\n      </ol>"
          },

            "id": "q-bank",
            "title": "Question Bank",
            "html": "<p class=\"muted\">Additional questions to consider — move any of these into your priority list as the conversation evolves.</p>\n\n<h3>Strategic & Vision</h3>\n<ul>\n        <li>\"What does the $300–500M revenue version of iRESTORE look like to you? How much of that is hair vs. skincare vs. B2B vs. international?\"</li>\n        <li>\"You mentioned Therabody as an aspirational comp. What specifically about their trajectory resonates — the product expansion, the retail distribution, or the category creation?\"</li>\n        <li>\"When you think about the exit in 2–4 years, are you leaning more toward strategic (L'Oréal, Shiseido type) or financial (PE) buyer? That shapes how we build.\"</li>\n        <li>\"What's the one thing that keeps you up at night about the business right now?\"</li>\n</ul>\n\n<h3>Operations & Execution</h3>\n<ul>\n        <li>\"Walk me through a typical product development cycle — from concept to shelf. Where are the bottlenecks?\"</li>\n        <li>\"What does your inventory planning process look like today? Who owns it?\"</li>\n        <li>\"How do you think about customer lifetime value? Do you have repeat purchase data? What does the post-purchase journey look like?\"</li>\n        <li>\"What's the biggest operational fire you've had to put out in the last 6 months besides Q4?\"</li>\n        <li>\"What's the current split between FBA and FBM on Amazon? And what's the margin difference between DTC, Amazon, and any wholesale channels like Costco?\"</li>\n</ul>\n\n<h3>Leadership & Relationship</h3>\n<ul>\n        <li>\"What happened with the people who didn't work out in senior roles before? What went wrong?\"</li>\n        <li>\"What does success look like for this role at the 6-month mark vs. the 12-month mark? What would make you say 'this was the right hire'?\"</li>\n        <li>\"You've talked about the evolution from doing to managing — what specifically would you want to hand off to a COO in the first 30 days?\"</li>\n        <li>\"What did you learn from the recent leadership transitions that should inform how we build the team going forward?\"</li>\n</ul>\n\n<h3>Deep Research / Show Your Homework</h3>\n<ul>\n        <li>\"You've talked about moving from being a device company to a beauty brand — how far along is that rebrand, and what's the next phase?\"</li>\n        <li>\"The Costco partnership was a massive lever. What other retail or distribution opportunities are you exploring?\"</li>\n        <li>\"How do you think about the body panel category? Is the goal to dominate like you did with hair devices?\"</li>\n        <li>\"Your clinical trial data showing 43% hair growth in 16 weeks is a real differentiator. How are you leveraging that in marketing vs. competitors who only have FDA clearance without their own clinical studies?\"</li>\n</ul>"

            "id": "ex-priorities",
            "title": "What to Say You'd Prioritize (First 90 Days)",
            "html": "<p>When Kevin asks \"what would you prioritize?\" — these five things map directly to his stated pain points. Deliver them in this order:</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">Priority 1: Free Kevin from the Operational Bottleneck</div>\n  <p><strong>Why it's #1:</strong> This is Kevin's most urgent need — he wants to stop being in every decision. In the first 30 days, take over L10 meeting facilitation, establish a \"Kevin only needs to know about X\" decision framework, and reduce his operational meeting load by 25–30%.</p>\n  <p><strong>Why it works:</strong> Kevin feels the relief immediately. This is the fastest way to earn trust because the impact is visceral, not theoretical.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Priority 2: Build Demand Planning / S&OP to Prevent Another Q4 Crisis</div>\n  <p><strong>Why it matters:</strong> The Q4 Costco warehouse crisis is the single biggest operational failure Kevin described — and the moment that crystallized Brandon's limitations. Standing up a proper S&OP cadence with scenario modeling and pre-positioned overflow capacity proves you think proactively.</p>\n  <p><strong>Kevin's own words:</strong> \"I wish he came up with solutions before Q4.\" This priority directly addresses that gap.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Priority 3: Get EOS from 60% → 80%</div>\n  <p><strong>Why it matters:</strong> Kevin invested in EOS but it stalled. The Integrator role IS the EOS engine — you own the Accountability Chart, you set Rocks at every level, you build scorecards for every department. Going from 60% to 80% in 90 days is ambitious but achievable, and it gives the whole org an operating rhythm that runs without Kevin.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Priority 4: Build Channel-Level P&L Visibility</div>\n  <p><strong>Why it matters:</strong> iRESTORE doesn't have true contribution margins by channel (DTC vs. Amazon vs. Costco vs. wholesale). You can't optimize what you can't measure. Working with the fractional CFO to build this is the foundation for every margin improvement and strategic channel decision.</p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Priority 5: Assess and Develop the Team for Scale</div>\n  <p><strong>Why it matters:</strong> Kevin exited \"many directors and up\" in the past 6–8 months. The remaining team is lean. You need honest assessments (Brandon especially), development plans, and to identify the 2–3 critical hires needed to support $200M+. Kevin said he wants someone who \"hires the best people\" — show him you think about org design, not just processes.</p>\n</div>\n\n<div class=\"answer-block\"><strong>How to frame it:</strong> \"My first 90 days would be listen-first — I won't make changes until I've earned trust and understood reality. But by Day 30 you'll have zero operational surprises. By Day 60 you'll have a demand planning system and an operational dashboard. By Day 90 you'll have an EOS-driven operating rhythm that runs without you, and I'll present a 12-month roadmap for getting to $200M.\"</div>"

            "id": "ex-90day",
            "title": "Exercise: 90-Day Plan",
            "html": "<h3>30-60-90 Day Framework for iRESTORE COO / Integrator</h3>\n<p>This plan is calibrated to iRESTORE's specific situation: ~$100M+ revenue, 80% YoY growth, EOS at 60% implementation, single warehouse in La Mirada, first COO hire ever, and a CEO/Visionary who wants to stop being the bottleneck.</p>\n\n      <div class=\"card\">\n        <div class=\"card-header\">📅 Days 1–30: LISTEN, LEARN & DIAGNOSE</div>\n        <p><strong>Theme:</strong> Earn trust, build relationships, understand reality before proposing anything.</p>\n        <h3>Week 1: Orientation & Relationship Building</h3>\n        <ul>\n          <li><strong>Kevin alignment meeting (Day 1):</strong> Agree on communication cadence (daily Slack check-in? weekly 1:1?), decision-making authority boundaries, first 90-day expectations. Confirm: \"What does success look like for me at Day 90?\"</li>\n          <li><strong>1:1 with every direct report (Days 2–5):</strong> Brandon (Ops), VP of Growth, Head of PD, Financial Controller, CS Team Lead. Ask each: \"What's working? What's broken? What would you fix if you had a magic wand? What are you afraid a new COO will change?\"</li>\n          <li><strong>La Mirada warehouse walk-through:</strong> Spend a full day on the floor. Understand pick/pack flow, inventory layout, shipping stations, bottlenecks. Ask warehouse team what slows them down.</li>\n          <li><strong>Meet the Philippines team (virtual):</strong> Understand Danica's operations, the CS team workflow, and how they coordinate with La Mirada.</li>\n        </ul>\n        <h3>Week 2: Data Immersion</h3>\n        <ul>\n          <li><strong>P&L deep-dive with fractional CFO:</strong> Get channel-level margins (DTC vs. Amazon vs. Costco vs. wholesale). Understand the actual contribution margin per channel — don't assume.</li>\n          <li><strong>EOS audit:</strong> Attend the Wednesday L10 meeting. Review the Vision/Traction Organizer (V/TO). Review existing scorecards, Rocks, and issues list. Identify what's working and what's theater.</li>\n          <li><strong>Fulfil.io ERP walk-through:</strong> Understand data quality, reporting capabilities, and what's manual vs. automated.</li>\n          <li><strong>Customer data review:</strong> NPS scores (if they exist), return rates by product/channel, CSAT trends, top customer complaints.</li>\n        </ul>\n        <h3>Weeks 3–4: Diagnostic & Quick-Win Identification</h3>\n        <ul>\n          <li><strong>Map end-to-end order flow:</strong> PO to Shenzhen → production (60–90 days) → ocean freight (30–35 days) → La Mirada → FBA/DTC/Costco. Identify every handoff, delay, and data gap.</li>\n          <li><strong>Identify 3–5 quick wins:</strong> Things you can fix in weeks, not months. Examples: consolidate a meeting that wastes everyone's time, fix a broken report, automate a manual process, resolve a vendor issue that's been lingering.</li>\n          <li><strong>Build your hypothesis list:</strong> \"I believe the biggest operational levers are X, Y, Z\" — to validate in Days 30–60.</li>\n        </ul>\n        <div class=\"answer-block\"><strong>Day 30 Deliverable:</strong> Operational Assessment Document presented to Kevin. Includes: current state diagnosis, prioritized gap list, quick-win roadmap, and hypothesis for the 3 biggest value-creation levers. Frame it as: \"Here's what I've learned, here's what I've already started fixing, and here's what I want to go deep on next.\"</div>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">📅 Days 30–60: QUICK WINS & BUILD FOUNDATION</div>\n        <p><strong>Theme:</strong> Demonstrate impact, establish operating rhythm, begin building the systems layer.</p>\n        <h3>Operating Rhythm (start Week 5, run permanently)</h3>\n        <ul>\n          <li><strong>Monday:</strong> Weekly Ops Dashboard review (you + direct reports). 30 min. Metrics: inventory health, fulfillment SLAs, CSAT, return rate, Amazon BSR, ad efficiency (ROAS/ACoS).</li>\n          <li><strong>Wednesday:</strong> L10 leadership meeting (existing EOS cadence). Take ownership of facilitating — this is the Integrator's meeting.</li>\n          <li><strong>Friday:</strong> Kevin 1:1 (30 min). Status, blockers, decisions needed. Goal: Kevin should have zero operational surprises.</li>\n        </ul>\n        <h3>Key Initiatives</h3>\n        <ul>\n          <li><strong>Execute quick wins (Weeks 5–6):</strong> Ship the 2–3 easiest improvements from your diagnostic. Build credibility through visible results before tackling hard problems.</li>\n          <li><strong>Ops Dashboard v1 (Week 5):</strong> Don't wait for perfect. Start with a Google Sheet or simple dashboard pulling from Fulfil.io + Amazon Seller Central + Shopify. Iterate weekly.</li>\n          <li><strong>SOP documentation kickoff (Week 6):</strong> Prioritize the top 10 most critical processes. Assign owners. Target: 80% documented within 6 months (per JD scorecard).</li>\n          <li><strong>Peak season planning for Q4 (if timing allows):</strong> Start the capacity planning that prevented last year's crisis. Model scenarios. Pre-arrange 3PL overflow. This is how you prove you're different from Brandon.</li>\n          <li><strong>Begin channel-level P&L analysis:</strong> Work with the fractional CFO to build true contribution margins by channel. This is the foundation for every margin improvement decision.</li>\n          <li><strong>Reduce Kevin's operational meeting load by 25%:</strong> Take over meeting agendas, own decisions below a defined threshold, and establish a \"Kevin only needs to know about X\" framework.</li>\n        </ul>\n        <div class=\"answer-block\"><strong>Day 60 Deliverable:</strong> Draft Operational Roadmap with 12-month milestones. Includes: 3–5 major initiatives with owners and timelines, KPI targets aligned to the JD scorecard, and investment requirements (headcount, tools, capex). Present to Kevin for alignment before the final push.</div>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">📅 Days 60–90: EXECUTE & SYSTEMATIZE</div>\n        <p><strong>Theme:</strong> Move from diagnosis to execution. Build the systems that scale.</p>\n        <h3>EOS Implementation Push</h3>\n        <ul>\n          <li><strong>Complete the Accountability Chart:</strong> Every seat has a name, every name has 5 roles. This is the org design that scales to $200M+.</li>\n          <li><strong>Establish L10s at every level:</strong> Leadership L10 (already exists), departmental L10s (new). The Integrator owns the rhythm.</li>\n          <li><strong>Set Q1 Rocks:</strong> 3–7 company Rocks, each department gets 3–5. These become the execution backbone for the next 90 days.</li>\n          <li><strong>Scorecards for every department:</strong> Weekly leading indicators, not monthly lagging ones. Each team should know by Wednesday if they're on/off track.</li>\n        </ul>\n        <h3>Major Initiative Launches</h3>\n        <ul>\n          <li><strong>Gross Margin Improvement Plan:</strong> Present a detailed plan targeting +3–5pp over 12 months. Include: COGS renegotiation leverage, channel mix optimization roadmap, returns reduction program. Each lever with estimated $ impact, timeline, and owner.</li>\n          <li><strong>Vendor/supplier renegotiations:</strong> Armed with 60 days of data, initiate renegotiations on top 5 cost lines. Leverage $100M+ volume for meaningful concessions.</li>\n          <li><strong>NPS / Customer feedback loop:</strong> Launch if it doesn't exist (JD target: NPS 70+). If it exists, review methodology and establish a closed-loop process where every detractor gets a follow-up.</li>\n          <li><strong>Second fulfillment node evaluation:</strong> Present a business case for East Coast 3PL. Include: transit time reduction, cost modeling, capacity insurance value, and implementation timeline.</li>\n        </ul>\n        <div class=\"answer-block\"><strong>Day 90 Deliverable:</strong> Full Strategic Execution Plan presented to Kevin (and potentially the fractional CFO). Includes: operational scorecard with baselines and targets, 4-quarter execution roadmap, org development plan (who to hire, who to develop, potential gaps), and the first Board-ready Ops Report. Frame it as: \"Here's what I've fixed, here's what I've built, and here's the 12-month plan to get us to $200M.\"</div>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">📊 Success Metrics by Day 90</div>\n        <table>\n          <tr><th>Metric</th><th>Day 1 Baseline</th><th>Day 90 Target</th></tr>\n          <tr><td>Kevin's operational meeting hours/week</td><td>15–20 hrs (est.)</td><td>Reduced by 25–30%</td></tr>\n          <tr><td>SOPs documented</td><td>~0% formal</td><td>Top 10 processes documented, owners assigned</td></tr>\n          <tr><td>EOS implementation</td><td>~60%</td><td>~80% (L10s, Rocks, Scorecards, Accountability Chart)</td></tr>\n          <tr><td>Ops Dashboard</td><td>None</td><td>Weekly dashboard with 10+ KPIs, reviewed in L10</td></tr>\n          <tr><td>Quick wins shipped</td><td>0</td><td>5+ visible improvements</td></tr>\n          <tr><td>Gross margin improvement plan</td><td>None</td><td>Detailed plan with $X impact modeled</td></tr>\n          <tr><td>Team trust / relationship</td><td>New person</td><td>Every direct report has a development plan</td></tr>\n        </table>\n      </div>\n\n      <div class=\"tip\"><strong>Interview framing:</strong> Don't promise everything in 90 days. Kevin values honesty over optimism. Frame it as: \"Here's what I'll know, what I'll have fixed, and what I'll have a plan for. The first 30 days are about earning trust and understanding reality — I won't make changes until I've listened to your team. But by Day 90, you'll have an operational system that runs without you being the bottleneck.\"</div>"

          {
            "id": "ex-demand",
            "title": "Scenario: Demand Planning (RAPID)",
            "html": "<h3>Scenario A: Demand Forecasting & Inventory Planning</h3>\n      <p>You're heading into Q4 with a new Costco.com launch, strong Amazon trends, and a DTC promo calendar. How do you build the demand plan?</p>\n\n      <p><span class=\"label\">Framework: RAPID</span> — an easy-to-remember framework for demand planning decisions. Also reference S&OP (Sales & Operations Planning) as the industry-standard monthly cadence.</p>\n\n      <div class=\"card\">\n        <div class=\"card-header\">RAPID Framework</div>\n        <ul>\n          <li><strong>R — Review Signals:</strong> Aggregate demand signals from every channel. Amazon BSR trends + PPC spend plans, DTC promo calendar, Costco PO commitments, wholesale pipeline. Weight each by historical accuracy.</li>\n          <li><strong>A — Align Supply:</strong> Map demand against manufacturing lead times (Shenzhen: ~60–90 days production + 30–35 days ocean freight). Identify the \"commit point\" — the last date to place a PO and have it arrive in time. This is the critical decision date.</li>\n          <li><strong>P — Position Inventory:</strong> Decide where to stage inventory. FBA has 90-day storage limits. 3PL gives flexibility but adds a shipment leg. Pre-position Costco allocation separately (their SLAs are non-negotiable).</li>\n          <li><strong>I — Identify Scenarios:</strong> Build three scenarios (base / upside / downside). Set safety stock to cover the gap between base and upside for top 5 SKUs. This is what prevents the Q4 crisis from happening again.</li>\n          <li><strong>D — Decide Together (Executive S&OP):</strong> Monthly review with Kevin where demand, supply, and finance align on one number. This is the meeting that prevents surprises. In EOS terms, this maps to the quarterly Rock-setting cadence.</li>\n        </ul>\n      </div>\n\n      <div class=\"tip\"><strong>Why RAPID works in an interview:</strong> It's memorable, it shows structured thinking, and each letter maps to a real operational step. S&OP is the textbook term; RAPID is how you explain it in 60 seconds.</div>\n\n      <div class=\"answer-block\"><strong>Sample Answer:</strong> \"The core issue is that demand planning can't be a Q3 exercise for Q4 — it has to be continuous. I use a framework I call RAPID: Review demand signals across channels, Align supply against lead times, Position inventory by channel, Identify upside/downside scenarios with safety stock, and Decide together in a monthly S&OP meeting with the leadership team. For iRESTORE, the critical piece is the 'commit point' — with 60–90 day production lead times in Shenzhen plus 30 days of ocean freight, you need to be making Q4 decisions in early Q2. That's the cadence that prevents surprises.\"</div>"
          },
          {
            "id": "ex-fulfillment",
            "title": "Scenario: Warehouse Crisis (Q4)",
            "html": "<h3>What Actually Happened</h3>\n\n<div class=\"warning\"><strong>This is Kevin's defining operational frustration.</strong> It's the story he told to explain why he's hiring a COO. Every detail of your answer will be measured against this real experience.</div>\n\n<p>Costco ran a promotion that 10x'd their forecast volume. Because Costco has a <strong>1-day SLA</strong> (non-negotiable — miss it and you risk losing the account), the La Mirada warehouse had to prioritize Costco fulfillment. All DTC orders backed up for ~2 weeks. Customer complaints spiked. Amazon seller metrics started degrading. The warehouse was at capacity, the staffing agency couldn't provide more people, and Brandon's response was <em>\"we can't do anything.\"</em></p>\n\n<p><strong>The real problem wasn't inventory</strong> — they had product. It was a <strong>throughput crisis</strong> at their own facility: not enough labor, not enough packing stations, no contingency plan, and no one had modeled what would happen if two channels peaked simultaneously. The deeper failure: nobody was doing capacity planning or scenario modeling for peak. Brandon was managing reactively, week to week.</p>\n\n<h3>The Capacity Math (Know These Numbers)</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">La Mirada Warehouse: Estimated Throughput Model</div>\n  <table>\n    <tr><th>Metric</th><th>Normal Day</th><th>Peak Day (Q4)</th><th>Crisis Day (Costco Promo)</th></tr>\n    <tr><td>Total daily orders</td><td>~1,500–2,000</td><td>~4,000–5,000</td><td>~8,000–12,000</td></tr>\n    <tr><td>DTC orders</td><td>~800</td><td>~2,000</td><td>~2,000 (backed up)</td></tr>\n    <tr><td>Amazon FBA replen</td><td>~400 cases</td><td>~800 cases</td><td>~800 cases</td></tr>\n    <tr><td>Costco bulk</td><td>~200 pallets/wk</td><td>~500 pallets/wk</td><td>~2,000+ pallets/wk</td></tr>\n    <tr><td>Pick/pack stations</td><td>~10–12</td><td>~10–12 (same)</td><td>~10–12 (same)</td></tr>\n    <tr><td>Warehouse staff</td><td>~20–25</td><td>~30–35 (temp surge)</td><td>~30–35 (maxed out)</td></tr>\n    <tr><td>Throughput per person/day</td><td>~80–100 orders</td><td>~80–100 orders</td><td>~80–100 orders</td></tr>\n    <tr><td><strong>Max daily capacity</strong></td><td><strong>~2,500</strong></td><td><strong>~3,500</strong></td><td><strong>~3,500 (need 8,000+)</strong></td></tr>\n  </table>\n  <p><strong>The gap:</strong> On the crisis day, they needed 2–3x their maximum throughput. No amount of \"working harder\" closes that gap. This is a <strong>structural capacity problem</strong> that requires structural solutions.</p>\n</div>\n\n<h3>Phase 1: How to Prevent It (Q2–Q3 Planning)</h3>\n\n<p>This is the part that demonstrates you're a different kind of operator than Brandon. You don't wait for Q4 to think about Q4.</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">Step 1: Build the Peak Scenario Model (April–May)</div>\n  <p>Start with last year's Q4 data. Then layer in growth assumptions:</p>\n  <ul>\n    <li><strong>Base case:</strong> 40% over last Q4 (consistent with 80% YoY growth, seasonally weighted)</li>\n    <li><strong>Upside case:</strong> 80% over last Q4 (if Costco promotion + Amazon holiday + DTC Black Friday all peak simultaneously)</li>\n    <li><strong>Stress case:</strong> Single channel does 5–10x forecast for 1–2 weeks (exactly what happened)</li>\n  </ul>\n  <p>For each scenario, calculate: daily orders by channel, required pick/pack labor hours, packing station utilization, and carrier pickup capacity. The output is a simple table: <strong>\"On our worst day, we need X people, Y stations, and Z carrier pickups. Today we can do A, B, C. The gap is D, E, F.\"</strong></p>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Step 2: Pre-Position Surge Labor (June–July)</div>\n  <p><strong>The principle:</strong> Never rely on one source for anything. Two agencies, two platforms, two plans.</p>\n  <ul>\n    <li><strong>Traditional temp agencies (contract by July):</strong>\n      <ul>\n        <li><strong>Randstad</strong> or <strong>Robert Half</strong> — national players with LA warehouse divisions. Reliable but slower (48–72 hr lead time). Best for planned surge weeks.</li>\n        <li><strong>A local agency</strong> near La Mirada (e.g., Great Hire Staffing in the Cerritos/La Mirada corridor). Smaller but faster — they know the local labor pool. Often can get bodies in 24 hours.</li>\n        <li>Pre-negotiate rates: $18–22/hr fully loaded. Have a standing agreement: \"We'll need 15–20 people for 6–8 weeks starting mid-October. Here's the job description. Pre-screen them now.\"</li>\n      </ul>\n    </li>\n    <li><strong>On-demand labor platforms (set up accounts by August):</strong>\n      <ul>\n        <li><strong>Instawork</strong> — 7M+ workers, strong in LA warehouse shifts. Post shifts and get workers within hours. No long-term commitment. Best for \"we need 10 people tomorrow\" situations.</li>\n        <li><strong>Veryable</strong> — purpose-built for warehouse/manufacturing surge. Workers bid on shifts. Next-day labor. Good for ongoing flex capacity.</li>\n        <li><strong>Wonolo</strong> — similar model, specializes in warehousing. Post a shift at 6 PM, have workers at 6 AM.</li>\n        <li><strong>Why platforms + agencies:</strong> Agencies are better for multi-week commitments (consistency). Platforms are better for day-of surge (speed). Use both.</li>\n      </ul>\n    </li>\n    <li><strong>Internal \"friends and family\" list:</strong> Ask every warehouse employee to identify 2–3 people they'd vouch for who could work a temp shift. Pre-collect names and phone numbers. Offer a $100 referral bonus per person who works a full week. This is the fastest, cheapest labor source and Kevin explicitly wished Brandon had done this.</li>\n    <li><strong>College/community labor:</strong> La Mirada is near Biola University, Cerritos College, and Cal State Fullerton. Post to campus job boards in September: \"$20/hr, flexible shifts, Oct–Dec.\" College students are reliable for evening/weekend shifts.</li>\n  </ul>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Step 2b: Pre-Position Overflow Fulfillment (June–July)</div>\n  <ul>\n    <li><strong>Local 3PL on retainer:</strong>\n      <ul>\n        <li><strong>OLIMP Warehousing</strong> (LA) — month-to-month flex space, no long-term commitment. Scale up/down seasonally. Good for DTC overflow.</li>\n        <li><strong>Ideal Fulfillment</strong> (near LA) — offers temporary overflow storage from 1 pallet to 1,000+. Can handle pick/pack for simple SKUs.</li>\n        <li><strong>AP Express</strong> — 2.1M sq ft across West Coast, same-day shipping capability. Larger operation if you need significant overflow.</li>\n        <li><strong>Deal structure:</strong> ~$5–10K/month retainer for Q4 (Sep–Dec) guarantees you 10,000 sq ft + pick/pack labor within 72 hours of activation. Total insurance cost: $20–40K. One week of DTC backlog costs $500K+ in lost sales, refunds, and brand damage. This is the cheapest insurance you'll ever buy.</li>\n      </ul>\n    </li>\n    <li><strong>What to send to the 3PL:</strong> Pre-stage your top 5 DTC SKUs (by volume) at the overflow facility starting October 1. These represent ~70% of DTC orders. Simple products, one-item shipments. The 3PL can handle these without deep training. Keep bundles, custom orders, and Costco pallets in-house where your team knows the process.</li>\n  </ul>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Step 2c: Physical Surge Readiness (August)</div>\n  <ul>\n    <li><strong>Second shift plan:</strong> Document a ready-to-activate shift: 4 PM – midnight, staggered with first shift for 1-hour overlap at handoff. Pre-identify 2–3 shift leads from your best existing workers (offer them a $3/hr shift differential + \"Lead\" title). Have the pay rates, break schedules, and security access pre-approved. <strong>Drill it in September</strong> — run one test week of second shift before Q4 starts.</li>\n    <li><strong>Weekend shifts:</strong> Pre-approve Saturday shifts (time-and-a-half) for the Oct–Dec window. Some warehouse employees will volunteer for the overtime. Have a sign-up sheet ready in September.</li>\n    <li><strong>Portable packing stations:</strong> Order 8–10 folding tables, extra tape guns, shipping scale stations, label printers. Store them flat against a wall. Total cost: ~$2,500. Deploy in 30 minutes. This alone buys you 40–50% more packing throughput. Also: buy extra PPE (gloves, box cutters, safety vests) for temp workers.</li>\n    <li><strong>Pop-up workspace:</strong> Identify the parking lot or adjacent space where you could set up a tent/canopy for overflow staging. A 20×40 commercial tent rental: ~$500–800/week. Not glamorous, but it gives you 800 sq ft of staging area for outbound pallets, freeing up floor space inside for pick/pack.</li>\n    <li><strong>Pre-printed training cards:</strong> Laminated 1-page SOPs for each station (pick path, pack process, label application, QC check). Temp workers can be productive within 30 minutes instead of 2 hours. Include photos, not just text.</li>\n  </ul>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Step 3: Channel-Specific Playbooks (August)</div>\n  <p>Write these down. Laminate them. Put them on the warehouse wall.</p>\n  <ul>\n    <li><strong>Costco surge playbook:</strong> When Costco PO exceeds X pallets/week → trigger overflow 3PL, activate second shift, notify DTC team to extend shipping estimates by 2 days, pre-draft customer communication email.</li>\n    <li><strong>Amazon FBA crunch playbook:</strong> When FBA inbound shipment windows overlap with peak → pre-ship FBA inventory in September (before storage penalties kick in Oct 1), use Amazon's partnered carrier program for priority check-in.</li>\n    <li><strong>DTC Black Friday playbook:</strong> Pre-pick top 5 SKUs in \"grab and go\" kits, stage near shipping stations. Pre-print shipping labels for subscription renewals. This alone can increase DTC throughput 30–40%.</li>\n  </ul>\n</div>\n\n<h3>Phase 2: When Crisis Hits Anyway (Real-Time Triage)</h3>\n\n<p>Even with planning, something will go wrong. Here's the decision tree:</p>\n\n<div class=\"card\">\n  <div class=\"card-header\">Hour 1–4: Assess and Quantify</div>\n  <ul>\n    <li><strong>Quantify the backlog in hours, not orders.</strong> \"We're 2,000 orders behind\" means nothing. \"At current throughput, we're 36 hours behind and falling further\" — that's actionable.</li>\n    <li><strong>Identify the specific bottleneck:</strong> Is it pick labor? Pack stations? Carrier pickup windows? Inventory in wrong zone? Each has a different solution.</li>\n    <li><strong>Calculate the bleed rate:</strong> How many more orders are coming in per hour vs. how many we're shipping? If inbound > outbound, the backlog grows. You need to know the crossover point.</li>\n  </ul>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Hour 4–24: Activate Everything (Simultaneously)</div>\n  <p>Don't sequence these — launch all at once. You need bodies, space, and throughput as fast as possible.</p>\n  <ul>\n    <li><strong>Call both temp agencies:</strong> \"I need 15 people tomorrow morning, 15 more the day after. Warehouse general labor, we'll train on site. Rate is $20/hr. This is the surge we discussed in July.\"</li>\n    <li><strong>Post shifts on Instawork + Veryable:</strong> \"Warehouse pick/pack, $22/hr, 6 AM – 2 PM, La Mirada. No experience needed.\" Higher rate than agencies because you need speed — platform workers can show up same-day or next-day.</li>\n    <li><strong>Text the friends-and-family list:</strong> \"We need extra hands this week. $20/hr, flexible hours, start tomorrow. Reply YES if interested.\" Brandon's team of 25 people, each with 2–3 contacts = 50–75 potential workers. Even a 20% response rate gives you 10–15 people within 24 hours.</li>\n    <li><strong>Activate 3PL overflow:</strong> Call OLIMP/Ideal/whoever you've contracted. \"We're activating the overflow agreement. Sending a truck with 500 units of our top 5 SKUs tomorrow morning, plus packing materials and labels. Your team picks, packs, and ships DTC orders from the file we'll send hourly via CSV.\"</li>\n    <li><strong>Stand up the second shift:</strong> Your pre-identified shift leads stay for 4 PM – midnight with a mix of experienced staff (voluntary OT) and platform workers. First night is 50% training, 50% productive. Second night is 80% productive.</li>\n    <li><strong>Pull office staff:</strong> Not to pick/pack (they'll be slow), but to: sort inbound, stage outbound pallets, apply shipping labels, run QC checks, answer CS tickets about delays. Everyone can contribute something. This also builds culture — \"we're all in this together.\"</li>\n    <li><strong>Rent a commercial tent:</strong> If staging space is the bottleneck, have a tent rental company on speed dial. A 20×40 tent in the parking lot: $500–800/week, up in 4 hours. Use it for outbound staging to free floor space for pick/pack.</li>\n    <li><strong>Negotiate extended carrier pickups:</strong> Call your UPS/FedEx rep. \"We need a second pickup at 8 PM for the next two weeks. We'll have 500+ additional packages per day.\" Carriers can often accommodate this — especially if you're already a high-volume shipper.</li>\n  </ul>\n</div>\n\n<div class=\"card\">\n  <div class=\"card-header\">Concurrent: Channel Priority Triage</div>\n  <table>\n    <tr><th>Priority</th><th>Channel</th><th>Why</th><th>Action</th></tr>\n    <tr><td>🔴 1</td><td>Costco</td><td>1-day SLA, account at risk</td><td>All available pallet labor → Costco first</td></tr>\n    <tr><td>🟠 2</td><td>Amazon FBA</td><td>Seller metrics degrade, Buy Box at risk</td><td>Ship FBA replenishments on schedule; FBM orders get 2-day extension</td></tr>\n    <tr><td>🟡 3</td><td>Amazon FBM</td><td>Customer-facing, but can extend handling time</td><td>Extend handling time to 3–5 days in Seller Central</td></tr>\n    <tr><td>🟢 4</td><td>DTC</td><td>You control the experience</td><td>Proactive email: \"Your order is confirmed — shipping in 5–7 days due to holiday volume\" + $10 discount code for next purchase</td></tr>\n  </table>\n  <p><strong>Key insight:</strong> DTC customers are the most forgiving IF you communicate proactively. A customer who gets a \"we're delayed\" email before they ask is 3x less likely to cancel than one who has to chase you. The discount code turns a negative experience into a retention play.</p>\n</div>\n\n<h3>The Prevention Budget (What All of This Costs)</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">Total Q4 Insurance Package</div>\n  <table>\n    <tr><th>Item</th><th>Cost</th><th>When to Commit</th></tr>\n    <tr><td>3PL overflow retainer (4 months: Sep–Dec)</td><td>$20–40K</td><td>July</td></tr>\n    <tr><td>Temp agency pre-screening & setup</td><td>$0 (they earn on placement)</td><td>July</td></tr>\n    <tr><td>On-demand platform setup (Instawork, Veryable)</td><td>$0 (pay per shift)</td><td>August</td></tr>\n    <tr><td>Portable packing stations + supplies</td><td>~$2,500</td><td>August</td></tr>\n    <tr><td>Extra PPE, label printers, training cards</td><td>~$1,500</td><td>August</td></tr>\n    <tr><td>Second shift test week (September drill)</td><td>~$5,000 (OT pay)</td><td>September</td></tr>\n    <tr><td>Referral bonus pool (warehouse friends & family)</td><td>~$3,000</td><td>October</td></tr>\n    <tr><td>Commercial tent rental (if needed, 4 weeks)</td><td>~$2,000–3,200</td><td>On activation</td></tr>\n    <tr><td><strong>Total prevention investment</strong></td><td><strong>$34K–55K</strong></td><td></td></tr>\n  </table>\n  <p><strong>Cost of NOT doing this:</strong> One week of DTC backlog = ~$500K–800K in delayed revenue, refund requests, and permanent customer loss. Amazon seller metric degradation = potential Buy Box loss on your highest-margin channel. Costco SLA miss = potential account review or loss of promotional placement worth millions. The prevention package costs less than what a single bad week costs in damage.</p>\n</div>\n\n<h3>Phase 3: Postmortem → Permanent Fix</h3>\n\n<div class=\"card\">\n  <div class=\"card-header\">The Structural Solution: Second Fulfillment Node</div>\n  <p>The Q4 crisis is the best business case for an <strong>East Coast 3PL</strong>. Here's how to frame it for Kevin:</p>\n  <ul>\n    <li><strong>Capacity insurance:</strong> Split DTC volume ~60/40 West/East. La Mirada never hits 100% again.</li>\n    <li><strong>Faster shipping:</strong> 2-day ground covers 80% of US population from two nodes vs. ~45% from LA alone. DTC conversion rate increases 5–10% with faster delivery promises.</li>\n    <li><strong>Geographic redundancy:</strong> Fire, earthquake, or labor dispute in LA doesn't shut down the company.</li>\n    <li><strong>Cost:</strong> A basic 3PL setup for DTC-only: ~$50–80K setup + $3–5 per order all-in. At 300K DTC orders/year with an East Coast split, that's ~$450K–750K annually. Pays for itself if it prevents one week of DTC backlog ($500K+ in lost sales and refunds) or improves conversion by even 3–5%.</li>\n  </ul>\n  <p><strong>Timeline:</strong> 3PL partner selection (30 days) → Integration and testing (60 days) → Soft launch with 10% of DTC volume (30 days) → Ramp to 40% (60 days). Total: ~6 months from decision to full operation. Start in Q1 to be ready for Q4.</p>\n</div>\n\n<h3>How to Present This to Kevin</h3>\n\n<div class=\"answer-block\"><strong>Sample Answer (60 seconds):</strong> \"What happened in Q4 wasn't a surprise — it was a capacity planning gap. The math tells the story: La Mirada's max throughput is roughly 3,500 orders a day. When Costco surged and DTC hit peak simultaneously, you needed 8,000+. No amount of hustle closes a 2x gap. Here's what I would have done differently: In Q2, I'd have modeled the peak scenarios and identified that gap. In Q3, I'd have pre-positioned two temp agencies, a local 3PL overflow partner on retainer, and a second-shift plan — total insurance cost maybe $15K. When the surge hit, I'd have activated all three within 24 hours, triaged by SLA priority — Costco first, Amazon second, DTC third with proactive customer communication. Then I'd have used the crisis as the business case for the permanent fix: a second East Coast fulfillment node that eliminates single-point-of-failure risk and improves DTC shipping speed. That's about a 6-month buildout, so starting now means it's operational before next Q4.\"</div>\n\n<div class=\"tip\"><strong>Why this answer wins:</strong> It shows the three things Kevin said Brandon lacked: (1) <strong>Proactive thinking</strong> — you would have seen it coming. (2) <strong>Creative problem-solving</strong> — you have a playbook, not \"we can't do anything.\" (3) <strong>Systems thinking</strong> — you solve it permanently, not just for this quarter. Bonus: you're speaking in dollars and timelines, not vague promises.</div>"

            "title": "Scenario: International Entry",
            "html": "<h3>Scenario D: International Market Entry</h3>\n      <p><span class=\"label\">Framework: Market Entry Decision Matrix</span></p>\n      <ul>\n        <li><strong>Market Assessment:</strong> TAM, regulatory path, competitive intensity, consumer readiness for price point.</li>\n        <li><strong>Channel Strategy:</strong> Amazon marketplace (quickest), local distributor (lowest risk), or own DTC site (highest margin)?</li>\n        <li><strong>Operations:</strong> Fulfillment from US vs. local 3PL? Customs/duties impact on margin?</li>\n        <li><strong>Financial Model:</strong> What revenue justifies the fixed cost? Payback period?</li>\n        <li><strong>Go/No-Go Criteria:</strong> Minimum margin threshold, regulatory timeline, competitive window, cannibalization risk.</li>\n      </ul>"
