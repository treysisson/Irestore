            "html": "<h3>Product Manufacturing — currently ~25% of net rev / $22.5M</h3>\n<ul>\n  <li><strong>Volume-based renegotiation:</strong> At $90M+, even 2–3% improvement on component pricing yields $450K–675K in savings. Periodic RFQ benchmarking against 2–3 alternative suppliers maintains competitive pricing.</li>\n  <li><strong>Value engineering:</strong> Systematic review of component specifications to identify simplifications that don't affect product efficacy. LED driver boards, housing materials, and connectors are typical targets.</li>\n  <li><strong>SKU rationalization:</strong> Fewer SKUs = longer production runs = lower per-unit manufacturing cost. Analysis of SKU productivity can identify bottom performers for potential discontinuation.</li>\n  <li><strong>Manufacturing relationship advantage:</strong> Current Shenzhen facility partnership with net-150 payment terms provides both cost and cash flow advantages. Maintaining this relationship while formalizing procurement processes optimizes both factors.</li>\n</ul>"

            "html": "<h3>Inbound Freight & Duties — currently ~6% / $5.4M</h3>\n<ul>\n  <li><strong>Container utilization:</strong> Optimize pallet configs and carton dimensions. 5% better utilization = $270K savings.</li>\n  <li><strong>Duty engineering:</strong> Review HTS classification. First Sale valuation can reduce dutiable value.</li>\n  <li><strong>Nearshoring for top SKUs:</strong> Evaluate Mexico assembly for 2–3 fastest-moving SKUs. Reduces transit from 35 days to 5, may reduce/eliminate duties under USMCA.</li>\n</ul>"

            "html": "<h3>Marketing & Customer Acquisition — currently ~19% / $17.1M</h3>\n<div class=\"tip\"><strong>Strategic note:</strong> In DTC ecommerce, marketing is the largest variable cost lever. Analyzing it separately from fixed OpEx reveals contribution margin — the unit economics of the business after acquiring and delivering to customers. A 33% CM indicates each revenue dollar generates $0.33 to cover fixed costs and profit.</div>\n<table>\n  <tr><th>Channel</th><th>Est. Spend</th><th>Optimization Opportunity</th></tr>\n  <tr><td>Amazon PPC</td><td>$7.0M (8%)</td><td>Target ACoS from ~15% to 12%. Better keyword segmentation, negative keywords, dayparting.</td></tr>\n  <tr><td>Meta/Google/TikTok</td><td>$6.5M (7%)</td><td>Creative testing velocity, AI-generated UGC, lookalike audiences from 600K customer base.</td></tr>\n  <tr><td>Influencer & Affiliates</td><td>$1.8M (2%)</td><td>Shift from paid posts to revenue-share/affiliate. Dermatologist partnerships for credibility.</td></tr>\n  <tr><td>PR, Events & Brand</td><td>$1.4M (1.5%)</td><td>Retail launch events (Costco roadshows), earned media via clinical study results.</td></tr>\n  <tr><td>Email/SMS/Retention</td><td>$0.5M (0.5%)</td><td>Post-purchase flows for serums/accessories. Move repeat rate from ~15% to 25% = $3–5M incremental at near-zero CAC.</td></tr>\n</table>"
          },
          {
            "id": "pnl-amazon",
            "title": "Lever: Amazon Fees (11.5%)",
            "html": "<h3>Amazon Fees — currently ~11.5% / $10.4M (referral $4.5M + FBA $5.9M)</h3>\n<ul>\n  <li><strong>Shift volume to DTC:</strong> Every $1M moved from Amazon to DTC saves ~$230K in combined referral + FBA fees, minus the cost of DTC fulfillment and payment processing (~$130K). Net ~$100K improvement per $1M shifted, before marketing costs.</li>\n  <li><strong>FBA inventory optimization:</strong> Just-in-time replenishment to avoid long-term storage fees. Keep IPI score high.</li>\n  <li><strong>Seller Fulfilled Prime:</strong> For oversized or slow-moving SKUs, SFP avoids FBA fees while keeping Prime badge.</li>\n  <li><strong>Amazon 60–70% of category:</strong> With dominant market share, iRESTORE has negotiating leverage for co-op advertising credits and promotional placement.</li>\n</ul>"

          {
            "id": "pnl-people",
            "title": "Lever: People (9%)",
            "html": "<h3>People — currently ~9% / $8.1M</h3>\n<ul>\n  <li><strong>Headcount:</strong> ~80 FTE + 50 overseas + contractors = 100+ total. ~$81K avg loaded cost per FTE equivalent.</li>\n  <li><strong>Nearshore Tier 1 CS:</strong> Move basic CS (order status, simple troubleshooting) to nearshore team (Mexico, Colombia). Keep Tier 2 onshore. Typical savings: 40–60% on CS labor.</li>\n  <li><strong>Performance-based comp:</strong> Align bonuses to contribution margin, not just revenue, to prevent growth-at-any-cost behavior.</li>\n  <li><strong>EOS structure:</strong> ~60% adopted per Kevin. Full rollout creates accountability without adding headcount.</li>\n</ul>"

            "id": "pnl-summary",
            "title": "Margin Improvement Roadmap",
            "html": "<table>\n  <tr><th>Lever</th><th>Current</th><th>Target</th><th>EBITDA Impact</th><th>Timeline</th><th>Difficulty</th></tr>\n  <tr><td>Reduce returns (10% → &lt;8%)</td><td>10%</td><td>&lt;8%</td><td>+$2.1–4.2M</td><td>6–12 mo</td><td>Medium</td></tr>\n  <tr><td>COGS renegotiation</td><td>33%</td><td>30–31%</td><td>+$1.8–2.7M</td><td>3–6 mo</td><td>Low</td></tr>\n  <tr><td>Marketing efficiency</td><td>19%</td><td>16–17%</td><td>+$1.8–2.7M</td><td>6–12 mo</td><td>Medium</td></tr>\n  <tr><td>Amazon PPC ACoS</td><td>~15%</td><td>12%</td><td>+$0.5–1.0M</td><td>3–6 mo</td><td>Low</td></tr>\n  <tr><td>DTC channel shift (+5pp)</td><td>~30%</td><td>35%</td><td>+$0.3–0.6M</td><td>12–18 mo</td><td>High</td></tr>\n  <tr><td>Freight optimization</td><td>6%</td><td>5%</td><td>+$0.5–0.9M</td><td>6–12 mo</td><td>Medium</td></tr>\n  <tr><td>East Coast fulfillment node</td><td>3%</td><td>2.5%</td><td>+$0.3–0.5M</td><td>6–9 mo</td><td>Medium</td></tr>\n  <tr><td>Amazon FBA optimization</td><td>6.5%</td><td>5.5%</td><td>+$0.5–0.9M</td><td>3–6 mo</td><td>Low</td></tr>\n  <tr><td>Lifecycle / repeat revenue</td><td>~15%</td><td>25%</td><td>+$1.0–2.0M</td><td>9–12 mo</td><td>Medium</td></tr>\n  <tr><td>People & CS optimization</td><td>9%</td><td>8%</td><td>+$0.5–0.9M</td><td>6–12 mo</td><td>Medium</td></tr>\n  <tr class=\"highlight-row\"><td><strong>TOTAL OPPORTUNITY</strong></td><td></td><td></td><td><strong>+$9.3–16.4M</strong></td><td><strong>12–18 mo</strong></td><td></td></tr>\n</table>\n<div class=\"tip\"><strong>Financial impact:</strong> At the midpoint of the opportunity range (~$13M improvement), EBITDA would expand from ~$14.3M (16%) to ~$27M (30%). This would translate to a <strong>$100–190M increase in enterprise value</strong> at 7.5–15x EBITDA multiples (industry M&A average: 14.9x EV/EBITDA). Successful execution requires data-driven decision-making by channel and disciplined execution across all levers.</div>\n\n<h3>Implementation Roadmap — Priority Actions</h3>\n<table>\n  <tr><th>Phase</th><th>Action</th><th>Expected Impact</th></tr>\n  <tr><td>Phase 1<br>(0–30 days)</td><td>Establish channel-level P&L visibility (Amazon vs. DTC vs. Costco vs. B2B)</td><td>Enable data-driven channel decisions</td></tr>\n  <tr><td>Phase 1<br>(0–30 days)</td><td>Return reason code analysis and root cause prioritization</td><td>Identify top 3 return drivers</td></tr>\n  <tr><td>Phase 2<br>(30–60 days)</td><td>Amazon PPC campaign audit and optimization (negative keywords, dayparting)</td><td>+$0.5–1.0M annualized EBITDA</td></tr>\n  <tr><td>Phase 2<br>(30–60 days)</td><td>Vendor benchmarking RFQ on top 5 components</td><td>+$0.3–0.5M annualized EBITDA</td></tr>\n  <tr><td>Phase 3<br>(60–90 days)</td><td>Launch customer retention program (pre-return intervention)</td><td>1–2pp return reduction</td></tr>\n  <tr><td>Phase 3<br>(60–90 days)</td><td>Develop post-purchase email/SMS flows for consumables</td><td>Repeat rate improvement +3–5pp</td></tr>\n</table>"

            "id": "risks-flags",
            "title": "Strategic Risk Analysis",
            "html": "<p>Scaling rapidly creates operational risks. The following are key risks to monitor and mitigate as iRESTORE executes on its growth strategy.</p>\n\n      <div class=\"card\">\n        <div class=\"card-header\">🚩 Founder Dependency & Decision Authority</div>\n        <p><strong>The risk:</strong> As founder and CEO, Kevin is the product visionary, involved in hiring decisions, product development, and operational decision-making. Clear delineation between visionary and operational decision-making is essential to prevent bottlenecks.</p>\n        <ul>\n          <li><strong>Impact:</strong> Unclear decision authority can slow execution, duplicate effort, and underutilize operational leadership.</li>\n          <li><strong>Mitigation:</strong> Implement EOS's Visionary/Integrator framework with an explicit accountability chart that defines who owns what. The Integrator (COO) should own all day-to-day operational decisions. The Visionary (CEO) owns product vision and strategic direction.</li>\n          <li><strong>Implementation:</strong> Establish a \"Same Page Meeting\" framework to align on decision rights, communication cadence, and conflict resolution processes.</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">🚩 Growth Rate vs. Infrastructure</div>\n        <p><strong>The risk:</strong> 80% YoY growth with ~60% EOS implementation means the company is scaling faster than its operational systems. The Q4 warehouse crisis and ongoing supply chain pressure demonstrate that infrastructure is lagging demand.</p>\n        <ul>\n          <li><strong>Impact:</strong> Operational fires consume leadership time, reduce execution quality, and increase customer friction (shipping delays, inventory mismatches, returns).</li>\n          <li><strong>Mitigation:</strong> Accelerate EOS implementation to build systematic decision-making, forecasting, and process discipline. Establish weekly operations scorecards to catch issues before they become crises.</li>\n          <li><strong>Opportunity:</strong> The gap between growth and infrastructure is where COO value is created. Prioritize: order-to-ship optimization, demand forecasting, and inventory management in the first 90 days.</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">🚩 Organizational Structure & Transition</div>\n        <p><strong>The risk:</strong> Adding a COO layer changes reporting structure. Existing operators (particularly Brandon, who has been the de facto operations leader) may perceive the role as duplicative or diminishing their authority.</p>\n        <ul>\n          <li><strong>Impact:</strong> Resistance to new processes, delays in implementation, and loss of institutional knowledge if key people disengage.</li>\n          <li><strong>Mitigation:</strong> Define clear, complementary roles using the EOS Visionary/Integrator model. The COO role is to organize and amplify the existing team through better systems and accountability, not to replace people. Establish a 30-day listening period before implementing structural changes.</li>\n          <li><strong>Implementation:</strong> Build the accountability chart collaboratively with existing leadership. Use the GWC framework (Gets it, Wants it, Capacity to do it) to ensure each person is in the right seat.</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">🚩 Exit Timeline & Strategic Planning</div>\n        <p><strong>The risk:</strong> A 2–4 year exit timeline with a 2-year earnout creates tension between short-term performance and long-term capability building. There is potential to over-prioritize \"acquirer-ready\" optics at the expense of substantive operational improvement.</p>\n        <ul>\n          <li><strong>Impact:</strong> Leadership may prioritize cosmetic improvements (documentation, dashboards) over efficiency gains and margin expansion.</li>\n          <li><strong>Mitigation:</strong> Recognize that what acquirers actually value (scalable systems, margin expansion, predictable execution) aligns with what makes the business stronger. Prioritize: (1) core process documentation, (2) profitability per unit, (3) customer retention metrics, (4) forecasting accuracy.</li>\n          <li><strong>Strategic implication:</strong> Exit timeline should inform roadmap prioritization but not distort operational priorities. The best exit strategy is operational excellence.</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">🚩 Organizational Capability Building</div>\n        <p><strong>The risk:</strong> With a 2–4 year exit timeline, there is pressure to optimize for near-term financial results rather than building sustainable organizational capability. This can create fragile processes that break under pressure or fail to survive a transition.</p>\n        <ul>\n          <li><strong>Impact:</strong> A buyer will discount the valuation if operations are overly dependent on a few individuals or if systems are underdeveloped.</li>\n          <li><strong>Mitigation:</strong> Build durable, documented systems and a strong management bench. Invest in: (1) accountability chart with clear role definitions, (2) process documentation at the 80% level, (3) weekly scorecards that create transparency, (4) leadership development for the next tier. This maximizes exit value and ensures continuity.</li>\n          <li><strong>Implementation:</strong> Make capability-building a Rock in the EOS planning process. Track: process completion rate, management readiness, and organizational health score.</li>\n        </ul>\n      </div>"
          }
        ]

            "id": "eos-overview",
            "title": "EOS Overview for iRESTORE",
            "html": "<p>The Entrepreneurial Operating System (EOS) is the framework Kevin has chosen for iRESTORE. It's ~60% implemented. Completing the EOS implementation is a core operational priority. The following outlines the framework components and current status.</p>\n\n      <div class=\"card\">\n        <div class=\"card-header\">The 6 Key Components of EOS</div>\n        <table>\n          <tr><th>Component</th><th>What It Is</th><th>iRESTORE Status (est.)</th><th>Implementation Priority</th></tr>\n          <tr><td><strong>Vision</strong></td><td>V/TO (Vision/Traction Organizer) — shared vision, 10-year target, 3-year picture, 1-year plan, quarterly Rocks</td><td>✅ Mostly done</td><td>Refine and pressure-test the numbers for strategic accuracy</td></tr>\n          <tr><td><strong>People</strong></td><td>Right People Right Seats (RPRS). GWC framework: Get it, Want it, Capacity to do it.</td><td>⚠️ Partially done. No formal accountability chart.</td><td>Build the accountability chart. Evaluate every seat with GWC assessment.</td></tr>\n          <tr><td><strong>Data</strong></td><td>Scorecard with 5–15 weekly numbers that tell you how the business is doing. Leading indicators, not lagging.</td><td>⚠️ Likely basic. No weekly ops dashboard exists.</td><td>Build the company Scorecard and department-level scorecards.</td></tr>\n          <tr><td><strong>Issues</strong></td><td>IDS (Identify, Discuss, Solve) process. Issues get surfaced in L10s and resolved, not just discussed.</td><td>✅ L10 meetings happen Wednesdays. IDS in use.</td><td>Strengthen discipline. Ensure issues are systematically resolved.</td></tr>\n          <tr><td><strong>Process</strong></td><td>Core processes documented and followed by all. The \"Process Component\" — 10–20 core processes.</td><td>❌ Likely the weakest. SOPs not documented (target: 80% level).</td><td>High priority: Document, systematize, and operationalize core processes.</td></tr>\n          <tr><td><strong>Traction</strong></td><td>Quarterly Rocks (3–7 per company, 3–5 per individual) + weekly L10 meetings. The execution engine.</td><td>⚠️ Rocks exist but rigor varies. L10 cadence established.</td><td>Strengthen Rock-setting discipline. Ensure SMART goals with clear ownership.</td></tr>\n        </table>\n      </div>"
          },
          {
            "id": "eos-vi",
            "title": "The Visionary / Integrator Dynamic",
            "html": "<h3>The Visionary and Integrator Roles</h3>\n      <p>In EOS, the Visionary and Integrator are the two seats at the top of the accountability chart. They have fundamentally different and complementary roles:</p>\n\n      <table>\n        <tr><th>Visionary</th><th>Integrator</th></tr>\n        <tr><td>Big ideas, product vision, relationships</td><td>Execution, systems, accountability</td></tr>\n        <tr><td>Starts 10 things</td><td>Finishes 3 things well</td></tr>\n        <tr><td>Inspires the team</td><td>Manages the team</td></tr>\n        <tr><td>Works ON the business</td><td>Works IN the business</td></tr>\n        <tr><td>Sees opportunities</td><td>Sees obstacles and solves them</td></tr>\n        <tr><td>Culture / brand / innovation</td><td>Profit / people / process</td></tr>\n      </table>\n\n      <div class=\"card\">\n        <div class=\"card-header\">The Same Page Meeting</div>\n        <p>Early in the relationship, the Visionary and Integrator should conduct a <strong>Same Page Meeting</strong>. This is a foundational EOS process where both leaders explicitly align on:</p>\n        <ul>\n          <li><strong>Roles:</strong> What does Kevin own? What do you own? Where's the overlap?</li>\n          <li><strong>Communication:</strong> How often do you sync? What decisions require Kevin's input? What can you decide alone?</li>\n          <li><strong>Conflict resolution:</strong> When you disagree (you will), how do you resolve it? EOS says: the Integrator makes the call on execution; the Visionary makes the call on vision.</li>\n          <li><strong>People decisions:</strong> Hiring, firing, promotions — who has final say? (EOS says the Integrator owns this.)</li>\n          <li><strong>The cardinal rule:</strong> The Visionary never goes around the Integrator to direct reports. Everything flows through the Integrator. This is the hardest rule for founders to follow.</li>\n        </ul>\n      </div>\n\n      <div class=\"tip\"><strong>Implementation note:</strong> The Same Page Meeting should be scheduled in the first week. This is a critical operating agreement that prevents future misalignment and ensures the Visionary/Integrator partnership is effective.</div>"
          },
          {
            "id": "eos-roadmap",
            "title": "EOS Implementation Roadmap",
            "html": "<h3>Getting from 60% → 100% EOS</h3>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Phase 1: Foundation (Days 1–30)</div>\n        <ul>\n          <li>Audit current EOS implementation — what's real vs. what's on paper</li>\n          <li>Attend existing L10 meeting as observer first, then facilitator</li>\n          <li>Review the V/TO (Vision/Traction Organizer) with Kevin — is it current?</li>\n          <li>Identify who on the team \"gets\" EOS vs. who's going through the motions</li>\n          <li>Assess whether they need an EOS Implementer (outside coach) or if you can drive it internally</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Phase 2: Accountability Chart & Scorecard (Days 30–60)</div>\n        <ul>\n          <li><strong>Build the Accountability Chart:</strong> Start with the 5–7 major functions. For each seat: name, 5 roles, GWC assessment. This is where you may discover \"wrong seat\" issues — handle with care.</li>\n          <li><strong>Build the Company Scorecard:</strong> 5–15 weekly numbers. For iRESTORE, likely: weekly revenue, units shipped, return rate, CSAT score, inventory weeks-on-hand, Amazon BSR, DTC conversion rate, marketing ROAS, customer service response time.</li>\n          <li><strong>Department-level Scorecards:</strong> Each team gets 5–8 numbers they own. Reviewed in their L10.</li>\n          <li><strong>Rock-setting:</strong> Review and sharpen existing Rocks. Ensure each is SMART (Specific, Measurable, Attainable, Relevant, Time-bound) with a single owner.</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Phase 3: Process & Traction (Days 60–90+)</div>\n        <ul>\n          <li><strong>Core Process Documentation:</strong> Identify the 10–20 core processes that run the business. For iRESTORE: order-to-ship, new product launch, Amazon listing optimization, customer returns, Shenzhen PO process, Q4 peak planning, hiring, etc.</li>\n          <li><strong>Document at the 80% level:</strong> EOS doesn't want 100-page SOPs. It wants the 20% of steps that cover 80% of the work. \"Followed by all\" is the goal.</li>\n          <li><strong>Quarterly planning (Annual/Quarterly):</strong> Establish the EOS quarterly planning cadence. Annual planning offsite with Kevin and leadership. Quarterly Rock-setting sessions. This becomes the execution heartbeat.</li>\n          <li><strong>Ongoing:</strong> Issues list management, weekly L10 discipline, Rock completion rate tracking (target: 80%+ on-time).</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">EOS Books to Reference</div>\n        <ul>\n          <li><strong>Traction</strong> by Gino Wickman — the EOS bible. Kevin has read this.</li>\n          <li><strong>Rocket Fuel</strong> by Gino Wickman & Mark C. Winters — specifically about the Visionary/Integrator dynamic and how both roles succeed together.</li>\n          <li><strong>Get a Grip</strong> by Gino Wickman — EOS concepts in narrative form (easier to consume).</li>\n          <li><strong>How to Be a Great Boss</strong> by Gino Wickman — managing people in EOS.</li>\n        </ul>\n      </div>"
          },
          {
            "id": "eos-vs-scalingup",
            "title": "EOS vs. Scaling Up — Which OS for iRESTORE?",
            "html": "<div class=\"tip\"><strong>Strategic context:</strong> iRESTORE is at ~$90M and growing 65–80% YoY. EOS was designed for companies in the $1M–$50M range. Scaling Up (Verne Harnish / \"Rockefeller Habits 2.0\") was built for companies in the $10M–$500M+ range. As iRESTORE scales past $150M–$200M, the operating system may need to evolve to maintain effectiveness.</div>\n\n<h3>Side-by-Side Comparison</h3>\n<table>\n  <tr><th>Dimension</th><th>EOS (Traction)</th><th>Scaling Up (Rockefeller Habits)</th></tr>\n  <tr><td><strong>Creator</strong></td><td>Gino Wickman</td><td>Verne Harnish</td></tr>\n  <tr><td><strong>Core Framework</strong></td><td>6 Components: Vision, People, Data, Issues, Process, Traction</td><td>4 Decisions: People, Strategy, Execution, Cash</td></tr>\n  <tr><td><strong>Ideal Company Size</strong></td><td>$1M–$50M (10–250 employees). Starts to feel constraining above $50M–$100M for complex orgs.</td><td>$10M–$500M+. Built for companies scaling past founder-led stage into professional management.</td></tr>\n  <tr><td><strong>Philosophy</strong></td><td><strong>Simplicity.</strong> One way to do everything. Prescriptive and rigid by design — that's the point. \"Keep it simple, keep it real.\"</td><td><strong>Flexibility.</strong> Provides tools and frameworks but lets leadership decide how to implement. More sophisticated, more customizable.</td></tr>\n  <tr><td><strong>Strategy Depth</strong></td><td>Light. The V/TO (Vision/Traction Organizer) captures vision in 2 pages. No competitive analysis, brand promise, or BHAG equivalent beyond 10-year target.</td><td>Deep. One-Page Strategic Plan (OPSP), SWT analysis, Brand Promise with KPIs, BHAG, 3–5 year strategic moves, profit-per-X metric.</td></tr>\n  <tr><td><strong>Financial Tools</strong></td><td>Minimal. Scorecard tracks weekly numbers but no cash flow modeling, unit economics, or CCC analysis.</td><td>Strong. Cash Conversion Cycle (CCC), Power of One analysis, Greg Crabtree's \"Simple Numbers,\" Alan Miltz's Cash Flow Story. Cash is an entire pillar.</td></tr>\n  <tr><td><strong>Meeting Cadence</strong></td><td>Weekly L10 (60 min, strict). Quarterly planning. Annual planning.</td><td>Daily huddle (15 min), Weekly meeting (60–90 min), Monthly management, Quarterly planning, Annual planning. More meetings, more granular.</td></tr>\n  <tr><td><strong>People Tools</strong></td><td>Accountability Chart + GWC (Get it, Want it, Capacity). Simple, binary.</td><td>Function Accountability Chart (FACe), Process Accountability Chart (PACe), Topgrading for hiring, A-Player assessments. More nuanced.</td></tr>\n  <tr><td><strong>Goal Setting</strong></td><td>Rocks (quarterly priorities). 3–7 per company, 3–5 per person.</td><td>Critical Number + quarterly priorities + KPIs at every level. Can layer in OKRs.</td></tr>\n  <tr><td><strong>Issue Resolution</strong></td><td>IDS (Identify, Discuss, Solve) in L10s. Clean and fast.</td><td>No prescribed method — flexibility to use whatever works. Some use IDS from EOS.</td></tr>\n  <tr><td><strong>Implementation Time</strong></td><td>3–6 months for core. 12–18 months for full. Lower learning curve.</td><td>6–12 months for core. 18–24 months for full. Steeper learning curve, more sophisticated tools.</td></tr>\n  <tr><td><strong>Coach Required?</strong></td><td>EOS Implementer recommended ($50K–$100K/year). Some companies self-implement.</td><td>Scaling Up Coach recommended ($36K–$120K/year). Harder to self-implement due to complexity.</td></tr>\n</table>\n\n<h3>Where EOS Falls Short at $90M–$200M+</h3>\n<p>EOS is excellent at what it does — creating clarity, rhythm, and accountability. But as iRESTORE scales past $100M, you'll likely hit these limitations:</p>\n<ul>\n  <li><strong>No cash management framework:</strong> At $90M with 80% growth, cash is a strategic weapon. EOS doesn't teach cash conversion cycle, working capital optimization, or how to fund growth internally. iRESTORE's net-150 terms from Shenzhen are a massive cash advantage — Scaling Up would help you quantify and optimize this.</li>\n  <li><strong>Strategy is too thin:</strong> The V/TO is 2 pages. At $200M+ with international expansion, skincare line launch, B2B channel, and potential acquisition targets, you need more strategic depth than EOS provides. Scaling Up's One-Page Strategic Plan and \"7 Strata of Strategy\" are built for this.</li>\n  <li><strong>No daily huddle:</strong> EOS relies on weekly L10s. At 100+ employees across La Mirada, remote marketing, Philippines, and Shenzhen, a daily 15-minute huddle catches problems 5 days faster. This is one of Scaling Up's most powerful tools.</li>\n  <li><strong>Single-layer scorecards:</strong> EOS scorecards work at the company level but get clunky when you need cascading KPIs across multiple departments, channels, and geographies. Scaling Up's approach to cascading metrics is more sophisticated.</li>\n  <li><strong>No \"profit per X\" metric:</strong> Scaling Up asks \"what's the one metric that most directly drives profitability?\" For iRESTORE, this might be \"profit per order\" or \"LTV per customer acquired.\" EOS doesn't have this construct.</li>\n</ul>\n\n<h3>Where Scaling Up Falls Short for iRESTORE</h3>\n<ul>\n  <li><strong>Complexity is the enemy of adoption:</strong> iRESTORE is at 60% EOS and the team already knows the language. Switching to Scaling Up means retraining everyone — Rocks become priorities, L10s become weekly meetings, the vocabulary changes. Kevin chose EOS for a reason: it's simple and his team is bought in.</li>\n  <li><strong>The Visionary/Integrator framework doesn't exist in Scaling Up:</strong> Kevin thinks of himself as the Visionary and wants you as the Integrator. That's EOS language and EOS structure. Scaling Up doesn't have this distinction — and it's the very framework that defines the COO role he's hiring for.</li>\n  <li><strong>Implementation load:</strong> You're joining a $90M company growing 80% YoY with EOS at 60%. The highest-ROI move is completing EOS (getting to 90%+), not starting over with a new system. Scaling Up can come later when the org is stable enough to absorb the complexity.</li>\n  <li><strong>Daily huddles may not fit the culture:</strong> iRESTORE's team is lean, distributed, and moving fast. Adding a daily standup to a team that's already stretched could feel bureaucratic. Test it before mandating it.</li>\n</ul>\n\n<h3>The Hybrid: EOS Foundation + Scaling Up Upgrades</h3>\n<div class=\"card\">\n  <div class=\"card-header\">Recommended Approach for iRESTORE</div>\n  <p><strong>Phase 1 (Months 1–6): Complete EOS to 90%+.</strong> This is the job Kevin is hiring you for. Finish the Accountability Chart, build scorecards, document core processes, sharpen Rocks, own the L10. Don't introduce new frameworks while EOS is half-baked.</p>\n  <p><strong>Phase 2 (Months 6–12): Layer in Scaling Up's financial tools.</strong> Add the Cash Conversion Cycle analysis (critical for a company with net-150 supplier terms and rapid growth). Introduce \"Power of One\" — what happens if you improve price by 1%, volume by 1%, COGS by 1%, CAC by 1%, DSO by 1 day? This is the CFO-level thinking that EOS lacks.</p>\n  <p><strong>Phase 3 (Months 12–18): Upgrade strategy.</strong> When it's time to plan for $200M+, international expansion, and potential M&A, migrate from the V/TO to the One-Page Strategic Plan (OPSP). Keep the EOS execution engine (L10s, Rocks, IDS, Scorecards) but plug in Scaling Up's strategy layer above it. Also consider adding the daily huddle once you have department-level leadership in place.</p>\n</div>\n\n<table>\n  <tr><th>Keep from EOS</th><th>Add from Scaling Up</th></tr>\n  <tr><td>L10 meeting cadence (weekly, Wednesdays)</td><td>Daily huddle (15 min, department level)</td></tr>\n  <tr><td>Rocks (quarterly priorities)</td><td>Critical Number (one metric per quarter that moves the needle most)</td></tr>\n  <tr><td>IDS for issue resolution</td><td>Cash Conversion Cycle + Power of One financial analysis</td></tr>\n  <tr><td>Accountability Chart + GWC</td><td>Topgrading for senior hires</td></tr>\n  <tr><td>Visionary/Integrator dynamic</td><td>One-Page Strategic Plan (replaces V/TO at $200M+)</td></tr>\n  <tr><td>Company & department Scorecards</td><td>Cascading KPIs with \"profit per X\" metric</td></tr>\n  <tr><td>Core Process documentation (80% level)</td><td>Brand Promise with measurable KPIs</td></tr>\n</table>\n\n<div class=\"answer-block\"><strong>Recommended approach:</strong> Complete EOS implementation first (get to 90%+). As the company scales past $150M, layer in Scaling Up financial tools — particularly around cash conversion cycle and unit economics — because EOS is light on the cash and strategy side. The execution engine remains EOS. The strategic planning and financial rigor evolves. It's not either-or; it's EOS as the operating system with Scaling Up upgrades as the organization grows.</div>\n\n<div class=\"tip\"><strong>Key references:</strong> <em>Scaling Up</em> by Verne Harnish and <em>Mastering the Rockefeller Habits</em> provide frameworks for financial discipline and strategic planning at scale. The key is evolution, not replacement — EOS is the foundation that enables growth.</div>"
          }
        ]

el device. Highest Amazon review count. Also \"Out of Stock\" — being replaced by bundle listings.</td>\n        </tr>\n</table>\n\n<div class=\"tip\">\n<strong>💡 Amazon Strategy Shift:</strong> Both Professional and Essential standalone listings show \"Out of Stock\" on Amazon. iRESTORE appears to be transitioning to bundle-only listings (device + supplements/accessories), which increases AOV and creates differentiated listings. Multiple new bundles are \"New on Amazon in past month.\" The Elite has never had a standalone Amazon listing — DTC/Costco only for the flagship.\n</div>"

            "html": "<table>\n        <tr><th>Metric</th><th>Detail</th></tr>\n        <tr><td><strong>Total SKUs</strong></td><td>~52 products on DTC (6 devices, 14 bundles, ~15 consumables, 5 accessories, kits)</td></tr>\n        <tr><td><strong>Price Range</strong></td><td>$19.99 (AM/PM Duo promo) → $2,797 (Elite Best Seller Bundle)</td></tr>\n        <tr><td><strong>Core Device ASPs</strong></td><td>Hair: $499–$1,899 | Skincare: $299–$499</td></tr>\n        <tr><td><strong>Combined Reviews</strong></td><td><strong>31,638</strong> (site claim, \"based on Amazon and Google reviews as of 03/01/2026\") | Verified Amazon total: ~12,850 across current listings | Gap of ~18,800 is likely Google Shopping product reviews + older/delisted Amazon ASINs</td></tr>\n        <tr><td><strong>Overall Rating</strong></td><td>4.6 stars (DTC) | 4.0–4.6 stars (Amazon range)</td></tr>\n        <tr><td><strong>Amazon Presence</strong></td><td>Full omnichannel: hair devices, skincare devices, supplements, and topicals all on Amazon.</td></tr>\n        <tr><td><strong>Amazon Badges</strong></td><td>Professional: <strong>#1 Best Seller</strong> in Hair Regrowth Devices | Face Mask: \"Small Business\" badge</td></tr>\n        <tr><td><strong>Channel Strategy</strong></td><td>True omnichannel across both hair and skincare (DTC + Amazon + Costco). Skincare Amazon listings are newer (72–610 reviews) vs. mature hair listings (1,507–4,329 reviews).</td></tr>\n        <tr><td><strong>Financing</strong></td><td>Affirm 0% APR on all devices. HSA/FSA eligible (all devices).</td></tr>\n        <tr><td><strong>Guarantees</strong></td><td>Hair: 365-day trial + 12-month guarantee. Skin: 100-day trial.</td></tr>\n        <tr><td><strong>Promotions</strong></td><td>Spring Sale active (up to $800 off devices, up to 60% off supplements)</td></tr>\n</table>\n\n<div class=\"tip\">\n<strong>💡 Key Observations for Interview:</strong><br>\n1. <strong>Skincare is on Amazon but nascent</strong> — Face Mask has 610 reviews (4.6 stars), Neck & Chest has 94, Eye Mask has 72. Compare to Professional's 1,507 and Biotin Gummies' 4,329. Skincare Amazon is clearly a newer channel push — worth asking Kevin about the Amazon skincare growth trajectory and investment plans.<br>\n2. <strong>Amazon catalog restructuring underway</strong> — legacy standalone device listings going \"Out of Stock,\" replaced by higher-AOV bundles. This is smart but means temporarily losing #1 Best Seller badge momentum.<br>\n3. <strong>AM/PM Duo at $19.99 (80% off $100)</strong> — this is almost certainly a loss leader to acquire skincare customers for the $299–$499 devices. Classic razor/blade play.<br>\n4. <strong>Heavy discounting across consumables</strong> — 25–50% off most hair supplements. Could indicate excess inventory, price sensitivity testing, or aggressive customer acquisition strategy.<br>\n5. <strong>The \"31,638 reviews\" claim is a marketing aggregate</strong> — combines ALL Amazon reviews (~12,850 verified across current listings) + Google Reviews (Shopping product reviews, Google Customer Reviews). The gap of ~18,800 likely includes Google Shopping reviews + older/delisted Amazon ASINs. Biotin Gummies alone account for 4,329 Amazon reviews (highest single product). This is standard DTC practice but worth understanding the composition.<br>\n6. <strong>Eye Mask ($299) as gateway product</strong> — lowest-priced skincare device, marked \"ALL-NEW,\" being promoted heavily. Could become the entry point for skincare the way Essential was for hair.\n</div>"

            "title": "Revenue Trajectory",
            "html": "<p class=\"muted\">Sources: JD ($90M+), Kevin's Feb 25 call (80% and 65% growth quotes), back-calculation.</p>\n\n<table>\n  <tr><th>Year</th><th>Revenue (est.)</th><th>YoY Growth</th><th>Source</th><th>Key Drivers</th></tr>\n  <tr><td><strong>2024</strong></td><td>~$50M</td><td>—</td><td>Back-calculated ($90M ÷ 1.80)</td><td>Rebrand + super premium hair launch + skincare entry + macro tailwind (Huberman, Bryan Johnson, red light going mainstream)</td></tr>\n  <tr style=\"background:#e8f5e9\"><td><strong>2025</strong></td><td><strong>$90M+</strong></td><td><strong>~80%</strong></td><td>JD: \"$90M+ Revenue\"<br>Kevin: \"we did about 80% over year last year\"</td><td>Same drivers compounding. 60–70% Amazon market share. Costco.com crushing. Category growing 3–4x YoY.</td></tr>\n  <tr style=\"background:#e8f5e9\"><td><strong>2026 (projected)</strong></td><td><strong>~$148M+</strong></td><td><strong>65%+</strong></td><td>Kevin: \"trending about 65% so far. And we haven't even launched a single product. When we launch, it's going to be even more.\"</td><td>Q2 product launches (skincare wand, body panels, body wraps). B2B division launching. 65% is <em>before</em> new launches.</td></tr>\n</table>\n\n<div class=\"card\">\n  <div class=\"card-header\">Kevin's Exact Words (Feb 25 Call)</div>\n  <p><em>\"So for reference, we did about 80% over year last year. This year, we're trending about 65% so far. And we haven't even launched a single product. When we launch, it's going to be even more.\"</em></p>\n  <p><em>\"I see a future where we can get, you know, closer to that, you know, maybe 3, 4, or 500 million.\"</em> (Referencing Therabody at ~$700M peak as aspirational comp.)</p>\n</div>\n\n<div class=\"tip\"><strong>Interview framing:</strong> \"You've nearly doubled revenue in a year and you're projecting another 65%+ before any new launches. That's the kind of scaling inflection where operational infrastructure either enables the next leg of growth or becomes the bottleneck. That's exactly the problem I solve.\"</div>"

            "title": "Product Roadmap (2026 Pipeline)",
            "html": "<p class=\"muted\">All from Kevin's Feb 25 call. Q2 2026 is the target launch window. \"This year is going to be a lot of launches\" — Kevin kept Q1 clear to focus on ops.</p>\n\n<h3>Confirmed Launches</h3>\n<table>\n  <tr><th>Product</th><th>Details (from Kevin)</th><th>Est. Price</th><th>Market Size</th><th>Strategic Significance</th></tr>\n  <tr style=\"background:#e8f5e9\">\n    <td><strong>Multi-Modality Skincare Wand</strong></td>\n    <td>5 modalities: <strong>Microcurrent, EMS</strong> (muscle stimulation), <strong>Electroporation</strong> (3.4x skincare absorption), <strong>Supersonic</strong>, <strong>Deep Infrared</strong>. Kevin: \"sub $200 product that's more retail friendly.\"</td>\n    <td><strong>&lt;$200</strong></td>\n    <td>EMS/Microcurrent device market: $1.2B (2025) → growing 15%+ CAGR. At-home beauty devices: $12.9B (2025).</td>\n    <td>🔑 <strong>First non-light-therapy product.</strong> Opens retail channel (Target, Ulta potential). Consumables play: electroporation drives serum sales at 3.4x absorption rate. Gateway price point brings new customers into ecosystem.</td>\n  </tr>\n  <tr style=\"background:#e8f5e9\">\n    <td><strong>Full-Body Red Light Panels</strong></td>\n    <td>Kevin: \"the big body panels — we plan on being number one in that category within a year.\" Using a <strong>separate Shenzhen manufacturer</strong> (different manufacturing process from helmets).</td>\n    <td>~$500–$2,000+<br><span class=\"muted\">(category range)</span></td>\n    <td>Red light therapy device market: $350M (2024) → $620M by 2032 (8.8% CAGR). Panels/beds segment: $950M (2025) → $2.9B by 2033 (14.8% CAGR).</td>\n    <td>🔑 <strong>Massive TAM expansion.</strong> Category leaders (Joovv, PlatinumLED) are niche brands with no Amazon dominance — iRESTORE's DTC + Amazon flywheel is a huge advantage. Higher ASP than skincare wand.</td>\n  </tr>\n  <tr>\n    <td><strong>Body Wraps / Belts</strong></td>\n    <td>Kevin: \"belts, things you can wrap around — just working our way down the body. Hair, skin, and then everything below.\"</td>\n    <td>~$200–$600<br><span class=\"muted\">(est. based on category)</span></td>\n    <td>Subset of red light therapy + body contouring devices. Body contouring device market growing ~15% CAGR.</td>\n    <td>Targeted treatment zones (back, knees, abdomen). More portable than full panels. Fills the mid-price gap between wand and panels.</td>\n  </tr>\n</table>\n\n<h3>In Development / Expanding</h3>\n<table>\n  <tr><th>Initiative</th><th>Details (from Kevin)</th><th>Market Opportunity</th><th>Notes</th></tr>\n  <tr>\n    <td><strong>B2B / Professional Division</strong></td>\n    <td>Kevin: \"We just launched a B2B sales division and made our first hire this month. He's going to go after domestic resellers and wholesale — transplant clinics, medspas, hair salons, wellness clinics.\" Devices ~$10K, sourced through Shenzhen network.</td>\n    <td>Professional hair restoration market: $6.5B (2023) → $18.9B by 2030 (16.6% CAGR). Medspas expanding at 11.2% CAGR.</td>\n    <td>Not manufacturing — sourcing through father's network. Higher margin per unit. Recurring razor/blade model (consumables for clinics). Also opens clinical validation channel.</td>\n  </tr>\n  <tr>\n    <td><strong>Mobile App (AI-Powered)</strong></td>\n    <td>Kevin: \"Hair analysis, skin analysis — your hair type looks like this, your hair loss looks like that, your texture suggests [these] products.\" Lead gen + customer experience + data.</td>\n    <td>Digital health companion market. More about CLTV and engagement than standalone revenue.</td>\n    <td>Modeled after what Oura Ring does — integrated consumer experience with data. AI-powered recommendations drive cross-sell and consumable reorders. Major retention play.</td>\n  </tr>\n  <tr>\n    <td><strong>Additional Creams & Supplements</strong></td>\n    <td>Kevin: \"All the creams and supplements are sourced by us.\" Supplements made by same team. Electroporation wand will drive serum attachment rates.</td>\n    <td>Already selling ~15+ SKUs. Consumables are the recurring revenue engine.</td>\n    <td>Wand launch creates new consumable attach opportunity — serums formulated for electroporation absorption.</td>\n  </tr>\n</table>\n\n<div class=\"card\">\n  <div class=\"card-header\">The Product Strategy in One Frame</div>\n  <p>Kevin described the strategy clearly: <strong>\"Hair, skin, and then everything below.\"</strong> They're systematically working down the body while expanding modalities beyond light therapy into EMS, microcurrent, electroporation, and supersonic. Each product category has a <strong>device → consumable</strong> flywheel, and the mobile app ties it all together with personalized recommendations.</p>\n  <table>\n    <tr><th>Category</th><th>Device Revenue</th><th>Consumable Attach</th><th>Status</th></tr>\n    <tr style=\"background:#e8f5e9\"><td>Hair Growth (laser helmets)</td><td>$499–$1,899</td><td>REVIVE supplements + serums ($22–$90)</td><td>✅ Mature — 60-70% Amazon market share</td></tr>\n    <tr style=\"background:#e8f5e9\"><td>Skincare (LED face/neck/eye masks)</td><td>$299–$499</td><td>RENEW serums + creams ($30–$75)</td><td>✅ Launched — growing fast, nascent on Amazon</td></tr>\n    <tr style=\"background:#fff3e0\"><td>Skincare Wand (multi-modality)</td><td>&lt;$200</td><td>Electroporation serums (3.4x absorption)</td><td>🔜 Q2 2026 launch</td></tr>\n    <tr style=\"background:#fff3e0\"><td>Body (panels + wraps/belts)</td><td>$200–$2,000+</td><td>Body-specific topicals (potential)</td><td>🔜 Q2 2026 launch</td></tr>\n    <tr style=\"background:#e3f2fd\"><td>Professional / B2B (clinic devices)</td><td>~$10,000+</td><td>Clinic consumables + treatment protocols</td><td>🆕 First hire made, division launched</td></tr>\n    <tr style=\"background:#e3f2fd\"><td>Mobile App (AI analysis)</td><td>Free (lead gen)</td><td>Personalized product recommendations</td><td>🔨 In development</td></tr>\n  </table>\n</div>\n\n<div class=\"tip\"><strong>Interview power move:</strong> \"I mapped out your product pipeline from the conversation — the skincare wand, body panels, wraps, B2B division, and the app. Each one has operational complexity: new manufacturers, new regulatory pathways, new channels. That's 5 parallel launch tracks in a single year on top of 65% organic growth. This is exactly why you need a COO — someone who builds the operational infrastructure so these launches don't cannibalize each other's attention or resources.\"</div>"

            "html": "<table>\n        <tr><th>Company</th><th>Est. Revenue</th><th>Key Strengths</th><th>Threat Level</th></tr>\n        <tr><td><strong>CurrentBody</strong></td><td>£128M+ (IPO'd at £300M)</td><td>75% international, LED masks, multi-brand platform</td><td>High</td></tr>\n        <tr><td><strong>FOREO</strong></td><td>~$400M+</td><td>Global beauty tech, cleansing + anti-aging, strong brand</td><td>High</td></tr>\n        <tr><td><strong>Dr. Dennis Gross</strong></td><td>Part of Shiseido</td><td>DRx SpectraLite, dermatologist credibility, retail distribution</td><td>Medium</td></tr>\n        <tr><td><strong>Omnilux</strong></td><td>~$30–50M (est.)</td><td>Clinical-grade LED, professional + consumer, strong clinical evidence</td><td>Medium</td></tr>\n      \n        <tr style=\"background:#fff3e0\"><td><strong>LYMA</strong></td><td>$48M (2025)</td><td>$2,695–$5,995</td><td>Cold laser skincare (not LED). FDA-cleared. 1,450mW laser output — 100x stronger than LED masks. TIME’s Best Inventions. <strong>$100M waitlist demand</strong> (16K+ signups at ~$6K) for Pro device. UK-based, US expansion driving 70%+ of sales. Luxury/premium positioning ($6K Pro device). Not in hair growth — but same LLLT technology platform. Potential future competitor or acquisition comp.</td></tr>\n        <tr><td><strong>Solawave</strong></td><td>~$13M+ (726K customers)</td><td>4-in-1 red light wand (galvanic, microcurrent, massage, red light). Santa Monica, CA. Celebrity endorsements. DTC + Amazon.</td><td>Low-Medium</td></tr>\n        <tr><td><strong>ErythrosLight</strong></td><td>Undisclosed (private)</td><td>FDA-cleared laser facemask (164 VCSEL lasers + 72 LEDs). Premium $1,149 price point. Laser-vs-LED differentiation — deeper penetration claims.</td><td>Medium</td></tr>\n        <tr><td><strong>Project E Beauty</strong></td><td>Undisclosed (private)</td><td>FDA-cleared LED facemasks (red, blue, infrared). Full product ecosystem including wands and body domes. DTC + Amazon.</td><td>Medium</td></tr>\n        <tr><td><strong>Mito Red Light</strong></td><td>~$15M (75K customers)</td><td>Clinical-grade red/infrared panels + specialty devices. Scottsdale, AZ. 11 employees. Medical-grade positioning, athlete/health pro audience. Panels, not masks.</td><td>Low-Medium</td></tr>\n        <tr><td><strong>Ya-Man</strong></td><td>Major (Asia conglomerate)</td><td>Japanese beauty device leader since 1978. RF/microcurrent focus, not LED. 3M+ units sold in Japan. US market entry 2023. Watch for LED expansion.</td><td>Low (watch)</td></tr>\n        <tr style=\"background:#fff3e0\"><td><strong>BeautyPie</strong></td><td>~$70M (~$960M valuation)</td><td>Membership-based beauty buyers club ($59/yr). LED masks: Dynamo Deep (~$299/$199 member), C-Wave (~$200/$120 member), neck mask. $200M raised. <strong>Different threat model</strong> — commoditizes device pricing through membership rather than competing head-to-head. No FDA clearance, no clinical data, skincare-only (no hair growth), DTC membership-only (no Amazon/retail). Watch for: if the membership model proves devices can sell profitably at $120–199, it pressures premium pricing across the category.</td><td>Low-Medium</td></tr>\n      </table>\n      <div class=\"tip\"><strong>Key Takeaway:</strong> Skincare is a much more competitive space with bigger players. iRESTORE's advantage is leveraging their existing customer base (600K+ hair growth customers) for cross-sell, plus their manufacturing cost advantage. CurrentBody is the most relevant comp for the exit narrative — they IPO'd at £300M with 75% international revenue.</div>"

            "title": "What Industry COOs Know (That You Don’t Yet)",
            "html": "<h2>Critical Knowledge Areas for Beauty Device Operations</h2>\n      <p>Operating at scale in the beauty device space requires specialized knowledge across regulatory, supply chain, financial, and competitive dynamics. Here’s what industry experts focus on.</p>\n\n      <h3>1. FDA & Medical Device Regulatory (iRESTORE-Specific)</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">What insiders know cold</div>\n        <ul>\n          <li><strong>iRESTORE is a Class II medical device</strong>, FDA 510(k) cleared (K151662). This is NOT cosmetics regulation — it’s medical device regulation under 21 CFR 890.</li>\n          <li><strong>510(k) pathway</strong> = demonstrating “substantial equivalence” to a predicate device (the iGrow). Every product change risks requiring a new 510(k) submission.</li>\n          <li><strong>QSR (Quality System Regulation)</strong> — 21 CFR 820 mandates design controls, CAPA (corrective and preventive action), complaint handling, and document control. Industry COOs manage these systems daily.</li>\n          <li><strong>MDR (Medical Device Reporting)</strong> — required to report adverse events to FDA within 30 days. A mishandled complaint can trigger an FDA inspection.</li>\n          <li><strong>Labeling constraints</strong> — iRESTORE can only claim “promotes hair growth” for specific Norwood-Hamilton (men IIa–V) and Ludwig-Savin (women I–II) classifications. Any broader claim = FDA warning letter.</li>\n          <li><strong>Post-market surveillance</strong> — annual registration, adverse event tracking, complaint trending</li>\n        </ul>\n        <div class=\"tip\"><strong>Key resource:</strong> The <a href=\"https://www.accessdata.fda.gov/cdrh_docs/pdf15/k151662.pdf\" target=\"_blank\">510(k) summary for iRESTORE</a> provides critical details on indications for use, predicate device, and clinical evidence that should inform product development and expansion decisions.</div>\n      </div>\n\n      <h3>2. MoCRA — The New Cosmetics Regulation</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">What changed in 2022–2025</div>\n        <ul>\n          <li>The <strong>Modernization of Cosmetics Regulation Act (MoCRA)</strong> is the biggest expansion of FDA cosmetics authority since 1938.</li>\n          <li>As of July 1, 2024: <strong>facility registration and product listing are mandatory</strong> for all cosmetics manufacturers. Renewed biennially.</li>\n          <li><strong>GMP rules</strong> for cosmetics (proposed Oct 2025) will require documented manufacturing processes — similar to what device companies already do.</li>\n          <li><strong>Adverse event reporting</strong> is now required for cosmetics (previously voluntary).</li>\n          <li><strong>Why this matters for iRESTORE:</strong> Their topical products (shampoos, serums, supplements) fall under cosmetics/drug regulation, NOT device regulation. So Kevin is managing TWO regulatory frameworks simultaneously.</li>\n        </ul>\n        <div class=”tip”><strong>Key resource:</strong> The <a href=”https://www.fda.gov/cosmetics/cosmetics-laws-regulations/modernization-cosmetics-regulation-act-2022-mocra” target=”_blank”>FDA’s MoCRA page</a> outlines the regulatory requirements for topicals and consumables — essential reading for compliance and product planning since iRESTORE operates under both medical device and cosmetics regulations simultaneously.</div>\n      </div>\n\n      <h3>3. DTC Beauty Supply Chain & Fulfillment</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">Industry-specific operational knowledge</div>\n        <ul>\n          <li><strong>Temperature-sensitive inventory</strong> — serums, topicals, and supplements require climate-controlled warehousing. iRESTORE’s La Mirada warehouse needs humidity/temp monitoring.</li>\n          <li><strong>Expiration date management</strong> — beauty SKUs have shelf life constraints. FEFO (First Expired, First Out) vs. FIFO inventory management.</li>\n          <li><strong>Rapid SKU proliferation</strong> — new formulas, limited editions, bundled kits. Beauty brands at $100M+ typically manage 200–500+ active SKUs.</li>\n          <li><strong>Returns complexity</strong> — beauty/health returns can’t be resold (hygiene). Industry average return rate is 5–8% for beauty DTC; devices may be higher.</li>\n          <li><strong>Amazon FBA vs. FBM optimization</strong> — at iRESTORE’s scale, managing the Amazon channel (they hold 60–70% market share in the Amazon laser hair growth category) requires FBA inventory planning, IPI score management, and long-term storage fee avoidance.</li>\n          <li><strong>Wholesale/retail expansion logistics</strong> — pallet-oriented shipments, EDI compliance, retail chargebacks, co-op advertising deductions. Moving from pure DTC to omnichannel (Ulta, Sephora, dermatologist offices) is operationally complex.</li>\n        </ul>\n      </div>\n\n      <h3>4. Beauty/Wellness Financial Metrics</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">The KPIs industry COOs track daily</div>\n        <table>\n          <tr><th>Metric</th><th>What It Means</th><th>Industry Benchmark</th></tr>\n          <tr><td><strong>CAC (Customer Acquisition Cost)</strong></td><td>Cost to acquire one new customer</td><td>$25–50 for beauty DTC; $80–150 for devices</td></tr>\n          <tr><td><strong>LTV:CAC Ratio</strong></td><td>Lifetime value divided by acquisition cost</td><td>3:1 minimum; 4:1+ is healthy</td></tr>\n          <tr><td><strong>Contribution Margin</strong></td><td>Revenue minus COGS minus fulfillment minus variable marketing</td><td>60–75% for topicals; 40–55% for devices</td></tr>\n          <tr><td><strong>Gross Margin</strong></td><td>Revenue minus COGS</td><td>75–86% for beauty; 55–70% for devices</td></tr>\n          <tr><td><strong>Repurchase Rate</strong></td><td>% of customers who buy again</td><td>30–45% for beauty (consumables); lower for devices</td></tr>\n          <tr><td><strong>Return Rate</strong></td><td>% of orders returned</td><td>5–8% beauty; 8–15% devices</td></tr>\n          <tr><td><strong>Days of Inventory (DOI)</strong></td><td>How many days of stock on hand</td><td>60–90 days target for beauty</td></tr>\n          <tr><td><strong>NPS (Net Promoter Score)</strong></td><td>Customer satisfaction/loyalty</td><td>50+ is excellent for beauty brands</td></tr>\n        </table>\n        <p class=\"muted\">Sources: <a href=\"https://www.drivepoint.io/post/19-financial-metrics-to-help-growing-beauty-brands-unlock-profitability-faster\" target=\"_blank\">Drivepoint (19 Financial Metrics for Beauty Brands)</a>, <a href=\"https://supliful.com/blog/what-kpis-should-beauty-brands-track\" target=\"_blank\">Supliful KPI Guide</a>, <a href=\"https://financialmodelslab.com/blogs/kpi-metrics/beauty-e-store\" target=\"_blank\">Financial Models Lab (Beauty E-Store KPIs)</a></p>\n      </div>\n\n      <h3>5. LLLT Market & Competitive Landscape</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">What an industry insider would know about iRESTORE’s market</div>\n        <ul>\n          <li><strong>Global LLLT market:</strong> $271.8M in 2025, growing at 3.8% CAGR to $370M by 2033</li>\n          <li><strong>32 FDA-cleared home-use LLLT devices</strong> currently on market — crowded field</li>\n          <li><strong>Key competitors:</strong> HairMax (laser combs, Medicare coverage as of Dec 2025), Capillus (new FDA clearance Oct 2025), Theradome, Kiierr, Revian, CurrentBody</li>\n          <li><strong>iRESTORE’s differentiation:</strong> helmet form factor, 29,000+ reviews, AI-personalized treatment protocols (Nov 2025 launch), strong Amazon presence</li>\n          <li><strong>Industry consolidation:</strong> Beauty M&A deal volume up 22.9% YoY (Capstone Partners Dec 2025). Strategic acquirers actively seeking DTC + medical device brands.</li>\n          <li><strong>Expansion into “wellness ecosystem”</strong> (topicals, supplements) is the growth play — devices are the trust anchor, consumables drive recurring revenue and higher LTV.</li>\n        </ul>\n        <p class=\"muted\">Sources: <a href=\"https://www.openpr.com/news/4345921/laser-hair-loss-treatment-market-set-for-rapid-growth-as-demand\" target=\"_blank\">OpenPR Market Report</a>, <a href=\"https://www.capstonepartners.com/insights/article-beauty-ma-update/\" target=\"_blank\">Capstone Partners Dec 2025</a></p>\n      </div>\n\n      <h3>6. Omnichannel Operations</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">The DTC-to-omnichannel transition every $100M brand makes</div>\n        <ul>\n          <li><strong>Pure DTC is a ceiling, not a strategy</strong> at $100M+. Kevin knows this. The question is: who builds the omnichannel ops engine?</li>\n          <li><strong>Retail readiness</strong> requires: EDI integration, retail-compliant packaging, co-op/MDF budgets, field sales support, POS/display programs, retail analytics (sell-through rates, turns)</li>\n          <li><strong>Channel conflict management</strong> — pricing parity between DTC, Amazon, and retail is a constant battle. MAP (Minimum Advertised Price) enforcement is critical.</li>\n          <li><strong>Wholesale margin stack</strong> — retail typically wants 40–50% margin, which compresses your margin from 70%+ DTC to 25–35% wholesale. Profitability modeling across channels is a core COO competency.</li>\n        </ul>\n      </div>"
          },

            "id": "edge-capability",
            "title": "Building Operational Capability",
            "html": "<h2>Operational Priorities for Scaling to $300M+</h2>\n      <p>As iRESTORE scales from $100M to $300M+, operational focus shifts from founder-led management to systems-based scaling. The core priorities are building scalable processes, managing complexity across channels and products, and preparing the business for exit-level operational diligence.</p>\n\n      <h3>90-Day Operational Assessment Framework</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">How you close the knowledge gap fast</div>\n        <table>\n          <tr><th>Week</th><th>Focus Area</th><th>Actions</th></tr>\n          <tr><td><strong>1–2</strong></td><td>Regulatory landscape</td><td>Audit 510(k) compliance status, MoCRA registration for topicals, QSR documentation gaps. Meet with regulatory counsel.</td></tr>\n          <tr><td><strong>3–4</strong></td><td>Supply chain deep-dive</td><td>Map every SKU from raw material to customer doorstep. Identify COGS reduction opportunities. Audit Amazon FBA/FBM split.</td></tr>\n          <tr><td><strong>5–6</strong></td><td>Customer unit economics</td><td>Build a CAC/LTV model by channel and product line. Identify which products/channels are margin-positive and which are subsidized.</td></tr>\n          <tr><td><strong>7–8</strong></td><td>Competitive intelligence</td><td>Buy and test competitor products (HairMax, Capillus, Theradome). Map their pricing, positioning, channel strategy.</td></tr>\n          <tr><td><strong>9–10</strong></td><td>Industry relationships</td><td>Join CEW (Cosmetic Executive Women), attend beauty trade shows, build a network of beauty ops leaders for ongoing learning.</td></tr>\n          <tr><td><strong>11–12</strong></td><td>International market prep</td><td>Deep-dive on Korea (MFDS) and Japan (PMDA) regulatory pathways. Connect with in-market regulatory consultants.</td></tr>\n        </table>\n        <div class=”tip”><strong>Note:</strong> This framework outlines the key operational assessments needed to move from founder-led management to systems-based scaling. The primary focus areas are regulatory compliance, supply chain optimization, unit economics clarity, competitive positioning, industry relationships, and international readiness.</div>\n      </div>"

            "html": "<h2>Where iRESTORE Sells Today</h2>\n      <p class=\"muted\">Confirmed from Kevin in your Feb 25 conversation.</p>\n\n      <table>\n        <tr><th>Market</th><th>Model</th><th>Status</th><th>Notes</th></tr>\n        <tr style=\"background:#e8f5e9\"><td><strong>North America (US + Canada)</strong></td><td>Self-managed</td><td>Primary market</td><td>DTC, Amazon, Costco. La Mirada warehouse. ~$90M+ revenue.</td></tr>\n        <tr style=\"background:#e8f5e9\"><td><strong>Taiwan</strong></td><td>Self-managed</td><td>Active</td><td>Kevin is from Taiwan. Direct operations, not distributor-based. Proof of concept for APAC.</td></tr>\n        <tr style=\"background:#fff3e0\"><td><strong>Australia</strong></td><td>Distributor</td><td>Active (\"a little bit\")</td><td>Kevin described it as small. Opportunity to deepen via Amazon AU and TGA clearance.</td></tr>\n        <tr style=\"background:#fff3e0\"><td><strong>Hong Kong</strong></td><td>Distributor</td><td>Active (\"does really well\")</td><td>Kevin specifically called out the HK distributor as performing well. Gateway to Greater China?</td></tr>\n      </table>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Key Takeaway for Your Interview</div>\n        <p>Kevin has <strong>four active markets</strong> but only two are self-managed (US + Taiwan). The distributor markets (Australia, Hong Kong) are small and likely under-optimized. Your opportunity: professionalize the international function by (1) deepening the existing distributor markets, (2) building the regulatory pathway for Korea and Japan, and (3) evaluating UK/Europe as a Tier 1 expansion.</p>\n        <p><strong>Quote from Kevin:</strong> \"One of the things that I really would like help with is internationalization of the business. There's regulatory hurdles... it's more than I can chew right now.\"</p>\n      </div>"

            "html": "<h2>Priority Expansion Markets</h2>\n      <p>These are markets where iRESTORE should be actively building entry plans.</p>\n\n      <div class=\"card\">\n        <div class=\"card-header\">South Korea (Top Priority New Market)</div>\n        <p><strong>Why:</strong> 19% of APAC beauty device market. K-beauty culture creates massive demand for hair/scalp devices. MFDS pathway is faster than Japan (6–12 months). See Section 8 for full regulatory breakdown.</p>\n        <p><strong>Entry path:</strong> Local distributor + MFDS registration → Coupang (Korean Amazon) → Olive Young retail</p>\n        <p><strong>Status:</strong> Kevin confirmed they have NOT started Korea yet. This is your opportunity to drive.</p>\n      </div>\n\n      <h3>South Korea — Market Size & Competitive Landscape</h3>\n      <table>\n        <tr><th colspan=\"2\">Market Sizing</th></tr>\n        <tr><td>Korea beauty devices market (2024)</td><td><strong>$1.32 billion</strong></td></tr>\n        <tr><td>Korea beauty devices market (2034 projected)</td><td><strong>$4.81 billion</strong> (13.8% CAGR)</td></tr>\n        <tr><td>Global LED face mask market (2025)</td><td>$358M → $883M by 2034 (10.6% CAGR)</td></tr>\n        <tr><td>Home-use devices growth</td><td>13.6% CAGR — driven by privacy, convenience, professional-grade results</td></tr>\n        <tr><td>Key technology mix</td><td>LED + RF = 72% combined market share</td></tr>\n      </table>\n      <table>\n        <tr><th>Competitor</th><th>Category</th><th>Revenue / Scale</th><th>Key Products & Notes</th></tr>\n        <tr><td><strong>Medicube (APR Corp)</strong></td><td>Skincare devices + cosmetics</td><td><strong>~$900M+ (2025 est.)</strong>; device division ~$280M/yr; IPO'd on KOSPI 2024</td><td>AGE-R line (4M+ units sold). <strong>32% of Korea's domestic retail device market.</strong> RF, microcurrent, LED. $100M+ on TikTok Shop alone. The #1 Korean beauty device brand globally.</td></tr>\n        <tr><td><strong>Cell Return</strong></td><td>LED masks + scalp</td><td>Premium tier; celebrity-driven</td><td>Platinum LED Mask (red/blue/infrared). Hair Alpha-Ray for scalp. Famous for Korean celebrity endorsements. Premium pricing ($500–1,500+).</td></tr>\n        <tr><td><strong>LG Pra.L</strong></td><td>Full beauty device line</td><td>Part of LG H&H (~$5B+ revenue)</td><td>Dual Lifting (EMS + RF), MediHair HGN1 (laser hair growth), Derma LED Mask. Massive retail distribution. Expanding to US market.</td></tr>\n        <tr><td><strong>Amorepacific</strong></td><td>Beauty conglomerate</td><td>~$3B+ revenue group</td><td>Owns Sulwhasoo, Laneige. Moving into beauty devices. Distribution network across Asia.</td></tr>\n        <tr><td><strong>Doctors Tech</strong></td><td>Professional → home devices</td><td>Growing; clinic heritage</td><td>Bridges professional aesthetics and home-use. Clinical credibility in Korea.</td></tr>\n        <tr><td><strong>CurrentBody</strong></td><td>LED masks + hair</td><td>£128M+ revenue; IPO'd at £300M</td><td>UK-based; 75% international. Sells LED face masks AND hair regrowth helmets. iRESTORE's closest global competitor.</td></tr>\n      </table>\n      <div class=\"tip\"><strong>iRESTORE's Korea opportunity:</strong> The skincare device market is massive and growing fast — Medicube alone is approaching $1B in revenue. iRESTORE's new multi-modality skincare wand (5 technologies, sub-$200) competes directly in this space. The hair growth device niche is less crowded — LG Pra.L is the main competitor. iRESTORE can enter with BOTH hair AND skincare devices, leveraging FDA clearance as a differentiator. K-beauty consumers are the most device-savvy in the world and will pay for clinical results.</div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Japan (High Value, Longer Timeline)</div>\n        <p><strong>Why:</strong> 23% of APAC market. Premium pricing accepted. Kevin said Japan is \"quite stringent\" and they're \"looking into it.\" PMDA pathway takes 12–36 months. See Section 8 for full regulatory breakdown.</p>\n        <p><strong>Entry path:</strong> DMAH partner + PMDA Shonin approval → Amazon Japan → Loft/Tokyu Hands retail</p>\n        <p><strong>Status:</strong> Kevin confirmed no Japan presence yet. He knows it's hard and needs help.</p>\n      </div>\n\n      <h3>Japan — Market Size & Competitive Landscape</h3>\n      <table>\n        <tr><th colspan=\"2\">Market Sizing</th></tr>\n        <tr><td>Japan + Korea + China</td><td><strong>70%+ of APAC beauty device market</strong></td></tr>\n        <tr><td>APAC beauty device market (2025)</td><td><strong>~$45.2B</strong> (42% of global $107B)</td></tr>\n        <tr><td>Japan beauty & personal care (2025)</td><td>~$40B+ total; devices are fastest-growing subsegment</td></tr>\n        <tr><td>Key technology mix</td><td>LED + RF = 72% combined share; microcurrent + EMS growing fast</td></tr>\n        <tr><td>Key growth driver</td><td>Aging population + premium willingness + tech adoption + multi-technology devices</td></tr>\n      </table>\n      <table>\n        <tr><th>Competitor</th><th>Category</th><th>Revenue / Scale</th><th>Key Products & Notes</th></tr>\n        <tr><td><strong>YA-MAN Ltd.</strong></td><td>Skincare devices (RF, LED, EMS)</td><td>Targeting ¥30B (~$200M); <strong>#1 facial device share 5 yrs running</strong></td><td>RF-Lift Pro, Photo Plus Prestige Pro, ACE double protein RF. Operates in 14+ countries. #1 on Tmall Singles Day 6 straight years. Japan's dominant beauty device pure-play.</td></tr>\n        <tr><td><strong>ReFa (MTG Co.)</strong></td><td>Microcurrent / beauty rollers</td><td><strong>MTG: $563M TTM revenue</strong>; 14M+ ReFa units shipped</td><td>#1 domestic share in rollers, hair irons, showerheads. 2025 Crystal ReFa line = hybrid RF + microcurrent. Solar-powered microcurrent rollers. Premium dept store distribution.</td></tr>\n        <tr><td><strong>Panasonic Beauty</strong></td><td>Full beauty device line</td><td>Part of $54B Panasonic group</td><td>IonBoost EH-SM50 (mask-style ion device), hair dryers, scalp care, facial devices. Massive electronics retail distribution. Innovation in eco-silicone materials.</td></tr>\n        <tr><td><strong>AXXZIA</strong></td><td>Eye care + RF devices</td><td>Growing premium brand</td><td>Mate for Eyes Home Machine (RF + electroporation + EMS). Combines devices with consumables (eye patches). Model for device→consumable flywheel.</td></tr>\n        <tr><td><strong>CurrentBody</strong></td><td>LED masks + hair regrowth</td><td>£128M+ revenue (IPO'd at £300M)</td><td>UK-based; 75% international. Expanding in Japan. Sells both LED face masks and hair regrowth helmets. iRESTORE's closest global competitor.</td></tr>\n        <tr><td><strong>Cynosure / Lutronic</strong></td><td>Professional aesthetic</td><td>Merged 2024; global medical aesthetics</td><td>Professional-grade laser devices. Japan distribution via Jeisys Medical. Relevant for iRESTORE's B2B/clinic channel expansion.</td></tr>\n      </table>\n      <div class=\"tip\"><strong>iRESTORE's Japan opportunity:</strong> Japan's beauty device market is dominated by skincare (YA-MAN, ReFa, Panasonic) — not hair. This is actually perfect: iRESTORE can enter with the new skincare wand as a wedge product alongside hair devices. The aging population creates demand for both categories. YA-MAN's $200M+ revenue shows the TAM for a pure-play device brand is massive. Premium pricing ($400–800) aligns with iRESTORE's ASP. Key challenge: PMDA regulatory (12–18 months with a DMAH partner). Key advantage: FDA clearance carries weight in Japan's quality-conscious market.</div>\n      <div class=\"card\">\n        <div class=\"card-header\">United Kingdom / Europe</div>\n        <p><strong>Why:</strong> UK is the fastest-growing beauty device market in Europe (~14% CAGR). Amazon UK provides existing marketplace with Prime infrastructure. English-speaking reduces localization costs. EU MDR applies but CE marking pathway exists.</p>\n        <p><strong>Entry path:</strong> Amazon UK/DE → DTC localization → retail partnerships</p>\n      </div>\n\n      <h3>Existing Market Deepening (Parallel Track)</h3>\n      <div class=\"card\">\n        <div class=\"card-header\">Australia — From \"a little bit\" to a real market</div>\n        <p>Currently distributor-managed with small volume. Opportunity: TGA registration (straightforward for low-risk devices), Amazon AU launch, and evaluate whether to self-manage or upgrade the distributor relationship.</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-header\">Hong Kong — Leverage the \"really well\" performing distributor</div>\n        <p>Kevin called out HK as performing well. Questions: What's the actual revenue? Can this distributor expand into broader Greater China (Macau, possibly mainland via cross-border e-commerce)? Is there IP risk?</p>\n      </div>"

            "html": "<h2>Market Entry Regulatory Strategy</h2>\n      <div class=\"tip\"><strong>Key Insight for Interview:</strong> When Kevin asks about international expansion, you should demonstrate that you understand the regulatory pathway is the gating factor — not market demand. Show you know the specific agencies, timelines, and costs.</div>\n\n      <div class=\"card\">\n        <div class=\"card-header\">Recommended Sequencing: South Korea First, Then Japan</div>\n        <p>South Korea offers a faster, cheaper regulatory pathway (6–12 months, $32K–$120K) compared to Japan (12–36 months, $37K–$250K). Entering South Korea first builds market data and regulatory precedent that strengthens the Japan application. Both require local representatives, full document translation, and device classification as medical devices.</p>\n      </div>\n\n      <table>\n        <tr><th>Criteria</th><th>South Korea</th><th>Japan</th></tr>\n        <tr><td><strong>Regulatory Body</strong></td><td>MFDS (Ministry of Food & Drug Safety)</td><td>PMDA / MHLW</td></tr>\n        <tr><td><strong>Device Classification</strong></td><td>Class II (likely for hair growth device)</td><td>Class II or III (depends on JMDN code)</td></tr>\n        <tr><td><strong>Approval Pathway</strong></td><td>MDITAC Certification (if Class II)</td><td>Shonin Approval (PMDA review + MHLW sign-off)</td></tr>\n        <tr><td><strong>Timeline (no clinical trials)</strong></td><td>6–12 months</td><td>12–14 months</td></tr>\n        <tr><td><strong>Timeline (with trials)</strong></td><td>6–12 months + trial duration</td><td>24–36 months</td></tr>\n        <tr><td><strong>Estimated Total Cost</strong></td><td>$32,000 – $120,000</td><td>$37,000 – $250,000</td></tr>\n        <tr><td><strong>Annual Post-Market Cost</strong></td><td>$3,500 – $8,000</td><td>$17,000 – $51,000</td></tr>\n        <tr><td><strong>Local Rep Required</strong></td><td>KLH (Korea License Holder)</td><td>DMAH (Designated Marketing Authorization Holder)</td></tr>\n        <tr><td><strong>Language Requirement</strong></td><td>All docs in Korean</td><td>All docs in Japanese</td></tr>\n        <tr><td><strong>Key Pre-Requisite</strong></td><td>K-GMP certification BEFORE submission</td><td>ISO 13485 + Foreign Manufacturer Registration</td></tr>\n        <tr><td><strong>Clinical Data Flexibility</strong></td><td>Moderate — accepts foreign data</td><td>Low to Moderate — may require Japanese trials</td></tr>\n        <tr class=\"highlight-row\"><td><strong>Recommended Entry Order</strong></td><td>Phase 1 (Months 0–12)</td><td>Phase 2 (Months 8–36)</td></tr>\n      </table>"

            "id": "reg-korea",
            "title": "South Korea – MFDS Pathway",
            "html": "<h2>South Korea: MFDS Registration for Hair Growth Devices</h2>\n\n      <h3>Classification & Approval Body</h3>\n      <p>Hair growth laser/LED devices are classified as <strong>medical devices</strong> (not cosmetics) in South Korea under the MFDS. LG's Pra.L MediHair — a near-identical product to iRESTORE — was approved as a <strong>Class II medical device</strong> after FDA clearance. This is a positive predicate for iRESTORE.</p>\n      <p>Class II devices go through MDITAC/NIDS certification (faster than direct MFDS approval for Class III). This is the most likely path for iRESTORE.</p>\n\n      <h3>Registration Process (6-Step Path)</h3>\n      <table>\n        <tr><th>Step</th><th>Description</th><th>Timeline</th><th>Cost (USD)</th></tr>\n        <tr><td>1</td><td><strong>Appoint Korea License Holder (KLH)</strong> — mandatory local entity with import business license and quality manager</td><td>2–4 weeks</td><td>$2,000–$5,000/yr</td></tr>\n        <tr><td>2</td><td><strong>K-GMP Certification</strong> — on-site manufacturing audit required BEFORE registration</td><td>1–3 months</td><td>$4,000–$6,000</td></tr>\n        <tr><td>3</td><td><strong>Technical File (STED)</strong> — device specs, safety/performance data, biocompatibility, clinical data, all in Korean</td><td>6–8 weeks</td><td>$8,000–$15,000</td></tr>\n        <tr><td>4</td><td><strong>Korean Translation</strong> — all documents, labeling, IFU</td><td>4–6 weeks</td><td>$2,000–$4,000</td></tr>\n        <tr><td>5</td><td><strong>MDITAC Submission & Review</strong> — Class II certification pathway</td><td>2–6 months</td><td>$1,600 (official fee)</td></tr>\n        <tr><td>6</td><td><strong>Post-Approval</strong> — labeling finalization, customs docs, initial shipment</td><td>1–2 months</td><td>$1,500–$3,000</td></tr>\n        <tr class=\"highlight-row\"><td></td><td><strong>TOTAL</strong></td><td><strong>9–18 months</strong></td><td><strong>$32,000–$76,000</strong></td></tr>\n      </table>\n\n      <h3>Testing Requirements</h3>\n      <ul>\n        <li><strong>Electrical Safety & EMC:</strong> IEC 60601-1 and IEC 60601-1-2 compliance</li>\n        <li><strong>Laser Safety:</strong> KS C IEC 60825-1 (Korean adoption) — power output, wavelength, classification, warning labels</li>\n        <li><strong>Biocompatibility:</strong> ISO 10993-1 — may be waived if predicate device data available from FDA filing</li>\n        <li><strong>Thermal Safety:</strong> Temperature rise limits during extended use</li>\n        <li><strong>Performance:</strong> Light output specifications, wavelength validation, durability cycling</li>\n      </ul>\n      <div class=\"tip\"><strong>Cost Saver:</strong> iRESTORE's existing FDA 510(k) data — biocompatibility, electrical safety, laser safety testing — can be leveraged for the Korean submission. This could save $5,000–$20,000 in redundant testing.</div>\n\n      <h3>Advertising Restrictions (Critical)</h3>\n      <p>South Korea is <strong>extremely strict</strong> on hair loss product claims. The MFDS reported that 77.8% of illegal hair product enforcement cases were for claims like \"promotes new hair growth.\" Permitted claims must be backed by clinical data and aligned with the MFDS registration.</p>\n      <ul>\n        <li><strong>Prohibited:</strong> \"Promotes new hair growth,\" \"increases hair thickness,\" \"prevents hair loss,\" \"cures alopecia\"</li>\n        <li><strong>Permitted (with data):</strong> \"For use in treating androgenetic alopecia\" (if approved as medical device), \"stimulates hair follicles\" (if mechanistically supported)</li>\n        <li><strong>FDA-cleared:</strong> Can reference FDA clearance only if also MFDS-approved</li>\n      </ul>\n\n      <h3>E-Commerce Landscape</h3>\n      <p><strong>Coupang</strong> (market leader) explicitly bans medical device direct sales through its standard marketplace. Strategy: partner with a licensed Korean medical device distributor who sells through Coupang. <strong>Amazon Korea</strong> and <strong>Gmarket</strong> have similar restrictions — all require MFDS registration and KLH compliance.</p>\n      <div class=\"tip\"><strong>Viable Strategy:</strong> Direct sales via company website (in Korean) + partnership with licensed Korean distributor for marketplace presence. B2C direct shipping from US with KLH as importer of record for initial testing.</div>\n\n      <h3>IP Protection</h3>\n      <ul>\n        <li><strong>Patents:</strong> File with KIPO (Korean IP Office). South Korea is first-to-file — file early.</li>\n        <li><strong>Trademark \"iRESTORE\":</strong> File in Class 10 (medical devices) and Class 44 (medical services). Timeline: 10–12 months. Cost: $200–$400 per class.</li>\n        <li><strong>Design patents:</strong> 15-year term for device design protection.</li>\n      </ul>"
