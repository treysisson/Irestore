            "html": "<div class=\"card\">\n<h3>📦 \"Here's Our Sales History — Build a Forecast\"</h3>\n<p>This scenario directly addresses Kevin's biggest operational frustration: Brandon didn't anticipate the Costco promo that 10x'd volume and nearly caused a Q4 stockout. Kevin wants a COO who builds systems that catch those scenarios before they become crises.</p>\n</div>\n\n<h4>📋 Example Data You Might Receive</h4>\n<p>Kevin gives you 12-18 months of monthly sales data by SKU:</p>\n\n<table>\n<tr><th>Month</th><th>Pro Helmet</th><th>Essential</th><th>Serum</th><th>Accessories</th><th>Total Units</th><th>Revenue</th></tr>\n<tr><td>Jan '25</td><td>3,200</td><td>2,800</td><td>4,500</td><td>1,800</td><td>12,300</td><td>$4.8M</td></tr>\n<tr><td>Feb '25</td><td>3,000</td><td>2,600</td><td>4,200</td><td>1,600</td><td>11,400</td><td>$4.5M</td></tr>\n<tr><td>Mar '25</td><td>3,400</td><td>3,000</td><td>4,800</td><td>1,900</td><td>13,100</td><td>$5.1M</td></tr>\n<tr><td>Apr '25</td><td>3,800</td><td>3,200</td><td>5,100</td><td>2,100</td><td>14,200</td><td>$5.6M</td></tr>\n<tr><td>May '25</td><td>4,200</td><td>3,600</td><td>5,500</td><td>2,300</td><td>15,600</td><td>$6.2M</td></tr>\n<tr><td>Jun '25</td><td>4,000</td><td>3,400</td><td>5,300</td><td>2,200</td><td>14,900</td><td>$5.9M</td></tr>\n<tr><td>Jul '25</td><td>3,800</td><td>3,200</td><td>5,000</td><td>2,000</td><td>14,000</td><td>$5.5M</td></tr>\n<tr><td>Aug '25</td><td>4,500</td><td>3,800</td><td>5,800</td><td>2,400</td><td>16,500</td><td>$6.5M</td></tr>\n<tr><td>Sep '25</td><td>5,200</td><td>4,200</td><td>6,500</td><td>2,800</td><td>18,700</td><td>$7.4M</td></tr>\n<tr><td>Oct '25</td><td>6,500</td><td>5,000</td><td>7,800</td><td>3,500</td><td>22,800</td><td>$9.2M</td></tr>\n<tr style=\"background:#ffebee\"><td>Nov '25 ⚠️</td><td>9,800</td><td>7,200</td><td>10,500</td><td>5,200</td><td>32,700</td><td>$13.1M</td></tr>\n<tr style=\"background:#ffebee\"><td>Dec '25 ⚠️</td><td>8,500</td><td>6,800</td><td>9,200</td><td>4,500</td><td>29,000</td><td>$11.2M</td></tr>\n</table>\n\n<h4>🔍 Step-by-Step: How to Build the Forecast</h4>\n<div class=\"card card-green\">\n<p><strong>Step 1: Identify the seasonality pattern.</strong></p>\n<ul>\n<li>Q1 (Jan-Mar): Baseline — post-holiday trough + New Year's resolution bump</li>\n<li>Q2 (Apr-Jun): Ramp — summer prep, \"I want to fix this\" season</li>\n<li>Q3 (Jul-Sep): Steady growth — back-to-school, early holiday planning</li>\n<li>Q4 (Oct-Dec): <strong>PEAK</strong> — Black Friday, gifting, holiday. Nov-Dec are 2x average months.</li>\n</ul>\n<p>Seasonality index: Q1 = 0.75x, Q2 = 0.95x, Q3 = 1.05x, Q4 = 1.65x (weighted to Nov-Dec)</p>\n\n<p><strong>Step 2: Calculate the growth trend.</strong></p>\n<ul>\n<li>Jan '25 vs. projected Jan '26 at 65% YoY growth = ~20,300 units</li>\n<li>Monthly growth rate: ~4-5% month-over-month on the trend line</li>\n</ul>\n\n<p><strong>Step 3: Build the 2026 base forecast.</strong></p>\n</div>\n\n<h4>📊 2026 Base Forecast (What to Present)</h4>\n<table>\n<tr><th>Month</th><th>Pro Helmet</th><th>Essential</th><th>Serum</th><th>Accessories</th><th>Body Panel (NEW)</th><th>Total Units</th><th>Est. Revenue</th></tr>\n<tr><td>Jan '26</td><td>5,300</td><td>4,600</td><td>7,400</td><td>3,000</td><td>—</td><td>20,300</td><td>$7.9M</td></tr>\n<tr><td>Feb '26</td><td>5,000</td><td>4,300</td><td>6,900</td><td>2,600</td><td>—</td><td>18,800</td><td>$7.4M</td></tr>\n<tr><td>Mar '26</td><td>5,600</td><td>5,000</td><td>7,900</td><td>3,100</td><td>—</td><td>21,600</td><td>$8.4M</td></tr>\n<tr style=\"background:#e8f5e9\"><td>Apr '26 🚀</td><td>6,300</td><td>5,300</td><td>8,400</td><td>3,500</td><td>2,000</td><td>25,500</td><td>$10.8M</td></tr>\n<tr><td>May '26</td><td>6,900</td><td>5,900</td><td>9,100</td><td>3,800</td><td>3,000</td><td>28,700</td><td>$12.3M</td></tr>\n<tr><td>Jun '26</td><td>6,600</td><td>5,600</td><td>8,700</td><td>3,600</td><td>2,500</td><td>27,000</td><td>$11.5M</td></tr>\n<tr><td>Jul '26</td><td>6,300</td><td>5,300</td><td>8,300</td><td>3,300</td><td>2,200</td><td>25,400</td><td>$10.8M</td></tr>\n<tr><td>Aug '26</td><td>7,400</td><td>6,300</td><td>9,600</td><td>4,000</td><td>2,800</td><td>30,100</td><td>$12.8M</td></tr>\n<tr><td>Sep '26</td><td>8,600</td><td>6,900</td><td>10,700</td><td>4,600</td><td>3,500</td><td>34,300</td><td>$14.6M</td></tr>\n<tr><td>Oct '26</td><td>10,700</td><td>8,300</td><td>12,900</td><td>5,800</td><td>4,500</td><td>42,200</td><td>$18.0M</td></tr>\n<tr style=\"background:#fff3e0\"><td>Nov '26 ⚠️</td><td>16,200</td><td>11,900</td><td>17,300</td><td>8,600</td><td>6,500</td><td>60,500</td><td>$25.7M</td></tr>\n<tr style=\"background:#fff3e0\"><td>Dec '26</td><td>14,000</td><td>11,200</td><td>15,200</td><td>7,400</td><td>5,500</td><td>53,300</td><td>$22.5M</td></tr>\n<tr style=\"background:#e3f2fd\"><td><strong>2026 Total</strong></td><td><strong>99,900</strong></td><td><strong>80,600</strong></td><td><strong>122,400</strong></td><td><strong>53,300</strong></td><td><strong>32,500</strong></td><td><strong>388,700</strong></td><td><strong>$162.7M</strong></td></tr>\n</table>\n\n<h4>⚠️ Scenario Planning (The Part Kevin REALLY Wants to See)</h4>\n<p>This is what separates you from Brandon. Don't just show a base case — show what could go wrong and what you'd do about it.</p>\n\n<div class=\"card card-red\">\n<h3>Stress Scenario 1: \"Costco Does Another Surprise Promo\" (Q4)</h3>\n<p><strong>What happened before:</strong> Costco ran a promo that 10x'd normal volume. Brandon didn't anticipate it. Near-stockout on hero SKU.</p>\n<p><strong>Model it:</strong> Normal Costco Q4 = ~5,000 helmets/month. Surprise promo = 15,000-20,000 in a single month. That's an additional 10,000-15,000 units you didn't plan for.</p>\n<p><strong>Inventory requirement:</strong> 15,000 × $140 COGS = $2.1M in additional inventory needed. At 5-month lead time from Shenzhen, the order had to be placed by JUNE for a November promo.</p>\n<p><strong>The fix:</strong></p>\n<ul>\n<li>Build a \"Costco promo reserve\" into safety stock: 8,000-10,000 additional units staged by September</li>\n<li>Negotiate with Costco for 60-day advance notice on all promotions</li>\n<li>Maintain air freight option from Taiwan factory (22% tariff but only 5-day transit vs. 35 days ocean)</li>\n<li>Pre-position inventory at a 3PL near Costco's distribution centers</li>\n</ul>\n<p><strong>Cost of being prepared:</strong> ~$1.4M in extra inventory carrying cost. <strong>Cost of NOT being prepared:</strong> Stockout on your #1 SKU during the biggest selling month = $3-5M in lost revenue + damaged Costco relationship.</p>\n</div>\n\n<div class=\"card card-red\">\n<h3>Stress Scenario 2: \"Body Panel Launch Overperforms 3x\"</h3>\n<p><strong>The optimistic problem:</strong> Initial PO is $500K (~3,500 units at ~$140 COGS). If body panels take off (Joovv does $30M+), you could sell through in 6 weeks instead of 6 months.</p>\n<p><strong>What happens:</strong> Stockout on new product during launch momentum. Amazon listing goes inactive. DTC shows \"out of stock.\" Early reviews dry up. Competitors fill the void.</p>\n<p><strong>The fix:</strong></p>\n<ul>\n<li>Place a contingency order for 2x initial PO ($1M) with a trigger: if 50% of initial PO sells in first 30 days, activate contingency order immediately</li>\n<li>Negotiate split shipment: 60% ocean (cost-effective) + 40% air (fast but expensive) so you get a quick restock</li>\n<li>Pre-sell / waitlist model: if inventory runs low, capture demand and fulfill when restock arrives</li>\n</ul>\n</div>\n\n<div class=\"card card-red\">\n<h3>Stress Scenario 3: \"Tariffs Increase or Supply Chain Disruption\"</h3>\n<p><strong>Current risk:</strong> China tariff on red light devices = 37.6%. Taiwan backup = 22%. If tariffs escalate further, COGS increases and margin compresses.</p>\n<p><strong>What to model:</strong></p>\n<ul>\n<li>Every 5pp tariff increase = ~$1.1M additional COGS on $90M base</li>\n<li>If China factory is disrupted (COVID-like scenario), Taiwan backup needs 3-month ramp</li>\n<li>Ocean freight disruption (Red Sea, etc.) adds 2-4 weeks transit + $2-5K/container surcharge</li>\n</ul>\n<p><strong>The fix:</strong> Dual-source critical components. Maintain 12-week safety stock on hero SKUs. Taiwan factory as active backup, not just emergency option.</p>\n</div>\n\n<h4>📅 Demand Planning Calendar (Show Kevin You Think in Systems)</h4>\n<table>\n<tr><th>Month</th><th>Planning Action</th><th>Why</th></tr>\n<tr><td>January</td><td>Annual forecast + PO calendar for full year</td><td>5-month lead time means Jan orders arrive June</td></tr>\n<tr><td>March</td><td>Q4 orders placed (for Oct-Dec arrival)</td><td>This is the order that Brandon missed</td></tr>\n<tr><td>Monthly</td><td>Rolling 13-week demand review vs. actual</td><td>Catch deviations early, adjust orders</td></tr>\n<tr><td>Bi-weekly</td><td>Inventory health check: WoS by SKU</td><td>Flag anything below 8 weeks of supply</td></tr>\n<tr><td>Pre-promo</td><td>Costco/QVC promo demand overlay</td><td>Separate base demand from promotional spikes</td></tr>\n<tr><td>Post-launch</td><td>New SKU velocity tracking (daily for first 30 days)</td><td>Trigger reorder if velocity exceeds plan</td></tr>\n</table>\n\n<h4>🗣️ Talking Points — What to Say to Kevin</h4>\n<div class=\"card card-yellow\">\n<p><strong>Opening line:</strong> \"The base forecast is the easy part — 65% growth on last year's trend with seasonality applied gives me a clear picture. What I'm more focused on is the scenarios that blow up the base case — because that's exactly what happened with the Costco promo.\"</p>\n\n<p><strong>Directly addressing the Brandon problem:</strong> \"Brandon didn't fail because he couldn't forecast — he failed because there was no system for catching promotional spikes. A good demand planning process has three layers: the base forecast, a promotional overlay, and a stress test. If any of those three had been in place, the Q4 crisis wouldn't have happened.\"</p>\n\n<p><strong>The lead time argument:</strong> \"Your 5-month lead time from Shenzhen is both your biggest advantage (net-150 terms = free capital) and your biggest risk (you're making bets today on demand 5 months out). I'd build in decision gates: if actual sales exceed forecast by 20% in any given month, trigger an expedited order. The extra air freight cost is nothing compared to a stockout on your hero SKU.\"</p>\n\n<p><strong>The body panel wild card:</strong> \"Body panels are the hardest to forecast because there's no historical data. I'd model three scenarios — conservative (50% of initial PO sells in 6 months), base (sells through in 4 months), and aggressive (sells through in 6 weeks, like early indicators from Joovv's market) — and pre-negotiate a contingency PO with the factory.\"</p>\n</div>\n\n<h4>🚫 Mistakes to Avoid</h4>\n<ul>\n<li><strong>Don't build a complex statistical model.</strong> You don't have time. Use simple trend × seasonality × growth rate. Kevin wants to see your thinking, not your Excel skills.</li>\n<li><strong>Don't forget the 5-month lead time.</strong> This is THE constraint. Every recommendation must account for the fact that orders placed today don't arrive for 5 months.</li>\n<li><strong>Don't present one number.</strong> Always show a range: base, optimistic, pessimistic. Kevin hates being surprised — show him you plan for surprises.</li>\n<li><strong>Don't ignore the new products.</strong> Body panels + belt + Q3 launch are the wild cards. Show how you'd forecast a product with zero history (comps from competitors, pre-order data, test market results).</li>\n</ul>"

            "html": "<div class=\"card\">\n<h3>🏭 \"We're Running Out of Space — What's the Plan?\"</h3>\n<p>La Mirada warehouse is near capacity again after moving in May 2025. With 65%+ growth, new product lines (body panels are oversized), and Kevin leaning toward a 3PL east coast node, this is a question about building the fulfillment infrastructure for $150-300M.</p>\n</div>\n\n<h4>📋 Example Data You Might Receive</h4>\n\n<table>\n<tr><th>Warehouse Metric</th><th>Current State</th></tr>\n<tr><td>Location</td><td>La Mirada, CA (Southern California)</td></tr>\n<tr><td>Total Square Footage</td><td>~40,000 sq ft (estimate for $90M DTC device company)</td></tr>\n<tr><td>Current Utilization</td><td>~85% (near capacity)</td></tr>\n<tr><td>Monthly Outbound Shipments</td><td>~15,000-18,000 (growing to 25,000+ by Q4)</td></tr>\n<tr><td>Avg Shipping Zone (from CA)</td><td>Zone 5-6 (avg to national customer base)</td></tr>\n<tr><td>Fulfillment Team</td><td>~8-12 warehouse staff (Brandon manages)</td></tr>\n<tr><td>Operations</td><td>Pick, pack, ship + returns processing + refurbishment + influencer seeding</td></tr>\n<tr><td>Returns Processed Monthly</td><td>~2,000-2,500 units</td></tr>\n<tr><td>ERP</td><td>Fulfil.io</td></tr>\n</table>\n\n<h4>📊 Capacity Timeline Analysis (Build This)</h4>\n<table>\n<tr><th>Quarter</th><th>Est. Monthly Shipments</th><th>Storage Req'd (pallets)</th><th>Capacity Used</th><th>Status</th></tr>\n<tr><td>Q1 2026</td><td>18,000</td><td>~320</td><td>85%</td><td style=\"background:#fff3e0\">🟡 Tight</td></tr>\n<tr><td>Q2 2026 (+ body panels)</td><td>25,000</td><td>~450</td><td>105%</td><td style=\"background:#ffebee\">🔴 OVER CAPACITY</td></tr>\n<tr><td>Q3 2026 (+ Q3 launch)</td><td>30,000</td><td>~520</td><td>125%</td><td style=\"background:#ffebee\">🔴 CRISIS</td></tr>\n<tr><td>Q4 2026 (peak)</td><td>50,000+</td><td>~700+</td><td>165%</td><td style=\"background:#ffebee\">🔴🔴 IMPOSSIBLE</td></tr>\n</table>\n\n<p><strong>Key insight:</strong> You hit the wall in Q2 2026, not Q4. Body panels are 2-3x the size of helmet boxes. Adding that SKU alone pushes you over capacity before the seasonal ramp even starts.</p>\n\n<h4>💡 Three Options to Present (with Pros/Cons)</h4>\n\n<div class=\"card\">\n<h3>Option A: Expand La Mirada (Lease Adjacent Space)</h3>\n<table>\n<tr><th>Detail</th><th>Estimate</th></tr>\n<tr><td>Additional space needed</td><td>20,000-30,000 sq ft</td></tr>\n<tr><td>Lease cost (SoCal industrial)</td><td>~$1.25-1.50/sq ft/month = $300-450K/year</td></tr>\n<tr><td>Buildout/racking</td><td>$50-100K one-time</td></tr>\n<tr><td>Additional staff</td><td>4-6 people = $200-300K/year</td></tr>\n<tr><td>Timeline to operational</td><td>2-3 months</td></tr>\n<tr><td><strong>Total Year 1 Cost</strong></td><td><strong>$550-850K</strong></td></tr>\n</table>\n<p><strong>Pros:</strong> Maintain control, keep refurb/returns in-house, no 3PL learning curve, Brandon's team stays unified.</p>\n<p><strong>Cons:</strong> Still shipping from West Coast only (zone 5-6 avg), doesn't solve the shipping cost problem for East Coast customers, doesn't scale beyond $200M.</p>\n</div>\n\n<div class=\"card\">\n<h3>Option B: Add 3PL East Coast Node</h3>\n<table>\n<tr><th>Detail</th><th>Estimate</th></tr>\n<tr><td>Location</td><td>NJ/PA corridor (closest to population density)</td></tr>\n<tr><td>3PL pick/pack/ship per order</td><td>$4-6/order (vs. ~$3-4 in-house)</td></tr>\n<tr><td>Storage cost</td><td>$15-25/pallet/month</td></tr>\n<tr><td>Shipping savings (Zone 5→2)</td><td>$3-5/shipment on East Coast orders</td></tr>\n<tr><td>Setup/integration</td><td>$20-50K one-time (Fulfil.io integration)</td></tr>\n<tr><td>% of orders routed East</td><td>~40% (East of Mississippi)</td></tr>\n<tr><td>Timeline to operational</td><td>3-5 months</td></tr>\n</table>\n<p><strong>The math that matters:</strong></p>\n<ul>\n<li>40% of ~200,000 annual DTC shipments = 80,000 orders routed East</li>\n<li>Shipping savings: 80,000 × $4 avg savings = <strong>$320K/year in shipping savings</strong></li>\n<li>3PL premium: 80,000 × $2 incremental pick/pack cost = ($160K/year)</li>\n<li><strong>Net savings: ~$160K/year + faster delivery (2-day vs 5-day)</strong></li>\n</ul>\n<p><strong>Pros:</strong> 2-day delivery to 40% of customers, shipping cost reduction, scalable, no lease commitment.</p>\n<p><strong>Cons:</strong> Split inventory management complexity, 3PL quality control risk, returns still go back to La Mirada (or need East Coast returns processing).</p>\n</div>\n\n<div class=\"card card-green\">\n<h3>Option C: BOTH (Recommended — Phase It)</h3>\n<table>\n<tr><th>Phase</th><th>Timeline</th><th>Action</th></tr>\n<tr><td><strong>Phase 1 (Immediate)</strong></td><td>Now - Q2</td><td>Lease 15,000 sq ft adjacent at La Mirada for body panel storage + overflow. Solves the immediate Q2 crunch.</td></tr>\n<tr><td><strong>Phase 2 (Q3)</strong></td><td>Q3 2026</td><td>Launch 3PL East Coast node with helmet + serum SKUs only (simple, high-volume). Start with 30% of East Coast orders, ramp to 100%.</td></tr>\n<tr><td><strong>Phase 3 (Q1 2027)</strong></td><td>Q1 2027</td><td>Add body panels + accessories to East Coast 3PL. Evaluate: does La Mirada become HQ/refurb/returns only, with 3PL handling all outbound?</td></tr>\n</table>\n<p><strong>Why both:</strong> Option A alone doesn't solve shipping costs or delivery speed. Option B alone has a 3-5 month lead time and won't solve Q2 space crisis. Phasing gets you immediate relief + long-term infrastructure.</p>\n</div>\n\n<h4>📦 SKU Routing Strategy (Which SKUs Go Where)</h4>\n<table>\n<tr><th>SKU</th><th>La Mirada</th><th>East Coast 3PL</th><th>Rationale</th></tr>\n<tr><td>Pro Helmet</td><td>✓ (West Coast orders + refurb)</td><td>✓ (East Coast orders)</td><td>Hero SKU — bi-coastal for speed</td></tr>\n<tr><td>Essential Helmet</td><td>✓</td><td>✓</td><td>Same as Pro</td></tr>\n<tr><td>Body Panels</td><td>✓ (initially)</td><td>Phase 3</td><td>Oversized, need to learn fulfillment first</td></tr>\n<tr><td>Serum</td><td>✓</td><td>✓</td><td>Small, high-volume — perfect for 3PL</td></tr>\n<tr><td>Refurbished units</td><td>✓ only</td><td>✗</td><td>Refurb operation stays in-house — quality control</td></tr>\n<tr><td>Returns processing</td><td>✓ (primary)</td><td>✓ (East returns go East)</td><td>Reduces reverse logistics shipping cost</td></tr>\n</table>\n\n<h4>🗣️ Talking Points — What to Say to Kevin</h4>\n<div class=\"card card-yellow\">\n<p><strong>Opening line:</strong> \"You're going to hit the wall in Q2, not Q4. Body panels push you over capacity before the seasonal ramp even starts. We need a two-phase plan: immediate relief in La Mirada, and a 3PL east coast node operational by Q3.\"</p>\n\n<p><strong>The financial argument:</strong> \"The 3PL east coast node isn't just about space — it's about shipping cost and customer experience. Right now you're shipping Zone 5-6 to 40% of your customers. A NJ node drops that to Zone 2 — $3-5 savings per shipment, 2-day delivery instead of 5. On 80,000 annual East Coast orders, that's $320K in shipping savings that more than covers the 3PL premium.\"</p>\n\n<p><strong>On keeping control:</strong> \"I know the instinct is to keep everything in-house — and you should keep refurb, returns, and influencer seeding at La Mirada where you have hands-on control. But commodity outbound fulfillment (pick a helmet, put it in a box, ship it) is exactly what 3PLs excel at. Let Brandon focus on the complex operations, not putting helmets in boxes.\"</p>\n\n<p><strong>The exit value angle:</strong> \"For a $500M exit, buyers want to see scalable infrastructure — not a single warehouse in La Mirada that's bursting at the seams. Bi-coastal fulfillment with a 3PL partner signals operational maturity.\"</p>\n</div>\n\n<h4>⚡ Sub-Scenarios</h4>\n\n<div class=\"card\">\n<h3>Sub-Scenario A: Kevin pushes for 100% 3PL (outsource everything)</h3>\n<p>Some CEOs want to get out of the fulfillment business entirely. If Kevin leans this direction:</p>\n<p><strong>What to say:</strong> \"I'd move outbound fulfillment to 3PL but keep returns/refurb in-house. Returns processing is a competitive advantage for you — the refurb-to-influencer pipeline alone is unique. I'd also keep a small La Mirada operation for B2B/clinic orders that need custom handling.\"</p>\n</div>\n\n<div class=\"card\">\n<h3>Sub-Scenario B: Kevin says \"3PL didn't work before\" (bad past experience)</h3>\n<p>Many DTC companies have bad 3PL stories. The problem is usually poor selection or bad integration.</p>\n<p><strong>What to say:</strong> \"The 3PL landscape has changed dramatically in the last 3 years. Companies like ShipBob, Deliverr (now Shopify Fulfillment), and Radial have DTC-specific operations. I'd run a competitive RFP with 3-4 providers, test with one SKU for 60 days, and only scale if quality metrics hit our targets.\"</p>\n</div>\n\n<div class=\"card\">\n<h3>Sub-Scenario C: Kevin asks about the warehouse tour you're about to do</h3>\n<p>You'll literally tour the La Mirada warehouse during the onsite. Be ready to observe and comment on:</p>\n<ul>\n<li><strong>Layout efficiency:</strong> Is pick path optimized? Are high-velocity SKUs near packing stations?</li>\n<li><strong>Returns area:</strong> Is there a dedicated returns processing zone? How organized is the refurb operation?</li>\n<li><strong>Body panel staging:</strong> Where will the oversized inventory go? Is there room?</li>\n<li><strong>Tech:</strong> Barcode scanning? WMS integration with Fulfil.io? Any manual processes that could be automated?</li>\n</ul>\n<p><strong>What to say during the tour:</strong> Ask smart questions, not critical ones. \"What's your peak throughput per day?\" \"Where does the returns flow happen?\" \"Have you thought about where body panels will stage?\" Show curiosity, not judgment.</p>\n</div>\n\n<h4>🚫 Mistakes to Avoid</h4>\n<ul>\n<li><strong>Don't criticize Brandon's operation.</strong> Brandon runs the warehouse — he's reliable and reports to Kevin directly. Any warehouse critique feels like a Brandon critique. Frame everything as \"scaling for growth,\" not \"fixing problems.\"</li>\n<li><strong>Don't propose moving everything at once.</strong> Phased approach shows discipline. Big-bang warehouse transitions fail constantly.</li>\n<li><strong>Don't forget returns/reverse logistics.</strong> Returns processing is ~2,500 units/month — that's a significant operation. It needs space, staff, and process regardless of outbound strategy.</li>\n<li><strong>Don't ignore the body panel sizing problem.</strong> Standard warehouse racking may not work for oversized body panels. You might need floor-stacked or custom racking — that's a $20-50K investment.</li>\n</ul>"

            "html": "<div class=\"card\">\n<h3>📋 \"Three People Are Leaving. Redesign the Org.\"</h3>\n<p>Three simultaneous departures (Daniel/CoS, CX Director, Product Manager) create a rare opportunity to redesign the org for the next stage of growth. This scenario tests whether you understand Kevin's leadership style and the V/I (Visionary/Integrator) dynamic.</p>\n</div>\n\n<h4>📋 Current Org (What You Know)</h4>\n<table>\n<tr><th>Person</th><th>Role</th><th>Reports To</th><th>Status</th><th>Key Functions</th></tr>\n<tr><td>Kevin Chen</td><td>CEO / Founder</td><td>—</td><td>Staying</td><td>Marketing, sales, product innovation, distribution, strategy</td></tr>\n<tr><td>Daniel Ju</td><td>Chief of Staff / HR</td><td>Kevin</td><td style=\"color:red\">LEAVING (end of April)</td><td>HR, culture, admin, internal comms — Kevin's college friend, 8.5 yrs</td></tr>\n<tr><td>Amanda Schoep</td><td>Dir. of CX</td><td>Kevin (or Daniel?)</td><td style=\"color:red\">BEING FIRED</td><td>25-person CX team, not implementing AI</td></tr>\n<tr><td>Brandon</td><td>Dir. of Ops</td><td>Kevin (direct)</td><td>Staying</td><td>Warehouse, fulfillment, shipping, day-to-day ops</td></tr>\n<tr><td>[Name TBD]</td><td>Product Manager (physical)</td><td>Kevin?</td><td style=\"color:red\">DEPARTING</td><td>Physical product development/launches</td></tr>\n<tr><td>Longchuan Huang</td><td>Head of Product Dev</td><td>Kevin</td><td>Staying (new, ~3 months)</td><td>Product R&D, from Wella, PhD UPenn</td></tr>\n<tr><td>Junior Reyes</td><td>VP Growth & Data</td><td>Kevin</td><td>Staying (remote, NYC)</td><td>Growth, analytics, tech-forward</td></tr>\n<tr><td>Fractional CFO</td><td>Finance</td><td>Kevin</td><td>Staying</td><td>Budgeting, financial reporting</td></tr>\n</table>\n\n<h4>🔍 The Org Design Constraints (Kevin's Rules)</h4>\n<div class=\"card card-red\">\n<p><strong>Rule 1: NOT everything through one person.</strong> Kevin explicitly said: <em>\"I hated that model where every one of our 70 people goes through this one person.\"</em> Your org CANNOT be a hub-and-spoke with the COO in the center.</p>\n<p><strong>Rule 2: Kevin keeps his domains.</strong> He owns marketing, sales, product innovation, distribution — \"value creation.\" The COO owns operations, finance, CX, supply chain — \"value protection.\"</p>\n<p><strong>Rule 3: Brandon stays direct to Kevin (for now).</strong> Kevin said it's \"way smoother\" with Brandon reporting direct. Don't fight this on day one.</p>\n<p><strong>Rule 4: Autonomous problem-solver, not messenger.</strong> Daniel's fatal flaw was being a pass-through. Kevin wants someone who makes decisions without asking permission for everything.</p>\n</div>\n\n<h4>📊 Proposed Org Chart (Present This)</h4>\n\n<p><strong>Kevin Chen — CEO</strong></p>\n<table>\n<tr><th>Reports to Kevin (Value Creation)</th><th>Reports to COO/Trey (Value Protection)</th><th>Dotted Line / Shared</th></tr>\n<tr><td>Junior Reyes — VP Growth & Data</td><td>CX Manager (NEW HIRE — replaces Amanda)</td><td>Longchuan Huang — Head of PD (reports to Kevin, but COO manages launch ops)</td></tr>\n<tr><td>Marketing team</td><td>Finance (fractional CFO reports up through COO)</td><td>Brandon — Dir. of Ops (reports to Kevin now; transitions to COO in 90 days if trust established)</td></tr>\n<tr><td>Sales (B2B team)</td><td>HR/People Ops (NEW HIRE or outsource — replaces Daniel)</td><td></td></tr>\n<tr><td>Longchuan Huang — Head of PD</td><td>Supply Chain / Procurement</td><td></td></tr>\n</table>\n\n<h4>💡 The Three Hiring Decisions (Prioritized)</h4>\n\n<div class=\"card\">\n<h3>Hire #1 (Weeks 1-4): CX Manager — AI-Forward</h3>\n<p><strong>Why first:</strong> The CX director is being fired NOW, the 25-person team needs leadership immediately, and the body panel launch requires new CX scripts. This is the most urgent gap.</p>\n<p><strong>Profile:</strong> Not a traditional CX director. Someone who sees AI as their primary tool. Data-literate, has implemented chatbots/automation before. Doesn't need a VP-level title or salary.</p>\n<p><strong>Comp:</strong> $85-110K base + bonus. This is a manager-level role, not a director. The AI tools do the heavy lifting.</p>\n<p><strong>Reports to:</strong> COO (you). This is YOUR hire and YOUR function to transform.</p>\n</div>\n\n<div class=\"card\">\n<h3>Hire #2 (Weeks 4-8): HR/People Ops Manager — Or Outsource</h3>\n<p><strong>Why second:</strong> Daniel's departure leaves a gap in HR, onboarding, culture, and admin. But this doesn't need to be a C-suite role. Daniel's CoS title was inflated — this is really an HR manager function.</p>\n<p><strong>Option A:</strong> Hire an HR Manager at $75-90K. Handles compliance, onboarding, benefits administration, culture programs.</p>\n<p><strong>Option B:</strong> Outsource to a PEO (Professional Employer Organization) like Justworks or Rippling. Handles payroll, benefits, compliance for ~$100-150/employee/month. Add a part-time internal culture/office manager.</p>\n<p><strong>Reports to:</strong> COO. HR/People Ops is an operational function.</p>\n</div>\n\n<div class=\"card\">\n<h3>Hire #3 (Weeks 8-12): Don't Backfill the Product Manager</h3>\n<p><strong>Why not:</strong> Longchuan just started 3 months ago as Head of PD. He should absorb the departing PM's responsibilities — it actually simplifies his reporting structure. If he needs support, hire a junior PM/coordinator, not another manager.</p>\n<p><strong>The test:</strong> If Longchuan can't handle the PM's scope, that's a signal about his capability. Better to learn that now than hire around him.</p>\n</div>\n\n<h4>💰 Org Cost Comparison</h4>\n<table>\n<tr><th></th><th>Current (3 departing roles)</th><th>Proposed</th><th>Savings</th></tr>\n<tr><td>Daniel (CoS/HR)</td><td>~$150K</td><td>HR Manager: $85K or PEO: $60K</td><td>$65-90K</td></tr>\n<tr><td>Amanda (CX Director)</td><td>~$120K</td><td>CX Manager: $95K</td><td>$25K</td></tr>\n<tr><td>Product Manager</td><td>~$110K</td><td>$0 (absorbed by Longchuan)</td><td>$110K</td></tr>\n<tr style=\"background:#e8f5e9\"><td><strong>Total</strong></td><td><strong>~$380K</strong></td><td><strong>~$180-240K</strong></td><td><strong>$140-200K savings</strong></td></tr>\n</table>\n<p><strong>Key message:</strong> You're not just replacing people — you're upgrading the org structure. Fewer, better people in the right roles, supported by AI and systems instead of bodies.</p>\n\n<h4>🗣️ Talking Points — What to Say to Kevin</h4>\n<div class=\"card card-yellow\">\n<p><strong>Opening line:</strong> \"Three departures at once feels like a crisis, but it's actually an opportunity. You get to redesign the org for $150M instead of patching the org you built at $30M.\"</p>\n\n<p><strong>On Daniel's role:</strong> \"Daniel was your college friend who grew into a CoS/HR hybrid — that role was shaped by the relationship, not the business need. What the business actually needs is an HR manager for compliance and people ops, not a chief of staff. The 'chief of staff' function — strategic ops, cross-functional coordination — that's the COO role.\"</p>\n\n<p><strong>On the reporting structure:</strong> \"I know you don't want everything funneling through one person, and I agree. Here's how I'd draw the line: anything that's 'value creation' — marketing, sales, product innovation — stays with you. Anything that's 'value protection' — operations, CX, finance, HR — comes to me. Brandon stays reporting to you for now, with a plan to evaluate in 90 days. I'll earn that reporting line, not demand it.\"</p>\n\n<p><strong>On Brandon:</strong> \"Brandon is reliable and execution-oriented. I wouldn't change his reporting line on day one — that signals instability. Instead, I'd work alongside him for 90 days. If the working relationship is strong and Kevin's comfortable, we transition. If it's better with Brandon direct to you, we keep it. No ego.\"</p>\n\n<p><strong>On the PM gap:</strong> \"I wouldn't backfill the PM. Longchuan is 3 months in — this is his chance to fully own the product pipeline. If he needs tactical support, a junior PM at $60K is better than another director competing with him.\"</p>\n</div>\n\n<h4>⚡ Sub-Scenarios</h4>\n\n<div class=\"card\">\n<h3>Sub-Scenario A: Kevin says \"I want Brandon to report to you\"</h3>\n<p>This means Kevin is ready to fully empower the COO. Accept it — but carefully. Brandon has been reporting direct to Kevin and the transition was described as \"way smoother.\" Moving him under you could feel like a demotion.</p>\n<p><strong>What to say:</strong> \"I'd welcome that, but I'd want to make the transition smooth for Brandon. Day one, I'd sit with him, tell him nothing changes operationally — I'm here to remove roadblocks and advocate for his team's resources. The reporting line changes, but his autonomy doesn't.\"</p>\n</div>\n\n<div class=\"card\">\n<h3>Sub-Scenario B: Kevin asks \"What about Longchuan?\"</h3>\n<p>Product development is Kevin's passion — he may not want to give up the Longchuan reporting line. And honestly, that's fine. PD is \"value creation.\"</p>\n<p><strong>What to say:</strong> \"Longchuan should report to you. Product innovation is your domain and your passion. What I'd want is a strong working relationship with Longchuan on launch operations — I own the 'get it to market' side, he owns the 'build it' side. We align on launch readiness, but he doesn't need to go through me.\"</p>\n</div>\n\n<div class=\"card\">\n<h3>Sub-Scenario C: Kevin asks \"How do you avoid being another Daniel?\"</h3>\n<p>This is the most important question. Kevin's fear is hiring another messenger/process person who can't actually DO things.</p>\n<p><strong>What to say:</strong> \"Daniel's issue wasn't effort — it was mode. He was a coordinator, not a decision-maker. I'm going to make unpopular calls — restructuring CX, pushing back on Costco terms, telling someone their project isn't ready to launch. I won't bring you problems without solutions, and I won't wait for permission on things that are clearly in my domain. If I'm wrong, I'd rather be wrong and fix it fast than be right and slow.\"</p>\n</div>\n\n<h4>🚫 Mistakes to Avoid</h4>\n<ul>\n<li><strong>Don't grab everything.</strong> Kevin specifically hates the hub-and-spoke model. Propose a targeted scope (CX, finance, supply chain, HR) not \"everything reports to me.\"</li>\n<li><strong>Don't insult Daniel.</strong> He's Kevin's college friend of 8.5 years. The departure is amicable. Critique the role design, not the person.</li>\n<li><strong>Don't demand Brandon's reporting line.</strong> Earn it. Proposing a 90-day evaluation shows maturity and respect for existing relationships.</li>\n<li><strong>Don't create a bureaucratic layer.</strong> Kevin's company runs fast. If your org chart adds meetings, approval chains, or process for process's sake, Kevin will hate it.</li>\n</ul>"

            "title": "Scenario 10: AI Automation Roadmap for CX",
            "html": "<div class=\"card\">\n<h3>🤖 \"The CX Director Isn't Implementing AI. What Would You Do?\"</h3>\n<p>This is the scenario where Kevin is testing whether you're the \"AI-forward COO\" he needs. The CX director is literally being fired for NOT implementing AI. They have an AI consultant doing weekly calls and building N8N automations, but adoption is slow. Kevin wants to see a concrete roadmap, not hand-waving about \"leveraging AI.\"</p>\n</div>\n\n<h4>📋 The AI Landscape at iRESTORE (What You Know)</h4>\n<table>\n<tr><th>Asset</th><th>Status</th><th>Opportunity</th></tr>\n<tr><td>Call recordings (all CX calls)</td><td>Recorded + transcribed</td><td style=\"background:#e8f5e9\"><strong>GOLDMINE:</strong> No AI analysis happening. Months of transcripts sitting unused.</td></tr>\n<tr><td>Email logs</td><td>All logged in CX platform</td><td style=\"background:#e8f5e9\">Pattern mining, auto-draft responses, categorization</td></tr>\n<tr><td>AI Consultant</td><td>Weekly calls, building N8N automations</td><td style=\"background:#fff3e0\">Needs direction — currently unfocused</td></tr>\n<tr><td>N8N Workflows</td><td>Being built for influencer outreach</td><td style=\"background:#fff3e0\">Platform exists, expand to CX automation</td></tr>\n<tr><td>Fulfil.io ERP</td><td>In use</td><td>API integration for order data feeds</td></tr>\n<tr><td>Shopify</td><td>DTC platform</td><td>Customer data, order history, behavior tracking</td></tr>\n<tr><td>600K customer email list</td><td>Exists</td><td>Personalization, predictive churn modeling</td></tr>\n</table>\n\n<h4>📊 The AI Automation Roadmap (90-Day Plan)</h4>\n\n<div class=\"card card-green\">\n<h3>Phase 1: Insight Layer (Weeks 1-3) — Cost: ~$2-5K — No Workflow Changes</h3>\n<p><strong>Goal:</strong> Turn existing data into insights without changing any current processes.</p>\n<table>\n<tr><th>Initiative</th><th>How</th><th>Tool</th><th>Output</th></tr>\n<tr><td><strong>Transcript analysis</strong></td><td>Run 6 months of call transcripts through GPT-4/Claude. Categorize by: return reason, sentiment, agent performance, outcome.</td><td>OpenAI API or Claude API + Python script</td><td>Dashboard showing: top return reasons, best/worst agents, most effective retention scripts</td></tr>\n<tr><td><strong>Email categorization</strong></td><td>Classify last 90 days of inbound emails by topic, urgency, and required action.</td><td>Same</td><td>% breakdown of email types → identifies what to automate first</td></tr>\n<tr><td><strong>Return reason taxonomy</strong></td><td>Build a standardized reason-code system from actual customer language (not internal assumptions).</td><td>LLM clustering on transcripts</td><td>10-15 standardized reason codes with real examples</td></tr>\n</table>\n<p><strong>Why this is first:</strong> Zero disruption to current operations. The AI consultant can execute this in 2-3 weeks. It produces the DATA you need to prioritize everything else. And it gives Kevin something tangible immediately — \"here's what we learned from analyzing 10,000 calls.\"</p>\n</div>\n\n<div class=\"card\">\n<h3>Phase 2: Deflection Layer (Weeks 3-8) — Cost: ~$15-30K — Reduces Ticket Volume</h3>\n<p><strong>Goal:</strong> Route commodity inquiries to self-service, reducing human ticket volume by 30-40%.</p>\n<table>\n<tr><th>Initiative</th><th>How</th><th>Est. Ticket Deflection</th><th>Tool Options</th></tr>\n<tr><td><strong>FAQ chatbot (DTC site + email)</strong></td><td>Trained on product knowledge base, shipping policies, return policies. Handles: \"Where's my order?\", \"How do I use it?\", \"What's the return policy?\"</td><td>25-30% of all tickets (~3,500-4,200/month)</td><td>Intercom, Zendesk AI, or custom GPT</td></tr>\n<tr><td><strong>Self-service order tracking</strong></td><td>Widget on DTC site that pulls real-time tracking from Fulfil.io/Shopify. Customer never needs to contact support.</td><td>15-20% of email tickets</td><td>Shopify order tracking app or custom integration</td></tr>\n<tr><td><strong>Automated warranty status check</strong></td><td>Customer enters serial number, gets warranty status + claim form instantly.</td><td>5-8% of tickets</td><td>Simple web form + Fulfil.io lookup</td></tr>\n</table>\n<p><strong>Combined impact:</strong> ~40-50% reduction in commodity tickets reaching human agents. This is what frees agents to focus on high-value work (retention, pre-sales).</p>\n</div>\n\n<div class=\"card\">\n<h3>Phase 3: Augmentation Layer (Weeks 8-16) — Cost: ~$10-20K — Makes Agents Better</h3>\n<p><strong>Goal:</strong> AI doesn't replace agents — it makes them 2-3x more effective.</p>\n<table>\n<tr><th>Initiative</th><th>How</th><th>Impact</th></tr>\n<tr><td><strong>AI-drafted email responses</strong></td><td>Agent gets inbound email → AI drafts a response based on templates + customer context → agent reviews and sends in 30 seconds instead of 5 minutes.</td><td>Email handle time: 8 min → 2 min (75% reduction)</td></tr>\n<tr><td><strong>Real-time call coaching</strong></td><td>During retention calls, AI listens and suggests: \"This customer mentioned price sensitivity — offer the payment plan first, then 50% refund.\"</td><td>Retention rate improvement: +10-20%</td></tr>\n<tr><td><strong>Sentiment scoring on live calls</strong></td><td>AI flags when customer sentiment shifts negative, prompts supervisor intervention or script change.</td><td>Escalation prevention, better outcomes</td></tr>\n<tr><td><strong>Predictive churn alerts</strong></td><td>Model built on purchase date + app usage + CX interaction history. Flags customers likely to return BEFORE they contact support.</td><td>Proactive outreach saves returns before they happen</td></tr>\n</table>\n</div>\n\n<div class=\"card\">\n<h3>Phase 4: Optimization Layer (Ongoing) — Continuous Improvement</h3>\n<table>\n<tr><th>Initiative</th><th>How</th><th>Impact</th></tr>\n<tr><td><strong>A/B test retention scripts at scale</strong></td><td>AI generates script variants → tracks which scripts produce highest retention by return reason × customer segment.</td><td>Systematize what's currently ad hoc. Move from \"hope the agent negotiates well\" to \"the system knows the optimal approach.\"</td></tr>\n<tr><td><strong>Automated QA on 100% of calls</strong></td><td>Instead of QA sampling 5% of calls, AI scores every call on adherence, empathy, resolution, upsell attempt.</td><td>Find coaching opportunities automatically. Identify top performers for promotion.</td></tr>\n<tr><td><strong>Voice of Customer reporting</strong></td><td>Monthly AI-generated report: top complaints, emerging issues, product feedback, competitive mentions.</td><td>Product team gets unfiltered customer insight. Marketing gets testimonial/UGC material.</td></tr>\n</table>\n</div>\n\n<h4>💰 Total ROI Calculation</h4>\n<table>\n<tr><th>Category</th><th>Annual Impact</th><th>How</th></tr>\n<tr><td>Headcount reduction (25 → 13)</td><td>$225K savings</td><td>Fewer agents needed as automation handles commodity volume</td></tr>\n<tr><td>Improved retention rate (+2pp)</td><td>$1.2-1.8M</td><td>Better scripts, proactive outreach, AI-assisted negotiations</td></tr>\n<tr><td>Agent productivity (email handle time reduction)</td><td>$50-80K</td><td>Equivalent of 2-3 FTE capacity freed up</td></tr>\n<tr><td>Reduced return processing cost</td><td>$100-200K</td><td>Fewer returns = less reverse logistics cost</td></tr>\n<tr style=\"background:#e8f5e9\"><td><strong>Total annual benefit</strong></td><td><strong>$1.6-2.3M</strong></td><td></td></tr>\n<tr><td>Total AI investment (Year 1)</td><td>($80-130K)</td><td>Tools + consultant time + integration</td></tr>\n<tr style=\"background:#e8f5e9\"><td><strong>Net ROI</strong></td><td><strong>$1.5-2.2M (12-17x return)</strong></td><td></td></tr>\n</table>\n\n<h4>🗣️ Talking Points — What to Say to Kevin</h4>\n<div class=\"card card-yellow\">\n<p><strong>Opening line:</strong> \"You're sitting on a goldmine of data and a CX team that's been manually doing what AI can do 10x faster. The call transcripts alone — months of recordings that nobody's analyzing — contain the blueprint for cutting returns and improving retention. I'd start there in week one.\"</p>\n\n<p><strong>On the AI consultant:</strong> \"You already have the consultant on payroll and the N8N infrastructure. The problem isn't capability — it's direction. The consultant needs specific projects with measurable outcomes, not a general 'automate things' mandate. I'd give them three deliverables in 30 days: transcript analysis, FAQ chatbot, and email auto-drafting.\"</p>\n\n<p><strong>On the CX director firing:</strong> \"Amanda's departure is the right call, and it creates the opportunity to hire an AI-native CX leader. The new hire should see their job as building a system, not managing a team. The team shrinks because the system works — that's the design, not the side effect.\"</p>\n\n<p><strong>The ROI pitch:</strong> \"Total AI investment is under $130K in year one. The return from reduced headcount, improved retention, and agent productivity is $1.5-2.2M. That's a 12-17x return. And unlike most investments, this one compounds — the AI gets better with more data, and the savings grow as volume grows.\"</p>\n</div>\n\n<h4>⚡ Sub-Scenarios</h4>\n\n<div class=\"card\">\n<h3>Sub-Scenario A: Kevin asks \"What AI tools specifically?\"</h3>\n<p>Be ready with concrete recommendations:</p>\n<ul>\n<li><strong>Transcript analysis:</strong> OpenAI API (GPT-4o) or Anthropic Claude API — batch process via Python script, ~$0.01-0.03 per transcript</li>\n<li><strong>Chatbot:</strong> Intercom Fin ($0.99/resolution), Zendesk AI, or custom using OpenAI Assistants API</li>\n<li><strong>Email drafting:</strong> Zendesk Intelligent Triage + AI agent, or custom N8N workflow with LLM</li>\n<li><strong>Call coaching:</strong> Gong.io, Observe.AI, or Balto (purpose-built for real-time call coaching)</li>\n<li><strong>Orchestration:</strong> N8N (already in use) for connecting everything together</li>\n</ul>\n</div>\n\n<div class=\"card\">\n<h3>Sub-Scenario B: Kevin pushes back — \"Will customers hate talking to a bot?\"</h3>\n<p><strong>What to say:</strong> \"The bot only handles things customers hate calling about — waiting on hold to ask 'where's my package?' Nobody prefers a 4-hour email wait over a 5-second chatbot answer. The human agents get freed up for conversations that actually benefit from empathy — retention calls, troubleshooting, pre-sales advice. Customers get FASTER service on simple stuff and BETTER service on complex stuff.\"</p>\n</div>\n\n<div class=\"card\">\n<h3>Sub-Scenario C: Kevin wants AI beyond CX</h3>\n<p>If the conversation expands to company-wide AI, be ready with ideas but stay focused:</p>\n<ul>\n<li><strong>Demand forecasting:</strong> ML model on historical sales data (relatively straightforward with their volume)</li>\n<li><strong>Dynamic pricing:</strong> AI-driven DTC pricing based on demand signals, inventory levels, competitive pricing</li>\n<li><strong>Influencer matching:</strong> The N8N automation they're building — LLM identifies and reaches out to micro-influencers</li>\n<li><strong>Product review mining:</strong> Analyze Amazon reviews (yours and competitors') for product improvement ideas</li>\n</ul>\n<p><strong>What to say:</strong> \"CX is where I'd start because the data exists, the ROI is clearest, and it solves a problem Kevin already wants solved. But the same AI infrastructure — the APIs, the N8N workflows, the data pipelines — can expand to demand forecasting, pricing, and marketing. CX is the beachhead.\"</p>\n</div>\n\n<h4>🚫 Mistakes to Avoid</h4>\n<ul>\n<li><strong>Don't be vague about AI.</strong> \"We should leverage AI\" is worthless. Name the tool, the cost, the timeline, and the expected outcome. Kevin's firing someone for being vague about AI — don't make the same mistake.</li>\n<li><strong>Don't over-promise timelines.</strong> A chatbot takes 3-5 weeks to build and test properly, not \"we'll have it Monday.\" Under-promise, over-deliver.</li>\n<li><strong>Don't ignore the N8N work already happening.</strong> They have infrastructure and a consultant. Build on it, don't replace it with your own vision. Shows you respect what exists.</li>\n<li><strong>Don't forget data privacy.</strong> Call transcripts contain customer PII. Any AI tool needs to be compliant. Mention this briefly to show you think about risk, not just opportunity.</li>\n</ul>"

            "html": "<div class=\"card\">\n<h3>💵 \"Model Our Cash Flow for the Next 12 Months\"</h3>\n<p>Kevin bragged about negative cash conversion — he collects from customers before paying the factory. But with 65%+ growth, multiple product launches, and Costco terms at net-30-60, that advantage can flip. This tests whether you understand cash as a strategic weapon.</p>\n</div>\n\n<h4>📋 iRESTORE's Cash Conversion Advantage (Understand This First)</h4>\n<div class=\"card card-green\">\n<p><strong>Why iRESTORE has negative cash conversion:</strong></p>\n<ul>\n<li><strong>Customer pays immediately:</strong> DTC (67% of revenue) = credit card at checkout. Cash in hand in 1-3 days.</li>\n<li><strong>Amazon pays in 14 days:</strong> Amazon (33%) settles every 2 weeks.</li>\n<li><strong>Factory gets paid in 150 days:</strong> Net-150 terms from Kevin's father's Shenzhen factory.</li>\n<li><strong>Result:</strong> iRESTORE collects cash ~140+ days before paying for the product. At $90M revenue, that's $35-40M of free working capital at any given time.</li>\n</ul>\n<p><strong>This is the single biggest structural advantage in the business.</strong> Most DTC companies are cash-negative (they pay suppliers in 30-60 days but collect from Amazon in 14). iRESTORE's model is inverted.</p>\n</div>\n\n<h4>📊 Example 12-Month Cash Flow Model</h4>\n<table>\n<tr><th>Month</th><th>Revenue</th><th>Cash In (DTC+Amz)</th><th>Factory Pmt Due (150-day lag)</th><th>OpEx</th><th>Monthly Cash Flow</th><th>Running Balance</th></tr>\n<tr><td>Jan '26</td><td>$7.9M</td><td>$7.5M</td><td>($2.0M) — Aug '25 PO</td><td>($3.8M)</td><td>+$1.7M</td><td>$11.7M</td></tr>\n<tr><td>Feb '26</td><td>$7.4M</td><td>$7.0M</td><td>($2.1M) — Sep '25 PO</td><td>($3.6M)</td><td>+$1.3M</td><td>$13.0M</td></tr>\n<tr><td>Mar '26</td><td>$8.4M</td><td>$8.0M</td><td>($2.4M) — Oct '25 PO</td><td>($3.9M)</td><td>+$1.7M</td><td>$14.7M</td></tr>\n<tr><td>Apr '26 🚀</td><td>$10.8M</td><td>$10.3M</td><td>($3.6M) — Nov '25 PO</td><td>($4.5M)</td><td>+$2.2M</td><td>$16.9M</td></tr>\n<tr><td>May '26</td><td>$12.3M</td><td>$11.7M</td><td>($3.2M) — Dec '25 PO</td><td>($5.0M)</td><td>+$3.5M</td><td>$20.4M</td></tr>\n<tr><td>Jun '26</td><td>$11.5M</td><td>$10.9M</td><td>($2.5M) — Jan '26 PO</td><td>($4.8M)</td><td>+$3.6M</td><td>$24.0M</td></tr>\n<tr><td>Jul '26</td><td>$10.8M</td><td>$10.3M</td><td>($2.6M) — Feb '26 PO</td><td>($4.6M)</td><td>+$3.1M</td><td>$27.1M</td></tr>\n<tr style=\"background:#fff3e0\"><td>Aug '26 ⚠️</td><td>$12.8M</td><td>$12.2M</td><td>($4.2M) — Mar '26 PO (Q4 build)</td><td>($5.2M)</td><td>+$2.8M</td><td>$29.9M</td></tr>\n<tr style=\"background:#fff3e0\"><td>Sep '26 ⚠️</td><td>$14.6M</td><td>$13.9M</td><td>($5.5M) — Apr '26 PO (body panels + ramp)</td><td>($5.8M)</td><td>+$2.6M</td><td>$32.5M</td></tr>\n<tr><td>Oct '26</td><td>$18.0M</td><td>$17.1M</td><td>($5.8M) — May '26 PO</td><td>($6.5M)</td><td>+$4.8M</td><td>$37.3M</td></tr>\n<tr><td>Nov '26</td><td>$25.7M</td><td>$24.4M</td><td>($5.2M) — Jun '26 PO</td><td>($8.0M)</td><td>+$11.2M</td><td>$48.5M</td></tr>\n<tr><td>Dec '26</td><td>$22.5M</td><td>$21.4M</td><td>($4.8M) — Jul '26 PO</td><td>($7.2M)</td><td>+$9.4M</td><td>$57.9M</td></tr>\n</table>\n\n<p><strong>Key insight:</strong> The base case looks great — cash builds all year because you collect before paying. But this model assumes everything goes to plan. The stress scenarios are where the risk lives.</p>\n\n<h4>⚠️ Stress Scenarios</h4>\n\n<div class=\"card card-red\">\n<h3>Stress Scenario 1: Costco Grows to 20% of Revenue (Cash Timing Shift)</h3>\n<p><strong>The problem:</strong> DTC = instant cash. Costco = net-30 to net-60. If Costco grows from 10% to 20% of revenue ($32M), that's $32M where you wait 30-60 days to get paid instead of getting paid instantly.</p>\n<p><strong>Cash impact:</strong> $32M × 45-day average delay / 365 = <strong>$3.9M of working capital tied up in Costco receivables</strong> that wouldn't exist if that revenue were DTC.</p>\n<p><strong>What to watch:</strong> Costco AR aging. If they start paying at 60 days instead of 30, your cash position can swing $1.5M in a single month.</p>\n<p><strong>What to say:</strong> \"Every percentage point of mix shift from DTC to Costco has a working capital cost. At 20% Costco, you're carrying $4M in receivables that wouldn't exist at DTC. That's the hidden cost of retail channel expansion.\"</p>\n</div>\n\n<div class=\"card card-red\">\n<h3>Stress Scenario 2: Emergency Air Freight for Q4</h3>\n<p><strong>The problem:</strong> If demand exceeds forecast and you need emergency inventory for Q4, air freight from Shenzhen costs 5-8x ocean freight.</p>\n<p><strong>Model it:</strong> 10,000 units × $30 air freight premium per unit = <strong>$300K unplanned cash outflow</strong>. Plus you might need to pay the factory faster (net-30 instead of net-150) to jump the production queue.</p>\n<p><strong>Worst case:</strong> If the factory requires prepayment for rush orders: 10,000 units × $140 COGS = $1.4M cash out 120 days earlier than planned.</p>\n</div>\n\n<div class=\"card card-red\">\n<h3>Stress Scenario 3: Body Panels Underperform (Inventory Sitting)</h3>\n<p><strong>The problem:</strong> $500K PO on zero sales. If only 40% sells in 6 months, you're sitting on $300K of inventory. The cash isn't the issue (net-150 means you pay the factory in August for a February PO) — but the space and carrying cost is real.</p>\n<p><strong>Cash impact:</strong> Factory payment hits in August regardless of sell-through. If body panels haven't moved, you're paying $500K for inventory you can't sell and that's blocking space for helmets going into Q4.</p>\n</div>\n\n<h4>💡 Cash Management Recommendations</h4>\n<table>\n<tr><th>#</th><th>Recommendation</th><th>Impact</th></tr>\n<tr><td>1</td><td><strong>Protect the net-150 terms at all costs.</strong> This is the most valuable financial asset in the business. Never jeopardize the family factory relationship for short-term savings.</td><td>$35-40M free working capital</td></tr>\n<tr><td>2</td><td><strong>Build a cash reserve for Q4 surge spending.</strong> Target $5M liquid by September to fund air freight contingencies, extra warehouse costs, and Q4 marketing ramp.</td><td>Risk mitigation</td></tr>\n<tr><td>3</td><td><strong>Negotiate Costco terms aggressively.</strong> Push for net-30 with early-pay discount incentive (2% 10, net 30). Every day of faster collection = working capital freed.</td><td>$1-2M working capital improvement</td></tr>\n<tr><td>4</td><td><strong>Model a \"worst case\" cash floor.</strong> What's the minimum cash balance you never want to breach? I'd set it at $8-10M (2 months of OpEx). Any projection that dips below that triggers corrective action.</td><td>Financial discipline</td></tr>\n</table>\n\n<h4>🗣️ Talking Points — What to Say to Kevin</h4>\n<div class=\"card card-yellow\">\n<p><strong>Opening line:</strong> \"Your negative cash conversion cycle is one of the most powerful financial advantages I've ever seen in a DTC business. Net-150 from the factory while collecting from customers in 1-14 days means you're essentially running on your customers' cash. At $90M, that's $35-40M of free float.\"</p>\n\n<p><strong>The risk framing:</strong> \"The risk isn't in the base case — cash builds beautifully on this trajectory. The risk is in the tail scenarios: a Costco promo that requires emergency air freight, a product launch that flops and ties up cash in unsold inventory, or a factory payment that comes due during a slow month. I'd build a cash waterfall model with trigger points — when cash hits X, we take action Y.\"</p>\n\n<p><strong>The strategic angle:</strong> \"Cash isn't just safety — it's a weapon. With $30-40M on hand, you can make aggressive moves: exclusive Costco roadshow, QVC launch inventory, acquire a competitor's customer base, or build an east coast fulfillment node. The fractional CFO tracks the numbers — I'd use cash as a strategic tool.\"</p>\n\n<p><strong>On the exit:</strong> \"For a $500M exit, buyers will value predictable free cash flow. A cash conversion model this good, with growing EBITDA and scalable infrastructure, commands a premium multiple. Every dollar of FCF improvement at 15x EBITDA is $15 in enterprise value.\"</p>\n</div>\n\n<h4>⚡ Sub-Scenarios</h4>\n\n<div class=\"card\">\n<h3>Sub-Scenario A: Kevin says \"What if my dad raises prices?\"</h3>\n<p>The family factory relationship is a competitive moat, but it's not zero-risk. If component costs rise 10%, that's $2.25M additional COGS.</p>\n<p><strong>What to say:</strong> \"I'd never want to jeopardize the family relationship, but I would want to know our cost position relative to market. Running an annual RFQ with 2-3 alternative suppliers — not to switch, but to validate pricing — keeps everyone honest and shows your father's team that you're running a professional procurement operation.\"</p>\n</div>\n\n<div class=\"card\">\n<h3>Sub-Scenario B: Kevin asks about using cash for an acquisition</h3>\n<p>At $500M exit target, Kevin may be thinking about acquiring a competitor (Capillus at $20-25M revenue) or a complementary brand. Show you can think about M&A from a cash perspective.</p>\n<p><strong>What to say:</strong> \"With $30M+ cash on hand and growing, you could self-fund a small tuck-in acquisition. A $5-10M deal for a complementary brand or technology would diversify the portfolio and add to the exit story. But I'd want to see the cash model with the acquisition layered in — make sure we're not drawing down reserves below the safety floor.\"</p>\n</div>\n\n<h4>🚫 Mistakes to Avoid</h4>\n<ul>\n<li><strong>Don't confuse cash flow with profitability.</strong> A business can be profitable and cash-poor (if growth requires big inventory bets). Show you understand the difference.</li>\n<li><strong>Don't touch the factory relationship.</strong> Kevin's father's factory is sacred. Any suggestion that sounds like \"let's find a cheaper supplier\" will kill your candidacy. Frame alternative sourcing as \"diversification for risk management.\"</li>\n<li><strong>Don't forget Costco terms.</strong> Retail AR is a working capital trap that DTC companies don't naturally think about. Raising this proactively shows financial sophistication.</li>\n<li><strong>Don't build a 50-row model.</strong> Kevin wants to see how you think about cash, not a detailed financial model. The fractional CFO does the modeling — you set the strategy.</li>\n</ul>"

            "title": "Scenario 12: Refurbishment / Reverse Logistics",
            "html": "<div class=\"card\">\n<h3>♻️ \"We Get a Lot of Returns. Maximize Recovery Value.\"</h3>\n<p>At ~27,000 returned units/year with 50-56% salvageable, iRESTORE is sitting on millions in recoverable value. You suggested refurb-to-B2B in the interview and Kevin hadn't considered it — this is your idea to own.</p>\n</div>\n\n<h4>📋 Example Data You Might Receive</h4>\n<table>\n<tr><th>Return/Refurb Metric</th><th>Value</th></tr>\n<tr><td>Total Returns (annual)</td><td>~27,250 units</td></tr>\n<tr><td>Avg Original Retail Price</td><td>$320</td></tr>\n<tr><td>Total Returned Retail Value</td><td>$8.7M</td></tr>\n<tr><td>Condition: Like-new (repackage & resell)</td><td>~20% (~5,450 units)</td></tr>\n<tr><td>Condition: Cosmetic damage only (refurbishable)</td><td>~33% (~9,000 units)</td></tr>\n<tr><td>Condition: Functional but damaged packaging</td><td>~12% (~3,270 units)</td></tr>\n<tr><td>Condition: Unsalvageable / defective</td><td>~35% (~9,540 units)</td></tr>\n<tr><td>Current refurb process</td><td>Manual inspection, some used for influencer seeding</td></tr>\n<tr><td>Current recovery revenue</td><td>Minimal — mostly influencer seeding + disposal</td></tr>\n<tr><td>Refurb cost per unit</td><td>$8-15 (inspection, cleaning, repackaging)</td></tr>\n<tr><td>Disposal cost per unit</td><td>$3-5 (e-waste compliance)</td></tr>\n</table>\n\n<h4>📊 Recovery Value Waterfall (Build This Model)</h4>\n<table>\n<tr><th>Disposition</th><th>Units</th><th>Recovery Channel</th><th>Recovery $/Unit</th><th>Cost/Unit</th><th>Net Recovery</th><th>Annual Value</th></tr>\n<tr style=\"background:#e8f5e9\"><td>Like-new → Resell as \"Certified Refurbished\"</td><td>5,450</td><td>Amazon Renewed, iRESTORE.com \"Open Box\"</td><td>$220 (65% of retail)</td><td>($10) repack</td><td>$210</td><td><strong>$1.14M</strong></td></tr>\n<tr style=\"background:#e8f5e9\"><td>Refurb → B2B / Clinic wholesale</td><td>5,000</td><td>Sell to clinics/salons at wholesale price</td><td>$150 (45% of retail)</td><td>($15) refurb</td><td>$135</td><td><strong>$675K</strong></td></tr>\n<tr style=\"background:#e8f5e9\"><td>Refurb → Influencer seeding</td><td>2,500</td><td>Send to influencers in exchange for content</td><td>$0 cash (but saves $320/unit vs. new)</td><td>($12) refurb</td><td>$308 (avoided cost)</td><td><strong>$770K avoided</strong></td></tr>\n<tr style=\"background:#fff3e0\"><td>Damaged packaging → Bundle discount</td><td>3,270</td><td>DTC \"Last Chance\" section at 40% off</td><td>$192 (60% of retail)</td><td>($8) inspect</td><td>$184</td><td><strong>$602K</strong></td></tr>\n<tr style=\"background:#ffebee\"><td>Unsalvageable → Parts harvest</td><td>3,000</td><td>Strip for LED modules, power supplies → use as replacement parts</td><td>$15 (parts value)</td><td>($5) disassembly</td><td>$10</td><td><strong>$30K</strong></td></tr>\n<tr style=\"background:#ffebee\"><td>Unsalvageable → Dispose</td><td>6,540</td><td>E-waste recycling</td><td>$0</td><td>($4) disposal</td><td>($4)</td><td><strong>($26K)</strong></td></tr>\n<tr style=\"background:#e3f2fd\"><td><strong>TOTAL</strong></td><td><strong>25,760</strong></td><td></td><td></td><td></td><td></td><td><strong>$2.42M cash + $770K avoided cost</strong></td></tr>\n</table>\n\n<div class=\"card card-green\">\n<h3>💰 The Bottom Line</h3>\n<p><strong>Current recovery:</strong> Near $0 (mostly disposal + ad hoc influencer seeding)</p>\n<p><strong>Proposed recovery:</strong> $2.42M in cash revenue + $770K in avoided influencer costs = <strong>$3.19M total value</strong></p>\n<p><strong>Investment required:</strong> 2 dedicated refurb technicians ($56K), improved inspection area ($15K one-time), Amazon Renewed account setup ($5K), \"Certified Refurbished\" DTC page ($2K)</p>\n<p><strong>ROI: ~$3.1M return on ~$78K investment = 40:1</strong></p>\n</div>\n\n<h4>📅 Implementation Plan</h4>\n<table>\n<tr><th>Phase</th><th>Timeline</th><th>Actions</th></tr>\n<tr><td><strong>Phase 1: Triage System</strong></td><td>Weeks 1-3</td><td>Build a 4-tier grading system (A: like-new, B: cosmetic, C: functional/damaged box, D: unsalvageable). Every returned unit gets graded at intake. Track volume by grade.</td></tr>\n<tr><td><strong>Phase 2: High-Value Recovery</strong></td><td>Weeks 3-8</td><td>Launch Amazon Renewed listings for Grade A units. Create DTC \"Open Box / Certified Refurbished\" page. Set up B2B wholesale pricing for Grade B units to clinic sales team.</td></tr>\n<tr><td><strong>Phase 3: Influencer Pipeline</strong></td><td>Weeks 4-8</td><td>Systematize influencer seeding: Grade B/C units go to influencer queue. Track: units sent → content generated → attributable revenue. Calculate true ROI of refurb-to-influencer vs. buying new.</td></tr>\n<tr><td><strong>Phase 4: Parts Harvesting</strong></td><td>Weeks 8-12</td><td>Grade D units go to parts harvest: LED modules, power supplies, cables become warranty replacement parts. Reduces new parts ordering.</td></tr>\n</table>\n\n<h4>🗣️ Talking Points — What to Say to Kevin</h4>\n<div class=\"card card-yellow\">\n<p><strong>Opening line:</strong> \"You're processing ~27,000 returns a year and recovering almost nothing. At 50-55% salvageable, that's ~15,000 units worth $4.8M at retail that are going to waste. I'd build a recovery operation that captures $2.5M+ of that value in year one.\"</p>\n\n<p><strong>The B2B angle (YOUR idea):</strong> \"In our last conversation, I mentioned using refurbished units for B2B/clinic sales — and I want to go deeper. Clinics don't care about retail packaging. A refurbished Pro Helmet sold to a clinic at $150 is pure margin because you've already written off the return. And it seeds the B2B channel without competing with your DTC pricing.\"</p>\n\n<p><strong>The Amazon Renewed play:</strong> \"Amazon Renewed is a no-brainer for Grade A returns. You sell a 'Certified Refurbished' Pro Helmet at $449 instead of $695. Your COGS on that unit is $10 of repackaging — not $140 of manufacturing. That's a 98% gross margin on recovered units.\"</p>\n\n<p><strong>The influencer math:</strong> \"You're already seeding returned units to influencers. But are you tracking the ROI? If a refurbed unit sent to an influencer generates $5K in attributable revenue, that's a 15x return — far better than sending a $140 new unit. I'd formalize this pipeline and measure it.\"</p>\n</div>\n\n<h4>⚡ Sub-Scenarios</h4>\n\n<div class=\"card\">\n<h3>Sub-Scenario A: Kevin asks \"Won't refurb sales cannibalize new sales?\"</h3>\n<p><strong>What to say:</strong> \"Cannibalization risk is real on DTC and Amazon — a refurb listing at 35% off could steal a full-price sale. That's why I'd segment the channels: refurb goes to Amazon Renewed (different listing, different buyer), B2B clinics (no consumer overlap), and a gated DTC 'Open Box' page that's not searchable or advertised. The refurb buyer and the full-price buyer are different people.\"</p>\n</div>\n\n<div class=\"card\">\n<h3>Sub-Scenario B: Salvage rate is worse than expected (below 40%)</h3>\n<p>If most returns are truly unsalvageable, the issue is upstream — either product quality or return reason (customers using and returning). Shift focus from recovery to prevention and diagnosis.</p>\n<p><strong>What to say:</strong> \"If we're below 40% salvageable, that tells me either there's a QC issue at the factory or customers are using the device for the full trial period and returning it. Either way, the fix is upstream — better QC reduces defective returns, and better expectation-setting reduces 'used and returned' units.\"</p>\n</div>\n\n<div class=\"card\">\n<h3>Sub-Scenario C: Kevin asks about the warehouse impact</h3>\n<p>Returns processing takes space — inspection stations, grading area, refurb bench, storage by grade, shipping for refurb orders. This connects directly to Scenario 8 (Warehouse).</p>\n<p><strong>What to say:</strong> \"Returns processing is a real space consumer. I'd dedicate a specific zone in La Mirada — maybe 3,000-4,000 sq ft — with clear workflow: intake → grade → route to disposition. Right now returns probably sit in a mixed pile. Structured reverse logistics is how you turn a cost center into a revenue line.\"</p>\n</div>\n\n<h4>🚫 Mistakes to Avoid</h4>\n<ul>\n<li><strong>Don't treat returns as pure waste.</strong> Kevin already knows returns are expensive — show him they're also an asset.</li>\n<li><strong>Don't forget the influencer seeding value.</strong> This is already happening. Formalize and measure it, don't replace it.</li>\n<li><strong>Don't ignore e-waste compliance.</strong> Electronic device disposal has regulatory requirements. Mention this briefly to show operational awareness.</li>\n<li><strong>Don't create a channel conflict.</strong> Refurb pricing must be segmented from new pricing. A refurb listing that undercuts your own DTC price is worse than disposing the unit.</li>\n</ul>"
          },

            "title": "Scenario 13: Operational KPI Dashboard",
            "html": "<div class=\"card\">\n<h3>📈 \"Build Me a Weekly Scorecard\"</h3>\n<p>Kevin said the S&OP-style weekly review is \"a huge time suck.\" He wants a COO who can distill the business into 8-10 metrics he can scan in 5 minutes. This scenario tests whether you know what matters vs. what's just noise.</p>\n</div>\n\n<h4>📋 The iRESTORE Weekly Scorecard (Present This Exact Format)</h4>\n<p>Design principle: Kevin should be able to look at this for 5 minutes on Monday morning and know exactly where the business stands.</p>\n\n<table>\n<tr><th>Category</th><th>KPI</th><th>This Week</th><th>Last Week</th><th>Δ</th><th>Target</th><th>Status</th></tr>\n<tr style=\"background:#e8f5e9\"><td rowspan=\"2\"><strong>💰 Revenue</strong></td><td>Weekly Net Revenue</td><td>$2.15M</td><td>$1.98M</td><td>+8.6%</td><td>$2.0M</td><td>🟢</td></tr>\n<tr style=\"background:#e8f5e9\"><td>DTC % of Revenue</td><td>68%</td><td>65%</td><td>+3pp</td><td>>65%</td><td>🟢</td></tr>\n<tr><td rowspan=\"2\"><strong>📦 Fulfillment</strong></td><td>Orders Shipped (% same-day)</td><td>94%</td><td>96%</td><td>-2pp</td><td>>95%</td><td>🟡</td></tr>\n<tr><td>Avg Ship Time (order → delivered)</td><td>4.2 days</td><td>3.8 days</td><td>+0.4</td><td><4.0 days</td><td>🟡</td></tr>\n<tr style=\"background:#ffebee\"><td rowspan=\"2\"><strong>📉 Returns</strong></td><td>Return Rate (trailing 30-day)</td><td>10.2%</td><td>9.8%</td><td style=\"color:red\">+0.4pp</td><td><8%</td><td>🔴</td></tr>\n<tr style=\"background:#ffebee\"><td>Retention Rate (% of return calls saved)</td><td>28%</td><td>31%</td><td style=\"color:red\">-3pp</td><td>>35%</td><td>🔴</td></tr>\n<tr><td rowspan=\"2\"><strong>🎧 CX</strong></td><td>Tickets per 100 Orders</td><td>22</td><td>20</td><td>+2</td><td><18</td><td>🟡</td></tr>\n<tr><td>Avg First Response Time</td><td>3.2 hrs</td><td>4.1 hrs</td><td style=\"color:green\">-0.9</td><td><2 hrs</td><td>🟡</td></tr>\n<tr style=\"background:#e8f5e9\"><td rowspan=\"2\"><strong>📊 Inventory</strong></td><td>Weeks of Supply — Pro Helmet</td><td>14 wks</td><td>15 wks</td><td>-1</td><td>12-20 wks</td><td>🟢</td></tr>\n<tr style=\"background:#e8f5e9\"><td>Weeks of Supply — Essential</td><td>11 wks</td><td>12 wks</td><td>-1</td><td>12-20 wks</td><td>🟡</td></tr>\n<tr><td><strong>💵 Cash</strong></td><td>Cash Balance</td><td>$14.2M</td><td>$13.8M</td><td>+$400K</td><td>>$10M</td><td>🟢</td></tr>\n<tr><td><strong>📣 Marketing</strong></td><td>Blended CAC (7-day trailing)</td><td>$118</td><td>$112</td><td style=\"color:red\">+$6</td><td><$110</td><td>🟡</td></tr>\n</table>\n\n<h4>🔍 How to Read the Scorecard (Teach Kevin This)</h4>\n<div class=\"card card-green\">\n<p><strong>The \"5-Minute Monday\" Protocol:</strong></p>\n<ol>\n<li><strong>Scan the Status column first.</strong> Any 🔴? Those are the only things that need discussion. Everything else is FYI.</li>\n<li><strong>Check the Δ column.</strong> Trends matter more than absolutes. A metric at target but trending down is a yellow flag.</li>\n<li><strong>This week's two red items:</strong> Return rate crept up (10.2%) and retention rate dropped (28%). These are connected — fewer returns being saved = more returns completed. Root cause: was there a new agent cohort? A product issue? A specific channel spike?</li>\n<li><strong>One yellow to watch:</strong> Essential Helmet is at 11 weeks of supply, dipping below the 12-week floor. At current velocity, that's 2.5 months to stockout — but with a 5-month lead time, the reorder needs to happen NOW if it hasn't already.</li>\n</ol>\n</div>\n\n<h4>📊 Layer 2: Monthly Deep-Dive Metrics (Not Weekly)</h4>\n<p>Some metrics don't move weekly but matter monthly:</p>\n<table>\n<tr><th>Metric</th><th>Frequency</th><th>Why</th></tr>\n<tr><td>Channel-level contribution margin</td><td>Monthly</td><td>Weekly is too noisy — channel mix shifts with promos</td></tr>\n<tr><td>LTV:CAC by acquisition cohort</td><td>Monthly</td><td>Cohort analysis needs 30+ day window</td></tr>\n<tr><td>CX cost per order</td><td>Monthly</td><td>Tracks CX efficiency as automation rolls out</td></tr>\n<tr><td>Return rate by product × channel</td><td>Monthly</td><td>Identifies which SKU-channel combos are problems</td></tr>\n<tr><td>Employee satisfaction / NPS</td><td>Quarterly</td><td>3 departures happening — morale matters</td></tr>\n<tr><td>Warehouse capacity utilization %</td><td>Monthly</td><td>Tracks runway until space crisis</td></tr>\n</table>\n\n<h4>📅 Meeting Cadence to Propose</h4>\n<table>\n<tr><th>Meeting</th><th>Frequency</th><th>Duration</th><th>Attendees</th><th>Purpose</th></tr>\n<tr><td><strong>Scorecard Scan</strong></td><td>Monday AM</td><td>15 min</td><td>Kevin + COO</td><td>Review scorecard. Discuss reds only. Decide actions.</td></tr>\n<tr><td><strong>Ops Standup</strong></td><td>Daily (async in Slack)</td><td>0 min (written)</td><td>Brandon, CX Manager, COO</td><td>Each posts: done yesterday, doing today, blockers.</td></tr>\n<tr><td><strong>Monthly Business Review</strong></td><td>Monthly</td><td>60 min</td><td>Leadership team</td><td>Deep dive on Layer 2 metrics. Strategic decisions.</td></tr>\n<tr><td><strong>Quarterly Planning</strong></td><td>Quarterly</td><td>Half-day</td><td>Full leadership</td><td>Rocks/goals (EOS framework). 90-day priorities.</td></tr>\n</table>\n\n<div class=\"tip\"><strong>The key insight:</strong> Kevin's complaint about S&OP meetings being \"a huge time suck\" means the current meetings are too long, too detailed, and not actionable. Your scorecard + 15-minute Monday scan replaces a 90-minute weekly meeting. That's the COO value prop: Kevin gets BETTER information in LESS time.</div>\n\n<h4>🗣️ Talking Points — What to Say to Kevin</h4>\n<div class=\"card card-yellow\">\n<p><strong>Opening line:</strong> \"You shouldn't spend more than 5 minutes a week looking at operational data. If you're spending 90 minutes in an S&OP meeting, the problem isn't the meeting — it's that the data isn't distilled. My job is to be the filter between raw data and your attention.\"</p>\n\n<p><strong>The EOS connection:</strong> \"You're 60% through EOS adoption. The weekly scorecard IS the EOS Level 10 meeting data — same concept, but calibrated to iRESTORE's actual KPIs. Weekly Rocks stay on the quarterly planning cadence. The scorecard just makes the weekly pulse check faster.\"</p>\n\n<p><strong>On metric selection:</strong> \"I picked 12 metrics across 6 categories. The temptation is to track 50 things — but if everything is a priority, nothing is. These 12 tell you: are we selling (revenue), are we delivering (fulfillment), are customers staying (returns + retention), is the team managing (CX), do we have product (inventory), and do we have cash (balance). If all 12 are green, go focus on the next big thing.\"</p>\n\n<p><strong>The action trigger:</strong> \"The scorecard isn't just information — it's a decision framework. Red = investigate this week. Yellow trending down for 3 weeks = promote to red. Green for 8 weeks straight = raise the target. The system gets smarter over time.\"</p>\n</div>\n\n<h4>⚡ Sub-Scenarios</h4>\n\n<div class=\"card\">\n<h3>Sub-Scenario A: Kevin gives you a raw data dump and says \"What would you track?\"</h3>\n<p>Don't try to analyze everything. Scan for: revenue (top-level), return rate (his obsession), inventory levels (stockout risk), and anything surprising (a number way above or below what you'd expect). Build the scorecard from what you find.</p>\n<p><strong>What to say:</strong> \"Give me 20 minutes with this data and I'll come back with the 10 metrics that matter and why. I'm going to ignore 80% of this — not because it's not interesting, but because your Monday morning should focus on the 20% that drives decisions.\"</p>\n</div>\n\n<div class=\"card\">\n<h3>Sub-Scenario B: Kevin says \"We already have dashboards in Fulfil.io\"</h3>\n<p>ERP dashboards and executive scorecards are different things. Fulfil.io shows operational data — the scorecard shows strategic data with context and targets.</p>\n<p><strong>What to say:</strong> \"Fulfil.io is great for operational teams — Brandon should live in it daily. But an executive scorecard is curated, has targets, shows trends, and highlights exceptions. It's the difference between a Bloomberg terminal and a one-page market summary. You need the summary.\"</p>\n</div>\n\n<div class=\"card\">\n<h3>Sub-Scenario C: Kevin wants different metrics than you chose</h3>\n<p>Let him customize. The scorecard is a framework, not a religion. If Kevin cares deeply about a metric you didn't include (e.g., app downloads, social media engagement, NPS), add it. The point is the FORMAT and DISCIPLINE, not the specific metrics.</p>\n<p><strong>What to say:</strong> \"The specific metrics should evolve. What matters is the practice: every Monday, 12 metrics, 5 minutes, action on reds only. We can swap metrics in or out quarterly as priorities shift.\"</p>\n</div>\n\n<h4>🚫 Mistakes to Avoid</h4>\n<ul>\n<li><strong>Don't present 30 metrics.</strong> More metrics = less clarity. Kevin's attention is the scarcest resource. 10-12 max.</li>\n<li><strong>Don't skip the targets.</strong> A number without a target is just trivia. \"Return rate is 10.2%\" means nothing. \"Return rate is 10.2% vs. 8% target\" tells a story.</li>\n<li><strong>Don't forget the \"so what.\"</strong> Every red metric needs a proposed action. Don't just flag problems — propose solutions.</li>\n<li><strong>Don't make it pretty at the expense of useful.</strong> Kevin doesn't need a Tableau dashboard. A clean spreadsheet or Notion page that updates weekly is better than a beautiful dashboard nobody updates.</li>\n</ul>"
          },
